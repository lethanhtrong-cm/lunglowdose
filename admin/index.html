<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Portal Pro - MedExam</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0",
            "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
            "lucide-react": "https://esm.sh/lucide-react@0.344.0?deps=react@18.2.0",
            "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
            "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js",
            "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js"
        }
    }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #020617; color: #f8fafc; margin: 0; padding: 0; }
        .animate-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        .glass-card { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .tab-active { color: #3b82f6; border-bottom: 2px solid #3b82f6; }
    </style>
</head>
<body class="antialiased custom-scrollbar">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useMemo, useCallback } from 'react';
        import { createRoot } from 'react-dom/client';
        import { initializeApp } from 'firebase/app';
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from 'firebase/auth';
        import { getFirestore, collection, doc, addDoc, updateDoc, deleteDoc, onSnapshot, query, orderBy, serverTimestamp } from 'firebase/firestore';
        import { 
            ShieldCheck, Users, BookOpen, LogOut, Search, Trash2, Plus, 
            Upload, Download, X, CheckCircle2, AlertCircle, Edit3, 
            LayoutDashboard, FileText, Loader2, Info, Database,
            TrendingUp, Tag, ChevronRight, Bell, Crown, Unlock, CreditCard, Check, FileUp, ListChecks
        } from 'lucide-react';

        const firebaseConfig = {
            apiKey: "AIzaSyDqdo_DJIWa5iqxiCgBq-0iGX7f9sr6soo",
            authDomain: "rt-examination.firebaseapp.com",
            projectId: "rt-examination",
            storageBucket: "rt-examination.firebasestorage.app",
            messagingSenderId: "920482699854",
            appId: "1:920482699854:web:44f9b0d735bdc001c6c11f"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = 'med-exam-pro-html';

        const ADMIN_EMAILS = ["thanhtrong.yds@gmail.com", "vnrad.tech@gmail.com", "test@gmail.com"];

        // --- UI UTILS ---
        const Toast = ({ message, type, onClose }) => {
            useEffect(() => {
                const timer = setTimeout(onClose, 4000);
                return () => clearTimeout(timer);
            }, [onClose]);
            const styles = {
                success: "bg-emerald-500/20 border-emerald-500/40 text-emerald-400",
                error: "bg-red-500/20 border-red-500/40 text-red-400",
                info: "bg-blue-500/20 border-blue-500/40 text-blue-400"
            };
            return (
                <div className={`fixed bottom-6 right-6 px-6 py-4 rounded-2xl border ${styles[type]} shadow-2xl flex items-center gap-3 animate-fade-in z-[100] backdrop-blur-xl max-w-sm`}>
                    {type === 'error' ? <AlertCircle size={20}/> : <CheckCircle2 size={20}/>}
                    <span className="font-bold text-sm leading-tight">{message}</span>
                </div>
            );
        };

        // --- COMPONENTS ---

        const ExamEditor = ({ exam, onClose, notify }) => {
            const [title, setTitle] = useState(exam?.title || '');
            const [category, setCategory] = useState(exam?.category || 'Chung');
            const [isPremium, setIsPremium] = useState(exam?.isPremium || false);
            const [duration, setDuration] = useState(exam?.duration || 30);
            const [questions, setQuestions] = useState(exam?.questions || []);
            const [activeTab, setActiveTab] = useState('excel'); // 'excel' or 'manual'
            const [isSaving, setIsSaving] = useState(false);
            const [isImporting, setIsImporting] = useState(false);

            // Manual inputs state
            const [qText, setQText] = useState('');
            const [opts, setOpts] = useState(['', '', '', '']);
            const [correct, setCorrect] = useState(0);
            const [expl, setExpl] = useState('');

            const addQManual = () => {
                if (!qText.trim()) return notify("Vui lòng nhập nội dung câu hỏi", "error");
                if (opts.some(o => !o.trim())) return notify("Vui lòng nhập đủ 4 phương án", "error");
                
                setQuestions([...questions, { text: qText, options: opts, correctOption: correct, explanation: expl }]);
                setQText(''); setOpts(['','','','']); setCorrect(0); setExpl('');
                notify("Đã thêm câu hỏi vào danh sách phía dưới", "success");
            };

            const downloadTemplate = () => {
                const wsData = [
                    ["Câu hỏi", "A", "B", "C", "D", "Đáp án (A/B/C/D)", "Giải thích"],
                    ["Vị trí giải phẫu của tim?", "Hố chậu phải", "Trung thất giữa", "Hạ sườn trái", "Thượng vị", "B", "Tim nằm ở trung thất giữa, giữa hai phổi."]
                ];
                const wb = XLSX.utils.book_new();
                const ws = XLSX.utils.aoa_to_sheet(wsData);
                XLSX.utils.book_append_sheet(wb, ws, "Mẫu");
                XLSX.writeFile(wb, "Mau_MedExam.xlsx");
            };

            const handleFileImport = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                setIsImporting(true);
                const reader = new FileReader();
                reader.onload = (evt) => {
                    try {
                        const data = new Uint8Array(evt.target.result);
                        const workbook = XLSX.read(data, { type: 'array' });
                        const rows = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], { header: 1 });
                        const imported = rows.slice(1).filter(r => r[0]).map(r => ({
                            text: String(r[0]),
                            options: [String(r[1]||''), String(r[2]||''), String(r[3]||''), String(r[4]||'')],
                            correctOption: "ABCD".indexOf(String(r[5]||'A').toUpperCase().trim()),
                            explanation: String(r[6] || '')
                        }));
                        setQuestions([...questions, ...imported]);
                        notify(`Đã nạp ${imported.length} câu hỏi từ tệp`, 'success');
                    } catch (err) { notify("Lỗi cấu trúc tệp Excel", "error"); }
                    finally { setIsImporting(false); }
                };
                reader.readAsArrayBuffer(file);
            };

            const saveExam = async () => {
                if (!title.trim()) return notify("Vui lòng nhập tên đề thi", "error");
                if (questions.length === 0) return notify("Danh sách câu hỏi đang trống", "error");
                
                setIsSaving(true);
                try {
                    const data = { title, category, isPremium, duration: Number(duration), questions, updatedAt: serverTimestamp() };
                    if (exam?.id) await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'exams', exam.id), data);
                    else await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'exams'), { ...data, createdAt: serverTimestamp() });
                    notify("Lưu đề thi thành công", "success");
                    onClose();
                } catch (e) { notify(e.message, "error"); }
                finally { setIsSaving(false); }
            };

            return (
                <div className="fixed inset-0 bg-slate-950/98 flex items-center justify-center p-4 z-50">
                    <div className="bg-slate-900 w-full max-w-6xl h-[95vh] rounded-[2.5rem] border border-slate-800 flex flex-col shadow-2xl animate-in overflow-hidden">
                        {/* Header Section */}
                        <div className="p-6 border-b border-slate-800 flex justify-between items-center bg-slate-900/50 backdrop-blur-xl">
                            <div className="flex items-center gap-4">
                                <div className={`w-12 h-12 rounded-2xl flex items-center justify-center ${exam ? 'bg-blue-500/10 text-blue-500' : 'bg-emerald-500/10 text-emerald-500'}`}>
                                    {exam ? <Edit3 size={24}/> : <Plus size={24}/>}
                                </div>
                                <div>
                                    <h2 className="text-xl font-black uppercase tracking-tight">{exam ? 'Sửa đề thi' : 'Tạo đề thi'}</h2>
                                    <p className="text-slate-500 text-[10px] font-bold uppercase tracking-widest">Admin Console</p>
                                </div>
                            </div>
                            <button onClick={onClose} className="p-2 text-slate-500 hover:text-white transition-all bg-slate-800 rounded-full"><X size={20}/></button>
                        </div>

                        {/* Editor Body */}
                        <div className="flex-1 overflow-y-auto p-8 custom-scrollbar space-y-10">
                            
                            {/* Part 1: General Info */}
                            <section className="bg-slate-950/50 p-6 rounded-3xl border border-white/5 grid grid-cols-1 md:grid-cols-4 gap-6">
                                <div className="md:col-span-2 space-y-2">
                                    <label className="text-[10px] font-black text-slate-600 uppercase ml-2">Tên bộ đề</label>
                                    <input className="w-full bg-slate-900 border border-slate-800 rounded-2xl p-4 outline-none focus:border-blue-600 font-bold" value={title} onChange={e=>setTitle(e.target.value)} placeholder="Nhập tiêu đề cuộc thi..."/>
                                </div>
                                <div className="space-y-2">
                                    <label className="text-[10px] font-black text-slate-600 uppercase ml-2">Thời gian (Phút)</label>
                                    <input type="number" className="w-full bg-slate-900 border border-slate-800 rounded-2xl p-4 outline-none focus:border-blue-600 font-bold" value={duration} onChange={e=>setDuration(e.target.value)}/>
                                </div>
                                <div className="space-y-2">
                                    <label className="text-[10px] font-black text-slate-600 uppercase ml-2">Loại đề</label>
                                    <div className="flex bg-slate-900 p-1.5 rounded-2xl border border-slate-800 h-[58px]">
                                        <button onClick={()=>setIsPremium(false)} className={`flex-1 rounded-xl text-[10px] font-black transition-all flex items-center justify-center gap-2 ${!isPremium ? 'bg-emerald-600 text-white shadow-lg' : 'text-slate-600'}`}>FREE</button>
                                        <button onClick={()=>setIsPremium(true)} className={`flex-1 rounded-xl text-[10px] font-black transition-all flex items-center justify-center gap-2 ${isPremium ? 'bg-yellow-600 text-white shadow-lg' : 'text-slate-600'}`}>VIP</button>
                                    </div>
                                </div>
                            </section>

                            {/* Part 2: Question Input Method (TABBED) */}
                            <section className="space-y-6">
                                <div className="flex items-center gap-8 border-b border-slate-800 px-4">
                                    <button 
                                        onClick={() => setActiveTab('excel')} 
                                        className={`pb-4 text-xs font-black uppercase tracking-widest transition-all flex items-center gap-2 ${activeTab === 'excel' ? 'tab-active' : 'text-slate-500 hover:text-slate-300'}`}
                                    >
                                        <FileUp size={16}/> 1. NHẬP TỪ EXCEL
                                    </button>
                                    <button 
                                        onClick={() => setActiveTab('manual')} 
                                        className={`pb-4 text-xs font-black uppercase tracking-widest transition-all flex items-center gap-2 ${activeTab === 'manual' ? 'tab-active' : 'text-slate-500 hover:text-slate-300'}`}
                                    >
                                        <Edit3 size={16}/> 2. SOẠN THỦ CÔNG
                                    </button>
                                </div>

                                <div className="min-h-[300px]">
                                    {activeTab === 'excel' ? (
                                        <div className="bg-slate-950/40 p-12 rounded-[2.5rem] border border-white/5 flex flex-col items-center justify-center text-center space-y-6 animate-in">
                                            <div className="w-20 h-20 bg-emerald-500/10 text-emerald-500 rounded-3xl flex items-center justify-center shadow-inner">
                                                <FileUp size={40}/>
                                            </div>
                                            <div>
                                                <h4 className="text-xl font-black">Nạp câu hỏi hàng loạt</h4>
                                                <p className="text-slate-500 text-sm mt-2 max-w-md">Tiết kiệm thời gian bằng cách tải lên tệp danh sách câu hỏi đã soạn sẵn</p>
                                            </div>
                                            <div className="w-full max-w-sm space-y-4">
                                                <label className="block w-full py-16 border-2 border-dashed border-slate-800 rounded-3xl hover:border-emerald-600 cursor-pointer transition-all group bg-slate-900/50">
                                                    <input type="file" className="hidden" accept=".xlsx, .xls" onChange={handleFileImport} />
                                                    <div className="text-center">
                                                        {isImporting ? <Loader2 className="animate-spin mx-auto text-emerald-500 mb-2"/> : <Plus className="mx-auto text-slate-600 group-hover:text-emerald-500 mb-2"/>}
                                                        <span className="text-slate-500 font-bold group-hover:text-emerald-400">{isImporting ? "Đang xử lý..." : "Chọn tệp .xlsx từ máy tính"}</span>
                                                    </div>
                                                </label>
                                                <button onClick={downloadTemplate} className="w-full text-emerald-500 text-[10px] font-black uppercase flex items-center justify-center gap-2 hover:underline">
                                                    <Download size={14}/> Tải xuống cấu trúc file mẫu
                                                </button>
                                            </div>
                                        </div>
                                    ) : (
                                        <div className="bg-slate-950 border border-slate-800 p-8 rounded-[2.5rem] space-y-6 shadow-2xl animate-in relative overflow-hidden">
                                            <div className="absolute right-0 top-0 w-32 h-32 bg-blue-500/5 rounded-full -mr-10 -mt-10 blur-3xl"></div>
                                            <textarea className="w-full bg-slate-900 p-6 rounded-2xl border border-slate-800 min-h-[120px] outline-none focus:border-blue-600 text-lg shadow-sm" placeholder="Nhập câu hỏi tại đây..." value={qText} onChange={e=>setQText(e.target.value)}/>
                                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                                {opts.map((o, i) => (
                                                    <div key={i} className={`flex items-center gap-4 p-4 rounded-2xl border transition-all ${correct === i ? 'bg-blue-500/10 border-blue-500' : 'bg-slate-900 border-slate-800'}`}>
                                                        <input type="radio" checked={correct === i} onChange={()=>setCorrect(i)} className="w-5 h-5 accent-blue-500"/>
                                                        <input className="bg-transparent flex-1 outline-none text-sm font-bold" value={o} onChange={e=>{const n=[...opts]; n[i]=e.target.value; setOpts(n)}} placeholder={`Phương án ${String.fromCharCode(65+i)}`}/>
                                                    </div>
                                                ))}
                                            </div>
                                            <div className="space-y-2">
                                                <label className="text-[10px] font-black text-slate-600 uppercase ml-2 tracking-widest flex items-center gap-2"><Info size={14}/> Giải thích đáp án</label>
                                                <textarea className="w-full bg-slate-900/50 p-4 rounded-xl border border-slate-800 text-sm italic outline-none focus:border-blue-500" placeholder="VD: Đáp án này đúng vì..." value={expl} onChange={e=>setExpl(e.target.value)}/>
                                            </div>
                                            <button onClick={addQManual} className="w-full py-5 bg-slate-800 hover:bg-slate-700 text-white rounded-2xl font-black uppercase text-xs tracking-widest shadow-lg transition-all active:scale-95 border border-white/5">
                                                LƯU VÀO DANH SÁCH BÊN DƯỚI
                                            </button>
                                        </div>
                                    )}
                                </div>
                            </section>

                            {/* Part 3: Questions List Container */}
                            <section className="space-y-6">
                                <div className="flex justify-between items-center px-4">
                                    <h3 className="font-black text-blue-400 text-xl uppercase tracking-tighter flex items-center gap-3">
                                        <ListChecks size={24}/> Ngân hàng đề ({questions.length})
                                    </h3>
                                    {questions.length > 0 && <button onClick={()=>setQuestions([])} className="text-red-500 text-[10px] font-black hover:underline uppercase tracking-widest">Xóa tất cả</button>}
                                </div>

                                {questions.length === 0 ? (
                                    <div className="py-24 text-center border-2 border-dashed border-slate-800 rounded-[3rem] text-slate-700 bg-slate-900/20">
                                        <p className="font-black uppercase tracking-widest text-xs">Ngân hàng hiện đang trống</p>
                                        <p className="text-[10px] mt-1 italic">Vui lòng sử dụng một trong hai phương thức nhập liệu ở trên</p>
                                    </div>
                                ) : (
                                    <div className="grid grid-cols-1 gap-4 pb-10">
                                        {questions.map((q, i) => (
                                            <div key={i} className="bg-slate-900/40 p-6 rounded-3xl flex justify-between items-start border border-slate-800 hover:border-blue-900/30 transition-all group">
                                                <div className="flex-1 pr-6">
                                                    <p className="font-bold text-slate-200 text-lg leading-tight"><span className="text-blue-500 mr-2 font-black italic">#{i+1}</span> {q.text}</p>
                                                    <div className="flex flex-wrap gap-2 mt-4">
                                                        {q.options.map((opt, idx) => (
                                                            <div key={idx} className={`text-[9px] px-3 py-1.5 rounded-lg border font-black uppercase tracking-wider ${q.correctOption === idx ? 'bg-emerald-500/10 border-emerald-500/30 text-emerald-400' : 'bg-slate-950 border-slate-800 text-slate-600'}`}>
                                                                {String.fromCharCode(65+idx)}: {opt}
                                                            </div>
                                                        ))}
                                                    </div>
                                                </div>
                                                <button onClick={()=>setQuestions(questions.filter((_,idx)=>idx!==i))} className="p-3 text-slate-600 hover:text-red-500 transition-all bg-slate-800 rounded-xl"><Trash2 size={18}/></button>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </section>
                        </div>

                        {/* Sticky Footer Action */}
                        <div className="p-6 border-t border-slate-800 flex justify-end gap-4 bg-slate-900/80 backdrop-blur-xl">
                            <button onClick={onClose} className="px-10 py-3 text-slate-500 font-bold hover:text-white transition-all uppercase text-xs">Đóng</button>
                            <button onClick={saveExam} disabled={isSaving} className="px-16 py-4 bg-blue-600 hover:bg-blue-500 rounded-2xl font-black text-white flex gap-3 shadow-2xl transition-all active:scale-95 disabled:opacity-50">
                                {isSaving ? <Loader2 className="animate-spin" size={20}/> : <Check size={20}/>} {exam ? 'CẬP NHẬT' : 'PHÁT HÀNH ĐỀ'}
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        const Dashboard = ({ user }) => {
            const [tab, setTab] = useState('overview');
            const [users, setUsers] = useState([]);
            const [exams, setExams] = useState([]);
            const [requests, setRequests] = useState([]);
            const [search, setSearch] = useState('');
            const [filterType, setFilterType] = useState('all');
            const [examAccessFilter, setExamAccessFilter] = useState('all');
            const [editing, setEditing] = useState(null);
            const [showAdd, setShowAdd] = useState(false);
            const [toast, setToast] = useState(null);

            const notify = useCallback((message, type = 'info') => {
                setToast({ message, type });
            }, []);

            useEffect(() => {
                const unsubU = onSnapshot(query(collection(db, 'artifacts', appId, 'public', 'data', 'users')), s => setUsers(s.docs.map(d=>({id: d.id, ...d.data()}))));
                const unsubE = onSnapshot(query(collection(db, 'artifacts', appId, 'public', 'data', 'exams')), s => setExams(s.docs.map(d=>({id: d.id, ...d.data()}))));
                const unsubR = onSnapshot(query(collection(db, 'artifacts', appId, 'public', 'data', 'paymentRequests')), s => setRequests(s.docs.map(d=>({id: d.id, ...d.data()}))));
                return () => { unsubU(); unsubE(); unsubR(); };
            }, []);

            const filteredUsers = useMemo(() => {
                return users.filter(u => {
                    const matchSearch = (u.displayName||'').toLowerCase().includes(search.toLowerCase()) || (u.email||'').toLowerCase().includes(search.toLowerCase());
                    const matchFilter = filterType === 'all' || (filterType === 'vip' && u.isPremium) || (filterType === 'free' && !u.isPremium);
                    return matchSearch && matchFilter;
                });
            }, [users, search, filterType]);

            const filteredExams = useMemo(() => {
                return exams.filter(e => {
                    const matchSearch = (e.title||'').toLowerCase().includes(search.toLowerCase());
                    const matchAccess = examAccessFilter === 'all' || (examAccessFilter === 'vip' && e.isPremium) || (examAccessFilter === 'free' && !e.isPremium);
                    return matchSearch && matchAccess;
                });
            }, [exams, search, examAccessFilter]);

            return (
                <div className="flex min-h-screen">
                    <aside className="w-72 bg-slate-900/50 border-r border-white/5 flex flex-col fixed h-full z-40 backdrop-blur-xl">
                        <div className="p-8 border-b border-white/5 flex items-center gap-4 text-red-500 font-black text-2xl tracking-tighter">
                            <ShieldCheck size={32} className="drop-shadow-[0_0_12px_rgba(239,68,68,0.5)]"/> 
                            <div className="leading-none text-white font-black uppercase tracking-tight">Admin<br/><small className="text-slate-500 text-[10px] tracking-[0.4em]">MedExam</small></div>
                        </div>

                        <nav className="flex-1 p-6 space-y-4 mt-4">
                            {[
                                { id: 'overview', label: 'Tổng quan', icon: LayoutDashboard },
                                { id: 'users', label: 'Học viên', icon: Users },
                                { id: 'exams', label: 'Quản lý đề', icon: BookOpen },
                                { id: 'requests', label: 'Duyệt VIP', icon: CreditCard, count: requests.length }
                            ].map(item => (
                                <button key={item.id} onClick={()=>setTab(item.id)} className={`w-full flex items-center justify-between px-6 py-5 rounded-3xl transition-all ${tab === item.id ? 'bg-blue-600 text-white shadow-xl scale-105' : 'text-slate-400 hover:bg-white/5'}`}>
                                    <div className="flex items-center gap-4">
                                        <item.icon size={20}/> 
                                        <span className="font-extrabold text-sm">{item.label}</span>
                                    </div>
                                    {item.count > 0 && <span className="bg-red-500 text-[10px] font-black px-2 py-1 rounded-full animate-pulse">{item.count}</span>}
                                </button>
                            ))}
                        </nav>

                        <div className="p-8 border-t border-white/5"><button onClick={()=>signOut(auth)} className="w-full flex items-center justify-center gap-3 px-6 py-4 text-slate-500 hover:text-red-400 transition-all font-black text-xs uppercase tracking-widest"><LogOut size={18}/> Thoát</button></div>
                    </aside>

                    <main className="flex-1 ml-72 p-12 custom-scrollbar">
                        <div className="flex flex-col lg:flex-row justify-between lg:items-end mb-16 gap-8">
                            <h1 className="text-5xl font-black text-white tracking-tighter capitalize">{tab === 'requests' ? 'Yêu cầu kích hoạt' : tab === 'exams' ? 'Ngân hàng đề thi' : tab === 'users' ? 'Học viên' : 'Dashboard'}</h1>
                            <div className="flex flex-wrap gap-4 items-center">
                                <div className="relative group">
                                    <Search className="absolute left-4 top-3.5 text-slate-500 group-focus-within:text-blue-600 transition-colors" size={20}/>
                                    <input className="bg-slate-900/50 border border-white/5 rounded-2xl pl-12 pr-6 py-3.5 w-72 outline-none focus:border-blue-600 font-bold backdrop-blur" placeholder="Tìm nhanh..." value={search} onChange={e=>setSearch(e.target.value)}/>
                                </div>
                                {tab==='exams' && (
                                    <>
                                        <select className="bg-slate-900 border border-white/5 rounded-2xl px-4 py-3.5 text-[10px] font-black uppercase outline-none text-slate-400 focus:border-blue-500 transition-all" value={examAccessFilter} onChange={e=>setExamAccessFilter(e.target.value)}>
                                            <option value="all">Tất cả</option>
                                            <option value="free">Miễn phí</option>
                                            <option value="vip">VIP</option>
                                        </select>
                                        <button onClick={()=>setShowAdd(true)} className="bg-emerald-600 hover:bg-emerald-500 text-slate-950 px-10 py-4 rounded-2xl font-black flex items-center gap-3 shadow-xl transition-all active:scale-95"><Plus size={20}/> TẠO ĐỀ</button>
                                    </>
                                )}
                            </div>
                        </div>

                        {tab === 'requests' && (
                            <div className="bg-slate-900/40 border border-white/5 rounded-[3rem] overflow-hidden shadow-2xl animate-in backdrop-blur-xl">
                                <table className="w-full text-left text-sm border-collapse">
                                    <thead className="bg-slate-800/30 text-slate-500 uppercase text-[10px] font-black tracking-[0.2em]">
                                        <tr><th className="p-8">Người gửi</th><th className="p-8">Thời gian</th><th className="p-8">Trạng thái</th><th className="p-8 text-right">Thao tác</th></tr>
                                    </thead>
                                    <tbody className="divide-y divide-white/5">
                                        {requests.length > 0 ? requests.map(req => (
                                            <tr key={req.id} className="hover:bg-white/5 transition-all group font-bold">
                                                <td className="p-8"><span className="text-slate-200 text-lg block font-black">{req.displayName || req.email}</span></td>
                                                <td className="p-8 text-slate-500 text-xs">{req.createdAt?.toDate ? req.createdAt.toDate().toLocaleString('vi-VN') : '---'}</td>
                                                <td className="p-8"><span className="px-4 py-2 bg-yellow-500/10 text-yellow-500 text-[10px] font-black rounded-full border border-yellow-500/20 uppercase">Chờ duyệt</span></td>
                                                <td className="p-8 text-right">
                                                    <button onClick={async()=>{await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'users', req.uid), { isPremium: true }); await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'paymentRequests', req.id)); notify("Đã kích hoạt VIP thành công", "success");}} className="px-6 py-3 bg-emerald-600 hover:bg-emerald-500 text-slate-950 rounded-2xl font-black text-[10px] uppercase shadow-lg flex items-center gap-2 float-right active:scale-95 transition-all"><Check size={14}/> Xác nhận VIP</button>
                                                </td>
                                            </tr>
                                        )) : (
                                            <tr><td colSpan="4" className="p-32 text-center text-slate-600 italic font-black uppercase tracking-widest text-xs tracking-widest">Không có yêu cầu nào mới</td></tr>
                                        )}
                                    </tbody>
                                </table>
                            </div>
                        )}

                        {tab === 'users' && (
                             <div className="bg-slate-900/40 border border-white/5 rounded-[3rem] overflow-hidden shadow-2xl animate-in backdrop-blur-xl">
                                <table className="w-full text-left text-sm border-collapse font-bold">
                                    <thead className="bg-slate-800/30 text-slate-500 uppercase text-[10px] font-black tracking-[0.2em]">
                                        <tr><th className="p-8">Học viên</th><th className="p-8">Gói truy cập</th><th className="p-8 text-right">Quản trị</th></tr>
                                    </thead>
                                    <tbody className="divide-y divide-white/5">
                                        {filteredUsers.map(u => (
                                            <tr key={u.id} className="hover:bg-white/5 transition-all group">
                                                <td className="p-8"><span className="font-black text-slate-200 text-lg block tracking-tight">{u.displayName || 'Học viên ẩn danh'}</span><span className="text-[10px] text-slate-500 uppercase tracking-widest">{u.email}</span></td>
                                                <td className="p-8 text-center">{u.isPremium ? <span className="px-5 py-2 bg-yellow-500/10 text-yellow-500 text-[10px] font-black rounded-full border border-yellow-500/20 shadow-[0_0_15px_rgba(234,179,8,0.1)] uppercase">Vip access</span> : <span className="text-slate-700 text-[10px] font-black uppercase">Standard</span>}</td>
                                                <td className="p-8 flex justify-end gap-3 opacity-0 group-hover:opacity-100 transition-all translate-x-4 group-hover:translate-x-0">
                                                    <button onClick={async() => {await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'users', u.id), {isPremium: !u.isPremium}); notify("Đã cập nhật trạng thái", "success");}} className={`px-6 py-3 rounded-2xl text-[10px] font-black tracking-widest uppercase transition-all shadow-sm ${u.isPremium ? 'bg-red-500/10 text-red-400' : 'bg-emerald-500/10 text-emerald-400'}`}>{u.isPremium ? 'HỦY VIP' : 'CẤP VIP'}</button>
                                                    <button onClick={async() => { if(window.confirm("Xóa vĩnh viễn?")) {await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'users', u.id)); notify("Đã xóa học viên", "error");}}} className="p-3 text-slate-600 hover:text-red-500 transition-all bg-slate-800 rounded-xl"><Trash2 size={18}/></button>
                                                </td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        )}

                        {tab === 'exams' && (
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 2xl:grid-cols-4 gap-8 animate-in">
                                {filteredExams.length > 0 ? filteredExams.map(e => (
                                    <div key={e.id} className="bg-slate-900/50 border border-white/5 p-8 rounded-[3rem] hover:border-blue-600/50 transition-all group relative shadow-2xl overflow-hidden flex flex-col backdrop-blur-sm">
                                        <div className="absolute -right-10 -top-10 w-32 h-32 bg-blue-600/5 rounded-full group-hover:scale-[2.5] transition-all duration-700"></div>
                                        <div className={`p-5 rounded-3xl mb-6 inline-flex w-fit relative z-10 shadow-inner ${e.isPremium ? 'bg-yellow-500/10 text-yellow-500' : 'bg-emerald-500/10 text-emerald-400'}`}>{e.isPremium ? <Crown size={24}/> : <Unlock size={24}/>}</div>
                                        <h3 className="text-xl font-black text-slate-100 line-clamp-2 min-h-[4rem] leading-none mb-6 relative z-10 group-hover:text-blue-400 transition-colors uppercase tracking-tight leading-tight">{e.title}</h3>
                                        <div className="flex justify-between items-center mt-auto pt-6 border-t border-white/5 text-[10px] font-black text-slate-600 tracking-[0.2em] uppercase relative z-10">
                                            <span className="flex items-center gap-2"><FileText size={14}/> {e.questions?.length || 0} câu</span>
                                            <div className="flex gap-2">
                                                <button onClick={()=>setEditing(e)} className="p-2.5 bg-slate-950/80 text-blue-400 rounded-xl hover:bg-blue-600 hover:text-white transition-all shadow-xl"><Edit3 size={16}/></button>
                                                <button onClick={async() => { if(window.confirm("Xóa đề thi này?")) {await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'exams', e.id)); notify("Đã xóa đề", "error");}}} className="p-2.5 bg-slate-950/80 text-red-400 rounded-xl hover:bg-red-600 hover:text-white transition-all shadow-xl"><Trash2 size={16}/></button>
                                            </div>
                                        </div>
                                    </div>
                                )) : (
                                    <div className="col-span-full py-40 text-center border-2 border-dashed border-slate-800 rounded-[4rem] text-slate-700 space-y-6">
                                        <Database size={64} className="mx-auto opacity-10"/>
                                        <button onClick={()=>setShowAdd(true)} className="text-blue-500 underline font-black uppercase text-[10px] tracking-widest transition-all hover:text-blue-400">Tạo bộ đề đầu tiên ngay</button>
                                    </div>
                                )}
                            </div>
                        )}

                        {tab === 'overview' && (
                             <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8 animate-in">
                                {[
                                    { title: 'Học viên', val: users.length, color: 'text-white', icon: Users, bg: 'bg-white/5' },
                                    { title: 'VIP Premium', val: users.filter(u=>u.isPremium).length, color: 'text-yellow-500', icon: Crown, bg: 'bg-yellow-500/5' },
                                    { title: 'Đề thi', val: exams.length, color: 'text-emerald-400', icon: BookOpen, bg: 'bg-emerald-400/5' },
                                    { title: 'Chờ duyệt', val: requests.length, color: 'text-red-400', icon: CreditCard, bg: 'bg-red-400/5' }
                                ].map((s, i) => (
                                    <div key={i} className={`${s.bg} p-10 rounded-[2.5rem] border border-white/5 group hover:scale-[1.02] transition-all shadow-lg overflow-hidden relative`}>
                                        <s.icon className="absolute -right-6 -bottom-6 w-32 h-32 text-white/5 rotate-12 group-hover:text-white/10 transition-all"/>
                                        <p className="text-slate-500 text-[10px] font-black uppercase tracking-[0.3em] mb-3 relative z-10">{s.title}</p>
                                        <p className={`text-5xl font-black ${s.color} tracking-tighter relative z-10`}>{s.val}</p>
                                    </div>
                                ))}
                            </div>
                        )}
                    </main>

                    {showAdd && <ExamEditor onClose={()=>setShowAdd(false)} notify={notify}/>}
                    {editing && <ExamEditor exam={editing} onClose={()=>setEditing(null)} notify={notify}/>}
                    {toast && <Toast {...toast} onClose={() => setToast(null)} />}
                </div>
            );
        };

        const App = () => {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [err, setErr] = useState('');

            useEffect(() => {
                return onAuthStateChanged(auth, u => {
                    if (u && ADMIN_EMAILS.includes(u.email)) { setUser(u); setErr(''); }
                    else if (u) { setErr("Truy cập bị từ chối."); signOut(auth); setUser(null); }
                    else { setUser(null); }
                    setLoading(false);
                });
            }, []);

            const handleLogin = async (e) => {
                e.preventDefault();
                const { email, password } = e.target.elements;
                setLoading(true); setErr('');
                try {
                    await signInWithEmailAndPassword(auth, email.value, password.value);
                } catch (e) { setErr("Email hoặc mật khẩu không đúng."); signOut(auth); }
                finally { setLoading(false); }
            };

            if (loading) return (
                <div className="min-h-screen bg-[#020617] flex flex-col items-center justify-center space-y-8">
                    <div className="w-16 h-16 border-2 border-slate-800 border-t-red-600 rounded-full animate-spin"></div>
                    <p className="text-white font-black tracking-[0.5em] uppercase text-[10px]">Loading Admin Console...</p>
                </div>
            );

            if (!user) return (
                <div className="min-h-screen flex items-center justify-center p-4 bg-[#020617] relative">
                    <div className="w-full max-w-lg bg-slate-900/60 border border-white/10 p-16 rounded-[4rem] shadow-2xl animate-in relative z-10 backdrop-blur-3xl">
                        <div className="text-center mb-12">
                            <ShieldCheck size={56} className="text-red-600 mx-auto mb-6 drop-shadow-xl"/>
                            <h1 className="text-4xl font-black text-white tracking-tighter mb-4 uppercase leading-none">Admin<br/>Portal</h1>
                            <div className="h-1 w-12 bg-red-600 mx-auto rounded-full mt-4"></div>
                        </div>
                        {err && (
                            <div className="mb-10 p-5 bg-red-500/10 border border-red-500/20 text-red-400 text-[10px] font-black rounded-3xl flex items-center gap-4 uppercase animate-pulse">
                                <AlertCircle size={20}/> {err}
                            </div>
                        )}
                        <form onSubmit={handleLogin} className="space-y-8">
                            <input name="email" type="email" required className="w-full bg-slate-950 border border-white/10 rounded-3xl p-5 outline-none focus:border-red-600 font-bold text-slate-200 transition-all shadow-inner" placeholder="Admin Email"/>
                            <input name="password" type="password" required className="w-full bg-slate-950 border border-white/10 rounded-3xl p-5 outline-none focus:border-red-600 font-bold text-slate-200 transition-all shadow-inner" placeholder="••••••••"/>
                            <button className="w-full bg-red-600 hover:bg-red-500 text-white font-black py-6 rounded-3xl transition-all shadow-2xl uppercase text-xs tracking-widest active:scale-95">Xác thực quyền hạn</button>
                        </form>
                    </div>
                </div>
            );

            return <Dashboard user={user} />;
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
