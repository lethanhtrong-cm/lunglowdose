<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedExam Pro - Ôn Thi Chứng Chỉ Hành Nghề</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <!-- Thư viện chụp ảnh màn hình -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <!-- Font Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0",
            "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
            "lucide-react": "https://esm.sh/lucide-react@0.344.0?deps=react@18.2.0",
            "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
            "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js",
            "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js"
        }
    }
    </script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    animation: {
                        'blob': 'blob 7s infinite',
                        'fade-in': 'fadeIn 0.5s ease-out',
                        'slide-up': 'slideUp 0.5s ease-out',
                        'slide-down': 'slideDown 0.5s ease-out',
                        'slide-left': 'slideLeft 0.3s ease-out',
                        'confetti': 'confetti 2s ease-out forwards',
                        'scale-up': 'scaleUp 0.3s ease-out',
                        'spin-slow': 'spin 4s linear infinite',
                        'pulse-gold': 'pulseGold 2s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'flash': 'flash 1s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    },
                    keyframes: {
                        blob: {
                            '0%': { transform: 'translate(0px, 0px) scale(1)' },
                            '33%': { transform: 'translate(30px, -50px) scale(1.1)' },
                            '66%': { transform: 'translate(-20px, 20px) scale(0.9)' },
                            '100%': { transform: 'translate(0px, 0px) scale(1)' },
                        },
                        fadeIn: {
                            'from': { opacity: '0', transform: 'translateY(10px)' },
                            'to': { opacity: '1', transform: 'translateY(0)' },
                        },
                        flash: {
                            '0%, 100%': { opacity: '1' },
                            '50%': { opacity: '0.2' },
                        },
                        slideUp: {
                            'from': { transform: 'translateY(100%)' },
                            'to': { transform: 'translateY(0)' },
                        },
                        slideDown: {
                            'from': { transform: 'translateY(-100%)' },
                            'to': { transform: 'translateY(0)' },
                        },
                        slideLeft: {
                            'from': { transform: 'translateX(100%)' },
                            'to': { transform: 'translateX(0)' },
                        },
                        pulseGold: {
                            '0%, 100%': { boxShadow: '0 0 0 0 rgba(245, 158, 11, 0.4)' },
                            '50%': { boxShadow: '0 0 20px 5px rgba(245, 158, 11, 0.2)' },
                        },
                        scaleUp: {
                            'from': { transform: 'scale(0.95)', opacity: '0' },
                            'to': { transform: 'scale(1)', opacity: '1' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        /* CHỐNG COPY CƠ BẢN */
        body { 
            background-color: #0b1120; 
            color: #e2e8f0; 
            -webkit-font-smoothing: antialiased;
            -webkit-user-select: none; /* Safari */
            -moz-user-select: none; /* Firefox */
            -ms-user-select: none; /* IE10+/Edge */
            user-select: none; /* Standard */
        }
        
        /* Ẩn nội dung khi in */
        @media print {
            body { display: none !important; }
        }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }
        
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        .glass-panel { background: rgba(30, 41, 59, 0.4); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .glass-card { background: linear-gradient(145deg, rgba(30, 41, 59, 0.8), rgba(15, 23, 42, 0.95)); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .glass-card:hover { transform: translateY(-6px); border-color: rgba(6, 182, 212, 0.4); box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.5); }
        
        .nav-btn { position: relative; display: flex; align-items: center; justify-content: center; height: 40px; border-radius: 12px; background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.05); transition: all 0.3s ease; color: #94a3b8; }
        .nav-btn:hover { background: rgba(255, 255, 255, 0.08); color: #fff; transform: translateY(-2px); border-color: rgba(255, 255, 255, 0.2); }
        .nav-btn:active { transform: scale(0.95); }

        .vip-active-btn { background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%); color: #000; font-weight: 800; border: none; box-shadow: 0 4px 15px rgba(245, 158, 11, 0.3); }
        .vip-active-btn:hover { background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%); transform: translateY(-2px) scale(1.02); box-shadow: 0 8px 25px rgba(245, 158, 11, 0.4); }

        .custom-checkbox:checked { background-color: #0891b2; border-color: #0891b2; }
        .custom-checkbox:checked:after { content: '✔'; display: block; text-align: center; color: white; font-size: 10px; }
        
        .text-glow { text-shadow: 0 2px 4px rgba(0,0,0,0.5), 0 0 10px rgba(255,255,255,0.1); }
    </style>
    
    <!-- SCRIPT BẢO VỆ BẢN QUYỀN TOÀN CỤC -->
    <script>
        // Chặn chuột phải
        document.addEventListener('contextmenu', event => event.preventDefault());

        // Chặn phím tắt
        document.addEventListener('keydown', function(event) {
            // Chặn F12
            if (event.key === 'F12') {
                event.preventDefault();
                return false;
            }
            // Chặn các tổ hợp phím Ctrl
            if (event.ctrlKey) {
                switch (event.key.toLowerCase()) {
                    case 'c': // Copy
                    case 'u': // View Source
                    case 's': // Save
                    case 'p': // Print
                    case 'a': // Select All
                    case 'shift': // Ctrl+Shift+I (DevTools)
                        event.preventDefault();
                        return false;
                }
            }
            // Chặn Ctrl+Shift+I (Riêng cho Chrome/Edge)
            if (event.ctrlKey && event.shiftKey && event.key.toLowerCase() === 'i') {
                event.preventDefault();
                return false;
            }
        });

        // Phát hiện và làm mờ khi mất focus (Anti-Record/Anti-Spy đơn giản)
        window.addEventListener('blur', function() {
            document.body.style.filter = 'blur(10px)';
            document.title = '⚠️ Cảnh báo bảo mật!';
        });

        window.addEventListener('focus', function() {
            document.body.style.filter = 'none';
            document.title = 'MedExam Pro - Ôn Thi Chứng Chỉ Hành Nghề';
        });
    </script>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel" data-type="module" data-presets="react">
        import React, { useState, useEffect, useMemo, useRef, createContext, useContext } from 'react';
        import { createRoot } from 'react-dom/client';
        import { initializeApp } from 'firebase/app';
        import { 
            getAuth, 
            signInWithEmailAndPassword, 
            createUserWithEmailAndPassword, 
            signOut, 
            onAuthStateChanged, 
            updateProfile, 
            signInWithPopup, 
            GoogleAuthProvider,
            setPersistence, 
            browserLocalPersistence, 
            browserSessionPersistence,
            sendPasswordResetEmail,
            signInAnonymously,
            signInWithCustomToken
        } from 'firebase/auth';
        import { getFirestore, collection, addDoc, query, onSnapshot, serverTimestamp, orderBy, setDoc, doc, getDoc, getDocs, where, updateDoc, increment, limit, deleteDoc } from 'firebase/firestore';
        import { Activity, AlertTriangle, Award, Clock, FileText, History, LogOut, ShieldCheck, User, Users, XCircle, Loader2, Lock, Crown, Search, Filter, BookOpen, Star, Grid, CheckCircle2, ChevronRight, Menu, ArrowUp, Edit3, Save, Phone, MapPin, Calendar, CreditCard, Send, Hourglass, Eye, CheckCircle, Share2, Download, Facebook, Copy, Trophy, Medal, Sun, Moon, Type, X, Info, Check, Quote, Mail, Key, Flag, BarChart3, AlertCircle, RefreshCw, Bell, Trash2, Camera, Upload, Twitter, SendHorizontal, Columns, Rows } from 'lucide-react';

        // --- FIREBASE INIT ---
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {
            apiKey: "AIzaSyDqdo_DJIWa5iqxiCgBq-0iGX7f9sr6soo",
            authDomain: "rt-examination.firebaseapp.com",
            projectId: "rt-examination",
            storageBucket: "rt-examination.firebasestorage.app",
            messagingSenderId: "920482699854",
            appId: "1:920482699854:web:44f9b0d735bdc001c6c11f",
            measurementId: "G-8N7RTTREQM"
        };
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'med-exam-pro-html';

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const BANK_INFO = {
            bankName: "BIDV",
            accountNum: "8890523877", 
            accountName: "LE THANH TRONG", 
            amount: "50,000"
        };

        const VIP_DURATION_DAYS = 30;

        const formatDate = (ts) => {
            if (!ts) return "---";
            const date = ts.toDate ? ts.toDate() : new Date(ts);
            return date.toLocaleDateString('vi-VN', { 
                day: '2-digit', 
                month: '2-digit', 
                year: 'numeric' 
            });
        };

        const syncUserProfile = async (user, displayName) => {
            try {
                const userRef = doc(db, 'artifacts', appId, 'public', 'data', 'users', user.uid);
                const userSnap = await getDoc(userRef);
                if (!userSnap.exists()) {
                    await setDoc(userRef, {
                        uid: user.uid,
                        email: user.email,
                        displayName: displayName || user.displayName || user.email.split('@')[0],
                        photoURL: user.photoURL || '',
                        isPremium: false,
                        gender: 'other', 
                        phone: '',
                        address: '',
                        totalScore: 0,
                        examsCompleted: 0,
                        createdAt: serverTimestamp(),
                        lastActive: serverTimestamp(),
                        role: 'user'
                    });
                } else {
                    await updateDoc(userRef, { lastActive: serverTimestamp() });
                }
            } catch (e) { console.error("Sync profile error:", e); }
        };

        const UserAvatar = ({ user, profile, className = "w-10 h-10" }) => {
            const url = profile?.photoURL || user?.photoURL;
            const initial = (profile?.displayName || user?.displayName || user?.email || "?").charAt(0).toUpperCase();
            if (url) {
                return (
                    <div className={`${className} rounded-full overflow-hidden border-2 border-slate-700 shadow-md flex items-center justify-center bg-slate-800 ring-1 ring-white/10`}>
                        <img src={url} alt="Avatar" className="w-full h-full object-cover" onError={(e) => { e.target.onerror = null; e.target.src = `https://ui-avatars.com/api/?name=${initial}&background=random`; }} />
                    </div>
                );
            }
            return (
                <div className={`${className} rounded-full bg-gradient-to-br from-blue-500 to-indigo-600 flex items-center justify-center text-white font-bold shadow-inner ring-2 ring-slate-900`}>
                    {initial}
                </div>
            );
        };

        const Skeleton = ({ className }) => {
            return <div className={`bg-slate-700/50 animate-pulse rounded-lg ${className}`}></div>;
        };
        
        // COMPONENT WATERMARK BẢO VỆ BẢN QUYỀN
        const Watermark = ({ text }) => {
            if (!text) return null;
            return (
                <div className="fixed inset-0 z-[9999] pointer-events-none overflow-hidden flex flex-wrap gap-24 justify-center items-center opacity-[0.03] select-none" style={{ mixBlendMode: 'overlay' }}>
                    {Array.from({ length: 30 }).map((_, i) => (
                        <div key={i} className="transform -rotate-45 text-white font-black text-xl whitespace-nowrap">
                            {text} <br/> {new Date().toLocaleDateString('vi-VN')}
                        </div>
                    ))}
                </div>
            );
        };

        const ToastContext = createContext();

        const ToastProvider = ({ children }) => {
            const [toasts, setToasts] = useState([]);
            const addToast = (message, type = 'info') => {
                const id = Date.now();
                setToasts(prev => [...prev, { id, message, type }]);
                setTimeout(() => removeToast(id), 3000);
            };
            const removeToast = (id) => setToasts(prev => prev.filter(t => t.id !== id));
            return (
                <ToastContext.Provider value={{ addToast }}>
                    {children}
                    <div className="fixed top-4 right-4 z-[100] flex flex-col gap-2">
                        {toasts.map(toast => (
                            <div key={toast.id} className={`flex items-center gap-3 px-4 py-3 rounded-xl shadow-2xl backdrop-blur-md border animate-fade-in ${
                                toast.type === 'error' ? 'bg-red-500/10 border-red-500/50 text-red-400' : 
                                toast.type === 'success' ? 'bg-emerald-500/10 border-emerald-500/50 text-emerald-400' : 
                                'bg-slate-800/90 border-slate-600 text-white'
                            }`}>
                                {toast.type === 'error' ? <AlertTriangle size={18}/> : toast.type === 'success' ? <CheckCircle2 size={18}/> : <Info size={18}/>}
                                <span className="text-sm font-medium">{toast.message}</span>
                                <button onClick={() => removeToast(toast.id)}><X size={14} className="opacity-50 hover:opacity-100"/></button>
                            </div>
                        ))}
                    </div>
                </ToastContext.Provider>
            );
        };

        const useToast = () => useContext(ToastContext);

        const Confetti = () => (
            <div className="fixed inset-0 pointer-events-none z-50 overflow-hidden">
                {[...Array(13)].map((_, i) => (
                    <div key={i} className="confetti-piece" style={{backgroundColor: ['#f00', '#0f0', '#00f', '#ff0', '#f0f'][i%5]}}></div>
                ))}
            </div>
        );

        const PerformanceChart = ({ historyData }) => {
            if (!historyData || historyData.length === 0) return (
                <div className="h-40 flex items-center justify-center text-slate-500 text-sm italic">Chưa có dữ liệu thi</div>
            );
            const data = [...historyData].slice(0, 10).reverse();
            return (
                <div className="w-full h-48 mt-4 relative">
                      <div className="absolute inset-0 flex flex-col justify-between text-[10px] text-slate-500 font-bold">
                        <span>10</span><span>5</span><span>0</span>
                    </div>
                    <div className="absolute inset-0 ml-6 flex items-end gap-2">
                        {data.map((item, index) => {
                            const hPercent = (item.score / 10) * 100;
                            const colorClass = item.score >= 8 ? 'bg-emerald-500' : (item.score >= 5 ? 'bg-cyan-500' : 'bg-red-500');
                            return (
                                <div key={index} className="flex-1 flex flex-col justify-end group relative">
                                    <div className="absolute bottom-full mb-2 left-1/2 -translate-x-1/2 bg-slate-900 text-white text-[10px] py-1 px-2 rounded-lg border border-white/10 opacity-0 group-hover:opacity-100 transition-opacity whitespace-nowrap z-10 pointer-events-none shadow-2xl">
                                        {item.examTitle}<br/>Điểm: {item.score}
                                    </div>
                                    <div style={{ height: `${hPercent}%` }} className={`w-full rounded-t-md opacity-80 group-hover:opacity-100 transition-all ${colorClass} group-hover:shadow-[0_0_15px_rgba(6,182,212,0.3)]`}></div>
                                </div>
                            )
                        })}
                    </div>
                </div>
            )
        };

        const AuthScreen = ({ globalConfig }) => {
            const [isRegistering, setIsRegistering] = useState(false);
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [name, setName] = useState('');
            const [rememberMe, setRememberMe] = useState(true);
            const [loading, setLoading] = useState(false);
            const [showForgot, setShowForgot] = useState(false);
            const [resetEmail, setResetEmail] = useState('');
            const [isResetting, setIsResetting] = useState(false);
            const { addToast } = useToast();
            const DEFAULT_BG = "https://images.unsplash.com/photo-1576091160399-112ba8d25d1d?auto=format&fit=crop&q=80";
            const bgImage = globalConfig?.loginBg || DEFAULT_BG;
            const handleSubmit = async (e) => {
                e.preventDefault();
                setLoading(true);
                try {
                    const persistenceType = rememberMe ? browserLocalPersistence : browserSessionPersistence;
                    await setPersistence(auth, persistenceType);
                    if (isRegistering) {
                        const res = await createUserWithEmailAndPassword(auth, email, password);
                        await updateProfile(res.user, { displayName: name });
                        await syncUserProfile(res.user, name);
                        addToast("Đăng ký thành công!", "success");
                    } else {
                        const res = await signInWithEmailAndPassword(auth, email, password);
                        await syncUserProfile(res.user, res.user.displayName);
                        addToast("Đăng nhập thành công!", "success");
                    }
                } catch (err) { addToast(err.message, "error"); } finally { setLoading(false); }
            };
            const handleGoogle = async () => {
                try {
                    await setPersistence(auth, browserLocalPersistence); 
                    const res = await signInWithPopup(auth, new GoogleAuthProvider());
                    await syncUserProfile(res.user, res.user.displayName);
                    addToast("Đăng nhập Google thành công!", "success");
                } catch (err) { addToast(err.message, "error"); }
            };
            const handleResetPassword = async (e) => {
                e.preventDefault();
                if (!resetEmail) { addToast("Vui lòng nhập email.", "error"); return; }
                setIsResetting(true);
                try {
                    await sendPasswordResetEmail(auth, resetEmail);
                    addToast("Đã gửi email khôi phục!", "success");
                    setShowForgot(false);
                    setResetEmail('');
                } catch (err) { addToast(err.message, "error"); } finally { setIsResetting(false); }
            };
            return (
                <div className="min-h-screen flex items-center justify-center relative overflow-hidden" style={{
                    backgroundImage: `linear-gradient(rgba(15, 23, 42, 0.85), rgba(15, 23, 42, 0.95)), url('${bgImage}')`,
                    backgroundSize: 'cover', backgroundPosition: 'center'
                }}>
                    <div className="absolute top-0 -left-4 w-72 h-72 bg-purple-500 rounded-full mix-blend-multiply filter blur-xl opacity-20 animate-blob"></div>
                    <div className="absolute top-0 -right-4 w-72 h-72 bg-cyan-500 rounded-full mix-blend-multiply filter blur-xl opacity-20 animate-blob animation-delay-2000"></div>
                    <div className="w-full max-w-md bg-slate-900/60 border border-slate-700/50 p-8 rounded-[2.5rem] shadow-2xl animate-fade-in backdrop-blur-xl relative z-10 mx-4">
                        <div className="text-center mb-8">
                            <div className="w-16 h-16 bg-gradient-to-tr from-cyan-500 to-blue-600 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg shadow-cyan-500/30 transform rotate-3">
                                <Activity size={32} className="text-white"/>
                            </div>
                            <h1 className="text-3xl font-black text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-500">MedExam Pro</h1>
                            <p className="text-slate-400 text-sm mt-2">Nền tảng ôn thi y khoa hiện đại</p>
                        </div>
                        <form onSubmit={handleSubmit} className="space-y-4">
                            {isRegistering && <input className="w-full bg-slate-950/50 border border-slate-700 rounded-xl p-4 text-white outline-none focus:border-cyan-500" placeholder="Họ tên hiển thị" value={name} onChange={e=>setName(e.target.value)} required/>}
                            <input className="w-full bg-slate-950/50 border border-slate-700 rounded-xl p-4 text-white outline-none focus:border-cyan-500" placeholder="Email" type="email" value={email} onChange={e=>setEmail(e.target.value)} required/>
                            <div className="relative">
                                <input className="w-full bg-slate-950/50 border border-slate-700 rounded-xl p-4 text-white outline-none focus:border-cyan-500" placeholder="Mật khẩu" type="password" value={password} onChange={e=>setPassword(e.target.value)} required/>
                                {!isRegistering && <button type="button" onClick={() => setShowForgot(true)} className="absolute right-4 top-4 text-xs text-cyan-400 hover:underline">Quên?</button>}
                            </div>
                            <button disabled={loading} className="w-full bg-gradient-to-r from-cyan-600 to-blue-600 hover:from-cyan-500 hover:to-blue-500 py-4 rounded-xl font-black text-white transition-all shadow-lg active:scale-95">
                                {loading ? <Loader2 className="animate-spin mx-auto"/> : (isRegistering ? 'ĐĂNG KÝ' : 'ĐĂNG NHẬP')}
                            </button>
                        </form>
                        <div className="my-6 flex items-center gap-4"><div className="h-px bg-slate-700/50 flex-1"></div><span className="text-slate-500 text-xs font-bold">HOẶC</span><div className="h-px bg-slate-700/50 flex-1"></div></div>
                        <button onClick={handleGoogle} className="w-full bg-white text-slate-900 py-3.5 rounded-xl font-bold flex items-center justify-center gap-3 hover:bg-slate-100 transition-all active:scale-95">
                             <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" className="w-5 h-5"/> Tiếp tục với Google
                        </button>
                        <p className="mt-8 text-center text-sm text-slate-500">
                            {isRegistering ? 'Đã có tài khoản?' : 'Chưa có tài khoản?'} 
                            <button onClick={()=>setIsRegistering(!isRegistering)} className="text-cyan-400 ml-2 font-bold hover:underline">{isRegistering ? 'Đăng nhập' : 'Tạo tài khoản'}</button>
                        </p>
                    </div>
                </div>
            );
        };

        const LeaderboardPage = ({ user, onBack }) => {
            const [leaderboard, setLeaderboard] = useState([]);
            const [isLoading, setIsLoading] = useState(true);
            useEffect(() => {
                if (!user) return;
                const q = query(collection(db, 'artifacts', appId, 'public', 'data', 'users'), orderBy('totalScore', 'desc'), limit(20));
                return onSnapshot(q, (snapshot) => { setLeaderboard(snapshot.docs.map(doc => doc.data())); setIsLoading(false); });
            }, [user]);
            return (
                <div className="animate-fade-in pb-20 max-w-5xl mx-auto">
                    <button onClick={onBack} className="mb-6 nav-btn w-auto px-4 gap-2 text-sm font-bold"><ChevronRight className="rotate-180" size={16}/> Quay lại</button>
                    <div className="bg-slate-900/60 backdrop-blur-md rounded-3xl border border-white/10 overflow-hidden shadow-2xl">
                        <div className="p-8 border-b border-white/5 bg-gradient-to-r from-slate-900 to-slate-800 flex justify-between items-center">

                        <div className="text-8xl font-black text-white mb-10 tracking-tighter drop-shadow-xl">{result.score}</div>
                        <div className="grid grid-cols-2 gap-4 mb-10">
                            <div className="bg-white/5 p-4 rounded-3xl border border-white/5"><p className="text-[10px] text-slate-500 font-black mb-1">CÂU ĐÚNG</p><p className="text-2xl font-black text-emerald-400">{result.correctCount}/{result.total}</p></div>
                            <div className="bg-white/5 p-4 rounded-3xl border border-white/5"><p className="text-[10px] text-slate-500 font-black mb-1">KẾT QUẢ</p><p className={`text-2xl font-black ${Number(result.score)>=5?'text-cyan-400':'text-red-400'}`}>{Number(result.score)>=5?'ĐẠT':'HỎNG'}</p></div>
                        </div>
                        <div className="flex justify-center gap-2 mb-10">
                            {[1,2,3,4,5].map(s => <button key={s} onClick={()=>handleRate(s)}><Star size={32} fill={s <= rating ? "#fbbf24" : "none"} className={s <= rating ? "text-yellow-400" : "text-slate-700"}/></button>)}
                        </div>
                        <div className="space-y-4">
                            <button onClick={onReview} className="w-full bg-cyan-600 text-white py-4 rounded-2xl font-black shadow-lg shadow-cyan-500/20">XEM LẠI ĐÁP ÁN</button>
                            <button onClick={onBack} className="w-full bg-white/5 text-slate-400 py-4 rounded-2xl font-black hover:bg-white/10 transition-all uppercase text-xs tracking-widest">Về trang chủ</button>
                        </div>
                    </div>
                </div>
            );
        };

        const ExamInterface = ({ exam, onFinish, onExit }) => {
            const [timeLeft, setTimeLeft] = useState(exam.duration * 60);
            const [answers, setAnswers] = useState({});
            const [submitting, setSubmitting] = useState(false);
            const [isDrawerOpen, setIsDrawerOpen] = useState(false); 
            const [isTwoColumns, setIsTwoColumns] = useState(false); 
            const questionRefs = useRef([]);
            const [flags, setFlags] = useState({}); 

            const [isDarkMode, setIsDarkMode] = useState(() => localStorage.getItem('theme') !== 'light');
            const [fontSizeLevel, setFontSizeLevel] = useState(1); 

            useEffect(() => {
                localStorage.setItem('theme', isDarkMode ? 'dark' : 'light');
                const timer = setInterval(() => setTimeLeft(t => t <= 1 ? (finish(true), 0) : t - 1), 1000);
                return () => clearInterval(timer);
            }, [isDarkMode]);

            useEffect(() => {
                if (exam.sessionId) {
                    const pingInterval = setInterval(async () => {
                        try {
                            await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'active_exams', exam.sessionId), {
                                lastPing: serverTimestamp()
                            });
                        } catch (e) { console.log("Ping error", e); }
                    }, 30000); 
                    return () => clearInterval(pingInterval);
                }
            }, [exam.sessionId]); 

            const finish = async (forceSubmit = false) => {
                if(submitting) return;
                const user = auth.currentUser;
                if (!user) return;
                const unansweredCount = exam.questions.length - Object.keys(answers).length;
                if (!forceSubmit) {
                    if (unansweredCount > 0) { if (!confirm(`⚠️ Bạn còn ${unansweredCount} câu hỏi chưa làm. Nộp bài ngay?`)) return; }
                    else { if (!confirm(`Xác nhận nộp bài thi?`)) return; }
                }
                setSubmitting(true);
                let correct = 0;
                exam.questions.forEach((q, i) => { if(answers[i] === q.correctOption) correct++; });
                const score = (correct / exam.questions.length) * 10;
                if (exam.sessionId) { try { await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'active_exams', exam.sessionId)); } catch (e) {} }
                try {
                    await addDoc(collection(db, 'artifacts', appId, 'users', user.uid, 'history'), {
                        examId: exam.id, examTitle: exam.title, score: score.toFixed(1), totalQuestions: exam.questions.length, correctCount: correct, date: serverTimestamp(), userId: user.uid, displayName: user.displayName || 'User'
                    });
                    const userRef = doc(db, 'artifacts', appId, 'public', 'data', 'users', user.uid);
                    updateDoc(userRef, { totalScore: increment(Number(score)), examsCompleted: increment(1), lastActive: serverTimestamp() }).catch(console.error);
                } catch(e) { console.error("Save error", e); }
                onFinish({ score: score.toFixed(1), correctCount: correct, total: exam.questions.length, examTitle: exam.title, questions: exam.questions, userAnswers: answers, examId: exam.id });
            };

            const scrollToQuestion = (index) => {
                questionRefs.current[index]?.scrollIntoView({ behavior: 'smooth', block: 'center' });
                setIsDrawerOpen(false);
            };

            const toggleFlag = (index) => {
                setFlags(prev => ({ ...prev, [index]: !prev[index] }));
            };

            const fontSizes = [{ q: 'text-base', o: 'text-sm' }, { q: 'text-lg', o: 'text-base' }, { q: 'text-xl', o: 'text-lg' }, { q: 'text-2xl', o: 'text-xl' }];
            const currentFont = fontSizes[fontSizeLevel];
            const progressPercent = Math.round((Object.keys(answers).length / exam.questions.length) * 100);

            return (
                <div className={`fixed inset-0 z-50 flex flex-col md:flex-row h-screen overflow-hidden ${isDarkMode ? 'bg-slate-950 text-slate-200' : 'bg-gray-50 text-gray-800'}`}>
                    <div className="absolute top-0 left-0 w-full h-1 z-[60] bg-gray-200 dark:bg-slate-800">
                         <div className="h-full bg-cyan-500 transition-all duration-300" style={{width: `${progressPercent}%`}}></div>
                    </div>
                    <div className="flex-1 flex flex-col h-full relative">
                        <div className={`${headerClass} p-4 grid grid-cols-2 md:grid-cols-3 items-center z-10 shrink-0 shadow-lg`}>
                            
                            {/* LEFT SIDE */}
                            <div className="flex items-center gap-4 justify-start">
                                <button onClick={() => confirm("Thoát và không lưu kết quả?") && onExit()} className="nav-btn w-10 shrink-0"><LogOut size={20} className="rotate-180"/></button>
                                <div className="hidden md:block">
                                    <div className={`text-xs flex items-center gap-2 mt-0.5 ${isDarkMode ? 'text-slate-400' : 'text-gray-500'}`}>
                                        <span className="hidden lg:inline">Đã làm: {Object.keys(answers).length}/{exam.questions.length}</span>
                                        <span className={`px-2 py-0.5 rounded font-bold ${isDarkMode ? 'bg-slate-800 text-cyan-400' : 'bg-gray-200 text-cyan-700'}`}>{progressPercent}%</span>
                                    </div>
                                </div>
                                <h2 className="md:hidden font-bold text-lg line-clamp-1 truncate">{exam.title}</h2>
                            </div>
                            
                            {/* CENTER TITLE */}
                            <div className="hidden md:flex justify-center">
                                <h2 className="text-2xl font-black uppercase tracking-wider text-cyan-400 drop-shadow-md whitespace-nowrap text-glow transform hover:scale-105 transition-transform cursor-default">
                                    {exam.title}
                                </h2>
                            </div>

                            {/* RIGHT SIDE */}
                            <div className="flex items-center gap-3 justify-end">
                                <button onClick={()=>setIsTwoColumns(!isTwoColumns)} className={`hidden md:block p-2 rounded-lg border transition-all ${isTwoColumns ? 'bg-cyan-600 text-white border-cyan-600' : (isDarkMode ? 'bg-slate-800 border-slate-700 hover:text-cyan-400' : 'bg-gray-100 border-gray-200 text-gray-600 hover:text-cyan-600')}`} title={isTwoColumns ? "Chế độ 1 cột" : "Chế độ 2 cột"}>
                                    {isTwoColumns ? <Rows size={20} /> : <Columns size={20} />}
                                </button>
                                <button onClick={()=>setIsDrawerOpen(!isDrawerOpen)} className="md:hidden nav-btn w-10"><Grid size={20}/></button>

                                <div className={`hidden md:flex items-center rounded-lg border p-1 ${isDarkMode ? 'bg-slate-800 border-slate-700' : 'bg-gray-100 border-gray-200'}`}>
                                    <button onClick={() => setFontSizeLevel(prev => Math.max(0, prev - 1))} disabled={fontSizeLevel === 0} className={`p-1.5 rounded transition-colors ${isDarkMode ? 'hover:bg-slate-700 disabled:opacity-30' : 'hover:bg-white disabled:opacity-30'}`}><Type size={14} /></button>
                                    <span className="text-xs font-mono w-6 text-center">{fontSizeLevel + 1}</span>
                                    <button onClick={() => setFontSizeLevel(prev => Math.min(3, prev + 1))} disabled={fontSizeLevel === 3} className={`p-1.5 rounded transition-colors ${isDarkMode ? 'hover:bg-slate-700 disabled:opacity-30' : 'hover:bg-white disabled:opacity-30'}`}><Type size={18} /></button>
                                </div>

                                <button onClick={() => setIsDarkMode(!isDarkMode)} className={`hidden md:block p-2 rounded-lg border transition-all ${isDarkMode ? 'bg-slate-800 border-slate-700 hover:text-yellow-400' : 'bg-gray-100 border-gray-200 text-gray-600 hover:text-orange-500 hover:bg-white'}`}>
                                    {isDarkMode ? <Moon size={20} /> : <Sun size={20} />}
                                </button>

                                <div className={`font-mono text-xl font-black px-4 py-1.5 rounded-xl border shadow-inner transition-all duration-300 ${
                                    timeLeft <= 300 
                                    ? 'text-red-500 border-red-500 bg-red-500/10 animate-flash shadow-[0_0_10px_rgba(239,68,68,0.4)]' 
                                    : (isDarkMode ? 'text-cyan-400 bg-slate-800 border-white/5' : 'text-cyan-600 bg-white border-gray-200')
                                }`}>
                                    {Math.floor(timeLeft/60)}:{timeLeft%60 < 10 ? '0'+timeLeft%60 : timeLeft%60}
                                </div>
                            </div>
                        </div>
                        <div className="flex-1 overflow-y-auto p-4 md:p-8 scroll-smooth">
                            <div className={`${isTwoColumns ? 'max-w-[1600px] grid grid-cols-1 lg:grid-cols-2 gap-6' : 'max-w-4xl space-y-6'} mx-auto pb-24 transition-all duration-300`}>
                                {exam.questions.map((q, index) => (
                                    <div key={index} ref={el => questionRefs.current[index] = el} className={`p-6 rounded-[2rem] border transition-all ${isDarkMode ? 'bg-slate-900 border-white/5' : 'bg-white border-gray-200'} ${answers[index] !== undefined ? 'ring-2 ring-cyan-500/20' : ''}`}>
                                        <div className="flex gap-4 mb-6 relative">
                                            <span className="shrink-0 w-8 h-8 rounded-full bg-cyan-600 text-white flex items-center justify-center font-black text-sm">{index + 1}</span>
                                            <div className="flex-1">
                                                <div className={`${currentFont.q} font-bold leading-relaxed mb-3`}>{q.text}</div>
                                                {q.image && (
                                                    <div className="mb-4 flex justify-center">
                                                        <img 
                                                            src={q.image} 
                                                            alt="Hình minh họa" 
                                                            className="max-h-80 max-w-full rounded-xl border border-slate-700/50 object-contain shadow-lg"
                                                            onError={(e) => e.target.style.display = 'none'} 
                                                        />
                                                    </div>
                                                )}
                                            </div>
                                            <button onClick={() => setFlags({...flags, [index]: !flags[index]})} className={`absolute -right-2 -top-2 p-2 rounded-full ${flags[index] ? 'text-yellow-400 bg-yellow-500/10' : 'text-slate-600 hover:text-yellow-400'}`}><Flag size={20} fill={flags[index] ? "currentColor" : "none"} /></button>
                                        </div>
                                        <div className="space-y-3">
                                            {q.options.map((o, optIdx) => (
                                                <label key={optIdx} className={`flex items-center p-4 rounded-2xl border-2 cursor-pointer transition-all ${answers[index] === optIdx ? 'border-cyan-500 bg-cyan-500/10' : (isDarkMode ? 'border-white/5 hover:border-white/20' : 'border-gray-100 hover:border-gray-200')}`}>
                                                    <div className={`w-5 h-5 rounded-full border-2 mr-4 flex items-center justify-center ${answers[index] === optIdx ? 'border-cyan-500' : 'border-slate-600'}`}>
                                                        {answers[index] === optIdx && <div className="w-2.5 h-2.5 rounded-full bg-cyan-500"></div>}
                                                    </div>
                                                    <span className={currentFont.o}>{o}</span>
                                                    <input type="radio" className="hidden" checked={answers[index] === optIdx} onChange={() => setAnswers({...answers, [index]: optIdx})} />
                                                </label>
                                            ))}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                        <div className="p-4 border-t border-white/5 bg-slate-900/80 backdrop-blur md:hidden">
                            <button onClick={() => finish(false)} disabled={submitting} className="w-full bg-emerald-600 py-4 rounded-2xl font-black text-white shadow-lg active:scale-95 disabled:opacity-50">NỘP BÀI THI</button>
                        </div>
                    </div>
                    <div className="hidden md:flex w-80 border-l border-white/5 flex-col shrink-0 bg-slate-900/50 backdrop-blur">
                        <div className="p-6 border-b border-white/5"><h3 className="font-black text-sm uppercase tracking-widest text-slate-500">Danh sách câu hỏi</h3></div>
                        <div className="flex-1 overflow-y-auto p-4 custom-scrollbar">
                            <div className="grid grid-cols-5 gap-2">
                                {exam.questions.map((_, i) => (
                                    <button key={i} onClick={() => scrollToQuestion(i)} className={`aspect-square rounded-xl text-xs font-black flex items-center justify-center transition-all relative ${answers[i] !== undefined ? 'bg-cyan-600 text-white' : 'bg-white/5 text-slate-500 hover:bg-white/10 border border-white/5'}`}>
                                        {i + 1}{flags[i] && <div className="absolute -top-1 -right-1 w-2.5 h-2.5 bg-yellow-400 rounded-full border-2 border-slate-900"></div>}
                                    </button>
                                ))}
                            </div>
                        </div>
                        <div className="p-6 border-t border-white/5">
                            <button onClick={() => finish(false)} disabled={submitting} className="w-full bg-emerald-600 py-4 rounded-2xl font-black text-white shadow-lg shadow-emerald-500/20 active:scale-95 disabled:opacity-50 flex items-center justify-center gap-2">
                                {submitting ? <Loader2 className="animate-spin" /> : <CheckCircle2 size={20}/>} NỘP BÀI
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        const ResultScreenWrapper = ({ result, onBack, onReview }) => <ResultScreen result={result} onBack={onBack} onReview={onReview} />;

        function App() {
            const [user, setUser] = useState(null);
            const [profile, setProfile] = useState(null);
            const [view, setView] = useState('loading');
            const [activeExam, setActiveExam] = useState(null);
            const [lastResult, setLastResult] = useState(null);
            const [showPay, setShowPay] = useState(false);
            const [globalConfig, setGlobalConfig] = useState({});
            const [isPendingVip, setIsPendingVip] = useState(false);
            const [notifications, setNotifications] = useState([]);
            const [hasNewNoti, setHasNewNoti] = useState(false);

            useEffect(() => {
                const configPath = doc(db, 'artifacts', appId, 'public', 'data', 'system_settings', 'config');
                const unsubscribe = onSnapshot(configPath, (s) => {
                    if (s.exists()) setGlobalConfig(s.data());
                }, (error) => console.warn("Config load failed", error));
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                return onAuthStateChanged(auth, u => {
                    // CHẶN KHÁCH: Nếu phát hiện là tài khoản ẩn danh thì đăng xuất ngay
                    if (u && u.isAnonymous) {
                        signOut(auth);
                        return;
                    }

                    setUser(u);
                    if (u) {
                        setView('dashboard');
                        
                        const unsubConfig = onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'system_settings', 'config'), 
                            s => s.exists() && setGlobalConfig(s.data()),
                            e => console.log("Config permission pending")
                        );
                        
                        const unsubProfile = onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'users', u.uid), d => d.exists() && setProfile(d.data()));
                        
                        const qPending = query(collection(db, 'artifacts', appId, 'public', 'data', 'paymentRequests'), where('uid', '==', u.uid), where('status', '==', 'pending'), limit(1));
                        const unsubPending = onSnapshot(qPending, s => setIsPendingVip(!s.empty));
                        
                        const unsubNoti = onSnapshot(query(collection(db, 'artifacts', appId, 'public', 'data', 'notifications'), orderBy('createdAt', 'desc'), limit(5)), s => {
                            const data = s.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                            setNotifications(data);
                            if (data.length > 0) setHasNewNoti(localStorage.getItem('seen_id') !== data[0].id);
                        });

                        return () => {
                            unsubConfig();
                            unsubProfile();
                            unsubPending();
                            unsubNoti();
                        };
                    } else {
                        setView('auth');
                        setGlobalConfig({});
                    }
                });
            }, []);

            const startExam = async (exam) => { 
                if (confirm(`Bắt đầu thi: ${exam.title}?`)) { 
                    const sessionRef = await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'active_exams'), { uid: user.uid, examId: exam.id, startedAt: serverTimestamp() });
                    setActiveExam({ ...exam, sessionId: sessionRef.id }); setView('exam'); 
                } 
            };

            const renderContent = () => {
                if (view === 'loading') return <div className="min-h-screen bg-[#0b1120] flex items-center justify-center text-cyan-500"><Loader2 className="animate-spin" size={48}/></div>;
                if (view === 'auth') return <AuthScreen globalConfig={globalConfig} />;
                if (view === 'exam' && activeExam) return <ExamInterface exam={activeExam} onExit={() => { setActiveExam(null); setView('dashboard'); }} onFinish={r => { setLastResult(r); setActiveExam(null); setView('result'); }} />;
                if (view === 'review' && lastResult) return <ReviewExam result={lastResult} onBack={() => { setLastResult(null); setView('dashboard'); }} />;
                if (view === 'result' && lastResult) return <ResultScreenWrapper result={lastResult} onBack={() => setView('dashboard')} onReview={() => setView('review')} />;

                return (
                    <div className="min-h-screen bg-[#0b1120] font-sans text-slate-200" onClick={() => setShowNotiDropdown(false)}>
                        {/* Chỉ hiện Watermark khi đã đăng nhập */}
                        {user && <Watermark text={user.email || user.uid} />}
                        
                        <nav className="glass sticky top-0 z-[50]">
                            <div className="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
                                <button onClick={()=>setView('dashboard')} className="flex items-center gap-3 group transition-transform active:scale-95">
                                    <div className="bg-gradient-to-tr from-cyan-500 to-blue-600 p-2.5 rounded-xl group-hover:rotate-6 transition-all duration-300 shadow-lg shadow-cyan-500/20"><Activity size={22} className="text-white"/></div>
                                    <span className="font-black text-2xl bg-clip-text text-transparent bg-gradient-to-r from-cyan-400 to-blue-400 tracking-tighter">MedExam Pro</span>
                                </button>
                                
                                <div className="flex items-center gap-3">
                                    <button className="nav-btn w-10 relative"><Bell size={20} />{hasNewNoti && <span className="absolute top-2 right-2 w-2 h-2 bg-red-500 rounded-full border-2 border-slate-900 animate-pulse"></span>}</button>
                                    <button onClick={()=>setView('leaderboard')} className="nav-btn w-auto px-4 gap-2 font-black text-[10px] tracking-widest"><Trophy size={16} className="text-yellow-500"/> BXH</button>
                                    <div className="h-6 w-px bg-white/10 mx-1"></div>
                                    {profile?.isPremium ? (
                                        <div className="flex items-center gap-2 bg-amber-500/10 px-4 py-1.5 rounded-xl border border-amber-500/30">
                                            <Crown size={14} className="text-amber-500 fill-amber-500"/>
                                            <span className="text-amber-400 font-black text-[10px] tracking-widest">PREMIUM</span>
                                        </div>
                                    ) : (
                                        <button onClick={()=>setShowPay(true)} className={`nav-btn w-auto px-4 gap-2 font-black text-[10px] tracking-widest ${isPendingVip ? 'bg-amber-500/10 text-amber-500' : 'bg-amber-500/20 text-amber-400 border-amber-500/30 animate-pulse-gold'}`}>
                                            {isPendingVip ? <><Hourglass size={14}/> CHỜ DUYỆT</> : <><Crown size={14}/> LÊN VIP</>}
                                        </button>
                                    )}
                                    <button onClick={()=>setView('profile')} className="nav-btn w-10 !p-0 ml-1 overflow-hidden ring-2 ring-transparent hover:ring-cyan-500/50"><UserAvatar user={user} profile={profile} className="w-full h-full" /></button>
                                    <button onClick={()=>setView('history')} className="nav-btn w-10" title="Lịch sử"><History size={20}/></button>
                                    <button onClick={()=>signOut(auth)} className="nav-btn w-10 hover:!text-red-400 hover:!bg-red-400/10" title="Đăng xuất"><LogOut size={20}/></button>
                                </div>
                            </div>
                        </nav>
                        <div className="max-w-7xl mx-auto px-6 py-10">
                            {view === 'history' ? <HistoryPage user={user} onBack={()=>setView('dashboard')}/> : 
                             view === 'profile' ? <ProfilePage user={user} profile={profile} onBack={()=>setView('dashboard')} /> :
                             view === 'leaderboard' ? <LeaderboardPage user={user} onBack={()=>setView('dashboard')} /> :
                             <Dashboard user={user} profile={profile} onStartExam={startExam} onUpgrade={()=>setShowPay(true)} onViewHistory={()=>setView('history')} isPendingVip={isPendingVip} />}
                        </div>
                        {showPay && <PaymentModal onClose={()=>setShowPay(false)} user={user} isPending={isPendingVip}/>}
                    </div>
                );
            };

            return <ToastProvider>{renderContent()}</ToastProvider>;
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
