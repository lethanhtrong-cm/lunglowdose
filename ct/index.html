                ],
                content: `<h2 id="s229-daicuong">I. ĐẠI CƯƠNG</h2><p>Chụp cắt lớp vi tính động mạch chi trên bao gồm các lớp cắt ngang từ ngang mức quai động mạch chủ đến ngọn chi, sau đó dùng các phần mềm chuyên dụng xử lý dữ liệu, tái tạo ảnh hệ động mạch chi trên theo các hướng. Kỹ thuật này thường được chỉ định cho các máy CLVT đa dãy (tốt nhất từ 64 dãy trở lên) do yêu cầu tốc độ chụp nhanh.</p><h2 id="s229-chidinh">II. CHỈ ĐỊNH</h2><ul><li>Hẹp tắc động mạch cấp và mạn tính.</li><li>Phình mạch, dị dạng mạch.</li><li>Kiểm tra sau đặt stent động mạch.</li><li>Đánh giá giải phẫu bình thường và bất thường hệ động mạch chi trên.</li></ul><h2 id="s229-chongchidinh">III. CHỐNG CHỈ ĐỊNH</h2><p>Không có chống chỉ định tuyệt đối.</p><h2 id="s229-thantrong">IV. THẬN TRỌNG</h2><ul><li>Phụ nữ có thai.</li><li>Trẻ nhỏ.</li><li>Thận trọng với các trường hợp tiền sử dị ứng thuốc cản quang, hen phế quản, suy gan, suy thận.</li></ul><h2 id="s229-chuanbi">V. CHUẨN BỊ</h2><h3>1. Người thực hiện và trang thiết bị</h3><ul><li>Bác sỹ chẩn đoán hình ảnh, Kỹ thuật viên, Điều dưỡng.</li><li>Máy CLVT đa lát cắt (từ 64 lát trở lên), máy bơm điện, hệ thống PACS.</li></ul><h3>2. Người bệnh</h3><ul><li>Giải thích kỹ, ký cam kết.</li><li>Nhịn ăn, uống trước 4 giờ.</li></ul><h2 id="s229-cacbuoctienhanh">VI. CÁC BƯỚC TIẾN HÀNH</h2><ul><li><strong>Bước 1:</strong> Thiết lập thông số máy, đặt kim luồn tĩnh mạch ở chi đối diện.</li><li><strong>Bước 2:</strong> Đặt tư thế người bệnh nằm ngửa. Tùy thuộc vào mục đích khảo sát, tay có thể giơ lên cao hoặc để xuôi theo thân mình.</li><li><strong>Bước 3:</strong> Chụp định vị và chụp trước tiêm để xác định vị trí đặt ROI cho Bolus Timing.</li><li><strong>Bước 4:</strong> Tiêm thuốc cản quang và chụp sau tiêm, bắt đầu từ quai động mạch chủ đến hết ngón tay.</li><li><strong>Bước 5:</strong> Tái tạo và dựng ảnh. Dùng các phần mềm chuyên dụng (MIP, VR…) để tái tạo ảnh hệ động mạch chi trên.</li><li><strong>Bước 6:</strong> Chuyển hình ảnh sang PACS.</li><li><strong>Bước 7:</strong> Theo dõi người bệnh sau chụp.</li></ul><h3>Nhận định kết quả</h3><p>Hình ảnh thấy được các cấu trúc giải phẫu mạch máu trong vùng thăm khám và phát hiện được tổn thương nếu có.</p><h2 id="s229-theodoi">VII. THEO DÕI VÀ XỬ TRÍ TAI BIẾN</h2><p>Tai biến liên quan đến thuốc cản quang cần được theo dõi và xử trí theo quy trình. Có thể phải chụp lại nếu người bệnh cử động.</p><h2 id="s229-tailieu">TÀI LIỆU THAM KHẢO</h2><ol><li>Reddinger, Handbook of CT Technique (Computed Tomography Series), WileyBlackwell, 2000.</li><li>Sumeet Bhargava, Satish K Bhargava, CT and MRI Protocol - A Practical Approach, Third Edition, Peepee, 2016.</li></ol>`

g>Bước 6:</strong> Chuyển hình ảnh sang PACS.</li><li><strong>Bước 7:</strong> Theo dõi người bệnh sau chụp.</li></ul><h3>Nhận định kết quả</h3><p>Hình ảnh thấy được các cấu trúc giải phẫu mạch máu trong vùng thăm khám và phát hiện được tổn thương nếu có.</p><h2 id="s230-theodoi">VII. THEO DÕI VÀ XỬ TRÍ TAI BIẾN</h2><p>Tai biến liên quan đến thuốc cản quang cần được theo dõi và xử trí theo quy trình. Có thể phải chụp lại nếu người bệnh cử động.</p><h2 id="s230-tailieu">TÀI LIỆU THAM KHẢO</h2><ol><li>Reddinger, Handbook of CT Technique (Computed Tomography Series), WileyBlackwell, 2000.</li><li>Sumeet Bhargava, Satish K Bhargava, CT and MRI Protocol - A Practical Approach, Third Edition, Peepee, 2016.</li></ol>`

        document.addEventListener('DOMContentLoaded', function() {
            populateMenu();
        });

        // To keep track of the currently active link
        let currentActiveLink = null;

        function populateMenu() {
            const menuList = document.getElementById('menu-list');
            menuList.innerHTML = ''; // Clear existing items

            // Group techniques by category
            const groupedByCategory = techniquesData.reduce((acc, tech) => {
                acc[tech.category] = acc[tech.category] || [];
                acc[tech.category].push(tech);
                return acc;
            }, {});

            // Define the desired category order
            const categoryOrder = [
                "Sọ não & Đầu mặt cổ",
                "Lồng ngực",
                "Bụng - Tiểu khung",
                "Mạch máu",
                "Cột sống & Cơ xương khớp",
                "Tầm soát Toàn thân"
            ];

            // Create menu items for each category in the defined order
            categoryOrder.forEach(category => {
                if (groupedByCategory[category]) { // Check if the category exists in the data
                    const categoryHeader = document.createElement('div');
                    categoryHeader.className = 'category-header';
                    categoryHeader.textContent = category;
                    menuList.appendChild(categoryHeader);

                    groupedByCategory[category].forEach(tech => {
                        const link = document.createElement('a');
                        link.href = '#';
                        link.id = `menu-item-${tech.id}`; // Add an ID for easy selection
                        link.className = 'menu-link';
                        link.innerHTML = `<span class="procedure-number">${tech.procedure}:</span><span class="procedure-title">${tech.title}</span>`;
                        link.setAttribute('data-id', tech.id);
                        link.setAttribute('data-title', tech.title.toLowerCase());
                        link.setAttribute('data-procedure', tech.procedure.toLowerCase());
                        link.onclick = (e) => {
                            e.preventDefault();
                            displayContent(tech.id);
                        };
                        menuList.appendChild(link);
                    });
                }
            });
        }

        function displayContent(techniqueId) {
            const contentCard = document.getElementById('content-card');
            const contentDisplay = document.getElementById('content-display');
            const technique = techniquesData.find(t => t.id === techniqueId);

            if (technique) {
                // Handle active link highlighting
                if (currentActiveLink) {
                    currentActiveLink.classList.remove('active');
                }
                const newActiveLink = document.getElementById(`menu-item-${techniqueId}`);
                if (newActiveLink) {
                    newActiveLink.classList.add('active');
                    currentActiveLink = newActiveLink;
                }

                // Create a fade-out effect
                contentCard.style.opacity = '0';

                setTimeout(() => {
                    // Update content (without the old ToC)
                    contentDisplay.innerHTML = `
                        <h1 class="text-3xl font-extrabold color-blue-700 mb-2">${technique.title}</h1>
                        <p class="text-sm text-gray-500 mb-6">${technique.procedure}</p>
                        ${technique.content}
                    `;

                    // Scroll to top of content and fade in
                    document.getElementById('content-container').scrollTop = 0;
                    contentCard.style.opacity = '1';
                }, 150); // Match this delay with transition duration
            } else {
                contentDisplay.innerHTML = '<h1 class="text-3xl font-extrabold color-blue-700">Lỗi</h1><p>Không tìm thấy nội dung cho quy trình này.</p>';
            }
        }

        function filterMenu() {
            const input = document.getElementById('search-input');
            const filter = input.value.toLowerCase().trim();
            const menuList = document.getElementById('menu-list');
            const items = menuList.getElementsByTagName('a');
            const headers = menuList.getElementsByClassName('category-header');

            // Filter individual technique links
            for (let i = 0; i < items.length; i++) {
                const title = items[i].getAttribute('data-title');
                const procedureNumber = items[i].getAttribute('data-id');
                if (title.includes(filter) || procedureNumber.includes(filter)) {
                    items[i].style.display = "";
                } else {
                    items[i].style.display = "none";
                }
            }

            // Show/hide category headers based on visible children
            for (let i = 0; i < headers.length; i++) {
                let nextElement = headers[i].nextElementSibling;
                let hasVisibleItems = false;
                while (nextElement && !nextElement.classList.contains('category-header')) {
                    if (nextElement.tagName === 'A' && nextElement.style.display !== 'none') {
                        hasVisibleItems = true;
                        break;
                    }
                    nextElement = nextElement.nextElementSibling;
                }
                if (hasVisibleItems) {
                    headers[i].style.display = "";
                } else {
                    headers[i].style.display = "none";
                }
            }
        }
        
        // Add smooth scrolling for anchor links within the content
        document.getElementById('content-display').addEventListener('click', function (e) {
            // Check if the clicked element is an anchor tag with an href starting with '#'
            if (e.target.tagName === 'A' && e.target.getAttribute('href').startsWith('#')) {
                e.preventDefault();
                const targetId = e.target.getAttribute('href');
                const targetElement = document.querySelector(targetId);
                if (targetElement) {
                    targetElement.scrollIntoView({ behavior: 'smooth', block: 'start' });
                }
            }
        });

    </script>
