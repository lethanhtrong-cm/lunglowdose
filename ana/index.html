<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedExam Analytics - Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0",
            "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
            "lucide-react": "https://esm.sh/lucide-react@0.344.0?deps=react@18.2.0",
            "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
            "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js",
            "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js"
        }
    }
    </script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['"Plus Jakarta Sans"', 'sans-serif'] },
                    colors: {
                        dark: {
                            bg: '#0B0F19', 
                            sidebar: '#111827',
                            card: '#1F2937',
                            hover: '#374151'
                        }
                    },
                    boxShadow: {
                        'glow-cyan': '0 0 20px -5px rgba(6, 182, 212, 0.5)',
                        'glow-purple': '0 0 20px -5px rgba(139, 92, 246, 0.5)',
                        'glow-yellow': '0 0 20px -5px rgba(234, 179, 8, 0.5)',
                        'glow-sky': '0 0 20px -5px rgba(14, 165, 233, 0.5)',
                        'card-depth': '0 10px 30px -10px rgba(0, 0, 0, 0.5)',
                    }
                }
            }
        }
    </script>
    <style>
        body { 
            background-color: #0B0F19; 
            color: #e2e8f0; 
            background-image: 
                radial-gradient(at 0% 0%, rgba(6, 182, 212, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(139, 92, 246, 0.15) 0px, transparent 50%);
            background-attachment: fixed;
        }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #374151; border-radius: 99px; }
        ::-webkit-scrollbar-thumb:hover { background: #4B5563; }
        
        .modern-card {
            background: rgba(31, 41, 55, 0.6);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .modern-card:hover {
            border-color: rgba(255, 255, 255, 0.15);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.2), 0 10px 10px -5px rgba(0, 0, 0, 0.1);
            transform: translateY(-2px);
        }
        
        .sidebar-item {
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
        }
        .sidebar-item::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 4px;
            background: linear-gradient(to bottom, #06b6d4, #3b82f6);
            transform: scaleY(0);
            transition: transform 0.3s ease;
            border-radius: 0 4px 4px 0;
        }
        .sidebar-item.active {
            background: linear-gradient(90deg, rgba(6, 182, 212, 0.1), transparent);
            color: white;
        }
        .sidebar-item.active::before {
            transform: scaleY(1);
        }
        
        .live-pulse {
            position: relative;
        }
        .live-pulse::after {
            content: '';
            position: absolute;
            top: -4px; right: -4px; bottom: -4px; left: -4px;
            border-radius: 50%;
            border: 2px solid #10b981;
            opacity: 0;
            animation: ripple 1.5s infinite;
        }
        @keyframes ripple {
            0% { transform: scale(0.8); opacity: 1; }
            100% { transform: scale(2); opacity: 0; }
        }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #4B5563; border-radius: 4px; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel" data-type="module" data-presets="react">
        import React, { useState, useEffect, useCallback } from 'react';
        import { createRoot } from 'react-dom/client';
        import { initializeApp } from 'firebase/app';
        import { getAuth, signInAnonymously, onAuthStateChanged, signOut, signInWithCustomToken } from 'firebase/auth';
        import { getFirestore, collection, query, onSnapshot, where, orderBy, limit, doc, getDoc, updateDoc, serverTimestamp, addDoc, deleteDoc, writeBatch } from 'firebase/firestore';
        import { 
            Activity, Users, FileText, Crown, AlertCircle, MessageSquare, 
            LayoutDashboard, Trophy, LogOut, Search, Clock, Zap, Timer, 
            LayoutGrid, Star, CheckCircle2, XCircle, Send, Reply, ChevronRight, Trash2,
            MoreHorizontal, Bell, Wifi, MessageCircle
        } from 'lucide-react';

        // --- FIREBASE CONFIG ---
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {
            apiKey: "AIzaSyDqdo_DJIWa5iqxiCgBq-0iGX7f9sr6soo",
            authDomain: "rt-examination.firebaseapp.com",
            projectId: "rt-examination",
            storageBucket: "rt-examination.firebasestorage.app",
            messagingSenderId: "920482699854",
            appId: "1:920482699854:web:44f9b0d735bdc001c6c11f",
            measurementId: "G-8N7RTTREQM"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'med-exam-pro-html';

        // --- HELPER COMPONENTS ---

        const ClockWidget = () => {
            const [time, setTime] = useState(new Date());
            useEffect(() => { const t = setInterval(() => setTime(new Date()), 1000); return () => clearInterval(t); }, []);
            return (
                <div className="flex items-center gap-3 bg-slate-900/80 border border-slate-700/50 rounded-xl px-5 py-2.5 shadow-lg backdrop-blur-md">
                    <div className="p-1.5 bg-cyan-500/10 rounded-lg text-cyan-400">
                        <Clock size={18} />
                    </div>
                    <div>
                        <p className="text-[10px] text-slate-400 font-bold uppercase tracking-wider leading-none mb-0.5">Thời gian thực</p>
                        <p className="text-sm font-mono font-bold text-white leading-none">{time.toLocaleTimeString('vi-VN')}</p>
                    </div>
                </div>
            );
        };

        const StatCard = ({ title, value, icon, colorClass, gradient }) => (
            <div className="modern-card p-6 rounded-3xl relative overflow-hidden group">
                <div className={`absolute top-0 right-0 w-32 h-32 bg-gradient-to-br ${gradient} opacity-10 rounded-full blur-2xl -mr-10 -mt-10 group-hover:opacity-20 transition-opacity`}></div>
                <div className="relative z-10 flex flex-col h-full justify-between">
                    <div className="flex justify-between items-start mb-4">
                        <div className={`p-3 rounded-2xl ${colorClass} bg-opacity-10 backdrop-blur-sm shadow-sm`}>
                            {icon}
                        </div>
                        <span className="text-xs font-bold text-slate-500 bg-slate-800/50 px-2 py-1 rounded-lg border border-white/5">Auto</span>
                    </div>
                    <div>
                        <h3 className="text-4xl font-extrabold text-white tracking-tight mb-1 group-hover:scale-105 transition-transform origin-left">{value}</h3>
                        <p className="text-slate-400 text-xs font-bold uppercase tracking-wider">{title}</p>
                    </div>
                </div>
            </div>
        );

        const LiveUserCard = ({ session }) => {
            const [elapsed, setElapsed] = useState(0);
            useEffect(() => {
                const start = session.startedAt?.toDate ? session.startedAt.toDate().getTime() : Date.now();
                const interval = setInterval(() => setElapsed(Math.floor((Date.now() - start) / 1000 / 60)), 1000);
                return () => clearInterval(interval);
            }, [session.startedAt]);

            return (
                <div className="modern-card p-5 rounded-3xl relative overflow-hidden group border-l-4 border-l-emerald-500">
                    <div className="flex justify-between items-start mb-4">
                        <div className="flex items-center gap-3">
                            <div className="w-12 h-12 rounded-2xl bg-gradient-to-br from-slate-700 to-slate-800 flex items-center justify-center text-white font-bold text-lg shadow-inner border border-white/10">
                                {session.displayName?.charAt(0).toUpperCase() || "U"}
                            </div>
                            <div>
                                <h4 className="font-bold text-white text-base line-clamp-1">{session.displayName}</h4>
                                <p className="text-[10px] text-slate-400 font-mono flex items-center gap-1"><span className="w-1.5 h-1.5 rounded-full bg-slate-500"></span> {session.uid?.substring(0, 6)}...</p>
                            </div>
                        </div>
                        <div className="flex items-center gap-1.5 px-2.5 py-1 rounded-full bg-emerald-500/10 border border-emerald-500/20 shadow-[0_0_10px_rgba(16,185,129,0.2)]">
                            <div className="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></div>
                            <span className="text-[10px] font-bold text-emerald-500 uppercase tracking-wide">Live</span>
                        </div>
                    </div>
                    <div className="bg-slate-900/50 rounded-xl p-3 border border-white/5">
                        <p className="text-[10px] text-slate-500 uppercase font-bold mb-1">Đang làm bài</p>
                        <p className="text-cyan-400 font-bold text-sm truncate">{session.examTitle}</p>
                    </div>
                    <div className="flex justify-between items-center mt-3 px-1">
                        <div className="flex items-center gap-1.5 text-slate-400 text-xs font-medium">
                            <Clock size={14} className="text-emerald-500"/>
                            <span>{elapsed} phút trước</span>
                        </div>
                        <div className="w-20 h-1 bg-slate-700 rounded-full overflow-hidden">
                            <div className="h-full bg-emerald-500 w-1/3 animate-pulse"></div>
                        </div>
                    </div>
                </div>
            );
        };

        // --- EXTRACTED RATING CARD TO FIX FOCUS ISSUE ---
        const RatingCard = ({ item, isLow, userMap, examMap, onDelete, onReply, replyText, setReplyText }) => {
            const userName = userMap[item.uid] || 'Unknown User';
            const examName = examMap[item.examId] || 'Unknown Exam';
            
            const templates = [
                "Cảm ơn bạn đã góp ý!",
                "Chúng tôi sẽ kiểm tra và khắc phục sớm.",
                "Rất vui vì bạn đã hài lòng với đề thi.",
                "Cảm ơn đánh giá của bạn, chúc bạn học tốt!",
                "Chúng tôi ghi nhận ý kiến đóng góp của bạn."
            ];

            return (
                <div className={`p-5 rounded-2xl border mb-4 relative group transition-all hover:translate-x-1 ${isLow ? 'bg-gradient-to-br from-red-900/10 to-transparent border-red-500/20 hover:border-red-500/40' : 'bg-gradient-to-br from-emerald-900/10 to-transparent border-emerald-500/20 hover:border-emerald-500/40'}`}>
                    <div className="absolute top-3 right-3 opacity-0 group-hover:opacity-100 transition-opacity">
                        <button onClick={() => onDelete(item.id)} className="p-2 bg-slate-800 hover:bg-red-500 text-slate-400 hover:text-white rounded-lg shadow-lg transition-colors">
                            <Trash2 size={14}/>
                        </button>
                    </div>
                    
                    <div className="flex justify-between items-start mb-3">
                        <div>
                            <div className="flex items-center gap-1 mb-1">
                                {[...Array(5)].map((_, i) => (
                                    <Star key={i} size={14} fill={i < item.rating ? (isLow ? "#ef4444" : "#10b981") : "none"} className={i < item.rating ? (isLow ? "text-red-500" : "text-emerald-500") : "text-slate-700"} />
                                ))}
                            </div>
                            <div className="flex items-center gap-2 text-xs">
                                <span className="font-bold text-white">{userName}</span>
                                <span className="text-slate-600">•</span>
                                <span className="text-slate-500 font-mono">{item.createdAt?.seconds ? new Date(item.createdAt.seconds * 1000).toLocaleDateString('vi-VN') : ''}</span>
                            </div>
                        </div>
                    </div>

                    <div className="bg-slate-900/50 p-3 rounded-xl border border-white/5 mb-3">
                        <p className="text-xs text-slate-500 font-bold uppercase mb-1">Đề thi:</p>
                        <p className="text-sm font-bold text-cyan-400 line-clamp-1">{examName}</p>
                    </div>

                    {item.feedback && <div className="text-sm text-slate-300 italic mb-4 pl-3 border-l-2 border-slate-700">"{item.feedback}"</div>}

                    <div className="space-y-2">
                        <div className="flex gap-2">
                            <input 
                                type="text" 
                                placeholder="Phản hồi người dùng..." 
                                className="flex-1 bg-slate-950/50 border border-slate-700 rounded-lg px-3 py-2 text-xs text-white focus:border-cyan-500 focus:ring-1 focus:ring-cyan-500 outline-none transition-all"
                                value={replyText[item.id] || ''}
                                onChange={e => setReplyText({...replyText, [item.id]: e.target.value})}
                            />
                            <button onClick={() => onReply(item.id, item.uid)} className="bg-cyan-600 hover:bg-cyan-500 text-white px-3 py-2 rounded-lg font-bold text-xs transition-all shadow-lg shadow-cyan-500/20 active:scale-95">
                                <Send size={14}/>
                            </button>
                        </div>
                        
                        {/* Quick Reply Templates */}
                        <div className="flex gap-2 overflow-x-auto pb-1 custom-scrollbar">
                            {templates.map((tpl, i) => (
                                <button 
                                    key={i}
                                    onClick={() => setReplyText({...replyText, [item.id]: tpl})}
                                    className="whitespace-nowrap px-2 py-1 rounded-md bg-slate-800 border border-slate-700 text-[10px] text-slate-400 hover:text-white hover:bg-slate-700 transition-colors flex items-center gap-1"
                                >
                                    <MessageCircle size={10}/> {tpl}
                                </button>
                            ))}
                        </div>
                    </div>
                </div>
            );
        };

        // --- SECTIONS ---

        const LeaderboardSection = () => {
            const [users, setUsers] = useState([]);
            useEffect(() => {
                const q = query(collection(db, 'artifacts', appId, 'public', 'data', 'users'), orderBy('totalScore', 'desc'), limit(20));
                return onSnapshot(q, snap => setUsers(snap.docs.map(d => d.data())));
            }, []);

            return (
                <div className="modern-card rounded-3xl overflow-hidden flex flex-col h-full">
                    <div className="p-6 border-b border-white/5 flex items-center justify-between bg-white/5 backdrop-blur-md">
                        <div className="flex items-center gap-4">
                            <div className="p-3 bg-yellow-500/20 rounded-2xl text-yellow-400 shadow-glow-yellow"><Trophy size={24} /></div>
                            <div>
                                <h3 className="text-xl font-bold text-white">Bảng Xếp Hạng</h3>
                                <p className="text-xs text-slate-400">Top 20 học viên xuất sắc nhất hệ thống</p>
                            </div>
                        </div>
                        <button className="px-4 py-2 bg-slate-800 hover:bg-slate-700 rounded-xl text-xs font-bold text-white transition-colors border border-white/5">Xuất Excel</button>
                    </div>
                    <div className="overflow-auto flex-1 custom-scrollbar p-2">
                        <table className="w-full text-left text-sm text-slate-400 border-separate border-spacing-y-2">
                            <thead className="text-xs uppercase font-bold text-slate-500 sticky top-0 bg-[#1F2937] z-10">
                                <tr><th className="px-4 py-3 text-center rounded-l-xl">Hạng</th><th className="px-4 py-3">Học viên</th><th className="px-4 py-3 text-center">Số đề</th><th className="px-4 py-3 text-right rounded-r-xl">Tổng điểm</th></tr>
                            </thead>
                            <tbody>
                                {users.map((u, i) => (
                                    <tr key={i} className="group hover:bg-white/5 transition-all duration-200">
                                        <td className="px-4 py-3 text-center font-bold rounded-l-xl border-l-4 border-transparent group-hover:border-cyan-500 bg-slate-800/30 group-hover:bg-slate-800/80">
                                            {i === 0 ? <span className="text-2xl">🥇</span> : i === 1 ? <span className="text-2xl">🥈</span> : i === 2 ? <span className="text-2xl">🥉</span> : <span className="text-slate-500 font-mono">#{i + 1}</span>}
                                        </td>
                                        <td className="px-4 py-3 bg-slate-800/30 group-hover:bg-slate-800/80">
                                            <div className="flex items-center gap-3">
                                                <div className="w-10 h-10 rounded-full bg-gradient-to-br from-slate-700 to-slate-900 flex items-center justify-center font-bold text-white border border-white/10 shadow-md group-hover:scale-110 transition-transform">{u.displayName?.charAt(0)}</div>
                                                <div>
                                                    <div className="font-bold text-slate-200 group-hover:text-cyan-400 transition-colors">{u.displayName}</div>
                                                    <div className="text-[10px] text-slate-500 font-mono">{u.email?.split('@')[0]}***</div>
                                                </div>
                                            </div>
                                        </td>
                                        <td className="px-4 py-3 text-center bg-slate-800/30 group-hover:bg-slate-800/80">
                                            <span className="px-2 py-1 rounded bg-slate-700/50 text-slate-300 font-mono text-xs">{u.examsCompleted || 0}</span>
                                        </td>
                                        <td className="px-4 py-3 text-right rounded-r-xl bg-slate-800/30 group-hover:bg-slate-800/80">
                                            <span className="text-lg font-black text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-500">{u.totalScore?.toFixed(1) || 0}</span>
                                        </td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        };

        const RatingsSection = ({ userMap, examMap }) => {
            const [highRatings, setHighRatings] = useState([]);
            const [lowRatings, setLowRatings] = useState([]);
            const [replyText, setReplyText] = useState({});

            useEffect(() => {
                const q = query(collection(db, 'artifacts', appId, 'public', 'data', 'exam_ratings'), orderBy('createdAt', 'desc'), limit(50));
                return onSnapshot(q, snap => {
                    const all = snap.docs.map(d => ({id: d.id, ...d.data()}));
                    setHighRatings(all.filter(r => r.rating >= 4));
                    setLowRatings(all.filter(r => r.rating <= 3));
                });
            }, []);

            const handleDeleteRating = async (id) => {
                if(confirm("Bạn có chắc muốn xóa đánh giá này không?")) {
                    try {
                        await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'exam_ratings', id));
                    } catch(e) { console.error(e); alert("Lỗi khi xóa"); }
                }
            };

            const handleDeleteAll = async (items) => {
                if(confirm(`Bạn có chắc chắn muốn xóa TOÀN BỘ ${items.length} đánh giá?`)) {
                    try {
                        const batch = writeBatch(db);
                        items.forEach(item => batch.delete(doc(db, 'artifacts', appId, 'public', 'data', 'exam_ratings', item.id)));
                        await batch.commit();
                    } catch(e) { alert("Lỗi: " + e.message); }
                }
            };

            const handleReplyRating = async (ratingId, userId) => {
                const text = replyText[ratingId];
                if (!text) return;
                try {
                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'notifications'), {
                        title: "Admin phản hồi đánh giá",
                        message: `Admin đã phản hồi: "${text}"`,
                        type: "system",
                        userId: userId,
                        createdAt: serverTimestamp()
                    });
                    setReplyText(prev => ({...prev, [ratingId]: ''}));
                    alert("Đã gửi phản hồi!");
                } catch (e) { alert("Lỗi gửi"); }
            };

            return (
                <div className="grid grid-cols-1 lg:grid-cols-2 gap-8 h-[calc(100vh-140px)]">
                    <div className="modern-card rounded-3xl p-6 flex flex-col h-full overflow-hidden">
                        <div className="flex items-center justify-between mb-6">
                            <div className="flex items-center gap-3">
                                <div className="p-2.5 rounded-xl bg-emerald-500/10 text-emerald-400 border border-emerald-500/20"><CheckCircle2 size={20}/></div>
                                <div>
                                    <h3 className="font-bold text-white text-lg">Tích cực</h3>
                                    <p className="text-xs text-slate-400">Đánh giá 4 - 5 sao</p>
                                </div>
                            </div>
                            <div className="flex items-center gap-2">
                                <span className="bg-emerald-500/20 text-emerald-400 text-xs font-bold px-2.5 py-1 rounded-lg border border-emerald-500/20">{highRatings.length}</span>
                                {highRatings.length > 0 && <button onClick={() => handleDeleteAll(highRatings)} className="p-2 hover:bg-red-500/10 hover:text-red-500 rounded-lg transition-colors text-slate-500" title="Xóa tất cả"><Trash2 size={16}/></button>}
                            </div>
                        </div>
                        <div className="flex-1 overflow-y-auto pr-2 custom-scrollbar">
                            {highRatings.map(r => (
                                <RatingCard 
                                    key={r.id} 
                                    item={r} 
                                    isLow={false} 
                                    userMap={userMap} 
                                    examMap={examMap} 
                                    onDelete={handleDeleteRating}
                                    onReply={handleReplyRating}
                                    replyText={replyText}
                                    setReplyText={setReplyText}
                                />
                            ))}
                        </div>
                    </div>
                    <div className="modern-card rounded-3xl p-6 flex flex-col h-full overflow-hidden">
                        <div className="flex items-center justify-between mb-6">
                            <div className="flex items-center gap-3">
                                <div className="p-2.5 rounded-xl bg-red-500/10 text-red-400 border border-red-500/20"><AlertCircle size={20}/></div>
                                <div>
                                    <h3 className="font-bold text-white text-lg">Cần cải thiện</h3>
                                    <p className="text-xs text-slate-400">Đánh giá ≤ 3 sao</p>
                                </div>
                            </div>
                            <div className="flex items-center gap-2">
                                <span className="bg-red-500/20 text-red-400 text-xs font-bold px-2.5 py-1 rounded-lg border border-red-500/20">{lowRatings.length}</span>
                                {lowRatings.length > 0 && <button onClick={() => handleDeleteAll(lowRatings)} className="p-2 hover:bg-red-500/10 hover:text-red-500 rounded-lg transition-colors text-slate-500" title="Xóa tất cả"><Trash2 size={16}/></button>}
                            </div>
                        </div>
                        <div className="flex-1 overflow-y-auto pr-2 custom-scrollbar">
                            {lowRatings.length === 0 ? <div className="h-40 flex items-center justify-center text-slate-600 italic">Chưa có đánh giá thấp nào!</div> : lowRatings.map(r => (
                                <RatingCard 
                                    key={r.id} 
                                    item={r} 
                                    isLow={true} 
                                    userMap={userMap} 
                                    examMap={examMap} 
                                    onDelete={handleDeleteRating}
                                    onReply={handleReplyRating}
                                    replyText={replyText}
                                    setReplyText={setReplyText}
                                />
                            ))}
                        </div>
                    </div>
                </div>
            );
        };

        const ReportsSection = ({ examMap }) => {
            const [reports, setReports] = useState([]);
            const [replyText, setReplyText] = useState({});
            
            useEffect(() => {
                const q = query(collection(db, 'artifacts', appId, 'public', 'data', 'reports'), orderBy('createdAt', 'desc'));
                return onSnapshot(q, snap => setReports(snap.docs.map(d => ({id: d.id, ...d.data()}))));
            }, []);

            const handleDeleteReport = async (id) => {
                if(confirm("Xóa báo cáo này?")) {
                    try { await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'reports', id)); } catch(e) { alert("Lỗi"); }
                }
            };

            const handleDeleteAllReports = async () => {
                if(confirm(`CẢNH BÁO: Xóa toàn bộ ${reports.length} báo cáo?`)) {
                    try {
                        const batch = writeBatch(db);
                        reports.forEach(item => batch.delete(doc(db, 'artifacts', appId, 'public', 'data', 'reports', item.id)));
                        await batch.commit();
                        alert("Đã xóa sạch!");
                    } catch(e) { alert("Lỗi: " + e.message); }
                }
            };

            const handleReply = async (reportId, userId) => {
                const text = replyText[reportId];
                if (!text) return;
                try {
                    await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'reports', reportId), { status: 'resolved', adminReply: text, resolvedAt: serverTimestamp() });
                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'notifications'), {
                        title: "Phản hồi báo cáo lỗi", message: `Admin đã trả lời: "${text}"`, type: "system", userId: userId, createdAt: serverTimestamp()
                    });
                    setReplyText(prev => ({...prev, [reportId]: ''}));
                    alert("Đã gửi!");
                } catch (e) { alert("Lỗi"); }
            };

            return (
                <div className="modern-card rounded-3xl overflow-hidden border border-slate-800 h-[calc(100vh-140px)] flex flex-col">
                    <div className="p-6 border-b border-white/5 flex items-center justify-between bg-white/5 backdrop-blur-md">
                        <div className="flex items-center gap-4">
                            <div className="p-3 bg-rose-500/20 rounded-2xl text-rose-400 shadow-glow-purple"><AlertCircle size={24} /></div>
                            <div>
                                <h3 className="text-xl font-bold text-white">Báo Cáo Lỗi</h3>
                                <p className="text-xs text-slate-400">Phản hồi lỗi câu hỏi từ học viên</p>
                            </div>
                            <span className="bg-rose-500 text-white text-xs font-bold px-3 py-1 rounded-full shadow-lg shadow-rose-500/30">{reports.length}</span>
                        </div>
                        {reports.length > 0 && (
                            <button onClick={handleDeleteAllReports} className="bg-rose-500/10 hover:bg-rose-600 text-rose-500 hover:text-white px-4 py-2 rounded-xl text-xs font-bold transition-all flex items-center gap-2 border border-rose-500/20 hover:shadow-lg hover:shadow-rose-500/20">
                                <Trash2 size={16}/> Xóa tất cả
                            </button>
                        )}
                    </div>
                    <div className="flex-1 overflow-y-auto p-6 space-y-4 custom-scrollbar">
                        {reports.map(r => {
                            const examName = examMap[r.examId] || r.examId || 'Unknown Exam';
                            return (
                                <div key={r.id} className={`p-6 rounded-2xl border transition-all relative group ${r.status === 'resolved' ? 'bg-slate-900/40 border-slate-800 opacity-60 hover:opacity-100' : 'bg-[#1F2937]/80 border-rose-500/30 shadow-lg shadow-rose-900/10 hover:border-rose-500/50'}`}>
                                    <div className="flex gap-4 mb-4">
                                        <div className="mt-1">
                                            <div className={`w-8 h-8 rounded-full flex items-center justify-center font-bold text-xs ${r.reason === 'wrong_answer' ? 'bg-red-500/20 text-red-400' : 'bg-orange-500/20 text-orange-400'}`}>!</div>
                                        </div>
                                        <div className="flex-1">
                                            <div className="flex justify-between items-start mb-3">
                                                <div className="flex items-center gap-2">
                                                    <span className={`px-2.5 py-1 rounded-lg text-[10px] font-bold uppercase tracking-wider ${r.reason === 'wrong_answer' ? 'bg-red-500 text-slate-900' : 'bg-orange-500 text-slate-900'}`}>
                                                        {r.reason === 'wrong_answer' ? 'Sai đáp án' : r.reason}
                                                    </span>
                                                    <span className="text-xs text-slate-500 font-mono">{r.createdAt?.seconds ? new Date(r.createdAt.seconds * 1000).toLocaleString('vi-VN') : ''}</span>
                                                </div>
                                                
                                                <div className="flex items-center gap-3">
                                                    {r.status === 'resolved' ? 
                                                        <span className="text-emerald-500 text-xs font-bold flex items-center gap-1 bg-emerald-500/10 px-2 py-0.5 rounded-full border border-emerald-500/20"><CheckCircle2 size={12}/> Đã xử lý</span> 
                                                        : <span className="text-rose-500 text-xs font-bold flex items-center gap-1 bg-rose-500/10 px-2 py-0.5 rounded-full border border-rose-500/20"><Clock size={12}/> Chờ xử lý</span>
                                                    }
                                                    <button onClick={() => handleDeleteReport(r.id)} className="p-1.5 text-slate-500 hover:text-red-500 hover:bg-slate-800 rounded-lg transition-all" title="Xóa báo cáo">
                                                        <Trash2 size={16}/>
                                                    </button>
                                                </div>
                                            </div>
                                            
                                            <div className="bg-slate-900/50 rounded-xl p-4 border border-white/5 mb-4">
                                                <div className="flex items-center gap-2 mb-2 pb-2 border-b border-white/5">
                                                    <FileText size={14} className="text-cyan-500"/>
                                                    <span className="text-xs font-bold text-cyan-400 uppercase tracking-wide">{examName}</span>
                                                </div>
                                                <p className="text-slate-300 text-sm font-medium mb-1">Câu hỏi: <span className="text-white">"{r.questionText}"</span></p>
                                                <p className="text-slate-400 text-sm mt-2">Chi tiết báo lỗi: <span className="text-rose-400 italic">"{r.detail}"</span></p>
                                                <div className="mt-3 flex items-center gap-2 text-xs text-slate-600 bg-slate-800/50 w-fit px-3 py-1.5 rounded-lg">
                                                    <Users size={12}/> Báo bởi: <span className="text-slate-400 font-bold">{r.displayName}</span>
                                                </div>
                                            </div>

                                            {r.status !== 'resolved' ? (
                                                <div className="flex gap-2 bg-slate-900/30 p-1.5 rounded-xl border border-white/5">
                                                    <input 
                                                        type="text" 
                                                        placeholder="Nhập phản hồi cho học viên..." 
                                                        className="flex-1 bg-transparent border-none px-4 py-2 text-sm text-white focus:ring-0 placeholder:text-slate-600"
                                                        value={replyText[r.id] || ''}
                                                        onChange={e => setReplyText({...replyText, [r.id]: e.target.value})}
                                                    />
                                                    <button onClick={() => handleReply(r.id, r.userId)} className="bg-cyan-600 hover:bg-cyan-500 text-white px-5 py-2 rounded-lg font-bold text-sm flex items-center gap-2 transition-all shadow-lg active:scale-95">
                                                        <Send size={16}/> Gửi
                                                    </button>
                                                </div>
                                            ) : (
                                                <div className="bg-emerald-500/5 p-3 rounded-xl border border-emerald-500/10 flex gap-3">
                                                    <Reply size={16} className="text-emerald-500 shrink-0 mt-1"/>
                                                    <div>
                                                        <p className="text-xs text-emerald-500 font-bold uppercase mb-1">Phản hồi của Admin:</p>
                                                        <p className="text-sm text-slate-300">{r.adminReply}</p>
                                                    </div>
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                </div>
                            );
                        })}
                        {reports.length === 0 && <div className="text-center py-20"><div className="w-16 h-16 bg-slate-800/50 rounded-full flex items-center justify-center mx-auto mb-4 text-slate-600"><CheckCircle2 size={32}/></div><p className="text-slate-500">Tuyệt vời! Không có báo cáo lỗi nào.</p></div>}
                    </div>
                </div>
            );
        };

        const AdminDashboard = () => {
            const [view, setView] = useState('live'); 
            const [stats, setStats] = useState({ active: 0, online: 0, users: 0, vip: 0, exams: 0 });
            const [liveSessions, setLiveSessions] = useState([]);
            const [rawSessions, setRawSessions] = useState([]); 
            const [rawUsers, setRawUsers] = useState([]);
            const [user, setUser] = useState(null);
            const [userMap, setUserMap] = useState({});
            const [examMap, setExamMap] = useState({});

            useEffect(() => {
                const initAuth = async () => {
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                       try { await signInWithCustomToken(auth, __initial_auth_token); } 
                       catch (e) { console.error(e); await signInAnonymously(auth); }
                    } else { await signInAnonymously(auth); }
                };
                initAuth();
                return onAuthStateChanged(auth, setUser);
            }, []);

            useEffect(() => {
                if (!user) return;
                
                // 1. Live Active Exams (Doing tests)
                const unsubActive = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'active_exams'), (snap) => {
                    const raw = snap.docs.map(d => ({id: d.id, ...d.data()}));
                    setRawSessions(raw);
                });

                // 2. All Users (For Online stats)
                const unsubUsers = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'users'), (snap) => {
                    let v = 0; 
                    const map = {};
                    const usersList = [];
                    snap.forEach(d => { 
                        const data = d.data();
                        if(data.isPremium) v++; 
                        map[data.uid] = data.displayName || data.email;
                        usersList.push(data);
                    });
                    setUserMap(map);
                    setRawUsers(usersList);
                    setStats(p => ({ ...p, users: snap.size, vip: v }));
                });

                const unsubExams = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'exams'), (snap) => {
                    const map = {};
                    snap.forEach(d => { map[d.id] = d.data().title; });
                    setExamMap(map);
                    setStats(p => ({ ...p, exams: snap.size }));
                });
                return () => { unsubActive(); unsubUsers(); unsubExams(); };
            }, [user]);

            // Filter Loops
            useEffect(() => {
                const filterActive = () => {
                    const now = Date.now();
                    // Active test sessions
                    const activeSessions = rawSessions.filter(s => {
                        const lastPing = s.lastPing?.toDate ? s.lastPing.toDate().getTime() : 0;
                        const startedAt = s.startedAt?.toDate ? s.startedAt.toDate().getTime() : 0;
                        const lastActivity = Math.max(lastPing, startedAt);
                        return (now - lastActivity) < 120000; // 2 min timeout for test
                    });
                    
                    // Get UIDs of people currently testing
                    const activeUids = new Set(activeSessions.map(s => s.uid));

                    // 2. Filter Online Users (active on site recently)
                    const onlineUsers = rawUsers.filter(u => {
                        const lastActive = u.lastActive?.toDate ? u.lastActive.toDate().getTime() : 0;
                        return (now - lastActive) < 300000; // 5 min timeout for online status
                    });
                    
                    // 3. Combine: Online = (Recent Users) UNION (Active Test Takers)
                    const uniqueOnlineUids = new Set([
                        ...onlineUsers.map(u => u.uid),
                        ...activeUids
                    ]);

                    setLiveSessions(activeSessions);
                    setStats(p => ({ 
                        ...p, 
                        active: activeSessions.length,
                        online: uniqueOnlineUids.size 
                    }));
                };

                filterActive(); 
                const interval = setInterval(filterActive, 30000); 
                return () => clearInterval(interval);
            }, [rawSessions, rawUsers]);

            if (!user) return <div className="min-h-screen bg-[#0B0F19] flex items-center justify-center"><div className="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-cyan-500"></div></div>;

            return (
                <div className="flex h-screen bg-[#0B0F19] overflow-hidden text-slate-300 font-sans selection:bg-cyan-500/30">
                    {/* SIDEBAR */}
                    <aside className="w-72 bg-[#111827] border-r border-slate-800 flex flex-col shrink-0 relative z-20">
                        <div className="h-24 flex items-center px-8 border-b border-slate-800/50">
                            <div className="w-10 h-10 bg-gradient-to-tr from-cyan-500 to-blue-600 rounded-xl flex items-center justify-center shadow-lg shadow-cyan-500/20 mr-3 shrink-0">
                                <Activity className="text-white" size={24} />
                            </div>
                            <div>
                                <h1 className="text-white font-extrabold text-xl tracking-tight leading-none">ANALYTICS</h1>
                                <p className="text-[10px] text-slate-500 font-bold uppercase tracking-widest mt-1">Admin Panel</p>
                            </div>
                        </div>

                        <nav className="flex-1 py-8 px-4 space-y-2">
                            <div onClick={()=>setView('live')} className={`sidebar-item flex items-center gap-4 px-5 py-4 rounded-xl cursor-pointer ${view==='live'?'active bg-slate-800':'text-slate-400 hover:bg-slate-800/50 hover:text-white'}`}>
                                <LayoutDashboard size={20} className={view==='live'?'text-cyan-400':''}/> <span className="font-bold text-sm">Live Monitor</span>
                            </div>
                            <div onClick={()=>setView('leaderboard')} className={`sidebar-item flex items-center gap-4 px-5 py-4 rounded-xl cursor-pointer ${view==='leaderboard'?'active bg-slate-800':'text-slate-400 hover:bg-slate-800/50 hover:text-white'}`}>
                                <Trophy size={20} className={view==='leaderboard'?'text-yellow-400':''}/> <span className="font-bold text-sm">Bảng xếp hạng</span>
                            </div>
                            <div onClick={()=>setView('ratings')} className={`sidebar-item flex items-center gap-4 px-5 py-4 rounded-xl cursor-pointer ${view==='ratings'?'active bg-slate-800':'text-slate-400 hover:bg-slate-800/50 hover:text-white'}`}>
                                <MessageSquare size={20} className={view==='ratings'?'text-emerald-400':''}/> <span className="font-bold text-sm">Đánh giá & Góp ý</span>
                            </div>
                            <div onClick={()=>setView('reports')} className={`sidebar-item flex items-center gap-4 px-5 py-4 rounded-xl cursor-pointer ${view==='reports'?'active bg-slate-800':'text-slate-400 hover:bg-slate-800/50 hover:text-white'}`}>
                                <div className="relative">
                                    <AlertCircle size={20} className={view==='reports'?'text-rose-400':''}/>
                                    <span className="absolute -top-1 -right-1 w-2.5 h-2.5 bg-rose-500 rounded-full border-2 border-[#111827]"></span>
                                </div>
                                <span className="font-bold text-sm">Báo cáo lỗi</span>
                            </div>
                        </nav>

                        <div className="p-6 border-t border-slate-800/50 bg-slate-900/30">
                            <div className="flex items-center gap-4">
                                <div className="w-12 h-12 rounded-full bg-gradient-to-br from-cyan-900 to-slate-900 text-cyan-400 flex items-center justify-center font-bold border border-cyan-500/20 shadow-lg">LT</div>
                                <div><p className="text-white text-sm font-bold">Lê Thanh Trọng</p><p className="text-xs text-slate-500 font-medium">System Manager</p></div>
                                <button className="ml-auto p-2 hover:bg-slate-800 rounded-lg text-slate-400 hover:text-white transition-colors"><LogOut size={18}/></button>
                            </div>
                        </div>
                    </aside>

                    {/* MAIN CONTENT */}
                    <main className="flex-1 flex flex-col min-w-0 overflow-hidden relative z-10">
                        <header className="h-24 flex items-center justify-between px-10 sticky top-0 z-30">
                            <div>
                                <h2 className="text-4xl font-black text-white tracking-tighter uppercase drop-shadow-lg">{view === 'live' ? 'Dashboard' : (view === 'leaderboard' ? 'Xếp Hạng' : (view === 'ratings' ? 'Đánh Giá' : 'Báo Cáo'))}</h2>
                                {view === 'live' && <div className="flex items-center gap-2 mt-1"><span className="live-pulse w-2 h-2 bg-emerald-500 rounded-full"></span><p className="text-emerald-500 text-xs font-bold uppercase tracking-widest">Giám sát thời gian thực</p></div>}
                            </div>
                            <div className="flex items-center gap-6">
                                <div className="relative group">
                                    <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"><Search size={16} className="text-slate-500 group-focus-within:text-cyan-400 transition-colors"/></div>
                                    <input type="text" className="bg-slate-900/80 border border-slate-700/50 rounded-xl pl-10 pr-4 py-2.5 text-sm text-white focus:border-cyan-500 focus:ring-1 focus:ring-cyan-500 outline-none w-64 shadow-lg backdrop-blur-sm transition-all" placeholder="Tìm kiếm dữ liệu..."/>
                                </div>
                                <div className="p-2.5 bg-slate-900/80 border border-slate-700/50 rounded-xl text-slate-400 hover:text-white hover:bg-slate-800 cursor-pointer transition-colors shadow-lg backdrop-blur-sm relative"><Bell size={20}/><span className="absolute top-2 right-2 w-2 h-2 bg-rose-500 rounded-full border border-slate-900"></span></div>
                                <ClockWidget />
                            </div>
                        </header>

                        <div className="flex-1 overflow-y-auto px-10 pb-10 scroll-smooth">
                            {view === 'live' && (
                                <>
                                    <div className="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-5 gap-6 mb-10 mt-4">
                                        <StatCard title="ONLINE" value={stats.online} icon={<Wifi size={24} className="text-sky-400"/>} colorClass="bg-sky-400" gradient="from-sky-400 to-blue-500"/>
                                        <StatCard title="ĐANG THI" value={stats.active} icon={<Activity size={24} className="text-emerald-400"/>} colorClass="bg-emerald-400" gradient="from-emerald-400 to-teal-500"/>
                                        <StatCard title="HỌC VIÊN" value={stats.users} icon={<Users size={24} className="text-purple-400"/>} colorClass="bg-purple-400" gradient="from-purple-400 to-violet-600"/>
                                        <StatCard title="VIP PRO" value={stats.vip} icon={<Crown size={24} className="text-yellow-400"/>} colorClass="bg-yellow-400" gradient="from-yellow-400 to-orange-500"/>
                                        <StatCard title="ĐỀ THI" value={stats.exams} icon={<FileText size={24} className="text-blue-400"/>} colorClass="bg-blue-400" gradient="from-blue-400 to-indigo-600"/>
                                    </div>
                                    <div className="mb-10">
                                        <div className="flex items-center justify-between mb-6">
                                            <h3 className="text-xl font-extrabold text-white flex items-center gap-3"><div className="p-2 bg-cyan-500/10 rounded-lg"><Zap size={20} className="text-cyan-400" /></div> TRẠNG THÁI NGƯỜI DÙNG</h3>
                                            <div className="px-4 py-1.5 bg-slate-800 rounded-full border border-slate-700 text-xs font-bold text-slate-400">Online: <span className="text-white ml-1">{liveSessions.length}</span></div>
                                        </div>
                                        {liveSessions.length === 0 ? (
                                            <div className="border-2 border-dashed border-slate-800 rounded-3xl p-16 text-center bg-slate-900/20">
                                                <div className="w-20 h-20 bg-slate-800/50 rounded-full flex items-center justify-center mx-auto mb-6 text-slate-600 animate-pulse"><Users size={40}/></div>
                                                <p className="text-slate-500 font-bold text-lg">Chưa có người dùng nào đang làm bài thi.</p>
                                                <p className="text-slate-600 text-sm mt-2">Dữ liệu sẽ xuất hiện khi có hoạt động.</p>
                                            </div>
                                        ) : (
                                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                                                {liveSessions.map(session => <LiveUserCard key={session.id} session={session} />)}
                                            </div>
                                        )}
                                    </div>
                                </>
                            )}

                            {view === 'leaderboard' && <LeaderboardSection />}
                            {view === 'ratings' && <RatingsSection userMap={userMap} examMap={examMap} />}
                            {view === 'reports' && <ReportsSection examMap={examMap} />}
                        </div>
                    </main>
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<AdminDashboard />);
    </script>
</body>
</html>
