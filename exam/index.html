        const ResultScreen = ({ result, onBack, onReview, globalConfig }) => {
            const { addToast } = useToast();
            const [rating, setRating] = useState(0);
            const [hasRated, setHasRated] = useState(false);
            const [feedback, setFeedback] = useState("");
            const [tempRating, setTempRating] = useState(0);

            const auth = getAuth();
            const user = auth.currentUser;

            useEffect(() => {
                const checkRating = async () => {
                    if (!user || !result.examId) return;
                    const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'exam_ratings', `${result.examId}_${user.uid}`);
                    try {
                        const snap = await getDoc(docRef);
                        if (snap.exists()) {
                            setRating(snap.data().rating);
                            setHasRated(true);
                        }
                    } catch (e) { console.error(e); }
                };
                checkRating();
            }, [result.examId, user?.uid]);

            const submitRating = async (score, feedbackContent) => {
                if (!user) return;
                try {
                    await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'exam_ratings', `${result.examId}_${user.uid}`), {
                        uid: user.uid,
                        examId: result.examId,
                        rating: score,
                        createdAt: serverTimestamp()
                    });
                    
                    const examRef = doc(db, 'artifacts', appId, 'public', 'data', 'exams', result.examId);
                    await updateDoc(examRef, {
                        ratingSum: increment(score),
                        ratingCount: increment(1)
                    });

                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'reviews'), {
                        examId: result.examId,
                        examTitle: result.examTitle || 'Unknown Exam',
                        userId: user.uid,
                        userEmail: user.email || 'N/A',
                        displayName: user.displayName || 'Khách ẩn danh',
                        rating: score,
                        feedback: feedbackContent, 
                        createdAt: serverTimestamp()
                    });

                    setRating(score);
                    setHasRated(true);
                    setTempRating(0); 
                    addToast("Đã gửi đánh giá thành công!", "success");
                } catch (e) {
                    console.error("Error rating:", e);
                    addToast("Lỗi khi gửi đánh giá.", "error");
                }
            };

            const handleStarClick = (score) => {
                if (hasRated) return;
                if (score > 3) {
                    submitRating(score, "");
                } else {
                    setTempRating(score);
                }
            };

            const handleDownloadResult = async () => {
                const element = document.getElementById('result-certificate');
                if (!element) return;
                try {
                    const canvas = await window.html2canvas(element, { scale: 2, backgroundColor: null });
                    const link = document.createElement('a');
                    link.download = `MedExam_Result_${Date.now()}.png`;
                    link.href = canvas.toDataURL();
                    link.click();
                } catch (e) { console.error(e); addToast("Lỗi tạo ảnh.", "error"); }
            };

            const handleShareFacebook = () => {
               const text = `Tôi vừa hoàn thành bài thi "${result.examTitle}" với số điểm ${result.score}/10 trên MedExam Pro!`;
               const url = "https://medexam-pro.web.app"; 
               window.open(`https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(url)}&quote=${encodeURIComponent(text)}`, '_blank');
            };

            const handleShareZalo = () => {
                const text = `Kết quả thi MedExam Pro:\nĐề: ${result.examTitle}\nĐiểm: ${result.score}/10\nĐúng: ${result.correctCount}/${result.total}`;
                navigator.clipboard.writeText(text).then(() => addToast("Đã sao chép kết quả!", "info"));
            };

            return (
                <div className="min-h-screen flex items-center justify-center p-4 animate-fade-in relative overflow-hidden" style={{
                    backgroundImage: globalConfig.resultBg ? `linear-gradient(rgba(15, 23, 42, 0.9), rgba(15, 23, 42, 0.9)), url('${globalConfig.resultBg}')` : undefined,
                    backgroundColor: '#0f172a',
                    backgroundSize: 'cover', backgroundPosition: 'center'
                }}>
                    {Number(result.score) >= 8 && <Confetti />}
                    <div className="glass-result p-8 md:p-10 rounded-3xl text-center max-w-md w-full relative overflow-hidden border border-white/10 shadow-2xl animate-scale-up" id="result-certificate">
                        <div className="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-cyan-500 to-blue-600"></div>
                        <Award size={80} className={`mx-auto mb-6 ${Number(result.score)>=5?'text-yellow-400 drop-shadow-[0_0_15px_rgba(250,204,21,0.5)] animate-bounce':'text-slate-500'}`}/>
                        <h2 className="text-3xl font-black text-white mb-2 uppercase tracking-wide">Kết Quả Thi</h2>
                        <h3 className="text-xl text-cyan-400 font-bold mb-4">{result.examTitle}</h3>
                        <div className="text-6xl font-black text-white mb-2 tracking-tighter">{result.score}</div>
                        
                        <div className="grid grid-cols-2 gap-4 mb-6 mt-6">
                            <div className="bg-slate-800/80 p-4 rounded-2xl border border-slate-700"><p className="text-xs text-slate-500 uppercase font-bold">Câu đúng</p><p className="text-2xl font-bold text-emerald-400">{result.correctCount}/{result.total}</p></div>
                            <div className="bg-slate-800/80 p-4 rounded-2xl border border-slate-700"><p className="text-xs text-slate-500 uppercase font-bold">Trạng thái</p><p className={`text-2xl font-bold ${Number(result.score)>=5?'text-cyan-400':'text-red-400'}`}>{Number(result.score)>=5?'ĐẠT':'HỎNG'}</p></div>
                        </div>

                        <div className="mb-6 bg-slate-800/40 p-4 rounded-2xl border border-white/5 transition-all">
                            {!hasRated ? (
                                <>
                                    <p className="text-slate-300 text-xs font-bold uppercase mb-3 tracking-wider">Đánh giá đề thi này</p>
                                    <div className="flex justify-center gap-2 mb-3">
                                        {[1,2,3,4,5].map(star => (
                                            <button 
                                                key={star} 
                                                onClick={() => handleStarClick(star)}
                                                className={`transition-all transform hover:scale-125 p-1 ${tempRating === star ? 'scale-125' : ''}`}
                                            >
                                                <Star size={28} fill={star <= (tempRating || rating) ? "#fbbf24" : "none"} className={star <= (tempRating || rating) ? "text-yellow-400" : "text-slate-600"} />
                                            </button>
                                        ))}
                                    </div>
                                    
                                    {tempRating > 0 && tempRating <= 3 && (
                                        <div className="animate-fade-in mt-3">
                                            <textarea 
                                                className="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 text-sm text-white placeholder-slate-500 mb-3 focus:border-cyan-500 outline-none"
                                                rows="3"
                                                placeholder="Bạn chưa hài lòng điểm nào? Hãy góp ý cho chúng tôi..."
                                                value={feedback}
                                                onChange={(e) => setFeedback(e.target.value)}
                                            ></textarea>
                                            <button 
                                                onClick={() => submitRating(tempRating, feedback)}
                                                className="bg-cyan-600 hover:bg-cyan-500 text-white text-xs font-bold py-2 px-4 rounded-lg transition-all"
                                            >
                                                Gửi đánh giá & Góp ý
                                            </button>
                                        </div>
                                    )}
                                </>
                            ) : (
                                <div className="animate-fade-in">
                                    <div className="flex justify-center gap-1 mb-2">
                                        {[1,2,3,4,5].map(star => (
                                            <Star key={star} size={20} fill={star <= rating ? "#fbbf24" : "none"} className={star <= rating ? "text-yellow-400" : "text-slate-600"} />
                                        ))}
                                    </div>
                                    <p className="text-emerald-400 text-[10px] font-bold animate-pulse">Cảm ơn bạn đã đánh giá!</p>
                                </div>
                            )}
                        </div>

                        <div className="flex justify-center gap-3 mb-6 relative z-10">
                            <button onClick={handleDownloadResult} className="p-3 bg-slate-800 hover:bg-slate-700 rounded-full text-slate-300 hover:text-white transition-all border border-slate-700 tooltip" title="Tải ảnh"><Download size={20}/></button>
                            <button onClick={handleShareFacebook} className="p-3 bg-blue-600 hover:bg-blue-500 rounded-full text-white transition-all shadow-lg shadow-blue-500/20"><Facebook size={20}/></button>
                            <button onClick={handleShareZalo} className="p-3 bg-blue-500 hover:bg-blue-400 rounded-full text-white transition-all shadow-lg shadow-blue-400/20 font-bold text-xs flex items-center">Zalo</button>
                        </div>
                        <div className="space-y-3 relative z-10">
                            <button onClick={onReview} className="w-full bg-cyan-600 hover:bg-cyan-500 text-white py-3.5 rounded-xl font-bold transition-all shadow-lg shadow-cyan-500/20 flex items-center justify-center gap-2 hover:translate-y-[-2px]"><Eye size={18}/> Xem lại đáp án</button>
                            <button onClick={onBack} className="w-full bg-slate-800 hover:bg-slate-700 text-white py-3.5 rounded-xl font-bold transition-all border border-slate-700 hover:border-slate-600">Về trang chủ</button>
                        </div>
                    </div>
                </div>
            );
        };

        function App() {
            const [user, setUser] = useState(null);
            const [profile, setProfile] = useState(null);
            const [view, setView] = useState('loading');
            const [activeExam, setActiveExam] = useState(null);
            const [lastResult, setLastResult] = useState(null);
            const [showPay, setShowPay] = useState(false);
            const [globalConfig, setGlobalConfig] = useState({});
            
            // Notification System States
            const [sysNoti, setSysNoti] = useState(null);
            const [notifications, setNotifications] = useState([]);
            const [showNotiDropdown, setShowNotiDropdown] = useState(false);
            const [hasNewNoti, setHasNewNoti] = useState(false);
            const [hiddenNotiIds, setHiddenNotiIds] = useState(() => {
                const saved = localStorage.getItem('hidden_noti_ids');
                return saved ? JSON.parse(saved) : [];
            });

            useEffect(() => {
                const configPath = doc(db, 'artifacts', appId, 'public', 'data', 'system_settings', 'config');
                const unsubscribe = onSnapshot(configPath, (s) => {
                    if (s.exists()) {
                        setGlobalConfig(s.data());
                    } else {
                        getDoc(doc(db, 'artifacts', appId, 'public', 'data', 'system', 'global_settings'))
                            .then(s => s.exists() && setGlobalConfig(s.data()))
                            .catch(console.warn);
                    }
                }, (error) => {
                    console.warn("Config load failed (likely permissions):", error);
                });

                return () => unsubscribe();
            }, []);

            useEffect(() => {
                return onAuthStateChanged(auth, u => {
                    setUser(u);
                    if (u) {
                        setView('dashboard');
                        const unsub = onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'users', u.uid), d => d.exists() && setProfile(d.data()), (error) => console.error("Profile sync error", error));
                        return () => unsub();
                    } else setView('auth');
                });
            }, []);

            useEffect(() => {
                if (user && profile?.isPremium && profile?.vipActivatedAt) {
                    const activationDate = profile.vipActivatedAt.toDate();
                    const expiryTime = activationDate.getTime() + VIP_DURATION_DAYS * 24 * 60 * 60 * 1000;
                    if (Date.now() > expiryTime) {
                        updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'users', user.uid), { isPremium: false })
                            .catch(err => console.error("Lỗi cập nhật hết hạn:", err));
                    }
                }
            }, [profile, user]);

            // Unified Notification Listener
            useEffect(() => {
                if (!user) return;
                const q = query(
                    collection(db, 'artifacts', appId, 'public', 'data', 'notifications'), 
                    orderBy('createdAt', 'desc'), 
                    limit(10)
                );
                
                const unsubscribe = onSnapshot(q, (snapshot) => {
                    const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    setNotifications(data);

                    if (data.length > 0) {
                        const latest = data[0];
                        const seenId = localStorage.getItem('seen_noti_id');
                        
                        // Set banner only if not seen
                        if (seenId !== latest.id) {
                            setSysNoti(latest);
                            setHasNewNoti(true);
                        } else {
                            setHasNewNoti(false);
                        }
                    }
                });
                
                return () => unsubscribe();
            }, [user]);

            const closeNoti = () => {
                if(sysNoti) {
                    localStorage.setItem('seen_noti_id', sysNoti.id);
                    setSysNoti(null);
                    setHasNewNoti(false);
                }
            };

            const toggleNotiDropdown = () => {
                setShowNotiDropdown(!showNotiDropdown);
                if (notifications.length > 0) {
                    localStorage.setItem('seen_noti_id', notifications[0].id);
                    setHasNewNoti(false);
                }
            };

            const hideNotification = (e, id) => {
                e.stopPropagation();
                const updated = [...hiddenNotiIds, id];
                setHiddenNotiIds(updated);
                localStorage.setItem('hidden_noti_ids', JSON.stringify(updated));
            };

            const filteredNotifications = notifications.filter(n => !hiddenNotiIds.includes(n.id)).slice(0, 5);

            let daysLeft = null;
            if (profile?.isPremium && profile?.vipActivatedAt) {
                const activationDate = profile.vipActivatedAt.toDate();
                const expiryTime = activationDate.getTime() + VIP_DURATION_DAYS * 24 * 60 * 60 * 1000;
                const diffTime = expiryTime - Date.now();
                if (diffTime > 0) daysLeft = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            }

            const startExam = async (exam) => { 
                if (confirm(`Sẵn sàng thi bài "${exam.title}"?`)) { 
                    try {
                          const sessionRef = await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'active_exams'), {
                            uid: user.uid,
                            displayName: user.displayName || user.email,
                            examId: exam.id,
                            examTitle: exam.title,
                            startedAt: serverTimestamp()
                        });
                        setActiveExam({ ...exam, sessionId: sessionRef.id });
                    } catch (e) {
                        console.error("Tracking error:", e);
                        setActiveExam(exam);
                    }
                    setView('exam'); 
                } 
            };

            const renderContent = () => {
                if (view === 'loading') return <div className="min-h-screen bg-slate-950 flex items-center justify-center text-cyan-500"><Loader2 className="animate-spin" size={40}/></div>;
                if (view === 'auth') return <AuthScreen globalConfig={globalConfig} />;
                if (view === 'exam' && activeExam) return <ExamInterface exam={activeExam} onExit={() => { setActiveExam(null); setView('dashboard'); }} onFinish={r => { setLastResult(r); setActiveExam(null); setView('result'); }} />;
                if (view === 'review' && lastResult) return <ReviewExam result={lastResult} onBack={() => { setLastResult(null); setView('dashboard'); }} />;
                
                if (view === 'result' && lastResult) return (
                    <ResultScreen 
                        result={lastResult} 
                        onBack={() => setView('dashboard')} 
                        onReview={() => setView('review')} 
                        globalConfig={globalConfig}
                    />
                );

                return (
                    <div className="min-h-screen bg-slate-950 font-sans text-slate-200" onClick={() => setShowNotiDropdown(false)}>
                        <nav className="glass sticky top-0 z-40 border-b border-white/5">
                            <div className="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
                                <button onClick={()=>setView('dashboard')} className="flex items-center gap-2.5 group">
                                    <div className="bg-gradient-to-br from-cyan-500 to-blue-600 p-2 rounded-xl shadow-lg shadow-cyan-500/20 group-hover:shadow-cyan-500/40 transition-all group-hover:rotate-6"><Activity size={20} className="text-white"/></div>
                                    <span className="font-bold text-xl bg-clip-text text-transparent bg-gradient-to-r from-cyan-400 to-blue-400">MedExam Pro</span>
                                </button>
                                <div className="flex items-center gap-2 md:gap-4">
                                    
                                    <div className="relative">
                                        <button 
                                            onClick={(e) => { e.stopPropagation(); toggleNotiDropdown(); }}
                                            className={`p-2 rounded-lg transition-all relative ${showNotiDropdown ? 'bg-slate-800 text-cyan-400' : 'text-slate-400 hover:bg-slate-800 hover:text-white'}`}
                                        >
                                            <Bell size={20} />
                                            {hasNewNoti && <div className="noti-badge"></div>}
                                        </button>
                                        
                                        {showNotiDropdown && (
                                            <div className="absolute right-0 mt-3 w-80 bg-slate-900 border border-slate-800 rounded-2xl shadow-2xl overflow-hidden animate-scale-up z-50" onClick={e => e.stopPropagation()}>
                                                <div className="p-4 border-b border-slate-800 bg-slate-800/50 flex justify-between items-center">
                                                    <h4 className="font-bold text-sm text-white">Thông báo</h4>
                                                    <span className="text-[10px] text-slate-500 uppercase tracking-widest font-bold">Mới nhất</span>
                                                </div>
                                                <div className="max-h-96 overflow-y-auto">
                                                    {filteredNotifications.length > 0 ? (
                                                        filteredNotifications.map(n => (
                                                            <div key={n.id} className="p-4 border-b border-slate-800/50 hover:bg-slate-800/30 transition-colors relative group">
                                                                <button 
                                                                    onClick={(e) => hideNotification(e, n.id)}
                                                                    className="absolute top-2 right-2 p-1 text-slate-600 hover:text-red-400 opacity-0 group-hover:opacity-100 transition-all"
                                                                    title="Xóa thông báo"
                                                                >
                                                                    <Trash2 size={12} />
                                                                </button>
                                                                <div className="flex gap-3">
                                                                    <div className="mt-1 shrink-0 bg-cyan-500/10 p-1.5 rounded-lg text-cyan-500">
                                                                        <Info size={14} />
                                                                    </div>
                                                                    <div>
                                                                        <p className="text-sm font-bold text-slate-200 line-clamp-1">{n.title}</p>
                                                                        <p className="text-xs text-slate-400 mt-1 line-clamp-2 leading-relaxed">{n.message}</p>
                                                                        <p className="text-[10px] text-slate-600 mt-2 font-mono">
                                                                            {n.createdAt?.seconds ? new Date(n.createdAt.seconds * 1000).toLocaleDateString('vi-VN') : 'Gần đây'}
                                                                        </p>
                                                                    </div>
                                                                </div>
                                                            </div>
                                                        ))
                                                    ) : (
                                                        <div className="p-10 text-center text-slate-600 italic text-sm">
                                                            Không có thông báo nào
                                                        </div>
                                                    )}
                                                </div>
                                            </div>
                                        )}
                                    </div>

                                    <button onClick={()=>setView('leaderboard')} className="hidden md:flex bg-slate-800/80 hover:bg-slate-700 text-slate-300 text-xs font-bold px-4 py-2 rounded-full border border-slate-700 items-center gap-2 transition-all">
                                        <Trophy size={14} className="text-yellow-500"/> BXH
                                    </button>
                                    {profile?.isPremium ? (
                                        <div className="flex flex-col items-end mr-2">
                                            <span className="hidden md:flex bg-gradient-to-r from-yellow-500/10 to-amber-500/10 text-amber-400 text-[10px] font-bold border border-amber-500/20 px-3 py-1 rounded-full items-center gap-1.5"><Crown size={12}/> VIP</span>
                                            {daysLeft !== null && <span className="text-[9px] text-slate-500 font-mono mt-0.5">Còn {daysLeft} ngày</span>}
                                        </div>
                                    ) : (
                                        <button onClick={()=>setShowPay(true)} className="hidden md:flex bg-gradient-to-r from-yellow-600 to-amber-600 hover:from-yellow-500 hover:to-amber-500 text-white text-xs font-bold px-4 py-2 rounded-full shadow-lg shadow-amber-900/20 items-center gap-2 transition-all transform hover:scale-105 active:scale-95"><Crown size={16}/> Nâng cấp VIP</button>
                                    )}
                                    <div className="h-8 w-px bg-slate-800 mx-1 hidden md:block"></div>
                                    <button onClick={()=>setView('profile')} className="w-9 h-9 rounded-full bg-gradient-to-br from-blue-500 to-purple-600 flex items-center justify-center text-xs font-bold text-white shadow-inner ring-2 ring-slate-900 hover:ring-cyan-500 transition-all">{user.displayName?.charAt(0)}</button>
                                    <button onClick={()=>setView('history')} className="p-2 text-slate-400 hover:text-cyan-400 hover:bg-cyan-400/10 rounded-lg transition-all"><History size={20}/></button>
                                    <button onClick={()=>signOut(auth)} className="p-2 text-slate-400 hover:text-red-400 hover:bg-red-400/10 rounded-lg transition-all"><LogOut size={20}/></button>
                                </div>
                            </div>
                        </nav>
                        <div className="max-w-7xl mx-auto px-4 py-8">
                            {view === 'history' ? <HistoryPage user={user} onBack={()=>setView('dashboard')}/> : 
                             view === 'profile' ? <ProfilePage user={user} profile={profile} onBack={()=>setView('dashboard')} /> :
                             view === 'leaderboard' ? <LeaderboardPage user={user} onBack={()=>setView('dashboard')} /> :
                             <Dashboard user={user} profile={profile} onStartExam={startExam} onUpgrade={()=>setShowPay(true)} onViewHistory={()=>setView('history')} />}
                        </div>
                        {showPay && <PaymentModal onClose={()=>setShowPay(false)} user={user}/>}
                    </div>
                );
            };

            return (
                <ToastProvider>
                    {sysNoti && (
                        <div className="fixed top-0 left-0 w-full z-[100] animate-slide-down">
                            <div className="bg-gradient-to-r from-indigo-600 to-blue-600 text-white p-4 shadow-xl border-b border-indigo-400/30">
                                <div className="max-w-7xl mx-auto flex items-start gap-4">
                                    <div className="bg-white/20 p-2 rounded-full mt-1">
                                        <Bell size={24} className="text-white animate-bounce" />
                                    </div>
                                    <div className="flex-1">
                                        <h4 className="font-bold text-lg">{sysNoti.title}</h4>
                                        <p className="text-indigo-100 text-sm mt-1">{sysNoti.message}</p>
                                        <p className="text-xs text-indigo-300 mt-2 font-mono">
                                            {sysNoti.createdAt?.seconds ? new Date(sysNoti.createdAt.seconds * 1000).toLocaleString('vi-VN') : 'Vừa xong'}
                                        </p>
                                    </div>
                                    <button onClick={closeNoti} className="p-2 hover:bg-white/10 rounded-lg transition-colors">
                                        <X size={20} />
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                    {renderContent()}
                </ToastProvider>
            );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
