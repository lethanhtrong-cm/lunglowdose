                                className="flex-[2] bg-slate-100/60 px-3 py-1.5 rounded-lg focus:outline-none focus:ring-1 focus:ring-blue-500 text-slate-900 placeholder-slate-400 font-bold text-[10px] transition-all"
                            />
                            <button 
                                type="submit" 
                                disabled={status === "sending"}
                                className="bg-gradient-to-r from-blue-600 to-indigo-700 text-white p-1.5 rounded-lg font-black shadow-md hover:scale-95 active:scale-90 transition-all flex items-center justify-center gap-1 min-w-[40px]"
                            >
                                {status === "sending" ? (
                                    <div className="w-3 h-3 border-2 border-white/30 border-t-white rounded-full animate-spin"></div>
                                ) : (
                                    <Send size={14} />
                                )}
                            </button>
                        </div>
                        {status === "success" && <p className="absolute -bottom-4 left-1/2 -translate-x-1/2 text-green-400 text-[8px] font-black uppercase tracking-widest">Gửi thành công!</p>}
                    </form>
                </div>
            );
        };

        const App = () => {
            const [activeTab, setActiveTab] = useState('cme');
            const [isChatOpen, setIsChatOpen] = useState(false);
            const scrollContainerRef = useRef(null);

            const scrollToTop = () => {
                if (scrollContainerRef.current) {
                    scrollContainerRef.current.scrollTo({ top: 0, behavior: 'smooth' });
                }
            };

            useEffect(() => {
                if (scrollContainerRef.current) {
                    scrollContainerRef.current.scrollTo({ top: 0 });
                }
            }, [activeTab]);

            return (
                <div className="h-screen flex flex-col overflow-hidden bg-slate-50">
                    <Navbar activeTab={activeTab} setActiveTab={setActiveTab} />

                    <div className="flex-1 relative overflow-hidden">
                        <main 
                            ref={scrollContainerRef}
                            className="h-full overflow-y-auto custom-scrollbar relative px-4"
                        >
                            <div className="max-w-7xl mx-auto py-6 w-full">
                                {activeTab === 'license' && <LicenseContent />}
                                {activeTab === 'cme' && <CmeContent />}
                                {activeTab === 'scope' && <ScopeContent />}
                                {activeTab === 'facilities' && <PracticeFacilitiesContent />}
                            </div>

                            {/* FOOTER ĐÃ ĐƯỢC CĂN CHỈNH CHIỀU NGANG BẰNG HEADER */}
                            <footer className="max-w-7xl mx-auto glass-dark text-white pt-4 pb-4 mt-8 mb-8 relative overflow-hidden rounded-2xl shadow-xl">
                                <div className="px-6 flex flex-col items-center text-center">
                                    <div className="flex items-center gap-2 mb-2">
                                        <div className="p-1 bg-white text-blue-900 rounded-md shadow-lg"><Scale size={16} /></div>
                                        <span className="font-black text-lg tracking-tighter text-white">VnRadLegal</span>
                                    </div>
                                    
                                    <FooterFeedback />
                                    
                                    <div className="w-24 h-px bg-white/10 my-2"></div>
                                    
                                    <p className="text-[8px] text-slate-400 uppercase tracking-widest font-black opacity-60">
                                        Luật 15/2023/QH15 & Thông tư 32/2023/TT-BYT. © 2025 VNRadLegal.
                                    </p>
                                </div>
                            </footer>
                        </main>

                        <div className="absolute bottom-6 right-6 z-[110] flex flex-col items-end gap-3 pointer-events-none">
                            <button 
                                onClick={scrollToTop} 
                                className="p-3 glass rounded-xl shadow-lg text-slate-600 hover:text-blue-600 hover:-translate-y-1 transition-all duration-300 border-white/50 pointer-events-auto active:scale-90"
                                title="Lên đầu trang"
                            >
                                <ArrowUp size={20} />
                            </button>
                            
                            <div className="flex flex-col items-end gap-2 pointer-events-auto">
                                {isChatOpen && (
                                    <div className="glass-dark rounded-[1.5rem] shadow-2xl w-[18rem] overflow-hidden animate-in slide-in-from-bottom-5 duration-500 mb-2 border-white/10">
                                        <div className="bg-gradient-to-r from-blue-600/40 to-purple-600/40 p-4 flex justify-between items-center backdrop-blur-md border-b border-white/10">
                                            <div className="flex items-center gap-2 text-white"><Sparkles className="w-4 h-4 text-yellow-300" /><span className="font-black text-xs tracking-tight uppercase">AI TRỢ LÝ</span></div>
                                            <button onClick={() => setIsChatOpen(false)} className="text-white/40 hover:text-white"><X size={16} /></button>
                                        </div>
                                        <div className="p-6 space-y-4">
                                            <p className="text-xs text-slate-300 leading-relaxed font-medium">Chào bạn! Tôi có thể giải đáp các thắc mắc về Luật Khám chữa bệnh.</p>
                                            <a href="https://gemini.google.com/gem/1Kbzv_16us4UuH7c5yycu51dPpw6jPF9x?usp=sharing" target="_blank" className="block w-full bg-gradient-to-r from-indigo-600 to-purple-600 text-white text-center font-black py-2.5 rounded-lg shadow-lg hover:scale-[1.02] transition-transform text-[10px] tracking-widest uppercase">Bắt đầu Tra cứu AI</a>
                                        </div>
                                    </div>
                                )}
                                <button onClick={() => setIsChatOpen(!isChatOpen)} className="bg-gradient-to-br from-blue-600 via-indigo-600 to-purple-700 text-white p-4 rounded-[1.5rem] shadow-2xl hover:scale-105 transition-all duration-300 ai-float relative">
                                    {isChatOpen ? <X size={24} /> : <MessageSquare size={24} />}
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById("root"));
        root.render(<App />);
    </script>
</body>
</html>
