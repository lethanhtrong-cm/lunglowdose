                    vi: 'Không phải là chuỗi xung chẩn đoán, mà là một kỹ thuật theo dõi (monitoring) sự di chuyển của bolus thuốc đối quang từ. Máy sẽ chụp liên tục một lát cắt (thường là 2D FLASH/GRE) qua động mạch chủ, và hiển thị biểu đồ tín hiệu theo thời gian thực. KTV sẽ dựa vào biểu đồ này để bắt đầu (trigger) chuỗi xung MRA 3D chính (ví dụ: VIBE) ngay khi thuốc đạt đỉnh ở động mạch.',
                    en: 'Not a diagnostic sequence, but a technique to monitor the arrival of the contrast bolus. The scanner repeatedly images a single slice (usually 2D FLASH/GRE) through the aorta and displays a real-time signal intensity curve. The tech uses this curve to trigger the main 3D MRA sequence (e.g., VIBE) the moment the contrast peaks in the artery.'
                },
                applications: [

                    { priority: 2, use: { vi: 'Đảm bảo chụp đúng pha động mạch, tránh bị nhiễm tĩnh mạch sớm.', en: 'Ensures a pure arterial phase capture, avoiding early venous contamination.'} }

                tips: {

                imageUrl: 'https://media.springernature.com/lw685/springer-static/image/art%3A10.1186%2Fs12968-021-00719-2/MediaObjects/12968_2021_719_Fig2_HTML.jpg', 
                physics: {

                    en: 'A special Inversion Recovery (IR) sequence that acquires multiple images at different Inversion Times (TI) after a single inversion pulse. The purpose is for the tech to visualize how a specific tissue\'s signal (e.g., myocardium, fat) changes over time and select the TI at which that tissue is nulled (signal = 0).'

                    { priority: 2, use: { vi: 'Xác định TI chính xác để xóa tín hiệu mỡ (STIR) hoặc dịch (FLAIR) ở các từ trường khác nhau (ví dụ: 3T) hoặc ở các bệnh nhân khác nhau.', en: 'Determining the precise TI to null fat (STIR) or fluid (FLAIR) at different field strengths (e.g., 3T) or in different patients.'} }

                tips: {

                    en: 'Always run the TI Scout *after contrast injection* (wait 5-10 min) before running the cardiac LGE (PSIR) sequence. The tech must look at the series of images, find the one where the myocardium is blackest, read the corresponding TI (e.g., 280ms), and enter it into the LGE sequence.'

            },
            {
                id: 'blade_propeller',
                group: 'advanced-maps',
                genericName: { vi: 'BLADE / PROPELLER (Khử nhiễu)', en: 'BLADE / PROPELLER (Motion Correction)' },
                vendors: {
                    Siemens: 'BLADE',
                    GE: 'PROPELLER 3.0',
                    Philips: 'MultiVane XD',
                    Canon: 'JET',

                },
                imageUrl: 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSYj7n0hN_1nGlZvI3_gS6iIrBO_02Sirdb2BOpcEV6WtqY-hOYpRpqVYYMrvBSKhpChrM&usqp=CAU', 
                physics: {
                    vi: 'Đây là một kỹ thuật thu thập k-space theo kiểu "nan hoa" (radial blades) thay vì từng dòng (Cartesian). Mỗi "nan" đi qua trung tâm k-space, cho phép máy tính tự động phát hiện và sửa lỗi do chuyển động của bệnh nhân (cả chuyển động cứng và dòng chảy) trong thời gian thực.',
                    en: 'This is a k-space acquisition technique that uses "radial blades" instead of Cartesian lines. Each "blade" passes through the center of k-space, allowing the scanner to automatically detect and correct for patient motion (both bulk motion and flow) in real-time.'
                },
                applications: [
                    { priority: 1, use: { vi: 'Cứu cánh (workhorse) cho T2W và FLAIR não ở bệnh nhân không hợp tác, run rẩy (Parkinson), hoặc trẻ em.', en: 'A lifesaver (workhorse) for T2W and FLAIR brain imaging in uncooperative patients, those with tremors (Parkinson\'s), or children.' } },
                    { priority: 2, use: { vi: 'Giảm xảo ảnh dòng chảy (flow artifact) ở hố sau và cột sống cổ mà không cần flow compensation.', en: 'Reduces flow artifacts in the posterior fossa and cervical spine without needing flow compensation.' } },
                    { priority: 3, use: { vi: 'Chụp T2W bụng (free-breathing) ở bệnh nhân không nín thở được.', en: 'Free-breathing T2W abdomen for patients who cannot breath-hold.' } }
                ],
                tips: {
                    vi: 'Thời gian chụp sẽ dài hơn đáng kể so với TSE/FSE thông thường. Bù lại, hình ảnh rất sắc nét và gần như không bị nhiễu chuyển động. Rất hiệu quả trong các ca cấp cứu đột quỵ.',
                    en: 'Scan time is significantly longer than conventional TSE/FSE. In return, the image is very sharp and almost free of motion artifacts. Very effective in acute stroke cases.'

            },
            {

                genericName: { vi: 'WARP / MAVRIC (Giảm xảo ảnh Kim loại)', en: 'WARP / MAVRIC (Metal Artifact Reduction)' },
                vendors: {

                imageUrl: 'https://www.gehealthcare.in/-/jssmedia/global/products/images/magnetic-resonance-imaging/2018/06/14/mavric_sl_spotlight-1200.jpg?h=400&iar=0&w=1200&rev=-1&hash=42DC5D0F2D918006CF60875A5D998930', 
                physics: {
                    vi: 'Đây là một bộ các kỹ thuật phức tạp (không phải một xung đơn) nhằm giảm xảo ảnh (susceptibility artifact) nghiêm trọng gây ra bởi kim loại. Các kỹ thuật này thường bao gồm: Tăng Bandwidth, dùng TSE (thay vì GRE), và các kỹ thuật thu/tái tạo đặc biệt (như SEMAC/MAVRIC) để bù đắp sự méo từ trường.',
                    en: 'This is a complex set of techniques (not a single sequence) designed to reduce severe susceptibility artifacts caused by metal. These techniques often include: Increasing Bandwidth, using TSE (instead of GRE), and special acquisition/reconstruction techniques (like SEMAC/MAVRIC) to compensate for field distortion.'
                },
                applications: [
                    { priority: 1, use: { vi: 'Chụp cột sống sau phẫu thuật có nẹp vít (pedicle screws).', en: 'Post-surgical spine imaging with pedicle screws.' } },
                    { priority: 2, use: { vi: 'Đánh giá khớp háng, khớp gối nhân tạo (đánh giá lỏng khớp, viêm, u).', en: 'Evaluation of artificial hips and knees (assessing loosening, inflammation, tumors).' } },
                    { priority: 3, use: { vi: 'Chụp não/cổ ở bệnh nhân có nẹp răng hoặc mảnh kim loại.', en: 'Brain/neck imaging in patients with dental hardware or shrapnel.' } }
                ],
                tips: {
                    vi: 'Luôn chọn kỹ thuật này khi có kim loại. Kỹ thuật này làm tăng đáng kể thời gian chụp và có thể làm giảm SNR, nhưng là cách duy nhất để thu được hình ảnh chẩn đoán ở vùng lân cận kim loại.',
                    en: 'Always choose this technique when metal is present. It significantly increases scan time and can reduce SNR, but it is the only way to get diagnostic images near metal.'
                }
            }
        ];

        // Lấy các phần tử DOM
        const sidebarNav = document.getElementById('sidebar-nav');
        const container = document.getElementById('sequence-container');
        const searchInput = document.getElementById('searchInput');

        // Hàm HỖ TRỢ: Tạo HTML cho một thẻ chuỗi xung (ĐÃ CẬP NHẬT)
        // === ĐÃ SỬA: Không cần truyền 'currentLang', hàm này sẽ được gọi sau khi 'setLanguage' ===
        function generateCardHtml(seq) {
            // Lấy style của nhóm
            // === ĐÃ SỬA: Truy cập 'title' qua 'currentLang' ===
            const style = groupStyles[seq.group] || groupStyles['spin-echo']; // Mặc định là style của spin-echo

            // Tạo bảng tên hãng
            let vendorHtml = '<div class="my-3 overflow-hidden rounded-lg border border-gray-300 shadow-sm">'; // Wrapper (ĐÃ SỬA: border-gray-300 và shadow-sm)
            vendorHtml += '<table class="w-full text-sm">';
            vendorHtml += '<thead class="bg-gray-200">'; // (ĐÃ SỬA: bg-gray-200)
            vendorHtml += '<tr>';
            // === ĐÃ SỬA: Lấy text trực tiếp từ đối tượng dịch, bỏ data-lang-key ===
            vendorHtml += `<th scope="col" class="py-2 px-4 text-left text-xs font-semibold uppercase tracking-wider text-gray-700">${staticTranslations['ui.card_vendor_header'][currentLang]}</th>`; 
            vendorHtml += `<th scope="col" class="py-2 px-4 text-left text-xs font-semibold uppercase tracking-wider text-gray-700">${staticTranslations['ui.card_name_header'][currentLang]}</th>`; 
            vendorHtml += '</tr></thead>';
            vendorHtml += '<tbody class="bg-white divide-y divide-gray-200">';
            
            let i = 0;
            
            if (seq.vendors && typeof seq.vendors === 'object') {
                for (const [vendor, name] of Object.entries(seq.vendors)) {
                    const bgColor = i % 2 === 0 ? 'bg-white' : 'bg-gray-50'; // Sọc vằn
                    vendorHtml += `<tr class="${bgColor}"><td class="py-3 px-4 font-semibold text-blue-700">${vendor}</td><td class="py-3 px-4 text-gray-600">${name}</td></tr>`; 
                    i++;
                }
            } else {
                vendorHtml += `<tr><td colspan="2" class="py-3 px-4 text-gray-500 italic">No vendor info.</td></tr>`;
            }

            vendorHtml += '</tbody></table></div>'; // Đóng wrapper

            // Tạo danh sách ứng dụng
            // === ĐÃ SỬA: Truy cập 'use' qua 'currentLang' ===
            let appHtml = '<ol class="list-decimal list-inside space-y-2 mt-2 text-sm">';
            seq.applications.sort((a, b) => a.priority - b.priority).forEach(app => {
                appHtml += `<li><span class="font-medium">${app.use[currentLang]}</span></li>`;
            });
            appHtml += '</ol>';

            // MỚI: Tạo khối Hình ảnh
            let imageHtml = '';
            if (seq.imageUrl) {
                imageHtml = `
                            <div>
                                <!-- === ĐÃ SỬA: Lấy text trực tiếp từ đối tượng dịch, bỏ data-lang-key === -->
                                <h3 class="text-lg font-semibold text-blue-700">${staticTranslations['ui.card_image'][currentLang]}</h3>
                                <div class="mt-2 rounded-lg overflow-hidden border border-gray-200 shadow-sm">
                                    <img src="${seq.imageUrl}" alt="Hình ảnh minh họa cho ${seq.genericName[currentLang]}" class="w-full h-auto object-cover cursor-pointer" onerror="this.src='https://placehold.co/600x400/EFEFEF/AAAAAA?text=Image+Not+Available'; this.onerror=null;">
                                </div>
                            </div>
                        `;
            }

            // MỚI: Tạo khối Tips & Tricks
            let tipsHtml = '';
            // === ĐÃ SỬA: Truy cập 'tips' qua 'currentLang' ===
            if (seq.tips && seq.tips[currentLang] && seq.tips[currentLang].trim() !== '') {
                tipsHtml = `
                            <div>
                                <!-- === ĐÃ SỬA: Lấy text trực tiếp từ đối tượng dịch, bỏ data-lang-key === -->
                                <h3 class="text-lg font-semibold text-blue-700">${staticTranslations['ui.card_tips'][currentLang]}</h3>
                                <div class="mt-2 p-3 bg-yellow-50 border-l-4 border-yellow-400 rounded-r-lg">
                                    <p class="text-sm text-yellow-800 leading-relaxed">${seq.tips[currentLang]}</p>
                                </div>
                            </div>
                        `;
            }

            // Trả về thẻ HTML hoàn chỉnh
            return `
                <div class="sequence-card bg-white rounded-lg shadow-lg overflow-hidden transition-all duration-300 transform hover:scale-102" id="${seq.id}">
                    <!-- Header thẻ -->
                    <!-- === ĐÃ SỬA: Truy cập 'genericName' qua 'currentLang' === -->
                    <div class="p-5 ${style.bg} text-white">
                        <h2 class="text-2xl font-bold">${seq.genericName[currentLang]}</h2>
                    </div>
                    
                    <!-- Nội dung thẻ -->
                    <div class="p-5 space-y-4">
                        <!-- Tên Hãng -->
                        <div>
                            <!-- === ĐÃ SỬA: Lấy text trực tiếp từ đối tượng dịch, bỏ data-lang-key === -->
                            <h3 class="text-lg font-semibold text-blue-700">${staticTranslations['ui.card_vendor_name'][currentLang]}</h3> 
                            ${vendorHtml}
                        </div>

                        <!-- Bản chất vật lý -->
                        <div>
                            <!-- === ĐÃ SỬA: Lấy text trực tiếp từ đối tượng dịch, bỏ data-lang-key === -->
                            <h3 class="text-lg font-semibold text-blue-700">${staticTranslations['ui.card_physics'][currentLang]}</h3>
                            <!-- === ĐÃ SỬA: Truy cập 'physics' qua 'currentLang' === -->
                            <p class="text-gray-700 text-sm mt-2 leading-relaxed">${seq.physics[currentLang]}</p>
                        </div>

                        <!-- Ứng dụng lâm sàng -->
                        <div>
                            <!-- === ĐÃ SỬA: Lấy text trực tiếp từ đối tượng dịch, bỏ data-lang-key === -->
                            <h3 class="text-lg font-semibold text-blue-700">${staticTranslations['ui.card_applications'][currentLang]}</h3> 
                            ${appHtml}
                        </div>
                        
                        <!-- ĐÃ THÊM: Khối Hình ảnh -->
                        ${imageHtml}

                        <!-- Khối Tips & Tricks mới được chèn vào đây -->
                        ${tipsHtml} 

                    </div>
                </div>
            `;
        }


        // Hàm để hiển thị các chuỗi xung
        // === ĐÃ SỬA: Hàm này không cần thay đổi nhiều, vì nó gọi 'generateCardHtml' đã được sửa ===
        function renderSequences(sequences) {
            sidebarNav.innerHTML = ''; // Xóa nội dung cũ
            container.innerHTML = ''; // Xóa nội dung cũ

            // Phân loại chuỗi xung
            const groupedSequences = {};
            for (const groupId in groupStyles) {
                groupedSequences[groupId] = sequences.filter(s => s.group === groupId);
            }
            
            // Sắp xếp nhóm xóa mỡ
            if (groupedSequences['fat-suppression']) {
                groupedSequences['fat-suppression'].sort((a, b) => {
                    const order = ['stir', 'fatsat', 'spir_spair', 'dixon']; 
                    return order.indexOf(a.id) - order.indexOf(b.id);
                });
            }
            // Sắp xếp nhóm Mạch máu
            if (groupedSequences['non-contrast-mra']) {
                 groupedSequences['non-contrast-mra'].sort((a, b) => {
                    const order = ['tof_mra', 'pc_mra', 'fbi', 'ifir_ssfp', 'asl_mra']; 
                    return order.indexOf(a.id) - order.indexOf(b.id);
                });
            }
            
            // Sắp xếp nhóm GRE và Advanced
            if (groupedSequences['gradient-echo']) {
                 groupedSequences['gradient-echo'].sort((a, b) => {
                    const order = ['gre_t2star', 'swi', 't1_3d_mprage', 't1_3d_dynamic', 'bssfpmra', 'ciss'];
                    return order.indexOf(a.id) - order.indexOf(b.id);
                });
            }
            if (groupedSequences['advanced-maps']) {
                 groupedSequences['advanced-maps'].sort((a, b) => {
                    const order = ['blade_propeller', 'warp_mavric', 'psir', 't2star_map', 'bolus_trak', 'ti_scout'];
                    return order.indexOf(a.id) - order.indexOf(b.id);
                });
            }
            // Sắp xếp nhóm Diffusion
            if (groupedSequences['diffusion']) {
                 groupedSequences['diffusion'].sort((a, b) => {
                    const order = ['dwi', 'adc', 'dwibs'];
                    return order.indexOf(a.id) - order.indexOf(b.id);
                });
            }

            let sidebarHtml = '<div class="space-y-4">'; 
            let contentHtml = '';

            // ---- Xử lý TẤT CẢ CÁC NHÓM một cách tự động ----
            for (const groupId in groupStyles) {
                const sequencesInGroup = groupedSequences[groupId];
                const style = groupStyles[groupId];
                
                if (sequencesInGroup && sequencesInGroup.length > 0) {
                    // === ĐÃ SỬA: Truy cập 'title' và 'genericName' qua 'currentLang' ===
                    sidebarHtml += `<div id="sidebar-${groupId}-group" class="sidebar-group mt-4 first:mt-0">
                                        <h3 class="text-sm uppercase font-bold ${style.textDark} mb-2 flex justify-between items-center cursor-pointer" data-group-id="${groupId}">
                                            <span>${style.title[currentLang]}</span>
                                            <svg class="w-5 h-5 toggle-icon transform transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                                        </h3>
                                        <div class="space-y-1" id="sidebar-${groupId}-links">`;
                    sequencesInGroup.forEach(seq => {
                        sidebarHtml += `<a href="#${seq.id}" class="sidebar-link block py-2 px-3 rounded-md text-sm font-medium text-gray-600 ${style.hover} hover:${style.textDark} transition-colors duration-150">${seq.genericName[currentLang]}</a>`;
                    });
                    sidebarHtml += `</div></div>`;

                    // Thêm vào Nội dung chính
                    contentHtml += `<h2 id="${groupId}-group" class="group-heading text-3xl font-bold mt-12 mb-6 ${style.textDark} pt-5 flex justify-between items-center cursor-pointer" data-group-id="${groupId}">
                                        <span>${style.title[currentLang]}</span>
                                        <svg class="w-6 h-6 toggle-icon transform transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                                    </h2>`;
                    // === ĐÃ SỬA: Đổi 'lg:grid-cols-2' -> 'md:grid-cols-2' để cân đối trên iPad ===
                    contentHtml += `<div id="${groupId}-grid" class="grid grid-cols-1 md:grid-cols-2 gap-6">`;
                    sequencesInGroup.forEach(seq => {
                        contentHtml += generateCardHtml(seq);
                    });
                    contentHtml += `</div>`;
                }
            }
            
            sidebarHtml += '</div>'; // Đóng thẻ space-y-4

            // Hiển thị nếu không có dữ liệu
            // === ĐÃ SỬA: Lấy text trực tiếp, bỏ data-lang-key ===
            if (sequences.length === 0) {
                container.innerHTML = `<p class="text-gray-600 text-lg col-span-full text-center">${staticTranslations['ui.no_sequences_found'][currentLang]}</p>`;
                sidebarNav.innerHTML = `<p class="text-gray-600 text-sm">${staticTranslations['ui.no_data'][currentLang]}</p>`;
                return;
            }

            // Sửa lỗi sidebar group đầu tiên không có margin-top
            sidebarNav.innerHTML = sidebarHtml.replace('mt-4 first:mt-0', ''); // Xóa margin-top của nhóm đầu tiên
            container.innerHTML = contentHtml.replace('mt-12', ''); // Xóa margin-top của nhóm đầu tiên
        }

        // Hàm lọc chuỗi xung
        // === ĐÃ SỬA: Không cần thay đổi nhiều, 'textContent' sẽ lấy text đã được dịch ===
        function filterSequences() {
            const searchTerm = searchInput.value.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, ""); // Chuẩn hóa, bỏ dấu tiếng Việt
            
            const allCards = document.querySelectorAll('.sequence-card');
            const allSidebarLinks = document.querySelectorAll('.sidebar-link');
            const visibleCardIds = new Set();

            // 1. Lọc các thẻ Card (Nội dung chính)
            allCards.forEach(card => {
                const cardText = card.textContent.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
                if (cardText.includes(searchTerm)) {
                    card.classList.remove('hidden');
                    visibleCardIds.add(card.id);
                } else {
                    card.classList.add('hidden');
                }
            });

            // 2. Lọc các link ở Sidebar
            allSidebarLinks.forEach(link => {
                const targetId = link.hash.substring(1); // hash là '#t1w', substring(1) là 't1w'
                if (visibleCardIds.has(targetId)) {
                    link.classList.remove('hidden');
                } else {
                    link.classList.add('hidden');
                }
            });

            // 3. Ẩn/Hiện các tiêu đề nhóm (cả ở Sidebar và Nội dung chính)
            document.querySelectorAll('.group-heading').forEach(heading => {
                const gridId = heading.id.replace('-group', '-grid'); // 'spin-echo-group' -> 'spin-echo-grid'
                const grid = document.getElementById(gridId);
                if (grid) {
                    const visibleCardsInGroup = grid.querySelectorAll('.sequence-card:not(.hidden)');
                    if (visibleCardsInGroup.length === 0) {
                        heading.classList.add('hidden');
                    } else {
                        heading.classList.remove('hidden');
                    }
                }
            });

            document.querySelectorAll('.sidebar-group').forEach(group => {
                const visibleLinksInGroup = group.querySelectorAll('.sidebar-link:not(.hidden)');
                if (visibleLinksInGroup.length === 0) {
                    group.classList.add('hidden');
                } else {
                    group.classList.remove('hidden');
                }
            });
        }
        
        // ======================================================
        // === HÀM SETLANGUAGE (ĐA NGÔN NGỮ) MỚI ===
        // ======================================================
        function setLanguage(lang) {
            if (lang !== 'vi' && lang !== 'en') {
                lang = 'vi'; // Mặc định
            }
            currentLang = lang;
            localStorage.setItem('mri_lang', lang);
            document.documentElement.lang = lang;

            // Cập nhật nút active
            document.getElementById('lang-vi').classList.toggle('active', lang === 'vi');
            document.getElementById('lang-en').classList.toggle('active', lang === 'en');

            // 1. Dịch các UI tĩnh
            document.querySelectorAll('[data-lang-key]').forEach(element => {
                const key = element.dataset.langKey;
                if (staticTranslations[key] && staticTranslations[key][lang]) {
                    if (element.tagName === 'INPUT') {
                        element.placeholder = staticTranslations[key][lang];
                    } else {
                        element.textContent = staticTranslations[key][lang];
                    }
                }
            });

            // 2. Vẽ lại toàn bộ danh sách chuỗi xung với ngôn ngữ mới
            // (Hàm 'renderSequences' và 'generateCardHtml' đã được thiết kế
            // để tự động sử dụng biến 'currentLang' toàn cục)
            renderSequences(sequenceData);
            
            // 3. Gắn lại sự kiện cho Lightbox và Collapse (vì 'container' đã bị vẽ lại)
            setupDynamicEventListeners();
            
            // 4. (Tùy chọn) Kích hoạt lại bộ lọc nếu có
            if (searchInput.value) {
                filterSequences();
            }
        }

        // ======================================================
        // === HÀM GẮN SỰ KIỆN ĐỘNG (SAU KHI RENDER) ===
        // ======================================================
        function setupDynamicEventListeners() {
            // LOGIC LIGHTBOX (PHÓNG TO ẢNH)
            const lightbox = document.getElementById('lightbox');
            const lightboxImg = document.getElementById('lightbox-img');
            const lightboxClose = document.getElementById('lightbox-close');

            if (lightbox && lightboxImg && lightboxClose && container) {
                container.addEventListener('click', (e) => {
                    if (e.target.tagName === 'IMG' && e.target.closest('.sequence-card')) {
                        lightboxImg.src = e.target.src;
                        lightbox.classList.remove('hidden');
                    }
                });
            }

            // LOGIC ĐÓNG/MỞ NHÓM (COLLAPSE)
            // (Sự kiện này gắn vào 'document' nên không cần gắn lại)
            
            // LOGIC MENU "THÔNG MINH" (ACTIVE SCROLL)
            const contentContainer = document.getElementById('sequence-container');
            const allLinks = document.querySelectorAll('.sidebar-link');
            const sections = document.querySelectorAll('.sequence-card');

            const observerOptions = {
                root: contentContainer, 
                rootMargin: '0px 0px -50% 0px', 
                threshold: 0 
            };

            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        const id = entry.target.id;
                        const activeLink = document.querySelector(`.sidebar-link[href="#${id}"]`);
                        
                        allLinks.forEach(link => link.classList.remove('bg-blue-100', 'text-blue-700', 'font-semibold'));
                        
                        if (activeLink) {
                            activeLink.classList.add('bg-blue-100', 'text-blue-700', 'font-semibold');
                        }
                    }
                });
            }, observerOptions);

            sections.forEach(section => {
                if(section) observer.observe(section);
            });
        }


        // Gắn sự kiện
        // 1. Hiển thị tất cả khi tải trang
        document.addEventListener('DOMContentLoaded', () => {
            
            // *** PHẦN MỚI: Thêm logic cho menu mobile ***
            const mobileMenuButton = document.getElementById('mobile-menu-button');
            const sidebar = document.getElementById('sidebar-nav');

            mobileMenuButton.addEventListener('click', () => {
                sidebar.classList.toggle('hidden');
                
                const icon = mobileMenuButton.querySelector('svg');
                if (sidebar.classList.contains('hidden')) {
                    icon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"></path>`;
                } else {
                    icon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>`;
                }
            });
            
            // *** PHẦN MỚI: Đóng menu khi nhấp vào link ***
            sidebar.addEventListener('click', (e) => {
                if (window.innerWidth < 768 && e.target.closest('a')) {
                    sidebar.classList.add('hidden');
                    const icon = mobileMenuButton.querySelector('svg');
                    icon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"></path>`;
                }
            });
            
            // ======================================================
            // === CẢI TIẾN 1: LOGIC NÚT VỀ ĐẦU TRANG ===
            // ======================================================
            const contentContainer = document.getElementById('sequence-container');
            const scrollTopBtn = document.getElementById('scrollToTopBtn');

            if (contentContainer && scrollTopBtn) {
                contentContainer.addEventListener('scroll', () => {
                    if (contentContainer.scrollTop > 300) {
                        scrollTopBtn.classList.remove('hidden');
                    } else {
                        scrollTopBtn.classList.add('hidden');
                    }
                });
                scrollTopBtn.addEventListener('click', () => {
                    contentContainer.scrollTo({ top: 0, behavior: 'smooth' });
                });
            }

            // ======================================================
            // === CẢI TIẾN 2: LOGIC LIGHTBOX (ĐÓNG) ===
            // ======================================================
            const lightbox = document.getElementById('lightbox');
            const lightboxImg = document.getElementById('lightbox-img');
            const lightboxClose = document.getElementById('lightbox-close');

            if (lightbox && lightboxImg && lightboxClose) {
                lightboxClose.addEventListener('click', () => {
                    lightbox.classList.add('hidden');
                    lightboxImg.src = ''; 
                });
                lightbox.addEventListener('click', (e) => {
                    if (e.target === lightbox) { 
                        lightbox.classList.add('hidden');
                        lightboxImg.src = '';
                    }
                });
            }

            // ======================================================
            // === CẢI TIẾN 3: LOGIC ĐÓNG/MỞ NHÓM (COLLAPSE) ===
            // ======================================================
            document.addEventListener('click', (e) => {
                const heading = e.target.closest('[data-group-id]');
                if (!heading) return; 

                const groupId = heading.dataset.groupId;
                const grid = document.getElementById(`${groupId}-grid`);
                const sidebarLinks = document.getElementById(`sidebar-${groupId}-links`);
                const icons = document.querySelectorAll(`[data-group-id="${groupId}"] .toggle-icon`);

                if (grid && sidebarLinks) {
                    grid.classList.toggle('hidden');
                    sidebarLinks.classList.toggle('hidden');
                    icons.forEach(icon => icon.classList.toggle('rotate-180'));
                }
            });

            // ======================================================
            // === LOGIC CHÍNH: KHỞI TẠO ĐA NGÔN NGỮ ===
            // ======================================================
            
            // Gắn sự kiện cho nút ngôn ngữ
            document.getElementById('lang-vi').addEventListener('click', () => setLanguage('vi'));
            document.getElementById('lang-en').addEventListener('click', () => setLanguage('en'));

            // Tải ngôn ngữ đã lưu hoặc mặc định là 'vi'
            const savedLang = localStorage.getItem('mri_lang') || 'vi';
            setLanguage(savedLang);

        }); // Kết thúc DOMContentLoaded

        // 2. Lọc khi người dùng gõ
        searchInput.addEventListener('keyup', filterSequences);

    </script>
