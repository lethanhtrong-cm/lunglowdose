<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedExam Analytics</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0",
            "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
            "lucide-react": "https://esm.sh/lucide-react@0.344.0?deps=react@18.2.0",
            "firebase/app": "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js",
            "firebase/auth": "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js",
            "firebase/firestore": "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js"
        }
    }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0f172a; color: #e2e8f0; margin: 0; padding: 0; }
        .glass-panel { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .glass-input { background: rgba(0, 0, 0, 0.3); border: 1px solid rgba(255, 255, 255, 0.05); }
        .animate-in { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .pulse-dot { animation: pulse-dot 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse-dot { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        /* Hiệu ứng Flash khi dữ liệu thay đổi */
        @keyframes flash-highlight {
            0% { box-shadow: 0 0 0 0 rgba(255, 255, 255, 0); background-color: rgba(30, 41, 59, 0.7); }
            50% { box-shadow: 0 0 20px 0 rgba(16, 185, 129, 0.3); background-color: rgba(16, 185, 129, 0.2); border-color: rgba(16, 185, 129, 0.5); }
            100% { box-shadow: 0 0 0 0 rgba(255, 255, 255, 0); background-color: rgba(30, 41, 59, 0.7); }
        }
        .data-changed { animation: flash-highlight 1.5s ease-out; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #475569; border-radius: 10px; }
    </style>
</head>
<body class="antialiased custom-scrollbar">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useMemo, useRef } from 'react';
        import { createRoot } from 'react-dom/client';
        import { initializeApp } from 'firebase/app';
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut, signInWithCustomToken, signInAnonymously } from 'firebase/auth';
        import { getFirestore, collection, doc, updateDoc, deleteDoc, onSnapshot, query, collectionGroup, orderBy, limit } from 'firebase/firestore';
        import { 
            ShieldCheck, LogOut, Search, Trash2, CheckCircle2, AlertCircle, 
            Trophy, MessageSquare, Flag, Star, Check, ExternalLink, Loader2, BarChart2, UserX, Sigma,
            LayoutDashboard, Users, Zap, FileText, Crown, Activity, Clock, Pencil, X, Database, Settings, RefreshCw, History, GraduationCap
        } from 'lucide-react';

        // --- CẤU HÌNH FIREBASE ---
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {
            apiKey: "AIzaSyDqdo_DJIWa5iqxiCgBq-0iGX7f9sr6soo",
            authDomain: "rt-examination.firebaseapp.com",
            projectId: "rt-examination",
            storageBucket: "rt-examination.firebasestorage.app",
            messagingSenderId: "920482699854",
            appId: "1:920482699854:web:44f9b0d735bdc001c6c11f"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        // Fallback App ID
        const defaultAppId = typeof __app_id !== 'undefined' ? __app_id : 'med-exam-pro-html';
        
        const ADMIN_EMAILS = ["thanhtrong.yds@gmail.com", "vnrad.tech@gmail.com", "test@gmail.com"];

        // --- UI COMPONENTS ---
        
        const Toast = ({ message, type, onClose }) => {
            useEffect(() => { const timer = setTimeout(onClose, 3000); return () => clearTimeout(timer); }, [onClose]);
            const styles = { success: "bg-emerald-500/20 border-emerald-500/40 text-emerald-400", error: "bg-red-500/20 border-red-500/40 text-red-400", info: "bg-blue-500/20 border-blue-500/40 text-blue-400" };
            return (
                <div className={`fixed bottom-6 right-6 px-6 py-4 rounded-2xl border ${styles[type] || styles.info} shadow-2xl flex items-center gap-3 animate-in z-[100] backdrop-blur-xl max-w-sm`}>
                    {type === 'error' ? <AlertCircle size={20}/> : <CheckCircle2 size={20}/>}<span className="font-bold text-sm leading-tight">{message}</span>
                </div>
            );
        };

        const StatCard = ({ title, value, icon: Icon, color, subText }) => {
            const [changed, setChanged] = useState(false);
            const prevValue = useRef(value);

            useEffect(() => {
                if (prevValue.current !== value) {
                    setChanged(true);
                    const timer = setTimeout(() => setChanged(false), 1500);
                    prevValue.current = value;
                    return () => clearTimeout(timer);
                }
            }, [value]);

            return (
                <div className={`glass-panel p-6 rounded-[2rem] flex flex-col justify-between h-40 relative overflow-hidden group hover:bg-white/5 transition-all ${changed ? 'data-changed' : ''}`}>
                    <div className={`absolute top-0 right-0 p-4 opacity-10 group-hover:opacity-20 transition-opacity ${color}`}>
                        <Icon size={80} />
                    </div>
                    <div className="flex items-center gap-2 mb-2">
                        <div className={`p-2 rounded-xl bg-slate-800 ${color} bg-opacity-20 text-white`}>
                            <Icon size={18} className={color.replace('bg-', 'text-')} />
                        </div>
                        <span className="text-[10px] font-black uppercase tracking-widest text-slate-400">{title}</span>
                    </div>
                    <div>
                        <div className={`text-4xl font-black transition-all ${changed ? 'scale-110 text-white' : color.replace('bg-', 'text-')}`}>{value}</div>
                        {subText && <div className="text-[10px] text-slate-500 font-bold mt-1">{subText}</div>}
                    </div>
                </div>
            );
        };

        const Dashboard = ({ user }) => {
            const [tab, setTab] = useState('dashboard');
            const [scores, setScores] = useState([]);
            const [rawHistory, setRawHistory] = useState([]);
            const [reviews, setReviews] = useState([]);
            const [reports, setReports] = useState([]);
            const [search, setSearch] = useState('');
            const [toast, setToast] = useState(null);
            
            // App ID Management
            const [currentAppId, setCurrentAppId] = useState(defaultAppId);
            const [manualAppId, setManualAppId] = useState(defaultAppId);
            const [isAutoDetected, setIsAutoDetected] = useState(false);
            
            // Time trigger để làm mới trạng thái Online/Live mỗi 5 giây
            const [now, setNow] = useState(Date.now() / 1000);

            useEffect(() => {
                const timer = setInterval(() => setNow(Date.now() / 1000), 5000); // Cập nhật mỗi 5 giây
                return () => clearInterval(timer);
            }, []);

            const [dbStats, setDbStats] = useState({ 
                students: null, exams: null, vip: 0
            });
            const [editingReview, setEditingReview] = useState(null);
            
            const notify = (message, type = 'info') => setToast({ message, type });

            // 1. Listen to GLOBAL history
            useEffect(() => {
                const qHistory = query(collectionGroup(db, 'history'));
                const unsubHistory = onSnapshot(qHistory, (snapshot) => {
                    const rawData = snapshot.docs.map(d => ({...d.data(), id: d.id, path: d.ref.path}));
                    
                    // Auto detect App ID logic (giữ nguyên)
                    if (!isAutoDetected && rawData.length > 0 && currentAppId === defaultAppId) {
                        try {
                            const firstPath = rawData[0].path;
                            const segments = firstPath.split('/');
                            if (segments.length >= 2 && segments[0] === 'artifacts') {
                                const detectedId = segments[1];
                                if (detectedId && detectedId !== currentAppId) {
                                    setCurrentAppId(detectedId);
                                    setManualAppId(detectedId);
                                    setIsAutoDetected(true);
                                    notify(`Đã tự động kết nối App ID: ${detectedId}`, "success");
                                }
                            }
                        } catch (e) {}
                    }

                    // Sort history for processing
                    rawData.sort((a, b) => (b.date?.seconds || 0) - (a.date?.seconds || 0));
                    setRawHistory(rawData);

                    // Ranking logic
                    const userMap = {};
                    rawData.forEach(item => {
                        const key = item.userId || item.email;
                        if (!key) return;
                        if (!userMap[key]) {
                            userMap[key] = { userId: item.userId, email: item.email, displayName: item.displayName, totalScore: 0, examCount: 0, latestDate: item.date };
                        }
                        userMap[key].totalScore += parseFloat(String(item.score || 0));
                        userMap[key].examCount += 1;
                        if ((item.date?.seconds || 0) > (userMap[key].latestDate?.seconds || 0)) {
                            userMap[key].latestDate = item.date;
                            if (item.displayName) userMap[key].displayName = item.displayName;
                        }
                    });
                    setScores(Object.values(userMap).sort((a, b) => b.totalScore - a.totalScore));

                }, (error) => console.error("History Error:", error));

                return () => unsubHistory();
            }, [currentAppId]); 

            // 2. Listen to SPECIFIC collections
            useEffect(() => {
                if (!currentAppId) return;
                const unsubs = [];
                setDbStats(prev => ({ ...prev, exams: null, students: null, vip: 0 }));

                const qExams = query(collection(db, 'artifacts', currentAppId, 'public', 'data', 'exams'));
                unsubs.push(onSnapshot(qExams, (snap) => setDbStats(prev => ({ ...prev, exams: snap.size })), e => {}));

                const qUsers = query(collection(db, 'artifacts', currentAppId, 'public', 'data', 'users'));
                unsubs.push(onSnapshot(qUsers, (snap) => {
                    const users = snap.docs.map(d => d.data());
                    const vipCount = users.filter(u => {
                        const fieldsToCheck = [u.isPremium, u.isVIP, u.vip, u.isVip, u.plan, u.role, u.tier, u.type, u.accountType, u.subscription, u.goi];
                        const hasVipField = fieldsToCheck.some(val => {
                            if (val === true) return true;
                            if (typeof val === 'string') {
                                const s = val.toLowerCase();
                                return s.includes('vip') || s.includes('premium') || s.includes('pro') || s.includes('access');
                            }
                            if (val === 1) return true;
                            return false;
                        });
                        if (!hasVipField) {
                            const jsonString = JSON.stringify(u).toLowerCase();
                            return jsonString.includes('"vip') || jsonString.includes('vip"') || jsonString.includes('vip ') || jsonString.includes('premium') || jsonString.includes('access');
                        }
                        return hasVipField;
                    }).length;
                    setDbStats(prev => ({ ...prev, students: snap.size, vip: vipCount }));
                }, e => {}));

                unsubs.push(onSnapshot(query(collection(db, 'artifacts', currentAppId, 'public', 'data', 'reviews'), orderBy('createdAt', 'desc')), s => setReviews(s.docs.map(d => ({...d.data(), id: d.id})))));
                unsubs.push(onSnapshot(query(collection(db, 'artifacts', currentAppId, 'public', 'data', 'reports'), orderBy('createdAt', 'desc')), s => setReports(s.docs.map(d => ({...d.data(), id: d.id})))));

                return () => unsubs.forEach(fn => fn());
            }, [currentAppId]);

            // --- COMPUTED LIVE STATS (Recalculated every 5 seconds via 'now') ---
            const liveStats = useMemo(() => {
                const ONLINE_THRESHOLD = 30; // 30 giây
                // Đang thi: Hoạt động trong 5 phút và CHƯA CÓ ĐIỂM
                const EXAM_ACTIVE_THRESHOLD = 5 * 60; 

                const activeUsers = new Set();
                const examUsers = new Map(); // Dùng Map để lưu user duy nhất đang thi

                rawHistory.forEach(item => {
                    const timeDiff = now - (item.date?.seconds || 0);
                    const userKey = item.userId || item.email;
                    if (!userKey) return;

                    // Logic Online: Chỉ cần có bất kỳ hoạt động nào trong 30s
                    if (timeDiff < ONLINE_THRESHOLD) {
                        activeUsers.add(userKey);
                    }

                    // Logic Đang Thi:
                    // 1. Hoạt động gần đây (< 5 phút)
                    // 2. Quan trọng: Chưa có điểm (score == null/undefined) HOẶC status là đang làm
                    // Nếu đã có điểm nghĩa là đã nộp bài -> Không tính là đang thi
                    if (timeDiff < EXAM_ACTIVE_THRESHOLD) {
                        const hasScore = item.score !== undefined && item.score !== null && item.score !== '';
                        // Nếu chưa có điểm, coi như đang thi
                        if (!hasScore) {
                            // Lưu thông tin để hiển thị card
                            if (!examUsers.has(userKey)) {
                                examUsers.set(userKey, {
                                    name: getUserDisplayName(item),
                                    exam: item.examTitle || 'Đang làm bài...',
                                    time: item.date
                                });
                            }
                        }
                    }
                });

                return {
                    online: Math.max(activeUsers.size, 1), // Ít nhất là 1 (admin)
                    liveCount: examUsers.size,
                    liveList: Array.from(examUsers.values()),
                    students: dbStats.students !== null ? dbStats.students : scores.length,
                    vip: dbStats.vip,
                    exams: dbStats.exams !== null ? dbStats.exams : 0
                };
            }, [rawHistory, dbStats, scores, now]);

            const handleSaveAppId = () => {
                if (manualAppId && manualAppId.trim() !== "") {
                    setCurrentAppId(manualAppId.trim());
                    notify("Đã cập nhật App ID nguồn dữ liệu", "success");
                    setTab('dashboard');
                }
            };

            const deleteItem = async (collectionName, id) => {
                if(confirm("Xóa mục này?")) {
                    try { await deleteDoc(doc(db, 'artifacts', currentAppId, 'public', 'data', collectionName, id)); notify("Đã xóa", "success"); } 
                    catch (e) { notify("Lỗi: " + e.message, "error"); }
                }
            };

            const resolveReport = async (id) => {
                try { await updateDoc(doc(db, 'artifacts', currentAppId, 'public', 'data', 'reports', id), { status: 'resolved' }); notify("Đã xử lý", "success"); } 
                catch (e) { notify("Lỗi: " + e.message, "error"); }
            };

            const handleUpdateReview = async () => {
                if (!editingReview) return;
                try {
                    await updateDoc(doc(db, 'artifacts', currentAppId, 'public', 'data', 'reviews', editingReview.id), {
                        feedback: editingReview.feedback,
                        rating: editingReview.rating
                    });
                    notify("Đã cập nhật đánh giá", "success");
                    setEditingReview(null);
                } catch (e) { notify("Lỗi cập nhật: " + e.message, "error"); }
            };

            const formatDateTime = (ts) => ts?.toDate ? ts.toDate().toLocaleString('vi-VN') : '---';
            const getReasonText = (reason) => { const map = { 'wrong_answer': 'Đáp án sai', 'typo': 'Lỗi chính tả', 'confusing': 'Khó hiểu', 'other': 'Khác' }; return map[reason] || reason; };
            const getUserDisplayName = (user) => (user.displayName && user.displayName.trim() !== "") ? user.displayName : (user.email || `User #${user.userId?.slice(0, 5)}`);

            return (
                <div className="flex min-h-screen">
                    {/* EDIT REVIEW MODAL */}
                    {editingReview && (
                        <div className="fixed inset-0 z-[60] flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm animate-in">
                            <div className="glass-panel w-full max-w-lg p-8 rounded-[2rem] shadow-2xl relative border border-slate-600">
                                <button onClick={() => setEditingReview(null)} className="absolute top-4 right-4 p-2 text-slate-400 hover:text-white hover:bg-white/10 rounded-full transition-all"><X size={20}/></button>
                                <h3 className="text-xl font-black text-white mb-6 flex items-center gap-2"><Pencil size={20} className="text-cyan-400"/>Chỉnh sửa đánh giá</h3>
                                <div className="space-y-6">
                                    <div>
                                        <div className="flex justify-between mb-2"><label className="text-xs font-bold text-slate-400 uppercase tracking-widest block">Người đánh giá</label><span className="text-xs text-slate-500 font-mono">{formatDateTime(editingReview.createdAt)}</span></div>
                                        <div className="glass-input p-3 rounded-xl text-slate-300 font-bold text-sm bg-black/20">{getUserDisplayName(editingReview)}</div>
                                    </div>
                                    <div>
                                        <label className="text-xs font-bold text-slate-400 uppercase tracking-widest block mb-2">Xếp hạng</label>
                                        <div className="flex gap-2">{[1, 2, 3, 4, 5].map(star => (<button key={star} onClick={() => setEditingReview({...editingReview, rating: star})} type="button" className={`p-3 rounded-xl transition-all ${editingReview.rating >= star ? 'text-yellow-400 bg-yellow-400/10 ring-1 ring-yellow-400/30' : 'text-slate-600 bg-slate-800 hover:bg-slate-700'}`}><Star size={24} fill={editingReview.rating >= star ? "currentColor" : "none"} /></button>))}</div>
                                    </div>
                                    <div>
                                        <label className="text-xs font-bold text-slate-400 uppercase tracking-widest block mb-2">Nội dung phản hồi</label>
                                        <textarea className="w-full glass-input rounded-xl p-4 outline-none focus:border-cyan-500 font-medium text-white transition-all min-h-[120px] resize-none" value={editingReview.feedback} onChange={e => setEditingReview({...editingReview, feedback: e.target.value})} placeholder="Nhập nội dung đánh giá..."/>
                                    </div>
                                </div>
                                <div className="flex justify-end gap-3 mt-8">
                                    <button onClick={() => setEditingReview(null)} className="px-6 py-3 rounded-xl font-bold text-slate-400 hover:bg-slate-800 transition-all text-sm">Hủy bỏ</button>
                                    <button onClick={handleUpdateReview} className="px-6 py-3 rounded-xl bg-cyan-600 hover:bg-cyan-500 text-white font-bold shadow-lg shadow-cyan-500/20 transition-all text-sm flex items-center gap-2"><Check size={16}/> Lưu thay đổi</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* SIDEBAR */}
                    <aside className="w-72 bg-slate-900/50 border-r border-slate-700/50 flex flex-col fixed h-full z-40 backdrop-blur-xl">
                        <div className="p-8 border-b border-slate-700/50 flex items-center gap-4 text-cyan-400 font-black text-2xl tracking-tighter">
                            <BarChart2 size={32}/>
                            <div className="leading-none text-white">ANALYTICS<br/><small className="text-slate-500 text-[10px] tracking-[0.3em] uppercase">Portal</small></div>
                        </div>
                        <nav className="flex-1 p-6 space-y-4 mt-4">
                            {[
                                { id: 'dashboard', label: 'Live Monitor', icon: LayoutDashboard },
                                { id: 'submissions', label: 'Lịch sử nộp bài', icon: History }, // Tab mới
                                { id: 'score_rank', label: 'Bảng xếp hạng', icon: Trophy },
                                { id: 'reviews', label: 'Đánh giá & Góp ý', icon: MessageSquare, count: reviews.length },
                                { id: 'reports', label: 'Báo cáo lỗi', icon: Flag, count: reports.filter(r => r.status === 'pending').length },
                                { id: 'settings', label: 'Cấu hình', icon: Settings }
                            ].map(item => (
                                <button key={item.id} onClick={()=>setTab(item.id)} className={`w-full flex items-center justify-between px-6 py-5 rounded-2xl transition-all ${tab === item.id ? 'bg-cyan-600 text-white shadow-lg shadow-cyan-500/20' : 'text-slate-400 hover:bg-white/5'}`}>
                                    <div className="flex items-center gap-4"><item.icon size={20}/><span className="font-bold text-sm">{item.label}</span></div>
                                    {item.count > 0 && <span className="bg-red-500 text-[10px] font-black px-2 py-1 rounded-full">{item.count}</span>}
                                </button>
                            ))}
                        </nav>
                        <div className="p-8 border-t border-slate-700/50">
                            <button onClick={()=>signOut(auth)} className="w-full flex items-center justify-center gap-3 px-6 py-4 text-slate-500 hover:text-red-400 transition-all font-bold text-xs uppercase tracking-widest"><LogOut size={18}/> Đăng xuất</button>
                        </div>
                    </aside>

                    {/* MAIN CONTENT */}
                    <main className="flex-1 ml-72 p-12">
                        <div className="flex justify-between items-end mb-12">
                            <div>
                                <h1 className="text-4xl font-black text-white tracking-tighter capitalize">
                                    {tab === 'dashboard' ? 'Dashboard' : tab === 'submissions' ? 'Lịch Sử Nộp Bài' : tab === 'score_rank' ? 'Bảng Xếp Hạng' : tab === 'reviews' ? 'Phản Hồi' : tab === 'reports' ? 'Báo Cáo Lỗi' : 'Cấu Hình Hệ Thống'}
                                </h1>
                                {tab === 'score_rank' && <p className="text-slate-400 text-sm mt-2 flex items-center gap-2"><Sigma size={14}/> Xếp hạng theo tổng điểm tích lũy</p>}
                                {tab === 'dashboard' && (
                                    <div className="text-emerald-400 text-sm mt-2 flex items-center gap-3">
                                        <span className="flex items-center gap-2 animate-pulse"><div className="w-2 h-2 rounded-full bg-emerald-400"></div> Live Sync</span>
                                        <span className="text-slate-600">|</span>
                                        <span className="flex items-center gap-1 text-slate-400 text-xs font-mono bg-slate-800 px-2 py-1 rounded border border-slate-700"><Database size={10}/> {currentAppId}</span>
                                    </div>
                                )}
                            </div>
                            {tab !== 'settings' && (
                                <div className="relative group">
                                    <Search className="absolute left-4 top-3.5 text-slate-500" size={20}/>
                                    <input className="bg-slate-800 border border-slate-700 rounded-2xl pl-12 pr-6 py-3 w-80 outline-none focus:border-cyan-500 font-bold text-white transition-all" placeholder="Tìm kiếm dữ liệu..." value={search} onChange={e=>setSearch(e.target.value)}/>
                                </div>
                            )}
                        </div>

                        <div className="animate-in">
                            {tab === 'dashboard' && (
                                <div className="space-y-8">
                                    {/* 4 CARDS - Đã xóa VIP Card */}
                                    <div className="grid grid-cols-4 gap-6">
                                        <StatCard title="Đang Online" value={liveStats.online} icon={Activity} color="text-emerald-400" subText="Hoạt động < 30s" />
                                        <StatCard title="Đang Thi" value={liveStats.liveCount} icon={Zap} color="text-blue-400" subText="Đang làm bài..." />
                                        <StatCard title="Học Viên" value={liveStats.students} icon={Users} color="text-purple-400" subText="Đã đăng ký" />
                                        <StatCard title="Đề Thi" value={liveStats.exams} icon={FileText} color="text-cyan-400" subText="Tổng số đề" />
                                    </div>

                                    {/* CARD DANH SÁCH ĐANG THI (ACTIVE EXAM SESSIONS) */}
                                    <div className="glass-panel rounded-[2rem] p-8 min-h-[300px]">
                                        <div className="flex items-center gap-3 mb-6">
                                            <div className="bg-blue-500/20 p-2 rounded-full text-blue-400 animate-pulse"><GraduationCap size={24}/></div>
                                            <h2 className="text-xl font-bold text-white uppercase tracking-widest">
                                                Học viên đang làm bài ({liveStats.liveCount})
                                            </h2>
                                        </div>
                                        
                                        <div className="grid grid-cols-3 gap-4">
                                            {liveStats.liveList.map((user, idx) => (
                                                <div key={idx} className="bg-slate-800/50 border border-slate-700/50 p-4 rounded-2xl flex items-center gap-4 hover:bg-slate-700/50 transition-all animate-in">
                                                    <div className="w-10 h-10 rounded-full bg-blue-600 flex items-center justify-center font-bold text-white text-xs">
                                                        {idx + 1}
                                                    </div>
                                                    <div className="overflow-hidden">
                                                        <div className="font-bold text-white truncate">{user.name}</div>
                                                        <div className="text-xs text-blue-400 truncate flex items-center gap-1">
                                                            <div className="w-1.5 h-1.5 rounded-full bg-blue-400 animate-pulse"></div>
                                                            {user.exam}
                                                        </div>
                                                    </div>
                                                </div>
                                            ))}
                                            
                                            {liveStats.liveList.length === 0 && (
                                                <div className="col-span-3 py-10 text-center text-slate-500 border border-dashed border-slate-700 rounded-2xl">
                                                    <Zap size={32} className="mx-auto mb-2 opacity-50"/>
                                                    <p className="font-bold text-sm">Chưa có ai đang làm bài thi</p>
                                                    <p className="text-[10px] mt-1">Dữ liệu sẽ xuất hiện khi có người bắt đầu thi</p>
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                </div>
                            )}

                            {/* TAB MỚI: LỊCH SỬ NỘP BÀI (Chuyển từ dashboard cũ sang) */}
                            {tab === 'submissions' && (
                                <div className="glass-panel rounded-[2rem] overflow-hidden">
                                    <div className="p-6 border-b border-slate-700/50 bg-slate-800/20 flex justify-between items-center">
                                        <div className="flex items-center gap-3">
                                            <History className="text-orange-400" size={24}/>
                                            <h2 className="text-lg font-bold text-white">Lịch sử nộp bài gần đây</h2>
                                        </div>
                                        <span className="text-xs font-mono text-slate-500 bg-slate-800 px-2 py-1 rounded">Real-time Feed</span>
                                    </div>
                                    
                                    <div className="p-6 space-y-4">
                                        {rawHistory.filter(item => {
                                            // Chỉ hiện những bài đã có điểm (đã nộp)
                                            const hasScore = item.score !== undefined && item.score !== null && item.score !== '';
                                            return hasScore && (getUserDisplayName(item).toLowerCase().includes(search.toLowerCase()) || (item.examTitle||'').toLowerCase().includes(search.toLowerCase()));
                                        }).slice(0, 20).map((item, idx) => (
                                            <div key={item.id} className="flex items-center justify-between p-4 bg-slate-800/50 rounded-2xl border border-slate-700/50 hover:bg-slate-700/50 transition-colors animate-in" style={{animationDelay: `${idx * 0.05}s`}}>
                                                <div className="flex items-center gap-4">
                                                    <div className="w-10 h-10 rounded-full bg-slate-700 flex items-center justify-center font-bold text-slate-400">{idx + 1}</div>
                                                    <div>
                                                        <div className="font-bold text-white">{getUserDisplayName(item)}</div>
                                                        <div className="text-xs text-slate-400 flex items-center gap-2"><Clock size={12}/> {formatDateTime(item.date)}<span className="text-slate-600">|</span><span className="text-cyan-400">{item.examTitle || 'Đề không tên'}</span></div>
                                                    </div>
                                                </div>
                                                <div className="text-right">
                                                    <div className={`font-black text-xl ${parseFloat(item.score)>=9?'text-emerald-400':parseFloat(item.score)>=5?'text-blue-400':'text-red-400'}`}>{item.score}</div>
                                                    <div className="text-[10px] font-bold text-slate-500 uppercase">Điểm số</div>
                                                </div>
                                            </div>
                                        ))}
                                        
                                        {rawHistory.length === 0 && (
                                            <div className="py-20 text-center text-slate-500 italic">Chưa có dữ liệu nộp bài nào</div>
                                        )}
                                    </div>
                                </div>
                            )}
                            
                            {/* CÁC TAB CŨ GIỮ NGUYÊN (Chỉ ẩn khi không active) */}
                            {tab === 'settings' && (
                                <div className="glass-panel rounded-[2rem] p-10 max-w-2xl mx-auto">
                                    <div className="text-center mb-10">
                                        <Database size={64} className="text-cyan-500 mx-auto mb-4"/>
                                        <h2 className="text-2xl font-black text-white">Kết Nối Nguồn Dữ Liệu</h2>
                                        <p className="text-slate-400 mt-2">Cấu hình App ID để Dashboard trỏ đúng vào kho dữ liệu của bạn</p>
                                    </div>
                                    <div className="space-y-6">
                                        <div><label className="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-2">App ID Hiện Tại</label><div className="w-full glass-input p-4 rounded-xl text-emerald-400 font-mono flex items-center gap-2"><CheckCircle2 size={16}/> {currentAppId}</div></div>
                                        <div><label className="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-2">Thay Đổi App ID</label><div className="flex gap-2"><input value={manualAppId} onChange={(e)=>setManualAppId(e.target.value)} className="flex-1 bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 outline-none focus:border-cyan-500 text-white font-mono" placeholder="Nhập App ID mới..."/><button onClick={handleSaveAppId} className="px-6 bg-cyan-600 hover:bg-cyan-500 text-white rounded-xl font-bold flex items-center gap-2 transition-all shadow-lg shadow-cyan-500/20"><RefreshCw size={18}/> Cập nhật</button></div></div>
                                    </div>
                                </div>
                            )}

                            {tab === 'score_rank' && (
                                <div className="glass-panel rounded-[2rem] overflow-hidden">
                                    <table className="w-full text-left text-sm border-collapse text-slate-300">
                                        <thead className="bg-slate-800/50 text-slate-400 uppercase text-[10px] font-black tracking-widest">
                                            <tr><th className="p-6">Hạng</th><th className="p-6">Học viên</th><th className="p-6 text-center">Số bài thi</th><th className="p-6 text-center">Tổng điểm</th><th className="p-6 text-right">Gần nhất</th></tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-700/50">
                                            {scores.filter(s => (s.displayName||'').toLowerCase().includes(search.toLowerCase())).slice(0, 50).map((s, i) => {
                                                let scoreColor = s.totalScore >= 100 ? 'text-purple-400' : s.totalScore >= 50 ? 'text-emerald-400' : s.totalScore >= 20 ? 'text-blue-400' : 'text-white';
                                                return (
                                                    <tr key={s.userId || s.email} className="hover:bg-white/5 transition-colors">
                                                        <td className="p-6">{i < 3 ? ['🥇','🥈','🥉'][i] : <span className="font-mono text-slate-500">#{i+1}</span>}</td>
                                                        <td className="p-6"><span className="font-bold block text-white">{getUserDisplayName(s)}</span>{s.email && <span className="text-[10px] font-mono text-slate-500 block">{s.email}</span>}</td>
                                                        <td className="p-6 text-center"><span className="bg-slate-700 px-3 py-1 rounded-full text-xs font-bold text-slate-300">{s.examCount} đề</span></td>
                                                        <td className="p-6 text-center"><span className={`font-black text-2xl ${scoreColor}`}>{s.totalScore.toFixed(1).replace(/\.0$/, '')}</span></td>
                                                        <td className="p-6 text-right font-mono text-xs">{formatDateTime(s.latestDate)}</td>
                                                    </tr>
                                                );
                                            })}
                                        </tbody>
                                    </table>
                                </div>
                            )}

                            {tab === 'reviews' && (
                                <div className="glass-panel rounded-[2rem] overflow-hidden">
                                    <table className="w-full text-left text-sm border-collapse text-slate-300">
                                        <thead className="bg-slate-800/50 text-slate-400 uppercase text-[10px] font-black tracking-widest"><tr><th className="p-6">Thời gian</th><th className="p-6">Học viên</th><th className="p-6">Nội dung</th><th className="p-6 text-center">Đánh giá</th><th className="p-6 text-right">Thao tác</th></tr></thead>
                                        <tbody className="divide-y divide-slate-700/50">
                                            {reviews.filter(r => (r.examTitle||'').toLowerCase().includes(search.toLowerCase())).map(r => (
                                                <tr key={r.id} className="hover:bg-white/5 transition-colors">
                                                    <td className="p-6 text-xs text-slate-500 font-bold whitespace-nowrap">{formatDateTime(r.createdAt)}</td>
                                                    <td className="p-6"><span className="block font-bold text-white">{getUserDisplayName(r)}</span></td>
                                                    <td className="p-6"><div className="font-bold text-xs text-cyan-500 mb-1">{r.examTitle}</div>{r.feedback ? <div className="italic text-slate-400">"{r.feedback}"</div> : <span className="text-slate-600 text-xs">--</span>}</td>
                                                    <td className="p-6 text-center"><div className="flex justify-center gap-0.5">{[1,2,3,4,5].map(s=><Star key={s} size={14} className={s<=r.rating?'text-yellow-400 fill-yellow-400':'text-slate-700'}/>)}</div></td>
                                                    <td className="p-6 text-right"><div className="flex justify-end gap-2"><button onClick={()=>setEditingReview(r)} className="p-2 bg-slate-800 hover:bg-blue-500/20 text-slate-500 hover:text-blue-500 rounded-xl transition-all" title="Chỉnh sửa"><Pencil size={16}/></button><button onClick={()=>deleteItem('reviews', r.id)} className="p-2 bg-slate-800 hover:bg-red-500/20 text-slate-500 hover:text-red-500 rounded-xl transition-all" title="Xóa"><Trash2 size={16}/></button></div></td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            )}

                            {tab === 'reports' && (
                                <div className="glass-panel rounded-[2rem] overflow-hidden">
                                    <table className="w-full text-left text-sm border-collapse text-slate-300">
                                        <thead className="bg-slate-800/50 text-slate-400 uppercase text-[10px] font-black tracking-widest"><tr><th className="p-6">Thời gian</th><th className="p-6">Người báo</th><th className="p-6">Chi tiết lỗi</th><th className="p-6 text-center">Trạng thái</th><th className="p-6 text-right">Xử lý</th></tr></thead>
                                        <tbody className="divide-y divide-slate-700/50">
                                            {reports.filter(r => (r.questionText||'').toLowerCase().includes(search.toLowerCase())).map(r => (
                                                <tr key={r.id} className={`hover:bg-white/5 transition-colors ${r.status==='resolved'?'opacity-50':''}`}>
                                                    <td className="p-6 text-xs text-slate-500 font-bold whitespace-nowrap align-top">{formatDateTime(r.createdAt)}</td>
                                                    <td className="p-6 align-top"><span className="block font-bold text-white">{getUserDisplayName(r)}</span></td>
                                                    <td className="p-6 max-w-md align-top"><span className="bg-red-500/10 text-red-400 text-[10px] font-bold px-2 py-0.5 rounded border border-red-500/20 mr-2">{getReasonText(r.reason)}</span><div className="mt-2 text-slate-200 font-medium">"{r.questionText}"</div><div className="mt-2 text-[10px] text-slate-600 font-mono">ID Đề: {r.examId} | Câu: {r.questionIndex + 1}</div></td>
                                                    <td className="p-6 text-center align-top">{r.status==='resolved' ? <span className="text-emerald-500 font-bold text-xs flex items-center justify-center gap-1"><CheckCircle2 size={14}/> Đã xong</span> : <span className="text-yellow-500 font-bold text-xs flex items-center justify-center gap-1 animate-pulse"><AlertCircle size={14}/> Chờ xử lý</span>}</td>
                                                    <td className="p-6 text-right align-top"><div className="flex justify-end gap-2">{r.status === 'pending' && <button onClick={()=>resolveReport(r.id)} className="p-2 bg-emerald-600 hover:bg-emerald-500 text-white rounded-xl shadow-lg"><Check size={16}/></button>}<button onClick={()=>deleteItem('reports', r.id)} className="p-2 bg-slate-800 hover:bg-red-500/20 text-slate-400 hover:text-red-500 rounded-xl"><Trash2 size={16}/></button></div></td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            )}
                        </div>
                    </main>

                    {toast && <Toast {...toast} onClose={()=>setToast(null)}/>}
                </div>
            );
        };

        const App = () => {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [err, setErr] = useState('');

            useEffect(() => {
                const initAuth = async () => { if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) await signInWithCustomToken(auth, __initial_auth_token); };
                initAuth();
                return onAuthStateChanged(auth, u => {
                    if (u) { if (ADMIN_EMAILS.includes(u.email)) { setUser(u); setErr(''); } else { setErr("Tài khoản không có quyền."); signOut(auth); setUser(null); } } 
                    else setUser(null);
                    setLoading(false);
                });
            }, []);

            const handleLogin = async (e) => {
                e.preventDefault(); setLoading(true); setErr('');
                try { await signInWithEmailAndPassword(auth, e.target.elements.email.value, e.target.elements.password.value); } 
                catch (e) { setErr("Sai thông tin đăng nhập"); } finally { setLoading(false); }
            };

            if (loading) return <div className="min-h-screen bg-[#0f172a] flex items-center justify-center"><Loader2 className="animate-spin text-cyan-500" size={40}/></div>;
            if (!user) return (
                <div className="min-h-screen flex items-center justify-center p-4 bg-[#020617] relative"><div className="absolute inset-0 bg-[radial-gradient(circle_at_50%_50%,rgba(14,165,233,0.1),transparent_50%)]"></div><div className="w-full max-w-md glass-panel p-10 rounded-[2.5rem] shadow-2xl animate-in relative z-10"><div className="text-center mb-8"><BarChart2 size={48} className="text-cyan-500 mx-auto mb-4"/><h1 className="text-3xl font-black text-white">Analytics Portal</h1><p className="text-slate-400 text-xs mt-2 font-bold uppercase tracking-widest">Dành riêng cho Quản trị viên</p></div>{err && <div className="mb-6 p-4 bg-red-500/10 border border-red-500/20 text-red-400 text-xs rounded-xl font-bold flex items-center gap-2"><AlertCircle size={16}/> {err}</div>}<form onSubmit={handleLogin} className="space-y-6"><input name="email" type="email" required className="w-full glass-input rounded-2xl p-4 outline-none focus:border-cyan-500 font-bold text-white transition-all" placeholder="Email"/><input name="password" type="password" required className="w-full glass-input rounded-2xl p-4 outline-none focus:border-cyan-500 font-bold text-white transition-all" placeholder="Mật khẩu"/><button className="w-full bg-cyan-600 hover:bg-cyan-500 text-white font-black py-4 rounded-2xl transition-all shadow-lg shadow-cyan-500/20 uppercase text-xs tracking-widest">Đăng nhập</button></form></div></div>
            );

            return <Dashboard user={user} />;
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
