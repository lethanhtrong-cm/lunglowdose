<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedExam Pro - Ôn Thi Chứng Chỉ Hành Nghề</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0",
            "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
            "lucide-react": "https://esm.sh/lucide-react@0.344.0?deps=react@18.2.0",
            "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
            "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js",
            "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js"
        }
    }
    </script>
    <style>
        body { font-family: 'Inter', system-ui, sans-serif; background-color: #0f172a; color: #e2e8f0; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .glass-card { background: rgba(30, 41, 59, 0.4); backdrop-filter: blur(8px); border: 1px solid rgba(255, 255, 255, 0.05); transition: all 0.3s ease; }
        .glass-card:hover { transform: translateY(-2px); border-color: rgba(6, 182, 212, 0.3); background: rgba(30, 41, 59, 0.6); }
        .animate-fade-in { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel" data-type="module">
        import React, { useState, useEffect } from 'react';
        import { createRoot } from 'react-dom/client';
        import { initializeApp } from 'firebase/app';
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, onAuthStateChanged, updateProfile, signInWithPopup, GoogleAuthProvider } from 'firebase/auth';
        import { getFirestore, collection, addDoc, query, onSnapshot, serverTimestamp, orderBy, setDoc, doc, getDoc, updateDoc } from 'firebase/firestore';
        import { Activity, AlertTriangle, Award, Clock, FileText, History, LogOut, ShieldCheck, User, XCircle, Loader2, Lock, Crown, Search, Filter, BookOpen, Star, Grid, CheckCircle2, ChevronRight, Menu, Info } from 'lucide-react';

        const firebaseConfig = {
            apiKey: "AIzaSyDqdo_DJIWa5iqxiCgBq-0iGX7f9sr6soo",
            authDomain: "rt-examination.firebaseapp.com",
            projectId: "rt-examination",
            storageBucket: "rt-examination.firebasestorage.app",
            messagingSenderId: "920482699854",
            appId: "1:920482699854:web:44f9b0d735bdc001c6c11f"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = 'med-exam-pro-html';

        const BANK_INFO = { bankName: "BIDV", accountNum: "8890523877", accountName: "LE THANH TRONG", amount: "50,000" };

        // Hàm đồng bộ Profile lên Firestore
        const syncUserProfile = async (user, displayName) => {
            const userRef = doc(db, 'artifacts', appId, 'public', 'data', 'users', user.uid);
            try {
                const docSnap = await getDoc(userRef);
                if (!docSnap.exists() || !docSnap.data().email) {
                    await setDoc(userRef, {
                        uid: user.uid,
                        email: user.email,
                        displayName: displayName || user.displayName || user.email.split('@')[0],
                        isPremium: docSnap.exists() ? (docSnap.data().isPremium || false) : false,
                        createdAt: docSnap.exists() ? (docSnap.data().createdAt || serverTimestamp()) : serverTimestamp(),
                        lastLogin: serverTimestamp()
                    }, { merge: true });
                } else {
                    await updateDoc(userRef, { lastLogin: serverTimestamp() });
                }
            } catch (e) { console.error("Sync error:", e); }
        };

        const AuthScreen = () => {
            const [isRegistering, setIsRegistering] = useState(false);
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [name, setName] = useState('');
            const [error, setError] = useState('');
            const [loading, setLoading] = useState(false);

            const handleSubmit = async (e) => {
                e.preventDefault();
                setError(''); setLoading(true);
                try {
                    if (isRegistering) {
                        const res = await createUserWithEmailAndPassword(auth, email, password);
                        await updateProfile(res.user, { displayName: name });
                        await syncUserProfile(res.user, name);
                    } else {
                        await signInWithEmailAndPassword(auth, email, password);
                    }
                } catch (err) { setError(err.message); } finally { setLoading(false); }
            };

            const handleGoogle = async () => {
                try {
                    const res = await signInWithPopup(auth, new GoogleAuthProvider());
                    await syncUserProfile(res.user, res.user.displayName);
                } catch (err) { setError(err.message); }
            };

            return (
                <div className="min-h-screen flex items-center justify-center p-4">
                    <div className="w-full max-w-md bg-slate-900 border border-slate-800 p-8 rounded-3xl shadow-2xl animate-fade-in">
                        <div className="text-center mb-8">
                            <Activity size={48} className="mx-auto text-cyan-500 mb-4"/>
                            <h1 className="text-3xl font-bold">MedExam Pro</h1>
                        </div>
                        {error && <div className="mb-4 p-3 bg-red-500/10 text-red-400 text-xs rounded-lg">{error}</div>}
                        <form onSubmit={handleSubmit} className="space-y-4">
                            {isRegistering && <input className="w-full bg-slate-800 p-4 rounded-xl border border-slate-700 outline-none" placeholder="Họ tên" value={name} onChange={e=>setName(e.target.value)} required/>}
                            <input className="w-full bg-slate-800 p-4 rounded-xl border border-slate-700 outline-none" placeholder="Email" type="email" value={email} onChange={e=>setEmail(e.target.value)} required/>
                            <input className="w-full bg-slate-800 p-4 rounded-xl border border-slate-700 outline-none" placeholder="Mật khẩu" type="password" value={password} onChange={e=>setPassword(e.target.value)} required/>
                            <button disabled={loading} className="w-full bg-cyan-600 py-4 rounded-xl font-bold hover:bg-cyan-500 transition-all flex items-center justify-center">
                                {loading ? <Loader2 className="animate-spin"/> : (isRegistering ? 'Đăng ký' : 'Đăng nhập')}
                            </button>
                        </form>
                        <button onClick={handleGoogle} className="w-full mt-4 bg-white text-black py-4 rounded-xl font-bold flex items-center justify-center gap-2">
                            Google
                        </button>
                        <p className="mt-6 text-center text-slate-500">
                            {isRegistering ? 'Đã có tài khoản?' : 'Chưa có tài khoản?'} 
                            <button onClick={()=>setIsRegistering(!isRegistering)} className="text-cyan-500 ml-1 font-bold">{isRegistering ? 'Đăng nhập' : 'Đăng ký'}</button>
                        </p>
                    </div>
                </div>
            );
        };

        const PaymentModal = ({ onClose, userEmail }) => {
            const qrUrl = `https://img.vietqr.io/image/${BANK_INFO.bankName}-${BANK_INFO.accountNum}-compact2.jpg?amount=${BANK_INFO.amount}&addInfo=MEDEXAM ${userEmail.split('@')[0]}&accountName=${encodeURIComponent(BANK_INFO.accountName)}`;
            return (
                <div className="fixed inset-0 bg-black/90 z-[70] flex items-center justify-center p-4 backdrop-blur-sm">
                    <div className="bg-slate-900 w-full max-w-md rounded-2xl border border-yellow-500/30 p-0 relative overflow-hidden shadow-2xl animate-fade-in">
                        <div className="h-2 w-full bg-gradient-to-r from-yellow-400 via-amber-500 to-yellow-600"></div>
                        <div className="p-6">
                            <button onClick={onClose} className="absolute top-4 right-4 text-slate-400 hover:text-white transition-colors"><XCircle/></button>
                            <div className="text-center mb-6">
                                <div className="inline-flex p-4 rounded-full bg-gradient-to-br from-yellow-400/20 to-amber-600/20 text-yellow-400 mb-4 border border-yellow-500/20 shadow-lg shadow-yellow-500/10"><Crown size={40} /></div>
                                <h2 className="text-2xl font-bold text-white">Nâng cấp VIP Member</h2>
                                <p className="text-slate-400 text-sm mt-2">Mở khóa không giới hạn toàn bộ kho đề thi</p>
                            </div>
                            <div className="bg-white p-6 rounded-2xl mb-6 flex flex-col items-center shadow-inner">
                                <img src={qrUrl} className="w-56 h-56 object-contain mb-3 mix-blend-multiply"/>
                                <div className="text-center">
                                    <p className="text-slate-500 text-xs font-medium uppercase tracking-wider">Số tiền thanh toán</p>
                                    <p className="text-slate-900 font-black text-2xl">{BANK_INFO.amount} VNĐ</p>
                                </div>
                            </div>
                            <button onClick={onClose} className="w-full bg-gradient-to-r from-yellow-500 to-amber-600 hover:from-yellow-400 hover:to-amber-500 py-3.5 rounded-xl font-bold text-slate-900 shadow-lg shadow-amber-500/20 transition-all transform hover:scale-[1.02]">
                                Tôi đã chuyển khoản xong
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        const ExamInterface = ({ exam, onFinish }) => {
            const [timeLeft, setTimeLeft] = useState(exam.duration * 60);
            const [answers, setAnswers] = useState({});
            const [idx, setIdx] = useState(0);
            const [submitting, setSubmitting] = useState(false);

            useEffect(() => {
                const timer = setInterval(() => setTimeLeft(t => t <= 1 ? (finish(), 0) : t - 1), 1000);
                return () => clearInterval(timer);
            }, []);

            const finish = async () => {
                if(submitting) return;
                setSubmitting(true);
                let correct = 0;
                exam.questions.forEach((q, i) => { if(answers[i] === q.correctOption) correct++; });
                const score = (correct / exam.questions.length) * 10;
                try {
                    await addDoc(collection(db, 'artifacts', appId, 'users', auth.currentUser.uid, 'history'), {
                        examId: exam.id, examTitle: exam.title, score: score.toFixed(1), totalQuestions: exam.questions.length, correctCount: correct, date: serverTimestamp(), userId: auth.currentUser.uid
                    });
                } catch(e) { console.warn(e); }
                onFinish({ score: score.toFixed(1), correctCount: correct, total: exam.questions.length, examTitle: exam.title });
            };

            const q = exam.questions[idx];

            return (
                <div className="fixed inset-0 bg-slate-950 z-50 flex flex-col h-screen overflow-hidden">
                    <div className="glass p-4 flex justify-between items-center shrink-0">
                        <div>
                            <h2 className="font-bold text-cyan-400 text-lg">{exam.title}</h2>
                            <p className="text-slate-400 text-xs">Câu {idx+1}/{exam.questions.length}</p>
                        </div>
                        <div className="font-mono text-xl font-bold text-emerald-400 px-4 py-2 rounded-lg bg-slate-800 border border-emerald-500/30">
                            {Math.floor(timeLeft/60)}:{timeLeft%60 < 10 ? '0'+timeLeft%60 : timeLeft%60}
                        </div>
                    </div>
                    <div className="flex-1 overflow-y-auto p-4 md:p-8">
                        <div className="max-w-3xl mx-auto space-y-6">
                            <div className="bg-slate-800/50 border border-slate-700 p-6 rounded-2xl shadow-xl">
                                <p className="text-lg md:text-xl font-medium mb-6 text-slate-100">{q.text}</p>
                                <div className="space-y-3">
                                    {q.options.map((o, i) => (
                                        <label key={i} className={`flex items-center p-4 rounded-xl border-2 cursor-pointer transition-all ${answers[idx]===i ? 'border-cyan-500 bg-cyan-900/20' : 'border-slate-700 hover:bg-slate-700'}`}>
                                            <input type="radio" className="mr-4 accent-cyan-500" checked={answers[idx]===i} onChange={()=>setAnswers({...answers, [idx]: i})} />
                                            <span className="text-slate-300">{o}</span>
                                        </label>
                                    ))}
                                </div>
                            </div>
                            <div className="flex justify-between items-center gap-4">
                                <button disabled={idx===0} onClick={()=>setIdx(idx-1)} className="px-6 py-3 bg-slate-800 rounded-xl font-medium disabled:opacity-30">Câu trước</button>
                                {idx === exam.questions.length - 1 ? (
                                    <button onClick={finish} disabled={submitting} className="px-8 py-3 bg-emerald-600 rounded-xl font-bold">Nộp bài</button>
                                ) : (
                                    <button onClick={()=>setIdx(idx+1)} className="px-6 py-3 bg-cyan-600 rounded-xl font-bold">Tiếp theo</button>
                                )}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const Dashboard = ({ user, profile, onStartExam, onViewHistory, onUpgrade }) => {
            const [exams, setExams] = useState([]);
            const [search, setSearch] = useState('');

            useEffect(() => {
                const qExams = query(collection(db, 'artifacts', appId, 'public', 'data', 'exams'), orderBy('createdAt', 'desc'));
                const unsub = onSnapshot(qExams, s => setExams(s.docs.map(d=>({id: d.id, ...d.data()}))));
                return unsub;
            }, []);

            const filteredExams = exams.filter(e => e.title.toLowerCase().includes(search.toLowerCase()));

            return (
                <div className="pb-20 animate-fade-in">
                    <div className="bg-gradient-to-r from-blue-900 to-slate-900 rounded-3xl p-8 mb-8 border border-white/5 shadow-2xl">
                        <h2 className="text-2xl font-bold text-white mb-2">Xin chào, {user.displayName}</h2>
                        <p className="text-slate-400">Chúc bạn có một buổi ôn tập hiệu quả!</p>
                    </div>
                    <div className="mb-8 relative max-w-md">
                        <Search className="absolute left-4 top-3 text-slate-500" size={20}/>
                        <input className="w-full bg-slate-800 border border-slate-700 rounded-xl pl-12 pr-4 py-2.5 outline-none focus:border-cyan-500" placeholder="Tìm kiếm đề thi..." value={search} onChange={e=>setSearch(e.target.value)} />
                    </div>
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                        {filteredExams.map(exam => {
                            const isFree = exam.title.toLowerCase().includes("thử") || exam.title.toLowerCase().includes("demo");
                            const isLocked = !profile?.isPremium && !isFree;
                            return (
                                <div key={exam.id} className="glass-card rounded-2xl p-6 relative group">
                                    <div className="absolute top-4 right-4">{isLocked ? <Lock className="text-slate-500" size={18}/> : (isFree ? <span className="text-emerald-400 text-xs font-bold">FREE</span> : <Crown className="text-yellow-400" size={18}/>)}</div>
                                    <h3 className="text-lg font-bold text-white mb-4 line-clamp-2">{exam.title}</h3>
                                    <div className="flex gap-4 text-sm text-slate-500 mb-6"><span className="flex items-center gap-1"><Clock size={16}/> {exam.duration}p</span><span className="flex items-center gap-1"><FileText size={16}/> {exam.questions?.length} câu</span></div>
                                    <button onClick={() => isLocked ? onUpgrade() : onStartExam(exam)} className={`w-full py-3 rounded-xl font-bold transition-all ${isLocked ? 'bg-slate-700 text-slate-400' : 'bg-cyan-600 hover:bg-cyan-500 text-white shadow-lg shadow-cyan-500/20'}`}>
                                        {isLocked ? 'Mở khóa VIP' : 'Bắt đầu làm bài'}
                                    </button>
                                </div>
                            );
                        })}
                    </div>
                </div>
            );
        };

        const HistoryPage = ({ user, onBack }) => {
            const [history, setHistory] = useState([]);
            useEffect(() => {
                const q = query(collection(db, 'artifacts', appId, 'users', user.uid, 'history'), orderBy('date', 'desc'));
                return onSnapshot(q, s => setHistory(s.docs.map(d=>({id: d.id, ...d.data()} ))));
            }, [user]);

            return (
                <div className="animate-fade-in pb-20">
                    <button onClick={onBack} className="mb-6 text-slate-400 flex items-center gap-2 hover:text-white"><ChevronRight className="rotate-180" size={20}/> Quay lại</button>
                    <h2 className="text-2xl font-bold mb-6">Lịch sử làm bài</h2>
                    <div className="bg-slate-800 rounded-2xl border border-slate-700 overflow-hidden">
                        <table className="w-full text-left text-sm">
                            <thead className="bg-slate-900 text-slate-400 uppercase text-xs"><tr><th className="p-4">Đề thi</th><th className="p-4 text-center">Đúng</th><th className="p-4 text-center">Điểm</th></tr></thead>
                            <tbody className="divide-y divide-slate-700">
                                {history.map(r => (
                                    <tr key={r.id} className="hover:bg-slate-700/30 transition-colors">
                                        <td className="p-4 font-medium text-white">{r.examTitle}</td>
                                        <td className="p-4 text-center text-slate-400">{r.correctCount}/{r.totalQuestions}</td>
                                        <td className="p-4 text-center font-bold text-white">{r.score}</td>
                                    </tr>
                                ))}
                                {history.length === 0 && <tr><td colSpan="3" className="p-8 text-center text-slate-500">Chưa có dữ liệu.</td></tr>}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [user, setUser] = useState(null);
            const [profile, setProfile] = useState(null);
            const [view, setView] = useState('loading');
            const [activeExam, setActiveExam] = useState(null);
            const [lastResult, setLastResult] = useState(null);
            const [showPay, setShowPay] = useState(false);

            useEffect(() => {
                return onAuthStateChanged(auth, async u => {
                    setUser(u);
                    if (u) {
                        await syncUserProfile(u, u.displayName);
                        const unsubProfile = onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'users', u.uid), d => d.exists() && setProfile(d.data()));
                        setView('dashboard');
                        return () => unsubProfile();
                    } else {
                        setView('auth');
                    }
                });
            }, []);

            if (view === 'loading') return <div className="min-h-screen flex items-center justify-center text-cyan-500"><Loader2 className="animate-spin" size={40}/></div>;
            if (view === 'auth') return <AuthScreen />;
            if (view === 'exam' && activeExam) return <ExamInterface exam={activeExam} onFinish={r => { setLastResult(r); setActiveExam(null); setView('result'); }} />;
            if (view === 'result' && lastResult) return (
                <div className="min-h-screen flex items-center justify-center p-4">
                    <div className="glass p-10 rounded-3xl text-center max-w-md w-full relative overflow-hidden">
                        <div className="h-2 w-full bg-cyan-500 absolute top-0 left-0"></div>
                        <Award size={80} className="mx-auto text-yellow-400 mb-6 drop-shadow-lg"/>
                        <h2 className="text-5xl font-black text-white mb-2">{lastResult.score}</h2>
                        <p className="text-slate-400 text-xs font-bold uppercase mb-8">Điểm số</p>
                        <div className="grid grid-cols-2 gap-4 mb-8">
                            <div className="bg-slate-800 p-3 rounded-xl border border-slate-700"><p className="text-xs text-slate-500">Đúng</p><p className="text-xl font-bold">{lastResult.correctCount}/{lastResult.total}</p></div>
                            <div className="bg-slate-800 p-3 rounded-xl border border-slate-700"><p className="text-xs text-slate-500">Kết quả</p><p className={`text-xl font-bold ${Number(lastResult.score)>=5?'text-emerald-400':'text-red-400'}`}>{Number(lastResult.score)>=5?'Đạt':'Trượt'}</p></div>
                        </div>
                        <button onClick={()=>setView('dashboard')} className="w-full bg-slate-800 py-3 rounded-xl font-bold">Về trang chủ</button>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen bg-slate-950">
                    <nav className="glass sticky top-0 z-40 border-b border-slate-800/50">
                        <div className="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
                            <button onClick={()=>setView('dashboard')} className="flex items-center gap-2 font-bold text-xl text-cyan-400"><Activity size={24}/> MedExam Pro</button>
                            <div className="flex items-center gap-4">
                                {profile?.isPremium && <span className="bg-yellow-500/10 text-yellow-500 text-xs font-bold px-3 py-1 rounded-full border border-yellow-500/20 flex items-center gap-1"><Crown size={14}/> VIP</span>}
                                <button onClick={()=>setView('history')} className="p-2 text-slate-400 hover:text-cyan-400 transition-all"><History size={20}/></button>
                                <button onClick={()=>signOut(auth)} className="p-2 text-slate-400 hover:text-red-400 transition-all"><LogOut size={20}/></button>
                            </div>
                        </div>
                    </nav>
                    <div className="max-w-7xl mx-auto px-4 py-8">
                        {view === 'history' ? <HistoryPage user={user} onBack={()=>setView('dashboard')}/> : <Dashboard user={user} profile={profile} onStartExam={e=>{setActiveExam(e); setView('exam');}} onUpgrade={()=>setShowPay(true)} />}
                    </div>
                    {showPay && <PaymentModal onClose={()=>setShowPay(false)} userEmail={user.email}/>}
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
