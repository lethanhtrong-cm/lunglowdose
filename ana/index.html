<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedExam Pro - Analytics Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0",
            "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
            "lucide-react": "https://esm.sh/lucide-react@0.344.0?deps=react@18.2.0",
            "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
            "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js",
            "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js"
        }
    }
    </script>

    <style>
        body { 
            background-color: #0b1120; 
            color: #f9fafb; 
            font-family: 'Inter', sans-serif; 
            overflow: hidden; 
            -webkit-font-smoothing: antialiased;
        }
        .sidebar-item { 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
        }
        .sidebar-item.active { 
            background: linear-gradient(135deg, #0891b2, #0e7490);
            color: white; 
            box-shadow: 0 10px 15px -3px rgba(8, 145, 178, 0.2);
        }
        .glass-card { 
            background: rgba(15, 23, 42, 0.6); 
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.04); 
            border-radius: 1.5rem; 
        }
        .metric-card {
            background: linear-gradient(145deg, rgba(30, 41, 59, 0.4), rgba(15, 23, 42, 0.6));
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 1.5rem;
            transition: all 0.3s ease;
        }
        .metric-card:hover {
            border-color: rgba(6, 182, 212, 0.2);
            transform: translateY(-2px);
        }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade { animation: fadeIn 0.4s ease-out forwards; }
        
        input, textarea { border: 1px solid rgba(255, 255, 255, 0.08) !important; background-color: #0f172a !important; }
        input:focus, textarea:focus { border-color: #06b6d4 !important; outline: none !important; ring: 2px rgba(6, 182, 212, 0.2) !important; }

        .live-pulse {
            box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7);
            animation: pulse-green 2s infinite;
        }
        @keyframes pulse-green {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(16, 185, 129, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useMemo } from 'react';
        import { createRoot } from 'react-dom/client';
        import { initializeApp } from 'firebase/app';
        import { getAuth, signInAnonymously, onAuthStateChanged, signOut } from 'firebase/auth';
        import { getFirestore, collection, query, onSnapshot, orderBy, limit, doc, deleteDoc, updateDoc, addDoc, serverTimestamp, getDoc } from 'firebase/firestore';
        import { 
            LayoutGrid, Trophy, MessageSquare, Flag, LogOut, Search, 
            Activity, History, Users, Crown, FileText, Clock, AlertTriangle, CheckCircle, User, Zap, Tag, Trash2, Send, X, Inbox, ChevronRight, Star
        } from 'lucide-react';

        const firebaseConfig = {
            apiKey: "AIzaSyDqdo_DJIWa5iqxiCgBq-0iGX7f9sr6soo",
            authDomain: "rt-examination.firebaseapp.com",
            projectId: "rt-examination",
            storageBucket: "rt-examination.firebasestorage.app",
            messagingSenderId: "920482699854",
            appId: "1:920482699854:web:44f9b0d735bdc001c6c11f",
            measurementId: "G-8N7RTTREQM"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = 'med-exam-pro-html';

        const App = () => {
            const [user, setUser] = useState(null);
            // Đã xóa biến isAdmin và setIsAdmin
            const [activeTab, setActiveTab] = useState('analytics');
            const [data, setData] = useState({
                users: [],
                exams: [],
                activeExams: [],
                leaderboard: [],
                reviews: [],
                reports: []
            });
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                const unsubscribe = onAuthStateChanged(auth, (u) => {
                    if (u) {
                        setUser(u);
                        setLoading(false); // Vào thẳng Dashboard, không kiểm tra quyền Admin nữa
                    } else {
                        signInAnonymously(auth);
                    }
                });
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!user) return;

                const unsubscribers = [
                    onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'exams'), s => updateData('exams', s)),
                    onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'users'), s => updateData('users', s)),
                    onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'active_exams'), s => updateData('activeExams', s)),
                    onSnapshot(query(collection(db, 'artifacts', appId, 'public', 'data', 'users'), orderBy('totalScore', 'desc'), limit(50)), s => updateData('leaderboard', s)),
                    onSnapshot(query(collection(db, 'artifacts', appId, 'public', 'data', 'reviews'), orderBy('createdAt', 'desc'), limit(100)), s => updateData('reviews', s)),
                    onSnapshot(query(collection(db, 'artifacts', appId, 'public', 'data', 'reports'), orderBy('createdAt', 'desc')), s => updateData('reports', s))
                ];

                return () => unsubscribers.forEach(u => u());
            }, [user]);

            const updateData = (key, snapshot) => {
                setData(prev => ({
                    ...prev,
                    [key]: snapshot.docs.map(d => ({ id: d.id, ...d.data() }))
                }));
            };

            const handleDelete = async (col, id) => {
                // Đã xóa kiểm tra quyền Admin
                if(confirm("Xác nhận xóa bản ghi này?")) {
                    try {
                        await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', col, id));
                    } catch (e) { console.error("Xóa thất bại", e); }
                }
            };

            const handleAcceptReport = async (reportId, targetUserId, replyMessage) => {
                // Đã xóa kiểm tra quyền Admin
                try {
                    await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'reports', reportId), { 
                        status: 'accepted',
                        adminReply: replyMessage || "Admin đã tiếp nhận và xử lý báo cáo của bạn. Trân trọng!",
                        respondedAt: serverTimestamp()
                    });
                    
                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'notifications'), {
                        title: "Báo cáo lỗi đã được xử lý",
                        message: `Admin phản hồi: "${replyMessage || 'Chúng tôi đã tiếp nhận báo cáo của bạn.'}"`,
                        targetUserId: targetUserId,
                        createdAt: serverTimestamp()
                    });
                    
                    return true;
                } catch (e) { 
                    console.error("Lỗi gửi phản hồi:", e);
                    return false; 
                }
            };

            if (loading) return (
                <div className="min-h-screen bg-[#020617] flex flex-col items-center justify-center text-cyan-500 gap-6">
                    <div className="w-12 h-12 border-4 border-cyan-500 border-t-transparent rounded-full animate-spin"></div>
                    <p className="font-bold tracking-widest uppercase text-xs animate-pulse text-slate-400">Đang tải dữ liệu...</p>
                </div>
            );

            // Đã xóa màn hình "Truy cập bị từ chối"

            return (
                <div className="flex h-screen overflow-hidden">
                    <aside className="w-72 border-r border-white/5 bg-[#030712] flex flex-col shrink-0">
                        <div className="p-10 mb-2 flex items-center gap-3 text-left">
                            <div className="bg-cyan-500 p-2 rounded-xl shadow-lg shadow-cyan-500/20">
                                <Activity className="text-white" size={24}/>
                            </div>
                            <div className="text-left">
                                <h1 className="text-lg font-black text-white tracking-tight uppercase leading-none text-left">Analytics</h1>
                                <p className="text-[10px] text-slate-500 font-bold tracking-widest uppercase mt-1 text-left">Admin Panel</p>
                            </div>
                        </div>

                        <nav className="flex-1 px-5 space-y-3 mt-4">
                            <SidebarLink icon={<LayoutGrid size={20}/>} label="Live Monitor" active={activeTab === 'analytics'} onClick={() => setActiveTab('analytics')} />
                            <SidebarLink icon={<Trophy size={20}/>} label="Bảng xếp hạng" active={activeTab === 'leaderboard'} onClick={() => setActiveTab('leaderboard')} />
                            <SidebarLink icon={<MessageSquare size={20}/>} label="Đánh giá & Góp ý" active={activeTab === 'feedback'} onClick={() => setActiveTab('feedback')} badge={data.reviews.filter(r => r.feedback).length} />
                            <SidebarLink icon={<Flag size={20}/>} label="Báo cáo lỗi" active={activeTab === 'reports'} onClick={() => setActiveTab('reports')} badge={data.reports.filter(r => r.status !== 'accepted').length} />
                        </nav>

                        <div className="p-8 border-t border-white/5 mt-auto">
                            <div className="bg-slate-900/50 rounded-2xl p-4 mb-6 border border-white/5">
                                <div className="flex items-center gap-3">
                                    <div className="w-8 h-8 rounded-full bg-cyan-600 flex items-center justify-center font-bold text-xs">AD</div>
                                    <div className="flex-1 min-w-0 text-left"><p className="text-xs font-bold text-white truncate text-left">{user?.displayName || "Admin"}</p><p className="text-[10px] text-emerald-500 text-left">Full Access</p></div>
                                </div>
                            </div>
                            <button onClick={() => signOut(auth)} className="w-full flex items-center gap-3 text-slate-500 hover:text-red-400 transition-all text-sm font-bold uppercase tracking-wider group text-left">
                                <LogOut size={18} className="group-hover:-translate-x-1 transition-transform"/> Đăng xuất
                            </button>
                        </div>
                    </aside>

                    <main className="flex-1 overflow-y-auto custom-scrollbar bg-[#020617] scroll-smooth">
                        <div className="p-12 max-w-7xl mx-auto">
                            {activeTab === 'analytics' && <AnalyticsView data={data} />}
                            {activeTab === 'leaderboard' && <LeaderboardView leaderboard={data.leaderboard} />}
                            {activeTab === 'feedback' && <FeedbackView reviews={data.reviews} users={data.users} onDelete={id => handleDelete('reviews', id)} />}
                            {activeTab === 'reports' && <ReportsView reports={data.reports} exams={data.exams} users={data.users} onAccept={handleAcceptReport} onDelete={id => handleDelete('reports', id)} />}
                        </div>
                    </main>
                </div>
            );
        };

        const SidebarLink = ({ icon, label, active, onClick, badge }) => (
            <button onClick={onClick} className={`sidebar-item w-full flex items-center justify-between px-6 py-4 rounded-2xl text-sm font-bold tracking-tight ${active ? 'active' : 'text-slate-500 hover:text-slate-200 hover:bg-white/5'}`}>
                <div className="flex items-center gap-4">{icon} {label}</div>
                {badge > 0 && <span className="bg-red-500/90 text-white text-[10px] w-5 h-5 flex items-center justify-center rounded-full font-black shadow-lg shadow-red-500/20">{badge}</span>}
            </button>
        );

        const AnalyticsView = ({ data }) => {
            const now = Date.now();
            const onlineCount = data.users.filter(u => (now - (u.lastActive?.toDate?.().getTime() || 0)) < 300000).length;
            const recentSubCount = data.reviews.filter(r => (now - (r.createdAt?.toDate?.().getTime() || 0)) < 900000).length;

            return (
                <div className="space-y-12 animate-fade">
                    <header className="flex flex-col md:flex-row justify-between items-start md:items-center gap-6 text-left">
                        <div className="text-left">
                            <h2 className="text-5xl font-black text-white tracking-tighter text-left">Dashboard</h2>
                            <p className="text-emerald-500 text-sm font-semibold mt-2 flex items-center gap-2">
                                <span className="w-2 h-2 bg-emerald-500 rounded-full live-pulse"></span> 
                                Hệ thống quản trị viên đang hoạt động
                            </p>
                        </div>
                        <div className="flex items-center gap-3 bg-slate-900/80 px-6 py-3 rounded-2xl border border-white/5 shadow-xl">
                            <Clock size={18} className="text-cyan-500"/><span className="text-sm font-mono font-bold text-slate-300 text-left">{new Date().toLocaleTimeString()}</span>
                        </div>
                    </header>

                    <div className="grid grid-cols-2 md:grid-cols-5 gap-5">
                        <MetricItem icon={<Activity size={20} className="text-emerald-400"/>} label="Hoạt động" value={onlineCount} color="emerald" />
                        <MetricItem icon={<History size={20} className="text-cyan-400"/>} label="Vừa nộp" value={recentSubCount} color="cyan" />
                        <MetricItem icon={<Users size={20} className="text-purple-400"/>} label="Học viên" value={data.users.length} color="purple" />
                        <MetricItem icon={<Crown size={20} className="text-yellow-400"/>} label="VIP Pro" value={data.users.filter(u=>u.isPremium).length} color="yellow" />
                        <MetricItem icon={<FileText size={20} className="text-blue-400"/>} label="Đề thi" value={data.exams.length} color="blue" />
                    </div>

                    <section className="space-y-8 text-left">
                        <div className="flex items-center justify-between">
                            <h3 className="text-2xl font-black text-white flex items-center gap-4 tracking-tight text-left"><Zap size={24} className="text-cyan-500"/> TRẠNG THÁI NGƯỜI DÙNG</h3>
                            <span className="text-xs font-bold text-slate-500 uppercase tracking-widest">Online hiện tại: {onlineCount}</span>
                        </div>
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 text-left">
                            {data.activeExams.map(ex => (
                                <div key={ex.id} className="glass-card p-6 flex flex-col justify-between min-h-[240px] hover:border-cyan-500/40 transition-all shadow-xl group text-left">
                                    <div className="flex justify-between items-start text-left">
                                        <div className="flex items-center gap-3 text-left">
                                            <div className="w-12 h-12 rounded-2xl bg-gradient-to-br from-slate-800 to-slate-900 flex items-center justify-center font-black text-white border border-white/10 shadow-inner text-xl group-hover:scale-110 transition-transform">{ex.displayName?.charAt(0) || "U"}</div>
                                            <div className="min-w-0 text-left">
                                                <p className="font-bold text-slate-100 text-sm truncate text-left">{ex.displayName || "Thành viên"}</p>
                                                <p className="text-[10px] text-slate-500 font-mono tracking-tighter text-left uppercase">UID: {ex.uid?.substring(0, 6)}</p>
                                            </div>
                                        </div>
                                        <div className="flex items-center gap-1.5 bg-emerald-500/10 text-emerald-400 px-3 py-1 rounded-full border border-emerald-500/20 text-[9px] font-black uppercase tracking-widest"><div className="w-1.5 h-1.5 bg-emerald-500 rounded-full animate-pulse text-left"></div> Live</div>
                                    </div>
                                    <div className="mt-6 p-4 bg-slate-900/60 rounded-2xl border border-white/5 group-hover:bg-cyan-500/5 transition-colors text-left">
                                        <p className="text-[9px] text-slate-500 font-black uppercase mb-1.5 tracking-widest text-left">Module hiện tại</p>
                                        <p className="text-xs font-bold text-cyan-400 line-clamp-2 leading-relaxed text-left">{ex.examTitle || "Tải đề..."}</p>
                                    </div>
                                    <div className="mt-4 flex justify-between items-center text-[10px] font-bold text-slate-500 text-left">
                                        <span className="flex items-center gap-1.5 bg-slate-900/50 px-2 py-1 rounded-lg text-left"><Clock size={12}/> {Math.floor((now - (ex.startedAt?.toDate?.().getTime() || now)) / 60000)}p trước</span>
                                        <span className="text-cyan-500 italic text-left">Đang làm...</span>
                                    </div>
                                </div>
                            ))}
                            {data.activeExams.length === 0 && <div className="col-span-full py-24 text-center glass-card border-dashed flex flex-col items-center gap-4 text-slate-500 text-left">
                                <Inbox size={56} className="opacity-10 text-left"/>
                                <p className="italic text-sm font-medium text-left">Phòng thi hiện đang trống.</p>
                            </div>}
                        </div>
                    </section>
                    
                    <section className="glass-card p-10 space-y-10 shadow-2xl border border-white/5">
                        <div className="flex items-center justify-between border-b border-white/5 pb-6">
                            <h3 className="text-2xl font-black text-white flex items-center gap-4 tracking-tight uppercase"><History size={24} className="text-cyan-500"/> Nhật ký hoạt động</h3>
                            <div className="relative"><Search className="absolute left-3 top-2.5 text-slate-600" size={14}/><input className="bg-slate-900/80 border border-white/5 rounded-xl pl-9 pr-4 py-2 text-xs w-48 focus:w-64 transition-all outline-none" placeholder="Tìm nhật ký..." /></div>
                        </div>
                        <div className="space-y-5 max-h-[600px] overflow-y-auto pr-4 custom-scrollbar">
                            {data.reviews.map(r => (
                                <div key={r.id} className="bg-slate-900/30 p-6 rounded-2xl border border-white/5 flex items-center justify-between group hover:bg-slate-800/40 transition-all">
                                    <div className="flex items-center gap-8">
                                        <div className="text-[12px] text-slate-600 font-mono font-black">{r.createdAt?.toDate?.().toLocaleTimeString('vi-VN')}</div>
                                        <div className="text-left">
                                            <p className="font-bold text-slate-100 text-sm group-hover:text-cyan-400 transition-colors text-left uppercase">{r.displayName}</p>
                                            <p className="text-[10px] text-slate-500 mt-1.5 flex items-center gap-3">
                                                <span className="text-slate-600 uppercase font-black tracking-widest">{r.createdAt?.toDate ? r.createdAt.toDate().toLocaleDateString('vi-VN') : 'New'}</span>
                                                <span className="w-1 h-1 bg-slate-700 rounded-full"></span>
                                                <span className="text-cyan-700 font-bold uppercase tracking-tighter italic group-hover:text-cyan-600 transition-colors">{r.examTitle}</span>
                                            </p>
                                        </div>
                                    </div>
                                    <div className="text-right flex items-center gap-6">
                                        <div className="text-right">
                                            <p className="text-3xl font-black text-cyan-400 tracking-tighter tabular-nums leading-none">{r.score || "---"}</p>
                                            <p className="text-[9px] font-black text-slate-700 uppercase tracking-widest mt-1">Ghi nhận</p>
                                        </div>
                                        <ChevronRight size={20} className="text-slate-800 group-hover:translate-x-1 group-hover:text-cyan-500 transition-all"/>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </section>
                </div>
            );
        };

        const MetricItem = ({ icon, label, value, color }) => (
            <div className="metric-card p-6 flex flex-col justify-between border border-white/5 shadow-xl items-start relative overflow-hidden group text-left">
                <div className={`p-3 bg-slate-900/80 rounded-2xl text-slate-400 mb-6 border border-white/5 group-hover:scale-110 transition-transform text-left`}>{icon}</div>
                <div className="text-left">
                    <p className="text-4xl font-black text-white tracking-tighter mb-1.5 text-left">{value}</p>
                    <p className="text-[11px] text-slate-500 font-black uppercase tracking-widest text-left">{label}</p>
                </div>
                <div className="absolute -bottom-4 -right-4 w-20 h-20 bg-white/5 rounded-full blur-2xl group-hover:scale-150 transition-all duration-700 text-left"></div>
            </div>
        );

        const LeaderboardView = ({ leaderboard }) => (
            <div className="space-y-12 animate-fade text-left">
                <h2 className="text-4xl font-black text-white tracking-tight text-left uppercase text-left">Bảng danh vọng</h2>
                <div className="glass-card overflow-hidden shadow-2xl border border-white/5 text-left">
                    <table className="w-full text-left">
                        <thead className="bg-[#0f172a]/80 text-[10px] uppercase text-slate-500 font-black tracking-widest border-b border-white/10 text-left">
                            <tr><th className="px-10 py-6">Vị trí</th><th className="px-10 py-6">Học viên</th><th className="px-10 py-6 text-center">Tiến độ</th><th className="px-10 py-6 text-right">Tổng tích lũy</th></tr>
                        </thead>
                        <tbody className="divide-y divide-white/5 text-left">
                            {leaderboard.map((u, i) => (
                                <tr key={u.id} className="hover:bg-cyan-500/5 transition-all group text-left">
                                    <td className="px-10 py-7 text-left">
                                        <div className={`w-8 h-8 rounded-lg flex items-center justify-center font-black text-sm shadow-lg text-left ${i === 0 ? 'bg-yellow-500 text-slate-950' : i === 1 ? 'bg-slate-300 text-slate-950' : i === 2 ? 'bg-amber-600 text-slate-950' : 'bg-slate-800 text-slate-600'}`}>
                                            {i+1}
                                        </div>
                                    </td>
                                    <td className="px-10 py-7 font-bold text-slate-100 text-base uppercase tracking-tight group-hover:text-white transition-colors text-left">{u.displayName}</td>
                                    <td className="px-10 py-7 text-center text-left">
                                        <span className="text-xs font-black text-slate-500 bg-slate-900 px-3 py-1.5 rounded-xl border border-white/5 text-left">{u.examsCompleted || 0} ĐỀ</span>
                                    </td>
                                    <td className="px-10 py-7 text-right font-black text-cyan-400 text-2xl tracking-tighter group-hover:scale-105 transition-transform text-right">{u.totalScore?.toFixed(1)}</td>
                                </tr>
                            ))}
                        </tbody>
                    </table>
                </div>
            </div>
        );

        const FeedbackView = ({ reviews, users, onDelete }) => {
            const fiveStarReviews = reviews.filter(r => r.rating == 5);
            const criticalFeedbacks = reviews.filter(r => r.rating <= 3 && r.feedback && r.feedback.trim() !== "");

            // Helper để lấy thông tin user live từ danh sách users
            const getUserInfo = (review) => {
                const user = users.find(u => u.uid === review.userId || u.id === review.userId);
                if (user) {
                    return {
                        name: user.displayName || "Chưa đặt tên",
                        email: user.email,
                        avatar: user.displayName?.charAt(0).toUpperCase() || "U"
                    };
                }
                return {
                    name: review.displayName || "Khách ẩn danh",
                    email: review.userId && review.userId !== 'anonymous' ? `ID: ${review.userId.substring(0,8)}` : "Không có thông tin",
                    avatar: review.displayName?.charAt(0).toUpperCase() || "?"
                };
            };

            return (
                <div className="space-y-12 animate-fade text-left">
                    <h2 className="text-4xl font-black text-white tracking-tight text-left uppercase">Trung tâm phản hồi</h2>
                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-10 pb-20">
                        {/* Cột trái: Vinh danh 5 Sao */}
                        <div className="space-y-6">
                            <div className="flex items-center gap-3 mb-2">
                                <div className="p-2 bg-yellow-500/10 rounded-xl text-yellow-500 border border-yellow-500/20"><Star size={20} fill="currentColor"/></div>
                                <h3 className="text-lg font-black text-white uppercase tracking-widest">Lịch sử 5 Sao</h3>
                            </div>
                            <div className="space-y-4 max-h-[800px] overflow-y-auto pr-3 custom-scrollbar">
                                {fiveStarReviews.map(r => {
                                    const u = getUserInfo(r);
                                    return (
                                        <div key={r.id} className="glass-card p-5 flex items-center justify-between group hover:bg-slate-800/60 transition-all border border-white/5 hover:border-yellow-500/30">
                                            <div className="flex items-center gap-4">
                                                <div className="w-10 h-10 rounded-full bg-yellow-500/10 flex items-center justify-center text-yellow-500 font-black text-xs border border-yellow-500/20 shadow-lg shadow-yellow-500/5">5★</div>
                                                <div>
                                                    <p className="text-sm font-bold text-white group-hover:text-yellow-400 transition-colors">{u.name}</p>
                                                    <p className="text-[9px] text-slate-500 truncate mb-1">{u.email}</p>
                                                    <p className="text-[10px] text-slate-500 font-mono flex items-center gap-1"><FileText size={10}/> {r.examTitle}</p>
                                                </div>
                                            </div>
                                            <span className="text-[10px] text-slate-600 font-mono font-bold tracking-widest">{r.createdAt?.toDate?.().toLocaleDateString('vi-VN')}</span>
                                        </div>
                                    );
                                })}
                                {fiveStarReviews.length === 0 && <p className="text-slate-500 italic text-sm p-4 text-center border border-dashed border-white/5 rounded-xl">Chưa có đánh giá 5 sao nào.</p>}
                            </div>
                        </div>

                        {/* Cột phải: Góp ý cần cải thiện */}
                        <div className="space-y-6">
                            <div className="flex items-center gap-3 mb-2">
                                <div className="p-2 bg-red-500/10 rounded-xl text-red-500 border border-red-500/20"><AlertTriangle size={20}/></div>
                                <h3 className="text-lg font-black text-white uppercase tracking-widest">Góp ý (≤ 3 Sao)</h3>
                            </div>
                            <div className="space-y-6 max-h-[800px] overflow-y-auto pr-3 custom-scrollbar">
                                {criticalFeedbacks.map(f => {
                                    const u = getUserInfo(f);
                                    return (
                                        <div key={f.id} className="glass-card p-6 relative group hover:border-red-500/30 transition-all border border-white/5 hover:shadow-xl hover:shadow-red-500/5">
                                            <div className="flex justify-between items-start mb-4">
                                                <div className="flex items-center gap-3">
                                                    <div className="w-8 h-8 rounded-lg bg-slate-800 flex items-center justify-center font-bold text-slate-400 text-xs border border-white/5">{u.avatar}</div>
                                                    <div>
                                                        <p className="text-xs font-bold text-white">{u.name}</p>
                                                        <p className="text-[9px] text-slate-500 truncate max-w-[150px]">{u.email}</p>
                                                        <div className="flex items-center gap-2 mt-1">
                                                            <div className="flex text-yellow-500 text-[9px] gap-0.5">
                                                                {[...Array(f.rating)].map((_,i)=><Star key={i} size={8} fill="currentColor"/>)}
                                                            </div>
                                                            <span className="text-[9px] text-slate-600 font-mono">{f.createdAt?.toDate?.().toLocaleString()}</span>
                                                        </div>
                                                    </div>
                                                </div>
                                                <button onClick={() => onDelete(f.id)} className="text-slate-600 hover:text-red-500 p-2 rounded-lg hover:bg-red-500/10 transition-colors"><Trash2 size={16}/></button>
                                            </div>
                                            <div className="p-4 bg-red-500/5 rounded-xl border border-red-500/10 text-slate-300 text-sm italic leading-relaxed relative">
                                                <span className="absolute -top-2 -left-1 text-4xl text-red-500/20 font-serif leading-none">“</span>
                                                {f.feedback}
                                                <span className="absolute -bottom-4 -right-1 text-4xl text-red-500/20 font-serif leading-none">”</span>
                                            </div>
                                            <p className="mt-4 text-[9px] text-slate-500 font-black uppercase tracking-widest text-right flex justify-end items-center gap-1.5 opacity-60 group-hover:opacity-100 transition-opacity">
                                                <FileText size={10}/> {f.examTitle}
                                            </p>
                                        </div>
                                    );
                                })}
                                {criticalFeedbacks.length === 0 && <p className="text-slate-500 italic text-sm p-8 text-center border border-dashed border-white/5 rounded-xl">Không có góp ý tiêu cực nào.</p>}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const ReportsView = ({ reports, exams, users, onAccept, onDelete }) => {
            const [replyStates, setReplyStates] = useState({});
            const [submittingIds, setSubmittingIds] = useState({});

            const getUser = id => {
                const found = users.find(u => u.uid === id || u.id === id);
                if (found) return { name: found.displayName, email: found.email, verified: true };
                return { name: id === 'anonymous' ? "Khách ẩn danh" : "ID: "+id?.substring(0,8), email: "Phiên làm việc ẩn danh", verified: false };
            };

            const toggleReply = (id) => {
                setReplyStates(prev => ({ ...prev, [id]: prev[id] === undefined ? "" : undefined }));
            };

            const handleUpdateText = (id, text) => {
                setReplyStates(prev => ({ ...prev, [id]: text }));
            };

            const handleSend = async (report) => {
                const text = replyStates[report.id];
                if (!text || !text.trim()) { alert("Vui lòng nhập nội dung!"); return; }
                setSubmittingIds(prev => ({ ...prev, [report.id]: true }));
                const success = await onAccept(report.id, report.userId, text);
                if (success) { toggleReply(report.id); }
                setSubmittingIds(prev => ({ ...prev, [report.id]: false }));
            };

            return (
                <div className="space-y-12 pb-20 animate-fade text-left text-left">
                    <h2 className="text-4xl font-black text-white tracking-tight text-left uppercase text-left">Báo cáo nội dung</h2>
                    {reports.length === 0 ? <div className="py-40 text-center glass-card border-dashed flex flex-col items-center gap-5 text-slate-700 text-left text-left">
                        <Flag size={64} className="opacity-10 text-left"/><p className="italic font-medium text-left">Hiện không có báo cáo lỗi cần xử lý.</p>
                    </div> : (
                        <div className="space-y-8 text-left text-left">
                            {reports.map(r => {
                                const u = getUser(r.userId);
                                const exam = exams.find(e=>e.id===r.examId);
                                const isReplying = replyStates[r.id] !== undefined;
                                const isSubmitting = submittingIds[r.id];

                                return (
                                    <div key={r.id} className={`glass-card p-12 border transition-all ${r.status === 'accepted' ? 'border-emerald-500/20 opacity-60' : 'border-red-500/20 shadow-2xl hover:border-red-500/40'} text-left text-left`}>
                                        <div className="flex flex-col xl:flex-row gap-12 text-left text-left">
                                            <div className="flex-1 space-y-8 text-left text-left">
                                                <div className="flex items-center gap-4 text-left text-left">
                                                    <span className={`px-5 py-2 rounded-full text-[10px] font-black uppercase tracking-widest flex items-center gap-2 border shadow-lg text-left ${r.status === 'accepted' ? 'bg-emerald-500/10 text-emerald-400 border-emerald-500/30' : 'bg-red-500/10 text-red-500 border-red-500/30 animate-pulse'}`}>
                                                        {r.status === 'accepted' ? <><CheckCircle size={14}/> ĐÃ XỬ LÝ</> : <><Clock size={14}/> ĐANG CHỜ</>}
                                                    </span>
                                                    <span className="text-slate-600 text-[11px] font-mono italic font-black tracking-widest text-left">{r.createdAt?.toDate ? r.createdAt.toDate().toLocaleString() : 'Recent'}</span>
                                                </div>
                                                <div className="grid grid-cols-2 gap-6 text-left text-left text-left text-left">
                                                    <div className="bg-slate-900/60 p-6 rounded-3xl border border-white/5 text-left shadow-inner text-left text-left">
                                                        <p className="text-slate-600 mb-3 tracking-widest text-[10px] font-black uppercase text-left">Tài khoản báo cáo</p>
                                                        <div className="flex items-center gap-3 text-left">
                                                            <div className="w-10 h-10 rounded-xl bg-slate-800 flex items-center justify-center text-slate-400 text-left"><User size={20}/></div>
                                                            <div className="min-w-0 text-left"><p className={`text-sm font-bold truncate text-left ${!u.verified ? 'text-red-400' : 'text-slate-100'}`}>{u.name}</p><p className="text-[10px] text-slate-500 lowercase mt-0.5 truncate font-medium text-left">{u.email}</p></div>
                                                        </div>
                                                    </div>
                                                    <div className="bg-slate-900/60 p-6 rounded-3xl border border-white/5 text-left shadow-inner text-left text-left text-left">
                                                        <p className="text-slate-600 mb-3 tracking-widest text-[10px] font-black uppercase text-left">Module liên quan</p>
                                                        <div className="flex items-center gap-3 text-left">
                                                            <div className="w-10 h-10 rounded-xl bg-slate-800 flex items-center justify-center text-cyan-600 text-left"><FileText size={20}/></div>
                                                            <div className="min-w-0 text-left"><p className="text-sm font-bold text-cyan-500 line-clamp-1 uppercase tracking-tight text-left">{exam?.title || "ID: "+r.examId}</p><p className="text-[10px] text-slate-600 font-mono mt-0.5 italic text-left">Mã đề: {r.examId?.substring(0,10)}...</p></div>
                                                        </div>
                                                    </div>
                                                </div>
                                                <div className="p-10 bg-slate-900/80 rounded-[2.5rem] border border-white/5 space-y-6 text-left shadow-2xl relative text-left">
                                                    <div className="flex items-center gap-4 text-red-500 font-black text-xs uppercase tracking-widest text-left text-left">
                                                        <AlertTriangle size={20} className="fill-red-500/10 text-left"/> {r.reason?.toUpperCase()} | CÂU {r.questionIndex + 1}
                                                    </div>
                                                    <div className="text-lg text-slate-100 font-medium italic border-l-4 border-red-500/40 pl-8 text-left leading-relaxed py-1 text-left text-left">"{r.questionText}"</div>
                                                    <div className="text-[13px] text-slate-400 mt-8 bg-black/40 p-6 rounded-2xl border border-white/5 italic text-left text-left">
                                                        <span className="font-black text-slate-300 block mb-3 uppercase text-[10px] tracking-widest opacity-60 text-left text-left text-left">Mô tả chi tiết từ học viên:</span>
                                                        {r.detail || "Không có mô tả chi tiết."}
                                                    </div>
                                                </div>

                                                {isReplying && (
                                                    <div className="p-10 bg-[#0891b2]/5 rounded-[2.5rem] border border-[#0891b2]/30 animate-fade space-y-5 text-left shadow-2xl text-left">
                                                        <div className="flex justify-between items-center text-left border-b border-white/5 pb-4 text-left">
                                                            <p className="text-[11px] font-black text-cyan-400 uppercase tracking-widest text-left flex items-center gap-2 text-left text-left text-left"><Send size={14}/> Soạn phản hồi trực tiếp</p>
                                                            <button onClick={() => toggleReply(r.id)} className="text-slate-600 hover:text-white transition-colors bg-white/5 p-2 rounded-lg text-left"><X size={18}/></button>
                                                        </div>
                                                        <textarea 
                                                            value={replyStates[r.id]} 
                                                            onChange={e => handleUpdateText(r.id, e.target.value)}
                                                            className="w-full h-40 p-6 text-base rounded-[1.5rem] border border-white/10 outline-none focus:border-cyan-500 transition-all text-slate-200 shadow-inner text-left"
                                                            placeholder="Nhập nội dung phản hồi. Ví dụ: Cảm ơn bạn, câu hỏi đã được cập nhật chính xác..."
                                                        ></textarea>
                                                        <button 
                                                            onClick={() => handleSend(r)}
                                                            disabled={isSubmitting}
                                                            className="w-full bg-cyan-600 hover:bg-cyan-500 text-white py-5 rounded-[1.5rem] font-black text-[12px] uppercase shadow-xl shadow-cyan-500/20 active:scale-95 flex items-center justify-center gap-3 text-left"
                                                        >
                                                            {isSubmitting ? <Activity className="animate-spin text-left" size={18}/> : <Send size={18}/>}
                                                            Gửi thông điệp & Hoàn tất
                                                        </button>
                                                    </div>
                                                )}

                                                {r.adminReply && !isReplying && (
                                                    <div className="p-8 bg-emerald-500/5 rounded-[2rem] border border-emerald-500/10 flex items-start gap-5 text-left shadow-inner border-l-4 border-l-emerald-500 text-left">
                                                        <div className="bg-emerald-500 p-3 rounded-2xl text-white shadow-lg shadow-emerald-500/20 text-left"><CheckCircle size={20}/></div>
                                                        <div className="text-left text-left text-left text-left">
                                                            <p className="text-[10px] font-black text-emerald-500 uppercase tracking-widest mb-1.5 text-left flex items-center gap-2 text-left">Hệ thống đã phản hồi</p>
                                                            <p className="text-base text-slate-300 italic text-left leading-relaxed text-left text-left text-left">"{r.adminReply}"</p>
                                                        </div>
                                                    </div>
                                                )}
                                            </div>

                                            <div className="xl:w-60 flex flex-row xl:flex-col gap-4 shrink-0 text-left text-left">
                                                {r.status !== 'accepted' ? (
                                                    <button onClick={() => toggleReply(r.id)} className={`flex-1 p-6 rounded-[1.8rem] font-black text-[11px] uppercase shadow-xl transition-all active:scale-95 flex items-center justify-center gap-3 border text-left ${isReplying ? 'bg-slate-800 text-slate-500 border-white/5' : 'bg-emerald-600 hover:bg-emerald-500 text-white border-emerald-500/20 shadow-emerald-500/10'}`}>
                                                        {isReplying ? <><X size={20}/> Hủy bỏ</> : <><CheckCircle size={20}/> Tiếp nhận</>}
                                                    </button>
                                                ) : (
                                                    <div className="flex-1 flex flex-col items-center justify-center text-emerald-500 text-xs font-black uppercase bg-emerald-500/5 rounded-[1.8rem] border border-emerald-500/10 h-full min-h-[80px] gap-2 text-left"><CheckCircle size={28}/> Done</div>
                                                )}
                                                <button onClick={() => onDelete(r.id)} className="flex-1 bg-slate-900/80 hover:bg-red-500/10 text-slate-600 hover:text-red-500 p-6 rounded-[1.8rem] font-black text-[11px] uppercase border border-white/5 transition-all active:scale-95 flex items-center justify-center gap-3 group text-left">
                                                    <Trash2 size={20} className="opacity-40 group-hover:opacity-100 transition-opacity text-left"/> Xóa bỏ
                                                </button>
                                            </div>
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    )}
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
