<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quản Lý Hoạt Động Đoàn</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* Glassmorphism & Utilities */
        .glass {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(59, 130, 246, 0.2);
        }
        
        .glass-sidebar {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-right: 1px solid rgba(59, 130, 246, 0.1);
        }

        .fade-in { animation: fadeIn 0.4s ease-out; }
        .slide-in { animation: slideIn 0.3s ease-out; }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideIn { from { transform: translateY(10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        /* Custom Scrollbar */
        .custom-scroll::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #93c5fd; border-radius: 10px; }
        .custom-scroll:hover::-webkit-scrollbar-thumb { background: #60a5fa; }

        /* Checkbox Style */
        .custom-checkbox:checked + div {
            background-color: #2563eb;
            border-color: #2563eb;
        }
        .custom-checkbox:checked + div svg {
            display: block;
        }
    </style>
</head>
<body class="bg-blue-50 text-gray-800 h-screen overflow-hidden flex text-sm sm:text-base">

    <!-- Background Decor -->
    <div class="fixed top-0 right-0 w-[500px] h-[500px] bg-blue-300/30 rounded-full blur-3xl -mr-20 -mt-20 pointer-events-none z-0"></div>
    <div class="fixed bottom-0 left-0 w-[400px] h-[400px] bg-cyan-200/40 rounded-full blur-3xl -ml-20 -mb-20 pointer-events-none z-0"></div>

    <!-- MOBILE MENU OVERLAY -->
    <div id="mobile-menu-overlay" onclick="toggleMobileMenu()" class="fixed inset-0 bg-blue-900/30 z-40 hidden backdrop-blur-sm transition-opacity md:hidden"></div>

    <!-- SIDEBAR (LEFT MENU) -->
    <aside id="sidebar" class="fixed md:static inset-y-0 left-0 w-72 glass-sidebar z-50 transform -translate-x-full md:translate-x-0 transition-transform duration-300 flex flex-col shadow-2xl md:shadow-none h-full">
        <!-- Sidebar Header -->
        <div class="p-6 border-b border-blue-100 flex items-center justify-between shrink-0">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-gradient-to-br from-blue-600 to-cyan-500 rounded-xl flex items-center justify-center text-white font-bold text-xl shadow-lg shadow-blue-500/30">
                    Đ
                </div>
                <div>
                    <h1 class="font-bold text-gray-900 leading-tight">Quản Lý Đoàn</h1>
                    <p class="text-xs text-blue-600 font-bold">Nhiệm kỳ 2025-2030</p>
                </div>
            </div>
            <!-- Close button for mobile -->
            <button onclick="toggleMobileMenu()" class="md:hidden p-1 text-gray-400 hover:text-blue-600">
                <i data-lucide="x" class="w-6 h-6"></i>
            </button>
        </div>

        <!-- Sidebar Content -->
        <div class="flex-1 overflow-y-auto custom-scroll py-6 px-4 space-y-8">
            <!-- Main Group -->
            <div>
                <h3 class="px-4 text-xs font-bold text-blue-400 uppercase tracking-widest mb-3">Chung</h3>
                <nav class="space-y-1">
                    <button onclick="router('dashboard')" id="nav-dashboard" class="sidebar-item w-full flex items-center gap-3 px-4 py-3 rounded-xl font-medium transition-all hover:bg-blue-50 hover:text-blue-600 text-gray-600 border border-transparent">
                        <i data-lucide="layout-dashboard" class="w-5 h-5"></i>
                        Tổng quan
                    </button>
                    <button onclick="router('members')" id="nav-members" class="sidebar-item w-full flex items-center gap-3 px-4 py-3 rounded-xl font-medium transition-all hover:bg-blue-50 hover:text-blue-600 text-gray-600 border border-transparent">
                        <i data-lucide="users" class="w-5 h-5"></i>
                        Đoàn viên BCH
                    </button>
                </nav>
            </div>

            <!-- Months Group -->
            <div>
                <h3 class="px-4 text-xs font-bold text-blue-400 uppercase tracking-widest mb-3">Kế hoạch năm 2026</h3>
                <nav class="space-y-1" id="month-menu-list">
                    <!-- Injected by JS -->
                </nav>
            </div>
        </div>

        <!-- Sidebar Footer (Auth) -->
        <div class="p-4 border-t border-blue-100 shrink-0">
            <div id="auth-status-container" class="bg-gradient-to-r from-blue-50 to-cyan-50 p-4 rounded-xl flex items-center gap-3 border border-blue-100 cursor-pointer hover:shadow-md transition-all" onclick="handleAuthClick()">
                <div class="w-8 h-8 rounded-full bg-white flex items-center justify-center text-blue-600 font-bold text-xs shadow-sm border border-blue-100">
                    <i data-lucide="user" class="w-4 h-4"></i>
                </div>
                <div class="flex-1 min-w-0">
                    <p id="auth-user-name" class="text-sm font-bold text-gray-900 truncate">Khách</p>
                    <p id="auth-user-role" class="text-xs text-blue-500 truncate">Chạm để đăng nhập</p>
                </div>
                <i data-lucide="log-in" id="auth-icon" class="w-4 h-4 text-blue-400"></i>
            </div>
        </div>
    </aside>

    <!-- MAIN CONTENT AREA -->
    <div class="flex-1 flex flex-col h-full relative z-10 w-full overflow-hidden">
        
        <!-- HEADER -->
        <header class="h-16 bg-white/70 backdrop-blur-md border-b border-blue-100 flex items-center justify-between px-4 sm:px-8 shrink-0">
            <div class="flex items-center gap-3">
                <button onclick="toggleMobileMenu()" class="md:hidden p-2 -ml-2 text-gray-600 hover:bg-white rounded-lg transition-colors">
                    <i data-lucide="menu" class="w-6 h-6"></i>
                </button>
                <div id="header-breadcrumbs" class="flex items-center gap-2 text-sm font-medium text-gray-500">
                    <!-- Breadcrumbs injected by JS -->
                </div>
            </div>

            <div class="flex items-center gap-4">
                <div class="relative hidden sm:block group">
                    <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-blue-400 group-focus-within:text-blue-600 transition-colors"></i>
                    <input type="text" placeholder="Tìm hoạt động..." class="bg-white/80 border border-blue-100 rounded-full pl-10 pr-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-200 focus:border-blue-400 transition-all w-64 text-blue-900 placeholder-blue-300">
                </div>
                <button class="relative p-2 text-blue-400 hover:text-blue-600 transition-colors">
                    <i data-lucide="bell" class="w-5 h-5"></i>
                    <span class="absolute top-2 right-2 w-2 h-2 bg-red-500 rounded-full border-2 border-white"></span>
                </button>
            </div>
        </header>

        <!-- SCROLLABLE BODY (Flex Column container) -->
        <main id="app-content" class="flex-1 overflow-hidden p-0 sm:p-6 h-full flex flex-col">
            <!-- Content injected by JS -->
        </main>

        <!-- FOOTER -->
        <footer class="py-4 px-8 border-t border-blue-100 bg-white/40 backdrop-blur-sm shrink-0">
            <div class="flex flex-col md:flex-row justify-between items-center gap-4 text-xs text-blue-500 font-medium">
                <div class="text-center md:text-left">
                    <p class="font-bold text-blue-800 text-sm mb-1 uppercase tracking-wide">Đoàn cơ sở Bệnh viện 30 - 04, Bộ Công An</p>
                    <p>&copy; 2026. Xây dựng và phát triển bởi Ban Chấp Hành.</p>
                </div>
            </div>
        </footer>

    </div>

    <!-- Modal/Overlay for Forms -->
    <div id="modal-overlay" class="hidden fixed inset-0 z-[60] bg-blue-900/40 backdrop-blur-sm transition-opacity opacity-0 flex items-center justify-center p-4">
        <div id="modal-content" class="bg-white w-full max-w-2xl rounded-3xl shadow-2xl transform scale-95 opacity-0 transition-all duration-300 max-h-[95vh] flex flex-col border border-blue-100">
            <!-- Modal Content Injected JS -->
        </div>
    </div>

    <!-- JavaScript Logic -->
    <script>
        // --- AUTH STORE ---
        const ADMIN_PASS = "admin"; // Mật khẩu mặc định
        let isAdmin = false;

        // Load auth status from LocalStorage
        if (localStorage.getItem('isAdmin') === 'true') {
            isAdmin = true;
        }

        function handleAuthClick() {
            if (isAdmin) {
                if(confirm("Bạn muốn đăng xuất?")) {
                    isAdmin = false;
                    localStorage.setItem('isAdmin', 'false');
                    updateAuthUI();
                    alert("Đã đăng xuất.");
                }
            } else {
                const pass = prompt("Nhập mật khẩu Quản trị viên:");
                if (pass === ADMIN_PASS) {
                    isAdmin = true;
                    localStorage.setItem('isAdmin', 'true');
                    updateAuthUI();
                    alert("Đăng nhập thành công! Bạn có thể chỉnh sửa dữ liệu.");
                } else if (pass !== null) {
                    alert("Mật khẩu không đúng.");
                }
            }
        }

        function updateAuthUI() {
            const nameEl = document.getElementById('auth-user-name');
            const roleEl = document.getElementById('auth-user-role');
            const iconEl = document.getElementById('auth-icon');
            const container = document.getElementById('auth-status-container');

            if (isAdmin) {
                nameEl.textContent = "Quản trị viên";
                roleEl.textContent = "Đang hoạt động";
                roleEl.className = "text-xs text-green-600 font-bold";
                iconEl.setAttribute('data-lucide', 'log-out');
                container.className = "bg-green-50 p-4 rounded-xl flex items-center gap-3 border border-green-200 cursor-pointer hover:shadow-md transition-all";
            } else {
                nameEl.textContent = "Khách";
                roleEl.textContent = "Chạm để đăng nhập";
                roleEl.className = "text-xs text-blue-500 truncate";
                iconEl.setAttribute('data-lucide', 'log-in');
                container.className = "bg-gradient-to-r from-blue-50 to-cyan-50 p-4 rounded-xl flex items-center gap-3 border border-blue-100 cursor-pointer hover:shadow-md transition-all";
            }
            lucide.createIcons();
            // Re-render current view to ensure UI reflects auth state (optional but good)
            render(); 
        }

        function requireAuth() {
            if (isAdmin) return true;
            
            const pass = prompt("Chức năng này cần quyền Quản trị.\nVui lòng nhập mật khẩu:");
            if (pass === ADMIN_PASS) {
                isAdmin = true;
                localStorage.setItem('isAdmin', 'true');
                updateAuthUI();
                return true;
            } else if (pass !== null) {
                alert("Mật khẩu không đúng.");
            }
            // If auth failed, force re-render to revert any UI changes (like checkboxes/selects toggling)
            setTimeout(render, 100); 
            return false;
        }

        // --- DATA STORE ---
        const MEMBERS = [
            { id: 1, name: "Nguyễn Văn A", role: "Bí thư", avatar: "A", color: "bg-red-100 text-red-600", image: null },
            { id: 2, name: "Trần Thị B", role: "Phó Bí thư", avatar: "B", color: "bg-orange-100 text-orange-600", image: null },
            { id: 3, name: "Lê Văn C", role: "UV BCH", avatar: "C", color: "bg-blue-100 text-blue-600", image: null },
            { id: 4, name: "Phạm Thị D", role: "UV BCH", avatar: "D", color: "bg-purple-100 text-purple-600", image: null },
            { id: 5, name: "Hoàng Văn E", role: "UV BCH", avatar: "E", color: "bg-green-100 text-green-600", image: null },
        ];

        const TODO_STATUS = {
            'pending': { label: 'Chưa làm', color: 'text-gray-500', bg: 'bg-gray-100', border: 'border-gray-200' },
            'in-progress': { label: 'Đang làm', color: 'text-blue-600', bg: 'bg-blue-50', border: 'border-blue-200' },
            'completed': { label: 'Hoàn tất', color: 'text-green-600', bg: 'bg-green-50', border: 'border-green-200' },
            'cancelled': { label: 'Hủy bỏ', color: 'text-red-500', bg: 'bg-red-50', border: 'border-red-200' }
        };

        const STATUS_CONFIG = {
            pending: { label: "Sắp tới", color: "text-gray-500", bg: "bg-gray-100", icon: "circle" },
            "in-progress": { label: "Đang làm", color: "text-blue-600", bg: "bg-blue-100", icon: "clock" },
            completed: { label: "Hoàn thành", color: "text-green-600", bg: "bg-green-100", icon: "check-circle-2" },
        };

        let state = {
            view: 'dashboard',
            selectedMonth: null,
            activeEventId: null,
            isTaskExpanded: true, 
            taskId: null,
            events: Array.from({ length: 12 }, (_, i) => ({
                month: i + 1,
                title: `Tháng ${i + 1}`,
                theme: i === 2 ? "Tháng Thanh Niên" : (i === 6 ? "Chiến dịch Mùa Hè Xanh" : ""),
                items: i === 2 ? [
                    { 
                        id: 101, title: "Lễ ra quân Tháng Thanh Niên", date: "2024-03-01", time: "07:30", location: "Sân trường ĐH", organizers: [1, 2], participants: "Toàn bộ đoàn viên", status: "completed", 
                        content: "7h30: Tập trung\n8h00: Chào cờ\n8h30: Phát biểu khai mạc\n9h00: Ra quân dọn vệ sinh", important_notes: "Yêu cầu mặc áo Thanh niên Việt Nam đầy đủ.", budget: "2.000.000",
                        plan_link: "https://docs.google.com/document/d/123456789/edit",
                        absentees: [5],
                        absence_reason: "Đồng chí E đi công tác.",
                        checklist: [
                            { id: 1, text: "Thuê âm thanh", description: "Thuê 2 loa công suất lớn, 4 mic không dây.", assigneeId: 1, status: 'completed' },
                            { id: 2, text: "In băng rôn", description: "Kích thước 8m x 1m, logo Đoàn trường bên trái.", assigneeId: 2, status: 'completed' },
                            { id: 3, text: "Mua nước uống", description: "5 thùng Aquafina, ly nhựa dùng 1 lần.", assigneeId: 3, status: 'in-progress' }
                        ]
                    },
                    { 
                        id: 102, title: "Hội thao Cán bộ Đoàn", date: "2024-03-15", time: "08:00", location: "Nhà thi đấu", organizers: [3, 4], participants: "BCH các chi đoàn", status: "in-progress", 
                        content: "Thi đấu 3 môn...", important_notes: "Liên hệ y tế trực tại sân.", budget: "5.000.000",
                        plan_link: "",
                        absentees: [],
                        absence_reason: "",
                        checklist: [
                            { id: 4, text: "Đặt sân", description: "Đặt 3 sân cầu lông", assigneeId: 3, status: 'completed' },
                            { id: 5, text: "Mua giải thưởng", description: "Cờ lưu niệm", assigneeId: 4, status: 'pending' }
                        ]
                    }
                ] : []
            }))
        };

        // --- HELPER FUNCTIONS ---

        function getAvatarHTML(member, sizeClass = "w-10 h-10", textSize = "text-sm") {
            if (!member) return `<div class="${sizeClass} rounded-full flex items-center justify-center font-bold ${textSize} bg-gray-200 text-gray-500 border-2 border-white">?</div>`;
            if (member.image) {
                return `<img src="${member.image}" class="${sizeClass} rounded-full object-cover border-2 border-white shadow-sm">`;
            }
            return `<div class="${sizeClass} rounded-full flex items-center justify-center font-bold ${textSize} shadow-inner border-2 border-white ${member.color}">
                        ${member.avatar}
                    </div>`;
        }

        // --- CORE FUNCTIONS ---

        function init() {
            updateAuthUI();
            renderSidebarMonths();
            render();
        }

        function router(viewName, params = null) {
            state.view = viewName;
            
            if (viewName === 'month') {
                state.selectedMonth = params;
                state.activeEventId = null; 
            } else if (viewName === 'tasks') {
                state.taskId = params;
            }
            
            const sidebar = document.getElementById('sidebar');
            if (!sidebar.classList.contains('-translate-x-full') && window.innerWidth < 768) {
                toggleMobileMenu();
            }
            render();
        }

        function selectEvent(eventId) {
            state.activeEventId = eventId;
            state.isTaskExpanded = false; // Reset accordion state
            render();
        }

        function toggleTaskAccordion() {
            state.isTaskExpanded = !state.isTaskExpanded;
            const container = document.getElementById('task-accordion-container');
            const icon = document.getElementById('task-accordion-icon');
            
            if (state.isTaskExpanded) {
                renderChecklistInline(); 
                container.classList.remove('hidden');
                container.classList.add('animate-in', 'slide-in-from-top-2', 'fade-in');
                if(icon) icon.style.transform = 'rotate(180deg)';
            } else {
                container.classList.add('hidden');
                if(icon) icon.style.transform = 'rotate(0deg)';
            }
        }

        function toggleMobileMenu() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('mobile-menu-overlay');
            sidebar.classList.toggle('-translate-x-full');
            if (overlay.classList.contains('hidden')) {
                overlay.classList.remove('hidden');
                setTimeout(() => overlay.classList.remove('opacity-0'), 10);
            } else {
                overlay.classList.add('opacity-0');
                setTimeout(() => overlay.classList.add('hidden'), 300);
            }
        }

        function renderSidebarMonths() {
            const container = document.getElementById('month-menu-list');
            let html = '';
            state.events.forEach(m => {
                html += `
                    <button onclick="router('month', ${m.month})" id="nav-month-${m.month}" class="sidebar-item w-full flex items-center justify-between px-4 py-2.5 rounded-xl text-sm font-medium transition-all text-gray-500 hover:bg-blue-50 hover:text-blue-600 text-gray-600 border border-transparent">
                        <span class="flex items-center gap-3">
                            <span class="w-6 h-6 rounded-lg bg-blue-50 text-blue-600 flex items-center justify-center text-xs font-bold group-hover:bg-white group-hover:shadow-sm transition-colors nav-month-badge border border-blue-100">${m.month}</span>
                            Tháng ${m.month}
                        </span>
                        ${m.items.length > 0 ? `<span class="w-1.5 h-1.5 rounded-full bg-blue-500"></span>` : ''}
                    </button>
                `;
            });
            container.innerHTML = html;
        }

        function render() {
            const contentEl = document.getElementById('app-content');
            const breadcrumbsEl = document.getElementById('header-breadcrumbs');

            document.querySelectorAll('.sidebar-item').forEach(el => {
                el.className = el.className.replace('bg-blue-600 text-white shadow-lg shadow-blue-500/30 hover:bg-blue-700 hover:text-white border-blue-600', 'hover:bg-blue-50 hover:text-blue-600 text-gray-600 border-transparent');
                const badge = el.querySelector('.nav-month-badge');
                if(badge) badge.className = "w-6 h-6 rounded-lg bg-blue-50 text-blue-600 flex items-center justify-center text-xs font-bold group-hover:bg-white group-hover:shadow-sm transition-colors nav-month-badge border border-blue-100";
            });

            if (state.view === 'dashboard') {
                document.getElementById('nav-dashboard').className = "sidebar-item w-full flex items-center gap-3 px-4 py-3 rounded-xl font-medium transition-all bg-blue-600 text-white shadow-lg shadow-blue-500/30 hover:bg-blue-700 hover:text-white border border-blue-500";
                breadcrumbsEl.innerHTML = `<span>Trang chủ</span> <i data-lucide="chevron-right" class="w-4 h-4"></i> <span class="text-blue-900 font-bold">Tổng quan</span>`;
                contentEl.innerHTML = renderDashboard(); 
                contentEl.className = "flex-1 overflow-y-auto no-scrollbar p-4 sm:p-8"; 
            } 
            else if (state.view === 'members') {
                document.getElementById('nav-members').className = "sidebar-item w-full flex items-center gap-3 px-4 py-3 rounded-xl font-medium transition-all bg-blue-600 text-white shadow-lg shadow-blue-500/30 hover:bg-blue-700 hover:text-white border border-blue-500";
                breadcrumbsEl.innerHTML = `<span>Trang chủ</span> <i data-lucide="chevron-right" class="w-4 h-4"></i> <span class="text-blue-900 font-bold">Đoàn viên</span>`;
                contentEl.innerHTML = renderMembers();
                contentEl.className = "flex-1 overflow-y-auto no-scrollbar p-4 sm:p-8";
            } 
            else if (state.view === 'month') {
                const btn = document.getElementById(`nav-month-${state.selectedMonth}`);
                if(btn) {
                    btn.className = "sidebar-item w-full flex items-center justify-between px-4 py-2.5 rounded-xl text-sm font-medium transition-all bg-white text-blue-600 shadow-md border border-blue-200 group";
                    const badge = btn.querySelector('.nav-month-badge');
                    if(badge) badge.className = "w-6 h-6 rounded-lg bg-blue-100 text-blue-600 flex items-center justify-center text-xs font-bold transition-colors nav-month-badge";
                }
                breadcrumbsEl.innerHTML = `<span>Kế hoạch</span> <i data-lucide="chevron-right" class="w-4 h-4"></i> <span class="text-blue-900 font-bold">Tháng ${state.selectedMonth}</span>`;
                renderMonthDetail(contentEl); 
                contentEl.className = "flex-1 overflow-hidden p-0 sm:p-6 h-full flex flex-col"; 
            }
            else if (state.view === 'tasks') {
                let eventTitle = "Chi tiết";
                state.events.forEach(m => {
                    const found = m.items.find(e => e.id === state.taskId);
                    if(found) eventTitle = found.title;
                });
                breadcrumbsEl.innerHTML = `<span>Kế hoạch</span> <i data-lucide="chevron-right" class="w-4 h-4"></i> <span class="truncate max-w-[150px]">${eventTitle}</span> <i data-lucide="chevron-right" class="w-4 h-4"></i> <span class="text-blue-900 font-bold">Tiến độ</span>`;
                renderTaskManager(contentEl);
                contentEl.className = "flex-1 overflow-y-auto no-scrollbar p-4 sm:p-8";
            }

            lucide.createIcons();
        }

        // --- RENDERERS ---

        function renderDashboard() {
            let html = `
                <div class="max-w-6xl mx-auto space-y-8 fade-in p-4 sm:p-0">
                    <!-- Hero Header -->
                    <div class="relative rounded-3xl overflow-hidden shadow-xl shadow-blue-900/20 min-h-[180px] sm:min-h-[220px] flex items-center group border border-blue-200">
                        <div class="absolute inset-0 bg-blue-700">
                            <img src="https://images.unsplash.com/photo-1557804506-669a67965ba0?ixlib=rb-4.0.3&auto=format&fit=crop&w=1674&q=80" class="w-full h-full object-cover opacity-30 mix-blend-overlay transition-transform duration-1000 group-hover:scale-105">
                            <div class="absolute inset-0 bg-gradient-to-r from-blue-900/90 via-blue-800/80 to-blue-600/60"></div>
                            <div class="absolute -right-20 -top-20 w-64 h-64 bg-white/10 rounded-full blur-3xl"></div>

        function renderChecklistInline() {
            const container = document.getElementById('task-accordion-container');
            if(!container) return;

            const monthIdx = state.selectedMonth - 1;
            const event = state.events[monthIdx].items.find(e => e.id === state.activeEventId);
            if(!event) return;

            if(!event.checklist || event.checklist.length === 0) {
                container.innerHTML = `<p class="text-base text-gray-400 italic py-2">Chưa có công việc nào. Bấm nút sửa để thêm.</p>`;
                return;
            }

            // Grouping Logic... (Same as before)
            const tasksByAssignee = {};
            event.checklist.forEach((item, index) => {
                const id = item.assigneeId || 'unassigned';
                if (!tasksByAssignee[id]) tasksByAssignee[id] = [];
                tasksByAssignee[id].push({ ...item, originalIndex: index });
            });

            let html = '';
            const sortedAssigneeIds = Object.keys(tasksByAssignee).sort((a, b) => {
                if (a === 'unassigned') return 1;
                if (b === 'unassigned') return -1;
                return 0;
            });

            sortedAssigneeIds.forEach(assigneeId => {
                const groupTasks = tasksByAssignee[assigneeId];
                let header = '';
                
                if (assigneeId === 'unassigned') {
                    header = `
                        <div class="flex items-center gap-2 mb-2">
                            <div class="w-8 h-8 rounded-full bg-gray-200 flex items-center justify-center text-gray-500 font-bold text-xs">?</div>
                            <span class="font-bold text-gray-500">Chưa phân công</span>
                        </div>
                    `;
                } else {
                    const member = MEMBERS.find(m => m.id == assigneeId);
                    if (member) {
                        header = `
                            <div class="flex items-center gap-2 mb-2">
                                ${getAvatarHTML(member, "w-8 h-8", "text-xs")}
                                <div>
                                    <p class="font-bold text-gray-800 text-sm">${member.name}</p>
                                    <p class="text-[10px] text-gray-500 uppercase">${member.role}</p>
                                </div>
                            </div>
                        `;
                    }
                }

                let tasksHtml = groupTasks.map(t => {
                    const st = TODO_STATUS[t.status];
                    return `
                        <div class="bg-white p-3 rounded-xl border border-blue-100 shadow-sm flex flex-col gap-1 hover:border-blue-400 transition-colors mb-2">
                            <div class="flex items-start gap-3">
                                <div class="mt-1.5 w-3 h-3 rounded-full ${st.bg.replace('bg-', 'bg-')} ${st.color.replace('text-', 'bg-')} shrink-0"></div>
                                <div class="flex-1 min-w-0">
                                    <p class="text-base font-bold text-gray-900 leading-tight">${t.text}</p>
                                    ${t.description ? `<p class="text-sm text-gray-600 mt-1 line-clamp-2">${t.description}</p>` : ''}
                                </div>
                                <span class="text-[10px] font-bold px-2 py-1 rounded-md border ${st.border} ${st.bg} ${st.color} whitespace-nowrap shrink-0">${st.label}</span>
                            </div>
                        </div>
                    `;
                }).join('');

                html += `
                    <div class="mb-4 last:mb-0">
                        ${header}
                        <div class="pl-3 border-l-2 border-blue-100 ml-4">
                            ${tasksHtml}
                        </div>
                    </div>
                `;
            });
            
            container.innerHTML = html;
            lucide.createIcons();

        // --- NEW FULL-PAGE TASK MANAGER ---

        function renderTaskManager(content) {
            let event = null;
            let monthIdx = -1;
            
            // Find event
            state.events.forEach((m, idx) => {
                const found = m.items.find(e => e.id === state.taskId);
                if(found) {
                    event = found;
                    monthIdx = idx;
                }
            });

            if (!event) {
                content.innerHTML = `<div class="p-8 text-center text-gray-500">Không tìm thấy sự kiện.</div>`;
                return;
            }

            const totalCheck = event.checklist ? event.checklist.length : 0;
            const doneCheck = event.checklist ? event.checklist.filter(c => c.status === 'completed').length : 0;
            const percent = totalCheck > 0 ? Math.round((doneCheck/totalCheck)*100) : 0;

        function renderTaskManagerList(event) {
            const container = document.getElementById('task-manager-list');
            if(!container || !event.checklist || event.checklist.length === 0) return;

            const tasksByAssignee = {};
            event.checklist.forEach((item, index) => {
                const id = item.assigneeId || 'unassigned';
                if (!tasksByAssignee[id]) tasksByAssignee[id] = [];
                tasksByAssignee[id].push({ ...item, originalIndex: index });
            });

            let html = '';
            
            const sortedAssigneeIds = Object.keys(tasksByAssignee).sort((a, b) => {
                if (a === 'unassigned') return 1;
                if (b === 'unassigned') return -1;
                return 0;
            });

            sortedAssigneeIds.forEach(assigneeId => {
                const groupTasks = tasksByAssignee[assigneeId];
                let header = '';
                
                if (assigneeId === 'unassigned') {
                    header = `
                        <div class="flex items-center gap-3 mb-3 mt-6">
                            <div class="w-10 h-10 rounded-full bg-gray-200 flex items-center justify-center text-gray-500 font-bold text-sm">?</div>
                            <h3 class="text-lg font-bold text-gray-500">Chưa phân công</h3>
                        </div>
                    `;
                } else {
                    const member = MEMBERS.find(m => m.id == assigneeId);
                    if (member) {
                        header = `
                            <div class="flex items-center gap-3 mb-3 mt-6">
                                ${getAvatarHTML(member, "w-10 h-10", "text-sm")}
                                <div>
                                    <h3 class="text-lg font-bold text-gray-900">${member.name}</h3>
                                    <p class="text-xs text-gray-500 uppercase font-semibold">${member.role}</p>
                                </div>
                            </div>
                        `;
                    }
                }

                let tasksHtml = groupTasks.map(t => {
                    const index = t.originalIndex;
                    const st = TODO_STATUS[t.status];
                    
                    const statusOptions = Object.entries(TODO_STATUS).map(([key, val]) => 
                        `<option value="${key}" ${t.status === key ? 'selected' : ''}>${val.label}</option>`
                    ).join('');
                    const memberOptions = MEMBERS.map(m => 
                        `<option value="${m.id}" ${t.assigneeId == m.id ? 'selected' : ''}>${m.name}</option>`
                    ).join('');

                    return `
                        <div class="bg-white p-5 rounded-2xl border border-blue-100 shadow-sm hover:border-blue-400 transition-all group relative mb-3">
                            <div class="flex flex-col md:flex-row gap-4 items-start md:items-center">
                                <div class="w-2 h-2 md:h-12 rounded-full ${st.bg.replace('bg-', 'bg-')} ${st.color.replace('text-', 'bg-')} shrink-0"></div>
                                <div class="flex-1 w-full space-y-2">
                                    <input type="text" value="${t.text}" 
                                        onchange="if(requireAuth()) updateTaskFromManager(${index}, 'text', this.value)"
                                        class="text-lg font-bold text-gray-900 bg-transparent outline-none border-b border-transparent focus:border-blue-200 focus:bg-blue-50/50 rounded px-1 transition-colors w-full placeholder-gray-400" placeholder="Tên công việc...">
                                    
                                    <textarea rows="3" 
                                        onchange="if(requireAuth()) updateTaskFromManager(${index}, 'description', this.value)"
                                        class="w-full text-sm text-gray-900 bg-gray-50 rounded-lg p-3 outline-none focus:ring-1 focus:ring-blue-200 resize-y" placeholder="Mô tả chi tiết cách thực hiện...">${t.description || ''}</textarea>
                                </div>
                                <div class="flex flex-col sm:flex-row gap-3 w-full md:w-auto min-w-[200px]">
                                    <div class="relative flex-1">
                                        <select onchange="if(requireAuth()) updateTaskFromManager(${index}, 'assigneeId', this.value)" 
                                            class="w-full bg-white border border-blue-100 text-gray-700 text-sm font-medium rounded-xl py-2.5 pl-4 pr-8 appearance-none focus:outline-none focus:border-blue-400 cursor-pointer hover:bg-gray-50">
                                            <option value="">-- Phụ trách --</option>
                                            ${memberOptions}
                                        </select>
                                        <i data-lucide="chevron-down" class="absolute right-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400 pointer-events-none"></i>
                                    </div>
                                    <div class="relative flex-1">
                                        <select onchange="if(requireAuth()) updateTaskFromManager(${index}, 'status', this.value)" 
                                            class="w-full border ${st.border} ${st.bg} ${st.color} text-sm font-bold rounded-xl py-2.5 pl-4 pr-8 appearance-none focus:outline-none cursor-pointer hover:brightness-95 transition-all">
                                            ${statusOptions}
                                        </select>
                                        <i data-lucide="chevron-down" class="absolute right-3 top-1/2 -translate-y-1/2 w-4 h-4 opacity-50 pointer-events-none"></i>
                                    </div>
                                </div>
                                <button onclick="if(requireAuth()) removeTaskFromManager(${index})" class="absolute top-4 right-4 md:static p-2 text-gray-300 hover:text-red-500 hover:bg-red-50 rounded-lg transition-colors" title="Xóa việc này">

                    `;
                }).join('');

                html += `

            container.innerHTML = html;

        // --- MANAGER LOGIC ---

        function updateTaskFromManager(index, field, value) {
            let event = null;
            state.events.forEach(m => {
                const found = m.items.find(e => e.id === state.taskId);
                if(found) event = found;
            });
            
            if(event && event.checklist[index]) {
                event.checklist[index][field] = value;
                const contentEl = document.getElementById('app-content');
                renderTaskManager(contentEl);
            }
        }

        function addTaskFromManager() {
            let event = null;
            state.events.forEach(m => {
                const found = m.items.find(e => e.id === state.taskId);
                if(found) event = found;
            });

            if(event) {
                if(!event.checklist) event.checklist = [];
                event.checklist.push({ id: Date.now(), text: "", description: "", assigneeId: "", status: 'pending' });
                const contentEl = document.getElementById('app-content');
                renderTaskManager(contentEl);
                setTimeout(() => {
                    const inputs = document.querySelectorAll('#task-manager-list input[type="text"]');
                    if(inputs.length > 0) inputs[inputs.length - 1].focus();
                }, 50);
            }
        }

        function removeTaskFromManager(index) {
            if(!confirm("Xóa đầu việc này?")) return;
            let event = null;
            state.events.forEach(m => {
                const found = m.items.find(e => e.id === state.taskId);
                if(found) event = found;
            });

            if(event) {
                event.checklist.splice(index, 1);
                const contentEl = document.getElementById('app-content');
                renderTaskManager(contentEl);
            }
        }

        function previewAvatar(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    tempAvatar = e.target.result;
                    const preview = document.getElementById('m-avatar-preview');
                    preview.innerHTML = `<img src="${tempAvatar}" class="w-full h-full object-cover">`;
                }
                reader.readAsDataURL(input.files[0]);
            }
        }

        function saveMember(memberId) {
            const name = document.getElementById('m-name').value.trim();
            const role = document.getElementById('m-role').value.trim();
            
            if(!name || !role) {
                alert('Vui lòng điền đầy đủ thông tin!');
                return;
            }

            const words = name.split(' ');
            const avatarChar = words.length > 0 ? words[words.length - 1][0].toUpperCase() : 'A';
            
            if (memberId) {
                const idx = MEMBERS.findIndex(m => m.id === memberId);
                if (idx !== -1) {
                    MEMBERS[idx].name = name;
                    MEMBERS[idx].role = role;
                    MEMBERS[idx].avatar = avatarChar;
                    if(tempAvatar) MEMBERS[idx].image = tempAvatar;
                }
            } else {
                const color = MEMBER_COLORS[Math.floor(Math.random() * MEMBER_COLORS.length)];
                const newMember = {
                    id: Date.now(),
                    name: name,
                    role: role,
                    avatar: avatarChar,
                    color: color,
                    image: tempAvatar
                };
                MEMBERS.push(newMember);
            }

            closeModal();
            render();
        }

            const idx = MEMBERS.findIndex(m => m.id === id);
            if (idx !== -1) MEMBERS.splice(idx, 1);
            closeModal();
            render();
        }

                            <!-- Items injected here -->
                        </div>
                        
                        <div id="empty-checklist-state" class="hidden text-center py-6 text-gray-400 text-sm">
                            Chưa có công việc nào. Bấm "Thêm việc" để bắt đầu.
                        </div>
                    </div>

                    <div class="bg-red-50 p-4 rounded-xl border border-red-100">
                        <label class="block text-sm font-bold text-red-600 mb-2 flex items-center gap-2">
                            <i data-lucide="alert-circle" class="w-4 h-4"></i> Lưu ý quan trọng
                        </label>
                        <textarea id="f-important" rows="2" class="w-full bg-white border border-red-200 rounded-xl p-3 text-sm focus:outline-none focus:ring-2 focus:ring-red-100" placeholder="Các vấn đề cần đặc biệt chú ý...">${data.important_notes || ''}</textarea>
                    </div>

                    ${!isNew ? `
                        <div>
                            <label class="block text-sm font-bold text-gray-700 mb-2">Trạng thái chung</label>
                            <div class="grid grid-cols-3 gap-3">
                                <label class="cursor-pointer">
                                    <input type="radio" name="status" value="pending" class="peer sr-only" ${data.status === 'pending' ? 'checked' : ''}>
                                    <div class="text-center py-2 rounded-lg border border-gray-200 text-gray-500 peer-checked:bg-gray-100 peer-checked:text-gray-900 peer-checked:border-gray-400 font-bold text-sm">Sắp tới</div>
                                </label>
                                <label class="cursor-pointer">
                                    <input type="radio" name="status" value="in-progress" class="peer sr-only" ${data.status === 'in-progress' ? 'checked' : ''}>
                                    <div class="text-center py-2 rounded-lg border border-gray-200 text-gray-500 peer-checked:bg-blue-50 peer-checked:text-blue-600 peer-checked:border-blue-300 font-bold text-sm">Đang làm</div>
                                </label>
                                <label class="cursor-pointer">
                                    <input type="radio" name="status" value="completed" class="peer sr-only" ${data.status === 'completed' ? 'checked' : ''}>
                                    <div class="text-center py-2 rounded-lg border border-gray-200 text-gray-500 peer-checked:bg-green-50 peer-checked:text-green-600 peer-checked:border-green-300 font-bold text-sm">Hoàn thành</div>
                                </label>
                            </div>
                        </div>
                    ` : ''}

                </div>

                <div class="p-6 border-t border-gray-100 bg-gray-50 rounded-b-3xl flex gap-3">
                    ${!isNew ? `<button onclick="deleteEvent(${eventId})" class="px-6 py-3 rounded-xl font-bold text-red-500 bg-red-50 hover:bg-red-100 transition-colors">Xóa</button>` : ''}
                    <button onclick="saveEvent(${isNew ? 'null' : eventId})" class="flex-1 bg-blue-600 text-white py-3 rounded-xl font-bold shadow-lg shadow-blue-500/30 hover:bg-blue-700 transition-transform active:scale-95">Lưu hoạt động</button>
                </div>
            `;
            
            renderChecklist();
            lucide.createIcons();
        }

        // --- CHECKLIST & SAVE EVENT LOGIC ---

        function addTodo() {
            currentChecklist.push({ id: Date.now(), text: "", description: "", assigneeId: "", status: 'pending' });
            renderChecklist();
            setTimeout(() => {
                const inputs = document.querySelectorAll('#checklist-container input');
                if(inputs.length > 0) inputs[inputs.length - 1].focus();
            }, 50);
        }

        function updateTodoField(index, field, value) {
            currentChecklist[index][field] = value;
            if(field === 'status') renderChecklist();
        }

        function removeTodo(index) {
            currentChecklist.splice(index, 1);
            renderChecklist();
        }

        function renderChecklist() {
            const container = document.getElementById('checklist-container');
            const emptyState = document.getElementById('empty-checklist-state');
            
            if(!container) return;

            if(currentChecklist.length === 0) {
                emptyState.classList.remove('hidden');
            } else {
                emptyState.classList.add('hidden');
            }
            
            container.innerHTML = currentChecklist.map((item, index) => {
                const st = TODO_STATUS[item.status];
                const memberOptions = MEMBERS.map(m => `<option value="${m.id}" ${item.assigneeId == m.id ? 'selected' : ''}>${m.name}</option>`).join('');
                const statusOptions = Object.entries(TODO_STATUS).map(([key, val]) => `<option value="${key}" ${item.status === key ? 'selected' : ''}>${val.label}</option>`).join('');

                return `
                <div class="bg-white border border-gray-200 rounded-xl p-3 shadow-sm group hover:border-blue-300 transition-colors">
                    <div class="flex flex-col sm:flex-row gap-3 items-start sm:items-center mb-2">
                        <div class="hidden sm:block w-1 self-stretch rounded-full ${st.bg.replace('bg-', 'bg-')} ${st.color.replace('text-', 'bg-')} opacity-50"></div>
                        <div class="flex-1 w-full">
                            <input type="text" value="${item.text}" onchange="updateTodoField(${index}, 'text', this.value)" class="w-full font-semibold text-gray-700 placeholder-gray-400 bg-transparent outline-none focus:text-blue-700" placeholder="Nhập tên công việc...">
                        </div>
                        <div class="grid grid-cols-2 sm:flex items-center gap-2 w-full sm:w-auto">
                            <div class="relative col-span-1">
                                <select onchange="updateTodoField(${index}, 'assigneeId', this.value)" class="w-full sm:w-32 text-xs font-medium border border-gray-200 bg-gray-50 text-gray-600 rounded-lg py-1.5 pl-2 pr-6 appearance-none focus:outline-none focus:border-blue-300 cursor-pointer hover:bg-white transition-colors">
                                    <option value="">-- Phụ trách --</option>${memberOptions}
                                </select>
                                <i data-lucide="user" class="absolute right-2 top-1/2 -translate-y-1/2 w-3 h-3 text-gray-400 pointer-events-none"></i>
                            </div>
                            <div class="relative col-span-1">
                                <select onchange="updateTodoField(${index}, 'status', this.value)" class="w-full sm:w-28 text-xs font-bold border ${st.border} ${st.bg} ${st.color} rounded-lg py-1.5 pl-2 pr-6 appearance-none focus:outline-none cursor-pointer">
                                    ${statusOptions}
                                </select>
                                <i data-lucide="chevron-down" class="absolute right-2 top-1/2 -translate-y-1/2 w-3 h-3 opacity-50 pointer-events-none"></i>
                            </div>
                            <button onclick="removeTodo(${index})" class="absolute sm:static top-2 right-2 p-1.5 text-gray-300 hover:text-red-500 hover:bg-red-50 rounded-lg transition-all sm:opacity-0 group-hover:opacity-100">
                                <i data-lucide="trash-2" class="w-4 h-4"></i>
                            </button>
                        </div>
                    </div>
                    <div class="pl-0 sm:pl-4 mt-2 border-t border-gray-50 pt-2">
                        <textarea rows="3" onchange="updateTodoField(${index}, 'description', this.value)" class="w-full text-xs text-gray-600 bg-gray-50 rounded-lg p-2 focus:bg-white focus:ring-1 focus:ring-blue-100 outline-none resize-y placeholder-gray-400" placeholder="Mô tả chi tiết cách thực hiện...">${item.description || ''}</textarea>
                    </div>
                </div>`;
            }).join('');
            lucide.createIcons();
        }

        function closeModal() {
            const overlay = document.getElementById('modal-overlay');
            const content = document.getElementById('modal-content');
            content.classList.remove('scale-100', 'opacity-100');
            content.classList.add('scale-95', 'opacity-0');
            overlay.classList.add('opacity-0');
            setTimeout(() => { overlay.classList.add('hidden'); }, 300);
        }

        function saveEvent(eventId) {
            const title = document.getElementById('f-title').value;
            if(!title) { alert('Vui lòng nhập tên hoạt động'); return; }

            const monthIdx = state.selectedMonth ? state.selectedMonth - 1 : 0; 
            
            const organizers = [];
            document.querySelectorAll('#organizer-list button').forEach(btn => {
                if(btn.dataset.selected === 'true') organizers.push(parseInt(btn.dataset.id));
            });

            const absentees = [];
            document.querySelectorAll('#absentee-list button').forEach(btn => {
                if(btn.dataset.selected === 'true') absentees.push(parseInt(btn.dataset.id));
            });

            const statusInput = document.querySelector('input[name="status"]:checked');
            
            const newEvent = {
                id: eventId || Date.now(),
                title: title,
                date: document.getElementById('f-date').value,
                time: document.getElementById('f-time').value,
                location: document.getElementById('f-location').value,
                content: document.getElementById('f-content').value,
                important_notes: document.getElementById('f-important').value,
                budget: document.getElementById('f-budget').value,
                plan_link: document.getElementById('f-link').value,
                checklist: currentChecklist,
                organizers: organizers,
                absentees: absentees,
                absence_reason: document.getElementById('f-absence-reason').value,
                status: statusInput ? statusInput.value : 'pending',
                participants: 'Đoàn viên'
            };

            if (eventId) {
                const evIdx = state.events[monthIdx].items.findIndex(e => e.id === eventId);
                state.events[monthIdx].items[evIdx] = { ...state.events[monthIdx].items[evIdx], ...newEvent };
            } else {
                state.events[monthIdx].items.push(newEvent);
            }

            closeModal();
            render();
            renderSidebarMonths();
        }

        function deleteEvent(eventId) {
            if(!confirm('Xóa hoạt động này?')) return;
            const monthIdx = state.selectedMonth - 1;
            state.events[monthIdx].items = state.events[monthIdx].items.filter(e => e.id !== eventId);
            state.activeEventId = null; // Clear selection
            closeModal();
            render();
            renderSidebarMonths();
        }

        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
