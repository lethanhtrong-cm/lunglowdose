<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedExam Pro - Analytics Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0",
            "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
            "lucide-react": "https://esm.sh/lucide-react@0.344.0?deps=react@18.2.0",
            "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
            "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js",
            "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js"
        }
    }
    </script>

    <style>
        body { background-color: #0b1120; color: #f9fafb; font-family: 'Inter', sans-serif; overflow: hidden; }
        .sidebar-item { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .sidebar-item.active { background: #0891b2; color: white; box-shadow: 0 10px 15px -3px rgba(8, 145, 178, 0.3); }
        .glass-card { background: #111827; border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 1rem; }
        .metric-card { background: #1e293b; border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 1.25rem; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #1f2937; border-radius: 10px; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade { animation: fadeIn 0.4s ease-out forwards; }
        
        /* Đảm bảo modal luôn ở trên cùng và cố định */
        .modal-overlay { position: fixed; inset: 0; z-index: 9999; display: flex; align-items: center; justify-content: center; background-color: rgba(0, 0, 0, 0.85); backdrop-filter: blur(4px); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useMemo } from 'react';
        import { createRoot } from 'react-dom/client';
        import { initializeApp } from 'firebase/app';
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged, signOut } from 'firebase/auth';
        import { getFirestore, collection, query, onSnapshot, orderBy, limit, doc, deleteDoc, updateDoc, addDoc, serverTimestamp } from 'firebase/firestore';
        import { 
            LayoutGrid, Trophy, MessageSquare, Flag, LogOut, Search, 
            Activity, History, Users, Crown, FileText, Clock, AlertTriangle, CheckCircle, User, Zap, Tag, Trash2, Send, X, Inbox
        } from 'lucide-react';

        const firebaseConfig = {
            apiKey: "AIzaSyDqdo_DJIWa5iqxiCgBq-0iGX7f9sr6soo",
            authDomain: "rt-examination.firebaseapp.com",
            projectId: "rt-examination",
            storageBucket: "rt-examination.firebasestorage.app",
            messagingSenderId: "920482699854",
            appId: "1:920482699854:web:44f9b0d735bdc001c6c11f",
            measurementId: "G-8N7RTTREQM"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = 'med-exam-pro-html';

        const App = () => {
            const [user, setUser] = useState(null);
            const [activeTab, setActiveTab] = useState('analytics');
            const [data, setData] = useState({
                users: [],
                exams: [],
                activeExams: [],
                leaderboard: [],
                reviews: [],
                reports: []
            });
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                const initAuth = async () => {
                    try {
                        await signInAnonymously(auth);
                    } catch (err) {
                        console.error("Auth error:", err);
                        setLoading(false);
                    }
                };
                initAuth();
                const unsubscribe = onAuthStateChanged(auth, (u) => {
                    setUser(u);
                    if (u) setLoading(false);
                });
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!user) return;

                const unsubExams = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'exams'), s => updateData('exams', s));
                const unsubUsers = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'users'), s => updateData('users', s));
                const unsubActive = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'active_exams'), s => updateData('activeExams', s));
                const unsubLB = onSnapshot(query(collection(db, 'artifacts', appId, 'public', 'data', 'users'), orderBy('totalScore', 'desc'), limit(50)), s => updateData('leaderboard', s));
                const unsubRV = onSnapshot(query(collection(db, 'artifacts', appId, 'public', 'data', 'reviews'), orderBy('createdAt', 'desc')), s => updateData('reviews', s));
                const unsubRep = onSnapshot(query(collection(db, 'artifacts', appId, 'public', 'data', 'reports'), orderBy('createdAt', 'desc')), s => updateData('reports', s));

                return () => {
                    unsubExams(); unsubUsers(); unsubActive(); unsubLB(); unsubRV(); unsubRep();
                };
            }, [user]);

            const updateData = (key, snapshot) => {
                setData(prev => ({
                    ...prev,
                    [key]: snapshot.docs.map(d => ({ id: d.id, ...d.data() }))
                }));
            };

            const handleDelete = async (col, id) => {
                if(confirm("Xác nhận xóa bản ghi này?")) {
                    try {
                        await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', col, id));
                    } catch (e) { console.error(e); }
                }
            };

            const handleAcceptReportWithReply = async (report, replyMessage) => {
                try {
                    await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'reports', report.id), { 
                        status: 'accepted',
                        adminReply: replyMessage,
                        respondedAt: serverTimestamp()
                    });
                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'notifications'), {
                        title: "Báo cáo lỗi đã được xử lý",
                        message: `Admin phản hồi: "${replyMessage || 'Cảm ơn bạn đã báo cáo, chúng tôi đã tiếp nhận!'}"`,
                        targetUserId: report.userId,
                        createdAt: serverTimestamp()
                    });
                    return true;
                } catch (e) { 
                    console.error("Lỗi gửi phản hồi:", e);
                    return false; 
                }
            };

            if (loading) return (
                <div className="min-h-screen bg-[#0b1120] flex flex-col items-center justify-center text-cyan-500 gap-4 text-center">
                    <div className="w-10 h-10 border-2 border-cyan-500 border-t-transparent rounded-full animate-spin"></div>
                    <p className="font-bold tracking-widest uppercase text-xs">Khởi tạo hệ thống phân tích...</p>
                </div>
            );

            return (
                <div className="flex h-screen overflow-hidden">
                    <aside className="w-72 border-r border-white/5 bg-[#0b1120] flex flex-col shrink-0">
                        <div className="p-8 mb-4 flex items-center gap-3">
                            <Activity className="text-cyan-500" size={32}/>
                            <div className="text-left">
                                <h1 className="text-xl font-black text-white tracking-tight uppercase">Analytics</h1>
                                <p className="text-[10px] text-slate-500 font-bold tracking-widest uppercase">Portal</p>
                            </div>
                        </div>

                        <nav className="flex-1 px-4 space-y-4">
                            <SidebarLink icon={<LayoutGrid size={20}/>} label="Live Monitor" active={activeTab === 'analytics'} onClick={() => setActiveTab('analytics')} />
                            <SidebarLink icon={<Trophy size={20}/>} label="Bảng xếp hạng" active={activeTab === 'leaderboard'} onClick={() => setActiveTab('leaderboard')} />
                            <SidebarLink icon={<MessageSquare size={20}/>} label="Đánh giá & Góp ý" active={activeTab === 'feedback'} onClick={() => setActiveTab('feedback')} badge={data.reviews.filter(r => r.feedback).length} />
                            <SidebarLink icon={<Flag size={20}/>} label="Báo cáo lỗi" active={activeTab === 'reports'} onClick={() => setActiveTab('reports')} badge={data.reports.filter(r => r.status !== 'accepted').length} />
                        </nav>

                        <div className="p-8 border-t border-white/5 mt-auto">
                            <button onClick={() => signOut(auth)} className="flex items-center gap-3 text-slate-500 hover:text-white transition-colors text-sm font-bold uppercase tracking-wider"><LogOut size={18}/> Đăng xuất</button>
                        </div>
                    </aside>

                    <main className="flex-1 overflow-y-auto custom-scrollbar bg-[#0b1120]">
                        <div className="p-12 max-w-7xl mx-auto space-y-12">
                            {activeTab === 'analytics' && <AnalyticsView data={data} />}
                            {activeTab === 'leaderboard' && <LeaderboardView leaderboard={data.leaderboard} />}
                            {activeTab === 'feedback' && <FeedbackView reviews={data.reviews} onDelete={id => handleDelete('reviews', id)} />}
                            {activeTab === 'reports' && <ReportsView reports={data.reports} exams={data.exams} users={data.users} onAccept={handleAcceptReportWithReply} onDelete={id => handleDelete('reports', id)} />}
                        </div>
                    </main>
                </div>
            );
        };

        const SidebarLink = ({ icon, label, active, onClick, badge }) => (
            <button onClick={onClick} className={`sidebar-item w-full flex items-center justify-between px-6 py-4 rounded-2xl text-sm font-bold tracking-tight ${active ? 'active' : 'text-slate-400 hover:text-slate-200 hover:bg-white/5'}`}>
                <div className="flex items-center gap-4">{icon} {label}</div>
                {badge > 0 && <span className="bg-red-500 text-white text-[10px] w-5 h-5 flex items-center justify-center rounded-full font-black shadow-lg">{badge}</span>}
            </button>
        );

        const AnalyticsView = ({ data }) => {
            const now = Date.now();
            const onlineCount = data.users.filter(u => (now - (u.lastActive?.toDate?.().getTime() || 0)) < 300000).length;
            const recentSubCount = data.reviews.filter(r => (now - (r.createdAt?.toDate?.().getTime() || 0)) < 900000).length;

            return (
                <div className="space-y-10 animate-fade">
                    <header className="flex justify-between items-center text-left">
                        <div className="text-left">
                            <h2 className="text-4xl font-bold text-white tracking-tight">Dashboard</h2>
                            <p className="text-emerald-500 text-sm font-medium mt-1 flex items-center gap-2">
                                <span className="w-1.5 h-1.5 bg-emerald-500 rounded-full"></span> 
                                Hệ thống đang giám sát thời gian thực
                            </p>
                        </div>
                        <div className="flex items-center gap-3 bg-[#111827] px-4 py-2 rounded-2xl border border-white/10">
                            <Clock size={16} className="text-cyan-500"/><span className="text-xs font-mono">{new Date().toLocaleTimeString()}</span>
                        </div>
                    </header>
                    <div className="grid grid-cols-2 md:grid-cols-5 gap-4">
                        <MetricItem icon={<Activity size={20} className="text-emerald-400"/>} label="Hoạt động" value={onlineCount} />
                        <MetricItem icon={<History size={20} className="text-cyan-400"/>} label="Vừa nộp" value={recentSubCount} />
                        <MetricItem icon={<Users size={20} className="text-purple-400"/>} label="Học viên" value={data.users.length} />
                        <MetricItem icon={<Crown size={20} className="text-yellow-400"/>} label="VIP" value={data.users.filter(u=>u.isPremium).length} />
                        <MetricItem icon={<FileText size={20} className="text-blue-400"/>} label="Đề thi" value={data.exams.length} />
                    </div>
                    <section className="space-y-6">
                        <h3 className="text-xl font-bold text-white flex items-center gap-3 uppercase tracking-wider text-left"><Zap size={22} className="text-cyan-500"/> Trạng thái người dùng</h3>
                        <div className="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-6">
                            {data.activeExams.map(ex => (
                                <div key={ex.id} className="metric-card p-6 flex flex-col justify-between min-h-[220px] hover:scale-[1.03] transition-all shadow-xl">
                                    <div className="flex justify-between items-start">
                                        <div className="flex items-center gap-3 text-left">
                                            <div className="w-12 h-12 rounded-xl bg-[#0f172a] flex items-center justify-center font-black text-white border border-white/10 shadow-inner">{ex.displayName?.charAt(0) || "U"}</div>
                                            <div className="min-w-0 text-left">
                                                <p className="font-bold text-slate-100 text-sm truncate text-left">{ex.displayName}</p>
                                                <p className="text-[9px] text-slate-500 font-mono italic text-left">ID: {ex.uid?.substring(0, 6)}</p>
                                            </div>
                                        </div>
                                        <div className="flex items-center gap-1 bg-emerald-500/10 text-emerald-500 px-2 py-0.5 rounded-full border border-emerald-500/20 text-[8px] font-black uppercase"><div className="w-1 h-1 bg-emerald-500 rounded-full animate-pulse"></div> Live</div>
                                    </div>
                                    <div className="mt-4 p-3 bg-slate-900/80 rounded-xl border border-white/5 text-left">
                                        <p className="text-[9px] text-slate-600 font-black uppercase mb-1 tracking-widest text-left">Đang làm đề</p>
                                        <p className="text-xs font-bold text-cyan-400 truncate text-left">{ex.examTitle || "Đang tải đề..."}</p>
                                    </div>
                                    <div className="mt-4 flex justify-between items-center text-[10px] font-bold">
                                        <span className="text-slate-500 flex items-center gap-1"><Clock size={12}/> {Math.floor((now - (ex.startedAt?.toDate?.().getTime() || now)) / 60000)}p trước</span>
                                        <span className="text-red-500">Điểm: {(Math.random()*1).toFixed(1)}</span>
                                    </div>
                                </div>
                            ))}
                            {data.activeExams.length === 0 && <div className="col-span-full py-20 text-center glass-card border-dashed flex flex-col items-center gap-3 text-slate-600"><Inbox size={48} className="opacity-20"/><p className="italic text-sm font-medium">Hiện không có lượt thi trực tuyến.</p></div>}
                        </div>
                    </section>

                    <section className="glass-card p-10 space-y-8 shadow-2xl">
                        <h3 className="text-xl font-bold text-white flex items-center gap-3 uppercase tracking-wider text-left"><History size={22} className="text-cyan-500"/> Lịch sử nộp bài (Live Feed)</h3>
                        <div className="space-y-4 max-h-[500px] overflow-y-auto pr-4 custom-scrollbar">
                            {data.reviews.map(r => (
                                <div key={r.id} className="bg-slate-900/40 p-6 rounded-2xl border border-white/5 flex items-center justify-between group hover:bg-slate-800/60 transition-all">
                                    <div className="flex items-center gap-6 text-left">
                                        <div className="text-[11px] text-slate-600 font-mono font-bold">{r.createdAt?.toDate?.().toLocaleTimeString('vi-VN')}</div>
                                        <div className="text-left">
                                            <p className="font-bold text-slate-100 text-sm text-left">{r.displayName}</p>
                                            <p className="text-[10px] text-slate-500 mt-1 flex items-center gap-2">
                                                <span className="text-slate-600 italic">{r.createdAt?.toDate ? r.createdAt.toDate().toLocaleDateString('vi-VN') : 'Mới đây'}</span>
                                                <span className="w-1 h-1 bg-slate-700 rounded-full"></span>
                                                <span className="text-cyan-600 font-bold uppercase tracking-tighter italic">{r.examTitle}</span>
                                            </p>
                                        </div>
                                    </div>
                                    <div className="text-right">
                                        <p className="text-2xl font-black text-red-500 tracking-tighter">{r.score || (Math.random()*10).toFixed(1)}</p>
                                        <p className="text-[8px] font-black text-slate-700 uppercase tracking-widest mt-0.5">Điểm số</p>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </section>
                </div>
            );
        };

        const MetricItem = ({ icon, label, value }) => (
            <div className="metric-card p-6 flex flex-col justify-between border border-white/5 shadow-lg items-center text-center">
                <div className="p-3 bg-slate-900/50 rounded-xl text-slate-400 mb-4">{icon}</div>
                <div><p className="text-3xl font-black text-white tracking-tighter mb-1">{value}</p><p className="text-[10px] text-slate-500 font-black uppercase tracking-widest">{label}</p></div>
            </div>
        );

        const LeaderboardView = ({ leaderboard }) => (
            <div className="space-y-10 animate-fade text-left">
                <h2 className="text-4xl font-bold text-white tracking-tight text-left">Bảng xếp hạng</h2>
                <div className="glass-card overflow-hidden shadow-2xl">
                    <table className="w-full text-left">
                        <thead className="bg-[#0f172a] text-[10px] uppercase text-slate-500 font-black tracking-widest border-b border-white/5">
                            <tr><th className="px-10 py-6">Hạng</th><th className="px-10 py-6">Học viên</th><th className="px-10 py-6 text-center">Hoàn thành</th><th className="px-10 py-6 text-right">Tổng điểm</th></tr>
                        </thead>
                        <tbody className="divide-y divide-white/5">
                            {leaderboard.map((u, i) => (
                                <tr key={u.id} className="hover:bg-white/5 transition-all text-sm">
                                    <td className="px-10 py-6 font-black text-slate-600 text-lg">#{i+1}</td>
                                    <td className="px-10 py-6 font-bold text-white uppercase tracking-tight">{u.displayName}</td>
                                    <td className="px-10 py-6 text-center text-slate-400 font-bold">{u.examsCompleted || 0} đề</td>
                                    <td className="px-10 py-6 text-right font-black text-cyan-400 text-xl tracking-tighter">{u.totalScore?.toFixed(1)}</td>
                                </tr>
                            ))}
                        </tbody>
                    </table>
                </div>
            </div>
        );

        const FeedbackView = ({ reviews, onDelete }) => {
            const feedbacks = reviews.filter(r => r.feedback && r.feedback.trim() !== "");
            return (
                <div className="space-y-10 animate-fade text-left">
                    <h2 className="text-4xl font-bold text-white tracking-tight text-left">Đánh giá & Góp ý</h2>
                    {feedbacks.length === 0 ? <div className="py-32 text-center text-slate-600 italic glass-card border-dashed">Danh sách góp ý đang trống.</div> : (
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6 pb-20">
                            {feedbacks.map(f => (
                                <div key={f.id} className="glass-card p-8 flex flex-col justify-between hover:border-cyan-500/20 text-left">
                                    <div className="text-left">
                                        <div className="flex justify-between items-start mb-6">
                                            <div className="flex items-center gap-4 text-left">
                                                <div className="w-12 h-12 rounded-2xl bg-slate-800 flex items-center justify-center font-black text-cyan-400 border border-white/10 shadow-inner">{f.displayName?.charAt(0).toUpperCase() || "U"}</div>
                                                <div className="text-left"><p className="text-sm font-bold text-white text-left">{f.displayName}</p><p className="text-[10px] text-slate-500 font-mono tracking-tighter text-left">{f.createdAt?.toDate ? f.createdAt.toDate().toLocaleString() : 'Mới đây'}</p></div>
                                            </div>
                                            <button onClick={() => onDelete(f.id)} className="text-slate-600 hover:text-red-400 transition-colors p-2 hover:bg-red-400/10 rounded-xl" title="Xóa góp ý"><Trash2 size={20}/></button>
                                        </div>
                                        <div className="p-6 bg-[#0f172a] rounded-3xl border border-white/5 italic text-slate-300 text-sm leading-relaxed shadow-inner text-left">"{f.feedback}"</div>
                                    </div>
                                    <div className="mt-6 flex items-center justify-between text-[10px] font-black uppercase text-slate-600 tracking-widest">
                                        <span className="truncate max-w-[200px]">{f.examTitle}</span>
                                        <span className="text-yellow-500 bg-yellow-500/10 px-3 py-1 rounded-full border border-yellow-500/20">{f.rating} SAO</span>
                                    </div>
                                </div>
                            ))}
                        </div>
                    )}
                </div>
            );
        };

        const ReportsView = ({ reports, exams, users, onAccept, onDelete }) => {
            const [replyingTo, setReplyingTo] = useState(null);
            const [replyText, setReplyText] = useState("");
            const [isSubmitting, setIsSubmitting] = useState(false);

            const getUser = id => {
                const found = users.find(u => u.uid === id || u.id === id);
                if (found) return { name: found.displayName, email: found.email, verified: true };
                return { name: id === 'anonymous' ? "Khách ẩn danh" : "ID: "+id?.substring(0,8), email: "Lỗi ghi nhận UID", verified: false };
            };

            const handleAccept = async (report) => {
                if (!replyText.trim()) {
                    alert("Vui lòng nhập nội dung phản hồi!");
                    return;
                }
                setIsSubmitting(true);
                try {
                    const success = await onAccept(report, replyText);
                    if (success) { 
                        setReplyingTo(null); 
                        setReplyText(""); 
                    } else {
                        alert("Có lỗi xảy ra khi gửi phản hồi.");
                    }
                } catch (e) {
                    console.error(e);
                } finally {
                    setIsSubmitting(false);
                }
            };

            return (
                <div className="space-y-10 pb-20 animate-fade text-left relative">
                    <h2 className="text-4xl font-bold text-white tracking-tight text-left">Báo cáo lỗi câu hỏi</h2>
                    {reports.length === 0 ? <div className="py-32 text-center text-slate-600 italic glass-card border-dashed">Hiện không có báo cáo lỗi nào.</div> : (
                        <div className="space-y-6 text-left">
                            {reports.map(r => {
                                const u = getUser(r.userId);
                                const exam = exams.find(e=>e.id===r.examId);
                                return (
                                    <div key={r.id} className={`glass-card p-10 border transition-all ${r.status === 'accepted' ? 'border-emerald-500/20 opacity-60' : 'border-red-500/20 shadow-2xl'} text-left`}>
                                        <div className="flex flex-col xl:flex-row gap-10 text-left">
                                            <div className="flex-1 space-y-6 text-left">
                                                <div className="flex items-center gap-4 text-left">
                                                    <span className={`px-4 py-1.5 rounded-full text-[10px] font-black uppercase tracking-widest ${r.status === 'accepted' ? 'bg-emerald-500/20 text-emerald-400' : 'bg-red-500/20 text-red-400 animate-pulse'}`}>
                                                        {r.status === 'accepted' ? 'Đã xử lý' : 'Đang chờ xử lý'}
                                                    </span>
                                                    <span className="text-slate-600 text-[10px] font-mono italic font-bold text-left">{r.createdAt?.toDate ? r.createdAt.toDate().toLocaleString() : 'Vừa xong'}</span>
                                                </div>
                                                <div className="grid grid-cols-2 gap-4 text-xs font-bold uppercase tracking-tight text-left">
                                                    <div className="bg-[#0f172a] p-6 rounded-3xl border border-white/5 text-left">
                                                        <p className="text-slate-600 mb-2 tracking-widest text-[9px] text-left uppercase">Tài khoản báo cáo</p>
                                                        <p className={`text-sm text-left ${!u.verified ? 'text-red-400' : 'text-white'}`}>{u.name}</p>
                                                        <p className="text-[10px] text-slate-500 lowercase mt-1 italic font-normal truncate text-left">{u.email}</p>
                                                    </div>
                                                    <div className="bg-[#0f172a] p-6 rounded-3xl border border-white/5 text-left">
                                                        <p className="text-slate-600 mb-2 tracking-widest text-[9px] text-left uppercase">Đề thi liên quan</p>
                                                        <p className="text-sm text-cyan-400 line-clamp-1 text-left uppercase tracking-tight">{exam?.title || "Mã đề: "+r.examId}</p>
                                                    </div>
                                                </div>
                                                <div className="p-8 bg-slate-900/50 rounded-[2rem] border border-white/5 space-y-5 text-left shadow-inner">
                                                    <div className="flex items-center gap-3 text-red-500 font-black text-xs uppercase tracking-widest text-left">
                                                        <AlertTriangle size={18}/> {r.reason?.toUpperCase() || 'LỖI'} | CÂU {r.questionIndex + 1}
                                                    </div>
                                                    <p className="text-base text-slate-100 font-medium italic border-l-4 border-red-500/20 pl-6 text-left leading-relaxed">"{r.questionText}"</p>
                                                    <div className="text-xs text-slate-500 mt-6 bg-black/20 p-5 rounded-2xl border border-white/5 italic text-left">
                                                        <span className="font-black text-slate-300 block mb-2 uppercase text-[9px] tracking-widest opacity-60 text-left">Ghi chú người dùng:</span>
                                                        {r.detail || "Không có mô tả chi tiết."}
                                                    </div>
                                                </div>
                                                {r.adminReply && (
                                                    <div className="p-6 bg-emerald-500/5 rounded-3xl border border-emerald-500/20 flex items-start gap-4 text-left border-l-4">
                                                        <div className="bg-emerald-500 p-2 rounded-xl text-white shadow-lg"><CheckCircle size={16}/></div>
                                                        <div className="text-left"><p className="text-[10px] font-black text-emerald-500 uppercase tracking-widest mb-1 text-left">Phản hồi của Admin</p><p className="text-sm text-slate-300 italic text-left leading-relaxed">"{r.adminReply}"</p></div>
                                                    </div>
                                                )}
                                            </div>
                                            <div className="xl:w-56 flex flex-row xl:flex-col gap-4 shrink-0 text-left">
                                                {r.status !== 'accepted' ? (
                                                    <button onClick={() => setReplyingTo(r)} className="flex-1 bg-emerald-600 hover:bg-emerald-500 text-white p-5 rounded-[1.5rem] font-black text-[11px] uppercase shadow-lg transition-all active:scale-95 flex items-center justify-center gap-2"><CheckCircle size={18}/> Tiếp nhận</button>
                                                ) : (
                                                    <div className="flex-1 flex items-center justify-center text-emerald-400 text-xs font-black uppercase bg-emerald-400/5 rounded-3xl border border-emerald-400/20 h-full min-h-[60px]"><CheckCircle size={18} className="mr-2"/> Đã xong</div>
                                                )}
                                                <button onClick={() => onDelete(r.id)} className="flex-1 bg-slate-800 hover:bg-red-500/20 text-slate-400 hover:text-red-400 p-5 rounded-[1.5rem] font-black text-[11px] uppercase border border-white/5 transition-all active:scale-95 flex items-center justify-center gap-2"><Trash2 size={18}/> Xóa bỏ</button>
                                            </div>
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    )}
                    
                    {/* MODAL PHẢN HỒI - LUÔN CỐ ĐỊNH GIỮA MÀN HÌNH */}
                    {replyingTo && (
                        <div className="modal-overlay animate-fade">
                            <div className="bg-[#111827] border border-white/10 w-full max-w-md rounded-[2.5rem] overflow-hidden shadow-2xl relative text-left">
                                <button onClick={() => setReplyingTo(null)} className="absolute top-6 right-6 text-slate-500 hover:text-white transition-colors" disabled={isSubmitting}><X size={24}/></button>
                                <div className="p-10 space-y-6 text-left">
                                    <div className="text-left">
                                        <h3 className="text-xl font-bold text-white mb-1 text-left">Tiếp nhận báo cáo</h3>
                                        <p className="text-xs text-slate-500 uppercase tracking-widest font-black text-left">Gửi cho: {getUser(replyingTo.userId).name}</p>
                                    </div>
                                    <div className="space-y-3 text-left">
                                        <p className="text-[10px] font-black text-slate-600 uppercase tracking-widest text-left">Nội dung phản hồi:</p>
                                        <textarea 
                                            value={replyText} 
                                            onChange={e => setReplyText(e.target.value)} 
                                            className="w-full bg-[#0b1120] border border-white/5 rounded-2xl p-4 text-sm text-white focus:border-cyan-500 outline-none h-32 resize-none shadow-inner text-left" 
                                            placeholder="Cảm ơn bạn, lỗi đã được sửa..."
                                            disabled={isSubmitting}
                                        ></textarea>
                                    </div>
                                    <button 
                                        onClick={() => handleAccept(replyingTo)} 
                                        disabled={isSubmitting} 
                                        className="w-full bg-cyan-600 hover:bg-cyan-500 text-white py-5 rounded-3xl font-black text-xs uppercase flex items-center justify-center gap-2 shadow-lg shadow-cyan-500/20 active:scale-95 disabled:opacity-50 text-left"
                                    >
                                        {isSubmitting ? <Activity className="animate-spin" size={18}/> : <Send size={18}/>} 
                                        {isSubmitting ? "Đang gửi..." : "Gửi & Đóng"}
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
