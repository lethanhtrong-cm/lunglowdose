<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedExam Pro - Ôn Thi Chứng Chỉ Hành Nghề</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0",
            "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
            "lucide-react": "https://esm.sh/lucide-react@0.344.0?deps=react@18.2.0",
            "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
            "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js",
            "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js"
        }
    }
    </script>
    <style>
        body { font-family: 'Inter', system-ui, sans-serif; background-color: #0f172a; color: #e2e8f0; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .glass-result { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        .glass-card { background: rgba(30, 41, 59, 0.4); backdrop-filter: blur(8px); border: 1px solid rgba(255, 255, 255, 0.05); transition: all 0.3s ease; }
        .glass-card:hover { transform: translateY(-2px); border-color: rgba(6, 182, 212, 0.3); background: rgba(30, 41, 59, 0.6); }
        .animate-fade-in { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        html { scroll-behavior: smooth; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel" data-type="module" data-presets="react">
        import React, { useState, useEffect, useMemo, useRef } from 'react';
        import { createRoot } from 'react-dom/client';
        import { initializeApp } from 'firebase/app';
        import { 
            getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, 
            onAuthStateChanged, updateProfile, signInWithPopup, GoogleAuthProvider, 
            setPersistence, browserLocalPersistence, browserSessionPersistence 
        } from 'firebase/auth';
        import { getFirestore, collection, addDoc, query, onSnapshot, serverTimestamp, orderBy, setDoc, doc, getDoc, where, updateDoc, increment, deleteDoc, limit } from 'firebase/firestore';
        import { Activity, AlertTriangle, Award, Clock, FileText, History, LogOut, ShieldCheck, User, XCircle, Loader2, Lock, Crown, Search, Filter, BookOpen, Star, Grid, CheckCircle2, ChevronRight, Menu, ArrowUp, Edit3, Save, Phone, MapPin, Calendar, CreditCard, Send, Hourglass, Eye, CheckCircle, Share2, Download, Facebook, Copy, Trophy, Medal, Sun, Moon, Type } from 'lucide-react';

        // --- CẤU HÌNH FIREBASE ---
        const defaultFirebaseConfig = {
            apiKey: "AIzaSyDqdo_DJIWa5iqxiCgBq-0iGX7f9sr6soo",
            authDomain: "rt-examination.firebaseapp.com",
            projectId: "rt-examination",
            storageBucket: "rt-examination.firebasestorage.app",
            messagingSenderId: "920482699854",
            appId: "1:920482699854:web:44f9b0d735bdc001c6c11f",
            measurementId: "G-8N7RTTREQM"
        };

        // Logic khởi tạo an toàn
        let app, auth, db;
        let initError = null;

        try {
            // Ưu tiên dùng config từ môi trường (nếu có), nếu không dùng default
            const configToUse = (typeof __firebase_config !== 'undefined' && __firebase_config) 
                ? JSON.parse(__firebase_config) 
                : defaultFirebaseConfig;
            
            app = initializeApp(configToUse);
            auth = getAuth(app);
            db = getFirestore(app);
        } catch (e) {
            console.error("Firebase Init Error:", e);
            initError = e.message;
        }

        const appId = 'med-exam-pro-html';

        const BANK_INFO = {
            bankName: "BIDV",
            accountNum: "8890523877", 
            accountName: "LE THANH TRONG", 
            amount: "50,000"
        };
        const VIP_DURATION_DAYS = 30;

        // --- HELPERS ---
        const syncUserProfile = async (user, displayName) => {
            if (!db) return;
            try {
                const userRef = doc(db, 'artifacts', appId, 'public', 'data', 'users', user.uid);
                const userSnap = await getDoc(userRef);
                if (!userSnap.exists()) {
                    await setDoc(userRef, {
                        uid: user.uid, email: user.email, displayName: displayName || user.displayName || user.email.split('@')[0],
                        isPremium: false, gender: 'other', phone: '', address: '', totalScore: 0, examsCompleted: 0, createdAt: serverTimestamp(), lastActive: serverTimestamp(), role: 'user'
                    });
                } else { await updateDoc(userRef, { lastActive: serverTimestamp() }); }
            } catch (e) { console.error("Sync profile error:", e); }
        };

        // --- COMPONENTS ---
        const ConfigError = ({ msg }) => (
            <div className="min-h-screen flex items-center justify-center bg-slate-900 text-white p-4 text-center">
                <div className="max-w-md w-full bg-slate-800 p-8 rounded-2xl border border-red-500/50">
                    <AlertTriangle size={48} className="mx-auto text-red-500 mb-4" />
                    <h2 className="text-xl font-bold mb-2">Lỗi Khởi Tạo</h2>
                    <p className="text-slate-400 mb-4">Không thể kết nối đến máy chủ.</p>
                    <div className="bg-slate-950 p-2 rounded text-xs font-mono text-red-400 break-words">{msg || "Vui lòng kiểm tra API Key."}</div>
                    <button onClick={() => window.location.reload()} className="mt-6 px-4 py-2 bg-slate-700 hover:bg-slate-600 rounded-lg text-sm">Tải lại trang</button>
                </div>
            </div>
        );

        const AuthScreen = ({ globalConfig }) => {
            const [isRegistering, setIsRegistering] = useState(false);
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [name, setName] = useState('');
            const [rememberMe, setRememberMe] = useState(true);
            const [error, setError] = useState('');
            const [loading, setLoading] = useState(false);

            const bgImage = globalConfig?.loginBg || "https://images.unsplash.com/photo-1576091160399-112ba8d25d1d?auto=format&fit=crop&q=80";

            const handleSubmit = async (e) => {
                e.preventDefault(); setError(''); setLoading(true);
                try {
                    await setPersistence(auth, rememberMe ? browserLocalPersistence : browserSessionPersistence);
                    if (isRegistering) {
                        const res = await createUserWithEmailAndPassword(auth, email, password);
                        await updateProfile(res.user, { displayName: name });
                        await syncUserProfile(res.user, name);
                    } else {
                        const res = await signInWithEmailAndPassword(auth, email, password);
                        await syncUserProfile(res.user, res.user.displayName);
                    }
                } catch (err) { setError(err.message); } finally { setLoading(false); }
            };

            const handleGoogle = async () => {
                try {
                    await setPersistence(auth, browserLocalPersistence); 
                    const res = await signInWithPopup(auth, new GoogleAuthProvider());
                    await syncUserProfile(res.user, res.user.displayName);
                } catch (err) { setError(err.message); }
            };

            return (
                <div className="min-h-screen flex items-center justify-center relative overflow-hidden" style={{ backgroundImage: `linear-gradient(rgba(15, 23, 42, 0.8), rgba(15, 23, 42, 0.9)), url('${bgImage}')`, backgroundSize: 'cover', backgroundPosition: 'center' }}>
                    <div className="w-full max-w-md bg-slate-900/80 border border-slate-700 p-8 rounded-[2rem] shadow-2xl animate-fade-in backdrop-blur-xl relative z-10">
                        <div className="text-center mb-8">
                            <div className="w-16 h-16 bg-gradient-to-tr from-cyan-500 to-blue-600 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg"><Activity size={32} className="text-white"/></div>
                            <h1 className="text-3xl font-black text-white">MedExam Pro</h1>
                        </div>
                        {error && <div className="mb-6 p-4 bg-red-500/10 border border-red-500/20 text-red-400 text-xs rounded-xl flex items-center gap-2"><AlertTriangle size={14}/> {error}</div>}
                        <form onSubmit={handleSubmit} className="space-y-4">
                            {isRegistering && <input className="w-full bg-slate-950 border border-slate-700 rounded-xl p-4 text-white outline-none focus:border-cyan-500" placeholder="Họ tên" value={name} onChange={e=>setName(e.target.value)} required/>}
                            <input className="w-full bg-slate-950 border border-slate-700 rounded-xl p-4 text-white outline-none focus:border-cyan-500" placeholder="Email" type="email" value={email} onChange={e=>setEmail(e.target.value)} required/>
                            <input className="w-full bg-slate-950 border border-slate-700 rounded-xl p-4 text-white outline-none focus:border-cyan-500" placeholder="Mật khẩu" type="password" value={password} onChange={e=>setPassword(e.target.value)} required/>
                            {!isRegistering && <div className="flex items-center gap-2 px-1"><input type="checkbox" checked={rememberMe} onChange={(e)=>setRememberMe(e.target.checked)} className="accent-cyan-600"/><label className="text-sm text-slate-400">Ghi nhớ đăng nhập</label></div>}
                            <button disabled={loading} className="w-full bg-cyan-600 hover:bg-cyan-500 py-4 rounded-xl font-bold text-white flex items-center justify-center">{loading ? <Loader2 className="animate-spin"/> : (isRegistering ? 'Đăng ký' : 'Đăng nhập')}</button>
                        </form>
                        <div className="my-6 text-center text-xs text-slate-500 font-bold uppercase">Hoặc</div>
                        <button onClick={handleGoogle} className="w-full bg-white hover:bg-slate-100 text-slate-900 py-3.5 rounded-xl font-bold flex items-center justify-center gap-2">Google</button>
                        <p className="mt-8 text-center text-sm text-slate-500">{isRegistering?'Đã có tài khoản?':'Chưa có tài khoản?'} <button onClick={()=>setIsRegistering(!isRegistering)} className="text-cyan-400 font-bold ml-1 hover:underline">{isRegistering?'Đăng nhập':'Đăng ký'}</button></p>
                    </div>
                </div>
            );
        };

        const ReviewExam = ({ result, onBack, user }) => {
            const [rating, setRating] = useState(0);
            const [hasRated, setHasRated] = useState(false);

            useEffect(() => {
                const checkRating = async () => {
                    if (!user || !result.examId || !db) return;
                    const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'exam_ratings', `${result.examId}_${user.uid}`);
                    try {
                        const snap = await getDoc(docRef);
                        if (snap.exists()) {
                            setRating(snap.data().rating);
                            setHasRated(true);
                        }
                    } catch (e) { console.warn("Rating check error", e); }
                };
                if(result.examId && user.uid) checkRating();
            }, [result.examId, user.uid]);

            const handleRate = async (score) => {
                if (hasRated) return;
                setRating(score);
                try {
                    await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'exam_ratings', `${result.examId}_${user.uid}`), {
                        uid: user.uid, examId: result.examId, rating: score, createdAt: serverTimestamp()
                    });
                    const examRef = doc(db, 'artifacts', appId, 'public', 'data', 'exams', result.examId);
                    await updateDoc(examRef, { ratingSum: increment(score), ratingCount: increment(1) });
                    setHasRated(true);
                    alert("Cảm ơn bạn đã đánh giá!");
                } catch (e) { console.error("Error rating:", e); }
            };

            const handleDownloadResult = async () => {
                if (!window.html2canvas) return alert("Vui lòng đợi thư viện tải xong.");
                const element = document.getElementById('result-certificate');
                if (!element) return;
                try {
                    const canvas = await window.html2canvas(element, { scale: 2, backgroundColor: null });
                    const link = document.createElement('a');
                    link.download = `MedExam_Result_${Date.now()}.png`;
                    link.href = canvas.toDataURL();
                    link.click();
                } catch (e) { console.error(e); alert("Lỗi tạo ảnh."); }
            };

            return (
                <div className="min-h-screen bg-slate-950 font-sans pb-20 animate-fade-in">
                     <nav className="glass sticky top-0 z-40 border-b border-slate-800/50 p-4 flex justify-between items-center">
                        <div className="font-bold text-xl text-white flex items-center gap-2"><Eye size={20} className="text-cyan-400"/> Xem lại: <span className="text-cyan-400">{result.examTitle}</span></div>
                        <button onClick={onBack} className="bg-slate-800 hover:bg-slate-700 text-white px-4 py-2 rounded-lg font-bold border border-slate-700">Về Dashboard</button>
                    </nav>
                    
                    <div className="max-w-4xl mx-auto p-4 space-y-6 mt-6">
                         <div className="bg-slate-800 p-6 rounded-2xl border border-slate-700 text-center shadow-lg">
                            <h3 className="text-white font-bold mb-3">Bạn thấy đề thi này thế nào?</h3>
                            <div className="flex justify-center gap-2">
                                {[1,2,3,4,5].map(star => (
                                    <button key={star} onClick={() => handleRate(star)} disabled={hasRated} className={`transition-all transform hover:scale-110 p-1 ${hasRated ? 'cursor-default' : 'cursor-pointer'}`}>
                                        <Star size={32} fill={star <= rating ? "#fbbf24" : "none"} className={star <= rating ? "text-yellow-400" : "text-slate-600"} />
                                    </button>
                                ))}
                            </div>
                            {hasRated && <p className="text-emerald-400 text-xs mt-2 font-bold">Cảm ơn đánh giá của bạn!</p>}
                        </div>

                        <div className="space-y-6">
                            {result.questions.map((q, i) => {
                                const ua = result.userAnswers[i];
                                const isCorrect = ua === q.correctOption;
                                return (
                                    <div key={i} className={`bg-slate-900 border p-6 rounded-2xl ${isCorrect ? 'border-emerald-500/30' : 'border-red-500/30 bg-red-900/5'}`}>
                                        <div className="flex gap-3 mb-4"><span className={`w-8 h-8 rounded-full flex items-center justify-center font-bold text-sm shrink-0 ${isCorrect ? 'bg-emerald-600 text-white' : 'bg-red-600 text-white'}`}>{i+1}</span><div className="text-lg text-slate-200 font-medium">{q.text}</div></div>
                                        <div className="space-y-2 pl-0 md:pl-11">{q.options.map((o, idx) => ( <div key={idx} className={`p-3 rounded-lg border flex justify-between ${idx===q.correctOption ? 'border-emerald-500 bg-emerald-500/10 text-emerald-400 font-bold' : (idx===ua ? 'border-red-500 bg-red-500/10 text-red-400' : 'border-slate-700 text-slate-400')}`}><span>{String.fromCharCode(65+idx)}. {o}</span>{idx===q.correctOption && <CheckCircle2 size={18}/>}{idx===ua && idx!==q.correctOption && <XCircle size={18}/>}</div>))}</div>
                                        {q.explanation && <div className="mt-4 md:ml-11 p-4 bg-blue-900/10 rounded-xl border border-blue-500/20 text-sm text-slate-300"><div className="font-bold text-blue-400 mb-1 flex gap-2"><BookOpen size={16}/> Giải thích:</div>{q.explanation}</div>}
                                    </div>
                                );
                            })}
                        </div>
                    </div>
                </div>
            )
        }

        const LeaderboardPage = ({ user, onBack }) => {
             const [leaderboard, setLeaderboard] = useState([]);
             const [isLoading, setIsLoading] = useState(true);
             useEffect(() => { 
                 if (!db) return;
                 const q = query(collection(db, 'artifacts', appId, 'public', 'data', 'users'), orderBy('totalScore', 'desc'), limit(20)); 
                 return onSnapshot(q, s => { setLeaderboard(s.docs.map(d=>d.data())); setIsLoading(false); }, err => console.log("Leaderboard error", err)); 
             }, []);
             return (<div className="animate-fade-in pb-20 max-w-4xl mx-auto"><button onClick={onBack} className="mb-6 flex items-center gap-2 text-slate-400 hover:text-white"><ChevronRight className="rotate-180" size={20}/> Quay lại</button><div className="bg-slate-800 rounded-3xl border border-slate-700 overflow-hidden shadow-2xl"><div className="p-8 border-b border-slate-700 bg-gradient-to-r from-slate-800 to-slate-900 flex justify-between items-center"><div><h2 className="text-2xl font-bold text-white flex gap-3"><Trophy size={32} className="text-yellow-400"/> Bảng Xếp Hạng</h2></div></div>{isLoading ? <div className="p-20 text-center text-cyan-500"><Loader2 className="animate-spin inline"/></div> : <table className="w-full text-left"><thead className="bg-slate-900/80 text-slate-400 text-xs uppercase font-bold"><tr><th className="p-5 text-center">Hạng</th><th className="p-5">Thành viên</th><th className="p-5 text-right">Điểm</th></tr></thead><tbody className="divide-y divide-slate-700/50 text-sm">{leaderboard.map((u,i)=>(<tr key={i} className="hover:bg-slate-700/30"><td className="p-5 text-center font-bold text-slate-500">#{i+1}</td><td className="p-5 font-bold text-white">{u.displayName}</td><td className="p-5 text-right text-emerald-400 font-bold">{u.totalScore?.toFixed(1)}</td></tr>))}</tbody></table>}</div></div>);
        };
        
        const ProfilePage = ({ user, profile, onBack }) => {
            const [isEditing, setIsEditing] = useState(false);
            const [formData, setFormData] = useState({ displayName: profile?.displayName || user.displayName || '', phone: profile?.phone || '', gender: profile?.gender || 'nam', address: profile?.address || '' });
            const [loading, setLoading] = useState(false);
            const handleSave = async () => { setLoading(true); try { await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'users', user.uid), { ...profile, ...formData, lastUpdated: serverTimestamp() }, { merge: true }); if(user.displayName !== formData.displayName) await updateProfile(user, { displayName: formData.displayName }); setIsEditing(false); } catch (e) { alert("Lỗi: " + e.message); } finally { setLoading(false); } };
            const joinDate = profile?.createdAt?.toDate ? profile.createdAt.toDate().toLocaleDateString('vi-VN') : new Date().toLocaleDateString('vi-VN');
            let vipExpiryDateStr = "Vĩnh viễn (hoặc chưa xác định)", daysLeft = null;
            if (profile?.vipActivatedAt) { const ad = profile.vipActivatedAt.toDate(); const ed = new Date(ad.getTime() + VIP_DURATION_DAYS*24*60*60*1000); vipExpiryDateStr = ed.toLocaleDateString('vi-VN'); }
            return <div className="animate-fade-in pb-20 max-w-5xl mx-auto"><button onClick={onBack} className="mb-6 flex items-center gap-2 text-slate-400 hover:text-white"><ChevronRight className="rotate-180" size={20}/> Quay lại Dashboard</button><div className="bg-slate-800 rounded-3xl border border-slate-700 p-6"><h2 className="text-xl font-bold text-white">{formData.displayName}</h2><p className="text-slate-400 text-sm mb-4">{user.email}</p><button onClick={()=>setIsEditing(!isEditing)} className="bg-slate-700 px-3 py-1 rounded text-sm text-white">Chỉnh sửa thông tin</button> {isEditing && <div className="mt-4 space-y-3"><input className="w-full bg-slate-900 border border-slate-600 rounded p-2 text-white" value={formData.displayName} onChange={e=>setFormData({...formData, displayName: e.target.value})} placeholder="Tên"/><button onClick={handleSave} className="bg-cyan-600 px-4 py-2 rounded text-white font-bold">{loading?'Lưu...':'Lưu'}</button></div>}</div></div>;
        };

        const PaymentModal = ({ onClose, user }) => {
            const [isSubmitting, setIsSubmitting] = useState(false);
            const qrUrl = `https://img.vietqr.io/image/${BANK_INFO.bankName}-${BANK_INFO.accountNum}-compact2.jpg?amount=${BANK_INFO.amount}&addInfo=MEDEXAM ${user.email.split('@')[0]}&accountName=${encodeURIComponent(BANK_INFO.accountName)}`;
            const handleRequestVip = async () => { if(isSubmitting) return; setIsSubmitting(true); try { await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'paymentRequests'), { uid: user.uid, email: user.email, displayName: user.displayName||'No Name', createdAt: serverTimestamp(), status: 'pending' }); alert("Đã gửi yêu cầu!"); onClose(); } catch(e){alert("Lỗi");} finally{setIsSubmitting(false);} };
            return <div className="fixed inset-0 bg-black/90 z-[70] flex items-center justify-center p-4"><div className="bg-slate-900 w-full max-w-md rounded-2xl border border-yellow-500/30 p-6 relative"><button onClick={onClose} className="absolute top-4 right-4 text-slate-400"><XCircle/></button><h2 className="text-2xl font-bold text-white text-center mb-4">Nâng cấp VIP</h2><div className="bg-white p-4 rounded-xl mb-4 flex justify-center"><img src={qrUrl} className="w-48"/></div><button onClick={handleRequestVip} disabled={isSubmitting} className="w-full bg-yellow-600 py-3 rounded-xl font-bold text-slate-900">{isSubmitting?<Loader2 className="animate-spin mx-auto"/>:'Tôi đã chuyển khoản'}</button></div></div>;
        };

        const ExamInterface = ({ exam, onFinish, onExit }) => {
            const [timeLeft, setTimeLeft] = useState(exam.duration * 60);
            const [answers, setAnswers] = useState({});
            const [submitting, setSubmitting] = useState(false);
            const [isDarkMode, setIsDarkMode] = useState(true);
            const [fontSizeLevel, setFontSizeLevel] = useState(1);
            const questionRefs = useRef([]);

            useEffect(() => { const t = setInterval(() => setTimeLeft(p => p <= 1 ? (finish(true), 0) : p - 1), 1000); return () => clearInterval(t); }, []);

            const finish = async (force=false) => {
                if(submitting) return;
                if(!force && !confirm("Nộp bài?")) return;
                setSubmitting(true);
                let correct = 0;
                exam.questions.forEach((q,i) => { if(answers[i]===q.correctOption) correct++; });
                const score = (correct/exam.questions.length)*10;
                try {
                    if(auth.currentUser) updateDoc(doc(db,'artifacts',appId,'public','data','users',auth.currentUser.uid), { totalScore: increment(score), examsCompleted: increment(1) });
                    if(exam.sessionId) deleteDoc(doc(db,'artifacts',appId,'public','data','active_exams',exam.sessionId));
                    await addDoc(collection(db,'artifacts',appId,'users',auth.currentUser.uid,'history'), { examId:exam.id, examTitle:exam.title, score:score.toFixed(1), correctCount:correct, totalQuestions:exam.questions.length, date:new Date() });
                } catch(e){}
                onFinish({ score:score.toFixed(1), correctCount:correct, total:exam.questions.length, examTitle:exam.title, questions:exam.questions, userAnswers:answers, examId: exam.id });
            };

            const scrollTo = (i) => questionRefs.current[i]?.scrollIntoView({behavior:'smooth', block:'center'});
            const bgClass = isDarkMode ? 'bg-slate-950 text-slate-200' : 'bg-gray-100 text-gray-800';
            const fontSizes = ['text-base','text-lg','text-xl','text-2xl'];
            const cardClass = isDarkMode ? 'bg-slate-800/50 border-slate-700' : 'bg-white border-gray-200 shadow-sm';

            return (
                <div className={`fixed inset-0 z-50 flex flex-col md:flex-row h-screen overflow-hidden ${bgClass}`}>
                    <div className="flex-1 flex flex-col h-full relative">
                        <div className={`p-4 flex justify-between items-center z-10 shrink-0 shadow-lg ${isDarkMode?'glass border-white/5':'bg-white border-gray-200'}`}>
                            <div className="flex gap-4 items-center"><button onClick={onExit}><LogOut className="rotate-180"/></button> <h2 className="font-bold">{exam.title}</h2></div>
                            <div className="flex gap-3">
                                <button onClick={()=>setIsDarkMode(!isDarkMode)}>{isDarkMode?<Moon/>:<Sun/>}</button>
                                <button onClick={()=>setFontSizeLevel(Math.min(3,fontSizeLevel+1))}><Type/></button>
                                <div className="font-mono font-bold flex gap-2"><Clock/> {Math.floor(timeLeft/60)}:{timeLeft%60<10?'0'+timeLeft%60:timeLeft%60}</div>
                            </div>
                        </div>
                        <div className="flex-1 overflow-y-auto p-8 scroll-smooth">
                            <div className="max-w-4xl mx-auto space-y-8 pb-20">
                                {exam.questions.map((q,i) => (
                                    <div key={i} ref={el=>questionRefs.current[i]=el} className={`p-6 rounded-2xl shadow-xl border ${cardClass}`}>
                                        <div className={`font-medium mb-4 ${fontSizes[fontSizeLevel]}`}><span className="font-bold mr-2">Câu {i+1}:</span>{q.text}</div>
                                        <div className="space-y-3">{q.options.map((o,idx)=>(<label key={idx} className={`flex items-center p-4 rounded-xl border cursor-pointer transition-all ${answers[i]===idx ? (isDarkMode?'border-cyan-500 bg-cyan-900/20':'border-cyan-600 bg-cyan-50') : (isDarkMode?'border-slate-700':'border-gray-200')}`}><input type="radio" className="mr-4" checked={answers[i]===idx} onChange={()=>setAnswers(p=>({...p,[i]:idx}))}/>{o}</label>))}</div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                    <div className={`hidden md:flex w-80 flex-col border-l ${isDarkMode?'bg-slate-900 border-slate-800':'bg-white border-gray-200'}`}>
                        <div className="p-4 flex-1 overflow-y-auto grid grid-cols-5 gap-2 content-start">{exam.questions.map((_,i)=>(<button key={i} onClick={()=>scrollTo(i)} className={`aspect-square rounded font-bold ${answers[i]!==undefined?'bg-cyan-600 text-white':'bg-slate-700 text-slate-500'}`}>{i+1}</button>))}</div>
                        <div className="p-4"><button onClick={()=>finish(false)} disabled={submitting} className="w-full bg-emerald-600 py-3 rounded-xl font-bold text-white">{submitting?'Đang nộp...':'Nộp Bài'}</button></div>
                    </div>
                </div>
            );
        };

        const Dashboard = ({ user, profile, onStartExam, onViewHistory, onUpgrade }) => {
            const [exams, setExams] = useState([]);
            const [filter, setFilter] = useState('all');
            const [search, setSearch] = useState('');
            const [globalConfig, setGlobalConfig] = useState({});

            useEffect(() => {
                // SỬA LỖI: Thêm catch để không crash nếu lỗi quyền
                if(db) {
                     getDoc(doc(db, 'artifacts', appId, 'public', 'data', 'system', 'global_settings'))
                        .then(s => s.exists() && setGlobalConfig(s.data()))
                        .catch(e => console.log("Config load skipped"));

                    // Thêm Error Callback cho onSnapshot để tránh crash trắng trang
                    const unsubExams = onSnapshot(
                        query(collection(db, 'artifacts', appId, 'public', 'data', 'exams'), orderBy('createdAt', 'desc')), 
                        s => setExams(s.docs.map(d=>({id: d.id, ...d.data()}))),
                        error => console.error("Exams sync error:", error)
                    );
                    return () => unsubExams();
                }
            }, []);

            const filteredExams = exams.filter(e => e.title.toLowerCase().includes(search.toLowerCase()) && (filter==='all' || (filter==='free' && (e.title.toLowerCase().includes('thử')||e.title.toLowerCase().includes('demo'))) || (filter==='vip' && !(e.title.toLowerCase().includes('thử')||e.title.toLowerCase().includes('demo')))));

            const renderStars = (ratingSum, ratingCount) => {
                const avg = ratingCount > 0 ? ratingSum / ratingCount : 0;
                return (<div className="flex items-center gap-1 text-yellow-400 text-xs"><span className="font-bold text-white mr-1">{avg.toFixed(1)}</span>{[1,2,3,4,5].map(s => <Star key={s} size={12} fill={s <= Math.round(avg) ? "currentColor" : "none"} className={s <= Math.round(avg) ? "" : "text-slate-600"} />)}<span className="text-slate-500 ml-1">({ratingCount || 0})</span></div>);
            };

            return (
                <div className="pb-20 animate-fade-in">
                    <div className="flex justify-between mb-8"><div className="relative"><Search className="absolute left-3 top-2.5 text-slate-500" size={18}/><input className="bg-slate-800 border border-slate-700 rounded-xl pl-10 pr-4 py-2 w-64 text-white" placeholder="Tìm kiếm..." value={search} onChange={e=>setSearch(e.target.value)}/></div><div className="flex bg-slate-800 rounded-xl p-1">{['all','free','vip'].map(f=><button key={f} onClick={()=>setFilter(f)} className={`px-4 py-1.5 rounded-lg text-sm ${filter===f?'bg-slate-600 text-white':'text-slate-400'}`}>{f.toUpperCase()}</button>)}</div></div>
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                        {filteredExams.map(exam => {
                            const isFree = exam.title.toLowerCase().includes("thử") || exam.title.toLowerCase().includes("demo");
                            const isLocked = !profile?.isPremium && !isFree;
                            return (
                                <div key={exam.id} className="glass-card rounded-2xl p-6 relative group">
                                    <div className="absolute top-0 right-0 p-3">{isLocked ? <Lock className="text-slate-500" size={16}/> : (isFree ? <span className="text-emerald-400 text-xs font-bold bg-emerald-500/10 px-2 py-1 rounded">FREE</span> : <Crown className="text-yellow-400" size={16}/>)}</div>
                                    <div className="mb-4"><h3 className="text-lg font-bold text-white line-clamp-2">{exam.title}</h3></div>
                                    <div className="flex justify-between items-center mb-6">
                                        <div className="text-slate-400 text-xs flex gap-3"><span><Clock size={14} className="inline"/> {exam.duration}p</span><span><Grid size={14} className="inline"/> {exam.questions?.length} câu</span></div>
                                        {renderStars(exam.ratingSum, exam.ratingCount)}
                                    </div>
                                    <button onClick={()=> isLocked ? onUpgrade() : onStartExam(exam)} className={`w-full py-3 rounded-xl font-bold flex items-center justify-center gap-2 ${isLocked ? 'bg-slate-800 text-slate-500' : 'bg-cyan-600 hover:bg-cyan-500 text-white'}`}>{isLocked ? 'Mở khóa VIP' : 'Bắt đầu'}</button>
                                </div>
                            )
                        })}
                    </div>
                </div>
            );
        };

        const HistoryPage = ({ user, onBack }) => { /* ... Keep same ... */ return <div className="text-white p-10"><button onClick={onBack}>Back</button> History Placeholder</div>; };

        function App() {
            const [user, setUser] = useState(null);
            const [profile, setProfile] = useState(null);
            const [view, setView] = useState('loading');
            const [activeExam, setActiveExam] = useState(null);
            const [lastResult, setLastResult] = useState(null);
            const [showPay, setShowPay] = useState(false);
            const [globalConfig, setGlobalConfig] = useState({});

            // Nếu lỗi khởi tạo Firebase ngay từ đầu
            if (initError) return <ConfigError msg={initError} />;

            useEffect(() => {
                if(!auth) return;
                // FIX: Thêm catch cho cấu hình
                getDoc(doc(db, 'artifacts', appId, 'public', 'data', 'system', 'global_settings'))
                    .then(s => s.exists() && setGlobalConfig(s.data()))
                    .catch(e => console.log("Config load skipped (Guest/No permission)"));

                return onAuthStateChanged(auth, u => {
                    setUser(u);
                    if(u) { 
                        setView('dashboard'); 
                        onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'users', u.uid), 
                            d => d.exists() && setProfile(d.data()),
                            e => console.error("Profile sync error", e) // Catch profile sync errors
                        ); 
                    }
                    else setView('auth');
                });
            }, []);

            const startExam = (exam) => { if (confirm(`Sẵn sàng thi bài "${exam.title}"?`)) { setActiveExam(exam); setView('exam'); } };
            const handleDownloadResult = async () => { /* ... */ }; // Brief placeholder for download

            if (view === 'loading') return <div className="min-h-screen bg-slate-900 flex items-center justify-center text-cyan-500"><Loader2 className="animate-spin" size={40}/></div>;
            if (view === 'auth') return <AuthScreen globalConfig={globalConfig} />;
            if (view === 'exam' && activeExam) return <ExamInterface exam={activeExam} onExit={() => setView('dashboard')} onFinish={r => { setLastResult(r); setActiveExam(null); setView('result'); }} />;
            if (view === 'review' && lastResult) return <ReviewExam result={lastResult} onBack={() => setView('dashboard')} user={user} />;
            if (view === 'leaderboard') return <LeaderboardPage user={user} onBack={() => setView('dashboard')} />;
            if (view === 'result' && lastResult) return (
                <div className="min-h-screen bg-slate-900 flex items-center justify-center p-4" id="result-certificate" style={{backgroundImage: globalConfig.resultBg ? `linear-gradient(rgba(15,23,42,0.9),rgba(15,23,42,0.9)),url('${globalConfig.resultBg}')`:undefined, backgroundSize:'cover'}}>
                    <div className="glass-result p-10 rounded-3xl text-center max-w-md w-full relative">
                        <Award size={80} className={`mx-auto mb-6 ${Number(lastResult.score)>=5?'text-yellow-400':'text-slate-500'}`}/>
                        <h2 className="text-4xl font-black text-white mb-2">{lastResult.score}</h2>
                        <div className="grid grid-cols-2 gap-4 mb-6">
                            <div className="bg-slate-800/50 p-3 rounded-xl border border-slate-700"><p className="text-xs text-slate-500">Đúng</p><p className="text-xl text-emerald-400 font-bold">{lastResult.correctCount}/{lastResult.total}</p></div>
                            <div className="bg-slate-800/50 p-3 rounded-xl border border-slate-700"><p className="text-xs text-slate-500">Kết quả</p><p className={`text-xl font-bold ${Number(lastResult.score)>=5?'text-cyan-400':'text-red-400'}`}>{Number(lastResult.score)>=5?'ĐẠT':'TRƯỢT'}</p></div>
                        </div>
                        <div className="space-y-3">
                            <button onClick={()=>setView('review')} className="w-full bg-cyan-600 py-3 rounded-xl font-bold text-white flex justify-center gap-2"><Eye size={18}/> Xem & Đánh giá</button>
                            <button onClick={()=>setView('dashboard')} className="w-full bg-slate-800 py-3 rounded-xl font-bold text-white border border-slate-700">Về trang chủ</button>
                        </div>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen bg-slate-950 font-sans">
                    <nav className="glass sticky top-0 z-40 border-b border-slate-800/50">
                        <div className="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
                            <button onClick={()=>setView('dashboard')} className="flex items-center gap-2 font-bold text-xl text-cyan-400"><Activity/> MedExam Pro</button>
                            <div className="flex gap-4 items-center">
                                {profile?.isPremium ? <span className="text-yellow-400 text-xs font-bold border border-yellow-500/50 px-2 py-1 rounded flex gap-1"><Crown size={14}/> VIP</span> : <button onClick={()=>setShowPay(true)} className="text-xs bg-gradient-to-r from-yellow-600 to-amber-600 px-3 py-1 rounded-full text-white font-bold">Nâng cấp VIP</button>}
                                <button onClick={()=>signOut(auth)}><LogOut className="text-slate-400 hover:text-red-400" size={20}/></button>
                            </div>
                        </div>
                    </nav>
                    <div className="max-w-7xl mx-auto px-4 py-8">
                        {view === 'history' ? <HistoryPage user={user} onBack={()=>setView('dashboard')}/> : 
                         view === 'profile' ? <ProfilePage user={user} profile={profile} onBack={()=>setView('dashboard')} /> :
                         view === 'leaderboard' ? <LeaderboardPage user={user} onBack={()=>setView('dashboard')} /> :
                         <Dashboard user={user} profile={profile} onStartExam={startExam} onUpgrade={()=>setShowPay(true)} onViewHistory={()=>setView('history')} />}
                    </div>
                    {showPay && <PaymentModal onClose={()=>setShowPay(false)} user={user}/>}
                </div>
            );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
