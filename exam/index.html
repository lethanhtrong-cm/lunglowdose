<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedExam Pro - Ôn Thi Chứng Chỉ Hành Nghề</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <!-- Thêm thư viện chụp ảnh màn hình -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0",
            "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
            "lucide-react": "https://esm.sh/lucide-react@0.344.0?deps=react@18.2.0",
            "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
            "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js",
            "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js"
        }
    }
    </script>
    <style>
        body { font-family: 'Inter', system-ui, sans-serif; background-color: #0f172a; color: #e2e8f0; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .glass-card { background: rgba(30, 41, 59, 0.4); backdrop-filter: blur(8px); border: 1px solid rgba(255, 255, 255, 0.05); transition: all 0.3s ease; }
        .glass-card:hover { transform: translateY(-2px); border-color: rgba(6, 182, 212, 0.3); background: rgba(30, 41, 59, 0.6); }
        .animate-fade-in { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        html { scroll-behavior: smooth; }
        .clip-path-slant { clip-path: polygon(0 0, 100% 0, 100% 85%, 0 100%); }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel" data-type="module" data-presets="react">
        import React, { useState, useEffect, useMemo, useRef } from 'react';
        import { createRoot } from 'react-dom/client';
        import { initializeApp } from 'firebase/app';
        import { 
            getAuth, 
            signInWithEmailAndPassword, 
            createUserWithEmailAndPassword, 
            signOut, 
            onAuthStateChanged, 
            updateProfile, 
            signInWithPopup, 
            GoogleAuthProvider,
            setPersistence, 
            browserLocalPersistence, 
            browserSessionPersistence
        } from 'firebase/auth';
        import { getFirestore, collection, addDoc, query, onSnapshot, serverTimestamp, orderBy, setDoc, doc, getDoc, where, updateDoc } from 'firebase/firestore';
        import { Activity, AlertTriangle, Award, Clock, FileText, History, LogOut, ShieldCheck, User, XCircle, Loader2, Lock, Crown, Search, Filter, BookOpen, Star, Grid, CheckCircle2, ChevronRight, Menu, ArrowUp, Edit3, Save, Phone, MapPin, Calendar, CreditCard, Send, Hourglass, Eye, CheckCircle, Share2, Download, Facebook, Copy } from 'lucide-react';

        const firebaseConfig = {
            apiKey: "AIzaSyDqdo_DJIWa5iqxiCgBq-0iGX7f9sr6soo",
            authDomain: "rt-examination.firebaseapp.com",
            projectId: "rt-examination",
            storageBucket: "rt-examination.firebasestorage.app",
            messagingSenderId: "920482699854",
            appId: "1:920482699854:web:44f9b0d735bdc001c6c11f",
            measurementId: "G-8N7RTTREQM"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = 'med-exam-pro-html';

        const BANK_INFO = {
            bankName: "BIDV",
            accountNum: "8890523877", 
            accountName: "LE THANH TRONG", 
            amount: "50,000"
        };

        const VIP_DURATION_DAYS = 30; // Thời hạn VIP 30 ngày

        // --- COMPONENTS ---

        const AuthScreen = () => {
            const [isRegistering, setIsRegistering] = useState(false);
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [name, setName] = useState('');
            const [rememberMe, setRememberMe] = useState(true);
            const [error, setError] = useState('');
            const [loading, setLoading] = useState(false);

            const createUserProfile = async (user, displayName) => {
                try {
                    const userRef = doc(db, 'artifacts', appId, 'public', 'data', 'users', user.uid);
                    await setDoc(userRef, {
                        uid: user.uid,
                        email: user.email,
                        displayName: displayName || user.displayName || user.email.split('@')[0],
                        isPremium: false,
                        gender: 'other', 
                        phone: '',
                        address: '',
                        createdAt: serverTimestamp(),
                        role: 'user'
                    }, { merge: true });
                } catch (e) { console.error(e); }
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                setError('');
                setLoading(true);
                try {
                    const persistenceType = rememberMe ? browserLocalPersistence : browserSessionPersistence;
                    await setPersistence(auth, persistenceType);

                    if (isRegistering) {
                        const res = await createUserWithEmailAndPassword(auth, email, password);
                        await updateProfile(res.user, { displayName: name });
                        await createUserProfile(res.user, name);
                    } else {
                        await signInWithEmailAndPassword(auth, email, password);
                    }
                } catch (err) { setError(err.message); } finally { setLoading(false); }
            };

            const handleGoogle = async () => {
                try {
                    await setPersistence(auth, browserLocalPersistence); 
                    const res = await signInWithPopup(auth, new GoogleAuthProvider());
                    await createUserProfile(res.user, res.user.displayName);
                } catch (err) { setError(err.message); }
            };

            return (
                <div className="min-h-screen flex items-center justify-center bg-[url('https://images.unsplash.com/photo-1576091160399-112ba8d25d1d?auto=format&fit=crop&q=80')] bg-cover bg-center relative">
                    <div className="absolute inset-0 bg-slate-900/90 backdrop-blur-sm"></div>
                    <div className="relative z-10 w-full max-w-4xl h-[600px] bg-slate-800 rounded-3xl shadow-2xl overflow-hidden flex flex-col md:flex-row border border-slate-700">
                        <div className="md:w-1/2 bg-gradient-to-br from-cyan-600 to-blue-700 p-10 flex flex-col justify-center text-white relative overflow-hidden">
                            <div className="absolute top-0 left-0 w-full h-full bg-[url('https://www.transparenttextures.com/patterns/medical-icons.png')] opacity-10"></div>
                            <div className="relative z-10">
                                <div className="mb-6 bg-white/20 w-16 h-16 rounded-2xl flex items-center justify-center backdrop-blur-lg">
                                    <Activity size={32} className="text-white"/>
                                </div>
                                <h1 className="text-4xl font-bold mb-4">MedExam Pro</h1>
                                <p className="text-cyan-100 text-lg leading-relaxed">Nền tảng ôn thi chứng chỉ hành nghề Y khoa hàng đầu. Luyện tập mọi lúc, mọi nơi.</p>
                            </div>
                        </div>
                        <div className="md:w-1/2 p-10 flex flex-col justify-center bg-slate-900">
                            <h2 className="text-2xl font-bold text-white mb-2">{isRegistering ? 'Tạo tài khoản mới' : 'Chào mừng trở lại'}</h2>
                            <p className="text-slate-400 mb-6 text-sm">{isRegistering ? 'Bắt đầu hành trình ôn tập của bạn' : 'Đăng nhập để tiếp tục'}</p>
                            {error && <div className="bg-red-500/10 border border-red-500/20 text-red-400 p-3 rounded-lg mb-4 text-xs flex gap-2 items-center"><AlertTriangle size={14}/> {error}</div>}
                            <form onSubmit={handleSubmit} className="space-y-4">
                                {isRegistering && <input className="w-full bg-slate-800 p-3 rounded-lg border border-slate-700 focus:border-cyan-500 outline-none text-white transition-all" placeholder="Họ và tên" value={name} onChange={e=>setName(e.target.value)} required/>}
                                <input className="w-full bg-slate-800 p-3 rounded-lg border border-slate-700 focus:border-cyan-500 outline-none text-white transition-all" placeholder="Email" type="email" value={email} onChange={e=>setEmail(e.target.value)} required/>
                                <input className="w-full bg-slate-800 p-3 rounded-lg border border-slate-700 focus:border-cyan-500 outline-none text-white transition-all" placeholder="Mật khẩu" type="password" value={password} onChange={e=>setPassword(e.target.value)} required/>
                                {!isRegistering && (
                                    <div className="flex items-center gap-2 my-2">
                                        <input type="checkbox" id="remember" className="w-4 h-4 rounded border-slate-600 bg-slate-800 text-cyan-600 focus:ring-cyan-500 cursor-pointer accent-cyan-600" checked={rememberMe} onChange={(e) => setRememberMe(e.target.checked)}/>
                                        <label htmlFor="remember" className="text-sm text-slate-400 cursor-pointer select-none">Ghi nhớ đăng nhập</label>
                                    </div>
                                )}
                                <button disabled={loading} className="w-full bg-gradient-to-r from-cyan-500 to-blue-600 hover:from-cyan-400 hover:to-blue-500 py-3.5 rounded-lg font-bold text-white shadow-lg shadow-cyan-500/20 transition-all transform hover:scale-[1.02] disabled:opacity-70 disabled:cursor-not-allowed flex justify-center">
                                    {loading ? <Loader2 className="animate-spin"/> : (isRegistering ? 'Đăng Ký Ngay' : 'Đăng Nhập')}
                                </button>
                            </form>
                            <div className="my-6 flex items-center gap-4"><div className="h-px bg-slate-700 flex-1"></div><span className="text-slate-500 text-xs uppercase">Hoặc</span><div className="h-px bg-slate-700 flex-1"></div></div>
                            <button onClick={handleGoogle} className="w-full bg-white text-slate-900 py-3 rounded-lg font-bold hover:bg-slate-100 transition-all flex items-center justify-center gap-2"><svg className="w-5 h-5" viewBox="0 0 24 24"><path fill="currentColor" d="M21.35 11.1h-9.17v2.73h6.51c-.33 3.81-3.5 5.44-6.5 5.44C8.36 19.27 5 16.25 5 12c0-4.1 3.2-7.27 7.2-7.27 3.09 0 4.9 1.97 4.9 1.97L19 4.72S16.56 2 12.1 2C6.42 2 2.03 6.8 2.03 12c0 5.05 4.13 10 10.22 10 5.35 0 9.25-3.67 9.25-9.09 0-1.15-.15-2.15-.15-2.15z"/></svg> Google</button>
                            <div className="mt-6 text-center text-sm text-slate-400">{isRegistering ? 'Đã có tài khoản?' : 'Chưa có tài khoản?'}{' '} <button onClick={()=>setIsRegistering(!isRegistering)} className="text-cyan-400 hover:text-cyan-300 font-bold ml-1">{isRegistering ? 'Đăng nhập' : 'Đăng ký miễn phí'}</button></div>
                        </div>
                    </div>
                </div>
            );
        };

        const ProfilePage = ({ user, profile, onBack }) => {
            const [isEditing, setIsEditing] = useState(false);
            const [formData, setFormData] = useState({
                displayName: profile?.displayName || user.displayName || '',
                phone: profile?.phone || '',
                gender: profile?.gender || 'nam',
                address: profile?.address || ''
            });
            const [loading, setLoading] = useState(false);

            const handleSave = async () => {
                setLoading(true);
                try {
                    await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'users', user.uid), {
                        ...profile,
                        displayName: formData.displayName,
                        phone: formData.phone,
                        gender: formData.gender,
                        address: formData.address,
                        lastUpdated: serverTimestamp()
                    }, { merge: true });
                    
                    if(user.displayName !== formData.displayName) {
                        await updateProfile(user, { displayName: formData.displayName });
                    }
                    setIsEditing(false);
                } catch (e) { alert("Lỗi: " + e.message); } finally { setLoading(false); }
            };

            const joinDate = profile?.createdAt?.toDate ? profile.createdAt.toDate().toLocaleDateString('vi-VN') : new Date().toLocaleDateString('vi-VN');
            
            let vipExpiryDateStr = "Vĩnh viễn (hoặc chưa xác định)";
            if (profile?.vipActivatedAt) {
                const activationDate = profile.vipActivatedAt.toDate();
                const expiryDate = new Date(activationDate.getTime() + VIP_DURATION_DAYS * 24 * 60 * 60 * 1000);
                vipExpiryDateStr = expiryDate.toLocaleDateString('vi-VN');
            }

            return (
                <div className="animate-fade-in pb-20 max-w-5xl mx-auto">
                    <button onClick={onBack} className="mb-6 flex items-center gap-2 text-slate-400 hover:text-white transition-colors"><ChevronRight className="rotate-180" size={20}/> Quay lại Dashboard</button>
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
                        <div className="md:col-span-1 space-y-6">
                            <div className="bg-slate-800 rounded-3xl border border-slate-700 p-6 text-center relative overflow-hidden">
                                <div className="absolute top-0 left-0 w-full h-24 bg-gradient-to-r from-cyan-600 to-blue-600"></div>
                                <div className="relative mt-12 mb-4">
                                    <div className="w-24 h-24 rounded-full border-4 border-slate-800 bg-slate-700 mx-auto flex items-center justify-center text-3xl font-bold text-white shadow-xl">
                                        {formData.displayName?.charAt(0)?.toUpperCase()}
                                    </div>
                                    {profile?.isPremium && <div className="absolute bottom-0 right-1/2 translate-x-10 bg-yellow-500 text-slate-900 p-1.5 rounded-full border-2 border-slate-800"><Crown size={14} fill="currentColor"/></div>}
                                </div>
                                <h2 className="text-xl font-bold text-white mb-1">{formData.displayName}</h2>
                                <p className="text-slate-400 text-sm mb-4">{user.email}</p>
                                <div className={`inline-flex items-center gap-1.5 px-3 py-1 rounded-full text-xs font-bold border ${profile?.isPremium ? 'bg-yellow-500/10 text-yellow-400 border-yellow-500/20' : 'bg-slate-700 text-slate-400 border-slate-600'}`}>
                                    {profile?.isPremium ? <><Crown size={12}/> VIP MEMBER</> : 'FREE MEMBER'}
                                </div>
                            </div>
                            <div className="bg-slate-800/50 rounded-2xl border border-slate-700 p-5">
                                <h3 className="text-slate-400 text-xs font-bold uppercase mb-4 tracking-wider">Thông tin chung</h3>
                                <div className="space-y-4 text-sm">
                                    <div className="flex justify-between items-center"><span className="flex items-center gap-2 text-slate-300"><Calendar size={16} className="text-cyan-500"/> Ngày tham gia</span><span className="text-white font-medium">{joinDate}</span></div>
                                    <div className="flex justify-between items-center"><span className="flex items-center gap-2 text-slate-300"><CheckCircle2 size={16} className="text-emerald-500"/> Trạng thái</span><span className="text-emerald-400 font-bold">Hoạt động</span></div>
                                    {profile?.isPremium && (
                                        <div className="flex justify-between items-center border-t border-slate-700 pt-3 mt-3">
                                            <span className="flex items-center gap-2 text-slate-300"><Hourglass size={16} className="text-yellow-500"/> Hết hạn VIP</span>
                                            <span className="text-yellow-400 font-medium text-xs">{vipExpiryDateStr}</span>
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>
                        <div className="md:col-span-2 space-y-6">
                            <div className="bg-slate-800 rounded-3xl border border-slate-700 overflow-hidden">
                                <div className="p-6 border-b border-slate-700 flex justify-between items-center bg-slate-800/50">
                                    <h3 className="text-lg font-bold text-white flex items-center gap-2"><User size={20} className="text-cyan-400"/> Thông tin cá nhân</h3>
                                    {!isEditing && <button onClick={()=>setIsEditing(true)} className="flex items-center gap-2 text-sm text-cyan-400 hover:text-cyan-300 font-medium bg-cyan-900/20 px-3 py-1.5 rounded-lg border border-cyan-500/30 transition-all hover:bg-cyan-900/30"><Edit3 size={14}/> Chỉnh sửa</button>}
                                </div>
                                <div className="p-6 md:p-8 space-y-6">
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                        <div className="space-y-2"><label className="text-sm text-slate-400 font-medium">Họ và tên</label><input disabled={!isEditing} className={`w-full bg-slate-900 border rounded-xl px-4 py-3 text-white transition-all ${isEditing ? 'border-slate-600 focus:border-cyan-500' : 'border-transparent text-slate-300'}`} value={formData.displayName} onChange={e=>setFormData({...formData, displayName: e.target.value})}/></div>
                                        <div className="space-y-2"><label className="text-sm text-slate-400 font-medium">Email</label><input disabled className="w-full bg-slate-900/50 border border-transparent rounded-xl px-4 py-3 text-slate-500 cursor-not-allowed" value={user.email}/></div>
                                        <div className="space-y-2"><label className="text-sm text-slate-400 font-medium">Số điện thoại</label><div className="relative"><Phone className="absolute left-4 top-3.5 text-slate-500" size={16}/><input disabled={!isEditing} className={`w-full bg-slate-900 border rounded-xl pl-12 pr-4 py-3 text-white transition-all ${isEditing ? 'border-slate-600 focus:border-cyan-500' : 'border-transparent text-slate-300'}`} value={formData.phone} placeholder={!isEditing ? "Chưa cập nhật" : "Nhập SĐT..."} onChange={e=>setFormData({...formData, phone: e.target.value})}/></div></div>
                                        <div className="space-y-2"><label className="text-sm text-slate-400 font-medium">Giới tính</label><select disabled={!isEditing} className={`w-full bg-slate-900 border rounded-xl px-4 py-3 text-white transition-all appearance-none ${isEditing ? 'border-slate-600 focus:border-cyan-500' : 'border-transparent text-slate-300'}`} value={formData.gender} onChange={e=>setFormData({...formData, gender: e.target.value})}><option value="nam">Nam</option><option value="nu">Nữ</option><option value="khac">Khác</option></select></div>
                                        <div className="md:col-span-2 space-y-2"><label className="text-sm text-slate-400 font-medium">Địa chỉ</label><div className="relative"><MapPin className="absolute left-4 top-3.5 text-slate-500" size={16}/><input disabled={!isEditing} className={`w-full bg-slate-900 border rounded-xl pl-12 pr-4 py-3 text-white transition-all ${isEditing ? 'border-slate-600 focus:border-cyan-500' : 'border-transparent text-slate-300'}`} value={formData.address} placeholder={!isEditing ? "Chưa cập nhật" : "Nhập địa chỉ..."} onChange={e=>setFormData({...formData, address: e.target.value})}/></div></div>
                                    </div>
                                    {isEditing && <div className="flex justify-end gap-3 pt-4 border-t border-slate-700/50"><button onClick={()=>setIsEditing(false)} className="px-5 py-2.5 text-slate-300 hover:text-white font-medium hover:bg-slate-700/50 rounded-lg transition-all">Hủy bỏ</button><button onClick={handleSave} disabled={loading} className="px-6 py-2.5 bg-cyan-600 hover:bg-cyan-500 text-white font-bold rounded-lg shadow-lg shadow-cyan-500/20 flex items-center gap-2 disabled:opacity-50">{loading ? <Loader2 className="animate-spin" size={18}/> : <Save size={18}/>} Lưu thay đổi</button></div>}
                                </div>
                            </div>
                            <div className="bg-slate-800 rounded-3xl border border-slate-700 overflow-hidden">
                                <div className="p-6 border-b border-slate-700 bg-slate-800/50"><h3 className="text-lg font-bold text-white flex items-center gap-2"><CreditCard size={20} className="text-yellow-400"/> Lịch sử giao dịch</h3></div>
                                <div className="p-0"><table className="w-full text-left text-sm"><thead className="bg-slate-900 text-slate-400 uppercase text-xs"><tr><th className="p-4 pl-6">Nội dung</th><th className="p-4">Ngày</th><th className="p-4">Số tiền</th><th className="p-4 pr-6 text-right">Trạng thái</th></tr></thead><tbody className="divide-y divide-slate-700">{profile?.isPremium ? <tr className="hover:bg-slate-700/20 transition-colors"><td className="p-4 pl-6 font-medium text-white flex items-center gap-2"><Crown size={16} className="text-yellow-500"/> Nâng cấp VIP</td><td className="p-4 text-slate-400">{joinDate}</td><td className="p-4 text-slate-300 font-mono">50,000đ</td><td className="p-4 pr-6 text-right"><span className="text-emerald-400 text-xs font-bold bg-emerald-500/10 px-2 py-1 rounded border border-emerald-500/20">Thành công</span></td></tr> : <tr><td colSpan="4" className="p-8 text-center text-slate-500">Chưa có giao dịch nào</td></tr>}</tbody></table></div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const PaymentModal = ({ onClose, user }) => {
            const [isSubmitting, setIsSubmitting] = useState(false);
            const qrUrl = `https://img.vietqr.io/image/${BANK_INFO.bankName}-${BANK_INFO.accountNum}-compact2.jpg?amount=${BANK_INFO.amount}&addInfo=MEDEXAM ${user.email.split('@')[0]}&accountName=${encodeURIComponent(BANK_INFO.accountName)}`;

            const handleRequestVip = async () => {
                if (isSubmitting) return;
                setIsSubmitting(true);
                try {
                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'paymentRequests'), {
                        uid: user.uid,
                        email: user.email,
                        displayName: user.displayName || 'No Name',
                        createdAt: serverTimestamp(),
                        status: 'pending'
                    });
                    alert("Đã gửi yêu cầu kích hoạt! Admin sẽ duyệt trong ít phút.");
                    onClose();
                } catch (e) {
                    console.error("Lỗi gửi yêu cầu:", e);
                    alert("Có lỗi xảy ra, vui lòng thử lại.");
                } finally {
                    setIsSubmitting(false);
                }
            };

            return (
                <div className="fixed inset-0 bg-black/90 z-[70] flex items-center justify-center p-4 backdrop-blur-sm">
                    <div className="bg-slate-900 w-full max-w-md rounded-2xl border border-yellow-500/30 p-0 relative overflow-hidden shadow-2xl animate-fade-in">
                        <div className="h-2 w-full bg-gradient-to-r from-yellow-400 via-amber-500 to-yellow-600"></div>
                        <div className="p-6">
                            <button onClick={onClose} className="absolute top-4 right-4 text-slate-400 hover:text-white transition-colors"><XCircle/></button>
                            <div className="text-center mb-6">
                                <div className="inline-flex p-4 rounded-full bg-gradient-to-br from-yellow-400/20 to-amber-600/20 text-yellow-400 mb-4 border border-yellow-500/20 shadow-lg shadow-yellow-500/10"><Crown size={40} /></div>
                                <h2 className="text-2xl font-bold text-white">Nâng cấp VIP Member</h2>
                                <p className="text-slate-400 text-sm mt-2">Mở khóa không giới hạn toàn bộ kho đề thi</p>
                            </div>
                            <div className="bg-white p-6 rounded-2xl mb-6 flex flex-col items-center shadow-inner">
                                <img src={qrUrl} className="w-56 h-56 object-contain mb-3 mix-blend-multiply"/>
                                <div className="text-center"><p className="text-slate-500 text-xs font-medium uppercase tracking-wider">Số tiền thanh toán</p><p className="text-slate-900 font-black text-2xl">{BANK_INFO.amount} VNĐ</p></div>
                            </div>
                            <div className="space-y-3 mb-6">
                                <div className="flex items-start gap-3 bg-slate-800/50 p-3 rounded-lg border border-slate-700"><div className="bg-cyan-500/20 text-cyan-400 p-1.5 rounded-full"><Activity size={16}/></div><p className="text-sm text-slate-300">Nội dung chuyển khoản tự động. Vui lòng giữ nguyên.</p></div>
                                <div className="flex items-start gap-3 bg-slate-800/50 p-3 rounded-lg border border-slate-700"><div className="bg-emerald-500/20 text-emerald-400 p-1.5 rounded-full"><CheckCircle2 size={16}/></div><p className="text-sm text-slate-300">Sau khi chuyển khoản, nhấn nút dưới đây để thông báo cho Admin.</p></div>
                            </div>
                            <button onClick={handleRequestVip} disabled={isSubmitting} className="w-full bg-gradient-to-r from-yellow-500 to-amber-600 hover:from-yellow-400 hover:to-amber-500 py-3.5 rounded-xl font-bold text-slate-900 shadow-lg shadow-amber-500/20 transition-all transform hover:scale-[1.02] flex justify-center items-center gap-2">
                                {isSubmitting ? <Loader2 className="animate-spin"/> : <Send size={18}/>} Tôi đã chuyển khoản
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        const ReviewExam = ({ result, onBack }) => {
            return (
                <div className="min-h-screen bg-slate-950 font-sans pb-20 animate-fade-in">
                     <nav className="glass sticky top-0 z-40 border-b border-slate-800/50 p-4 flex justify-between items-center">
                        <div className="font-bold text-xl text-white flex items-center gap-2"><Eye size={20} className="text-cyan-400"/> Xem lại bài thi: <span className="text-cyan-400">{result.examTitle}</span></div>
                        <button onClick={onBack} className="bg-slate-800 hover:bg-slate-700 text-white px-4 py-2 rounded-lg font-bold border border-slate-700 transition-all">Về Dashboard</button>
                    </nav>
                    <div className="max-w-4xl mx-auto p-4 space-y-6 mt-6">
                        <div className="bg-slate-800 p-6 rounded-2xl border border-slate-700 text-center relative overflow-hidden">
                            <div className="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-cyan-500 to-blue-600"></div>
                            <div className="text-4xl font-black text-white mb-2">{result.score} điểm</div>
                            <div className="text-slate-400">Bạn đã trả lời đúng <span className="text-emerald-400 font-bold">{result.correctCount}</span>/{result.total} câu hỏi</div>
                        </div>
                        {result.questions.map((q, i) => {
                            const userAnswer = result.userAnswers[i];
                            const isCorrect = userAnswer === q.correctOption;
                            const isSkipped = userAnswer === undefined;
                            
                            return (
                                <div key={i} className={`bg-slate-900 border p-6 rounded-2xl transition-all ${isCorrect ? 'border-emerald-500/30' : 'border-red-500/30 bg-red-900/5'}`}>
                                    <div className="flex gap-3 mb-4">
                                        <span className={`w-8 h-8 rounded-full flex items-center justify-center font-bold text-sm shrink-0 ${isCorrect ? 'bg-emerald-600 text-white' : 'bg-red-600 text-white'}`}>{i+1}</span>
                                        <div className="text-lg text-slate-200 font-medium">{q.text}</div>
                                    </div>
                                    <div className="space-y-2 pl-0 md:pl-11">
                                        {q.options.map((o, optIdx) => {
                                            let optionClass = "border-slate-700 bg-slate-800/50 text-slate-400";
                                            let icon = null;

                                            if (optIdx === q.correctOption) {
                                                optionClass = "border-emerald-500 bg-emerald-500/10 text-emerald-400 font-bold";
                                                icon = <CheckCircle2 size={18} className="text-emerald-500"/>;
                                            } else if (optIdx === userAnswer && optIdx !== q.correctOption) {
                                                optionClass = "border-red-500 bg-red-500/10 text-red-400 font-bold";
                                                icon = <XCircle size={18} className="text-red-500"/>;
                                            }

                                            return (
                                                <div key={optIdx} className={`p-3 rounded-lg border flex justify-between items-center ${optionClass}`}>
                                                    <span>{String.fromCharCode(65+optIdx)}. {o}</span>
                                                    {icon}
                                                </div>
                                            )
                                        })}
                                    </div>
                                    {q.explanation && (
                                        <div className="mt-4 md:ml-11 p-4 bg-blue-900/10 rounded-xl border border-blue-500/20 text-sm">
                                            <div className="font-bold text-blue-400 mb-1 flex items-center gap-2"><BookOpen size={16}/> Giải thích chi tiết:</div>
                                            <div className="text-slate-300 leading-relaxed">{q.explanation}</div>
                                        </div>
                                    )}
                                </div>
                            );
                        })}
                    </div>
                </div>
            )
        }

        const ExamInterface = ({ exam, onFinish, onExit }) => {
            const [timeLeft, setTimeLeft] = useState(exam.duration * 60);
            const [answers, setAnswers] = useState({});
            const [submitting, setSubmitting] = useState(false);
            const questionRefs = useRef([]);

            useEffect(() => {
                const timer = setInterval(() => setTimeLeft(t => t <= 1 ? (finish(true), 0) : t - 1), 1000);
                return () => clearInterval(timer);
            }, []);

            const finish = async (forceSubmit = false) => {
                if(submitting) return;
                const unansweredCount = exam.questions.length - Object.keys(answers).length;
                if (!forceSubmit) {
                    if (unansweredCount > 0) { if (!confirm(`⚠️ CẢNH BÁO CHƯA LÀM HẾT\n\nBạn còn ${unansweredCount} câu hỏi chưa chọn đáp án.\nBạn có chắc chắn muốn nộp bài ngay bây giờ không?`)) return; }
                    else { if (!confirm(`XÁC NHẬN NỘP BÀI\n\nBạn đã trả lời đủ ${exam.questions.length} câu.\nBạn có muốn kết thúc bài thi không?`)) return; }
                }
                setSubmitting(true);
                let correct = 0;
                exam.questions.forEach((q, i) => { if(answers[i] === q.correctOption) correct++; });
                const score = (correct / exam.questions.length) * 10;
                const timeout = new Promise((_, r) => setTimeout(() => r(new Error("Timeout")), 3000));
                try {
                    await Promise.race([
                        addDoc(collection(db, 'artifacts', appId, 'users', auth.currentUser.uid, 'history'), {
                            examId: exam.id, examTitle: exam.title, score: score.toFixed(1), totalQuestions: exam.questions.length, correctCount: correct, date: new Date(), userId: auth.currentUser.uid
                        }),
                        timeout
                    ]);
                } catch(e) { console.warn(e); }
                // Pass questions and user answers to the result view for review
                onFinish({ 
                    score: score.toFixed(1), 
                    correctCount: correct, 
                    total: exam.questions.length, 
                    examTitle: exam.title,
                    questions: exam.questions,
                    userAnswers: answers
                });
            };

            const handleExit = () => {
                if (confirm("⚠️ XÁC NHẬN THOÁT\n\nKết quả bài làm sẽ KHÔNG được lưu lại.\nBạn có chắc chắn muốn thoát ra màn hình chính?")) {
                    onExit();
                }
            };

            const scrollToQuestion = (index) => {
                questionRefs.current[index]?.scrollIntoView({ behavior: 'smooth', block: 'center' });
            };

            const answeredCount = Object.keys(answers).length;
            const progressPercent = Math.round((answeredCount / exam.questions.length) * 100);

            return (
                <div className="fixed inset-0 bg-slate-950 z-50 flex flex-col md:flex-row h-screen overflow-hidden">
                    <div className="flex-1 flex flex-col h-full relative">
                        <div className="glass p-4 flex justify-between items-center z-10 shrink-0 shadow-lg border-b border-white/5">
                            <div className="flex items-center gap-4">
                                <button onClick={handleExit} className="p-2 bg-slate-800 hover:bg-red-500/20 text-slate-400 hover:text-red-400 rounded-lg border border-slate-700 hover:border-red-500/50 transition-all group" title="Thoát bài thi">
                                    <LogOut size={20} className="rotate-180" />
                                </button>
                                <div>
                                    <h2 className="font-bold text-cyan-400 text-lg line-clamp-1">{exam.title}</h2>
                                    <div className="text-slate-400 text-xs flex items-center gap-2 mt-1"><span>Đã làm: {answeredCount}/{exam.questions.length} câu</span><span className="bg-slate-800 px-2 py-0.5 rounded text-cyan-400 font-bold">{progressPercent}%</span></div>
                                </div>
                            </div>
                            <div className={`font-mono text-xl font-bold flex gap-2 items-center px-4 py-2 rounded-lg bg-slate-800 border ${timeLeft < 300 ? 'text-red-500 border-red-500/30 animate-pulse' : 'text-emerald-400 border-emerald-500/30'}`}><Clock size={20}/> {Math.floor(timeLeft/60)}:{timeLeft%60 < 10 ? '0'+timeLeft%60 : timeLeft%60}</div>
                        </div>
                        <div className="flex-1 overflow-y-auto p-4 md:p-8 scroll-smooth" id="question-list">
                            <div className="max-w-7xl mx-auto grid grid-cols-1 xl:grid-cols-2 gap-6 pb-20">
                                {exam.questions.map((q, index) => (
                                    <div 
                                        key={index} 
                                        ref={el => questionRefs.current[index] = el}
                                        className={`bg-slate-800/50 border p-6 md:p-8 rounded-2xl shadow-xl transition-all h-full ${answers[index] !== undefined ? 'border-cyan-500/30' : 'border-slate-700'}`}
                                    >
                                        <div className="flex gap-4 mb-6"><span className={`shrink-0 w-8 h-8 rounded-full flex items-center justify-center font-bold text-sm ${answers[index] !== undefined ? 'bg-cyan-600 text-white' : 'bg-slate-700 text-slate-400'}`}>{index + 1}</span><div className="text-lg font-medium leading-relaxed text-slate-100">{q.text}</div></div>
                                        <div className="space-y-3 pl-0 md:pl-12">
                                            {q.options.map((o, optIndex) => (
                                                <label key={optIndex} className={`flex items-center p-4 rounded-xl border-2 cursor-pointer transition-all duration-200 group ${answers[index]===optIndex ? 'border-cyan-500 bg-cyan-900/20' : 'border-slate-700 hover:bg-slate-700 hover:border-slate-600'}`}>
                                                    <div className={`w-5 h-5 rounded-full border-2 mr-4 flex items-center justify-center shrink-0 transition-colors ${answers[index]===optIndex ? 'border-cyan-500' : 'border-slate-500 group-hover:border-slate-400'}`}>{answers[index]===optIndex && <div className="w-2.5 h-2.5 rounded-full bg-cyan-500"></div>}</div><span className={`${answers[index]===optIndex ? 'text-white font-medium' : 'text-slate-300'}`}>{o}</span><input type="radio" className="hidden" checked={answers[index]===optIndex} onChange={()=>setAnswers(prev => ({...prev, [index]: optIndex}))} />
                                                </label>
                                            ))}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                    <div className="hidden md:flex w-80 bg-slate-900 border-l border-slate-800 flex-col shrink-0 h-full">
                        <div className="p-5 border-b border-slate-800"><h3 className="font-bold text-slate-300 mb-2 flex items-center gap-2"><Grid size={18}/> Danh sách câu hỏi</h3><div className="flex justify-between items-center text-xs text-slate-500 mb-2"><span>Tiến độ hoàn thành</span><span className="text-cyan-400 font-bold">{progressPercent}%</span></div><div className="w-full bg-slate-800 h-2.5 rounded-full overflow-hidden border border-slate-700"><div className="bg-gradient-to-r from-cyan-600 to-cyan-400 h-full transition-all duration-500 ease-out shadow-[0_0_10px_rgba(6,182,212,0.5)]" style={{width: `${progressPercent}%`}}></div></div></div>
                        <div className="flex-1 overflow-y-auto p-4 custom-scrollbar"><div className="grid grid-cols-5 gap-2">{exam.questions.map((_, i) => (<button key={i} onClick={() => scrollToQuestion(i)} className={`aspect-square rounded-lg text-sm font-bold flex items-center justify-center transition-all hover:scale-105 ${answers[i] !== undefined ? 'bg-cyan-600 text-white shadow-lg shadow-cyan-900/50' : 'bg-slate-800 text-slate-500 hover:bg-slate-700 border border-slate-700'}`}>{i+1}</button>))}</div></div>
                        <div className="p-5 border-t border-slate-800 bg-slate-900 z-20 shadow-[0_-5px_20px_rgba(0,0,0,0.3)]"><button onClick={() => finish(false)} disabled={submitting} className="w-full bg-gradient-to-r from-emerald-600 to-emerald-500 hover:from-emerald-500 hover:to-emerald-400 py-3.5 rounded-xl font-bold text-white shadow-lg shadow-emerald-500/20 transition-all transform hover:scale-[1.02] active:scale-95 disabled:opacity-50 disabled:transform-none flex items-center justify-center gap-2">{submitting ? <Loader2 className="animate-spin" size={20}/> : <CheckCircle2 size={20}/>}{submitting ? 'Đang nộp bài...' : 'Nộp Bài Thi'}</button></div>
                    </div>
                </div>
            );
        };

        const Dashboard = ({ user, profile, onStartExam, onViewHistory, onUpgrade }) => {
            const [exams, setExams] = useState([]);
            const [history, setHistory] = useState([]);
            const [stats, setStats] = useState({ totalTaken: 0, avgScore: 0, rank: 'Tập sự' });
            const [filter, setFilter] = useState('all'); 
            const [search, setSearch] = useState('');

            useEffect(() => {
                const unsubExams = onSnapshot(query(collection(db, 'artifacts', appId, 'public', 'data', 'exams'), orderBy('createdAt', 'desc')), s => {
                    setExams(s.docs.map(d=>({id: d.id, ...d.data()})));
                });
                const unsubHistory = onSnapshot(query(collection(db, 'artifacts', appId, 'users', user.uid, 'history'), orderBy('date', 'desc')), s => {
                    const records = s.docs.map(d=>d.data());
                    setHistory(records);
                    const total = records.length;
                    const avg = total > 0 ? (records.reduce((acc, r) => acc + Number(r.score), 0) / total).toFixed(1) : 0;
                    let rank = 'Tập sự';
                    if (total > 5) rank = 'Học viên';
                    if (total > 20 && avg > 7) rank = 'Chuyên cần';
                    if (total > 50 && avg > 8.5) rank = 'Tinh anh';
                    setStats({ totalTaken: total, avgScore: avg, rank });
                });
                return () => { unsubExams(); unsubHistory(); };
            }, [user]);

            const filteredExams = exams.filter(e => {
                const matchesSearch = e.title.toLowerCase().includes(search.toLowerCase());
                const isFree = e.title.toLowerCase().includes("thử") || e.title.toLowerCase().includes("demo");
                if (filter === 'free') return matchesSearch && isFree;
                if (filter === 'vip') return matchesSearch && !isFree;
                return matchesSearch;
            });

            return (
                <div className="pb-20 animate-fade-in">
                    <div className="bg-gradient-to-r from-blue-900 via-slate-900 to-slate-900 rounded-3xl p-8 mb-10 relative overflow-hidden border border-white/5 shadow-2xl">
                        <div className="absolute top-0 right-0 w-64 h-64 bg-cyan-500/10 rounded-full blur-3xl -translate-y-1/2 translate-x-1/3 pointer-events-none"></div>
                        <div className="relative z-10 flex flex-col md:flex-row justify-between items-center gap-6">
                            <div>
                                <div className="flex items-center gap-3 mb-2">
                                    <div className="w-12 h-12 rounded-full bg-gradient-to-br from-cyan-400 to-blue-600 flex items-center justify-center text-white font-bold text-xl shadow-lg">{user.displayName?.charAt(0)}</div>
                                    <div><p className="text-slate-400 text-sm">Xin chào,</p><h2 className="text-2xl font-bold text-white">{user.displayName}</h2></div>
                                </div>
                                <p className="text-slate-300 max-w-lg mt-2">Chúc bạn một ngày ôn tập hiệu quả! Hãy giữ vững phong độ nhé.</p>
                            </div>
                            <div className="flex gap-4">
                                <div className="bg-slate-800/50 backdrop-blur p-4 rounded-2xl border border-white/10 min-w-[120px] text-center"><p className="text-slate-400 text-xs uppercase font-bold mb-1">Đã làm</p><p className="text-2xl font-black text-cyan-400">{stats.totalTaken}</p></div>
                                <div className="bg-slate-800/50 backdrop-blur p-4 rounded-2xl border border-white/10 min-w-[120px] text-center"><p className="text-slate-400 text-xs uppercase font-bold mb-1">Trung bình</p><p className="text-2xl font-black text-emerald-400">{stats.avgScore}</p></div>
                                <div className="bg-slate-800/50 backdrop-blur p-4 rounded-2xl border border-white/10 min-w-[120px] text-center hidden md:block"><p className="text-slate-400 text-xs uppercase font-bold mb-1">Danh hiệu</p><p className="text-xl font-bold text-yellow-400">{stats.rank}</p></div>
                            </div>
                        </div>
                    </div>

                    <div className="flex flex-col md:flex-row justify-between items-center gap-4 mb-8">
                        <div className="relative w-full md:w-auto"><Search className="absolute left-4 top-3 text-slate-500" size={20}/><input className="w-full md:w-80 bg-slate-800 border border-slate-700 rounded-xl pl-12 pr-4 py-2.5 text-slate-200 focus:border-cyan-500 outline-none transition-all placeholder:text-slate-500" placeholder="Tìm kiếm đề thi..." value={search} onChange={e=>setSearch(e.target.value)}/></div>
                        <div className="flex bg-slate-800 p-1 rounded-xl border border-slate-700">
                            {['all', 'free', 'vip'].map(t => (<button key={t} onClick={()=>setFilter(t)} className={`px-4 py-1.5 rounded-lg text-sm font-medium transition-all ${filter===t ? 'bg-slate-600 text-white shadow' : 'text-slate-400 hover:text-white'}`}>{t === 'all' ? 'Tất cả' : (t === 'free' ? 'Miễn phí' : 'VIP')}</button>))}
                        </div>
                    </div>

                    {filteredExams.length === 0 ? (
                        <div className="text-center py-20 bg-slate-800/30 rounded-3xl border border-slate-800 border-dashed"><FileText className="mx-auto text-slate-600 mb-4" size={48}/><p className="text-slate-500">Không tìm thấy đề thi nào phù hợp.</p></div>
                    ) : (
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                            {filteredExams.map(exam => {
                                const isFree = exam.title.toLowerCase().includes("thử") || exam.title.toLowerCase().includes("demo");
                                const isLocked = !profile?.isPremium && !isFree;
                                const lastAttempt = history.find(h => h.examId === exam.id);

                                return (
                                    <div key={exam.id} className="glass-card rounded-2xl p-6 relative group overflow-hidden">
                                        <div className={`absolute top-0 right-0 p-3 rounded-bl-2xl text-xs font-bold ${isLocked ? 'bg-slate-700 text-slate-400' : (isFree ? 'bg-emerald-500/20 text-emerald-400' : 'bg-yellow-500/20 text-yellow-400')}`}>{isLocked ? <Lock size={16}/> : (isFree ? 'FREE' : <Crown size={16}/>)}</div>
                                        <div className="mb-4"><div className="w-12 h-12 rounded-xl bg-slate-700/50 flex items-center justify-center mb-4 text-cyan-400 group-hover:bg-cyan-500 group-hover:text-white transition-colors"><BookOpen size={24}/></div><h3 className="text-lg font-bold text-white line-clamp-2 h-14" title={exam.title}>{exam.title}</h3></div>
                                        <div className="flex items-center gap-4 text-sm text-slate-400 mb-6"><span className="flex items-center gap-1.5"><Clock size={16} className="text-slate-500"/> {exam.duration}p</span><span className="flex items-center gap-1.5"><Grid size={16} className="text-slate-500"/> {exam.questions?.length} câu</span></div>
                                        
                                        {lastAttempt && (
                                            <div className="mb-4 pt-3 border-t border-slate-700/50 flex justify-between items-center text-xs">
                                                <span className="text-slate-400">Lần cuối:</span>
                                                <span className={`font-bold ${Number(lastAttempt.score) >= 5 ? 'text-emerald-400' : 'text-red-400'}`}>
                                                    {lastAttempt.score} điểm
                                                </span>
                                            </div>
                                        )}

                                        <button onClick={() => isLocked ? onUpgrade() : onStartExam(exam)} className={`w-full py-3 rounded-xl font-bold flex items-center justify-center gap-2 transition-all ${isLocked ? 'bg-slate-700/50 text-slate-400 hover:bg-slate-700 border border-slate-700' : 'bg-cyan-600 hover:bg-cyan-500 text-white shadow-lg shadow-cyan-500/20 hover:shadow-cyan-500/30'}`}>{isLocked ? <>Mở khóa VIP <Lock size={16}/></> : <>Bắt đầu ngay <ChevronRight size={16}/></>}</button>
                                    </div>
                                );
                            })}
                        </div>
                    )}
                </div>
            );
        };

        const HistoryPage = ({ user, onBack }) => {
            const [history, setHistory] = useState([]);
            useEffect(() => {
                const q = query(collection(db, 'artifacts', appId, 'users', user.uid, 'history'), orderBy('date', 'desc'));
                const unsub = onSnapshot(q, s => setHistory(s.docs.map(d=>({id: d.id, ...d.data(), date: d.data().date?.toDate()}))));
                return unsub;
            }, [user]);

            return (
                <div className="animate-fade-in pb-20 max-w-5xl mx-auto">
                    <button onClick={onBack} className="mb-6 flex items-center gap-2 text-slate-400 hover:text-white transition-colors"><ChevronRight className="rotate-180" size={20}/> Quay lại</button>
                    <h2 className="text-2xl font-bold mb-6 flex items-center gap-2 text-white"><History className="text-cyan-400"/> Lịch sử làm bài</h2>
                    <div className="bg-slate-800 rounded-2xl border border-slate-700 overflow-hidden shadow-xl">
                        <table className="w-full text-left text-sm">
                            <thead className="bg-slate-900 text-slate-400 uppercase text-xs"><tr><th className="p-4">Đề thi</th><th className="p-4">Ngày thi</th><th className="p-4 text-center">Kết quả</th><th className="p-4 text-center">Điểm số</th></tr></thead>
                            <tbody className="divide-y divide-slate-700">
                                {history.map(r => (
                                    <tr key={r.id} className="hover:bg-slate-700/30 transition-colors">
                                        <td className="p-4 font-medium text-white">{r.examTitle}</td>
                                        <td className="p-4 text-slate-400">{r.date?.toLocaleDateString('vi-VN')} {r.date?.toLocaleTimeString('vi-VN', {hour:'2-digit', minute:'2-digit'})}</td>
                                        <td className="p-4 text-center"><span className={`px-2.5 py-1 rounded-full text-xs font-bold border ${Number(r.score)>=5 ? 'bg-emerald-500/10 text-emerald-400 border-emerald-500/20' : 'bg-red-500/10 text-red-400 border-red-500/20'}`}>{Number(r.score)>=5 ? 'Đạt' : 'Chưa đạt'}</span></td>
                                        <td className="p-4 text-center font-bold text-white text-lg">{r.score}</td>
                                    </tr>
                                ))}
                                {history.length === 0 && <tr><td colSpan="4" className="p-8 text-center text-slate-500">Bạn chưa làm bài thi nào.</td></tr>}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        }

        function App() {
            const [user, setUser] = useState(null);
            const [profile, setProfile] = useState(null);
            const [view, setView] = useState('loading'); // loading, auth, dashboard, history, profile, exam, result, review
            const [activeExam, setActiveExam] = useState(null);
            const [lastResult, setLastResult] = useState(null);
            const [showPay, setShowPay] = useState(false);

            useEffect(() => {
                return onAuthStateChanged(auth, u => {
                    setUser(u);
                    if (u) {
                        setView('dashboard');
                        const unsub = onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'users', u.uid), d => d.exists() && setProfile(d.data()));
                        return () => unsub();
                    } else setView('auth');
                });
            }, []);

            // Hiệu ứng kiểm tra VIP hết hạn
            useEffect(() => {
                if (user && profile?.isPremium && profile?.vipActivatedAt) {
                    const activationDate = profile.vipActivatedAt.toDate();
                    const expiryTime = activationDate.getTime() + VIP_DURATION_DAYS * 24 * 60 * 60 * 1000;
                    
                    if (Date.now() > expiryTime) {
                        // Tự động downgrade
                        updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'users', user.uid), {
                            isPremium: false
                        }).then(() => {
                            alert("Thông báo: Gói VIP của bạn đã hết hạn.");
                        }).catch(err => console.error("Lỗi cập nhật hết hạn:", err));
                    }
                }
            }, [profile, user]);

            // Tính số ngày còn lại để hiển thị
            let daysLeft = null;
            if (profile?.isPremium && profile?.vipActivatedAt) {
                const activationDate = profile.vipActivatedAt.toDate();
                const expiryTime = activationDate.getTime() + VIP_DURATION_DAYS * 24 * 60 * 60 * 1000;
                const diffTime = expiryTime - Date.now();
                if (diffTime > 0) {
                    daysLeft = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
                }
            }

            const startExam = (exam) => { if (confirm(`Sẵn sàng thi bài "${exam.title}"?`)) { setActiveExam(exam); setView('exam'); } };

            const handleDownloadResult = async () => {
                if (!window.html2canvas) return alert("Chức năng đang tải, vui lòng thử lại sau giây lát.");
                const element = document.getElementById('result-certificate');
                if (!element) return;
                try {
                    const canvas = await window.html2canvas(element, { scale: 2, backgroundColor: '#0f172a' });
                    const link = document.createElement('a');
                    link.download = `MedExam_Result_${Date.now()}.png`;
                    link.href = canvas.toDataURL();
                    link.click();
                } catch (e) { console.error(e); alert("Lỗi tạo ảnh."); }
            };

            const handleShareFacebook = () => {
               // Facebook share URL requires a public URL. Since this is likely local or specific deployment,
               // we will share the main app URL.
               const text = `Tôi vừa hoàn thành bài thi "${lastResult.examTitle}" với số điểm ${lastResult.score}/10 trên MedExam Pro!`;
               // Replace with your actual deployed URL
               const url = "https://medexam-pro.web.app"; 
               window.open(`https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(url)}&quote=${encodeURIComponent(text)}`, '_blank');
            };

            const handleShareZalo = () => {
                // Zalo doesn't have a direct "share custom text/image" URL API for web like FB.
                // Best practice is to copy to clipboard or guide user.
                const text = `Kết quả thi MedExam Pro:\nĐề: ${lastResult.examTitle}\nĐiểm: ${lastResult.score}/10\nĐúng: ${lastResult.correctCount}/${lastResult.total}`;
                navigator.clipboard.writeText(text).then(() => {
                    alert("Đã sao chép kết quả! Bạn có thể dán vào Zalo để chia sẻ.");
                    window.open("https://chat.zalo.me/", "_blank");
                });
            };

            if (view === 'loading') return <div className="min-h-screen bg-slate-900 flex items-center justify-center text-cyan-500"><Loader2 className="animate-spin" size={40}/></div>;
            if (view === 'auth') return <AuthScreen />;
            if (view === 'exam' && activeExam) return <ExamInterface exam={activeExam} onExit={() => { setActiveExam(null); setView('dashboard'); }} onFinish={r => { setLastResult(r); setActiveExam(null); setView('result'); }} />;
            if (view === 'review' && lastResult) return <ReviewExam result={lastResult} onBack={() => { setLastResult(null); setView('dashboard'); }} />;
            if (view === 'result' && lastResult) return (
                <div className="min-h-screen bg-slate-900 flex items-center justify-center p-4 animate-fade-in">
                    <div className="glass p-10 rounded-3xl text-center max-w-md w-full relative overflow-hidden" id="result-certificate">
                        <div className="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-cyan-500 to-blue-600"></div>
                        <Award size={80} className={`mx-auto mb-6 ${Number(lastResult.score)>=5?'text-yellow-400 drop-shadow-[0_0_15px_rgba(250,204,21,0.5)]':'text-slate-500'}`}/>
                        <h2 className="text-3xl font-black text-white mb-2 uppercase tracking-wide">Kết Quả Thi</h2>
                        <h3 className="text-xl text-cyan-400 font-bold mb-4">{lastResult.examTitle}</h3>
                        
                        <div className="text-6xl font-black text-white mb-2">{lastResult.score}</div>
                        <p className="text-slate-400 uppercase tracking-widest text-xs font-bold mb-6">Điểm số của bạn</p>
                        
                        <div className="grid grid-cols-2 gap-4 mb-8">
                            <div className="bg-slate-800 p-3 rounded-xl border border-slate-700"><p className="text-xs text-slate-500">Câu đúng</p><p className="text-xl font-bold text-emerald-400">{lastResult.correctCount}/{lastResult.total}</p></div>
                            <div className="bg-slate-800 p-3 rounded-xl border border-slate-700"><p className="text-xs text-slate-500">Kết quả</p><p className={`text-xl font-bold ${Number(lastResult.score)>=5?'text-cyan-400':'text-red-400'}`}>{Number(lastResult.score)>=5?'ĐẠT':'TRƯỢT'}</p></div>
                        </div>

                        <div className="flex justify-center gap-3 mb-6">
                            <button onClick={handleDownloadResult} className="p-3 bg-slate-800 hover:bg-slate-700 rounded-full text-slate-300 hover:text-white transition-all border border-slate-700" title="Tải ảnh"><Download size={20}/></button>
                            <button onClick={handleShareFacebook} className="p-3 bg-blue-600 hover:bg-blue-500 rounded-full text-white transition-all shadow-lg shadow-blue-500/20" title="Chia sẻ Facebook"><Facebook size={20}/></button>
                            <button onClick={handleShareZalo} className="p-3 bg-blue-500 hover:bg-blue-400 rounded-full text-white transition-all shadow-lg shadow-blue-400/20 font-bold text-xs flex items-center" title="Copy cho Zalo">Zalo</button>
                        </div>

                        <div className="space-y-3">
                            <button onClick={()=>setView('review')} className="w-full bg-cyan-600 hover:bg-cyan-500 text-white py-3 rounded-xl font-bold transition-all shadow-lg shadow-cyan-500/20 flex items-center justify-center gap-2"><Eye size={18}/> Xem lại đáp án & Giải thích</button>
                            <button onClick={()=>setView('dashboard')} className="w-full bg-slate-800 hover:bg-slate-700 text-white py-3 rounded-xl font-bold transition-all border border-slate-700">Về trang chủ</button>
                        </div>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen bg-slate-950 font-sans">
                    <nav className="glass sticky top-0 z-40 border-b border-slate-800/50">
                        <div className="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
                            <button onClick={()=>setView('dashboard')} className="flex items-center gap-2.5 group">
                                <div className="bg-gradient-to-br from-cyan-500 to-blue-600 p-2 rounded-lg shadow-lg shadow-cyan-500/20 group-hover:shadow-cyan-500/40 transition-all"><Activity size={20} className="text-white"/></div>
                                <span className="font-bold text-xl bg-clip-text text-transparent bg-gradient-to-r from-cyan-400 to-blue-400">MedExam Pro</span>
                            </button>
                            <div className="flex items-center gap-4">
                                {profile?.isPremium ? (
                                    <div className="flex flex-col items-end">
                                        <span className="hidden md:flex bg-gradient-to-r from-yellow-500/10 to-amber-500/10 text-amber-400 text-xs font-bold border border-amber-500/20 px-3 py-1.5 rounded-full items-center gap-1.5">
                                            <Crown size={14}/> VIP MEMBER
                                        </span>
                                        {daysLeft !== null && <span className="text-[10px] text-slate-400 mr-1 mt-0.5">Còn {daysLeft} ngày</span>}
                                    </div>
                                ) : (
                                    <button onClick={()=>setShowPay(true)} className="hidden md:flex bg-gradient-to-r from-yellow-600 to-amber-600 hover:from-yellow-500 hover:to-amber-500 text-white text-xs font-bold px-4 py-2 rounded-full shadow-lg shadow-amber-900/20 items-center gap-1.5 transition-all transform hover:scale-105">
                                        <Crown size={14}/> Nâng cấp VIP
                                    </button>
                                )}
                                <div className="h-8 w-px bg-slate-800 mx-2 hidden md:block"></div>
                                
                                <div className="relative group">
                                    <button onClick={()=>setView('profile')} className="flex items-center gap-2 p-1.5 rounded-full hover:bg-slate-800 transition-all border border-transparent hover:border-slate-700">
                                        <div className="w-8 h-8 rounded-full bg-gradient-to-br from-blue-500 to-purple-600 flex items-center justify-center text-xs font-bold text-white shadow-inner">{user.displayName?.charAt(0)}</div>
                                    </button>
                                </div>

                                <button onClick={()=>setView('history')} className="p-2 text-slate-400 hover:text-cyan-400 hover:bg-cyan-400/10 rounded-lg transition-all" title="Lịch sử"><History size={20}/></button>
                                <button onClick={()=>signOut(auth)} className="p-2 text-slate-400 hover:text-red-400 hover:bg-red-400/10 rounded-lg transition-all" title="Đăng xuất"><LogOut size={20}/></button>
                            </div>
                        </div>
                    </nav>
                    <div className="max-w-7xl mx-auto px-4 py-8">
                        {view === 'history' ? <HistoryPage user={user} onBack={()=>setView('dashboard')}/> : 
                         view === 'profile' ? <ProfilePage user={user} profile={profile} onBack={()=>setView('dashboard')} /> :
                         <Dashboard user={user} profile={profile} onStartExam={startExam} onUpgrade={()=>setShowPay(true)} onViewHistory={()=>setView('history')} />}
                    </div>
                    {showPay && <PaymentModal onClose={()=>setShowPay(false)} user={user}/>}
                </div>
            );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
