                                    className={`px-4 py-2 font-bold text-sm transition-all duration-200 rounded-lg ${activeTab === 'license' ? 'bg-blue-50 text-blue-700' : 'text-slate-600 hover:text-blue-700 hover:bg-slate-50'}`}
                                >
                                    Giấy phép hành nghề
                                </button>
                                <button 
                                    onClick={() => setActiveTab('cme')}
                                    className={`px-4 py-2 font-bold text-sm transition-all duration-200 rounded-lg ${activeTab === 'cme' ? 'bg-teal-50 text-teal-700' : 'text-slate-600 hover:text-teal-700 hover:bg-slate-50'}`}
                                >
                                    Cập nhật KTYK (CME)
                                </button>
                                <button 
                                    onClick={() => setActiveTab('scope')}
                                    className={`px-4 py-2 font-bold text-sm transition-all duration-200 rounded-lg ${activeTab === 'scope' ? 'bg-indigo-50 text-indigo-700' : 'text-slate-600 hover:text-indigo-700 hover:bg-slate-50'}`}
                                >
                                    Phạm vi hành nghề (KTY)
                                </button>
                                <button className="ml-4 bg-slate-900 text-white px-5 py-2 rounded-lg text-sm font-bold hover:bg-slate-800 transition-colors shadow-sm">
                                    Đăng nhập
                                </button>
                            </div>

                            {/* Mobile Menu Button */}
                            <div className="flex items-center md:hidden">
                                <button onClick={() => setIsOpen(!isOpen)} className="p-2 rounded-xl text-slate-500 hover:bg-slate-100">
                                    {isOpen ? <X size={24} /> : <Menu size={24} />}
                                </button>
                            </div>
                        </div>
                    </div>
                    {/* Mobile Menu Content */}
                    {isOpen && (
                        <div className="md:hidden bg-white border-t border-slate-100 p-4 space-y-2 shadow-lg absolute w-full left-0 z-50">
                            <button onClick={() => {setActiveTab('license'); setIsOpen(false)}} className="block w-full text-left px-4 py-3 rounded-lg font-bold text-slate-700 hover:bg-blue-50 hover:text-blue-700">Giấy phép hành nghề</button>
                            <button onClick={() => {setActiveTab('cme'); setIsOpen(false)}} className="block w-full text-left px-4 py-3 rounded-lg font-bold text-slate-700 hover:bg-teal-50 hover:text-teal-700">Cập nhật KTYK (CME)</button>
                            <button onClick={() => {setActiveTab('scope'); setIsOpen(false)}} className="block w-full text-left px-4 py-3 rounded-lg font-bold text-slate-700 hover:bg-indigo-50 hover:text-indigo-700">Phạm vi hành nghề (KTY)</button>
                            <button className="block w-full text-left px-4 py-3 rounded-lg font-bold text-slate-700 hover:bg-slate-50 mt-2 border-t border-slate-100">Đăng nhập</button>
                        </div>
                    )}
                </nav>
            );
        };

        const Banner = ({ type }) => {
            if (type === 'license') {
                return (
                    <div className="bg-blue-700 rounded-3xl p-8 md:p-12 text-white shadow-xl relative overflow-hidden mb-12">
                        <div className="absolute top-0 right-0 opacity-10 p-8 transform translate-x-10 -translate-y-10">
                            <UserCheck size={250} />
                        </div>
                        <div className="relative z-10 max-w-3xl">
                            <div className="inline-flex items-center gap-2 bg-blue-600/50 border border-blue-400/30 rounded-full px-4 py-1.5 mb-6 backdrop-blur-md">
                                <span className="w-2 h-2 rounded-full bg-green-400 animate-pulse"></span>
                                <span className="text-xs font-bold text-blue-100 uppercase tracking-wide">Mục 3 - Luật Khám bệnh, chữa bệnh 2023</span>
                            </div>
                            <h1 className="text-3xl md:text-5xl font-extrabold mb-6 leading-tight">Quy định về <br/>Giấy phép hành nghề</h1>
                            <p className="text-blue-100 text-lg leading-relaxed max-w-2xl opacity-90">
                                Cập nhật toàn diện về chức danh, thời hạn, điều kiện cấp mới và gia hạn giấy phép theo quy định mới nhất có hiệu lực từ 01/01/2024.
                            </p>

                    </div>
                );
            }
            if (type === 'cme') {
                return (
                    <div className="bg-teal-700 rounded-3xl p-8 md:p-12 text-white shadow-xl relative overflow-hidden mb-12">
                        <div className="absolute top-0 right-0 opacity-10 p-8 transform translate-x-10 -translate-y-10">
                            <Award size={250} />
                        </div>
                        <div className="relative z-10 max-w-3xl">
                            <div className="inline-flex items-center gap-2 bg-teal-600/50 border border-teal-400/30 rounded-full px-4 py-1.5 mb-6 backdrop-blur-md">
                                <span className="w-2 h-2 rounded-full bg-yellow-400 animate-pulse"></span>
                                <span className="text-xs font-bold text-teal-100 uppercase tracking-wide">Thông tư 32/2023/TT-BYT</span>
                            </div>
                            <h1 className="text-3xl md:text-5xl font-extrabold mb-6 leading-tight">Cập nhật kiến thức <br/>Y khoa liên tục (CME)</h1>

                            </p>
                        </div>
                    </div>
                );

            return (
                <div className="bg-indigo-700 rounded-3xl p-8 md:p-12 text-white shadow-xl relative overflow-hidden mb-12">

                        <List size={250} />
                    </div>
                    <div className="relative z-10 max-w-3xl">
                        <div className="inline-flex items-center gap-2 bg-indigo-600/50 border border-indigo-400/30 rounded-full px-4 py-1.5 mb-6 backdrop-blur-md">
                            <span className="w-2 h-2 rounded-full bg-pink-400 animate-pulse"></span>
                            <span className="text-xs font-bold text-indigo-100 uppercase tracking-wide">Phụ lục XIV - Thông tư 32/2023/TT-BYT</span>
                        </div>
                        <h1 className="text-3xl md:text-5xl font-extrabold mb-6 leading-tight">Phạm vi hoạt động <br/>Chuyên môn Kỹ thuật y</h1>
                        <p className="text-indigo-100 text-lg leading-relaxed max-w-2xl opacity-90">
                            Danh mục kỹ thuật chi tiết được phép thực hiện đối với chức danh Kỹ thuật y chuyên ngành Hình ảnh y học và Y học hạt nhân.
                        </p>
                    </div>
                </div>
            );
        };

        const LicenseContent = () => (
            <div className="animate-in fade-in duration-500">
                <Banner type="license" />
                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                    {PRACTICE_LICENSE_DATA.map((item) => (
                        <div key={item.id} className={`bg-white rounded-2xl border-t-4 border-${item.color}-500 shadow-sm hover:shadow-lg transition-all duration-300 group flex flex-col h-full overflow-hidden`}>

                                    </div>
                                    <span className={`text-xs font-bold text-${item.color}-700 bg-white px-3 py-1 rounded-full border border-${item.color}-200 font-mono`}>{item.sub}</span>
                                </div>
                                <h3 className={`text-lg font-bold text-${item.color}-800`}>{item.title}</h3>
                            </div>
                            
                            <div className="p-6 flex-grow flex flex-col">
                                <p className="text-base text-slate-600 mb-6 italic leading-relaxed">{item.desc}</p>
                                <ul className="space-y-4 flex-grow">
                                    {item.content.map((line, idx) => (
                                        <li key={idx} className="flex items-start gap-3 text-base text-slate-700 leading-relaxed">
                                            <span className={`mt-2 w-1.5 h-1.5 rounded-full bg-${item.color}-500 shrink-0`}></span>
                                            <span>{line}</span>
                                        </li>
                                    ))}
                                </ul>
                            </div>
                        </div>
                    ))}
                </div>
            </div>
        );

        const CmeContent = () => {
            const [cmeHours, setCmeHours] = useState(0);
            return (
                <div className="animate-in fade-in duration-500">
                    <Banner type="cme" />
                    
                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                        {/* Left Column */}

                            {/* NEW BUTTONS SECTION - ADDED ABOVE CALCULATOR */}
                            <div className="bg-white rounded-2xl shadow-sm border border-slate-200 p-6">
                                <h3 className="font-bold text-slate-800 mb-4 text-lg">Các hình thức CME được công nhận</h3>
                                <div className="space-y-3">
                                    {CME_FORMS.map((form, idx) => (
                                        <div key={idx} className={`p-4 rounded-xl border ${form.borderColor} ${form.bgColor} flex items-start gap-3 hover:shadow-sm transition-shadow cursor-default`}>

                                                <h4 className={`font-bold text-sm ${form.iconColor} mb-1`}>{form.title}</h4>
                                                <p className="text-xs text-slate-600 leading-relaxed">{form.desc}</p>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>

                            {/* Calculator Widget */}
                            <div className="bg-white rounded-2xl shadow-lg shadow-slate-200/50 border border-slate-100 p-8">
                                <h3 className="text-lg font-bold text-slate-800 mb-6 flex items-center gap-2">
                                    <Clock className="text-teal-600" /> Theo dõi tín chỉ
                                </h3>
                                
                                <div className="bg-slate-50 rounded-2xl p-6 border border-slate-200 text-center mb-6">
                                    <p className="text-xs font-bold text-slate-400 uppercase tracking-wider mb-3">Số tiết đã tích lũy</p>
                                    <div className="flex items-center justify-center gap-3">
                                        <input 
                                            type="number" 
                                            value={cmeHours}

                                            className="w-24 text-5xl font-black text-slate-800 bg-transparent text-center focus:outline-none border-b-2 border-slate-300 focus:border-teal-500 transition-colors"

                                        <span className="text-slate-400 font-medium mt-4 text-lg">/ 48</span>
                                    </div>
                                    <div className="mt-6 w-full bg-slate-200 rounded-full h-2.5 overflow-hidden">
                                        <div 
                                            className={`h-full transition-all duration-1000 ${cmeHours >= 48 ? 'bg-green-500' : 'bg-yellow-500'}`} 
                                            style={{width: `${Math.min((cmeHours/48)*100, 100)}%`}}
                                        ></div>
                                    </div>
                                    <p className="mt-4 text-sm font-bold text-slate-600">
                                        {cmeHours >= 48 ? "✅ Đã đủ điều kiện gia hạn!" : `⚠️ Còn thiếu ${48 - cmeHours} tiết`}
                                    </p>
                                </div>
                                <div className="text-sm text-slate-500 leading-relaxed text-center">
                                    Theo Điều 22 Luật 2023, CME là điều kiện bắt buộc để gia hạn giấy phép hành nghề.
                                </div>
                            </div>
                        </div>

                        {/* Right: Conversion Table */}
                        <div className="lg:col-span-2">
                            <div className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                                <div className="p-6 border-b border-slate-100 bg-slate-50 flex justify-between items-center">
                                    <h3 className="text-lg font-bold text-slate-800 flex items-center gap-2">
                                        <Table className="text-blue-600" /> Bảng quy đổi giờ tín chỉ CME
                                    </h3>
                                    <span className="text-xs font-bold text-white bg-slate-400 px-2 py-1 rounded">Phụ lục I</span>
                                </div>
                                <div className="p-6">
                                    <div className="space-y-6">
                                        {CME_CONVERSION_DATA.map((section, idx) => (
                                            <div key={idx} className="bg-white rounded-xl border border-slate-200 overflow-hidden">
                                                <div className="bg-slate-100 px-5 py-3 border-b border-slate-200">
                                                    <h3 className="font-bold text-slate-700 text-sm uppercase tracking-wide">{section.group}</h3>
                                                </div>
                                                <div className="divide-y divide-slate-100">
                                                    {section.items.map((item, i) => (
                                                        <div key={i} className="flex flex-col sm:flex-row sm:justify-between sm:items-center p-4 hover:bg-slate-50 transition-colors gap-2">
                                                            <span className="text-sm text-slate-700 font-medium">{item.name}</span>
                                                            <span className="text-xs font-bold text-blue-700 bg-blue-50 px-3 py-1.5 rounded-full border border-blue-100 text-center sm:text-right shrink-0">
                                                                {item.value}
                                                            </span>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                    <div className="mt-6 p-4 bg-amber-50 border border-amber-100 rounded-xl flex gap-3">
                                        <AlertTriangle className="text-amber-600 shrink-0" size={20} />
                                        <p className="text-sm text-amber-800">
                                            <strong>Lưu ý:</strong> Một tiết học được tính bằng 50 phút. Đối với các khóa đào tạo, bồi dưỡng ngắn hạn: 1 tiết học tương đương 1 giờ tín chỉ.
                                        </p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const ScopeContent = () => {
            const [openIndex, setOpenIndex] = useState(null);

            const toggleAccordion = (index) => {
                setOpenIndex(openIndex === index ? null : index);
            };

            return (
                <div className="animate-in fade-in duration-500">
                    <Banner type="scope" />
                    
                    <div className="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 md:p-8">
                        <div className="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-8">
                            <div>
                                <h3 className="text-2xl font-bold text-slate-800">Danh mục kỹ thuật (Hình ảnh y học)</h3>
                                <p className="text-slate-500 mt-1">Trích xuất từ Phụ lục XIV - Danh mục kỹ thuật của Kỹ thuật y</p>
                            </div>
                            <div className="relative">
                                <input 
                                    type="text" 
                                    placeholder="Tìm kiếm kỹ thuật..." 
                                    className="pl-10 pr-4 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 w-full md:w-64"
                                />
                                <Search className="absolute left-3 top-2.5 text-slate-400" size={18} />
                            </div>
                        </div>

                        <div className="space-y-4">
                            {IMAGING_SCOPE_DATA.map((group, index) => (
                                <div key={index} className="border border-slate-200 rounded-xl overflow-hidden">
                                    <button 
                                        onClick={() => toggleAccordion(index)}
                                        className={`w-full flex items-center justify-between p-5 text-left transition-colors ${openIndex === index ? 'bg-indigo-50' : 'bg-white hover:bg-slate-50'}`}
                                    >
                                        <div className="flex items-center gap-4">
                                            <div className={`p-2 rounded-lg ${openIndex === index ? 'bg-white text-indigo-600 shadow-sm' : 'bg-slate-100 text-slate-600'}`}>
                                                {group.icon}
                                            </div>
                                            <span className={`font-bold text-lg ${openIndex === index ? 'text-indigo-800' : 'text-slate-700'}`}>
                                                {group.category}
                                            </span>
                                        </div>
                                        <ChevronDown className={`text-slate-400 transition-transform duration-300 ${openIndex === index ? 'rotate-180 text-indigo-600' : ''}`} />
                                    </button>
                                    
                                    {openIndex === index && (
                                        <div className="p-5 bg-white border-t border-slate-100">
                                            <ul className="grid md:grid-cols-2 gap-x-8 gap-y-3">
                                                {group.items.map((item, idx) => (
                                                    <li key={idx} className="flex items-start gap-3 text-slate-600 text-sm py-1 border-b border-slate-50 last:border-0 md:border-0">
                                                        <span className="mt-1.5 w-1.5 h-1.5 rounded-full bg-indigo-400 shrink-0"></span>
                                                        <span>{item}</span>
                                                    </li>
                                                ))}
                                            </ul>
                                        </div>
                                    )}
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [activeTab, setActiveTab] = useState('license');

            // Dynamic classes based on activeTab
            let footerBgClass, footerBorderClass, footerTextClass;
            
            if (activeTab === 'license') {
                footerBgClass = 'bg-blue-700';
                footerBorderClass = 'border-blue-600';
                footerTextClass = 'text-blue-100';
            } else if (activeTab === 'cme') {
                footerBgClass = 'bg-teal-700';
                footerBorderClass = 'border-teal-600';
                footerTextClass = 'text-teal-100';
            } else { // scope
                footerBgClass = 'bg-indigo-700';
                footerBorderClass = 'border-indigo-600';
                footerTextClass = 'text-indigo-100';
            }

            return (
                <div className="min-h-screen bg-slate-50 font-sans text-slate-900 flex flex-col">
                    <Navbar activeTab={activeTab} setActiveTab={setActiveTab} />

                    <main className="flex-grow max-w-7xl mx-auto px-4 py-8 w-full">
                        {activeTab === 'license' && <LicenseContent />}
                        {activeTab === 'cme' && <CmeContent />}
                        {activeTab === 'scope' && <ScopeContent />}
                    </main>

                    <footer className={`${footerBgClass} ${footerTextClass} py-16 mt-auto relative overflow-hidden transition-colors duration-500`}>
                        <div className="absolute inset-0 bg-gradient-to-b from-transparent to-black/10 pointer-events-none"></div>
                        <div className="max-w-7xl mx-auto px-4 relative z-10">
                            <div className="flex flex-col items-center justify-center text-center">
                                <div className="flex items-center justify-center gap-3 mb-6">
                                    <div className="p-2 bg-white rounded-xl shadow-lg shadow-black/20">
                                        <Scale className={`h-8 w-8 ${
                                            activeTab === 'license' ? 'text-blue-700' : 
                                            activeTab === 'cme' ? 'text-teal-700' : 'text-indigo-700'
                                        }`} />
                                    </div>
                                    <span className="font-extrabold text-3xl text-white tracking-tight">VnRad<span className="opacity-80">Legal</span></span>
                                </div>
                                
                                <p className="text-lg font-medium mb-2 max-w-2xl opacity-90">
                                    Nền tảng tra cứu pháp lý chuyên sâu cho cộng đồng Hình ảnh y học
                                </p>
                                
                                <p className={`text-sm mt-8 pt-8 border-t ${footerBorderClass} w-full max-w-md opacity-70`}>
                                    Dữ liệu được trích xuất từ Luật Khám bệnh, chữa bệnh số 15/2023/QH15 và Thông tư 32/2023/TT-BYT.
                                    <br/>
                                    © 2025 VnRadLegal. All rights reserved.
                                </p>
                            </div>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById("root"));
        root.render(<App />);
    </script>
</body>
</html>
