        html {

            display: none;

        @media (min-width: 768px) { /* Chỉ áp dụng cho 'md' trở lên */

                top: 2rem; /* 2rem = 32px */

            width: 8px; /* Độ rộng thanh cuộn */

        .custom-scrollbar::-webkit-scrollbar-track {
            background: #f1f5f9; /* Màu nền của rãnh cuộn */
            border-radius: 10px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #94a3b8; /* Màu của con trượt */

        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #475569; /* Màu con trượt khi hover */

            color: #0c4a6e; /* text-sky-800 */

        }

        .lightbox {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.85);
            display: flex;
            justify-content: center;

            z-index: 100;
            cursor: pointer;
            padding: 20px;

            max-height: 90%;
            object-fit: contain;
            border-radius: 8px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);

                    { priority: 2, use: { vi: 'Chụp T2W cột sống (đặc biệt là cổ và ngực) để giảm artifact dòng chảy CSF và nuốt.', en: 'Spine T2W (especially C-spine and T-spine) to reduce CSF flow and swallowing artifacts.' } },
                    { priority: 3, use: { vi: 'Chụp khớp (MSK) T2W khi bệnh nhân cử động.', en: 'MSK T2W imaging when the patient moves.' } }
                ],
                tips: {
                    vi: 'Thời gian chụp sẽ dài hơn một chút so với TSE/FSE tiêu chuẩn. Đây là "cứu cánh" cho các bệnh nhân khó. Nó cũng làm giảm artifact nhạy từ (susceptibility) ở một mức độ nào đó.',
                    en: 'Scan time is slightly longer than standard TSE/FSE. This is a "lifesaver" for difficult patients. It also reduces susceptibility artifacts to some extent.'
                },
                imageUrl: 'https://placehold.co/600x400/9ca3af/ffffff?text=BLADE+Motion+Correction'
            },
            {
                id: 'warp_mavric',
                group: 'advanced',
                genericName: { vi: 'Giảm xảo ảnh Kim loại (WARP/MAVRIC)', en: 'Metal Artifact Reduction (WARP/MAVRIC)' },
                vendors: {
                    Siemens: 'WARP (VAT), Advanced WARP (SEMAC)',
                    GE: 'MAVRIC SL',
                    Philips: 'O-MAR, O-MAR XD',
                    Canon: 'VAT, MART EXP',
                    Fujifilm: ''
                },
                physics: {
                    vi: 'Là một nhóm các kỹ thuật (không phải một xung đơn lẻ) được thiết kế để giảm artifact từ cấy ghép kim loại. Các kỹ thuật này thường kết hợp: 1) Tăng Bandwidth, 2) Sử dụng TSE/FSE (thay vì GRE), 3) Điều chỉnh gradient (VAT), và 4) Mã hóa 3D và đa tần số (MAVRIC/SEMAC) để bù đắp cho sự méo từ trường nghiêm trọng gần kim loại.',
                    en: 'A group of techniques (not a single sequence) designed to reduce artifacts from metal implants. These techniques often combine: 1) Increased Bandwidth, 2) Using TSE/FSE (instead of GRE), 3) View-Angle Tilting (VAT), and 4) 3D multi-spectral encoding (MAVRIC/SEMAC) to compensate for severe field distortion near metal.'
                },
                applications: [
                    { priority: 1, use: { vi: 'Chụp cột sống sau phẫu thuật (nẹp vít, thay đĩa đệm).', en: 'Post-operative spine imaging (screws, disc replacements).' } },
                    { priority: 2, use: { vi: 'Chụp khớp nhân tạo (háng, gối).', en: 'Imaging near joint replacements (hip, knee).' } },
                    { priority: 3, use: { vi: 'Đánh giá phần mềm và xương xung quanh kim loại (ví dụ: tìm nhiễm trùng, u).', en: 'Evaluating soft tissue and bone around metal (e.g., looking for infection, tumor).' } }
                ],
                tips: {
                    vi: 'Luôn chạy kèm STIR (thay vì Fat-Sat) vì Fat-Sat sẽ thất bại hoàn toàn gần kim loại. Các kỹ thuật 3D (MAVRIC/SEMAC) cho kết quả tốt nhất nhưng thời gian chụp rất lâu. VAT (2D) nhanh hơn nhưng hiệu quả giảm artifact kém hơn.',
                    en: 'Always run with STIR (instead of Fat-Sat) as Fat-Sat will fail completely near metal. 3D techniques (MAVRIC/SEMAC) give the best results but are very slow. VAT (2D) is faster but less effective at artifact reduction.'
                },
                imageUrl: 'https://placehold.co/600x400/9ca3af/ffffff?text=WARP+Metal+Artifact'
            }
        ];

        // === LOGIC VẬN HÀNH TRANG ===

        let currentLang = 'vi'; // Ngôn ngữ mặc định
        let activeSidebarLink = null;
        let intersectionObserver;

        // Lấy các phần tử DOM chính
        const sidebarNav = document.getElementById('sidebar-nav');
        const container = document.getElementById('sequence-container');
        const searchInput = document.getElementById('searchInput');
        const mainContent = document.getElementById('main-content'); // Khu vực nội dung (phải)
        const contentContainer = document.getElementById('sequence-container'); // Lưới thẻ (cuộn)
        const backToTopBtn = document.getElementById('back-to-top-btn');

        /**
         * Hàm dịch và hiển thị toàn bộ nội dung
         * @param {string} lang - Ngôn ngữ ('vi' hoặc 'en')
         */
        function translateAndRender(lang) {
            currentLang = lang;
            localStorage.setItem('mri_handbook_lang', lang); // Lưu lựa chọn

            // 1. Dịch các văn bản tĩnh (header, footer, v.v.)
            document.querySelectorAll('[data-lang-key]').forEach(el => {
                const key = el.dataset.langKey;
                if (staticTranslations[key] && staticTranslations[key][lang]) {
                    if (el.tagName === 'INPUT') {
                        el.placeholder = staticTranslations[key][lang];
                    } else {
                        el.textContent = staticTranslations[key][lang];
                    }
                }
            });
            document.title = staticTranslations['ui.title'][lang]; // Dịch tiêu đề trang

            // 2. Cập nhật style cho nút ngôn ngữ
            document.getElementById('lang-vi').classList.toggle('opacity-50', lang !== 'vi');
            document.getElementById('lang-en').classList.toggle('opacity-50', lang !== 'en');

            // 3. Dựng lại nội dung động (sidebar và thẻ)
            renderSequences(sequenceData, lang);

            // 4. Áp dụng lại bộ lọc (nếu có)
            filterSequences();

            // 5. Khởi tạo lại IntersectionObserver
            setupIntersectionObserver();
        }

        /**
         * Hàm HỖ TRỢ: Tạo HTML cho một thẻ chuỗi xung (Đã cập nhật đa ngôn ngữ)
         */
        function generateCardHtml(seq, lang) {
            // Lấy style của nhóm
            const style = groupStyles[seq.group] || groupStyles['spin-echo'];

            // Tạo bảng tên hãng (Đã cập nhật đa ngôn ngữ)
            let vendorHtml = '<div class="my-3 overflow-hidden rounded-lg border border-gray-300 shadow-sm">';
            vendorHtml += '<table class="w-full text-sm">';
            vendorHtml += '<thead class="bg-gray-200">';
            vendorHtml += '<tr>';
            vendorHtml += `<th scope="col" class="py-2 px-4 text-left text-xs font-semibold uppercase tracking-wider text-gray-700">${staticTranslations['card.vendor'][lang]}</th>`;
            vendorHtml += `<th scope="col" class="py-2 px-4 text-left text-xs font-semibold uppercase tracking-wider text-gray-700">${staticTranslations['card.name'][lang]}</th>`;
            vendorHtml += '</tr></thead>';
            vendorHtml += '<tbody class="bg-white divide-y divide-gray-200">';
            
            if (seq.vendors && typeof seq.vendors === 'object') { // KIỂM TRA AN TOÀN
                let i = 0;
                for (const [vendor, name] of Object.entries(seq.vendors)) {
                    const bgColor = i % 2 === 0 ? 'bg-white' : 'bg-gray-50';
                    vendorHtml += `<tr class="${bgColor}"><td class="py-3 px-4 font-semibold text-blue-700">${vendor}</td><td class="py-3 px-4 text-gray-600">${name}</td></tr>`;
                    i++;
                }
            }
            vendorHtml += '</tbody></table></div>';

            // Tạo danh sách ứng dụng (Đã cập nhật đa ngôn ngữ)
            let appHtml = '<ol class="list-decimal list-inside space-y-2 mt-2 text-sm">';
            if (seq.applications && seq.applications.length > 0) {
                 seq.applications.sort((a, b) => a.priority - b.priority).forEach(app => {
                    appHtml += `<li><span class="font-medium">${app.use[lang]}</span></li>`;
                });
            }
            appHtml += '</ol>';

            // Tạo khối Tips & Tricks (Đã cập nhật đa ngôn ngữ)
            let tipsHtml = '';
            if (seq.tips && seq.tips[lang] && seq.tips[lang].trim() !== '') {
                tipsHtml = `
                    <div>
                        <h3 class="text-lg font-semibold text-blue-700">${staticTranslations['card.tips'][lang]}</h3>
                        <div class="mt-2 p-3 bg-yellow-50 border-l-4 border-yellow-400 rounded-r-lg">
                            <p class="text-sm text-yellow-800 leading-relaxed">${seq.tips[lang]}</p>
                        </div>
                    </div>
                `;
            }

            // Tạo khối Hình ảnh minh họa (Đã cập nhật đa ngôn ngữ)
            let imageHtml = '';
            if (seq.imageUrl) {
                imageHtml = `
                    <div>
                        <h3 class="text-lg font-semibold text-blue-700">${staticTranslations['card.illustration'][lang]}</h3>
                        <img src="${seq.imageUrl}" alt="Illustration for ${seq.genericName[lang]}" class="mt-2 w-full h-auto object-cover rounded-lg border border-gray-200 shadow-sm cursor-pointer" loading="lazy">
                    </div>
                `;
            }

            // Trả về thẻ HTML hoàn chỉnh
            return `
                <div class="sequence-card bg-white rounded-lg shadow-lg overflow-hidden transition-all duration-300" id="${seq.id}">
                    <!-- Header thẻ -->
                    <div class="p-5 ${style.bg} text-white">
                        <h2 class="text-2xl font-bold">${seq.genericName[lang]}</h2>
                    </div>
                    
                    <!-- Nội dung thẻ -->
                    <div class="p-5 space-y-5"> <!-- Tăng space-y-5 -->
                        <!-- Tên Hãng -->
                        <div>
                            <h3 class="text-lg font-semibold text-blue-700">${staticTranslations['card.vendor_names'][lang]}</h3>
                            ${vendorHtml}
                        </div>

                        <!-- Bản chất vật lý -->
                        <div>
                            <h3 class="text-lg font-semibold text-blue-700">${staticTranslations['card.physics'][lang]}</h3>
                            <p class="text-gray-700 text-sm mt-2 leading-relaxed">${seq.physics[lang]}</p>
                        </div>

                        <!-- Ứng dụng lâm sàng -->
                        <div>
                            <h3 class="text-lg font-semibold text-blue-700">${staticTranslations['card.applications'][lang]}</h3>
                            ${appHtml}
                        </div>
                        
                        <!-- Hình ảnh minh họa -->
                        ${imageHtml}

                        <!-- Khối Tips & Tricks -->
                        ${tipsHtml}

                    </div>
                </div>
            `;
        }


        /**
         * Hàm để hiển thị các chuỗi xung (Đã cập nhật đa ngôn ngữ)
         */
        function renderSequences(sequences, lang) {
            sidebarNav.innerHTML = '';
            container.innerHTML = '';
            let sidebarHtml = '<div class="space-y-1">'; // Bỏ sidebar-sticky wrapper
            let contentHtml = '';

            // Lặp qua các nhóm theo thứ tự của groupStyles
            for (const groupId in groupStyles) {
                const style = groupStyles[groupId];
                const sequencesInGroup = sequences.filter(s => s.group === groupId);

                // Sắp xếp các chuỗi xung trong nhóm
                const sortOrder = groupSortOrders[groupId] || [];
                sequencesInGroup.sort((a, b) => sortOrder.indexOf(a.id) - sortOrder.indexOf(b.id));

                if (sequencesInGroup.length > 0) {
                    // Thêm vào Sidebar
                    // *** ĐÃ SỬA: Thêm pl-2 vào nút group-toggle ***
                    sidebarHtml += `
                        <div id="sidebar-${groupId}-group" class="sidebar-group mt-4 first:mt-0">
                            <button class="flex justify-between items-center w-full group-toggle pl-2" data-target="${groupId}"> 
                                <h3 class="text-sm uppercase font-bold ${style.textDark} mb-2 text-left">${style.title[lang]}</h3>
                                <svg class="w-5 h-5 toggle-icon transform text-gray-500 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                            </button>
                            <div class="toggle-content space-y-1 pl-2" id="sidebar-${groupId}-content">
                    `;
                    sequencesInGroup.forEach(seq => {
                        sidebarHtml += `<a href="#${seq.id}" class="sidebar-link block py-2 px-3 rounded-md text-sm font-medium text-gray-600 ${style.hover} hover:${style.textDark} transition-colors duration-150">${seq.genericName[lang]}</a>`;
                    });
                    sidebarHtml += `</div></div>`;

                    // Thêm vào Nội dung chính
                    contentHtml += `
                        <div class="group-wrapper">
                            <button class="flex justify-between items-center w-full group-toggle" data-target="${groupId}">
                                <h2 id="${groupId}-group" class="group-heading text-3xl font-bold mt-12 mb-6 ${style.textDark} pt-5">${style.title[lang]}</h2>
                                <svg class="w-8 h-8 toggle-icon transform text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                            </button>
                            <div class="toggle-content" id="content-${groupId}-content">
                                <!-- Đã sửa: md:grid-cols-2 lg:grid-cols-2 -> md:grid-cols-2 -->
                                <div id="${groupId}-grid" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    `;
                    sequencesInGroup.forEach(seq => {
                        contentHtml += generateCardHtml(seq, lang);
                    });
                    contentHtml += `</div></div></div>`;
                }
            }
            
            sidebarHtml += '</div>';

            if (sequences.length === 0) {
                container.innerHTML = `<p class="text-gray-600 text-lg col-span-full text-center">${lang === 'vi' ? 'Không tìm thấy chuỗi xung.' : 'No sequences found.'}</p>`;
                sidebarNav.innerHTML = `<p class="text-gray-600 text-sm">${lang === 'vi' ? 'Không có dữ liệu.' : 'No data.'}</p>`;
                return;
            }

            sidebarNav.innerHTML = sidebarHtml.replace('mt-4 first:mt-0', '');
            container.innerHTML = contentHtml.replace('mt-12', '');
        }

        /**
         * Hàm lọc chuỗi xung
         */
        function filterSequences() {
            const searchTerm = searchInput.value.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
            const allCards = document.querySelectorAll('.sequence-card');
            const allSidebarLinks = document.querySelectorAll('.sidebar-link');
            const visibleCardIds = new Set();
            let hasResults = false;

            // 1. Lọc các thẻ Card
            allCards.forEach(card => {
                const cardText = card.textContent.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
                if (cardText.includes(searchTerm)) {
                    card.classList.remove('hidden');
                    visibleCardIds.add(card.id);
                    hasResults = true;
                } else {
                    card.classList.add('hidden');
                }
            });

            // 2. Lọc các link ở Sidebar
            allSidebarLinks.forEach(link => {
                const targetId = link.hash.substring(1);
                if (visibleCardIds.has(targetId)) {
                    link.classList.remove('hidden');
                } else {
                    link.classList.add('hidden');
                }
            });

            // 3. Ẩn/Hiện các tiêu đề nhóm
            document.querySelectorAll('.group-toggle').forEach(toggleBtn => {
                const targetId = toggleBtn.dataset.target;
                const sidebarGroup = document.getElementById(`sidebar-${targetId}-group`);
                const contentGroupWrapper = document.getElementById(`${targetId}-group`)?.closest('.group-wrapper');
                
                const visibleLinks = sidebarGroup.querySelectorAll('.sidebar-link:not(.hidden)').length;
                
                if (visibleLinks === 0) {
                    sidebarGroup.classList.add('hidden');
                    if (contentGroupWrapper) contentGroupWrapper.classList.add('hidden');
                } else {
                    sidebarGroup.classList.remove('hidden');
                    if (contentGroupWrapper) contentGroupWrapper.classList.remove('hidden');
                }
            });

            // Hiển thị thông báo không tìm thấy
            const noResultsEl = document.getElementById('no-results-message');
            if (!hasResults && !noResultsEl) {
                const noResultsHtml = `<p id="no-results-message" class="text-gray-600 text-lg text-center py-10">${currentLang === 'vi' ? 'Không tìm thấy chuỗi xung phù hợp.' : 'No matching sequences found.'}</p>`;
                container.insertAdjacentHTML('beforeend', noResultsHtml);
            } else if (hasResults && noResultsEl) {
                noResultsEl.remove();
            }
        }

        /**
         * Hàm đóng/mở nhóm (Collapsible)
         */
        function handleGroupToggle(event) {
            const button = event.currentTarget;
            const targetId = button.dataset.target;
            
            // Tìm cả 2 content (sidebar và main)
            const sidebarContent = document.getElementById(`sidebar-${targetId}-content`);
            const mainContent = document.getElementById(`content-${targetId}-content`);
            
            // Tìm cả 2 icon
            const sidebarIcon = document.getElementById(`sidebar-${targetId}-group`).querySelector('.toggle-icon');
            const mainIcon = document.getElementById(`${targetId}-group`)?.closest('.group-toggle').querySelector('.toggle-icon');

            const isOpening = sidebarContent.classList.contains('hidden'); // Kiểm tra trạng thái

            if (isOpening) {
                sidebarContent.classList.remove('hidden');
                mainContent?.classList.remove('hidden');
                sidebarIcon?.classList.remove('rotate-180');
                mainIcon?.classList.remove('rotate-180');
            } else {
                sidebarContent.classList.add('hidden');
                mainContent?.classList.add('hidden');
                sidebarIcon?.classList.add('rotate-180');
                mainIcon?.classList.add('rotate-180');
            }
        }

        /**
         * Hàm tô sáng menu (Active Scrolling)
         */
        function setupIntersectionObserver() {
            // Ngắt kết nối observer cũ (nếu có)
            if (intersectionObserver) {
                intersectionObserver.disconnect();
            }

            const headings = document.querySelectorAll('.group-heading');
            if (headings.length === 0) return;

            const options = {
                root: contentContainer, // Cuộn trong container này
                rootMargin: '0px 0px -80% 0px', // Kích hoạt khi mục ở 20% trên cùng của container
                threshold: 0
            };

            intersectionObserver = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        const id = entry.target.id; // Ví dụ: 'spin-echo-group'
                        const groupId = id.replace('-group', ''); // 'spin-echo'
                        
                        // Tìm link sidebar tương ứng
                        const activeLink = document.querySelector(`.sidebar-group[id="sidebar-${groupId}-group"]`);
                        const firstLinkInGroup = activeLink?.querySelector('.sidebar-link');

                        if (firstLinkInGroup) {
                            // Bỏ active cũ
                            if (activeSidebarLink) {
                                activeSidebarLink.classList.remove('active');
                            }
                            // Active link đầu tiên của nhóm
                            firstLinkInGroup.classList.add('active');
                            activeSidebarLink = firstLinkInGroup;

                            // Tự động cuộn sidebar (nếu cần)
                            activeLink.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                        }
                    }
                });
            }, options);

            headings.forEach(heading => {
                intersectionObserver.observe(heading);
            });
        }


        // === GẮN SỰ KIỆN ===
        
        // 1. Hiển thị tất cả khi tải trang
        document.addEventListener('DOMContentLoaded', () => {
            const savedLang = localStorage.getItem('mri_handbook_lang') || 'vi';
            translateAndRender(savedLang);

            const mobileMenuButton = document.getElementById('mobile-menu-button');
            const sidebar = document.getElementById('sidebar-nav');

            // 2. Logic cho menu mobile
            mobileMenuButton.addEventListener('click', () => {
                sidebar.classList.toggle('hidden');
                const icon = mobileMenuButton.querySelector('svg');
                if (sidebar.classList.contains('hidden')) {
                    icon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"></path>`;
                } else {
                    icon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>`;
                }
            });

            // 3. Đóng menu mobile khi nhấp vào link
            sidebar.addEventListener('click', (e) => {
                if (window.innerWidth < 768 && e.target.closest('a')) {
                    sidebar.classList.add('hidden');
                    mobileMenuButton.querySelector('svg').innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"></path>`;
                }
            });

            // 4. Lọc khi người dùng gõ
            searchInput.addEventListener('input', filterSequences); // Dùng 'input' thay vì 'keyup'

            // 5. Gắn sự kiện cho nút Đổi ngôn ngữ
            document.getElementById('lang-vi').addEventListener('click', () => translateAndRender('vi'));
            document.getElementById('lang-en').addEventListener('click', () => translateAndRender('en'));

            // 6. Gắn sự kiện cho Nút "Về Đầu Trang"
            contentContainer.addEventListener('scroll', () => {
                if (contentContainer.scrollTop > 200) {
                    backToTopBtn.classList.remove('hidden');
                } else {
                    backToTopBtn.classList.add('hidden');
                }
            });
            backToTopBtn.addEventListener('click', () => {
                contentContainer.scrollTo({ top: 0, behavior: 'smooth' });
            });

            // 7. Gắn sự kiện cho Đóng/Mở Nhóm
            // Phải dùng event delegation vì các nút này được tạo động
            document.body.addEventListener('click', (e) => {
                const toggleButton = e.target.closest('.group-toggle');
                if (toggleButton) {
                    handleGroupToggle({ currentTarget: toggleButton });
                }
            });

            // 8. Gắn sự kiện cho Lightbox (Phóng to ảnh)
            const lightboxModal = document.getElementById('lightbox-modal');
            const lightboxImage = document.getElementById('lightbox-image');
            
            contentContainer.addEventListener('click', (e) => {
                if (e.target.tagName === 'IMG' && e.target.closest('.sequence-card')) {
                    lightboxImage.src = e.target.src;
                    lightboxModal.classList.remove('hidden');
                }
            });
            
            lightboxModal.addEventListener('click', () => {
                lightboxModal.classList.add('hidden');
                lightboxImage.src = ''; // Xóa ảnh
            });
        });
    </script>
</body>
</html>
