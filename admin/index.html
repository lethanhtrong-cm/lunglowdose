    <style>
        @import url('https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');

        .skeleton {
            background: linear-gradient(90deg, rgba(30, 41, 59, 0.5) 25%, rgba(51, 65, 85, 0.5) 50%, rgba(30, 41, 59, 0.5) 75%);

        .custom-scrollbar::-webkit-scrollbar { width: 5px; }

        .tab-active { color: #3b82f6; border-bottom: 2px solid #3b82f6; }

<body class="antialiased custom-scrollbar">

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useMemo, useCallback, useRef } from 'react';
        import { createRoot } from 'react-dom/client';
        import { initializeApp } from 'firebase/app';
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut, signInWithCustomToken, signInAnonymously } from 'firebase/auth';
        import { getFirestore, collection, doc, addDoc, updateDoc, setDoc, deleteDoc, onSnapshot, query, orderBy, serverTimestamp, getDoc, limit, collectionGroup } from 'firebase/firestore';
        import { 
            ShieldCheck, Users, BookOpen, LogOut, Search, Trash2, Plus, 
            Upload, Download, X, CheckCircle2, AlertCircle, Edit3, 
            LayoutDashboard, FileText, Loader2, Info, Database,

        // --- CẤU HÌNH ĐỒNG BỘ ---
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {
            apiKey: "AIzaSyDqdo_DJIWa5iqxiCgBq-0iGX7f9sr6soo",
            authDomain: "rt-examination.firebaseapp.com",
            projectId: "rt-examination",
            storageBucket: "rt-examination.firebasestorage.app",
            messagingSenderId: "920482699854",
            appId: "1:920482699854:web:44f9b0d735bdc001c6c11f"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'med-exam-pro-html';
        const ADMIN_EMAILS = ["thanhtrong.yds@gmail.com", "vnrad.tech@gmail.com", "test@gmail.com"];

        // --- COMPONENTS ---
        const SkeletonLoader = ({ type }) => {
            if (type === 'card') return (
                <div className="stats-card p-8 rounded-[3rem] border border-white/5 space-y-4">
                    <div className="flex justify-between items-center"><div className="w-12 h-12 rounded-2xl skeleton"></div><div className="w-20 h-6 skeleton rounded-lg"></div></div>
                    <div className="h-10 w-3/4 skeleton rounded-xl"></div>

                </div>
            );
            return <div className="w-full h-20 skeleton rounded-3xl"></div>;
        };

        const Toast = ({ message, type, onClose }) => {
            useEffect(() => { const timer = setTimeout(onClose, 4000); return () => clearTimeout(timer); }, [onClose]);
            const styles = { success: "bg-emerald-500/20 border-emerald-500/40 text-emerald-400", error: "bg-red-500/20 border-red-500/40 text-red-400", info: "bg-blue-500/20 border-blue-500/40 text-blue-400" };
            return (
                <div className={`fixed bottom-6 right-6 px-6 py-4 rounded-2xl border ${styles[type]} shadow-2xl flex items-center gap-3 animate-fade-in z-[100] backdrop-blur-xl max-w-sm`}>
                    {type === 'error' ? <AlertCircle size={20}/> : <CheckCircle2 size={20}/>}<span className="font-bold text-sm leading-tight">{message}</span>
                </div>
            );
        };

        const ImportModal = ({ onClose, onImport, notify }) => {
            const [isProcessing, setIsProcessing] = useState(false);
            const downloadTemplate = () => { const wsData = [["Câu hỏi", "A", "B", "C", "D", "Đáp án (A/B/C/D)", "Giải thích", "Link Hình Ảnh (Nếu có)"], ["Vị trí tim?", "Hố chậu", "Trung thất", "Hạ sườn", "Thượng vị", "B", "Tim nằm ở trung thất giữa.", "https://example.com/tim.jpg"]]; const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(wsData), "Mẫu"); XLSX.writeFile(wb, "Mau_MedExam_HinhAnh.xlsx"); };
            const handleFile = (e) => { const file = e.target.files[0]; if (!file) return; setIsProcessing(true); const reader = new FileReader(); reader.onload = (evt) => { try { const data = new Uint8Array(evt.target.result); const wb = XLSX.read(data, { type: 'array' }); const rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { header: 1 }); const imported = rows.slice(1).filter(r => r[0]).map(r => ({ text: String(r[0]), options: [String(r[1]||''), String(r[2]||''), String(r[3]||''), String(r[4]||'')], correctOption: "ABCD".indexOf(String(r[5]||'A').toUpperCase().trim()), explanation: String(r[6] || ''), image: String(r[7] || '') })); onImport(imported); notify(`Đã nạp ${imported.length} câu hỏi`, 'success'); onClose(); } catch (err) { notify("Lỗi cấu trúc tệp Excel", "error"); } finally { setIsProcessing(false); } }; reader.readAsArrayBuffer(file); };
            return ( <div className="fixed inset-0 bg-black/90 backdrop-blur-md flex items-center justify-center p-4 z-[70]"> <div className="bg-slate-900 w-full max-w-md rounded-[2.5rem] border border-slate-800 p-10 text-center space-y-8 animate-in shadow-2xl"> <Database size={48} className="mx-auto text-emerald-500"/> <h3 className="text-2xl font-black text-white">Nạp dữ liệu từ Excel</h3> <div className="space-y-4"> <label className="block w-full py-12 border-2 border-dashed border-slate-700 rounded-3xl hover:border-emerald-500 cursor-pointer group transition-all"> <input type="file" className="hidden" accept=".xlsx, .xls" onChange={handleFile} /> <span className="text-slate-400 group-hover:text-emerald-400 font-bold">{isProcessing ? "Đang xử lý..." : "Chọn tệp Excel (.xlsx)"}</span> </label> <button onClick={downloadTemplate} className="text-emerald-500 text-xs font-black uppercase hover:text-emerald-400 flex items-center justify-center gap-2 w-full"><Download size={14}/> Tải file mẫu</button> </div> <button onClick={onClose} className="text-slate-600 font-bold">Hủy bỏ</button> </div> </div> );
        };

        const QuestionEditorModal = ({ question, onSave, onClose }) => {
            const [data, setData] = useState(question || { text: '', options: ['', '', '', ''], correctOption: 0, explanation: '', image: '' });
            return (
                <div className="fixed inset-0 bg-black/80 backdrop-blur-sm flex items-center justify-center p-4 z-[80]">
                    <div className="bg-slate-900 w-full max-w-2xl rounded-[3rem] border border-slate-800 overflow-hidden shadow-2xl flex flex-col max-h-[90vh]">
                        <div className="p-6 border-b border-white/5 flex justify-between items-center">
                            <h3 className="text-xl font-black text-white uppercase">{question ? 'Sửa câu hỏi' : 'Thêm câu hỏi mới'}</h3>
                            <button onClick={onClose} className="p-2 bg-slate-800 rounded-full hover:bg-slate-700"><X size={20}/></button>
                        </div>
                        <div className="flex-1 overflow-y-auto p-8 space-y-6 custom-scrollbar">
                            <div><label className="text-[10px] font-black text-slate-500 uppercase ml-2 mb-2 block">Nội dung câu hỏi</label><textarea className="w-full bg-slate-950 border border-slate-800 rounded-2xl p-4 outline-none focus:border-blue-600 font-bold text-white min-h-[100px]" value={data.text} onChange={e=>setData({...data, text: e.target.value})}/></div>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                {data.options.map((opt, i) => (
                                    <div key={i}>
                                        <label className={`text-[10px] font-black uppercase ml-2 mb-2 block ${data.correctOption === i ? 'text-emerald-500' : 'text-slate-500'}`}>Đáp án {String.fromCharCode(65+i)}</label>
                                        <div className="flex gap-2">
                                            <input className="flex-1 bg-slate-950 border border-slate-800 rounded-xl p-3 text-sm text-white" value={opt} onChange={e=>{const n = [...data.options]; n[i] = e.target.value; setData({...data, options: n})}}/>
                                            <button onClick={()=>setData({...data, correctOption: i})} className={`w-10 h-10 rounded-xl border flex items-center justify-center transition-all ${data.correctOption === i ? 'bg-emerald-600 border-emerald-500 text-white' : 'border-slate-800 text-slate-700'}`}><Check size={16}/></button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                            <div><label className="text-[10px] font-black text-slate-500 uppercase ml-2 mb-2 block">Link hình ảnh (Nếu có)</label><input className="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-sm text-white" value={data.image} onChange={e=>setData({...data, image: e.target.value})}/></div>
                            <div><label className="text-[10px] font-black text-slate-500 uppercase ml-2 mb-2 block">Giải thích đáp án</label><textarea className="w-full bg-slate-950 border border-slate-800 rounded-2xl p-4 text-sm text-white" value={data.explanation} onChange={e=>setData({...data, explanation: e.target.value})}/></div>
                        </div>
                        <div className="p-6 bg-slate-950/50 border-t border-white/5 flex justify-end gap-3">
                            <button onClick={onClose} className="px-6 py-3 font-bold text-slate-500 hover:text-white uppercase text-xs">Hủy</button>
                            <button onClick={()=>{onSave(data); onClose();}} className="bg-blue-600 hover:bg-blue-500 px-8 py-3 rounded-2xl font-black text-white text-xs uppercase shadow-xl">Xác nhận</button>
                        </div>
                    </div>
                </div>
            );
        };

        const ExamEditor = ({ exam, onClose, notify }) => {
            const [title, setTitle] = useState(exam?.title || '');
            const [category, setCategory] = useState(exam?.category || 'Chung');
            const [isPremium, setIsPremium] = useState(exam?.isPremium || false);
            const [duration, setDuration] = useState(exam?.duration || 30);
            const [questions, setQuestions] = useState(exam?.questions || []);
            const [showImport, setShowImport] = useState(false);
            const [editIdx, setEditIdx] = useState(null);
            const [isSaving, setIsSaving] = useState(false);

            const saveExam = async () => { if (!title.trim()) return notify("Vui lòng nhập tên đề thi", "error"); if (questions.length === 0) return notify("Danh sách câu hỏi đang trống.", "error"); setIsSaving(true); try { const data = { title, category, isPremium, duration: Number(duration), questions, updatedAt: serverTimestamp() }; if (exam?.id) await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'exams', exam.id), data); else await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'exams'), { ...data, createdAt: serverTimestamp(), isDeleted: false }); notify("Lưu đề thi thành công", "success"); onClose(); } catch (e) { notify(e.message, "error"); } finally { setIsSaving(false); } };

            return ( 
                <div className="fixed inset-0 bg-slate-950/98 flex items-center justify-center p-4 z-50"> 
                    <div className="bg-slate-900 w-full max-w-6xl h-[95vh] rounded-[2.5rem] border border-slate-800 flex flex-col shadow-2xl animate-in overflow-hidden"> 
                        <div className="p-6 border-b border-slate-800 flex justify-between items-center bg-slate-900/50 backdrop-blur-xl"> 
                            <div className="flex items-center gap-4"><div className={`w-12 h-12 rounded-2xl flex items-center justify-center ${exam ? 'bg-blue-500/10 text-blue-500' : 'bg-emerald-500/10 text-emerald-500'}`}>{exam ? <Edit3 size={24}/> : <Plus size={24}/>}</div><div><h2 className="text-xl font-black uppercase tracking-tight text-white">{exam ? 'Sửa bộ đề' : 'Phát hành đề mới'}</h2><p className="text-slate-500 text-[10px] font-bold uppercase tracking-widest">Hỗ trợ Excel & Chỉnh sửa thủ công</p></div></div> 
                            <button onClick={onClose} className="p-2 text-slate-500 hover:text-white transition-all bg-slate-800 rounded-full"><X size={20}/></button> 
                        </div> 
                        <div className="flex-1 overflow-y-auto p-8 custom-scrollbar space-y-10"> 
                            <section className="bg-slate-950/50 p-6 rounded-3xl border border-white/5 grid grid-cols-1 md:grid-cols-4 gap-6"> 
                                <div className="md:col-span-2 space-y-2"><label className="text-[10px] font-black text-slate-500 uppercase ml-2">Tên đề thi</label><input className="w-full bg-slate-900 border border-slate-800 rounded-2xl p-4 outline-none focus:border-blue-600 font-bold text-white" value={title} onChange={e=>setTitle(e.target.value)}/></div> 
                                <div className="space-y-2"><label className="text-[10px] font-black text-slate-500 uppercase ml-2">Thời gian (Phút)</label><input type="number" className="w-full bg-slate-900 border border-slate-800 rounded-2xl p-4 outline-none focus:border-blue-600 font-bold text-white" value={duration} onChange={e=>setDuration(e.target.value)}/></div> 
                                <div className="space-y-2"><label className="text-[10px] font-black text-slate-500 uppercase ml-2">Loại đề</label><div className="flex bg-slate-900 p-1.5 rounded-2xl border border-slate-800 h-[58px]"><button onClick={()=>setIsPremium(false)} className={`flex-1 rounded-xl text-[10px] font-black transition-all ${!isPremium ? 'bg-emerald-600 text-white shadow-lg' : 'text-slate-600'}`}>MIỄN PHÍ</button><button onClick={()=>setIsPremium(true)} className={`flex-1 rounded-xl text-[10px] font-black transition-all ${isPremium ? 'bg-yellow-600 text-white shadow-lg' : 'text-slate-600'}`}>VIP PRO</button></div></div> 
                            </section> 
                            
                            <section className="space-y-6"> 
                                <div className="flex justify-between items-center px-2">
                                    <h3 className="font-black text-slate-400 text-sm uppercase tracking-[0.2em] px-2 border-l-4 border-blue-600 ml-2">Ngân hàng câu hỏi ({questions.length})</h3>
                                    <div className="flex gap-2">
                                        <button onClick={() => setEditIdx('new')} className="bg-slate-800 hover:bg-slate-700 text-white px-5 py-3 rounded-xl font-black text-xs flex items-center gap-2 transition-all"><PenLine size={16}/> THÊM CÂU HỎI</button>
                                        <button onClick={() => setShowImport(true)} className="bg-blue-600 hover:bg-blue-500 text-white px-5 py-3 rounded-xl font-black text-xs flex items-center gap-2 shadow-lg transition-all"><Upload size={16}/> NHẬP EXCEL</button>
                                    </div>
                                </div>

                                {questions.length === 0 ? (
                                    <div className="py-24 text-center border-2 border-dashed border-slate-800 rounded-[3rem] text-slate-700 bg-slate-900/20 flex flex-col items-center justify-center gap-4">
                                        <div className="w-20 h-20 bg-slate-800 rounded-full flex items-center justify-center"><FileText size={32} className="text-slate-600"/></div>
                                        <div><p className="font-black uppercase tracking-widest text-xs">Chưa có dữ liệu</p><p className="text-[10px] mt-1 text-slate-600">Bấm nút "Nhập Excel" hoặc "Thêm câu hỏi" để bắt đầu</p></div>
                                    </div>
                                ) : (
                                    <div className="grid grid-cols-1 gap-4 pb-10">
                                        {questions.map((q, i) => (
                                            <div key={i} className="bg-slate-900/40 p-6 rounded-3xl flex justify-between items-start border border-slate-800 hover:border-blue-500/30 transition-all group">
                                                <div className="flex-1 pr-6">
                                                    <div className="flex items-start gap-3">
                                                        <span className="text-blue-500 font-black italic mt-1">#{i+1}</span> 
                                                        <div className="space-y-2 w-full">
                                                            <p className="font-bold text-white text-lg leading-tight">{q.text}</p>
                                                            <div className="grid grid-cols-2 gap-2 mt-3">
                                                                {q.options.map((opt, idx) => (
                                                                    <div key={idx} className={`text-[11px] p-2 rounded-lg border font-medium ${q.correctOption === idx ? 'bg-emerald-500/10 border-emerald-500/30 text-emerald-400' : 'bg-slate-950 border-slate-800 text-slate-500'}`}>{opt}</div>
                                                                ))}
                                                            </div>
                                                        </div>
                                                    </div>
                                                </div>
                                                <div className="flex gap-2">
                                                    <button onClick={()=>setEditIdx(i)} className="p-3 text-slate-600 hover:text-blue-500 transition-all bg-slate-800 rounded-xl"><Edit3 size={18}/></button>
                                                    <button onClick={()=>setQuestions(questions.filter((_,idx)=>idx!==i))} className="p-3 text-slate-600 hover:text-red-500 transition-all bg-slate-800 rounded-xl"><Trash2 size={18}/></button>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </section>
                        </div>
                        <div className="p-6 border-t border-slate-800 flex justify-end gap-4 bg-slate-900/80 backdrop-blur-xl">
                            <button onClick={onClose} className="px-10 py-3 text-slate-500 font-bold hover:text-white transition-all uppercase text-xs">Đóng</button>
                            <button onClick={saveExam} disabled={isSaving} className="px-16 py-4 bg-blue-600 hover:bg-blue-500 rounded-2xl font-black text-white flex gap-3 shadow-2xl transition-all disabled:opacity-50">{isSaving ? <Loader2 className="animate-spin" size={20}/> : <Check size={20}/>} {exam ? 'CẬP NHẬT' : 'PHÁT HÀNH ĐỀ'}</button>
                        </div> 
                        {showImport && <ImportModal onClose={()=>setShowImport(false)} onImport={qs=>setQuestions([...questions, ...qs])} notify={notify}/>}
                        {editIdx !== null && <QuestionEditorModal question={editIdx === 'new' ? null : questions[editIdx]} onSave={q => { if(editIdx === 'new') setQuestions([...questions, q]); else { const n = [...questions]; n[editIdx] = q; setQuestions(n); } }} onClose={()=>setEditIdx(null)} />}
                    </div> 
                </div> 
            );
        };

        const Dashboard = ({ user }) => {
            const [tab, setTab] = useState('stats');
            const [users, setUsers] = useState([]);
            const [exams, setExams] = useState([]);
            const [requests, setRequests] = useState([]);
            const [vipHistory, setVipHistory] = useState([]); // State cho lịch sử VIP
            const [activeSessions, setActiveSessions] = useState([]); 
            const [search, setSearch] = useState('');
            const [filterType, setFilterType] = useState('all');
            const [examAccessFilter, setExamAccessFilter] = useState('all');
            const [editing, setEditing] = useState(null);
            const [showAdd, setShowAdd] = useState(false);
            const [toast, setToast] = useState(null);
            const [isLoading, setIsLoading] = useState(true);
            const [showHistory, setShowHistory] = useState(false); // Toggle hiển thị lịch sử
            
            // --- CẤU HÌNH HỆ THỐNG ---
            const [sysLoginBg, setSysLoginBg] = useState('');
            const [sysResultBg, setSysResultBg] = useState('');
            const [clinicAddress, setClinicAddress] = useState('Số 244, Đường Tân Bình, Phường Cẩm Phả, Quảng Ninh');
            const [clinicPhone, setClinicPhone] = useState('0123.456.789');
            
            const [notiMsg, setNotiMsg] = useState('');
            const [notifications, setNotifications] = useState([]);
            const [showNotiTray, setShowNotiTray] = useState(false);
            
            // --- STATE TIN TỨC & SỰ KIỆN ---
            const [notiSubTab, setNotiSubTab] = useState('broadcast'); // broadcast | news
            const [newsList, setNewsList] = useState([]);
            const [newsForm, setNewsForm] = useState({ title: '', content: '', type: 'news', image: '', link: '' });

            const chartRef = useRef(null);
            const pieChartRef = useRef(null);

                                                        <div className="flex gap-4">
                                                            <input className="flex-1 bg-slate-950 border border-slate-800 rounded-2xl p-4 text-white outline-none focus:border-blue-500 font-bold" placeholder="Dán URL hình ảnh..." value={sysLoginBg} onChange={e=>setSysLoginBg(e.target.value)}/>
                                                            <div className="w-24 h-14 rounded-xl bg-slate-800 border border-slate-700 overflow-hidden relative shadow-lg">{sysLoginBg && <img src={sysLoginBg} className="w-full h-full object-cover" alt="Preview"/>}</div>
                                                        </div>
                                                    </div>
                                                    <div>
                                                        <label className="text-[10px] font-black text-slate-500 uppercase ml-1 mb-2 block">Hình nền trang Kết quả</label>
                                                        <div className="flex gap-4">
                                                            <input className="flex-1 bg-slate-950 border border-slate-800 rounded-2xl p-4 text-white outline-none focus:border-blue-500 font-bold" placeholder="Dán URL hình ảnh..." value={sysResultBg} onChange={e=>setSysResultBg(e.target.value)}/>
                                                            <div className="w-24 h-14 rounded-xl bg-slate-800 border border-slate-700 overflow-hidden relative shadow-lg">{sysResultBg && <img src={sysResultBg} className="w-full h-full object-cover" alt="Preview"/>}</div>
                                                        </div>
                                                    </div>
                                                </div>

                                                {/* Phần 2: Thông tin phòng khám */}
                                                <div className="space-y-6">
                                                    <h4 className="text-sm font-black text-slate-300 uppercase tracking-widest mb-4 border-l-4 border-emerald-500 pl-3">Thông tin liên hệ</h4>
                                                    <div>
                                                        <label className="text-[10px] font-black text-slate-500 uppercase ml-1 mb-2 block">Địa chỉ phòng khám</label>
                                                        <div className="relative">
                                                            <MapPin size={18} className="absolute left-4 top-4 text-slate-500"/>
                                                            <input className="w-full bg-slate-950 border border-slate-800 rounded-2xl pl-12 pr-4 py-4 text-white outline-none focus:border-emerald-500 font-bold" placeholder="Nhập địa chỉ..." value={clinicAddress} onChange={e=>setClinicAddress(e.target.value)}/>
                                                        </div>
                                                    </div>
                                                    <div>
                                                        <label className="text-[10px] font-black text-slate-500 uppercase ml-1 mb-2 block">Số điện thoại / Hotline</label>
                                                        <div className="relative">
                                                            <Phone size={18} className="absolute left-4 top-4 text-slate-500"/>
                                                            <input className="w-full bg-slate-950 border border-slate-800 rounded-2xl pl-12 pr-4 py-4 text-white outline-none focus:border-emerald-500 font-bold" placeholder="Nhập số điện thoại..." value={clinicPhone} onChange={e=>setClinicPhone(e.target.value)}/>
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>

                                            <div className="pt-8 mt-8 border-t border-white/5">
                                                <button onClick={saveSystemConfig} className="bg-blue-600 hover:bg-blue-500 text-white px-8 py-4 rounded-2xl font-black uppercase tracking-widest text-xs flex items-center gap-2 shadow-lg hover:shadow-blue-500/20 transition-all active:scale-95"><Save size={16}/> Lưu cấu hình</button>
                                            </div>
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}
                    </main>

                    {showAdd && <ExamEditor onClose={()=>setShowAdd(false)} notify={notify}/>}
                    {editing && <ExamEditor exam={editing} onClose={()=>setEditing(null)} notify={notify}/>}
                    {toast && <Toast {...toast} onClose={() => setToast(null)} />}
                </div>
            );
        };

        const App = () => {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [err, setErr] = useState('');

            useEffect(() => {
                const initAuth = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) await signInWithCustomToken(auth, __initial_auth_token);
                        else await signInAnonymously(auth);
                    } catch (e) {}
                };
                initAuth();
                return onAuthStateChanged(auth, u => {
                    if (u && (ADMIN_EMAILS.includes(u.email) || !u.email)) { setUser(u); setErr(''); }
                    else if (u) { setErr("Bạn không có quyền truy cập vùng này."); signOut(auth); setUser(null); }
                    setLoading(false);
                });
            }, []);

            const handleLogin = async (e) => {
                e.preventDefault();
                const { email, password } = e.target.elements;
                setLoading(true); setErr('');
                try { await signInWithEmailAndPassword(auth, email.value, password.value); } 
                catch (e) { setErr("Thông tin đăng nhập không hợp lệ."); } 
                finally { setLoading(false); }
            };

            if (loading) return (
                <div className="min-h-screen bg-[#020617] flex flex-col items-center justify-center space-y-8">
                    <div className="w-16 h-16 border-2 border-slate-800 border-t-blue-600 rounded-full animate-spin"></div>
                    <p className="text-white font-black tracking-[0.5em] uppercase text-[10px]">Đang khởi tạo hệ thống...</p>
                </div>
            );

            if (!user) return (
                <div className="min-h-screen flex items-center justify-center p-4 login-bg relative overflow-hidden">
                    <div className="w-full max-w-lg glass-panel p-16 rounded-[4rem] shadow-2xl animate-in relative z-10">
                        <div className="text-center mb-12">
                            <div className="w-24 h-24 bg-blue-600/10 rounded-3xl mx-auto flex items-center justify-center mb-6 shadow-inner border border-blue-600/5 group">
                                <ShieldCheck size={56} className="text-blue-500 drop-shadow-[0_0_15px_rgba(59,130,246,0.4)] group-hover:scale-110 transition-transform duration-500"/>
                            </div>
                            <h1 className="text-4xl font-black text-white tracking-tighter mb-2 uppercase leading-none">Quản trị<br/>Hệ thống</h1>
                            <div className="h-1 w-12 bg-blue-600 mx-auto rounded-full mt-4"></div>
                        </div>
                        {err && <div className="mb-10 p-5 bg-red-500/10 border border-red-500/20 text-red-400 text-[10px] font-black rounded-3xl flex items-center gap-4 uppercase animate-pulse"><AlertCircle size={20}/> {err}</div>}
                        <form onSubmit={handleLogin} className="space-y-8">
                            <div className="space-y-2"><label className="text-[10px] font-black text-slate-500 uppercase tracking-widest ml-2">Email Quản Trị</label><input name="email" type="email" required className="w-full glass-input rounded-3xl p-5 outline-none focus:border-blue-600 font-bold text-white transition-all shadow-inner" placeholder="admin@medexam.pro"/></div>
                            <div className="space-y-2"><label className="text-[10px] font-black text-slate-500 uppercase tracking-widest ml-2">Mật khẩu</label><input name="password" type="password" required className="w-full glass-input rounded-3xl p-5 outline-none focus:border-blue-600 font-bold text-white transition-all shadow-inner" placeholder="••••••••"/></div>
                            <button className="w-full bg-blue-600 hover:bg-blue-500 text-white font-black py-6 rounded-3xl transition-all shadow-2xl uppercase text-xs tracking-widest active:scale-95">Xác thực quyền hạn</button>
                        </form>
                    </div>
                </div>
            );

            return <Dashboard user={user} />;
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
