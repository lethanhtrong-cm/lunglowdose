<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedExam Pro - Ôn Thi Chứng Chỉ Hành Nghề</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <!-- Thêm thư viện chụp ảnh màn hình -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <!-- Thêm font Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0",
            "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
            "lucide-react": "https://esm.sh/lucide-react@0.344.0?deps=react@18.2.0",
            "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
            "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js",
            "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js"
        }
    }
    </script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    animation: {
                        'blob': 'blob 7s infinite',
                        'fade-in': 'fadeIn 0.5s ease-out',
                        'slide-up': 'slideUp 0.5s ease-out',
                        'slide-down': 'slideDown 0.5s ease-out',
                        'slide-left': 'slideLeft 0.3s ease-out',
                        'confetti': 'confetti 2s ease-out forwards',
                        'scale-up': 'scaleUp 0.3s ease-out',
                    },
                    keyframes: {
                        blob: {
                            '0%': { transform: 'translate(0px, 0px) scale(1)' },
                            '33%': { transform: 'translate(30px, -50px) scale(1.1)' },
                            '66%': { transform: 'translate(-20px, 20px) scale(0.9)' },
                            '100%': { transform: 'translate(0px, 0px) scale(1)' },
                        },
                        fadeIn: {
                            'from': { opacity: '0', transform: 'translateY(10px)' },
                            'to': { opacity: '1', transform: 'translateY(0)' },
                        },
                        slideUp: {
                            'from': { transform: 'translateY(100%)' },
                            'to': { transform: 'translateY(0)' },
                        },
                        slideDown: {
                            'from': { transform: 'translateY(-100%)' },
                            'to': { transform: 'translateY(0)' },
                        },
                        slideLeft: {
                            'from': { transform: 'translateX(100%)' },
                            'to': { transform: 'translateX(0)' },
                        },
                        scaleUp: {
                            'from': { transform: 'scale(0.95)', opacity: '0' },
                            'to': { transform: 'scale(1)', opacity: '1' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #0f172a; color: #e2e8f0; -webkit-font-smoothing: antialiased; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }
        
        .glass { background: rgba(30, 41, 59, 0.75); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border-bottom: 1px solid rgba(255, 255, 255, 0.08); }
        .glass-panel { background: rgba(30, 41, 59, 0.4); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .glass-card { background: linear-gradient(145deg, rgba(30, 41, 59, 0.6), rgba(15, 23, 42, 0.8)); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .glass-card:hover { transform: translateY(-4px); border-color: rgba(6, 182, 212, 0.3); box-shadow: 0 10px 30px -10px rgba(6, 182, 212, 0.2); }
        .glass-result { background: linear-gradient(135deg, rgba(15, 23, 42, 0.9), rgba(30, 41, 59, 0.9)); backdrop-filter: blur(20px); }
        
        /* Custom Checkbox */
        .custom-checkbox:checked { background-color: #0891b2; border-color: #0891b2; }
        .custom-checkbox:checked:after { content: '✔'; display: block; text-align: center; color: white; font-size: 10px; }

        /* Confetti Animation Particles */
        .confetti-piece { position: absolute; width: 10px; height: 10px; background: #ffd300; top: 0; opacity: 0; }
        .confetti-piece:nth-child(1) { left: 7%; transform: rotate(-40deg); animation: makeItRain 1000ms infinite ease-out; animation-delay: 182ms; animation-duration: 1116ms; }
        .confetti-piece:nth-child(2) { left: 14%; transform: rotate(4deg); animation: makeItRain 1000ms infinite ease-out; animation-delay: 161ms; animation-duration: 1076ms; }
        .confetti-piece:nth-child(3) { left: 21%; transform: rotate(-51deg); animation: makeItRain 1000ms infinite ease-out; animation-delay: 481ms; animation-duration: 1103ms; }
        .confetti-piece:nth-child(4) { left: 28%; transform: rotate(61deg); animation: makeItRain 1000ms infinite ease-out; animation-delay: 334ms; animation-duration: 708ms; }
        .confetti-piece:nth-child(5) { left: 35%; transform: rotate(-52deg); animation: makeItRain 1000ms infinite ease-out; animation-delay: 302ms; animation-duration: 776ms; }
        .confetti-piece:nth-child(6) { left: 42%; transform: rotate(38deg); animation: makeItRain 1000ms infinite ease-out; animation-delay: 180ms; animation-duration: 1168ms; }
        .confetti-piece:nth-child(7) { left: 49%; transform: rotate(11deg); animation: makeItRain 1000ms infinite ease-out; animation-delay: 395ms; animation-duration: 1200ms; }
        .confetti-piece:nth-child(8) { left: 56%; transform: rotate(49deg); animation: makeItRain 1000ms infinite ease-out; animation-delay: 14ms; animation-duration: 887ms; }
        .confetti-piece:nth-child(9) { left: 63%; transform: rotate(-72deg); animation: makeItRain 1000ms infinite ease-out; animation-delay: 149ms; animation-duration: 805ms; }
        .confetti-piece:nth-child(10) { left: 70%; transform: rotate(10deg); animation: makeItRain 1000ms infinite ease-out; animation-delay: 351ms; animation-duration: 1059ms; }
        .confetti-piece:nth-child(11) { left: 77%; transform: rotate(4deg); animation: makeItRain 1000ms infinite ease-out; animation-delay: 307ms; animation-duration: 1132ms; }
        .confetti-piece:nth-child(12) { left: 84%; transform: rotate(42deg); animation: makeItRain 1000ms infinite ease-out; animation-delay: 464ms; animation-duration: 776ms; }
        .confetti-piece:nth-child(13) { left: 91%; transform: rotate(-72deg); animation: makeItRain 1000ms infinite ease-out; animation-delay: 429ms; animation-duration: 818ms; }
        
        @keyframes makeItRain {
            from { opacity: 0; }
            50% { opacity: 1; }
            to { transform: translateY(350px); }
        }

        .noti-badge { position: absolute; top: -2px; right: -2px; width: 10px; height: 10px; background-color: #ef4444; border-radius: 999px; border: 2px solid #1e293b; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel" data-type="module" data-presets="react">
        import React, { useState, useEffect, useMemo, useRef, createContext, useContext } from 'react';
        import { createRoot } from 'react-dom/client';
        import { initializeApp } from 'firebase/app';
        import { 
            getAuth, 
            signInWithEmailAndPassword, 
            createUserWithEmailAndPassword, 
            signOut, 
            onAuthStateChanged, 
            updateProfile, 
            signInWithPopup, 
            GoogleAuthProvider,
            setPersistence, 
            browserLocalPersistence, 
            browserSessionPersistence,
            sendPasswordResetEmail,
            signInAnonymously
        } from 'firebase/auth';
        import { getFirestore, collection, addDoc, query, onSnapshot, serverTimestamp, orderBy, setDoc, doc, getDoc, getDocs, where, updateDoc, increment, limit, deleteDoc } from 'firebase/firestore';
        import { Activity, AlertTriangle, Award, Clock, FileText, History, LogOut, ShieldCheck, User, Users, XCircle, Loader2, Lock, Crown, Search, Filter, BookOpen, Star, Grid, CheckCircle2, ChevronRight, Menu, ArrowUp, Edit3, Save, Phone, MapPin, Calendar, CreditCard, Send, Hourglass, Eye, CheckCircle, Share2, Download, Facebook, Copy, Trophy, Medal, Sun, Moon, Type, X, Info, Check, Quote, Mail, Key, Flag, BarChart3, AlertCircle, RefreshCw, Bell, Trash2 } from 'lucide-react';

        const firebaseConfig = {
            apiKey: "AIzaSyDqdo_DJIWa5iqxiCgBq-0iGX7f9sr6soo",
            authDomain: "rt-examination.firebaseapp.com",
            projectId: "rt-examination",
            storageBucket: "rt-examination.firebasestorage.app",
            messagingSenderId: "920482699854",
            appId: "1:920482699854:web:44f9b0d735bdc001c6c11f",
            measurementId: "G-8N7RTTREQM"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = 'med-exam-pro-html';

        const BANK_INFO = {
            bankName: "BIDV",
            accountNum: "8890523877", 
            accountName: "LE THANH TRONG", 
            amount: "50,000"
        };

        const VIP_DURATION_DAYS = 30;

        // --- HELPER & UTILS ---
        const formatDate = (ts) => {
            if (!ts) return "---";
            const date = ts.toDate ? ts.toDate() : new Date(ts);
            return date.toLocaleDateString('vi-VN', { 
                day: '2-digit', 
                month: '2-digit', 
                year: 'numeric' 
            });
        };

        const syncUserProfile = async (user, displayName) => {
            try {
                const userRef = doc(db, 'artifacts', appId, 'public', 'data', 'users', user.uid);
                const userSnap = await getDoc(userRef);
                
                if (!userSnap.exists()) {
                    await setDoc(userRef, {
                        uid: user.uid,
                        email: user.email,
                        displayName: displayName || user.displayName || user.email.split('@')[0],
                        isPremium: false,
                        gender: 'other', 
                        phone: '',
                        address: '',
                        totalScore: 0,
                        examsCompleted: 0,
                        createdAt: serverTimestamp(),
                        lastActive: serverTimestamp(),
                        role: 'user'
                    });
                } else {
                    await updateDoc(userRef, { lastActive: serverTimestamp() });
                }
            } catch (e) { console.error("Sync profile error:", e); }
        };

        // --- CUSTOM UI COMPONENTS ---

        // 1. Toast Notification System
        const ToastContext = createContext();

        const ToastProvider = ({ children }) => {
            const [toasts, setToasts] = useState([]);

            const addToast = (message, type = 'info') => {
                const id = Date.now();
                setToasts(prev => [...prev, { id, message, type }]);
                setTimeout(() => removeToast(id), 3000);
            };

            const removeToast = (id) => {
                setToasts(prev => prev.filter(t => t.id !== id));
            };

            return (
                <ToastContext.Provider value={{ addToast }}>
                    {children}
                    <div className="fixed top-4 right-4 z-[100] flex flex-col gap-2">
                        {toasts.map(toast => (
                            <div key={toast.id} className={`flex items-center gap-3 px-4 py-3 rounded-xl shadow-2xl backdrop-blur-md border animate-fade-in ${
                                toast.type === 'error' ? 'bg-red-500/10 border-red-500/50 text-red-400' : 
                                toast.type === 'success' ? 'bg-emerald-500/10 border-emerald-500/50 text-emerald-400' : 
                                'bg-slate-800/90 border-slate-600 text-white'
                            }`}>
                                {toast.type === 'error' ? <AlertTriangle size={18}/> : toast.type === 'success' ? <CheckCircle2 size={18}/> : <Info size={18}/>}
                                <span className="text-sm font-medium">{toast.message}</span>
                                <button onClick={() => removeToast(toast.id)}><X size={14} className="opacity-50 hover:opacity-100"/></button>
                            </div>
                        ))}
                    </div>
                </ToastContext.Provider>
            );
        };

        const useToast = () => useContext(ToastContext);

        // 2. Confetti Effect
        const Confetti = () => (
            <div className="fixed inset-0 pointer-events-none z-50 overflow-hidden">
                {[...Array(13)].map((_, i) => (
                    <div key={i} className="confetti-piece" style={{backgroundColor: ['#f00', '#0f0', '#00f', '#ff0', '#f0f'][i%5]}}></div>
                ))}
            </div>
        );

        // 3. Skeleton Loading
        const Skeleton = ({ className }) => <div className={`bg-slate-700/50 animate-pulse rounded-lg ${className}`}></div>;

        // 4. (NEW) Simple Performance Chart Component (SVG Based)
        const PerformanceChart = ({ historyData }) => {
            if (!historyData || historyData.length === 0) return (
                <div className="h-40 flex items-center justify-center text-slate-500 text-sm italic">Chưa có dữ liệu thi</div>
            );

            const data = [...historyData].slice(0, 10).reverse();
            const maxScore = 10;

            return (
                <div className="w-full h-48 mt-4 relative">
                      <div className="absolute inset-0 flex flex-col justify-between text-xs text-slate-600">
                        <span>10</span>
                        <span>5</span>
                        <span>0</span>
                    </div>
                    <div className="absolute inset-0 ml-6 flex items-end gap-2">
                        {data.map((item, index) => {
                            const hPercent = (item.score / maxScore) * 100;
                            const colorClass = item.score >= 8 ? 'bg-emerald-500' : (item.score >= 5 ? 'bg-cyan-500' : 'bg-red-500');
                            return (
                                <div key={index} className="flex-1 flex flex-col justify-end group relative">
                                    <div className="absolute bottom-full mb-2 left-1/2 -translate-x-1/2 bg-slate-800 text-white text-[10px] py-1 px-2 rounded opacity-0 group-hover:opacity-100 transition-opacity whitespace-nowrap z-10 pointer-events-none">
                                        {item.examTitle}<br/>Điểm: {item.score}
                                    </div>
                                    <div 
                                        style={{ height: `${hPercent}%` }} 
                                        className={`w-full rounded-t-sm opacity-80 hover:opacity-100 transition-all ${colorClass}`}
                                    ></div>
                                </div>
                            )
                        })}
                    </div>
                </div>
            )
        };

        // --- MAIN COMPONENTS ---

        const AuthScreen = ({ globalConfig }) => {
            const [isRegistering, setIsRegistering] = useState(false);
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [name, setName] = useState('');
            const [rememberMe, setRememberMe] = useState(true);
            const [loading, setLoading] = useState(false);
            const [showForgot, setShowForgot] = useState(false);
            const [resetEmail, setResetEmail] = useState('');
            const [isResetting, setIsResetting] = useState(false);
            
            const { addToast } = useToast();

            const DEFAULT_BG = "https://images.unsplash.com/photo-1576091160399-112ba8d25d1d?auto=format&fit=crop&q=80";
            const bgImage = globalConfig?.loginBg || DEFAULT_BG;

            const handleSubmit = async (e) => {
                e.preventDefault();
                setLoading(true);
                try {
                    const persistenceType = rememberMe ? browserLocalPersistence : browserSessionPersistence;
                    await setPersistence(auth, persistenceType);
                    if (isRegistering) {
                        const res = await createUserWithEmailAndPassword(auth, email, password);
                        await updateProfile(res.user, { displayName: name });
                        await syncUserProfile(res.user, name);
                        addToast("Đăng ký thành công! Chào mừng bạn.", "success");
                    } else {
                        const res = await signInWithEmailAndPassword(auth, email, password);
                        await syncUserProfile(res.user, res.user.displayName);
                        addToast("Đăng nhập thành công!", "success");
                    }
                } catch (err) { addToast(err.message, "error"); } finally { setLoading(false); }
            };

            const handleGoogle = async () => {
                try {
                    await setPersistence(auth, browserLocalPersistence); 
                    const res = await signInWithPopup(auth, new GoogleAuthProvider());
                    await syncUserProfile(res.user, res.user.displayName);
                    addToast("Đăng nhập Google thành công!", "success");
                } catch (err) { addToast(err.message, "error"); }
            };

            const handleResetPassword = async (e) => {
                e.preventDefault();
                if (!resetEmail) {
                    addToast("Vui lòng nhập email để khôi phục mật khẩu.", "error");
                    return;
                }
                setIsResetting(true);
                try {
                    await sendPasswordResetEmail(auth, resetEmail);
                    addToast("Đã gửi email khôi phục! Vui lòng kiểm tra hộp thư (kể cả mục Spam).", "success");
                    setShowForgot(false);
                    setResetEmail('');
                } catch (err) {
                    console.error(err);
                    addToast("Lỗi gửi email: " + err.message, "error");
                } finally {
                    setIsResetting(false);
                }
            };

            return (
                <div className="min-h-screen flex items-center justify-center relative overflow-hidden" style={{
                    backgroundImage: `linear-gradient(rgba(15, 23, 42, 0.85), rgba(15, 23, 42, 0.95)), url('${bgImage}')`,
                    backgroundSize: 'cover', backgroundPosition: 'center'
                }}>
                    <div className="absolute top-0 -left-4 w-72 h-72 bg-purple-500 rounded-full mix-blend-multiply filter blur-xl opacity-20 animate-blob"></div>
                    <div className="absolute top-0 -right-4 w-72 h-72 bg-cyan-500 rounded-full mix-blend-multiply filter blur-xl opacity-20 animate-blob animation-delay-2000"></div>
                    <div className="absolute -bottom-8 left-20 w-72 h-72 bg-blue-500 rounded-full mix-blend-multiply filter blur-xl opacity-20 animate-blob animation-delay-4000"></div>

                    <div className="w-full max-w-md bg-slate-900/60 border border-slate-700/50 p-8 rounded-[2rem] shadow-2xl animate-fade-in backdrop-blur-xl relative z-10 mx-4">
                        <div className="text-center mb-8">
                            <div className="w-16 h-16 bg-gradient-to-tr from-cyan-500 to-blue-600 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg shadow-cyan-500/30 transform rotate-3 hover:rotate-6 transition-transform">
                                <Activity size={32} className="text-white"/>
                            </div>
                            <h1 className="text-3xl font-black text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-500">MedExam Pro</h1>
                            <p className="text-slate-400 text-sm mt-2">Nền tảng ôn thi y khoa hàng đầu</p>
                        </div>
                        
                        <form onSubmit={handleSubmit} className="space-y-4">
                            {isRegistering && <div className="space-y-1"><input className="w-full bg-slate-950/50 border border-slate-700 rounded-xl p-4 text-white outline-none focus:border-cyan-500 focus:ring-1 focus:ring-cyan-500 transition-all placeholder:text-slate-600" placeholder="Họ tên hiển thị" value={name} onChange={e=>setName(e.target.value)} required/></div>}
                            <div className="space-y-1"><input className="w-full bg-slate-950/50 border border-slate-700 rounded-xl p-4 text-white outline-none focus:border-cyan-500 focus:ring-1 focus:ring-cyan-500 transition-all placeholder:text-slate-600" placeholder="Email" type="email" value={email} onChange={e=>setEmail(e.target.value)} required/></div>
                            <div className="space-y-1">
                                <input className="w-full bg-slate-950/50 border border-slate-700 rounded-xl p-4 text-white outline-none focus:border-cyan-500 focus:ring-1 focus:ring-cyan-500 transition-all placeholder:text-slate-600" placeholder="Mật khẩu" type="password" value={password} onChange={e=>setPassword(e.target.value)} required/>
                                {!isRegistering && <div className="text-right pt-2"><button type="button" onClick={() => setShowForgot(true)} className="text-xs text-cyan-400 hover:text-cyan-300 transition-colors font-medium hover:underline">Quên mật khẩu?</button></div>}
                            </div>
                            
                            {!isRegistering && (
                                <div className="flex items-center gap-2 my-2 px-1">
                                    <input type="checkbox" id="remember" className="w-4 h-4 rounded border-slate-600 bg-slate-800 text-cyan-600 focus:ring-cyan-500 cursor-pointer accent-cyan-600 custom-checkbox appearance-none border checked:bg-cyan-500" checked={rememberMe} onChange={(e) => setRememberMe(e.target.checked)}/>
                                    <label htmlFor="remember" className="text-sm text-slate-400 cursor-pointer select-none">Ghi nhớ đăng nhập</label>
                                </div>
                            )}
                            <button disabled={loading} className="w-full bg-gradient-to-r from-cyan-600 to-blue-600 hover:from-cyan-500 hover:to-blue-500 py-4 rounded-xl font-bold text-white transition-all flex items-center justify-center shadow-lg shadow-cyan-500/20 active:scale-95">
                                {loading ? <Loader2 className="animate-spin"/> : (isRegistering ? 'Đăng ký tài khoản' : 'Đăng nhập')}
                            </button>
                        </form>
                        
                        <div className="my-6 flex items-center gap-4">
                            <div className="h-px bg-slate-700/50 flex-1"></div>
                            <span className="text-slate-500 text-xs uppercase font-bold tracking-wider">Hoặc</span>
                            <div className="h-px bg-slate-700/50 flex-1"></div>
                        </div>
                        
                        <button onClick={handleGoogle} className="w-full bg-[#EA4335] hover:bg-[#D93025] text-white py-3.5 rounded-xl font-bold flex items-center justify-center gap-3 transition-all transform hover:scale-[1.02] shadow-lg shadow-red-500/30 border border-red-400/50 group">
                             <div className="bg-white p-1 rounded-full"><svg className="w-4 h-4" viewBox="0 0 24 24"><path fill="#EA4335" d="M21.35 11.1h-9.17v2.73h6.51c-.33 3.81-3.5 5.44-6.5 5.44C8.36 19.27 5 16.25 5 12c0-4.1 3.2-7.27 7.2-7.27 3.09 0 4.9 1.97 4.9 1.97L19 4.72S16.56 2 12.1 2C6.42 2 2.03 6.8 2.03 12c0 5.05 4.13 10 10.22 10 5.35 0 9.25-3.67 9.25-9.09 0-1.15-.15-2.15-.15-2.15z"/></svg></div> 
                             <span className="group-hover:tracking-wide transition-all">Tiếp tục với Google</span>
                        </button>
                        
                        <p className="mt-8 text-center text-sm text-slate-500">
                            {isRegistering ? 'Đã có tài khoản?' : 'Chưa có tài khoản?'} 
                            <button onClick={()=>setIsRegistering(!isRegistering)} className="text-cyan-400 ml-2 font-bold hover:text-cyan-300 transition-colors hover:underline">{isRegistering ? 'Đăng nhập ngay' : 'Đăng ký miễn phí'}</button>
                        </p>
                    </div>

                    {showForgot && (
                        <div className="fixed inset-0 z-[60] flex items-center justify-center p-4 bg-black/80 backdrop-blur-sm animate-fade-in">
                            <div className="bg-slate-900 border border-slate-700 w-full max-w-sm p-6 rounded-3xl shadow-2xl relative animate-scale-up">
                                <button onClick={() => setShowForgot(false)} className="absolute top-4 right-4 text-slate-500 hover:text-white"><X size={20}/></button>
                                <div className="text-center mb-6">
                                    <div className="w-14 h-14 bg-slate-800 rounded-full flex items-center justify-center mx-auto mb-3 text-cyan-400 border border-slate-700">
                                        <Key size={24}/>
                                    </div>
                                    <h3 className="text-xl font-bold text-white">Khôi phục mật khẩu</h3>
                                    <p className="text-sm text-slate-400 mt-2">Nhập email của bạn để nhận liên kết đặt lại mật khẩu.</p>
                                </div>
                                <form onSubmit={handleResetPassword} className="space-y-4">
                                    <div className="relative">
                                        <Mail className="absolute left-4 top-3.5 text-slate-500" size={18}/>
                                        <input 
                                            type="email" 
                                            required
                                            value={resetEmail}
                                            onChange={(e) => setResetEmail(e.target.value)}

                            <h3 className="font-bold text-white flex items-center gap-2"><AlertCircle className="text-red-400" size={20}/> Báo cáo lỗi câu {questionIndex + 1}</h3>
                            <button onClick={onClose}><X size={20} className="text-slate-400 hover:text-white"/></button>
                        </div>
                        <form onSubmit={handleSubmit} className="p-6 space-y-4">
                            <div className="space-y-2">
                                <label className="text-sm font-medium text-slate-300">Loại lỗi</label>
                                <select value={reason} onChange={e=>setReason(e.target.value)} className="w-full bg-slate-800 border border-slate-700 rounded-lg p-2.5 text-white outline-none focus:border-cyan-500">
                                    <option value="wrong_answer">Đáp án sai</option>
                                    <option value="typo">Lỗi chính tả / Hiển thị</option>
                                    <option value="confusing">Câu hỏi khó hiểu</option>
                                    <option value="other">Khác</option>
                                </select>
                            </div>
                            <div className="space-y-2">
                                <label className="text-sm font-medium text-slate-300">Chi tiết (tùy chọn)</label>
                                <textarea 
                                    value={detail} 
                                    onChange={e=>setDetail(e.target.value)} 
                                    className="w-full bg-slate-800 border border-slate-700 rounded-lg p-3 text-white h-24 resize-none outline-none focus:border-cyan-500 placeholder:text-slate-600"
                                    placeholder="Mô tả lỗi bạn gặp phải..."
                                ></textarea>
                            </div>
                            <div className="flex justify-end gap-3 pt-2">
                                <button type="button" onClick={onClose} className="px-4 py-2 text-slate-400 hover:text-white hover:bg-slate-800 rounded-lg transition-colors">Hủy</button>
                                <button type="submit" disabled={submitting} className="px-4 py-2 bg-red-600 hover:bg-red-500 text-white rounded-lg font-medium shadow-lg shadow-red-500/20 flex items-center gap-2">
                                    {submitting && <Loader2 className="animate-spin" size={16}/>} Gửi Báo Cáo
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            );
        };

        const ReviewExam = ({ result, onBack }) => {
            const [rating, setRating] = useState(0);
            const [hasRated, setHasRated] = useState(false);
            const { addToast } = useToast();
            const [reportModalOpen, setReportModalOpen] = useState(false);
            const [selectedQuestionForReport, setSelectedQuestionForReport] = useState(null);

            const auth = getAuth();
            const user = auth.currentUser;

            useEffect(() => {
                const checkRating = async () => {
                    if (!user || !result.examId) return;
                    const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'exam_ratings', `${result.examId}_${user.uid}`);
                    const snap = await getDoc(docRef);
                    if (snap.exists()) {
                        setRating(snap.data().rating);
                        setHasRated(true);
                    }
                };
                checkRating();
            }, [result.examId, user?.uid]);

            const handleRate = async (score) => {
                if (hasRated || !user) return;
                setRating(score);
                try {
                    await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'exam_ratings', `${result.examId}_${user.uid}`), {
                        uid: user.uid,
                        examId: result.examId,
                        rating: score,
                        createdAt: serverTimestamp()
                    });
                    
                    const examRef = doc(db, 'artifacts', appId, 'public', 'data', 'exams', result.examId);
                    await updateDoc(examRef, {
                        ratingSum: increment(score),
                        ratingCount: increment(1)
                    });

                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'reviews'), {
                        examId: result.examId,
                        examTitle: result.examTitle || 'Unknown Exam',
                        userId: user.uid,
                        userEmail: user.email || 'N/A',
                        displayName: user.displayName || 'Khách ẩn danh',
                        rating: score,
                        createdAt: serverTimestamp()
                    });

                    setHasRated(true);
                    addToast("Cảm ơn đánh giá của bạn!", "success");
                } catch (e) {
                    console.error("Error rating:", e);
                    addToast("Lỗi khi gửi đánh giá.", "error");
                }
            };

            const openReport = (question, index) => {
                setSelectedQuestionForReport({ q: question, idx: index });
                setReportModalOpen(true);
            };

            return (
                <div className="min-h-screen bg-slate-950 font-sans pb-20 animate-fade-in">
                      <nav className="glass sticky top-0 z-40 border-b border-slate-800/50 p-4 flex justify-between items-center shadow-md">
                        <div className="font-bold text-lg md:text-xl text-white flex items-center gap-3">
                            <div className="bg-slate-800 p-2 rounded-lg"><Eye size={20} className="text-cyan-400"/></div>
                            <div>
                                <span className="text-slate-400 text-xs uppercase block font-bold tracking-wider">Xem lại</span>
                                <span className="text-cyan-400 line-clamp-1">{result.examTitle}</span>
                            </div>
                        </div>
                        <button onClick={onBack} className="bg-slate-800 hover:bg-slate-700 text-white px-4 py-2 rounded-lg font-bold border border-slate-700 transition-colors shadow-lg">Về Dashboard</button>
                    </nav>
                    
                    <div className="max-w-4xl mx-auto p-4 space-y-6 mt-6">
                         <div className="bg-slate-800/80 backdrop-blur p-6 rounded-3xl border border-slate-700 text-center shadow-xl">
                            <h3 className="text-white font-bold mb-3">Bạn thấy đề thi này thế nào?</h3>
                            <div className="flex justify-center gap-2">
                                {[1,2,3,4,5].map(star => (
                                    <button 
                                        key={star} 
                                        onClick={() => handleRate(star)}
                                        disabled={hasRated}
                                        className={`transition-all hover:scale-110 p-1 ${hasRated ? 'cursor-default' : 'cursor-pointer'}`}
                                    >
                                        <Star size={32} fill={star <= rating ? "#fbbf24" : "none"} className={star <= rating ? "text-yellow-400" : "text-slate-600"} />
                                    </button>
                                ))}
                            </div>
                            {hasRated && <p className="text-emerald-400 text-xs mt-2 font-bold bg-emerald-500/10 inline-block px-3 py-1 rounded-full mt-3">Đã gửi đánh giá</p>}
                        </div>

                        <div id="result-content" className="space-y-6">
                            <div className="bg-gradient-to-br from-slate-800 to-slate-900 p-8 rounded-3xl border border-slate-700 text-center relative overflow-hidden shadow-2xl">
                                <div className="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-cyan-500 to-blue-600"></div>
                                <div className="text-6xl font-black text-white mb-2 tracking-tight">{result.score}</div>
                                <div className="text-slate-400 text-lg">Đúng <span className="text-emerald-400 font-bold">{result.correctCount}</span>/{result.total} câu</div>
                            </div>
                            {result.questions.map((q, i) => {
                                const ua = result.userAnswers[i];
                                const isCorrect = ua === q.correctOption;
                                return (
                                    <div key={i} className={`bg-slate-900 border p-6 rounded-2xl shadow-md transition-all ${isCorrect ? 'border-emerald-500/30' : 'border-red-500/30 bg-red-900/5'}`}>
                                        <div className="flex gap-4 mb-4">
                                            <span className={`w-8 h-8 rounded-full flex items-center justify-center font-bold text-sm shrink-0 shadow-lg ${isCorrect ? 'bg-emerald-600 text-white' : 'bg-red-600 text-white'}`}>{i+1}</span>
                                            <div className="text-lg text-slate-200 font-medium leading-relaxed">{q.text}</div>
                                        </div>
                                        <div className="space-y-3 pl-0 md:pl-12">
                                            {q.options.map((o, idx) => (
                                                <div key={idx} className={`p-4 rounded-xl border flex justify-between items-center transition-colors ${idx===q.correctOption ? 'border-emerald-500 bg-emerald-500/10 text-emerald-400 font-bold' : (idx===ua ? 'border-red-500 bg-red-500/10 text-red-400' : 'border-slate-800 bg-slate-900/50 text-slate-400')}`}>
                                                    <span className="flex-1 mr-2">{String.fromCharCode(65+idx)}. {o}</span>
                                                    {idx===q.correctOption && <CheckCircle2 size={20} className="shrink-0"/>}
                                                    {idx===ua && idx!==q.correctOption && <XCircle size={20} className="shrink-0"/>}
                                                </div>
                                            ))}
                                        </div>
                                        <div className="mt-4 md:ml-12 flex items-start gap-4">
                                            {q.explanation && (
                                                <div className="flex-1 p-5 bg-blue-900/20 rounded-2xl border border-blue-500/20 text-sm text-slate-300 leading-relaxed">
                                                    <div className="font-bold text-blue-400 mb-2 flex gap-2 items-center"><BookOpen size={18}/> Giải thích chi tiết:</div>{q.explanation}
                                                </div>
                                            )}
                                            <button 
                                                onClick={() => openReport(q, i)}
                                                className="shrink-0 bg-slate-800 hover:bg-red-900/30 text-slate-400 hover:text-red-400 p-2 rounded-lg border border-slate-700 hover:border-red-500/30 transition-colors flex flex-col items-center gap-1 text-[10px]"
                                                title="Báo cáo lỗi câu hỏi này"
                                            >
                                                <AlertCircle size={16} /> Báo lỗi
                                            </button>
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    </div>
                    {reportModalOpen && selectedQuestionForReport && (
                        <ReportQuestionModal 
                            onClose={() => setReportModalOpen(false)} 
                            question={selectedQuestionForReport.q} 
                            questionIndex={selectedQuestionForReport.idx}
                            examId={result.examId}
                        />
                    )}
                </div>
            )
        }

        const ExamInterface = ({ exam, onFinish, onExit }) => {
            const [timeLeft, setTimeLeft] = useState(exam.duration * 60);
            const [answers, setAnswers] = useState({});
            const [submitting, setSubmitting] = useState(false);
            const [isDrawerOpen, setIsDrawerOpen] = useState(false); 
            const questionRefs = useRef([]);
            const [flags, setFlags] = useState({}); 

            const [isDarkMode, setIsDarkMode] = useState(() => localStorage.getItem('theme') !== 'light');
            const [fontSizeLevel, setFontSizeLevel] = useState(1); 

            useEffect(() => {
                localStorage.setItem('theme', isDarkMode ? 'dark' : 'light');
                const timer = setInterval(() => setTimeLeft(t => t <= 1 ? (finish(true), 0) : t - 1), 1000);
                return () => clearInterval(timer);
            }, [isDarkMode]);

            useEffect(() => {
                if (exam.sessionId) {
                    const pingInterval = setInterval(async () => {
                        try {
                            await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'active_exams', exam.sessionId), {
                                lastPing: serverTimestamp()
                            });
                        } catch (e) { console.log("Ping error", e); }
                    }, 30000); 
                    return () => clearInterval(pingInterval);
                }
            }, [exam.sessionId]); 

            const finish = async (forceSubmit = false) => {
                if(submitting) return;
                
                const user = auth.currentUser;
                if (!user) return;

                const unansweredCount = exam.questions.length - Object.keys(answers).length;
                if (!forceSubmit) {
                    if (unansweredCount > 0) { if (!confirm(`⚠️ CẢNH BÁO CHƯA LÀM HẾT\n\nBạn còn ${unansweredCount} câu hỏi chưa chọn đáp án.\nBạn có chắc chắn muốn nộp bài ngay bây giờ không?`)) return; }
                    else { if (!confirm(`XÁC NHẬN NỘP BÀI\n\nBạn đã trả lời đủ ${exam.questions.length} câu.\nBạn có muốn kết thúc bài thi không?`)) return; }
                }

                setSubmitting(true);
                let correct = 0;
                exam.questions.forEach((q, i) => { if(answers[i] === q.correctOption) correct++; });
                const score = (correct / exam.questions.length) * 10;
                
                if (exam.sessionId) {
                    try { await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'active_exams', exam.sessionId)); } catch (e) {}
                }

                try {
                    await addDoc(collection(db, 'artifacts', appId, 'users', user.uid, 'history'), {
                        examId: exam.id, 
                        examTitle: exam.title, 
                        score: score.toFixed(1), 
                        totalQuestions: exam.questions.length, 
                        correctCount: correct, 
                        date: serverTimestamp(), 
                        userId: user.uid, 
                        displayName: user.displayName || 'User'
                    });

                    const userRef = doc(db, 'artifacts', appId, 'public', 'data', 'users', user.uid);
                    updateDoc(userRef, {
                        totalScore: increment(Number(score)),
                        examsCompleted: increment(1),
                        lastActive: serverTimestamp()
                    }).catch(console.error);

                    const historyQuery = query(collection(db, 'artifacts', appId, 'users', user.uid, 'history'), where('examId', '==', exam.id));
                    const historySnap = await getDocs(historyQuery);
                    const isFirstTime = historySnap.size <= 1; 

                    const examRef = doc(db, 'artifacts', appId, 'public', 'data', 'exams', exam.id);
                    const updateData = {
                        attempts: increment(1),
                        lastTakenAt: serverTimestamp()
                    };
                    if (isFirstTime) {
                        updateData.participantsCount = increment(1);
                    }
                    await updateDoc(examRef, updateData);

                } catch(e) { console.error("Save error", e); }
                
                onFinish({ 
                    score: score.toFixed(1), 
                    correctCount: correct, 
                    total: exam.questions.length, 
                    examTitle: exam.title,
                    questions: exam.questions,
                    userAnswers: answers,
                    examId: exam.id
                });
            };

            const handleExit = async () => {
                if (confirm("⚠️ XÁC NHẬN THOÁT\n\nKết quả bài làm sẽ KHÔNG được lưu lại.\nBạn có chắc chắn muốn thoát ra màn hình chính?")) {
                    if (exam.sessionId) {
                        try {
                            await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'active_exams', exam.sessionId));
                        } catch (e) { console.error("Lỗi xóa session khi thoát:", e); }
                    }
                    onExit();
                }
            };

            const scrollToQuestion = (index) => {
                questionRefs.current[index]?.scrollIntoView({ behavior: 'smooth', block: 'center' });
                setIsDrawerOpen(false);
            };

            const toggleFlag = (index) => {
                setFlags(prev => ({ ...prev, [index]: !prev[index] }));
            };

            const answeredCount = Object.keys(answers).length;
            const progressPercent = Math.round((answeredCount / exam.questions.length) * 100);

            const bgClass = isDarkMode ? 'bg-slate-950' : 'bg-gray-50';
            const textClass = isDarkMode ? 'text-slate-200' : 'text-gray-800';
            const headerClass = isDarkMode ? 'glass border-white/5' : 'bg-white border-b border-gray-200 shadow-sm';
            const cardClass = isDarkMode ? 'bg-slate-800/50 border-slate-700' : 'bg-white border-gray-200 shadow-sm';
            const sidebarClass = isDarkMode ? 'bg-slate-900 border-slate-800' : 'bg-white border-gray-200';
            const optionClassDefault = isDarkMode ? 'border-slate-700 hover:bg-slate-700 hover:border-slate-600' : 'border-gray-200 hover:bg-gray-50 hover:border-gray-300';
            const optionClassSelected = isDarkMode ? 'border-cyan-500 bg-cyan-900/20 ring-1 ring-cyan-500/50' : 'border-cyan-600 bg-cyan-50 ring-1 ring-cyan-600/50';
            const textSelected = isDarkMode ? 'text-white font-semibold' : 'text-cyan-900 font-bold';
            const textNormal = isDarkMode ? 'text-slate-300' : 'text-gray-600';
            const circleDefault = isDarkMode ? 'border-slate-500 group-hover:border-slate-400' : 'border-gray-400 group-hover:border-gray-500';
            
            const fontSizes = [
                { q: 'text-base', o: 'text-sm' },   
                { q: 'text-lg', o: 'text-base' },   
                { q: 'text-xl', o: 'text-lg' },     
                { q: 'text-2xl', o: 'text-xl' }     
            ];
            const currentFont = fontSizes[fontSizeLevel];

            return (
                <div className={`fixed inset-0 z-50 flex flex-col md:flex-row h-screen overflow-hidden ${bgClass} ${textClass} transition-colors duration-300`}>
                    <div className="absolute top-0 left-0 w-full h-1 z-[60] bg-gray-200 dark:bg-slate-800">
                         <div className="h-full bg-cyan-500 transition-all duration-300" style={{width: `${progressPercent}%`}}></div>
                    </div>

                    <div className="flex-1 flex flex-col h-full relative">
                        <div className={`${headerClass} p-3 md:p-4 flex justify-between items-center z-10 shrink-0 shadow-lg`}>
                            <div className="flex items-center gap-4">
                                <button onClick={handleExit} className={`p-2 rounded-lg border transition-all group ${isDarkMode ? 'bg-slate-800 hover:bg-red-500/20 text-slate-400 hover:text-red-400 border-slate-700 hover:border-red-500/50' : 'bg-gray-100 hover:bg-red-100 text-gray-500 hover:text-red-600 border-gray-200 hover:border-red-200'}`} title="Thoát bài thi">
                                    <LogOut size={20} className="rotate-180" />
                                </button>
                                <div>
                                    <h2 className={`font-bold text-base md:text-lg line-clamp-1 max-w-[150px] md:max-w-none ${isDarkMode ? 'text-cyan-400' : 'text-cyan-700'}`}>{exam.title}</h2>
                                    <div className={`text-xs flex items-center gap-2 mt-0.5 ${isDarkMode ? 'text-slate-400' : 'text-gray-500'}`}>
                                        <span className="hidden md:inline">Đã làm: {answeredCount}/{exam.questions.length}</span>
                                        <span className={`px-2 py-0.5 rounded font-bold ${isDarkMode ? 'bg-slate-800 text-cyan-400' : 'bg-gray-200 text-cyan-700'}`}>{progressPercent}%</span>
                                    </div>
                                </div>
                            </div>
                            
                            <div className="flex items-center gap-2 md:gap-3">
                                <button onClick={()=>setIsDrawerOpen(!isDrawerOpen)} className={`md:hidden p-2 rounded-lg border ${isDarkMode ? 'bg-slate-800 border-slate-700 text-cyan-400' : 'bg-white border-gray-200 text-cyan-600'}`}>
                                    <Grid size={20}/>
                                </button>

                                <div className={`hidden md:flex items-center rounded-lg border p-1 ${isDarkMode ? 'bg-slate-800 border-slate-700' : 'bg-gray-100 border-gray-200'}`}>
                                    <button onClick={() => setFontSizeLevel(prev => Math.max(0, prev - 1))} disabled={fontSizeLevel === 0} className={`p-1.5 rounded transition-colors ${isDarkMode ? 'hover:bg-slate-700 disabled:opacity-30' : 'hover:bg-white disabled:opacity-30'}`}><Type size={14} /></button>
                                    <span className="text-xs font-mono w-6 text-center">{fontSizeLevel + 1}</span>
                                    <button onClick={() => setFontSizeLevel(prev => Math.min(3, prev + 1))} disabled={fontSizeLevel === 3} className={`p-1.5 rounded transition-colors ${isDarkMode ? 'hover:bg-slate-700 disabled:opacity-30' : 'hover:bg-white disabled:opacity-30'}`}><Type size={18} /></button>
                                </div>

                                <button onClick={() => setIsDarkMode(!isDarkMode)} className={`hidden md:block p-2 rounded-lg border transition-all ${isDarkMode ? 'bg-slate-800 border-slate-700 hover:text-yellow-400' : 'bg-gray-100 border-gray-200 text-gray-600 hover:text-orange-500 hover:bg-white'}`}>
                                    {isDarkMode ? <Moon size={20} /> : <Sun size={20} />}
                                </button>

                                <div className={`font-mono text-lg md:text-xl font-bold flex gap-2 items-center px-3 py-1.5 rounded-lg border ${isDarkMode ? 'bg-slate-800 border-slate-700' : 'bg-white border-gray-200 shadow-sm'} ${timeLeft < 300 ? 'text-red-500 border-red-500/30 animate-pulse' : (isDarkMode ? 'text-emerald-400 border-emerald-500/30' : 'text-emerald-600 border-emerald-200')}`}>
                                    <Clock size={18} className="hidden md:block"/> {Math.floor(timeLeft/60)}:{timeLeft%60 < 10 ? '0'+timeLeft%60 : timeLeft%60}
                                </div>
                            </div>
                        </div>

                        <div className="flex-1 overflow-y-auto p-4 md:p-8 scroll-smooth" id="question-list">
                            <div className="max-w-5xl mx-auto space-y-6 pb-24">
                                {exam.questions.map((q, index) => (
                                    <div key={index} ref={el => questionRefs.current[index] = el} className={`${cardClass} border p-5 md:p-8 rounded-2xl shadow-lg transition-all ${answers[index] !== undefined ? (isDarkMode ? 'border-cyan-500/50 shadow-cyan-900/10' : 'border-cyan-500 ring-1 ring-cyan-500/20') : ''}`}>
                                            <div className="flex gap-4 mb-6 relative">
                                                <button 
                                                    onClick={() => toggleFlag(index)}
                                                    className={`absolute right-0 top-0 p-2 rounded-full transition-colors ${flags[index] ? 'text-yellow-400 bg-yellow-500/10' : 'text-slate-500 hover:text-yellow-400 hover:bg-slate-700/50'}`}
                                                    title="Đánh dấu câu hỏi này để xem lại"
                                                >
                                                    <Flag size={20} fill={flags[index] ? "currentColor" : "none"} />
                                                </button>

                                                <span className={`shrink-0 w-8 h-8 rounded-full flex items-center justify-center font-bold text-sm ${answers[index] !== undefined ? 'bg-cyan-600 text-white' : (isDarkMode ? 'bg-slate-700 text-slate-400' : 'bg-gray-200 text-gray-600')}`}>
                                                    {index + 1}
                                                </span>
                                                <div className={`${currentFont.q} font-medium leading-relaxed ${isDarkMode ? 'text-slate-100' : 'text-gray-900'} pr-8`}>
                                                    {q.text}
                                                </div>
                                            </div>
                                            <div className="space-y-3 pl-0 md:pl-12">
                                                {q.options.map((o, optIndex) => (
                                                    <label key={optIndex} className={`flex items-center p-3 md:p-4 rounded-xl border-2 cursor-pointer transition-all duration-200 group relative overflow-hidden ${answers[index]===optIndex ? optionClassSelected : optionClassDefault}`}>
                                                        <div className={`w-5 h-5 rounded-full border-2 mr-4 flex items-center justify-center shrink-0 transition-colors z-10 ${answers[index]===optIndex ? (isDarkMode ? 'border-cyan-500' : 'border-cyan-600') : circleDefault}`}>
                                                            {answers[index]===optIndex && <div className={`w-2.5 h-2.5 rounded-full ${isDarkMode ? 'bg-cyan-500' : 'bg-cyan-600'}`}></div>}
                                                        </div>
                                                        <span className={`${currentFont.o} z-10 ${answers[index]===optIndex ? textSelected : textNormal}`}>{o}</span>
                                                        <input type="radio" className="hidden" checked={answers[index]===optIndex} onChange={()=>setAnswers(prev => ({...prev, [index]: optIndex}))} />
                                                    </label>
                                                ))}
                                            </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                        
                        <div className={`md:hidden p-4 border-t z-20 shadow-[0_-5px_20px_rgba(0,0,0,0.1)] ${isDarkMode ? 'border-slate-800 bg-slate-900' : 'border-gray-200 bg-white'}`}>
                            <button onClick={() => finish(false)} disabled={submitting} className="w-full bg-emerald-600 hover:bg-emerald-500 py-3 rounded-xl font-bold text-white shadow-lg shadow-emerald-500/20 flex items-center justify-center gap-2 disabled:opacity-50">
                                {submitting ? <Loader2 className="animate-spin" size={20}/> : <CheckCircle2 size={20}/>} Nộp Bài
                            </button>
                        </div>
                    </div>
                    
                    <div className={`hidden md:flex w-80 border-l flex-col shrink-0 h-full ${sidebarClass}`}>
                        <div className={`p-5 border-b ${isDarkMode ? 'border-slate-800' : 'border-gray-200'}`}>
                            <h3 className={`font-bold mb-2 flex items-center gap-2 ${isDarkMode ? 'text-slate-300' : 'text-gray-700'}`}><Grid size={18}/> Danh sách câu hỏi</h3>

            const filteredExams = exams.filter(e => {

                                <div className="bg-slate-800/80 backdrop-blur p-4 rounded-2xl border border-white/5 min-w-[100px] text-center shadow-lg"><p className="text-slate-400 text-[10px] uppercase font-bold mb-1 tracking-wider">Điểm TB</p><p className="text-2xl font-black text-emerald-400">{stats.avgScore}</p></div>

                                <div className="flex flex-col md:flex-row justify-between items-center gap-4">

                                        <input className="w-full md:w-80 bg-slate-900 border border-slate-700 rounded-xl pl-12 pr-4 py-2.5 text-slate-200 focus:border-cyan-500 focus:ring-1 focus:ring-cyan-500 outline-none transition-all placeholder:text-slate-600 shadow-sm" placeholder="Tìm kiếm đề thi..." value={search} onChange={e=>setSearch(e.target.value)}/>

                                    <div className="flex bg-slate-900 p-1.5 rounded-xl border border-slate-700 overflow-x-auto max-w-full">

                                        <div key={i} className="bg-slate-900 border border-slate-800 rounded-2xl p-6 h-48 flex flex-col justify-between">
                                            <div><Skeleton className="w-3/4 h-6 mb-2"/><Skeleton className="w-1/2 h-4"/></div>
                                            <Skeleton className="w-full h-10 rounded-xl"/>

                            ) : filteredExams.length === 0 ? (

                                                            <span className="text-emerald-400 text-[10px] font-bold tracking-widest uppercase">Miễn phí</span>

                                                                <RefreshCw size={12} className="text-slate-600"/> 
                                                                Cập nhật: {formatDate(exam.updatedAt)}
                                                            </div>
                                                        )}
                                                    </div>
                                                </div>

                                                <div className="flex gap-4 text-xs font-medium text-slate-400 mb-6 mt-auto border-t border-white/5 pt-4">

                                                    <span className="flex items-center gap-1.5"><Grid size={14} className="text-cyan-500"/> {exam.questions?.length} câu</span>

                                                        <Users size={14} className="text-cyan-500"/>

                                                        }`}
                                                    >
                                                        {isLocked ? <><Lock size={14}/> Nâng cấp</> : 'Bắt đầu'}
                                                    </button>
                                                </div>

                                    })}

                        <div className="lg:col-span-1">

                                <div className="mt-6 pt-4 border-t border-slate-700/50">
                                     <button onClick={onViewHistory} className="w-full py-3 rounded-xl bg-slate-800 hover:bg-slate-700 text-slate-300 hover:text-white font-medium text-sm transition-colors flex items-center justify-center gap-2 group">
                                        Xem lịch sử chi tiết <ChevronRight size={16} className="group-hover:translate-x-1 transition-transform"/>
                                     </button>
                                </div>
                             </div>
                        </div>
                    </div>

            );

        const HistoryPage = ({ user, onBack }) => {
            const [history, setHistory] = useState([]);
            useEffect(() => {
                if (!user) return;
                const q = query(collection(db, 'artifacts', appId, 'users', user.uid, 'history'), orderBy('date', 'desc'));
                const unsub = onSnapshot(q, s => setHistory(s.docs.map(d=>({id: d.id, ...d.data(), date: d.data().date?.toDate()}))), (error) => {
                    console.error("History page sync error", error);
                });
                return unsub;
            }, [user]);

            return (
                <div className="animate-fade-in pb-20 max-w-5xl mx-auto">
                    <button onClick={onBack} className="mb-6 flex items-center gap-2 text-slate-400 hover:text-white transition-colors group">
                        <div className="bg-slate-800 p-2 rounded-lg group-hover:bg-slate-700"><ChevronRight className="rotate-180" size={20}/></div>
                        <span>Quay lại Dashboard</span>
                    </button>
                    <h2 className="text-2xl font-bold mb-6 flex items-center gap-3 text-white"><div className="bg-cyan-500/20 p-2 rounded-xl text-cyan-400"><History size={24}/></div> Lịch sử làm bài</h2>
                    <div className="glass-panel rounded-2xl overflow-hidden shadow-xl">

                                            <td className="p-5 text-center"><span className={`px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-wider border ${Number(r.score)>=5 ? 'bg-emerald-500/10 text-emerald-400 border-emerald-500/20' : 'bg-red-500/10 text-red-400 border-red-500/20'}`}>{Number(r.score)>=5 ? 'Đạt' : 'Chưa đạt'}</span></td>

                </div>
            );
