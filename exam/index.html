<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedExam Pro - Thi Trắc Nghiệm Y Khoa</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Babel Standalone -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    
    <!-- SheetJS để đọc file Excel -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <!-- Import Map: Định nghĩa nơi tải các thư viện -->
    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0",
            "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
            "lucide-react": "https://esm.sh/lucide-react@0.344.0?deps=react@18.2.0",
            "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
            "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js",
            "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js"
        }
    }
    </script>

    <style>
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #1e293b; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #64748b; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    </style>
</head>
<body class="bg-slate-900 text-slate-200">
    <div id="root"></div>

    <!-- Main Application Script -->
    <script type="text/babel" data-type="module" data-presets="react">
        import React, { useState, useEffect, useRef } from 'react';
        import { createRoot } from 'react-dom/client';
        import { initializeApp } from 'firebase/app';
        import { 
            getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, 
            signOut, onAuthStateChanged, updateProfile, signInWithPopup, GoogleAuthProvider
        } from 'firebase/auth';
        import { 
            getFirestore, collection, addDoc, query, onSnapshot, 
            serverTimestamp, orderBy, setDoc, doc, updateDoc, getDoc
        } from 'firebase/firestore';
        import { 
            Activity, AlertTriangle, Award, CheckCircle, Clock, 
            EyeOff, FileSpreadsheet, FileText, FileType, History, 
            LogOut, Plus, ShieldCheck, Trash2, Upload, User, XCircle, 
            Settings, Loader2, Download, HelpCircle, Lock, Crown, Users, CreditCard, Search
        } from 'lucide-react';

        // --- CẤU HÌNH FIREBASE ---
        const defaultFirebaseConfig = {
            apiKey: "AIzaSyDqdo_DJIWa5iqxiCgBq-0iGX7f9sr6soo",
            authDomain: "rt-examination.firebaseapp.com",
            projectId: "rt-examination",
            storageBucket: "rt-examination.firebasestorage.app",
            messagingSenderId: "920482699854",
            appId: "1:920482699854:web:44f9b0d735bdc001c6c11f",
            measurementId: "G-8N7RTTREQM"
        };

        // --- CẤU HÌNH ADMIN ---
        // BẠN HÃY THÊM EMAIL CỦA BẠN VÀO DANH SÁCH NÀY
        const ADMIN_EMAILS = [
            "thanhtrong.yds@gmail.com", 
            "vnrad.tech@gmail.com",
            "test@gmail.com" 
        ];

        let firebaseConfig;
        let isConfigured = false;
        try {
            if (typeof __firebase_config !== 'undefined' && __firebase_config) {
                firebaseConfig = JSON.parse(__firebase_config);
                isConfigured = true;
            } else {
                firebaseConfig = defaultFirebaseConfig;
                if (firebaseConfig.apiKey && firebaseConfig.apiKey !== "YOUR_API_KEY") isConfigured = true;
            }
        } catch (e) { firebaseConfig = defaultFirebaseConfig; }

        let app, auth, db;
        if (isConfigured) {
            try {
                app = initializeApp(firebaseConfig);
                auth = getAuth(app);
                db = getFirestore(app);
            } catch (error) { console.error("Firebase Init Error:", error); isConfigured = false; }
        }

        const appId = typeof __app_id !== 'undefined' ? __app_id : 'med-exam-pro-html';

        // --- CONSTANTS ---
        const GRADIENTS = {
            primary: "bg-gradient-to-r from-cyan-600 to-blue-700",
            secondary: "bg-gradient-to-r from-slate-800 to-slate-900",
            accent: "bg-gradient-to-r from-emerald-500 to-teal-600",
            danger: "bg-gradient-to-r from-rose-500 to-pink-600",
            gold: "bg-gradient-to-r from-yellow-500 to-amber-600",
            card: "bg-slate-800/50 backdrop-blur-md border border-slate-700",
        };

        // CẬP NHẬT THÔNG TIN NGÂN HÀNG CỦA BẠN TẠI ĐÂY
        const BANK_INFO = {
            bankName: "BIDV",
            accountNum: "8890523877", 
            accountName: "LE THANH TRONG", 
            amount: "50,000"
        };

        // --- COMPONENTS ---

        const ConfigError = () => (
             <div className="min-h-screen flex items-center justify-center bg-slate-900 text-white p-4 text-center">
                <div className="max-w-md w-full bg-slate-800 p-8 rounded-2xl border border-red-500/50">
                    <AlertTriangle size={48} className="mx-auto text-red-500 mb-4" />
                    <h2 className="text-xl font-bold mb-2">Lỗi Cấu hình</h2>
                    <p className="text-slate-400">Vui lòng kiểm tra API Key.</p>
                </div>
            </div>
        );

        // 1. Auth & Registration with User Profile Creation
        const AuthScreen = () => {
            const [isRegistering, setIsRegistering] = useState(false);
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [name, setName] = useState('');
            const [error, setError] = useState('');
            const [loading, setLoading] = useState(false);

            const createUserProfile = async (user, displayName) => {
                // Tạo hồ sơ người dùng trong collection công khai để Admin quản lý
                try {
                    await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'users', user.uid), {
                        uid: user.uid,
                        email: user.email,
                        displayName: displayName || user.displayName || user.email.split('@')[0],
                        isPremium: false, // Mặc định là chưa đóng tiền
                        createdAt: serverTimestamp(),
                        role: 'user'
                    });
                } catch (e) {
                    console.error("Error creating user profile:", e);
                }
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                setError('');
                setLoading(true);
                try {
                    if (isRegistering) {
                        const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                        await updateProfile(userCredential.user, { displayName: name });
                        await createUserProfile(userCredential.user, name);
                    } else {
                        await signInWithEmailAndPassword(auth, email, password);
                    }
                } catch (err) {
                    let msg = err.message;
                    if (msg.includes('auth/invalid-credential')) msg = "Thông tin đăng nhập không đúng.";
                    else if (msg.includes('email-already-in-use')) msg = "Email đã tồn tại.";
                    setError(msg);
                } finally { setLoading(false); }
            };

            const handleGoogleLogin = async () => {
                setError('');
                setLoading(true);
                try {
                    const provider = new GoogleAuthProvider();
                    const result = await signInWithPopup(auth, provider);
                    // Check if profile exists, if not create
                    const userRef = doc(db, 'artifacts', appId, 'public', 'data', 'users', result.user.uid);
                    const userSnap = await getDoc(userRef);
                    if (!userSnap.exists()) {
                        await createUserProfile(result.user, result.user.displayName);
                    }
                } catch (err) { setError(err.message); } finally { setLoading(false); }
            };

            return (
                <div className={`min-h-screen flex items-center justify-center ${GRADIENTS.secondary} text-white p-4`}>
                    <div className="max-w-md w-full bg-slate-900 p-8 rounded-2xl shadow-2xl border border-cyan-500/30">
                        <div className="text-center mb-8">
                            <div className="inline-flex items-center justify-center w-16 h-16 rounded-full bg-cyan-500/20 text-cyan-400 mb-4">
                                <Activity size={32} />
                            </div>
                            <h1 className="text-3xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-cyan-400 to-blue-400">MedExam Pro</h1>
                            <p className="text-slate-400 mt-2">Hệ thống ôn thi Chứng chỉ hành nghề</p>
                        </div>
                        {error && <div className="mb-4 p-3 bg-red-500/20 border border-red-500 text-red-200 text-sm rounded flex gap-2"><AlertTriangle size={16}/>{error}</div>}
                        <form onSubmit={handleSubmit} className="space-y-4">
                            {isRegistering && (
                                <div><label className="block text-sm text-slate-300 mb-1">Họ tên</label><input type="text" required className="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-2" value={name} onChange={(e) => setName(e.target.value)} /></div>
                            )}
                            <div><label className="block text-sm text-slate-300 mb-1">Email</label><input type="email" required className="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-2" value={email} onChange={(e) => setEmail(e.target.value)} /></div>
                            <div><label className="block text-sm text-slate-300 mb-1">Mật khẩu</label><input type="password" required className="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-2" value={password} onChange={(e) => setPassword(e.target.value)} /></div>
                            <button type="submit" disabled={loading} className={`w-full py-3 rounded-lg font-bold text-white shadow-lg ${GRADIENTS.primary}`}>{loading ? 'Đang xử lý...' : (isRegistering ? 'Đăng ký' : 'Đăng nhập')}</button>
                        </form>
                        <div className="relative my-6"><div className="absolute inset-0 flex items-center"><div className="w-full border-t border-slate-700"></div></div><div className="relative flex justify-center text-sm"><span className="px-2 bg-slate-900 text-slate-400">Hoặc</span></div></div>
                        <button onClick={handleGoogleLogin} disabled={loading} className="w-full py-3 rounded-lg font-bold text-slate-200 bg-slate-800 hover:bg-slate-700 border border-slate-600 flex items-center justify-center gap-2">Google</button>
                        <div className="mt-6 text-center"><button onClick={() => setIsRegistering(!isRegistering)} className="text-cyan-400 hover:underline text-sm">{isRegistering ? 'Đã có tài khoản? Đăng nhập' : 'Chưa có tài khoản? Đăng ký'}</button></div>
                    </div>
                </div>
            );
        };

        // 2. Payment Modal
        const PaymentModal = ({ onClose, userEmail }) => {
            const qrUrl = `https://img.vietqr.io/image/${BANK_INFO.bankName}-${BANK_INFO.accountNum}-compact2.jpg?amount=${BANK_INFO.amount}&addInfo=MEDEXAM ${userEmail.split('@')[0]}&accountName=${encodeURIComponent(BANK_INFO.accountName)}`;

            return (
                <div className="fixed inset-0 bg-black/90 z-[60] flex items-center justify-center p-4">
                    <div className="bg-slate-900 w-full max-w-md rounded-2xl border border-yellow-500/50 p-6 relative overflow-hidden">
                        <div className="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-yellow-400 to-amber-600"></div>
                        <button onClick={onClose} className="absolute top-4 right-4 text-slate-400 hover:text-white"><XCircle /></button>
                        
                        <div className="text-center mb-6">
                            <div className="inline-flex p-3 rounded-full bg-yellow-500/10 text-yellow-500 mb-3">
                                <Crown size={32} />
                            </div>
                            <h2 className="text-2xl font-bold text-white">Nâng cấp Tài khoản VIP</h2>
                            <p className="text-slate-400 text-sm mt-1">Mở khóa toàn bộ đề thi không giới hạn</p>
                        </div>

                        <div className="bg-white p-4 rounded-xl mb-6 flex flex-col items-center">
                            <img src={qrUrl} alt="QR Code" className="w-48 h-48 object-contain mb-2" />
                            <p className="text-slate-800 font-bold text-lg">{BANK_INFO.amount} VNĐ</p>
                            <p className="text-slate-500 text-xs text-center mt-1">Nội dung: MEDEXAM {userEmail.split('@')[0]}</p>
                        </div>

                        <div className="text-sm text-slate-300 space-y-2 mb-6 bg-slate-800 p-4 rounded-lg">
                            <p><strong>Bước 1:</strong> Quét mã QR hoặc chuyển khoản.</p>
                            <p><strong>Bước 2:</strong> Chờ Admin duyệt (thường 5-10 phút).</p>
                            <p><strong>Bước 3:</strong> F5 tải lại trang để thấy biểu tượng VIP.</p>
                        </div>

                        <button onClick={onClose} className={`w-full py-3 rounded-lg font-bold text-slate-900 ${GRADIENTS.gold} hover:brightness-110`}>
                            Tôi đã chuyển khoản
                        </button>
                    </div>
                </div>
            );
        };

        // 3. User Manager (Admin Tool)
        const UserManager = ({ onClose }) => {
            const [users, setUsers] = useState([]);
            const [search, setSearch] = useState('');

            useEffect(() => {
                const q = query(collection(db, 'artifacts', appId, 'public', 'data', 'users'), orderBy('createdAt', 'desc'));
                const unsub = onSnapshot(q, (snap) => {
                    setUsers(snap.docs.map(d => d.data()));
                });
                return unsub;
            }, []);

            const togglePremium = async (uid, currentStatus) => {
                if(confirm(`Bạn có chắc muốn ${currentStatus ? 'HỦY' : 'KÍCH HOẠT'} VIP cho user này?`)) {
                    await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'users', uid), {
                        isPremium: !currentStatus
                    });
                }
            };

            const filteredUsers = users.filter(u => 
                u.email.toLowerCase().includes(search.toLowerCase()) || 
                u.displayName.toLowerCase().includes(search.toLowerCase())
            );

            return (
                <div className="fixed inset-0 bg-black/90 z-[70] flex items-center justify-center p-4">
                    <div className="bg-slate-900 w-full max-w-4xl h-[85vh] rounded-2xl border border-slate-700 flex flex-col">
                        <div className="p-6 border-b border-slate-700 flex justify-between items-center bg-slate-800">
                            <h2 className="text-xl font-bold text-white flex items-center gap-2"><Users className="text-cyan-400"/> Quản lý Học viên</h2>
                            <button onClick={onClose} className="text-slate-400 hover:text-white"><XCircle /></button>
                        </div>
                        
                        <div className="p-4 bg-slate-800/50 border-b border-slate-700">
                            <div className="relative">
                                <Search className="absolute left-3 top-2.5 text-slate-500" size={18} />
                                <input 
                                    className="w-full bg-slate-900 border border-slate-700 rounded-lg pl-10 pr-4 py-2 text-white focus:border-cyan-500 outline-none"
                                    placeholder="Tìm kiếm theo email hoặc tên..."
                                    value={search} onChange={e => setSearch(e.target.value)}
                                />
                            </div>
                        </div>

                        <div className="flex-1 overflow-y-auto p-4">
                            <table className="w-full text-left text-sm">
                                <thead className="text-xs uppercase bg-slate-800 text-slate-400">
                                    <tr>
                                        <th className="p-3">Học viên</th>
                                        <th className="p-3">Email</th>
                                        <th className="p-3 text-center">Trạng thái</th>
                                        <th className="p-3 text-right">Hành động</th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-slate-700">
                                    {filteredUsers.map(user => (
                                        <tr key={user.uid} className="hover:bg-slate-800/50">
                                            <td className="p-3 font-medium text-white">{user.displayName}</td>
                                            <td className="p-3 text-slate-400">{user.email}</td>
                                            <td className="p-3 text-center">
                                                {user.isPremium ? (
                                                    <span className="px-2 py-1 rounded bg-yellow-500/20 text-yellow-400 font-bold text-xs border border-yellow-500/30">VIP</span>
                                                ) : (
                                                    <span className="px-2 py-1 rounded bg-slate-700 text-slate-400 text-xs">Free</span>
                                                )}
                                            </td>
                                            <td className="p-3 text-right">
                                                <button 
                                                    onClick={() => togglePremium(user.uid, user.isPremium)}
                                                    className={`px-3 py-1.5 rounded text-xs font-bold transition-colors ${
                                                        user.isPremium 
                                                        ? 'bg-red-500/10 text-red-400 hover:bg-red-500/20' 
                                                        : 'bg-emerald-500/10 text-emerald-400 hover:bg-emerald-500/20'
                                                    }`}
                                                >
                                                    {user.isPremium ? 'Hủy VIP' : 'Kích hoạt VIP'}
                                                </button>
                                            </td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            );
        };

        // ... [Import Modal & Exam Interface remain largely same, just slight props updates if needed] ...
        // (Giữ nguyên ImportModal và ExamInterface từ phiên bản trước, chỉ copy lại để đảm bảo file đầy đủ)
        const ImportModal = ({ onClose, onImport }) => {
            const [mode, setMode] = useState('excel');
            const [textData, setTextData] = useState('');
            const [isProcessing, setIsProcessing] = useState(false);

            const handleDownloadTemplate = () => {
                if (!window.XLSX) return alert("Lỗi thư viện Excel.");
                const wb = window.XLSX.utils.book_new();
                const wsData = [["Nội dung câu hỏi", "Đáp án A", "Đáp án B", "Đáp án C", "Đáp án D", "Đáp án đúng"], ["Câu mẫu 1?", "A", "B", "C", "D", "A"]];
                const ws = window.XLSX.utils.aoa_to_sheet(wsData);
                window.XLSX.utils.book_append_sheet(wb, ws, "Sheet1");
                window.XLSX.writeFile(wb, "Mau_De_Thi.xlsx");
            };

            const handleExcelUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                setIsProcessing(true);
                const reader = new FileReader();
                reader.onload = (evt) => {
                    try {
                        const wb = window.XLSX.read(evt.target.result, { type: 'binary' });
                        const ws = wb.Sheets[wb.SheetNames[0]];
                        const data = window.XLSX.utils.sheet_to_json(ws, { header: 1 });
                        const questions = [];
                        const startRow = data[0] && (data[0][0] || '').toString().toLowerCase().includes('câu') ? 1 : 0;
                        for (let i = startRow; i < data.length; i++) {
                            const row = data[i];
                            if (row && row[0]) {
                                let ansIndex = 0;
                                const ansRaw = (row[5] || '').toString().trim().toUpperCase();
                                if (['A','B','C','D'].includes(ansRaw)) ansIndex = ansRaw.charCodeAt(0) - 65;
                                questions.push({ text: row[0], options: [row[1]||'', row[2]||'', row[3]||'', row[4]||''], correctOption: ansIndex });
                            }
                        }
                        onImport(questions);
                    } catch (err) { alert("Lỗi file: " + err.message); } finally { setIsProcessing(false); }
                };
                reader.readAsBinaryString(file);
            };

            const handleTextParse = () => {
                if (!textData) return;
                // Simple parsing logic (simplified for brevity as it was in prev version)
                const questions = []; // ... logic parsing ...
                // Re-using logic from previous turn for robustness
                const lines = textData.split('\n').filter(l => l.trim());
                let currentQ = null;
                lines.forEach(line => {
                    line = line.trim();
                    if (/^Đáp án|^Answer/i.test(line)) {
                        if (currentQ) {
                            const char = line.split(/[:\.]/)[1]?.trim().toUpperCase().charAt(0);
                            if (['A','B','C','D'].includes(char)) currentQ.correctOption = char.charCodeAt(0) - 65;
                        }
                    } else if (/^[A-D][\.:\)]/.test(line)) {
                        if (currentQ) {
                            const idx = line.charCodeAt(0) - 65;
                            if(idx>=0 && idx<=3) currentQ.options[idx] = line.replace(/^[A-D][\.:\)]\s*/, '');
                        }
                    } else {
                        if (currentQ && currentQ.options.every(o=>o)) questions.push(currentQ);
                        currentQ = { text: line.replace(/^\d+[\.:\)]\s*/, ''), options: ['','','',''], correctOption: 0 };
                    }
                });
                if(currentQ) questions.push(currentQ);
                onImport(questions);
            };

            return (
                <div className="fixed inset-0 bg-black/80 z-[60] flex items-center justify-center p-4">
                    <div className="bg-slate-900 w-full max-w-2xl rounded-2xl border border-slate-700 flex flex-col max-h-[90vh]">
                        <div className="p-4 border-b border-slate-700 flex justify-between items-center"><h3 className="font-bold text-white">Import</h3><button onClick={onClose}><XCircle/></button></div>
                        <div className="flex border-b border-slate-700"><button onClick={()=>setMode('excel')} className={`flex-1 py-3 ${mode==='excel'?'text-cyan-400 border-b-2 border-cyan-400':''}`}>Excel</button><button onClick={()=>setMode('text')} className={`flex-1 py-3 ${mode==='text'?'text-cyan-400 border-b-2 border-cyan-400':''}`}>Text</button></div>
                        <div className="p-6 flex-1 overflow-y-auto">
                            {mode === 'excel' ? (
                                <div className="space-y-4">
                                    <button onClick={handleDownloadTemplate} className="text-cyan-400 text-sm flex gap-2"><Download size={16}/> Tải file mẫu</button>
                                    <div className="border-2 border-dashed border-slate-600 p-8 text-center rounded-xl relative"><Upload className="mx-auto mb-2"/><p>Chọn file Excel</p><input type="file" className="absolute inset-0 opacity-0 cursor-pointer" onChange={handleExcelUpload}/></div>
                                </div>
                            ) : (
                                <div className="h-full flex flex-col gap-2"><p className="text-xs text-slate-400">Dán nội dung từ Word (Câu 1... A... B... Đáp án: A)</p><textarea className="flex-1 bg-slate-950 p-2 rounded text-white border border-slate-700" value={textData} onChange={e=>setTextData(e.target.value)}></textarea><button onClick={handleTextParse} className="py-2 bg-cyan-600 rounded text-white">Phân tích</button></div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const ExamInterface = ({ exam, onFinish }) => {
            const [timeLeft, setTimeLeft] = useState(exam.duration * 60);
            const [answers, setAnswers] = useState({});
            const [idx, setIdx] = useState(0);
            const [submitting, setSubmitting] = useState(false);

            useEffect(() => {
                const timer = setInterval(() => {
                    setTimeLeft(p => {
                        if(p <= 1) { finish(); return 0; }
                        return p - 1;
                    });
                }, 1000);
                return () => clearInterval(timer);
            }, []);

            const finish = async () => {
                if(submitting) return;
                setSubmitting(true);
                let correct = 0;
                exam.questions.forEach((q, i) => { if(answers[i] === q.correctOption) correct++; });
                const score = (correct / exam.questions.length) * 10;
                // Timeout protection
                const timeout = new Promise((_, r) => setTimeout(() => r(new Error("Timeout")), 3000));
                try {
                    await Promise.race([
                        addDoc(collection(db, 'artifacts', appId, 'users', auth.currentUser.uid, 'history'), {
                            examId: exam.id, examTitle: exam.title, score: score.toFixed(1), totalQuestions: exam.questions.length, correctCount: correct, date: new Date(), userId: auth.currentUser.uid
                        }),
                        timeout
                    ]);
                } catch(e) { console.warn(e); }
                onFinish({ score: score.toFixed(1), correctCount: correct, totalQuestions: exam.questions.length, examTitle: exam.title });
            };

            const q = exam.questions[idx];
            return (
                <div className="fixed inset-0 bg-slate-900 z-50 flex flex-col text-white">
                    <div className="bg-slate-800 p-4 shadow flex justify-between items-center">
                        <h2 className="font-bold text-cyan-400">{exam.title} <span className="text-slate-400 text-sm ml-2">Câu {idx+1}/{exam.questions.length}</span></h2>
                        <div className="font-mono text-xl font-bold flex gap-2"><Clock/> {Math.floor(timeLeft/60)}:{timeLeft%60 < 10 ? '0'+timeLeft%60 : timeLeft%60}</div>
                        <button onClick={finish} disabled={submitting} className="px-6 py-2 bg-cyan-600 rounded font-bold hover:bg-cyan-500 disabled:opacity-50">{submitting ? 'Đang nộp...' : 'Nộp Bài'}</button>
                    </div>
                    <div className="flex-1 overflow-y-auto p-8 max-w-4xl mx-auto w-full">
                        <div className="bg-slate-800 p-6 rounded-xl shadow-lg mb-6">
                            <div className="text-lg font-medium mb-4">Câu {idx+1}: {q.text}</div>
                            <div className="space-y-3">
                                {q.options.map((o, i) => (
                                    <label key={i} className={`flex items-center p-4 rounded border-2 cursor-pointer transition-all ${answers[idx]===i ? 'border-cyan-500 bg-cyan-900/20' : 'border-slate-700 hover:bg-slate-700'}`}>
                                        <div className={`w-5 h-5 rounded-full border-2 mr-3 flex items-center justify-center ${answers[idx]===i ? 'border-cyan-500' : 'border-slate-500'}`}>{answers[idx]===i && <div className="w-2.5 h-2.5 rounded-full bg-cyan-500"></div>}</div>
                                        <span>{o}</span>
                                        <input type="radio" className="hidden" checked={answers[idx]===i} onChange={()=>setAnswers({...answers, [idx]: i})} />
                                    </label>
                                ))}
                            </div>
                        </div>
                        <div className="flex justify-between">
                            <button disabled={idx===0} onClick={()=>setIdx(idx-1)} className="px-6 py-2 bg-slate-700 rounded disabled:opacity-50">Câu trước</button>
                            <button disabled={idx===exam.questions.length-1} onClick={()=>setIdx(idx+1)} className="px-6 py-2 bg-cyan-600 rounded disabled:opacity-50">Câu tiếp</button>
                        </div>
                    </div>
                </div>
            );
        };

        const ExamCreator = ({ onCancel, onSave }) => {
            const [mode, setMode] = useState('select');
            const [title, setTitle] = useState('');
            const [duration, setDuration] = useState(30);
            const [questions, setQuestions] = useState([]);
            const [qText, setQText] = useState('');
            const [options, setOptions] = useState(['', '', '', '']);
            const [correct, setCorrect] = useState(0);
            const [showImport, setShowImport] = useState(false);

            const handleImport = (qs) => { setQuestions([...questions, ...qs]); setShowImport(false); setMode('editor'); };
            const addQ = () => {
                if(!qText || options.some(o=>!o)) return alert("Thiếu thông tin");
                setQuestions([...questions, {text: qText, options, correctOption: correct}]);
                setQText(''); setOptions(['','','','']); setCorrect(0);
            };
            const save = () => {
                if(!title || !questions.length) return alert("Cần tiêu đề và câu hỏi");
                onSave({ title, duration, questions, createdAt: serverTimestamp() });
            };

            if(mode === 'select') {
                return (
                    <div className="fixed inset-0 bg-black/80 flex items-center justify-center z-50 p-4">
                        <div className="bg-slate-900 w-full max-w-3xl rounded-2xl border border-slate-700 p-6 relative">
                            <button onClick={onCancel} className="absolute top-4 right-4 text-slate-400"><XCircle/></button>
                            <h2 className="text-2xl font-bold text-white mb-8 text-center">Tạo Đề Thi Mới</h2>
                            <div className="grid grid-cols-2 gap-6">
                                <button onClick={()=>setShowImport(true)} className="p-8 bg-slate-800 border-2 border-slate-700 hover:border-emerald-500 rounded-xl flex flex-col items-center gap-4 transition-all hover:bg-emerald-900/10"><Upload size={40} className="text-emerald-500"/><span className="font-bold text-lg">Import Excel/Word</span></button>
                                <button onClick={()=>setMode('editor')} className="p-8 bg-slate-800 border-2 border-slate-700 hover:border-cyan-500 rounded-xl flex flex-col items-center gap-4 transition-all hover:bg-cyan-900/10"><Plus size={40} className="text-cyan-500"/><span className="font-bold text-lg">Soạn Thủ Công</span></button>
                            </div>
                            {showImport && <ImportModal onClose={()=>setShowImport(false)} onImport={handleImport} />}
                        </div>
                    </div>
                );
            }

            return (
                <div className="fixed inset-0 bg-black/80 flex items-center justify-center z-50 p-4">
                    <div className="bg-slate-900 w-full max-w-4xl h-[90vh] rounded-2xl border border-slate-700 flex flex-col">
                        <div className="p-4 border-b border-slate-700 flex justify-between"><h2 className="font-bold text-lg">Soạn Đề Thi</h2><div className="flex gap-2"><button onClick={()=>setShowImport(true)} className="text-sm bg-emerald-600 px-3 py-1 rounded">Import</button><button onClick={onCancel}><XCircle/></button></div></div>
                        <div className="p-6 flex-1 overflow-y-auto space-y-6">
                            <div className="grid grid-cols-2 gap-4">
                                <div><label className="text-sm text-slate-400">Tên đề</label><input className="w-full bg-slate-800 p-2 rounded border border-slate-600" value={title} onChange={e=>setTitle(e.target.value)}/></div>
                                <div><label className="text-sm text-slate-400">Thời gian (phút)</label><input type="number" className="w-full bg-slate-800 p-2 rounded border border-slate-600" value={duration} onChange={e=>setDuration(Number(e.target.value))}/></div>
                            </div>
                            <div className="bg-slate-800 p-4 rounded border border-slate-700">
                                <textarea className="w-full bg-slate-900 p-2 rounded mb-2 border border-slate-600" rows={2} placeholder="Câu hỏi..." value={qText} onChange={e=>setQText(e.target.value)}></textarea>
                                <div className="grid grid-cols-2 gap-2 mb-2">{options.map((o,i)=><div key={i} className="flex gap-2"><input type="radio" name="opt" checked={correct===i} onChange={()=>setCorrect(i)}/><input className="flex-1 bg-slate-900 p-1 rounded border border-slate-600" placeholder={`Đáp án ${String.fromCharCode(65+i)}`} value={o} onChange={e=>{const n=[...options];n[i]=e.target.value;setOptions(n)}}/></div>)}</div>
                                <button onClick={addQ} className="w-full py-2 bg-slate-700 hover:bg-slate-600 rounded flex justify-center gap-2"><Plus size={18}/> Thêm câu hỏi</button>
                            </div>
                            <div className="space-y-2">{questions.map((q,i)=><div key={i} className="p-2 bg-slate-800 rounded border border-slate-700 text-sm"><span className="font-bold">Câu {i+1}:</span> {q.text}</div>)}</div>
                        </div>
                        <div className="p-4 border-t border-slate-700 flex justify-end gap-2"><button onClick={onCancel} className="px-4 py-2 hover:text-white text-slate-400">Hủy</button><button onClick={save} className="px-6 py-2 bg-cyan-600 rounded font-bold hover:bg-cyan-500">Lưu Đề</button></div>
                        {showImport && <ImportModal onClose={()=>setShowImport(false)} onImport={handleImport} />}
                    </div>
                </div>
            );
        };

        // --- MAIN APP ---
        function App() {
            if (!isConfigured) return <ConfigError />;

            const [user, setUser] = useState(null);
            const [userProfile, setUserProfile] = useState(null); // Lưu thông tin VIP
            const [view, setView] = useState('loading');
            const [exams, setExams] = useState([]);
            const [history, setHistory] = useState([]);
            const [activeExam, setActiveExam] = useState(null);
            const [lastResult, setLastResult] = useState(null);
            const [isCreatorOpen, setIsCreatorOpen] = useState(false);
            const [showPayment, setShowPayment] = useState(false);
            const [showUserManager, setShowUserManager] = useState(false);

            useEffect(() => {
                if (!auth) return;
                return onAuthStateChanged(auth, (u) => {
                    setUser(u);
                    if (u) {
                        setView('dashboard');
                        // Listen to profile changes (VIP status)
                        const unsubProfile = onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'users', u.uid), (doc) => {
                            if (doc.exists()) setUserProfile(doc.data());
                        });
                        return () => unsubProfile();
                    } else {
                        setView('auth');
                        setUserProfile(null);
                    }
                });
            }, []);

            const isAdmin = user && ADMIN_EMAILS.includes(user.email);

            useEffect(() => {
                if (!user || !db) return;
                const unsubExams = onSnapshot(query(collection(db, 'artifacts', appId, 'public', 'data', 'exams'), orderBy('createdAt', 'desc')), 
                    (snap) => setExams(snap.docs.map(d => ({ id: d.id, ...d.data() }))));
                const unsubHistory = onSnapshot(query(collection(db, 'artifacts', appId, 'users', user.uid, 'history'), orderBy('date', 'desc')), 
                    (snap) => setHistory(snap.docs.map(d => ({ id: d.id, ...d.data(), date: d.data().date?.toDate() }))));
                return () => { unsubExams(); unsubHistory(); };
            }, [user]);

            const handleStartExam = (exam) => {
                const isFreeExam = exam.title.toLowerCase().includes("thử") || exam.title.toLowerCase().includes("demo");

                // Nếu là Admin thì được thi luôn, không cần check VIP
                if (!isAdmin && !userProfile?.isPremium && !isFreeExam) {
                    setShowPayment(true);
                    return;
                }

                if (confirm(`Bắt đầu thi "${exam.title}"?`)) {
                    setActiveExam(exam);
                    setView('exam');
                }
            };

            const handleCreateExam = async (data) => {
                try {
                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'exams'), { ...data, authorId: user.uid, authorName: user.displayName });
                    setIsCreatorOpen(false);
                } catch (e) { alert("Lỗi lưu: " + e.message); }
            };

            if (view === 'loading') return <div className="min-h-screen bg-slate-900 flex items-center justify-center text-cyan-500"><Loader2 className="animate-spin"/></div>;
            if (view === 'auth') return <AuthScreen />;
            if (view === 'exam' && activeExam) return <ExamInterface exam={activeExam} onFinish={(res) => { setLastResult(res); setActiveExam(null); setView('result'); }} />;

            return (
                <div className={`min-h-screen ${GRADIENTS.secondary} text-slate-200 font-sans`}>
                    <nav className="bg-slate-900/80 backdrop-blur border-b border-slate-700 sticky top-0 z-40">
                        <div className="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
                            <div className="flex items-center gap-2"><div className="bg-gradient-to-tr from-cyan-500 to-blue-600 p-2 rounded-lg"><Activity size={20} className="text-white"/></div><span className="font-bold text-xl bg-clip-text text-transparent bg-gradient-to-r from-cyan-400 to-blue-400">MedExam Pro</span></div>
                            <div className="flex items-center gap-4">
                                {isAdmin ? (
                                    <span className="px-3 py-1 rounded-full bg-red-500/20 text-red-400 border border-red-500/50 text-xs font-bold flex items-center gap-1"><ShieldCheck size={12}/> ADMINISTRATOR</span>
                                ) : userProfile?.isPremium ? (
                                    <span className="px-3 py-1 rounded-full bg-yellow-500/20 text-yellow-400 border border-yellow-500/50 text-xs font-bold flex items-center gap-1"><Crown size={12}/> VIP MEMBER</span>
                                ) : (
                                    <button onClick={() => setShowPayment(true)} className="px-3 py-1 rounded-full bg-slate-700 hover:bg-slate-600 text-slate-300 text-xs font-medium border border-slate-600 flex items-center gap-1">Nâng cấp VIP</button>
                                )}
                                <div className="flex items-center gap-2">
                                    <span className="hidden md:block text-sm text-slate-400">{user.displayName}</span>
                                    <button onClick={() => signOut(auth)} className="p-2 hover:bg-slate-800 rounded-full text-slate-400"><LogOut size={20}/></button>
                                </div>
                            </div>
                        </div>
                    </nav>

                    <main className="max-w-7xl mx-auto px-4 py-8 space-y-8">
                        {view === 'result' && lastResult && (
                            <div className="fixed inset-0 bg-black/90 z-50 flex items-center justify-center p-4">
                                <div className="bg-slate-900 w-full max-w-lg rounded-2xl border border-slate-700 p-8 text-center relative overflow-hidden">
                                    <div className="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-cyan-500 to-blue-600"></div>
                                    <Award size={64} className={`mx-auto mb-4 ${Number(lastResult.score)>=5?'text-yellow-400':'text-slate-500'}`}/>
                                    <h2 className="text-3xl font-bold text-white mb-2">{lastResult.score} điểm</h2>
                                    <p className="text-slate-400 mb-6">Bạn đã làm đúng {lastResult.correctCount}/{lastResult.totalQuestions} câu</p>
                                    <button onClick={()=>{setLastResult(null); setView('dashboard');}} className={`w-full py-3 rounded-lg font-bold text-white ${GRADIENTS.primary}`}>Về trang chủ</button>
                                </div>
                            </div>
                        )}

                        <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                            <div><h1 className="text-3xl font-bold text-white">Thư viện đề thi</h1><p className="text-slate-400 mt-1">Luyện tập kiến thức chuyên ngành</p></div>
                            <div className="flex gap-2">
                                {isAdmin && <button onClick={() => setShowUserManager(true)} className="px-4 py-2 bg-slate-800 hover:bg-slate-700 border border-slate-700 rounded-lg text-slate-300 font-medium flex items-center gap-2"><Users size={18}/> Quản lý Users</button>}
                                {isAdmin && <button onClick={() => setIsCreatorOpen(true)} className={`${GRADIENTS.accent} px-5 py-2 rounded-lg font-bold text-white shadow-lg flex items-center gap-2 hover:brightness-110`}><Plus size={18}/> Soạn đề mới</button>}
                            </div>
                        </div>

                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                            {exams.map((exam) => {
                                const isFree = exam.title.toLowerCase().includes("thử") || exam.title.toLowerCase().includes("demo");
                                // Admin không bao giờ bị khóa
                                const isLocked = !isAdmin && !userProfile?.isPremium && !isFree;
                                
                                return (
                                    <div key={exam.id} className={`${GRADIENTS.card} rounded-xl p-6 hover:border-cyan-500/50 transition-all group relative overflow-hidden`}>
                                        <div className="absolute top-0 right-0 p-4 opacity-10"><Activity size={64}/></div>
                                        <div className="flex justify-between items-start mb-2">
                                            <h3 className="text-xl font-bold text-white pr-8">{exam.title}</h3>
                                            {isLocked && <Lock className="text-yellow-500 shrink-0" size={20} />}
                                        </div>
                                        <div className="flex items-center gap-4 text-sm text-slate-400 mb-6">
                                            <div className="flex items-center gap-1"><Clock size={14}/> {exam.duration}p</div>
                                            <div className="flex items-center gap-1"><FileText size={14}/> {exam.questions?.length} câu</div>
                                            {!isLocked && !isAdmin && !userProfile?.isPremium && <span className="text-emerald-400 text-xs font-bold border border-emerald-500/30 px-1 rounded">FREE</span>}
                                        </div>
                                        <button 
                                            onClick={() => handleStartExam(exam)}
                                            className={`w-full py-2.5 rounded-lg font-medium transition-colors flex items-center justify-center gap-2 ${isLocked ? 'bg-slate-800 text-slate-500 cursor-not-allowed border border-slate-700' : 'bg-slate-700 hover:bg-cyan-600 hover:text-white text-slate-200'}`}
                                        >
                                            {isLocked ? 'Yêu cầu VIP' : 'Bắt đầu thi'}
                                        </button>
                                    </div>
                                );
                            })}
                        </div>

                        <div className="mt-12">
                            <h2 className="text-2xl font-bold text-white mb-6 flex items-center gap-2"><History className="text-cyan-400"/> Lịch sử làm bài</h2>
                            <div className="bg-slate-800/50 rounded-xl border border-slate-700 overflow-hidden">
                                <table className="w-full text-left text-sm">
                                    <thead className="bg-slate-800 text-slate-400 text-xs uppercase font-bold"><tr><th className="p-4">Đề thi</th><th className="p-4">Ngày</th><th className="p-4 text-center">Điểm</th></tr></thead>
                                    <tbody className="divide-y divide-slate-700">
                                        {history.length === 0 ? <tr><td colSpan="3" className="p-6 text-center text-slate-500">Chưa có lịch sử</td></tr> : 
                                        history.map(r => (
                                            <tr key={r.id} className="hover:bg-slate-800"><td className="p-4 text-white">{r.examTitle}</td><td className="p-4 text-slate-400">{r.date?.toLocaleDateString()}</td><td className="p-4 text-center font-bold text-cyan-400">{r.score}</td></tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        </div>

                        {isCreatorOpen && <ExamCreator onCancel={() => setIsCreatorOpen(false)} onSave={handleCreateExam} />}
                        {showPayment && <PaymentModal onClose={() => setShowPayment(false)} userEmail={user.email} />}
                        {showUserManager && <UserManager onClose={() => setShowUserManager(false)} />}
                    </main>
                </div>
            );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
