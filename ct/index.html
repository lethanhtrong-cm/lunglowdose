                category: "Sọ não & Đầu mặt cổ", 
                subheadings: [
                    { anchor: 's179-daicuong', title: 'I. Đại cương' },
                    { anchor: 's179-chidinh', title: 'II. Chỉ định' },
                    { anchor: 's179-chongchidinh', title: 'III. Chống chỉ định' },
                    { anchor: 's179-thantrong', title: 'IV. Thận trọng' },
                    { anchor: 's179-chuanbi', title: 'V. Chuẩn bị' },
                    { anchor: 's179-cacbuoctienhanh', title: 'VI. Các bước tiến hành' },
                    { anchor: 's179-theodoi', title: 'VII. Theo dõi và xử trí tai biến' },
                    { anchor: 's179-tailieu', title: 'Tài liệu tham khảo' },
                ],
                content: `<h2 id="s179-daicuong">I. ĐẠI CƯƠNG</h2><p>Chụp CLVT sọ não không tiêm thuốc cản quang là một kỹ thuật hình ảnh tiên tiến, áp dụng rộng rãi trong chẩn đoán bệnh lý thần kinh. CLVT dùng để thăm khám các bệnh lý nội sọ, xương sọ rất hiệu quả bao gồm các bệnh lý nội khoa cũng như ngoại khoa. CLVT không tiêm thuốc cản quang có khả năng đánh giá nhu mô não, các cấu trúc khác như xương sọ, hệ thống xoang cạnh mũi và phần mềm da đầu.</p><h2 id="s179-chidinh">II. CHỈ ĐỊNH</h2><ul><li>Các trường hợp chấn thương sọ não nghi ngờ có tổn thương chảy máu nội sọ, dị vật, lún sọ...</li><li>Nghi ngờ các bệnh lý nội sọ: U não trong trục cũng như ngoài trục</li><li>Viêm não, áp xe não</li><li>Dị dạng mạch máu não, thông động tĩnh mạch cảnh xoang hang...</li><li>Dị dạng bẩm sinh: lạc chỗ chất xám, bệnh não chẻ...</li><li>Động kinh</li><li>Đột quỵ: Nhồi máu não, chảy máu não các giai đoạn (chảy máu nhu mô, chảy máu dưới nhện, chảy máu não thất...). Nhồi máu động mạch, nhồi máu tĩnh mạch</li><li>Theo dõi sau điều trị, theo dõi tiến triển của máu tụ...</li><li>Một số chỉ định khác theo hướng dẫn chẩn đoán và điều trị do Bộ Y tế ban hành</li></ul><h2 id="s179-chongchidinh">III. CHỐNG CHỈ ĐỊNH</h2><p>Không có chống chỉ định.</p><h2 id="s179-thantrong">IV. THẬN TRỌNG</h2><p>Phụ nữ có thai</p><h2 id="s179-chuanbi">V. CHUẨN BỊ</h2><h3>1. Người thực hiện</h3><ul><li>Bác sỹ chẩn đoán hình ảnh.</li><li>Kỹ thuật y hình ảnh y học</li><li>Điều dưỡng</li><li>* Ghi chú: Bác sỹ gây mê, kỹ thuật viên gây mê (nếu người bệnh không hợp tác, đặc biệt đối với trẻ em).</li></ul><h3>2. Thuốc, hóa chất</h3><ul><li>Dung dịch sát khuẩn bề mặt thiết bị</li><li>Dung dịch sát khuẩn tay</li><li>Dung dịch rửa tay thường quy</li></ul><h3>3. Vật tư</h3><ul><li>Phim, bao phim (nếu in phim)</li><li>Đĩa DVD (nếu cần)</li><li>Bộ áo, váy và cổ chì</li></ul><h3>4. Trang thiết bị</h3><ul><li>Máy chụp cắt lớp vi tính đa lát</li><li>Hệ thống lưu trữ và truyền ảnh, máy trạm xử lý và đọc ảnh (PACS). Máy in phim (nếu in phim)</li></ul><h3>5. Người bệnh</h3><ul><li>Người bệnh và người nhà người bệnh được giải thích kỹ về thủ thuật để phối hợp với thầy thuốc.</li><li>Tháo bỏ khuyên tai, vòng cổ, cặp tóc nếu có</li><li>Người bệnh quá kích thích, không nằm yên: Cần cho thuốc an thần...</li></ul><h3>6. Hồ sơ bệnh án</h3><ul><li>Có phiếu chỉ định CLVT sọ não không tiêm thuốc cản quang</li><li>Hồ sơ bệnh án đối với người bệnh nội trú hoặc các kết quả thăm khám lần trước đối với người bệnh ngoại trú.</li></ul><h3>7. Thời gian thực hiện</h3><p>Khoảng 12 - 20 phút</p><h3>8. Địa điểm thực hiện kỹ thuật</h3><p>Tại phòng chụp cắt lớp vi tính đảm bảo tiêu chuẩn về an toàn bức xạ. Trẻ em: cần che chắn bộ phận sinh dục</p><h3>9. Kiểm tra hồ sơ và người bệnh</h3><p>a) Kiểm tra người bệnh: Đánh giá chính xác người bệnh: đúng người bệnh, đúng chẩn đoán, đúng vị trí cần thực hiện kỹ thuật.<br>b) Thực hiện bảng kiểm an toàn điện quang.<br>c) Đặt tư thế bệnh: Người bệnh được nằm ngửa trên bàn chụp, đầu vào trước, 2 chân duỗi thẳng, hai tay xuôi theo người, cố định đầu... Di chuyển bàn chụp vào trong máy với định vị cho vùng thăm khám.</p><h2 id="s179-cacbuoctienhanh">VI. CÁC BƯỚC TIẾN HÀNH</h2><ul><li><strong>Bước 1:</strong> Nhập tên, tuổi người bệnh vào máy chụp.</li><li><strong>Bước 2:</strong> Chụp định vị: Đặt các lớp cắt ngang liên tục theo mặt phẳng song song với đường nối bờ ngoài hốc mắt với lỗ tai ngoài, từ ụ cằm đến đỉnh sọ.</li><li><strong>Bước 3:</strong> Chụp không tiêm thuốc cản quang. Đặt chương trình chụp sọ não cắt thường theo hai trình trên lều và dưới lều (độ dày trên lều 7-8mm, dưới lều 2-3mm) hoặc cắt xoắn ốc 5mm toàn bộ sọ não, tái tạo 3mm (có thể tái tạo mỏng hơn nếu nghi ngờ tổn thương xương hoặc tầng trước nền sọ, hoặc có khối bất thường vùng lều tiểu não). Tiến hành cho phát tia và xử trí hình ảnh thu được trên màn hình trạm làm việc, chuyển hình ảnh sang PACS hoặc in phim, đọc kết quả.</ul><h3>Nhận định kết quả</h3><p>Bác sỹ đọc tổn thương, mô tả trên máy tính kết nối nội bộ và in kết quả (nếu cần). Phát hiện các tổn thương, thay đổi bất thường về tỷ trọng, hình thái của não, màng não, xương, xoang và phần mềm.</p><h2 id="s179-theodoi">VII. THEO DÕI VÀ XỬ TRÍ TAI BIẾN</h2><p>Một số trường hợp có thể phải thực hiện lại kỹ thuật như: người bệnh không giữ bất động trong quá trình chụp phim, không bộc lộ rõ nét hình ảnh. Kỹ thuật không có tai biến.</p><h2 id="s179-tailieu">TÀI LIỆU THAM KHẢO</h2><ol><li>McCollough CH, Leng S, Yu L, Fletcher JG. Dual- and Multi-Energy CT: Principles, Technical Approaches, and Clinical Applications. Radiology. 2015;276(3):637-653.</li><li>Reddinger, Handbook of CT Technique (Computed Tomography Series), WileyBlackwell, 2000.</li><li>Bộ Y tế, “Hướng dẫn quy trình kỹ thuật chẩn đoán hình ảnh và điện quang can thiệp”, Nhà xuất bản y học, 2014.</li></ol>` 
            },
            { 
                id: 180, 
                title: "Chụp CLVT Sọ Não Có Tiêm Thuốc Cản Quang", 
                procedure: "Quy trình 180", 
                category: "Sọ não & Đầu mặt cổ", 
                subheadings: [
                    { anchor: 's180-daicuong', title: 'I. Đại cương' },
                    { anchor: 's180-chidinh', title: 'II. Chỉ định' },
                    { anchor: 's180-chongchidinh', title: 'III. Chống chỉ định' },
                    { anchor: 's180-thantrong', title: 'IV. Thận trọng' },
                    { anchor: 's180-chuanbi', title: 'V. Chuẩn bị' },
                    { anchor: 's180-cacbuoctienhanh', title: 'VI. Các bước tiến hành' },
                    { anchor: 's180-theodoi', title: 'VII. Theo dõi và xử trí tai biến' },
                    { anchor: 's180-tailieu', title: 'Tài liệu tham khảo' },
                ],
                content: `<h2 id="s180-daicuong">I. ĐẠI CƯƠNG</h2><p>Chụp CLVT sọ não có tiêm thuốc cản quang là một kỹ thuật hình ảnh tiến tiến, áp dụng rộng rãi trong chẩn đoán bệnh lý thần kinh. CLVT thăm khám các bệnh lý nội sọ, xương sọ rất hiệu quả, đánh giá mức độ tăng sinh mạch của các khối u, góp phần phân bậc của khối u, đánh giá mức độ ngấm thuốc của các tổn thương u, viêm nhiễm nhu mô não, màng não.</p><h2 id="s180-chidinh">II. CHỈ ĐỊNH</h2><ul><li>Các bệnh lý nội sọ: Nghi ngờ u não trong trục và ngoài trục</li><li>Nghi ngờ viêm não màng não, áp xe não</li><li>Dị dạng mạch máu não đã phát hiện hoặc nghi ngờ trên phim chụp không tiêm thuốc</li><li>Tụ máu dưới màng cứng đồng tỷ trọng nhu mô não, không rõ ràng về ranh giới, vị trí màng não...</li><li>Theo dõi sau điều trị.</li><li>Một số chỉ định khác theo hướng dẫn chẩn đoán và điều trị do Bộ Y tế ban hành</li></ul><h2 id="s180-chongchidinh">III. CHỐNG CHỈ ĐỊNH</h2><p>Không có chống chỉ định.</p><h2 id="s180-thantrong">IV. THẬN TRỌNG</h2><ul><li>Người bệnh có thai</li><li>Người bệnh có chống chỉ định dùng thuốc cản quang i-ốt.</li><li>Trong vùng thăm khám (sọ não) có nhiều kim loại gây nhiễu ảnh</li><li>Tiền sử dị ứng</li></ul><h2 id="s180-chuanbi">V. CHUẨN BỊ</h2><h3>1. Người thực hiện</h3><ul><li>Bác sỹ chẩn đoán hình ảnh.</li><li>Kỹ thuật y hình ảnh y học</li><li>Điều dưỡng</li><li>* Ghi chú: Bác sỹ gây mê, kỹ thuật viên gây mê (nếu người bệnh không hợp tác, đặc biệt đối với trẻ em).</li></ul><h3>2. Thuốc, hóa chất</h3><ul><li>Thuốc cản quang tan trong nước</li><li>Dung dịch sát khuẩn da, niêm mạc</li><li>Nước cất hoặc nước muối sinh lý</li></ul><h3>3. Vật tư</h3><ul><li>Bơm tiêm 10; 20ml</li><li>Bơm tiêm cho máy bơm điện</li><li>Kim tiêm 18-20G</li><li>Găng tay khám, mũ, khẩu trang</li><li>Bộ khay quả đậu, kẹp phẫu thuật.</li><li>Bông, gạc phẫu thuật.</li><li>Hộp thuốc và dụng cụ cấp cứu tai biến thuốc cản quang.</li><li>Phim, bao phim (nếu in phim)</li><li>Đĩa DVD (nếu cần)</li><li>Bộ áo, váy và cổ chì</li></ul><h3>4. Trang thiết bị</h3><ul><li>Máy chụp cắt lớp vi tính đa lát cắt</li><li>Máy bơm điện chuyên dụng</li><li>Hệ thống lưu trữ và truyền ảnh, máy trạm xử lý và đọc ảnh (PACS). Máy in phim (nếu in phim)</li></ul><h3>5. Người bệnh</h3><ul><li>Người bệnh và người nhà người bệnh được giải thích kỹ về thủ thuật để phối hợp với thầy thuốc.</li><li>Tháo bỏ khuyên tai, vòng cổ, cặp tóc nếu có</li><li>Cần nhịn ăn, uống trước 4 giờ. Có thể uống không quá 50ml nước.</li><li>Người bệnh quá kích thích, không nằm yên: Cần cho thuốc an thần...</li></ul><h3>6. Hồ sơ bệnh án</h3><ul><li>Có phiếu chỉ định chụp CLVT sọ não có tiêm thuốc cản quang</li><li>Hồ sơ bệnh án đối với người bệnh nội trú hoặc các kết quả thăm khám lần trước đối với người bệnh ngoại trú.</li></ul><h3>7. Thời gian thực hiện</h3><p>Khoảng 20 - 30 phút</p><h3>8. Địa điểm thực hiện kỹ thuật</h3><p>Tại phòng chụp cắt lớp vi tính đảm bảo tiêu chuẩn về an toàn bức xạ. Trẻ em: cần che chắn bộ phận sinh dục</p><h3>9. Kiểm tra hồ sơ và người bệnh</h3><p>a) Kiểm tra người bệnh: Đánh giá chính xác người bệnh: đúng người bệnh, đúng chẩn đoán, đúng vị trí cần thực hiện kỹ thuật.<br>b) Thực hiện bảng kiểm an toàn điện quang.<br>c) Đặt tư thế bệnh: Người bệnh được nằm ngửa trên bàn chụp. Di chuyển bàn chụp vào trong máy với định vị cho vùng thăm khám.</p><h2 id="s180-cacbuoctienhanh">VI. CÁC BƯỚC TIẾN HÀNH</h2><ul><li><strong>Bước 1:</strong> Nhập tên, tuổi người bệnh vào máy chụp, đặt đường truyền tĩnh mạch.</li><li><strong>Bước 2:</strong> Chụp định vị: Đặt các lớp cắt ngang liên tục theo mặt phẳng song song với đường nối bờ ngoài hốc mắt với lỗ tai ngoài, từ ụ cằm đến đỉnh sọ.</li><li><strong>Bước 3:</strong> Chụp trước tiêm. Xem xét tổn thương để quyết định tiêm thuốc cản quang. Đặt chương trình chụp sọ não cắt thường theo hai trình trên lều và dưới lều (độ dày trên lều 7-8mm, dưới lều 2-3mm) hoặc cắt xoắn ốc 5mm toàn bộ sọ não, tái tạo 3mm (có thể tái tạo mỏng hơn nếu nghi ngờ tổn thương xương hoặc tầng trước nền sọ, hoặc có khối bất thường vùng lều tiểu não).</li><li><strong>Bước 4:</strong> Tiến hành tiêm thuốc cản quang tĩnh mạch bằng tay hoặc bằng máy, liều lượng thông thường 1-1.5ml/kg cân nặng.</li><li><strong>Bước 5:</strong> Tiến hành cho phát tia và xử trí hình ảnh thu được trên màn hình trạm làm việc, chuyển hình ảnh sang PACS hoặc in phim, đọc kết quả.</li><li><strong>Bước 6:</strong> Theo dõi người bệnh sau khi chụp. Băng ép chặt tại vị trí rút kim tránh chảy máu. Theo dõi phản ứng dị ứng muộn của thuốc cản quang.</li></ul><h3>Nhận định kết quả</h3><p>Bác sỹ đọc tổn thương, mô tả trên máy tính kết nối nội bộ và in kết quả (nếu cần). Phát hiện các tổn thương, thay đổi bất thường về tỷ trọng, hình thái của não, màng não, xương, xoang và phần mềm trước và sau tiêm thuốc đối quang.</p><h2 id="s180-theodoi">VII. THEO DÕI VÀ XỬ TRÍ TAI BIẾN</h2><p>Một số trường hợp có thể phải thực hiện lại kỹ thuật như: người bệnh không giữ bất động trong quá trình chụp phim, không bộc lộ rõ nét hình ảnh. Tai biến liên quan đến thuốc cản quang: Xem thêm quy trình 322. Chẩn đoán và xử trí tai biến liên quan đến thuốc đối quang.</p><h2 id="s180-tailieu">TÀI LIỆU THAM KHẢO</h2><ol><li>McCollough CH, Leng S, Yu L, Fletcher JG. Dual- and Multi-Energy CT: Principles, Technical Approaches, and Clinical Applications. Radiology. 2015;276(3):637-653.</li><li>Reddinger, Handbook of CT Technique (Computed Tomography Series), WileyBlackwell, 2000.</li><li>Bộ Y tế, “Hướng dẫn quy trình kỹ thuật chẩn đoán hình ảnh và điện quang can thiệp”, Nhà xuất bản y học, 2014.</li></ol>`

                content: `<h2 id="s181-daicuong">I. ĐẠI CƯƠNG</h2><p>Chụp CLVT hệ động mạch cảnh có tiêm thuốc cản quang là một kỹ thuật hình ảnh tiến tiến, áp dụng rộng rãi trong chẩn đoán bệnh lý mạch máu thần kinh. Chụp mạch bằng CLVT làm giảm các nguy cơ tai biến so với thủ thuật xâm nhập trong chụp mạch số hóa xóa nền nhưng vẫn đảm bảo được chẩn đoán với độ nhạy và độ đặc hiệu cao.</p><h2 id="s181-chidinh">II. CHỈ ĐỊNH</h2><ul><li>Hẹp động mạch cảnh, sống (phát hiện trên siêu âm Doppler). Tắc cấp tính hoặc mạn tính hệ mạch cảnh- sống (đoạn ngoài sọ).</li><li>Bóc tách động mạch cảnh, động mạch sống</li><li>Bất thường giải phẫu hệ mạch cảnh- sống, tổng kê trước mổ bắc cầu nối...</li><li>Loạn sản thành động mạch (động mạch giãn to và dài)</li><li>Theo dõi sau điều trị ngoại khoa cũng như can thiệp.</li><li>Một số chỉ định khác theo hướng dẫn chẩn đoán và điều trị do Bộ Y tế ban hành</li></ul><h2 id="s181-chongchidinh">III. CHỐNG CHỈ ĐỊNH</h2><p>Không có chống chỉ định.</p><h2 id="s181-thantrong">IV. THẬN TRỌNG</h2><ul><li>Người bệnh có thai</li><li>Người bệnh có chống chỉ định dùng thuốc cản quang i-ốt.</li><li>Trong vùng thăm khám có nhiều kim loại gây nhiễu ảnh</li></ul><h2 id="s181-chuanbi">V. CHUẨN BỊ</h2><h3>1. Người thực hiện</h3><ul><li>Bác sỹ chẩn đoán hình ảnh.</li><li>Kỹ thuật y hình ảnh y học</li><li>Điều dưỡng</li><li>* Ghi chú: Bác sỹ gây mê, kỹ thuật viên gây mê (nếu người bệnh không hợp tác, đặc biệt đối với trẻ em).</li></ul><h3>2. Thuốc, hóa chất</h3><ul><li>Thuốc cản quang tan trong nước</li><li>Dung dịch sát khuẩn da, niêm mạc</li><li>Nước cất hoặc nước muối sinh lý</li></ul><h3>3. Vật tư</h3><ul><li>Bơm tiêm 10; 20ml</li><li>Bơm tiêm cho máy bơm điện</li><li>Kim tiêm 18-20G</li><li>Găng tay khám, mũ, khẩu trang</li><li>Bộ khay quả đậu, kẹp phẫu thuật.</li><li>Bông, gạc phẫu thuật.</li><li>Hộp thuốc và dụng cụ cấp cứu tai biến thuốc cản quang.</li><li>Phim, bao phim (nếu in phim)</li><li>Đĩa DVD (nếu cần)</li><li>Bộ áo, váy và cổ chì</li></ul><h3>4. Trang thiết bị</h3><ul><li>Máy chụp cắt lớp vi tính đa lát cắt (từ 64 lát trở lên)</li><li>Máy bơm điện chuyên dụng</li><li>Hệ thống lưu trữ và truyền ảnh, máy trạm xử lý và đọc ảnh (PACS). Máy in phim (nếu in phim)</li></ul><h3>5. Người bệnh</h3><ul><li>Người bệnh và người nhà người bệnh được giải thích kỹ về thủ thuật để phối hợp với thầy thuốc.</li><li>Tháo bỏ khuyên tai, vòng cổ, cặp tóc nếu có</li><li>Cần nhịn ăn, uống trước 4 giờ. Có thể uống không quá 50ml nước.</li><li>Người bệnh quá kích thích, không nằm yên: Cần cho thuốc an thần...</li></ul><h3>6. Hồ sơ bệnh án</h3><ul><li>Có phiếu chỉ định chụp CLVT hệ động mạch cảnh có tiêm thuốc cản quang</li><li>Hồ sơ bệnh án đối với người bệnh nội trú hoặc các kết quả thăm khám lần trước đối với người bệnh ngoại trú.</li></ul><h3>7. Thời gian thực hiện</h3><p>Khoảng 20 - 30 phút</p><h3>8. Địa điểm thực hiện kỹ thuật</h3><p>Tại phòng chụp cắt lớp vi tính đảm bảo tiêu chuẩn về an toàn bức xạ. Trẻ em: cần che chắn bộ phận sinh dục</p><h3>9. Kiểm tra hồ sơ và người bệnh</h3><p>a) Kiểm tra người bệnh: Đánh giá chính xác người bệnh: đúng người bệnh, đúng chẩn đoán, đúng vị trí cần thực hiện kỹ thuật.<br>b) Thực hiện bảng kiểm an toàn điện quang.<br>c) Đặt tư thế bệnh: Người bệnh được nằm ngửa trên bàn chụp. Di chuyển bàn chụp vào trong máy với định vị cho vùng thăm khám.</p><h2 id="s181-cacbuoctienhanh">VI. CÁC BƯỚC TIẾN HÀNH</h2><ul><li><strong>Bước 1:</strong> Đặt người bệnh. Định vị vùng chụp: Từ cung động mạch chủ đến đỉnh sọ. Thiết lập thông số chụp phù hợp.</li><li><strong>Bước 2:</strong> Đặt trường chụp sọ não theo một trình cho vùng thăm khám trên, dưới lều.</li><li><strong>Bước 3:</strong> Chụp không tiêm thuốc.</li><li><strong>Bước 4:</strong> Đặt trường chụp vùng cổ ngang C4 làm test tìm đỉnh thuốc cản quang lên mạch não cao nhất, đo nhiều thì ở động mạch cảnh (lượng thuốc test thông thường là 10ml) hoặc có thể ước lượng theo thời gian tuần hoàn.</li><li><strong>Bước 5:</strong> Lựa chọn thời điểm chụp để phát tia X trong thì bơm thuốc, đặt trường chụp từ quai động mạch chủ cho tới hết nền sọ. Dò ngưỡng ngấm thuốc (bolus tracking): Vị trí ROI: quai động mạch chủ hoặc động mạch cảnh gốc. Bắt đầu chụp khi ngưỡng đạt 100-150 HU.</li><li><strong>Bước 7:</strong> Tiến hành bơm thuốc và chụp (có đuổi thuốc bằng nước muối sinh lý). Liều: 1.0-1.5 mL/kg (thường 80-100 mL). Tốc độ bơm: 4.0-5.0 mL/giây. Tiêm nối tiếp với 30-50 mL nước muối. Chụp thì động mạch: Ghi hình toàn bộ vùng khảo sát trong 5-7 giây.</li><li><strong>Bước 8:</strong> Hình ảnh thu được sẽ được dựng hình MIP, MPR, VRT để bộc lộ bệnh lý.</li><li><strong>Bước 9:</strong> Chuyển hình ảnh sang PACS hoặc in phim, đọc kết quả.</li><li><strong>Bước 10:</strong> Theo dõi người bệnh sau khi chụp. Băng ép chặt tại vị trí rút kim tránh chảy máu. Theo dõi phản ứng dị ứng muộn của thuốc cản quang.</li></ul><h3>Nhận định kết quả</h3><p>Bác sỹ đọc tổn thương, mô tả trên máy tính kết nối nội bộ và in kết quả (nếu cần). Đánh giá đầy đủ, chính xác hệ thống động mạch cảnh – đốt sống trên các hình ảnh tái tạo, phát hiện các tổn thương nếu có.</p><h2 id="s181-theodoi">VII. THEO DÕI VÀ XỬ TRÍ TAI BIẾN</h2><p>Một số trường hợp có thể phải thực hiện lại kỹ thuật như: người bệnh không giữ bất động trong quá trình chụp phim, không bộc lộ rõ nét hình ảnh. Tai biến liên quan đến thuốc cản quang: Xem thêm quy trình 322. Chẩn đoán và xử trí tai biến liên quan đến thuốc đối quang.</p><h2 id="s181-tailieu">TÀI LIỆU THAM KHẢO</h2><ol><li>McCollough CH, Leng S, Yu L, Fletcher JG. Dual- and Multi-Energy CT: Principles, Technical Approaches, and Clinical Applications. Radiology. 2015;276(3):637-653.</li><li>Reddinger, Handbook of CT Technique (Computed Tomography Series), WileyBlackwell, 2000.</li><li>Bộ Y tế, “Hướng dẫn quy trình kỹ thuật chẩn đoán hình ảnh và điện quang can thiệp”, Nhà xuất bản y học, 2014.</li></ol>`

                content: `<h2 id="s182-daicuong">I. ĐẠI CƯƠNG</h2><p>Chụp CLVT tưới máu não (CT perfusion) là một kỹ thuật hình ảnh tiến tiến, áp dụng trong các trường hợp đánh giá mức độ tưới máu não cho các trường hợp nghi ngờ bất thường về tưới máu. Đặc biệt áp dụng trong đột quỵ nhồi máu não giai đoạn tối cấp để tìm vùng tranh tối tranh sáng (penumbra) là vùng có thể cứu được nếu sử dụng kịp thời các phương pháp điều trị thích hợp. Trong u não nó được dùng để đánh giá mức độ tăng sinh mạch máu, góp phần chẩn đoán phân bậc của u não.</p><h2 id="s182-chidinh">II. CHỈ ĐỊNH</h2><ul><li>Đột quỵ: Nhồi máu não giai đoạn tối cấp, giai đoạn cấp.</li><li>Các u não cần đánh giá mức độ tăng sinh mạch máu</li><li>Các trường hợp hẹp mạch não nghi ngờ có ảnh hưởng tới tưới máu não.</li><li>Theo dõi sau điều trị lấy huyết khối động mạch hoặc sau điều trị tiêu sợi huyết...</li><li>Một số chỉ định khác theo hướng dẫn chẩn đoán và điều trị do Bộ Y tế ban hành</li></ul><h2 id="s182-chongchidinh">III. CHỐNG CHỈ ĐỊNH</h2><p>Không có chống chỉ định.</p><h2 id="s182-thantrong">IV. THẬN TRỌNG</h2><ul><li>Người bệnh có thai</li><li>Người bệnh có chống chỉ định dùng thuốc cản quang i-ốt.</li><li>Trong vùng thăm khám (sọ não) có nhiều kim loại gây nhiễu ảnh</li></ul><h2 id="s182-chuanbi">V. CHUẨN BỊ</h2><h3>1. Người thực hiện</h3><ul><li>Bác sỹ chẩn đoán hình ảnh.</li><li>Kỹ thuật y hình ảnh y học</li><li>Điều dưỡng</li><li>* Ghi chú: Bác sỹ gây mê, kỹ thuật viên gây mê (nếu người bệnh không hợp tác, đặc biệt đối với trẻ em).</li></ul><h3>2. Thuốc, hóa chất</h3><ul><li>Thuốc cản quang tan trong nước</li><li>Dung dịch sát khuẩn da, niêm mạc</li><li>Nước cất hoặc nước muối sinh lý</li></ul><h3>3. Vật tư</h3><ul><li>Bơm tiêm 10; 20ml</li><li>Bơm tiêm cho máy bơm điện</li><li>Kim tiêm 18-20G</li><li>Găng tay khám, mũ, khẩu trang</li><li>Bộ khay quả đậu, kẹp phẫu thuật.</li><li>Bông, gạc phẫu thuật.</li><li>Hộp thuốc và dụng cụ cấp cứu tai biến thuốc cản quang.</li><li>Phim, bao phim (nếu in phim)</li><li>Đĩa DVD (nếu cần)</li><li>Bộ áo, váy và cổ chì</li></ul><h3>4. Trang thiết bị</h3><ul><li>Máy chụp cắt lớp vi tính đa lát cắt (từ 64 lát trở lên)</li><li>Máy bơm điện chuyên dụng</li><li>Hệ thống lưu trữ và truyền ảnh, máy trạm xử lý và đọc ảnh (PACS). Máy in phim (nếu in phim)</li></ul><h3>5. Người bệnh</h3><ul><li>Người bệnh và người nhà người bệnh được giải thích kỹ về thủ thuật để phối hợp với thầy thuốc.</li><li>Tháo bỏ khuyên tai, vòng cổ, cặp tóc nếu có</li><li>Người bệnh quá kích thích, không nằm yên: Cần cho thuốc an thần...</li></ul><h3>6. Hồ sơ bệnh án</h3><ul><li>Có phiếu chỉ định chụp CLVT tưới máu não (CT perfusion)</li><li>Hồ sơ bệnh án đối với người bệnh nội trú hoặc các kết quả thăm khám lần trước đối với người bệnh ngoại trú.</li></ul><h3>7. Thời gian thực hiện</h3><p>Khoảng 20 - 30 phút</p><h3>8. Địa điểm thực hiện kỹ thuật</h3><p>Tại phòng chụp cắt lớp vi tính đảm bảo tiêu chuẩn về an toàn bức xạ. Trẻ em: cần che chắn bộ phận sinh dục</p><h3>9. Kiểm tra hồ sơ và người bệnh</h3><p>a) Kiểm tra người bệnh: Đánh giá chính xác người bệnh: đúng người bệnh, đúng chẩn đoán, đúng vị trí cần thực hiện kỹ thuật.<br>b) Thực hiện bảng kiểm an toàn điện quang.<br>c) Đặt tư thế bệnh: Người bệnh được nằm ngửa trên bàn chụp. Di chuyển bàn chụp vào trong máy với định vị cho vùng thăm khám.</p><h2 id="s182-cacbuoctienhanh">VI. CÁC BƯỚC TIẾN HÀNH</h2><ul><li><strong>Bước 1:</strong> Nhập tên, tuổi người bệnh vào máy chụp.</li><li><strong>Bước 2:</strong> Chụp định vị: Đặt các lớp cắt ngang liên tục theo mặt phẳng song song với đường nối bờ ngoài hốc mắt với lỗ tai ngoài, từ ụ cằm đến đỉnh sọ.</li><li><strong>Bước 3:</strong> Chụp không tiêm thuốc cản quang. Đặt chương trình chụp sọ não cắt thường theo hai trình trên lều và dưới lều (độ dày trên lều 7-8mm, dưới lều 2-3mm) hoặc cắt xoắn ốc 5mm toàn bộ sọ não, tái tạo 3mm (có thể tái tạo mỏng hơn nếu nghi ngờ tổn thương xương hoặc tầng trước nền sọ, hoặc có khối bất thường vùng lều tiểu não).</li><li><strong>Bước 4:</strong> Đánh giá sơ bộ tổn thương, đánh giá nhu cầu và giá trị cần thiết để chụp tưới máu não.</li><li><strong>Bước 5:</strong> Tiến hành đặt tĩnh mạch bằng kim 18G, nối máy bơm tiêm điện 2 nòng (1 nòng thuốc, 1 nòng nước muối sinh lý).</li><li><strong>Bước 6:</strong> Đặt lớp chụp tại vị trí có tổn thương cần đánh giá tưới máu. Chụp theo chương trình cài đặt mặc định của máy.</li><li><strong>Bước 7:</strong> xử trí hình ảnh trên màn hình trạm làm việc, đo lưu lượng máu, cung lượng máu, thời gian cân chuyển trung bình, thời gian đạt đỉnh của vùng thăm khám. Kỹ thuật viên chuyển hình ảnh sang PACS hoặc in phim, bác sỹ đọc kết quả.</li><li><strong>Bước 8:</strong> Theo dõi người bệnh sau khi chụp. Băng ép chặt tại vị trí rút kim tránh chảy máu. Theo dõi phản ứng dị ứng muộn của thuốc cản quang.</li></ul><h3>Nhận định kết quả</h3><p>Bác sỹ đọc tổn thương, mô tả trên máy tính kết nối nội bộ và in kết quả (nếu cần). Đánh giá được vùng nhu mô não tranh tối, tranh sáng. Phát hiện được bất thường hệ thống động mạch não từ phần nền sọ đến vòm sọ.</p><h2 id="s182-theodoi">VII. THEO DÕI VÀ XỬ TRÍ TAI BIẾN</h2><p>Một số trường hợp có thể phải thực hiện lại kỹ thuật như: người bệnh không giữ bất động trong quá trình chụp phim, không bộc lộ rõ nét hình ảnh. Tai biến liên quan đến thuốc cản quang: Xem thêm quy trình 322. Chẩn đoán và xử trí tai biến liên quan đến thuốc đối quang.</p><h2 id="s182-tailieu">TÀI LIỆU THAM KHẢO</h2><ol><li>McCollough CH, Leng S, Yu L, Fletcher JG. Dual- and Multi-Energy CT: Principles, Technical Approaches, and Clinical Applications. Radiology. 2015;276(3):637-653.</li><li>Reddinger, Handbook of CT Technique (Computed Tomography Series), WileyBlackwell, 2000.</li><li>Bộ Y tế, “Hướng dẫn quy trình kỹ thuật chẩn đoán hình ảnh và điện quang can thiệp”, Nhà xuất bản y học, 2014.</li></ol>` 
            },

                ],
                content: `<h2 id="s183-daicuong">I. ĐẠI CƯƠNG</h2><p>Chụp CLVT mạch máu não là một kỹ thuật hình ảnh tiến tiến, áp dụng rộng rãi trong chẩn đoán bệnh lý mạch máu thần kinh. Chụp CLVT mạch máu não có khả năng chẩn đoán các dị dạng mạch máu não, phình mạch máu não, thông động mạch cảnh xoang hang hay các trường hợp cần đánh giá hẹp, tắc huyết khối động mạch não, các xoang tĩnh mạch.</p><h2 id="s183-chidinh">II. CHỈ ĐỊNH</h2><ul><li>Các trường hợp nghi bất thường mạch máu não như chảy máu dưới nhện, chảy máu nhu mô não, chảy máu não thất...</li><li>Dị dạng mạch máu não, động kinh nghi do dị dạng mạch máu não</li><li>Đột quỵ nhồi máu não. Nhồi máu động mạch, nhồi máu tĩnh mạch</li><li>Rò động tĩnh mạch màng cứng, thông động mạch cảnh xoang hang</li><li>Huyết khối tĩnh mạch, xoang tĩnh mạch não</li><li>Các trường hợp dị dạng mạch máu vùng da đầu</li><li>Các trường hợp u màng não cần đánh giá nguồn mạch nuôi u...</li><li>Theo dõi sau điều trị bệnh lý mạch máu não. Trong trường hợp can thiệp ngoại khoa hoặc nút mạch thì cần có yêu cầu máy 64 lớp cắt trở lên để đánh giá được cả vùng nhiễu của kim loại.</li><li>Một số chỉ định khác theo hướng dẫn chẩn đoán và điều trị do Bộ Y tế ban hành</li></ul><h2 id="s183-chongchidinh">III. CHỐNG CHỈ ĐỊNH</h2><p>Không có chống chỉ định.</p><h2 id="s183-thantrong">IV. THẬN TRỌNG</h2><ul><li>Người bệnh có thai</li><li>Người bệnh có chống chỉ định dùng thuốc cản quang i-ốt.</li><li>Trong vùng thăm khám (sọ não) có nhiều kim loại gây nhiễu ảnh</li></ul><h2 id="s183-chuanbi">V. CHUẨN BỊ</h2><h3>1. Người thực hiện</h3><ul><li>Bác sỹ chẩn đoán hình ảnh.</li><li>Kỹ thuật y hình ảnh y học</li><li>Điều dưỡng</li><li>* Ghi chú: Bác sỹ gây mê, kỹ thuật viên gây mê (nếu người bệnh không hợp tác, đặc biệt đối với trẻ em).</li></ul><h3>2. Thuốc, hóa chất</h3><ul><li>Thuốc cản quang tan trong nước</li><li>Dung dịch sát khuẩn da, niêm mạc</li><li>Nước cất hoặc nước muối sinh lý</li></ul><h3>3. Vật tư</h3><ul><li>Bơm tiêm 10; 20ml</li><li>Bơm tiêm cho máy bơm điện</li><li>Kim tiêm 18-20G</li><li>Găng tay khám, mũ, khẩu trang</li><li>Bộ khay quả đậu, kẹp phẫu thuật.</li><li>Bông, gạc phẫu thuật.</li><li>Hộp thuốc và dụng cụ cấp cứu tai biến thuốc cản quang.</li><li>Phim, bao phim (nếu in phim)</li><li>Đĩa DVD (nếu cần)</li><li>Bộ áo, váy và cổ chì</li></ul><h3>4. Trang thiết bị</h3><ul><li>Máy chụp cắt lớp vi tính đa lát cắt (từ 64 lát trở lên)</li><li>Máy bơm điện chuyên dụng</li><li>Hệ thống lưu trữ và truyền ảnh, máy trạm xử lý và đọc ảnh (PACS). Máy in phim (nếu in phim)</li></ul><h3>5. Người bệnh</h3><ul><li>Người bệnh và người nhà người bệnh được giải thích kỹ về thủ thuật để phối hợp với thầy thuốc.</li><li>Tháo bỏ khuyên tai, vòng cổ, cặp tóc nếu có</li><li>Cần nhịn ăn, uống trước 4 giờ. Có thể uống không quá 50ml nước.</li><li>Người bệnh quá kích thích, không nằm yên: Cần cho thuốc an thần...</li></ul><h3>6. Hồ sơ bệnh án</h3><ul><li>Có phiếu chỉ định chụp CLVT mạch máu não</li><li>Hồ sơ bệnh án đối với người bệnh nội trú hoặc các kết quả thăm khám lần trước đối với người bệnh ngoại trú.</li></ul><h3>7. Thời gian thực hiện</h3><p>Khoảng 20 - 30 phút</p><h3>8. Địa điểm thực hiện kỹ thuật</h3><p>Tại phòng chụp cắt lớp vi tính đảm bảo tiêu chuẩn về an toàn bức xạ. Trẻ em: cần che chắn bộ phận sinh dục</p><h3>9. Kiểm tra hồ sơ và người bệnh</h3><p>a) Kiểm tra người bệnh: Đánh giá chính xác người bệnh: đúng người bệnh, đúng chỉ định kỹ thuật phù hợp, đúng vị trí cần thực hiện kỹ thuật.<br>b) Thực hiện bảng kiểm an toàn điện quang<br>c) Đặt tư thế bệnh: Người bệnh được nằm ngửa trên bàn chụp. Di chuyển bàn chụp vào trong máy với định vị cho vùng thăm khám.</p><h2 id="s183-cacbuoctienhanh">VI. CÁC BƯỚC TIẾN HÀNH</h2><ul><li><strong>Bước 1:</strong> Tiến hành đặt tĩnh mạch bằng kim 18G, nối máy bơm tiêm điện 2 nòng (1 nòng thuốc, 1 nòng nước muối sinh lý). Lượng thuốc cản quang sử dụng thông thường khoảng 1 - 2 ml/kg cân nặng;</li><li><strong>Bước 2:</strong> Chụp định vị: Đặt trường chụp sọ não theo một trình cho vùng thăm khám trên, dưới lều.</li><li><strong>Bước 3:</strong> Chụp không tiêm thuốc cản quang để xóa nền.</li><li><strong>Bước 4:</strong> Chụp có tiêm thuốc. Thực hiện test bolus động mạch cảnh chung ở ngang mức đốt sống cổ C4; Lựa chọn thời điểm chụp để phát tia X trong thì bơm thuốc, đặt trường chụp từ C4 tới hết đỉnh sọ; Tiến hành bơm thuốc cản quang và chụp (có đuổi thuốc cản quang bằng nước muối sinh lý); Hình ảnh thu được sẽ được dựng hình hệ thống động mạch não để bộc lộ bệnh lý bằng các chương trình MIP, VRT, MPR.</li><li><strong>Bước 5:</strong> Chuyển hình ảnh sang PACS hoặc in phim, đọc kết quả.</li><li><strong>Bước 6:</strong> Theo dõi người bệnh sau khi chụp. Băng ép chặt tại vị trí rút kim tránh chảy máu. Theo dõi phản ứng dị ứng muộn của thuốc cản quang.</li></ul><h3>Nhận định kết quả</h3><p>Bác sỹ đọc tổn thương, mô tả trên máy tính kết nối nội bộ và in kết quả (nếu cần). Phát hiện các tổn thương, thay đổi bất thường về tỷ trọng, hình thái của não, màng não, xương, xoang và phần mềm trước và sau tiêm thuốc đối quang. Phát hiện được bất thường hệ thống động mạch não từ phần nền sọ đến vòm sọ.</p><h2 id="s183-theodoi">VII. THEO DÕI VÀ XỬ TRÍ TAI BIẾN</h2><p>Một số trường hợp có thể phải thực hiện lại kỹ thuật như: người bệnh không giữ bất động trong quá trình chụp phim, không bộc lộ rõ nét hình ảnh. Tai biến liên quan đến thuốc cản quang: Xem thêm quy trình 322. Chẩn đoán và xử trí tai biến liên quan đến thuốc đối quang.</p><h2 id="s183-tailieu">TÀI LIỆU THAM KHẢO</h2><ol><li>McCollough CH, Leng S, Yu L, Fletcher JG. Dual- and Multi-Energy CT: Principles, Technical Approaches, and Clinical Applications. Radiology. 2015;276(3):637-653.</li><li>Reddinger, Handbook of CT Technique (Computed Tomography Series), WileyBlackwell, 2000.</li><li>Bộ Y tế, “Hướng dẫn quy trình kỹ thuật chẩn đoán hình ảnh và điện quang can thiệp”, Nhà xuất bản y học, 2014.</li></ol>`

                content: `<h2 id="s184-daicuong">I. ĐẠI CƯƠNG</h2><p>Chụp CLVT sọ não có dựng hình 3D là kỹ thuật tiên tiến, giúp các nhà ngoại khoa định vị trong không gian vị trí của tổn thương, từ đó tìm hướng tiếp cận tổn thương nhanh nhất và an toàn nhất. Kỹ thuật dựng hình 3D bao gồm dựng hình 3D nhu mô não, dựng hình 3D hộp sọ và 3D mạch máu não.</p><h2 id="s184-chidinh">II. CHỈ ĐỊNH</h2><ul><li>Các trường hợp nghi bất thường mạch máu não như chảy máu dưới nhện, chảy máu nhu mô não, chảy máu não thất...</li><li>Dị dạng mạch máu não, phình động mạch não...</li><li>Các trường hợp lún sọ, dính khớp sọ sớm, biến dạng hộp sọ</li><li>Dị vật cản quang trong sọ.</li><li>Các trường hợp u não có chỉ định mổ hoặc tia xạ định vị nổi (stereotaxy). Hiện nay phương pháp chụp cộng hưởng từ đang được áp dụng có giá trị chẩn đoán tốt hơn và an toàn hơn.</li><li>Một số chỉ định khác theo hướng dẫn chẩn đoán và điều trị do Bộ Y tế ban hành</li></ul><h2 id="s184-chongchidinh">III. CHỐNG CHỈ ĐỊNH</h2><ul><li>Trong vùng thăm khám có nhiều kim loại gây nhiễu ảnh</li><li>Có chống chỉ định với thuốc đối quang i-ốt.</li></ul><h2 id="s184-thantrong">IV. THẬN TRỌNG</h2><ul><li>Người bệnh có thai</li><li>Người bệnh có chống chỉ định dùng thuốc cản quang i-ốt.</li></ul><h2 id="s184-chuanbi">V. CHUẨN BỊ</h2><h3>1. Người thực hiện</h3><ul><li>Bác sỹ chẩn đoán hình ảnh.</li><li>Kỹ thuật y hình ảnh y học</li><li>Điều dưỡng</li><li>* Ghi chú: Bác sỹ gây mê, kỹ thuật viên gây mê (nếu người bệnh không hợp tác, đặc biệt đối với trẻ em).</li></ul><h3>2. Thuốc, hóa chất</h3><ul><li>Thuốc cản quang tan trong nước</li><li>Dung dịch sát khuẩn da, niêm mạc</li><li>Nước cất hoặc nước muối sinh lý</li></ul><h3>3. Vật tư</h3><ul><li>Bơm tiêm 10; 20ml</li><li>Bơm tiêm cho máy bơm điện</li><li>Kim tiêm 18-20G</li><li>Găng tay khám, mũ, khẩu trang</li><li>Bộ khay quả đậu, kẹp phẫu thuật.</li><li>Bông, gạc phẫu thuật.</li><li>Hộp thuốc và dụng cụ cấp cứu tai biến thuốc cản quang.</li><li>Phim, bao phim (nếu in phim)</li><li>Đĩa DVD (nếu cần)</li><li>Bộ áo, váy và cổ chì</li></ul><h3>4. Trang thiết bị</h3><ul><li>Máy chụp cắt lớp vi tính đa lát cắt</li><li>Máy bơm điện chuyên dụng</li><li>Hệ thống lưu trữ và truyền ảnh, máy trạm xử lý và đọc ảnh (PACS). Máy in phim (nếu in phim)</li></ul><h3>5. Người bệnh</h3><ul><li>Người bệnh và người nhà người bệnh được giải thích kỹ về thủ thuật để phối hợp với thầy thuốc.</li><li>Tháo bỏ khuyên tai, vòng cổ, cặp tóc nếu có</li><li>Cần nhịn ăn, uống trước 4 giờ. Có thể uống không quá 50ml nước.</li><li>Người bệnh quá kích thích, không nằm yên: Cần cho thuốc an thần...</li></ul><h3>6. Hồ sơ bệnh án</h3><ul><li>Có phiếu chỉ định chụp cắt lớp vi tính sọ não có dựng hình 3D</li><li>Hồ sơ bệnh án đối với người bệnh nội trú hoặc các kết quả thăm khám lần trước đối với người bệnh ngoại trú.</li></ul><h3>7. Thời gian thực hiện</h3><p>Khoảng 20 - 30 phút</p><h3>8. Địa điểm thực hiện kỹ thuật</h3><p>Tại phòng chụp cắt lớp vi tính đảm bảo tiêu chuẩn về an toàn bức xạ. Trẻ em: cần che chắn bộ phận sinh dục</p><h3>9. Kiểm tra hồ sơ và người bệnh</h3><p>a) Kiểm tra người bệnh: Đánh giá chính xác người bệnh: đúng người bệnh, đúng chẩn đoán, đúng vị trí cần thực hiện kỹ thuật.<br>b) Thực hiện bảng kiểm an toàn điện quang<br>c) Đặt tư thế bệnh: Người bệnh được nằm ngửa trên bàn chụp. Di chuyển bàn chụp vào trong máy với định vị cho vùng thăm khám.</p><h2 id="s184-cacbuoctienhanh">VI. CÁC BƯỚC TIẾN HÀNH</h2><ul><li><strong>Bước 1:</strong> Đặt người bệnh. Người bệnh được nằm ngửa trên bàn chụp. Di chuyển bàn chụp vào trong máy với định vị tia sáng cho vùng thăm khám.</li><li><strong>Bước 2:</strong> Chụp định vị. Đặt trường chụp sọ não theo một trình cho vùng thăm khám trên, dưới lều. Tiến hành cho phát tia và xử trí hình ảnh đánh giá nhu mô não thu được trên màn hình trạm làm việc.</li><li><strong>Bước 3:</strong> Chụp không tiêm thuốc cản quang để xóa nền.</li><li><strong>Bước 4:</strong> Chụp tiêm thuốc cản quang. Tiến hành đặt tĩnh mạch bằng kim 18G, nối máy bơm tiêm điện 2 nòng (1 nòng thuốc, 1 nòng nước muối sinh lý). Lượng thuốc cản quang sử dụng thông thường 1.5 ml/kg cân nặng. Thực hiện test bolus ở động mạch cảnh chung ngang mức đốt sống cổ C4. Lựa chọn thời điểm chụp để phát tia X trong thì bơm thuốc, đặt trường chụp từ C4 tới hết vòm sọ. Tiến hành bơm thuốc cản quang và chụp, có đuổi thuốc bằng nước muối sinh lý.</li><li><strong>Bước 5:</strong> Xử lý hình ảnh: Hình ảnh thu được sẽ được dựng hình theo các chương trình MIP, MPR, VRT để bộc lộ bệnh lý. Dựng hình 3D có thể dựng theo hình mạch máu, dựng theo hình nhu mô não, dựng theo hình hộp sọ...</li><li><strong>Bước 6:</strong> Chuyển hình ảnh sang PACS hoặc in phim, đọc kết quả.</li><li><strong>Bước 7:</strong> Theo dõi người bệnh sau khi chụp. Băng ép chặt tại vị trí rút kim tránh chảy máu. Theo dõi phản ứng dị ứng muộn của thuốc cản quang.</li></ul><h3>Nhận định kết quả</h3><p>Bác sỹ đọc tổn thương, mô tả trên máy tính kết nối nội bộ và in kết quả (nếu cần). Phát hiện các tổn thương, thay đổi bất thường về tỷ trọng, hình thái của não, màng não, xương, xoang và phần mềm trước và sau tiêm thuốc đối quang. Phát hiện được bất thường hệ thống động mạch não từ phần nền sọ đến vòm sọ.</p><h2 id="s184-theodoi">VII. THEO DÕI VÀ XỬ TRÍ TAI BIẾN</h2><p>Sợ hãi, kích động: Động viên, an ủi người bệnh. Quá lo lắng, sợ hãi: có thể cho thuốc an thần với sự theo dõi của bác sỹ gây mê. Xử trí tai biến thuốc cản quang : xem thêm quy trình Chẩn đoán và xử trí tai biến thuốc đối quang. Một số trường hợp có thể phải thực hiện lại kỹ thuật như: người bệnh không giữ bất động trong quá trình chụp phim, không bộc lộ rõ nét hình ảnh. Tai biến liên quan đến thuốc cản quang: Xem thêm quy trình 322. Chẩn đoán và xử trí tai biến liên quan đến thuốc đối quang.</p><h2 id="s184-tailieu">TÀI LIỆU THAM KHẢO</h2><ol><li>Reddinger, Handbook of CT Technique (Computed Tomography Series), WileyBlackwell, 2000.</li><li>Sumeet Bhargava, Satish K Bhargava, CT and MRI Protocol - A Practical Approach, Third Edition, Peepee, 2016.</li></ol>` 
            },

                ],
                content: `<h2 id="s185-daicuong">I. ĐẠI CƯƠNG</h2><p>Chụp CLVT vùng hàm mặt để thăm khám các bệnh lý vùng hàm mặt, vùng mũi xoang, họng; bổ sung cho các kỹ thuật X-quang thông thường.</p><h2 id="s185-chidinh">II. CHỈ ĐỊNH</h2><ul><li>Chấn thương</li><li>Viêm, nhiễm trùng</li><li>Tổn thương u</li><li>Một số chỉ định khác theo hướng dẫn chẩn đoán và điều trị do Bộ Y tế ban hành</li></ul><h2 id="s185-chongchidinh">III. CHỐNG CHỈ ĐỊNH</h2><p>Không có chống chỉ định.</p><h2 id="s185-thantrong">IV. THẬN TRỌNG</h2><ul><li>Phụ nữ có thai, đặc biệt trong ba tháng đầu (phương tiện che chắn).</li><li>Trẻ nhỏ</li></ul><h2 id="s185-chuanbi">V. CHUẨN BỊ</h2><h3>1. Người thực hiện</h3><ul><li>Bác sỹ chẩn đoán hình ảnh.</li><li>Kỹ thuật y hình ảnh y học</li><li>Điều dưỡng</li><li>* Ghi chú: Bác sỹ gây mê, kỹ thuật viên gây mê (nếu người bệnh không hợp tác, đặc biệt đối với trẻ em).</li></ul><h3>2. Thuốc, hóa chất</h3><ul><li>Dung dịch sát khuẩn bề mặt thiết bị</li><li>Dung dịch sát khuẩn tay</li><li>Dung dịch rửa tay thường quy</li></ul><h3>3. Vật tư</h3><ul><li>Phim, bao phim (nếu in phim)</li><li>Đĩa DVD (nếu cần)</li><li>Bộ áo, váy và cổ chì</li></ul><h3>4. Trang thiết bị</h3><ul><li>Máy chụp cắt lớp vi tính đa lát cắt</li><li>Hệ thống lưu trữ và truyền ảnh, máy trạm xử lý và đọc ảnh (PACS). Máy in phim (nếu in phim)</li></ul><h3>5. Người bệnh</h3><ul><li>Người bệnh và người nhà người bệnh được giải thích kỹ về thủ thuật để phối hợp với thầy thuốc.</li><li>Tháo bỏ khuyên tai, vòng cổ, cặp tóc nếu có</li><li>Người bệnh quá kích thích, không nằm yên: Cần cho thuốc an thần...</li></ul><h3>6. Hồ sơ bệnh án</h3><ul><li>Có phiếu chỉ định chụp cắt lớp vi tính hàm mặt không tiêm thuốc cản quang</li><li>Hồ sơ bệnh án đối với người bệnh nội trú hoặc các kết quả thăm khám lần trước đối với người bệnh ngoại trú.</li></ul><h3>7. Thời gian thực hiện</h3><p>Khoảng 12 - 20 phút</p><h3>8. Địa điểm thực hiện kỹ thuật</h3><p>Tại phòng chụp cắt lớp vi tính đảm bảo tiêu chuẩn về an toàn bức xạ. Trẻ em: cần che chắn bộ phận sinh dục</p><h3>9. Kiểm tra hồ sơ và người bệnh</h3><p>a) Kiểm tra người bệnh: Đánh giá chính xác người bệnh: đúng người bệnh, đúng chẩn đoán, đúng vị trí cần thực hiện kỹ thuật.<br>b) Thực hiện bảng kiểm an toàn điện quang.<br>c) Đặt tư thế bệnh: Hướng cắt ngang người bệnh nằm ngửa. Hướng cắt đứng ngang người bệnh nằm ngửa đầu ngửa tối đa hoặc nằm sấp đầu ngửa tối đa. Di chuyển bàn chụp vào trong máy với định vị cho vùng thăm khám.</p><h2 id="s185-cacbuoctienhanh">VI. CÁC BƯỚC TIẾN HÀNH</h2><p>Chụp theo hai hướng cắt ngang và đứng ngang. Đối với các máy cắt lớp vi tính đa dây (từ 16 dãy trở lên) có thể chỉ cần thực hiện hướng cắt cắt ngang và tái tạo lại theo hướng đứng ngang và các hướng khác mà vẫn đảm bảo được chất lượng hình ảnh giống như chất lượng hình ảnh cắt ngang.</p><ul><li><strong>Bước 1: Hướng cắt ngang.</strong> Mặt phẳng cắt song song với khẩu cái cứng. Từ nền sọ tới xương móng. Độ dày lớp cắt ≤ 3mm. Bước nhảy bằng với độ dày lớp cắt, nên cắt xoắn ốc.</li><li><strong>Bước 2: Hướng cắt đứng ngang.</strong> Mặt phẳng cắt vuông góc với mặt phẳng cắt ngang. Từ chóp mũi cho tới gai sau cột sống cổ. Độ dày lớp cắt ≤ 3mm. Bước nhảy bằng với độ dày lớp cắt, nên cắt xoắn ốc.</li><li><strong>Bước 3:</strong> Chuyển hình ảnh sang PACS hoặc in phim, đọc kết quả.</li></ul><h3>Nhận định kết quả</h3><p>Bác sỹ đọc tổn thương, mô tả trên máy tính kết nối nội bộ và in kết quả (nếu cần). Mô tả tổn thương: Vị trí tổn thương, cấu trúc tổn thương, kích thước, sự lan rộng của tổn thương... Đối chiếu hình ảnh cắt lớp vi tính và lâm sàng. Đưa ra các định hướng chẩn đoán. Đồng thời có thể đề nghị các thăm khám khác phối hợp.</p><h2 id="s185-theodoi">VII. THEO DÕI VÀ XỬ TRÍ TAI BIẾN</h2><p>Trẻ em có thể không hợp tác trong quá trình chụp: khóc, cử động. Có thể chụp lúc ngủ, dùng thuốc an thần hoặc gây mê tùy trường hợp.</p><p>Trong nhiều trường hợp người bệnh không thể ngửa được để chụp lớp cắt đứng ngang, có thể tái tạo từ hướng cắt ngang, trong trường hợp này thì nên chụp cắt ngang xoắn ốc lớp mỏng nhất có thể, để tái tạo được hình ảnh tốt nhất.</p><h2 id="s185-tailieu">TÀI LIỆU THAM KHẢO</h2><ol><li>Reddinger, Handbook of CT Technique (Computed Tomography Series), WileyBlackwell, 2000.</li><li>Sumeet Bhargava, Satish K Bhargava, CT and MRI Protocol - A Practical Approach, Third Edition, Peepee, 2016.</li></ol>`

                content: `<h2 id="s186-daicuong">I. ĐẠI CƯƠNG</h2><p>Chụp CLVT vùng hàm mặt để thăm khám các bệnh lý vùng hàm mặt, vùng mũi xoang, họng; bổ sung cho các kỹ thuật X-quang thông thường.</p><h2 id="s186-chidinh">II. CHỈ ĐỊNH</h2><ul><li>Viêm, nhiễm trùng</li><li>Tổn thương khối u</li><li>Một số chỉ định khác theo hướng dẫn chẩn đoán và điều trị do Bộ Y tế ban hành</li></ul><h2 id="s186-chongchidinh">III. CHỐNG CHỈ ĐỊNH</h2><p>Không có chống chỉ định.</p><h2 id="s186-thantrong">IV. THẬN TRỌNG</h2><ul><li>Phụ nữ có thai, đặc biệt trong ba tháng đầu. Khi phải chụp có thể sử dụng áo chì che vùng bụng.</li><li>Trẻ nhỏ</li><li>Người bệnh có chống chỉ định dùng thuốc cản quang i-ốt.</li></ul><h2 id="s186-chuanbi">V. CHUẨN BỊ</h2><h3>1. Người thực hiện</h3><ul><li>Bác sỹ chẩn đoán hình ảnh.</li><li>Kỹ thuật y hình ảnh y học</li><li>Điều dưỡng</li><li>* Ghi chú: Bác sỹ gây mê, kỹ thuật viên gây mê (nếu người bệnh không hợp tác, đặc biệt đối với trẻ em).</li></ul><h3>2. Thuốc, hóa chất</h3><ul><li>Thuốc cản quang tan trong nước</li><li>Dung dịch sát khuẩn da, niêm mạc</li><li>Nước cất hoặc nước muối sinh lý</li></ul><h3>3. Vật tư</h3><ul><li>Bơm tiêm 10; 20ml</li><li>Bơm tiêm cho máy bơm điện</li><li>Kim tiêm 18-20G</li><li>Găng tay khám, mũ, khẩu trang</li><li>Bộ khay quả đậu, kẹp phẫu thuật.</li><li>Bông, gạc phẫu thuật.</li><li>Hộp thuốc và dụng cụ cấp cứu tai biến thuốc cản quang.</li><li>Phim, bao phim (nếu in phim)</li><li>Đĩa DVD (nếu cần)</li><li>Bộ áo, váy và cổ chì</li></ul><h3>4. Trang thiết bị</h3><ul><li>Máy chụp cắt lớp vi tính đa lát cắt</li><li>Máy bơm điện chuyên dụng</li><li>Hệ thống lưu trữ và truyền ảnh, máy trạm xử lý và đọc ảnh (PACS). Máy in phim (nếu in phim)</li></ul><h3>5. Người bệnh</h3><ul><li>Người bệnh và người nhà người bệnh được giải thích kỹ về thủ thuật để phối hợp với thầy thuốc.</li><li>Tháo bỏ khuyên tai, vòng cổ, cặp tóc nếu có</li><li>Cần nhịn ăn, uống trước 4 giờ. Có thể uống không quá 50ml nước.</li><li>Người bệnh quá kích thích, không nằm yên: Cần cho thuốc an thần...</li></ul><h3>6. Hồ sơ bệnh án</h3><ul><li>Có phiếu chỉ định chụp cắt lớp vi tính hàm mặt có tiêm thuốc cản quang</li><li>Hồ sơ bệnh án đối với người bệnh nội trú hoặc các kết quả thăm khám lần trước đối với người bệnh ngoại trú.</li></ul><h3>7. Thời gian thực hiện</h3><p>Khoảng 20 - 30 phút</p><h3>8. Địa điểm thực hiện kỹ thuật</h3><p>Tại phòng chụp cắt lớp vi tính đảm bảo tiêu chuẩn về an toàn bức xạ. Trẻ em: cần che chắn bộ phận sinh dục</p><h3>9. Kiểm tra hồ sơ và người bệnh</h3><p>a) Kiểm tra người bệnh: Đánh giá chính xác người bệnh: đúng người bệnh, đúng chẩn đoán, đúng vị trí cần thực hiện kỹ thuật.<br>b) Thực hiện bảng kiểm an toàn điện quang.<br>c) Đặt tư thế bệnh: Hướng cắt ngang người bệnh nằm ngửa. Hướng cắt đứng ngang người bệnh nằm ngửa đầu ngửa tối đa hoặc nằm sấp đầu ngửa tối đa. Di chuyển bàn chụp vào trong máy với định vị cho vùng thăm khám.</p><h2 id="s186-cacbuoctienhanh">VI. CÁC BƯỚC TIẾN HÀNH</h2><p>Chụp theo hai hướng cắt ngang và đứng ngang. Đối với các máy cắt lớp vi tính đa dây (từ 16 dãy trở lên) có thể chỉ cần thực hiện hướng cắt cắt ngang và tái tạo lại theo hướng đứng ngang và các hướng khác mà vẫn đảm bảo được chất lượng hình ảnh giống như chất lượng hình ảnh cắt ngang.</p><ul><li><strong>Bước 1: Hướng cắt ngang.</strong> Người bệnh nằm ngửa. Thực hiện chụp định vị. Mặt phẳng cắt song song với khẩu cái cứng. Từ nền sọ tới xương móng. Độ dày lớp cắt ≤ 3mm. Bước nhảy bằng với độ dày lớp cắt, nên cắt xoắn ốc.</li><li><strong>Bước 2: Hướng cắt đứng ngang.</strong> Mặt phẳng cắt vuông góc với mặt phẳng cắt ngang. Từ chóp mũi cho tới gai sau cột sống cổ. Độ dày lớp cắt ≤ 3mm. Bước nhảy bằng với độ dày lớp cắt, nên cắt xoắn ốc.</li><li><strong>Bước 3: Hướng cắt ngang sau tiêm thuốc đối quang.</strong> Chương trình chụp tương tự không tiêm thuốc đối quang. Tiêm thuốc đối quang có i-ốt.</li><li><strong>Bước 4:</strong> Chuyển hình ảnh sang PACS hoặc in phim, đọc kết quả.</li><li><strong>Bước 5:</strong> Theo dõi người bệnh sau khi chụp. Băng ép chặt tại vị trí rút kim tránh chảy máu. Theo dõi phản ứng dị ứng muộn của thuốc cản quang.</li></ul><h3>Nhận định kết quả</h3><p>Mô tả tổn thương: Vị trí tổn thương, cấu trúc tổn thương, kích thước, sự lan rộng của tổn thương, đặc điểm ngấm thuốc đối quang. Đối chiếu hình ảnh cắt lớp vi tính và lâm sàng. Đưa ra các định hướng chẩn đoán. Đồng thời có thể đề nghị các thăm khám khác phối hợp. Bác sỹ đọc tổn thương, mô tả trên máy tính kết nối nội bộ và in kết quả (nếu cần).</p><h2 id="s186-theodoi">VII. THEO DÕI VÀ XỬ TRÍ TAI BIẾN</h2><p>Trẻ em có thể không hợp tác trong quá trình chụp: khóc, cử động. Có thể chụp lúc ngủ, dùng thuốc an thần hoặc gây mê tùy trường hợp.</p><p>Trong nhiều trường hợp người bệnh không thể ngửa được để chụp lớp cắt đứng ngang, có thể tái tạo từ hướng cắt ngang, trong trường hợp này thì nên chụp cắt ngang mỏng nhất có thể để tái tạo được hình ảnh tốt nhất.</p><p>Xử trí tai biến thuốc cản quang : xem thêm quy trình Chẩn đoán và xử trí tai biến thuốc đối quang.</p><p>Một số trường hợp có thể phải thực hiện lại kỹ thuật như: người bệnh không giữ bất động trong quá trình chụp phim, không bộc lộ rõ nét hình ảnh.</p><p>Tai biến liên quan đến thuốc cản quang: Xem thêm quy trình 322. Chẩn đoán và xử trí tai biến liên quan đến thuốc đối quang.</p><h2 id="s186-tailieu">TÀI LIỆU THAM KHẢO</h2><ol><li>Reddinger, Handbook of CT Technique (Computed Tomography Series), WileyBlackwell, 2000.</li><li>Sumeet Bhargava, Satish K Bhargava, CT and MRI Protocol - A Practical Approach, Third Edition, Peepee, 2016.</li></ol>`

                ],
                content: `<h2 id="s187-daicuong">I. ĐẠI CƯƠNG</h2><p>Chụp cắt lớp vi tính tai xương đá có tiêm thuốc cản quang là kỹ thuật sử dụng thuốc đối quang i-ốt đường tĩnh mạch để làm rõ các tổn thương phần mềm, đánh giá mức độ giàu mạch của tổn thương. Kỹ thuật này rất quan trọng trong việc chẩn đoán các khối u, các quá trình viêm nhiễm phức tạp và các bệnh lý mạch máu vùng tai - xương đá.</p><h2 id="s187-chidinh">II. CHỈ ĐỊNH</h2><ul><li>Nghi ngờ tổn thương u: u dây thần kinh VIII (schwannoma tiền đình), u màng não, u cuộn cảnh, cholesteatoma có biến chứng...</li><li>Viêm, nhiễm trùng có biến chứng nội sọ hoặc lan rộng: viêm xương chũm hoại tử, áp xe ngoài màng cứng, viêm tắc xoang tĩnh mạch...</li><li>Bệnh lý mạch máu: dị dạng động tĩnh mạch, phình mạch.</li><li>Đánh giá sự xâm lấn của các khối u từ các vùng lân cận vào xương đá.</li></ul><h2 id="s187-chongchidinh">III. CHỐNG CHỈ ĐỊNH</h2><p>Chống chỉ định tương đối liên quan đến thuốc cản quang:</p><ul><li>Tiền sử dị ứng rõ ràng với thuốc cản quang.</li><li>Hen phế quản nặng.</li><li>Suy thận nặng (mức lọc cầu thận < 30 ml/phút/1.73m²).</li><li>Bệnh lý tuyến giáp nặng (cơn bão giáp).</li></ul><h2 id="s187-thantrong">IV. THẬN TRỌNG</h2><ul><li>Phụ nữ có thai.</li><li>Người bệnh có cơ địa dị ứng.</li><li>Người bệnh mất nước nặng.</li></ul><h2 id="s187-chuanbi">V. CHUẨN BỊ</h2><h3>1. Người thực hiện</h3><ul><li>Bác sỹ chẩn đoán hình ảnh.</li><li>Kỹ thuật y hình ảnh y học</li><li>Điều dưỡng</li></ul><h3>2. Thuốc, hóa chất</h3><ul><li>Thuốc cản quang i-ốt tan trong nước.</li><li>Nước cất hoặc nước muối sinh lý.</li><li>Hộp thuốc cấp cứu tai biến thuốc cản quang.</li></ul><h3>3. Vật tư</h3><ul><li>Kim luồn tĩnh mạch (18G hoặc 20G).</li><li>Bơm tiêm, dây nối.</li><li>Bông, gạc, băng dính.</li></ul><h3>4. Trang thiết bị</h3><ul><li>Máy chụp cắt lớp vi tính đa lát cắt.</li><li>Máy bơm điện chuyên dụng.</li><li>Hệ thống PACS.</li></ul><h3>5. Người bệnh</h3><ul><li>Giải thích rõ về thủ thuật.</li><li>Yêu cầu nhịn ăn trước 4-6 giờ.</li><li>Tháo bỏ các vật kim loại ở vùng đầu cổ.</li><li>Ký giấy cam kết.</li></ul><h2 id="s187-cacbuoctienhanh">VI. CÁC BƯỚC TIẾN HÀNH</h2><p>Tương tự như chụp không tiêm thuốc, có thêm bước tiêm thuốc cản quang. Thường chụp một series không tiêm trước, sau đó tiêm thuốc và chụp lại.</p><ul><li><strong>Bước 1:</strong> Đặt người bệnh nằm ngửa, đầu vào trong gantry. Cố định đầu để tránh cử động.</li><li><strong>Bước 2:</strong> Chụp định vị (topogram).</li><li><strong>Bước 3: Chụp trước tiêm.</strong> Thực hiện các lớp cắt ngang và/hoặc đứng ngang qua vùng xương đá với độ dày lớp cắt mỏng (≤ 1mm) để đánh giá cấu trúc xương.</li><li><strong>Bước 4: Tiêm thuốc cản quang.</strong> Thiết lập đường truyền tĩnh mạch. Tiêm thuốc cản quang bằng máy bơm điện với liều lượng 1.5-2ml/kg cân nặng, tốc độ 2-3ml/s.</li><li><strong>Bước 5: Chụp sau tiêm.</strong> Sau khi tiêm, thực hiện lại chuỗi xung tương tự như trước tiêm. Có thể chụp thêm thì muộn (3-5 phút) nếu nghi ngờ u hoặc tổn thương viêm.</li><li><strong>Bước 6:</strong> Xử lý hình ảnh, tái tạo MPR, chuyển ảnh sang PACS.</li><li><strong>Bước 7:</strong> Tháo kim luồn, ép vị trí tiêm, dặn dò người bệnh.</li></ul><h3>Nhận định kết quả</h3><p>Đánh giá hình thái, kích thước và đặc điểm ngấm thuốc của tổn thương. So sánh hình ảnh trước và sau tiêm để xác định mức độ tăng quang, giúp định hướng chẩn đoán bản chất tổn thương (u, viêm, mạch máu...).</p><h2 id="s187-theodoi">VII. THEO DÕI VÀ XỬ TRÍ TAI BIẾN</h2><ul><li>Theo dõi các dấu hiệu dị ứng thuốc cản quang trong và sau khi chụp.</li><li>Xử trí các tai biến theo quy trình Chẩn đoán và xử trí tai biến thuốc đối quang (Quy trình 322).</li><li>Chảy máu hoặc tụ máu nơi tiêm: ép cầm máu.</li></ul><h2 id="s187-tailieu">TÀI LIỆU THAM KHẢO</h2><ol><li>Reddinger, Handbook of CT Technique (Computed Tomography Series), WileyBlackwell, 2000.</li><li>Sumeet Bhargava, Satish K Bhargava, CT and MRI Protocol - A Practical Approach, Third Edition, Peepee, 2016.</li><li>Bộ Y tế, “Hướng dẫn quy trình kỹ thuật chẩn đoán hình ảnh và điện quang can thiệp”, Nhà xuất bản y học, 2014.</li></ol>`

                ],
                content: `<h2 id="s188-daicuong">I. ĐẠI CƯƠNG</h2><p>Chụp cắt lớp vi tính tai xương đá không tiêm thuốc cản quang là kỹ thuật chụp không sử dụng thuốc đối quang. Đây là kỹ thuật quan trọng trong đánh giá bệnh lý tai xương đá, giúp đánh giá giải phẫu, bệnh lý vùng tai, xương thái dương một cách chi tiết, đặc biệt là các cấu trúc xương nhỏ.</p><h2 id="s188-chidinh">II. CHỈ ĐỊNH</h2><p>Thăm khám các bệnh lý vùng tai, xương thái dương:</p><ul><li>Các bất thường bẩm sinh của tai ngoài, giữa, trong.</li><li>Chấn thương: đường vỡ xương đá, trật khớp xương con.</li><li>Viêm tai xương chũm mạn tính, cholesteatoma.</li><li>Đánh giá trước và sau phẫu thuật cấy điện cực ốc tai, vá màng nhĩ...</li><li>Xốp xơ tai (otosclerosis).</li><li>Nghe kém, ù tai, chóng mặt để tìm nguyên nhân tại cấu trúc xương.</li><li>Một số chỉ định khác theo hướng dẫn chẩn đoán và điều trị do Bộ Y tế ban hành</li></ul><h2 id="s188-chongchidinh">III. CHỐNG CHỈ ĐỊNH</h2><p>Không có chống chỉ định tuyệt đối.</p><h2 id="s188-thantrong">IV. THẬN TRỌNG</h2><ul><li>Phụ nữ có thai.</li><li>Trẻ nhỏ (cân nhắc liều tia và có thể cần an thần).</li></ul><h2 id="s188-chuanbi">V. CHUẨN BỊ</h2><h3>1. Người thực hiện</h3><ul><li>Bác sỹ chẩn đoán hình ảnh.</li><li>Kỹ thuật y hình ảnh y học</li><li>Điều dưỡng</li><li>* Ghi chú: Bác sỹ gây mê, kỹ thuật viên gây mê (nếu người bệnh không hợp tác, đặc biệt đối với trẻ em).</li></ul><h3>2. Thuốc, hóa chất</h3><ul><li>Dung dịch sát khuẩn bề mặt thiết bị</li><li>Dung dịch sát khuẩn tay</li></ul><h3>3. Vật tư</h3><ul><li>Phim, đĩa DVD (nếu cần).</li><li>Đồ che chắn tia X.</li></ul><h3>4. Trang thiết bị</h3><ul><li>Máy chụp cắt lớp vi tính đa lát cắt có khả năng cắt lớp mỏng (<1mm).</li><li>Hệ thống lưu trữ và truyền ảnh (PACS).</li></ul><h3>5. Người bệnh</h3><ul><li>Giải thích kỹ về thủ thuật.</li><li>Tháo bỏ khuyên tai, máy trợ thính, cặp tóc nếu có.</li><li>Người bệnh quá kích thích, không nằm yên: Cần cho thuốc an thần...</li></ul><h3>6. Hồ sơ bệnh án</h3><ul><li>Có phiếu chỉ định chụp CLVT tai - xương đá.</li><li>Các kết quả chẩn đoán hình ảnh, đo thính lực trước đó (nếu có).</li></ul><h3>7. Thời gian thực hiện</h3><p>Khoảng 10 - 15 phút</p><h3>8. Địa điểm thực hiện kỹ thuật</h3><p>Tại phòng chụp cắt lớp vi tính đảm bảo tiêu chuẩn về an toàn bức xạ.</p><h3>9. Kiểm tra hồ sơ và người bệnh</h3><p>a) Kiểm tra người bệnh: Đánh giá chính xác người bệnh, đúng bên tai cần khảo sát (nếu chỉ định một bên).<br>b) Đặt tư thế bệnh: Người bệnh được nằm ngửa trên bàn chụp, đầu vào trước, cằm hơi gập để mặt phẳng cắt ngang song song với ống tai ngoài. Cần cố định đầu thật tốt.</p><h2 id="s188-cacbuoctienhanh">VI. CÁC BƯỚC TIẾN HÀNH</h2><p>Đối với máy đa lát cắt, chỉ cần thực hiện một chuỗi xung cắt ngang lớp mỏng, sau đó tái tạo các mặt phẳng khác.</p><ul><li><strong>Bước 1: Hướng cắt ngang (Axial).</strong> Người bệnh nằm ngửa. Thực hiện chụp định vị. Lập kế hoạch các lớp cắt song song với mặt phẳng khẩu cái cứng, bao phủ toàn bộ xương đá từ mỏm chũm đến bờ trên xương đá. Sử dụng độ dày lớp cắt rất mỏng (≤ 1mm) và cửa sổ xương để tối ưu hóa hình ảnh.</li><li><strong>Bước 2: Tái tạo hình ảnh.</strong> Từ dữ liệu gốc thu được ở bước 1, tái tạo lại hình ảnh theo mặt phẳng đứng ngang (Coronal) vuông góc với mặt phẳng axial, và có thể cả các mặt phẳng khác (Sagittal, Stenvers, Pöschl) tùy theo yêu cầu lâm sàng.</li><li><strong>Bước 3:</strong> Chuyển tất cả các hình ảnh (gốc và tái tạo) sang hệ thống PACS để bác sĩ đọc kết quả.</li></ul><h3>Nhận định kết quả</h3><p>Bác sĩ phân tích chi tiết các cấu trúc giải phẫu của tai ngoài, tai giữa, tai trong, các dây thần kinh, mạch máu liên quan. Mô tả các bất thường, tổn thương nếu có (vị trí, kích thước, sự lan rộng, ảnh hưởng đến các cấu trúc lân cận...).</p><h2 id="s188-theodoi">VII. THEO DÕI VÀ XỬ TRÍ TAI BIẾN</h2><p>Kỹ thuật này gần như không có tai biến. Vấn đề chính là sự hợp tác của người bệnh để tránh ảnh giả do cử động. Nếu người bệnh không hợp tác, có thể phải chụp lại hoặc dùng an thần.</p><h2 id="s188-tailieu">TÀI LIỆU THAM KHẢO</h2><ol><li>McCollough CH, Leng S, Yu L, Fletcher JG. Dual- and Multi-Energy CT: Principles, Technical Approaches, and Clinical Applications. Radiology. 2015;276(3):637-653.</li><li>Reddinger, Handbook of CT Technique (Computed Tomography Series), WileyBlackwell, 2000.</li><li>Bộ Y tế, “Hướng dẫn quy trình kỹ thuật chẩn đoán hình ảnh và điện quang can thiệp”, Nhà xuất bản y học, 2014.</li></ol>`

                ],
                content: `<h2 id="s189-daicuong">I. ĐẠI CƯƠNG</h2><p>Chụp CLVT hốc mắt không tiêm thuốc cản quang là một phương pháp chẩn đoán hình ảnh sử dụng tia X để tạo ra hình ảnh chi tiết của hốc mắt và các cấu trúc xung quanh. Kỹ thuật này đặc biệt hữu ích để đánh giá các cấu trúc xương, chấn thương, và sự hiện diện của dị vật cản quang.</p><h2 id="s189-chidinh">II. CHỈ ĐỊNH</h2><ul><li>Chấn thương vùng mắt: đánh giá gãy xương thành hốc mắt (đặc biệt là gãy sàn hốc mắt - blowout fracture), tụ máu.</li><li>Nghi ngờ có dị vật nội nhãn hoặc trong hốc mắt, đặc biệt là dị vật kim loại.</li><li>Bệnh lý tuyến giáp liên quan đến mắt (Bệnh Graves): đánh giá sự phì đại của các cơ ngoại nhãn.</li><li>Đánh giá các tổn thương vôi hóa trong hốc mắt.</li><li>Lồi mắt không rõ nguyên nhân (đánh giá ban đầu).</li></ul><h2 id="s189-chongchidinh">III. CHỐNG CHỈ ĐỊNH</h2><p>Không có chống chỉ định tuyệt đối. Cần cân nhắc lợi ích và nguy cơ ở phụ nữ có thai.</p><h2 id="s189-thantrong">IV. THẬN TRỌNG</h2><ul><li>Phụ nữ có thai: cần che chắn kỹ vùng bụng và chỉ thực hiện khi thật sự cần thiết.</li><li>Trẻ em: tối ưu hóa liều tia.</li></ul><h2 id="s189-chuanbi">V. CHUẨN BỊ</h2><h3>1. Người thực hiện</h3><ul><li>Bác sỹ chẩn đoán hình ảnh.</li><li>Kỹ thuật y hình ảnh y học.</li></ul><h3>2. Trang thiết bị</h3><ul><li>Máy chụp cắt lớp vi tính đa lát cắt.</li><li>Hệ thống PACS.</li></ul><h3>3. Người bệnh</h3><ul><li>Giải thích về kỹ thuật.</li><li>Yêu cầu người bệnh tháo bỏ các vật kim loại ở vùng đầu.</li><li>Hướng dẫn người bệnh nằm yên và nhắm mắt trong quá trình chụp để hạn chế ảnh giả do chuyển động của nhãn cầu.</li></ul><h3>4. Hồ sơ bệnh án</h3><ul><li>Phiếu chỉ định chụp CLVT hốc mắt.</li></ul><h2 id="s189-cacbuoctienhanh">VI. CÁC BƯỚC TIẾN HÀNH</h2><ul><li><strong>Bước 1:</strong> Đặt người bệnh nằm ngửa trên bàn chụp, đầu đặt ngay ngắn trong giá đỡ.</li><li><strong>Bước 2:</strong> Chụp định vị (topogram) để xác định trường chụp. Trường chụp phải bao phủ toàn bộ hốc mắt, từ bờ trên đến bờ dưới.</li><li><strong>Bước 3:</strong> Thực hiện chuỗi xung cắt ngang (axial) lớp mỏng (dày 1-3mm) song song với đường thẳng đi qua dây thần kinh thị giác.</li><li><strong>Bước 4:</strong> Từ dữ liệu axial, tái tạo hình ảnh theo mặt phẳng đứng ngang (coronal) vuông góc với mặt phẳng axial và mặt phẳng đứng dọc (sagittal) song song với dây thần kinh thị giác.</li><li><strong>Bước 5:</strong> Xem ảnh trên hai cửa sổ: cửa sổ xương để đánh giá thành xương hốc mắt và cửa sổ phần mềm để xem nhãn cầu, cơ, thần kinh thị, và mỡ hốc mắt.</li><li><strong>Bước 6:</strong> Chuyển hình ảnh sang PACS.</li></ul><h3>Nhận định kết quả</h3><p>Hình ảnh phải rõ nét, không bị ảnh giả do cử động. Đánh giá được toàn bộ cấu trúc xương và phần mềm của cả hai hốc mắt, có khả năng so sánh hai bên. Phát hiện các bất thường như đường gãy, dị vật, thay đổi kích thước cơ, vôi hóa bất thường.</p><h2 id="s189-theodoi">VII. THEO DÕI VÀ XỬ TRÍ TAI BIẾN</h2><p>Kỹ thuật không có tai biến. Cần đảm bảo người bệnh nằm yên để chất lượng hình ảnh tốt nhất.</p><h2 id="s189-tailieu">TÀI LIỆU THAM KHẢO</h2><ol><li>Sumeet Bhargava, Satish K Bhargava, CT and MRI Protocol - A Practical Approach, Third Edition, Peepee, 2016.</li><li>Bộ Y tế, “Hướng dẫn quy trình kỹ thuật chẩn đoán hình ảnh và điện quang can thiệp”, Nhà xuất bản y học, 2014.</li></ol>`

                content: `<h2 id="s190-daicuong">I. ĐẠI CƯƠNG</h2><p>Chụp CLVT hốc mắt có tiêm thuốc cản quang là kỹ thuật chẩn đoán hình ảnh cao cấp, cho phép khảo sát chi tiết các cấu trúc phần mềm trong hốc mắt như nhãn cầu, thần kinh thị giác, các cơ ngoại nhãn, và mạch máu. Việc tiêm thuốc cản quang giúp làm nổi bật các tổn thương giàu mạch máu, phân biệt giữa các loại mô khác nhau, và đánh giá tình trạng viêm nhiễm.</p><h2 id="s190-chidinh">II. CHỈ ĐỊNH</h2><ul><li>Nghi ngờ u trong hốc mắt: u thần kinh thị giác (glioma, meningioma), u tuyến lệ, u ác tính (lymphoma, melanoma), u di căn.</li><li>Bệnh lý viêm nhiễm: viêm tổ chức hốc mắt, viêm màng bồ đào, giả u viêm (inflammatory pseudotumor), áp xe hốc mắt.</li><li>Bệnh lý mạch máu: dị dạng động tĩnh mạch, u máu (hemangioma).</li><li>Lồi mắt không rõ nguyên nhân cần đánh giá bản chất tổn thương phần mềm.</li><li>Đánh giá sự xâm lấn của các khối u từ xoang, nền sọ vào hốc mắt.</li></ul><h2 id="s190-chongchidinh">III. CHỐNG CHỈ ĐỊNH</h2><p>Các chống chỉ định liên quan đến thuốc cản quang:</p><ul><li>Tiền sử dị ứng nặng với thuốc cản quang i-ốt.</li><li>Suy thận nặng.</li><li>Hen phế quản nặng, không kiểm soát.</li></ul><h2 id="s190-thantrong">IV. THẬN TRỌNG</h2><ul><li>Phụ nữ có thai.</li><li>Người có cơ địa dị ứng.</li><li>Người mắc bệnh đái tháo đường đang dùng Metformin.</li><li>Người bệnh cường giáp.</li></ul><h2 id="s190-chuanbi">V. CHUẨN BỊ</h2><h3>1. Người thực hiện</h3><ul><li>Bác sỹ chẩn đoán hình ảnh.</li><li>Kỹ thuật y hình ảnh y học.</li><li>Điều dưỡng.</li></ul><h3>2. Thuốc và vật tư</h3><ul><li>Thuốc cản quang i-ốt.</li><li>Nước muối sinh lý.</li><li>Kim luồn tĩnh mạch, bơm tiêm.</li><li>Hộp thuốc cấp cứu tai biến.</li></ul><h3>3. Trang thiết bị</h3><ul><li>Máy chụp CLVT đa lát cắt.</li><li>Máy bơm tiêm điện.</li></ul><h3>4. Người bệnh</h3><ul><li>Giải thích kỹ, ký giấy cam kết.</li><li>Nhịn ăn trước 4-6 giờ.</li><li>Tháo bỏ các vật dụng kim loại vùng đầu.</li><li>Kiểm tra chức năng thận nếu có yếu tố nguy cơ.</li></ul><h3>5. Hồ sơ bệnh án</h3><ul><li>Phiếu chỉ định có đầy đủ thông tin lâm sàng.</li><li>Kết quả xét nghiệm chức năng thận (nếu cần).</li></ul><h2 id="s190-cacbuoctienhanh">VI. CÁC BƯỚC TIẾN HÀNH</h2><ul><li><strong>Bước 1:</strong> Đặt người bệnh, chụp định vị, và thực hiện chuỗi xung không tiêm tương tự quy trình 189.</li><li><strong>Bước 2:</strong> Thiết lập đường truyền tĩnh mạch ở tay, nối với máy bơm tiêm điện.</li><li><strong>Bước 3:</strong> Tiêm thuốc cản quang i-ốt với liều 1.5-2 ml/kg, tốc độ 2-3 ml/s, sau đó bơm đẩy nước muối sinh lý.</li><li><strong>Bước 4:</strong> Bắt đầu chụp thì động mạch hoặc thì tĩnh mạch (thường sau 60-70 giây) sau khi tiêm. Lặp lại chuỗi xung axial và tái tạo coronal, sagittal.</li><li><strong>Bước 5:</strong> Chuyển tất cả các hình ảnh (trước và sau tiêm) sang hệ thống PACS.</li><li><strong>Bước 6:</strong> Rút kim, băng ép vị trí tiêm và theo dõi người bệnh trong khoảng 15-30 phút.</li></ul><h3>Nhận định kết quả</h3><p>So sánh hình ảnh trước và sau tiêm để đánh giá mức độ và kiểu ngấm thuốc của tổn thương. Điều này giúp phân biệt u lành với u ác, tổn thương viêm với u, và xác định ranh giới của tổn thương với các cấu trúc lân cận.</p><h2 id="s190-theodoi">VII. THEO DÕI VÀ XỬ TRÍ TAI BIẾN</h2><ul><li>Tai biến liên quan đến thuốc cản quang (dị ứng, sốc phản vệ) là quan trọng nhất. Cần sẵn sàng hộp thuốc cấp cứu và xử trí theo phác đồ (Quy trình 322).</li><li>Thoát mạch thuốc cản quang tại vị trí tiêm.</li></ul><h2 id="s190-tailieu">TÀI LIỆU THAM KHẢO</h2><ol><li>Sumeet Bhargava, Satish K Bhargava, CT and MRI Protocol - A Practical Approach, Third Edition, Peepee, 2016.</li><li>Bộ Y tế, “Hướng dẫn quy trình kỹ thuật chẩn đoán hình ảnh và điện quang can thiệp”, Nhà xuất bản y học, 2014.</li></ol>`

                content: `<h2 id="s191-daicuong">I. ĐẠI CƯƠNG</h2><p>Chụp cắt lớp vi tính (CT) hốc mắt là kỹ thuật dùng tia X tạo hình ảnh cắt lớp vùng hốc mắt (orbit) để khảo sát tổn thương xương hốc mắt, mô mềm quanh nhãn cầu, dây thần kinh thị, xoang cạnh mũi, sọ não.</p><h2 id="s191-chidinh">II. CHỈ ĐỊNH</h2><ul><li>Chấn thương</li><li>Viêm, nhiễm trùng</li><li>Tổn thương u</li><li>Một số chỉ định khác theo hướng dẫn chẩn đoán và điều trị do Bộ Y tế ban hành</li></ul><h2 id="s191-chongchidinh">III. CHỐNG CHỈ ĐỊNH</h2><p>Không có chống chỉ định.</p><h2 id="s191-thantrong">IV. THẬN TRỌNG</h2><ul><li>Phụ nữ có thai</li><li>Trẻ nhỏ</li><li>Tiền sử dị ứng</li><li>Người bệnh có chống chỉ định dùng thuốc cản quang i-ốt.</li></ul><h2 id="s191-chuanbi">V. CHUẨN BỊ</h2><h3>1. Người thực hiện</h3><ul><li>Bác sỹ chẩn đoán hình ảnh.</li><li>Kỹ thuật y hình ảnh y học</li><li>Điều dưỡng</li></ul><h3>2. Thuốc, hóa chất</h3><ul><li>Thuốc cản quang tan trong nước</li><li>Dung dịch sát khuẩn da, niêm mạc</li><li>Nước cất hoặc nước muối sinh lý</li></ul><h3>3. Vật tư</h3><ul><li>Bơm tiêm 10; 20ml</li><li>Bơm tiêm cho máy bơm điện</li><li>Kim tiêm 18-20G</li><li>Găng tay khám, mũ, khẩu trang</li><li>Bộ khay quả đậu, kẹp phẫu thuật.</li><li>Bông, gạc phẫu thuật.</li><li>Hộp thuốc và dụng cụ cấp cứu tai biến thuốc cản quang.</li></ul><h3>4. Trang thiết bị</h3><ul><li>Máy chụp cắt lớp vi tính đa lát cắt</li><li>Hệ thống lưu trữ và truyền ảnh, máy trạm xử lý và đọc ảnh (PACS).</li></ul><h3>5. Người bệnh</h3><ul><li>Người bệnh và người nhà người bệnh được giải thích kỹ về thủ thuật để phối hợp với thầy thuốc.</li><li>Tháo bỏ khuyên tai, vòng cổ, cặp tóc nếu có</li><li>Người bệnh quá kích thích, không nằm yên: Cần cho thuốc an thần...</li></ul><h3>6. Hồ sơ bệnh án</h3><ul><li>Có phiếu chỉ định chụp CLVT hốc mắt có tiêm thuốc cản quang</li></ul><h3>7. Thời gian thực hiện</h3><p>Khoảng 12 - 20 phút</p><h2 id="s191-cacbuoctienhanh">VI. CÁC BƯỚC TIẾN HÀNH</h2><ul><li><strong>Bước 1:</strong> Đặt người bệnh nằm ngửa. Chụp theo hai hướng cắt ngang và đứng ngang.</li><li><strong>Bước 2: Hướng cắt ngang:</strong> Mặt phẳng cắt song song với khẩu cái cứng, từ bờ dưới hốc mắt tới bờ trên hốc mắt. Độ dày lớp cắt <3mm.</li><li><strong>Bước 3: Hướng cắt đứng ngang:</strong> Mặt phẳng cắt vuông góc với mặt phẳng trên, từ chóp phía trước nhãn cầu tới bờ sau hốc mắt. Độ dày lớp cắt ≤3mm.</li><li><strong>Bước 4:</strong> Nếu khảo sát u hoặc tổn thương mạch: tiêm thuốc cản quang tĩnh mạch 1-1.5 mL/kg, tốc độ 2-3 mL/s.</li><li><strong>Bước 5:</strong> Theo dõi người bệnh sau khi chụp, băng ép chặt tại vị trí rút kim.</li></ul><h3>Nhận định kết quả</h3><p>Mô tả tổn thương: vị trí, cấu trúc, kích thước, sự lan rộng. Đối chiếu hình ảnh CLVT và lâm sàng. Đưa ra các định hướng chẩn đoán.</p><h2 id="s191-theodoi">VII. THEO DÕI VÀ XỬ TRÍ TAI BIẾN</h2><p>Một số trường hợp có thể phải thực hiện lại kỹ thuật do người bệnh không giữ bất động. Tai biến liên quan đến thuốc cản quang cần được xử trí theo quy trình.</p><h2 id="s191-tailieu">TÀI LIỆU THAM KHẢO</h2><ol><li>McCollough CH, Leng S, Yu L, Fletcher JG. Dual- and Multi-Energy CT: Principles, Technical Approaches, and Clinical Applications. Radiology. 2015;276(3):637-653.</li><li>Reddinger, Handbook of CT Technique (Computed Tomography Series), WileyBlackwell, 2000.</li><li>Bộ Y tế, “Hướng dẫn quy trình kỹ thuật chẩn đoán hình ảnh và điện quang can thiệp”, Nhà xuất bản y học, 2014.</li></ol>`

                content: `<h2 id="s192-daicuong">I. ĐẠI CƯƠNG</h2><p>Chụp cắt lớp vi tính hàm mặt là kỹ thuật quan trọng trong đánh giá bệnh lý hàm mặt, giúp đánh giá giải phẫu, bệnh lý vùng hàm mặt được một cách chi tiết.</p><h2 id="s192-chidinh">II. CHỈ ĐỊNH</h2><ul><li>Chấn thương</li><li>Viêm, nhiễm trùng</li><li>Tổn thương u</li><li>Một số chỉ định khác theo hướng dẫn chẩn đoán và điều trị do Bộ Y tế ban hành</li></ul><h2 id="s192-chongchidinh">III. CHỐNG CHỈ ĐỊNH</h2><p>Không có chống chỉ định.</p><h2 id="s192-thantrong">IV. THẬN TRỌNG</h2><ul><li>Người bệnh có thai</li><li>Trẻ nhỏ</li><li>Trong vùng thăm khám có nhiều kim loại gây nhiễu ảnh</li><li>Tiền sử dị ứng</li><li>Người bệnh có chống chỉ định dùng thuốc cản quang i-ốt.</li></ul><h2 id="s192-chuanbi">V. CHUẨN BỊ</h2><h3>1. Người thực hiện</h3><ul><li>Bác sỹ chẩn đoán hình ảnh.</li><li>Kỹ thuật y hình ảnh y học</li><li>Điều dưỡng</li></ul><h3>2. Thuốc, hóa chất</h3><ul><li>Thuốc cản quang tan trong nước</li><li>Dung dịch sát khuẩn da, niêm mạc</li><li>Nước cất hoặc nước muối sinh lý</li></ul><h3>3. Vật tư & Trang thiết bị</h3><ul><li>Bơm tiêm, kim tiêm, găng tay, khẩu trang...</li><li>Máy chụp cắt lớp vi tính đa lát cắt</li><li>Máy bơm điện chuyên dụng</li></ul><h3>4. Người bệnh</h3><ul><li>Người bệnh và người nhà được giải thích kỹ về thủ thuật.</li><li>Tháo bỏ trang sức, vật kim loại.</li><li>Cần nhịn ăn, uống trước 4 giờ.</li></ul><h3>5. Thời gian thực hiện</h3><p>Khoảng 20 - 30 phút</p><h2 id="s192-cacbuoctienhanh">VI. CÁC BƯỚC TIẾN HÀNH</h2><ul><li><strong>Bước 1:</strong> Đặt người bệnh nằm ngửa.</li><li><strong>Bước 2: Hướng cắt ngang:</strong> Chụp định vị. Mặt phẳng cắt song song với khẩu cái cứng. Từ bờ dưới xương hàm dưới tới bờ trên ổ mắt. Độ dày lớp cắt ≤ 3mm. Chụp xoắn ốc.</li><li><strong>Bước 3:</strong> Tái tạo lại với nhiều ảnh liên tục, từ đó tái tạo hình ảnh 3D.</li><li><strong>Bước 4:</strong> Chụp sau tiêm thuốc đối quang tùy theo chỉ định lâm sàng.</li><li><strong>Bước 5:</strong> X                 content: `<h2 id="s193-daicuong">I. ĐẠI CƯƠNG</h2><p>Chụp CLVT hình nón (Cone Beam CT) là một biến thể của chụp CLVT truyền thống với chùm tia phát hình nón, được áp dụng rộng rãi trong nha khoa để đánh giá răng, xương hàm trên, hàm dưới, khớp thái dương hàm với các ưu điểm chụp nhanh, liều tia thấp hơn CLVT thông thường, ảnh thu được có thể dựng hình 3D và tái tạo theo các hướng khác nhau.</p><h2 id="s193-chidinh">II. CHỈ ĐỊNH</h2><ul><li>Đánh giá bệnh lý xương hàm trên: phát hiện, chẩn đoán, đánh giá độ lan rộng của các bệnh lý xương hàm xâm lấn như u nguyên bào men, nang sừng do răng, ung thư xương hàm,... từ đó lên kế hoạch điều trị cũng như vị trí mổ phù hợp.</li><li>Đánh giá gãy xương và gãy răng hàm trên do chấn thương</li><li>Xác định chính xác chiều cao, độ rộng và giải phẫu của phần xương hàm và xương ổ răng cũng như mối tương quan vùng mất răng với cấu trúc giải phẫu liền kề như ống thần kinh răng dưới giúp lên kế hoạch đặt implant</li><li>Áp dụng trong chỉnh nha: đánh giá tình trạng răng ngầm, hướng mọc của các răng, tương quan và sự phát triển xương hàm, vị trí xương để đặt minivis, phân tích các thông số chỉnh nha về thẩm mỹ khuôn mặt, đánh giá kết quả trước và sau khi chỉnh nha của người bệnh.</li><li>Đánh giá răng khôn mọc lệch, ngầm, mối liên quan của dây thần kinh với chân răng khôn</li><li>Đánh giá khớp thái dương hàm</li><li>Một số chỉ định khác theo hướng dẫn chẩn đoán và điều trị do Bộ Y tế ban hành</li></ul><h2 id="s193-chongchidinh">III. CHỐNG CHỈ ĐỊNH</h2><p>Không có chống chỉ định.</p><h2 id="s193-thantrong">IV. THẬN TRỌNG</h2><ul><li>Người bệnh có thai</li><li>Trong vùng thăm khám có nhiều kim loại gây nhiễu ảnh</li></ul><h2 id="s193-chuanbi">V. CHUẨN BỊ</h2><h3>1. Người thực hiện</h3><ul><li>Bác sỹ chẩn đoán hình ảnh.</li><li>Kỹ thuật y hình ảnh y học</li><li>Điều dưỡng</li></ul><h3>2. Trang thiết bị</h3><ul><li>Hệ thống máy chụp Cone Beam CT</li><li>Hệ thống lưu trữ và truyền ảnh, máy trạm xử lý và đọc ảnh (PACS).</li></ul><h3>3. Người bệnh</h3><ul><li>Giải thích kỹ về thủ thuật để phối hợp với thầy thuốc.</li><li>Tháo bỏ khuyên tai, vòng cổ, cặp tóc nếu có.</li></ul><h3>4. Hồ sơ bệnh án</h3><ul><li>Có phiếu chỉ định chụp cắt lớp vi tính hàm mặt chùm tia hình nón hàm trên (Cone Beam CT)</li></ul><h3>5. Thời gian thực hiện</h3><p>Khoảng 15 - 20 phút</p><h2 id="s193-cacbuoctienhanh">VI. CÁC BƯỚC TIẾN HÀNH</h2><ul><li><strong>Bước 1:</strong> Cố định đầu, cằm, răng của người bệnh. Di chuyển bóng phát tia, định vị trường chụp phù hợp với đầu người bệnh. Hướng dẫn người bệnh cố định đầu trong quá trình chụp.</li><li><strong>Bước 2:</strong> Cho bóng phát tia.</li><li><strong>Bước 3:</strong> Hình ảnh thu được sẽ được chuyển lên hệ thống lưu trữ và xử lý hình ảnh, dựng hình 3D và tái tạo theo các hướng nhìn.</li><li><strong>Bước 4:</strong> Chuyển hình ảnh sang PACS hoặc in phim.</li></ul><h3>Nhận định kết quả</h3><p>Bác sỹ đọc tổn thương, mô tả trên máy tính kết nối nội bộ và in kết quả (nếu cần). Bác sỹ đánh giá được toàn bộ xương, răng hàm trên và khớp thái dương hàm.</p><h2 id="s193-theodoi">VII. THEO DÕI VÀ XỬ TRÍ TAI BIẾN</h2><p>Kỹ thuật này không có tai biến.</p><h2 id="s193-tailieu">TÀI LIỆU THAM KHẢO</h2><ol><li>Kumar M, Shanavas M, Sidappa A, Kiran M. Cone beam computed tomography - know its secrets. J Int Oral Health. 2015;7(2):64-68.</li><li>Miracle AC, Mukherji SK. Conebeam CT of the head and neck, part 2: clinical applications. AJNR Am J Neuroradiol. 2009;30(7):1285-1292. doi:10.3174/ajnr.A1654</li></ol>`

                content: `<h2 id="s194-daicuong">I. ĐẠI CƯƠNG</h2><p>Chụp CLVT hình nón (Cone Beam CT) là một biến thể của chụp CLVT truyền thống với chùm tia phát hình nón, được áp dụng rộng rãi trong nha khoa để đánh giá răng, xương hàm trên, hàm dưới, khớp thái dương hàm với các ưu điểm chụp nhanh, liều tia thấp hơn CLVT thông thường, ảnh thu được có thể dựng hình 3D và tái tạo theo các hướng khác nhau.</p><h2 id="s194-chidinh">II. CHỈ ĐỊNH</h2><ul><li>Đánh giá bệnh lý xương hàm dưới: phát hiện, chẩn đoán, đánh giá độ lan rộng của các bệnh lý xương hàm xâm lấn như u nguyên bào men, nang sừng do răng, ung thư xương hàm... từ đó lên kế hoạch điều trị cũng như vị trí mổ phù hợp.</li><li>Đánh giá gãy xương và gãy răng hàm dưới do chấn thương</li><li>Xác định chính xác chiều cao, độ rộng và giải phẫu của phần xương hàm và xương ổ răng cũng như mối tương quan vùng mất răng với cấu trúc giải phẫu liền kề như ống thần kinh răng dưới giúp lên kế hoạch đặt implant</li><li>Áp dụng trong chỉnh nha: đánh giá tình trạng răng ngầm, hướng mọc của các răng, tương quan và sự phát triển xương hàm, vị trí xương để đặt minivis, phân tích các thông số chỉnh nha về thẩm mỹ khuôn mặt, đánh giá kết quả trước và sau khi chỉnh nha của người bệnh.</li><li>Đánh giá răng khôn mọc lệch, ngầm, mối liên quan của dây thần kinh với chân răng khôn</li><li>Đánh giá khớp thái dương hàm</li><li>Một số chỉ định khác theo hướng dẫn chẩn đoán và điều trị do Bộ Y tế ban hành</li></ul><h2 id="s194-chongchidinh">III. CHỐNG CHỈ ĐỊNH</h2><p>Không có chống chỉ định.</p><h2 id="s194-thantrong">IV. THẬN TRỌNG</h2><ul><li>Người bệnh có thai</li><li>Trong vùng thăm khám có nhiều kim loại gây nhiễu ảnh</li></ul><h2 id="s194-chuanbi">V. CHUẨN BỊ</h2><h3>1. Người thực hiện</h3><ul><li>Bác sỹ chẩn đoán hình ảnh.</li><li>Kỹ thuật y hình ảnh y học</li><li>Điều dưỡng</li></ul><h3>2. Trang thiết bị</h3><ul><li>Hệ thống máy chụp Cone Beam CT</li><li>Hệ thống lưu trữ và truyền ảnh, máy trạm xử lý và đọc ảnh (PACS).</li></ul><h3>3. Người bệnh</h3><ul><li>Giải thích kỹ về thủ thuật để phối hợp với thầy thuốc.</li><li>Tháo bỏ khuyên tai, vòng cổ, cặp tóc nếu có.</li></ul><h3>4. Hồ sơ bệnh án</h3><ul><li>Có phiếu chỉ định chụp cắt lớp vi tính hàm mặt chùm tia hình nón hàm dưới (Cone-Beam CT)</li></ul><h3>5. Thời gian thực hiện</h3><p>Khoảng 15 - 20 phút</p><h2 id="s194-cacbuoctienhanh">VI. CÁC BƯỚC TIẾN HÀNH</h2><ul><li><strong>Bước 1:</strong> Cố định đầu, cằm, răng của người bệnh.</li><li><strong>Bước 2:</strong> Di chuyển bóng phát tia, định vị trường chụp phù hợp với đầu người bệnh. Cho bóng phát tia.</li><li><strong>Bước 3:</strong> Hình ảnh thu được sẽ được chuyển lên hệ thống lưu trữ và xử lý hình ảnh, dựng hình 3D và tái tạo theo các hướng nhìn.</li><li><strong>Bước 4:</strong> Chuyển hình ảnh sang PACS hoặc in phim.</li></ul><h3>Nhận định kết quả</h3><p>Bác sỹ đọc tổn thương, mô tả trên máy tính kết nối nội bộ và in kết quả (nếu cần). Đánh giá được toàn bộ xương, răng hàm dưới, khớp thái dương hàm.</p><h2 id="s194-theodoi">VII. THEO DÕI VÀ XỬ TRÍ TAI BIẾN</h2><p>Kỹ thuật này không có tai biến.</p><h2 id="s194-tailieu">TÀI LIỆU THAM KHẢO</h2><ol><li>Kumar M, Shanavas M, Sidappa A, Kiran M. Cone beam computed tomography - know its secrets. J Int Oral Health. 2015;7(2):64-68.</li><li>Miracle AC, Mukherji SK. Conebeam CT of the head and neck, part 2: clinical applications. AJNR Am J Neuroradiol. 2009;30(7):1285-1292. doi:10.3174/ajnr.A1654</li></ol>`
            },

                content: `<h2 id="s196-daicuong">I. ĐẠI CƯƠNG</h2><p>Là kỹ thuật thu ảnh lồng ngực bằng máy chụp cắt lớp vi tính, chẩn đoán bệnh lý phổi, trung thất, thành ngực...</p><h2 id="s196-chidinh">II. CHỈ ĐỊNH</h2><ul><li>Nghi ngờ các tổn thương thành ngực, phổi, trung thất, tim...</li><li>Chụp tầm soát ung thư phổi ở người bệnh có nguy cơ</li><li>Chấn thương ngực</li><li>Một số chỉ định khác theo hướng dẫn chẩn đoán và điều trị do Bộ Y tế ban hành</li></ul><h2 id="s196-chongchidinh">III. CHỐNG CHỈ ĐỊNH</h2><p>Không có chống chỉ định.</p><h2 id="s196-thantrong">IV. THẬN TRỌNG</h2><p>Phụ nữ có thai.</p><h2 id="s196-chuanbi">V. CHUẨN BỊ</h2><h3>1. Người thực hiện</h3><ul><li>Bác sỹ chẩn đoán hình ảnh.</li><li>Kỹ thuật y hình ảnh y học</li><li>Điều dưỡng</li></ul><h3>2. Trang thiết bị</h3><ul><li>Máy chụp cắt lớp vi tính đa lát cắt</li><li>Hệ thống lưu trữ và truyền ảnh, máy trạm xử lý và đọc ảnh (PACS).</li></ul><h3>3. Người bệnh</h3><ul><li>Người bệnh và người nhà người bệnh được giải thích kỹ về thủ thuật.</li><li>Tháo bỏ khuyên tai, vòng cổ, cặp tóc nếu có.</li></ul><h3>4. Hồ sơ bệnh án</h3><ul><li>Có phiếu chỉ định chụp CLVT lồng ngực không tiêm thuốc cản quang.</li></ul><h3>5. Thời gian thực hiện</h3><p>Khoảng 12 - 20 phút</p><h2 id="s196-cacbuoctienhanh">VI. CÁC BƯỚC TIẾN HÀNH</h2><ul><li><strong>Bước 1:</strong> Đặt người bệnh nằm ngửa, hai tay giơ cao qua đầu, hướng dẫn người bệnh hít vào, nín thở.</li><li><strong>Bước 2:</strong> Chụp định vị (scout view) lấy toàn bộ lồng ngực từ nền cổ đến hết cơ hoành.</li><li><strong>Bước 3:</strong> Chụp các lớp cắt liên tiếp, xoắn ốc từ đỉnh phổi đến hết góc sườn hoành, độ dày lớp cắt tuỳ thuộc vào kích thước tổn thương, từ 3-10mm. Trong trường hợp ung thư phế quản phổi cần cắt hết đến tuyến thượng thận để tìm di căn. Đặt cửa sổ trung thất và cửa sổ nhu mô.</li><li><strong>Bước 4:</strong> Chuyển hình ảnh sang PACS hoặc in phim.</li></ul><h3>Nhận định kết quả</h3><p>Bác sỹ đọc tổn thương, mô tả trên máy tính. Mô tả tổn thương: Vị trí, cấu trúc, kích thước, sự lan rộng. Đưa ra các định hướng chẩn đoán.</p><h2 id="s196-theodoi">VII. THEO DÕI VÀ XỬ TRÍ TAI BIẾN</h2><p>Một số trường hợp có thể phải thực hiện lại kỹ thuật do người bệnh không giữ bất động. Kỹ thuật không có tai biến.</p><h2 id="s196-tailieu">TÀI LIỆU THAM KHẢO</h2><ol><li>Reddinger, Handbook of CT Technique (Computed Tomography Series), WileyBlackwell, 2000.</li><li>Sumeet Bhargava, Satish K Bhargava, CT and MRI Protocol - A Practical Approach, Third Edition, Peepee, 2016.</li><li>Bộ Y tế, “Hướng dẫn quy trình kỹ thuật chẩn đoán hình ảnh và điện quang can thiệp”, Nhà xuất bản y học, 2014</li></ol>`

                content: `<h2 id="s197-daicuong">I. ĐẠI CƯƠNG</h2><p>Là kỹ thuật thu ảnh lồng ngực bằng máy chụp cắt lớp vi tính, chẩn đoán bệnh lý phổi, trung thất, thành ngực...</p><h2 id="s197-chidinh">II. CHỈ ĐỊNH</h2><ul><li>Các tổn thương thành ngực, phổi, trung thất, tim...</li><li>Tổn thương nghi ngờ u, viêm... trên CLVT không tiêm</li><li>Một số chỉ định khác theo hướng dẫn chẩn đoán và điều trị do Bộ Y tế ban hành.</li></ul><h2 id="s197-chongchidinh">III. CHỐNG CHỈ ĐỊNH</h2><p>Không có chống chỉ định.</p><h2 id="s197-thantrong">IV. THẬN TRỌNG</h2><ul><li>Người bệnh có thai</li><li>Trong vùng thăm khám có nhiều kim loại gây nhiễu ảnh</li><li>Người bệnh hen phế quản, cơ địa dị ứng, có bệnh lý thận.</li></ul><h2 id="s197-chuanbi">V. CHUẨN BỊ</h2><h3>1. Người thực hiện</h3><ul><li>Bác sỹ chẩn đoán hình ảnh.</li><li>Kỹ thuật y hình ảnh y học</li><li>Điều dưỡng</li></ul><h3>2. Thuốc, hóa chất & Vật tư</h3><ul><li>Thuốc cản quang tan trong nước</li><li>Bơm tiêm, kim tiêm</li><li>Hộp thuốc và dụng cụ cấp cứu tai biến thuốc cản quang.</li></ul><h3>3. Trang thiết bị</h3><ul><li>Máy chụp cắt lớp vi tính đa lát cắt</li><li>Máy bơm điện chuyên dụng</li><li>Hệ thống PACS.</li></ul><h3>4. Người bệnh</h3><ul><li>Giải thích kỹ về thủ thuật.</li><li>Cần nhịn ăn, uống trước 4 giờ.</li></ul><h3>5. Hồ sơ bệnh án</h3><ul><li>Có phiếu chỉ định chụp CLVT lồng ngực có tiêm thuốc cản quang.</li></ul><h3>6. Thời gian thực hiện</h3><p>Khoảng 20 - 30 phút</p><h2 id="s197-cacbuoctienhanh">VI. CÁC BƯỚC TIẾN HÀNH</h2><ul><li><strong>Bước 1:</strong> Đặt người bệnh nằm ngửa, hai tay giơ cao qua đầu, hướng dẫn nín thở.</li><li><strong>Bước 2:</strong> Đặt đường tiêm truyền bằng kim cỡ 18-20G, lắp vào máy bơm thuốc.</li><li><strong>Bước 3:</strong> Chụp định vị (scout view) lấy toàn bộ lồng ngực.</li><li><strong>Bước 4:</strong> Chụp các lớp cắt liên tiếp, xoắn ốc trước khi tiêm thuốc.</li><li><strong>Bước 5:</strong> Chụp lặp lại sau tiêm thuốc cản quang với liều lượng 1.5-2ml/kg cân nặng, tốc độ tiêm 3-5ml/s, bắt đầu chụp ở thời điểm 30 giây sau khi tiêm.</li><li><strong>Bước 6:</strong> Xử trí hình ảnh và chuyển sang PACS hoặc in phim.</li><li><strong>Bước 7:</strong> Theo dõi người bệnh sau khi chụp. Băng ép vị trí rút kim.</li></ul><h3>Nhận định kết quả</h3><p>Bác sỹ mô tả và nhận định tổn thương và đưa ra chẩn đoán.</p><h2 id="s197-theodoi">VII. THEO DÕI VÀ XỬ TRÍ TAI BIẾN</h2><p>Một số trường hợp phải thực hiện lại kỹ thuật. Tai biến liên quan đến thuốc cản quang cần được xử trí theo quy trình.</p><h2 id="s197-tailieu">TÀI LIỆU THAM KHẢO</h2><ol><li>Reddinger, Handbook of CT Technique (Computed Tomography Series), WileyBlackwell, 2000.</li><li>Sumeet Bhargava, Satish K Bhargava, CT and MRI Protocol - A Practical Approach, Third Edition, Peepee, 2016.</li></ol>`
            },
