    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <!-- Thêm font Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0",
            "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
            "lucide-react": "https://esm.sh/lucide-react@0.344.0?deps=react@18.2.0",
            "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
            "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js",
            "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js"
        }
    }
    </script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    animation: {
                        'blob': 'blob 7s infinite',
                        'fade-in': 'fadeIn 0.5s ease-out',
                        'slide-up': 'slideUp 0.5s ease-out',
                        'slide-down': 'slideDown 0.5s ease-out',
                        'slide-left': 'slideLeft 0.3s ease-out',
                        'confetti': 'confetti 2s ease-out forwards',
                        'scale-up': 'scaleUp 0.3s ease-out',
                        'spin-slow': 'spin 3s linear infinite',
                    },
                    keyframes: {
                        blob: {
                            '0%': { transform: 'translate(0px, 0px) scale(1)' },
                            '33%': { transform: 'translate(30px, -50px) scale(1.1)' },
                            '66%': { transform: 'translate(-20px, 20px) scale(0.9)' },
                            '100%': { transform: 'translate(0px, 0px) scale(1)' },
                        },
                        fadeIn: {
                            'from': { opacity: '0', transform: 'translateY(10px)' },
                            'to': { opacity: '1', transform: 'translateY(0)' },
                        },
                        slideUp: {
                            'from': { transform: 'translateY(100%)' },
                            'to': { transform: 'translateY(0)' },
                        },
                        slideDown: {
                            'from': { transform: 'translateY(-100%)' },
                            'to': { transform: 'translateY(0)' },
                        },
                        slideLeft: {
                            'from': { transform: 'translateX(100%)' },
                            'to': { transform: 'translateX(0)' },
                        },
                        scaleUp: {
                            'from': { transform: 'scale(0.95)', opacity: '0' },
                            'to': { transform: 'scale(1)', opacity: '1' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #0f172a; color: #e2e8f0; -webkit-font-smoothing: antialiased; transition: background-color 0.3s ease, color 0.3s ease; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }
        
        /* Updated CSS for Dark Mode Golden Borders */
        .glass { background: rgba(30, 41, 59, 0.75); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border-bottom: 1px solid rgba(234, 179, 8, 0.2); }
        .glass-panel { background: rgba(30, 41, 59, 0.4); backdrop-filter: blur(12px); border: 1px solid rgba(234, 179, 8, 0.2); }
        .glass-card { background: linear-gradient(145deg, rgba(30, 41, 59, 0.7), rgba(15, 23, 42, 0.9)); backdrop-filter: blur(10px); border: 1px solid rgba(234, 179, 8, 0.2); transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .glass-card:hover { transform: translateY(-4px); border-color: rgba(234, 179, 8, 0.5); box-shadow: 0 10px 30px -10px rgba(234, 179, 8, 0.15); }
        .glass-result { background: linear-gradient(135deg, rgba(15, 23, 42, 0.9), rgba(30, 41, 59, 0.9)); backdrop-filter: blur(20px); border: 1px solid rgba(234, 179, 8, 0.3); }
        
        /* Light Mode Classes Overrides - Blue/White Gradient & Blue Borders */
        body.light-mode { background-color: #f0f9ff; color: #1e3a8a; } /* Sky-50 background, Dark Blue text */
        .light-mode ::-webkit-scrollbar-thumb { background: #93c5fd; } /* Blue-300 scrollbar */
        
        .light-mode .glass { 
            background: rgba(255, 255, 255, 0.85); 
            border-bottom: 1px solid rgba(59, 130, 246, 0.2); /* Blue-500 alpha */
            backdrop-filter: blur(12px);
        }
        
        .light-mode .glass-panel { 
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.9), rgba(239, 246, 255, 0.9)); /* White to Blue-50 */
            border: 1px solid rgba(59, 130, 246, 0.2); 
            box-shadow: 0 4px 6px -1px rgba(59, 130, 246, 0.05);
        }
        
        .light-mode .glass-card {

        .custom-checkbox:checked { background-color: #0891b2; border-color: #0891b2; }

        .confetti-piece { position: absolute; width: 10px; height: 10px; background: #ffd300; top: 0; opacity: 0; }
        .confetti-piece:nth-child(1) { left: 7%; transform: rotate(-40deg); animation: makeItRain 1000ms infinite ease-out; animation-delay: 182ms; animation-duration: 1116ms; }
        .confetti-piece:nth-child(2) { left: 14%; transform: rotate(4deg); animation: makeItRain 1000ms infinite ease-out; animation-delay: 161ms; animation-duration: 1076ms; }
        .confetti-piece:nth-child(3) { left: 21%; transform: rotate(-51deg); animation: makeItRain 1000ms infinite ease-out; animation-delay: 481ms; animation-duration: 1103ms; }
        .confetti-piece:nth-child(4) { left: 28%; transform: rotate(61deg); animation: makeItRain 1000ms infinite ease-out; animation-delay: 334ms; animation-duration: 708ms; }
        .confetti-piece:nth-child(5) { left: 35%; transform: rotate(-52deg); animation: makeItRain 1000ms infinite ease-out; animation-delay: 302ms; animation-duration: 776ms; }
        .confetti-piece:nth-child(6) { left: 42%; transform: rotate(38deg); animation: makeItRain 1000ms infinite ease-out; animation-delay: 180ms; animation-duration: 1168ms; }
        .confetti-piece:nth-child(7) { left: 49%; transform: rotate(11deg); animation: makeItRain 1000ms infinite ease-out; animation-delay: 395ms; animation-duration: 1200ms; }
        .confetti-piece:nth-child(8) { left: 56%; transform: rotate(49deg); animation: makeItRain 1000ms infinite ease-out; animation-delay: 14ms; animation-duration: 887ms; }
        .confetti-piece:nth-child(9) { left: 63%; transform: rotate(-72deg); animation: makeItRain 1000ms infinite ease-out; animation-delay: 149ms; animation-duration: 805ms; }
        .confetti-piece:nth-child(10) { left: 70%; transform: rotate(10deg); animation: makeItRain 1000ms infinite ease-out; animation-delay: 351ms; animation-duration: 1059ms; }
        .confetti-piece:nth-child(11) { left: 77%; transform: rotate(4deg); animation: makeItRain 1000ms infinite ease-out; animation-delay: 307ms; animation-duration: 1132ms; }
        .confetti-piece:nth-child(12) { left: 84%; transform: rotate(42deg); animation: makeItRain 1000ms infinite ease-out; animation-delay: 464ms; animation-duration: 776ms; }
        .confetti-piece:nth-child(13) { left: 91%; transform: rotate(-72deg); animation: makeItRain 1000ms infinite ease-out; animation-delay: 429ms; animation-duration: 818ms; }
        
        @keyframes makeItRain {
            from { opacity: 0; }
            50% { opacity: 1; }
            to { transform: translateY(350px); }
        }

        .noti-badge { position: absolute; top: -2px; right: -2px; width: 10px; height: 10px; background-color: #ef4444; border-radius: 999px; border: 2px solid #1e293b; }

<body>
    <div id="root"></div>
    <script type="text/babel" data-type="module" data-presets="react">
        import React, { useState, useEffect, useMemo, useRef, createContext, useContext } from 'react';
        import { createRoot } from 'react-dom/client';
        import { initializeApp } from 'firebase/app';
        import { 
            getAuth, 
            signInWithEmailAndPassword, 
            createUserWithEmailAndPassword, 
            signOut, 
            onAuthStateChanged, 
            updateProfile, 
            signInWithPopup, 
            GoogleAuthProvider,
            setPersistence, 
            browserLocalPersistence, 
            browserSessionPersistence,
            sendPasswordResetEmail,
            signInAnonymously,
            signInWithCustomToken
        } from 'firebase/auth';
        import { getFirestore, collection, addDoc, query, onSnapshot, serverTimestamp, orderBy, setDoc, doc, getDoc, getDocs, where, updateDoc, increment, limit, deleteDoc } from 'firebase/firestore';
        import { Activity, AlertTriangle, Award, Clock, FileText, History, LogOut, ShieldCheck, User, Users, XCircle, Loader2, Lock, Crown, Search, Filter, BookOpen, Star, Grid, CheckCircle2, ChevronRight, Menu, ArrowUp, Edit3, Save, Phone, MapPin, Calendar, CreditCard, Send, Hourglass, Eye, CheckCircle, Share2, Download, Facebook, Copy, Trophy, Medal, Sun, Moon, Type, X, Info, Check, Quote, Mail, Key, Flag, BarChart3, AlertCircle, RefreshCw, Bell, Trash2, Camera, Upload, Twitter, SendHorizontal, AlignJustify, Columns, LayoutGrid, Megaphone } from 'lucide-react';

        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {
            apiKey: "AIzaSyDqdo_DJIWa5iqxiCgBq-0iGX7f9sr6soo",
            authDomain: "rt-examination.firebaseapp.com",
            projectId: "rt-examination",
            storageBucket: "rt-examination.firebasestorage.app",
            messagingSenderId: "920482699854",
            appId: "1:920482699854:web:44f9b0d735bdc001c6c11f",
            measurementId: "G-8N7RTTREQM"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'med-exam-pro-html';

        const BANK_INFO = {
            bankName: "BIDV",
            accountNum: "8890523877", 
            accountName: "LE THANH TRONG", 
            amount: "50,000"
        };

        const VIP_DURATION_DAYS = 30;

        // --- THEME CONTEXT ---
        const ThemeContext = createContext();
        const useTheme = () => useContext(ThemeContext);

        // --- HELPER & UTILS ---
        const formatDate = (ts) => {
            if (!ts) return "---";
            const date = ts.toDate ? ts.toDate() : new Date(ts);
            return date.toLocaleDateString('vi-VN', { 
                day: '2-digit', 
                month: '2-digit', 
                year: 'numeric' 
            });
        };

        const syncUserProfile = async (user, displayName) => {
            try {
                const userRef = doc(db, 'artifacts', appId, 'public', 'data', 'users', user.uid);
                const userSnap = await getDoc(userRef);
                
                if (!userSnap.exists()) {
                    await setDoc(userRef, {
                        uid: user.uid,
                        email: user.email,
                        displayName: displayName || user.displayName || user.email.split('@')[0],
                        photoURL: user.photoURL || '',
                        isPremium: false,
                        gender: 'other', 
                        phone: '',
                        address: '',
                        totalScore: 0,
                        examsCompleted: 0,
                        createdAt: serverTimestamp(),
                        lastActive: serverTimestamp(),
                        role: 'user'
                    });
                } else {
                    await updateDoc(userRef, { lastActive: serverTimestamp() });
                }
            } catch (e) { console.error("Sync profile error:", e); }
        };

        const UserAvatar = ({ user, profile, className = "w-10 h-10" }) => {
            const url = profile?.photoURL || user?.photoURL;
            const initial = (profile?.displayName || user?.displayName || user?.email || "?").charAt(0).toUpperCase();
            
            if (url) {
                return (
                    <div className={`${className} rounded-full overflow-hidden border-2 border-slate-700 shadow-md flex items-center justify-center bg-slate-800`}>
                        <img src={url} alt="Avatar" className="w-full h-full object-cover" onError={(e) => { e.target.onerror = null; e.target.src = `https://ui-avatars.com/api/?name=${initial}&background=random`; }} />
                    </div>
                );
            }
            
            return (
                <div className={`${className} rounded-full bg-gradient-to-br from-blue-500 to-purple-600 flex items-center justify-center text-white font-bold shadow-inner ring-2 ring-slate-900`}>
                    {initial}
                </div>
            );
        };

        // --- CUSTOM UI COMPONENTS ---

        const ToastContext = createContext();

        const ToastProvider = ({ children }) => {
            const [toasts, setToasts] = useState([]);

            const addToast = (message, type = 'info') => {
                const id = Date.now();
                setToasts(prev => [...prev, { id, message, type }]);
                setTimeout(() => removeToast(id), 3000);
            };

            const removeToast = (id) => {
                setToasts(prev => prev.filter(t => t.id !== id));
            };

            return (
                <ToastContext.Provider value={{ addToast }}>
                    {children}
                    <div className="fixed top-4 right-4 z-[100] flex flex-col gap-2">
                        {toasts.map(toast => (
                            <div key={toast.id} className={`flex items-center gap-3 px-4 py-3 rounded-xl shadow-2xl backdrop-blur-md border animate-fade-in ${
                                toast.type === 'error' ? 'bg-red-500/10 border-red-500/50 text-red-400' : 
                                toast.type === 'success' ? 'bg-emerald-500/10 border-emerald-500/50 text-emerald-400' : 
                                'bg-slate-800/90 border-slate-600 text-white'
                            }`}>
                                {toast.type === 'error' ? <AlertTriangle size={18}/> : toast.type === 'success' ? <CheckCircle2 size={18}/> : <Info size={18}/>}
                                <span className="text-sm font-medium">{toast.message}</span>
                                <button onClick={() => removeToast(toast.id)}><X size={14} className="opacity-50 hover:opacity-100"/></button>
                            </div>
                        ))}
                    </div>
                </ToastContext.Provider>
            );
        };

        const useToast = () => useContext(ToastContext);

        const Confetti = () => (
            <div className="fixed inset-0 pointer-events-none z-50 overflow-hidden">
                {[...Array(13)].map((_, i) => (
                    <div key={i} className="confetti-piece" style={{backgroundColor: ['#f00', '#0f0', '#00f', '#ff0', '#f0f'][i%5]}}></div>
                ))}
            </div>
        );

        const Skeleton = ({ className }) => <div className={`bg-slate-700/50 animate-pulse rounded-lg ${className}`}></div>;

        const PerformanceChart = ({ historyData }) => {
            const { isDarkMode } = useTheme();
            if (!historyData || historyData.length === 0) return (
                <div className={`h-40 flex items-center justify-center text-sm italic ${isDarkMode ? 'text-slate-500' : 'text-blue-400'}`}>Chưa có dữ liệu thi</div>
            );

            const data = [...historyData].slice(0, 10).reverse();
            const maxScore = 10;
            
            const points = data.map((item, index) => {
                const x = data.length === 1 ? 50 : (index / (data.length - 1)) * 100;
                const y = 100 - ((Number(item.score) / maxScore) * 80 + 10); 
                return { x, y, score: item.score, title: item.examTitle };
            });

            const pointsString = points.map(p => `${p.x},${p.y}`).join(' ');
            const areaPath = data.length > 1 ? `M ${points[0].x},100 L ${pointsString.replace(/ /g, ' L ')} L ${points[points.length - 1].x},100 Z` : '';

            return (
                <div className={`w-full h-48 mt-4 relative select-none rounded-xl border p-2 ${isDarkMode ? 'bg-slate-900/30 border-white/5' : 'bg-white/60 border-blue-200 shadow-inner'}`}>
                    <div className={`absolute left-0 top-2 bottom-2 w-8 flex flex-col justify-between text-[10px] font-mono text-right pr-2 border-r border-dashed ${isDarkMode ? 'text-slate-500 border-slate-700/50' : 'text-blue-400 border-blue-200'}`}>
                        <span>10</span>
                        <span>5</span>
                        <span>0</span>
                    </div>
                    <div className="absolute left-10 right-2 top-2 bottom-2">
                        <div className="absolute inset-0 flex flex-col justify-between pointer-events-none">
                            {[1,2,3].map(i => <div key={i} className={`border-t border-dashed w-full h-0 ${isDarkMode ? 'border-slate-700/30' : 'border-blue-200/50'}`}></div>)}
                        </div>
                        <svg className="w-full h-full overflow-visible" viewBox="0 0 100 100" preserveAspectRatio="none">
                            <defs>
                                <linearGradient id="chartGradient" x1="0" y1="0" x2="0" y2="1">
                                    <stop offset="0%" stopColor="#22d3ee" stopOpacity="0.4" />
                                    <stop offset="100%" stopColor="#22d3ee" stopOpacity="0" />
                                </linearGradient>
                            </defs>
                            {data.length > 1 && <path d={areaPath} fill="url(#chartGradient)" stroke="none" />}
                            {data.length > 1 && <polyline points={pointsString} fill="none" stroke="#22d3ee" strokeWidth="2" vectorEffect="non-scaling-stroke" strokeLinecap="round" strokeLinejoin="round" className="drop-shadow-md"/>}
                        </svg>
                        {points.map((p, i) => (
                            <div key={i} className={`absolute w-3 h-3 -ml-1.5 -mt-1.5 rounded-full border-2 border-cyan-500 hover:border-white hover:bg-cyan-500 hover:scale-125 transition-all cursor-pointer group z-10 shadow-lg flex items-center justify-center ${isDarkMode ? 'bg-slate-900' : 'bg-white'}`} style={{ left: `${p.x}%`, top: `${p.y}%` }}>
                                <div className="absolute bottom-full left-1/2 -translate-x-1/2 mb-2 opacity-0 group-hover:opacity-100 transition-opacity pointer-events-none z-20 min-w-[80px]">
                                    <div className={`text-[10px] py-1.5 px-2 rounded-lg border shadow-xl text-center backdrop-blur-sm ${isDarkMode ? 'bg-slate-800 text-white border-slate-600' : 'bg-white text-blue-900 border-blue-200'}`}>
                                        <div className="font-bold text-cyan-500 text-sm">{p.score} điểm</div>
                                        <div className={`text-[9px] truncate max-w-[120px] ${isDarkMode ? 'text-slate-400' : 'text-slate-500'}`}>{p.title}</div>
                                    </div>
                                    <div className={`w-1.5 h-1.5 border-r border-b transform rotate-45 mx-auto -mt-1 ${isDarkMode ? 'bg-slate-800 border-slate-600' : 'bg-white border-blue-200'}`}></div>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            )
        };

        const AuthScreen = ({ globalConfig }) => {
            const [isRegistering, setIsRegistering] = useState(false);
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [name, setName] = useState('');
            const [rememberMe, setRememberMe] = useState(true);
            const [loading, setLoading] = useState(false);
            const [showForgot, setShowForgot] = useState(false);
            const [resetEmail, setResetEmail] = useState('');
            const [isResetting, setIsResetting] = useState(false);
            const { addToast } = useToast();
            const bgImage = globalConfig?.loginBg || "https://images.unsplash.com/photo-1576091160399-112ba8d25d1d?auto=format&fit=crop&q=80";

            const handleSubmit = async (e) => {
                e.preventDefault();
                setLoading(true);
                try {
                    const persistenceType = rememberMe ? browserLocalPersistence : browserSessionPersistence;
                    await setPersistence(auth, persistenceType);
                    if (isRegistering) {
                        const res = await createUserWithEmailAndPassword(auth, email, password);
                        await updateProfile(res.user, { displayName: name });
                        await syncUserProfile(res.user, name);
                        addToast("Đăng ký thành công!", "success");
                    } else {
                        const res = await signInWithEmailAndPassword(auth, email, password);
                        await syncUserProfile(res.user, res.user.displayName);
                        addToast("Đăng nhập thành công!", "success");
                    }
                } catch (err) { addToast(err.message, "error"); } finally { setLoading(false); }
            };

            const handleGoogle = async () => {
                try {
                    await setPersistence(auth, browserLocalPersistence); 
                    const res = await signInWithPopup(auth, new GoogleAuthProvider());
                    await syncUserProfile(res.user, res.user.displayName);
                    addToast("Đăng nhập Google thành công!", "success");
                } catch (err) { addToast(err.message, "error"); }
            };

            const handleResetPassword = async (e) => {
                e.preventDefault();
                if (!resetEmail) return addToast("Vui lòng nhập email.", "error");
                setIsResetting(true);
                try {
                    await sendPasswordResetEmail(auth, resetEmail);
                    addToast("Đã gửi email khôi phục!", "success");
                    setShowForgot(false);
                } catch (err) { addToast("Lỗi gửi email: " + err.message, "error"); } finally { setIsResetting(false); }
            };

            return (
                <div className="min-h-screen flex items-center justify-center relative overflow-hidden" style={{backgroundImage: `linear-gradient(rgba(15, 23, 42, 0.85), rgba(15, 23, 42, 0.95)), url('${bgImage}')`, backgroundSize: 'cover', backgroundPosition: 'center'}}>
                    <div className="absolute top-0 -left-4 w-72 h-72 bg-purple-500 rounded-full mix-blend-multiply filter blur-xl opacity-20 animate-blob"></div>
                    <div className="absolute top-0 -right-4 w-72 h-72 bg-cyan-500 rounded-full mix-blend-multiply filter blur-xl opacity-20 animate-blob animation-delay-2000"></div>
                    <div className="absolute -bottom-8 left-20 w-72 h-72 bg-blue-500 rounded-full mix-blend-multiply filter blur-xl opacity-20 animate-blob animation-delay-4000"></div>
                    <div className="w-full max-w-md bg-slate-900/60 border border-slate-700/50 p-8 rounded-[2rem] shadow-2xl animate-fade-in backdrop-blur-xl relative z-10 mx-4">
                        <div className="text-center mb-8">
                            <div className="w-16 h-16 bg-gradient-to-tr from-cyan-500 to-blue-600 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg shadow-cyan-500/30 transform rotate-3 hover:rotate-6 transition-transform"><Activity size={32} className="text-white"/></div>
                            <h1 className="text-3xl font-black text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-500">MedExam Pro</h1>
                            <p className="text-slate-400 text-sm mt-2">Nền tảng ôn thi y khoa hàng đầu</p>
                        </div>
                        <form onSubmit={handleSubmit} className="space-y-4">
                            {isRegistering && <div className="space-y-1"><input className="w-full bg-slate-950/50 border border-slate-700 rounded-xl p-4 text-white outline-none focus:border-cyan-500 focus:ring-1 focus:ring-cyan-500 transition-all placeholder:text-slate-600" placeholder="Họ tên hiển thị" value={name} onChange={e=>setName(e.target.value)} required/></div>}

lassName="animate-spin"/> : <Send size={18}/>} Tôi đã chuyển khoản</button></>)}

border-slate-700 hover:border-red-500/30 transition-colors flex flex-col items-center gap-1 text-[10px]" title="Báo cáo lỗi câu hỏi này"><AlertCircle size={16} /> Báo lỗi</button></div></div>); })}

        const ExamInterface = ({ exam, onFinish, onExit }) => {
            const { isDarkMode, toggleTheme } = useTheme();
            const [timeLeft, setTimeLeft] = useState(exam.duration * 60);
            const [answers, setAnswers] = useState({});
            const [submitting, setSubmitting] = useState(false);
            const [isDrawerOpen, setIsDrawerOpen] = useState(false); 
            const questionRefs = useRef([]);
            const [flags, setFlags] = useState({}); 
            const [fontSizeLevel, setFontSizeLevel] = useState(1); 
            const [layoutCols, setLayoutCols] = useState(1);

            // Ref to keep track of current answers for timer callback
            const answersRef = useRef(answers);
            useEffect(() => { answersRef.current = answers; }, [answers]);

            useEffect(() => {
                const timer = setInterval(() => {
                    setTimeLeft(prev => {
                        if (prev <= 1) {
                            clearInterval(timer);
                            return 0;
                        }
                        return prev - 1;
                    });
                }, 1000);
                return () => clearInterval(timer);
            }, []);

            // Effect to trigger finish when time runs out
            useEffect(() => {
                if (timeLeft === 0 && !submitting) {
                     // Pass true to forceSubmit to skip confirmation
                     // We use answersRef.current implicitly inside finish by calling setAnswers state? 
                     // Actually finish uses state 'answers'. But since this effect runs when timeLeft changes to 0,
                     // the closure might have stale answers if not careful.
                     // However, since 'finish' is defined in the component scope, and this effect depends on [timeLeft],
                     // it will close over the current 'finish' which closes over current 'answers' IF 'finish' was recreated.
                     // But 'finish' is not a dependency here.
                     // Best practice: The finish function below reads 'answers' state directly.
                     // Since this useEffect runs on every render where timeLeft changes (every second),
                     // the closure is fresh enough? No, setTimeLeft is functional update.
                     // The effect runs when timeLeft updates.
                     // To be safe, let's just call finish(true).
                     finish(true);
                }
            }, [timeLeft]);

            // ... (Ping logic for active exams, same as before) ...
            useEffect(() => { if (exam.sessionId) { const pingInterval = setInterval(async () => { try { await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'active_exams', exam.sessionId), { lastPing: serverTimestamp() }); } catch (e) { console.log("Ping error", e); } }, 30000); return () => clearInterval(pingInterval); } }, [exam.sessionId]);

            const finish = async (forceSubmit = false) => {
                if(submitting) return;
                const user = auth.currentUser;
                if (!user) return;
                
                // Use answersRef for safety in auto-submit case, or state answers for manual
                const currentAnswers = forceSubmit ? answersRef.current : answers;
                
                const unansweredCount = exam.questions.length - Object.keys(currentAnswers).length;
                if (!forceSubmit) {
                    if (unansweredCount > 0) { if (!confirm(`⚠️ CẢNH BÁO CHƯA LÀM HẾT\n\nBạn còn ${unansweredCount} câu hỏi chưa chọn đáp án.\nBạn có chắc chắn muốn nộp bài ngay bây giờ không?`)) return; }
                    else { if (!confirm(`XÁC NHẬN NỘP BÀI\n\nBạn đã trả lời đủ ${exam.questions.length} câu.\nBạn có muốn kết thúc bài thi không?`)) return; }
                }
                
                setSubmitting(true);
                let correct = 0; 
                exam.questions.forEach((q, i) => { if(currentAnswers[i] === q.correctOption) correct++; });
                const score = (correct / exam.questions.length) * 10;
                
                if (exam.sessionId) { try { await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'active_exams', exam.sessionId)); } catch (e) {} }
                
                try {
                    await addDoc(collection(db, 'artifacts', appId, 'users', user.uid, 'history'), { examId: exam.id, examTitle: exam.title, score: score.toFixed(1), totalQuestions: exam.questions.length, correctCount: correct, date: serverTimestamp(), userId: user.uid, displayName: user.displayName || 'User' });
                    const userRef = doc(db, 'artifacts', appId, 'public', 'data', 'users', user.uid); 
                    await updateDoc(userRef, { totalScore: increment(Number(score)), examsCompleted: increment(1), lastActive: serverTimestamp() });
                } catch(e) { console.error("Save error", e); }
                
                onFinish({ score: score.toFixed(1), correctCount: correct, total: exam.questions.length, examTitle: exam.title, questions: exam.questions, userAnswers: currentAnswers, examId: exam.id });
            };

            const handleExit = async () => {
                if (confirm("⚠️ XÁC NHẬN THOÁT\n\nKết quả bài làm sẽ KHÔNG được lưu lại.\nBạn có chắc chắn muốn thoát ra màn hình chính?")) {
                    if (exam.sessionId) { try { await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'active_exams', exam.sessionId)); } catch (e) { console.error("Lỗi xóa session khi thoát:", e); } }
                    onExit();
                }
            };

            const scrollToQuestion = (index) => { questionRefs.current[index]?.scrollIntoView({ behavior: 'smooth', block: 'center' }); setIsDrawerOpen(false); };
            const toggleFlag = (index) => { setFlags(prev => ({ ...prev, [index]: !prev[index] })); };
            const answeredCount = Object.keys(answers).length;
            const progressPercent = Math.round((answeredCount / exam.questions.length) * 100);

            // Theme Classes using Context
            const bgClass = isDarkMode ? 'bg-slate-950' : 'bg-blue-50';
            const textClass = isDarkMode ? 'text-slate-200' : 'text-slate-800';
            const headerClass = isDarkMode ? 'glass border-white/5' : 'bg-white border-b border-blue-200 shadow-sm';
            const sidebarClass = isDarkMode ? 'bg-slate-900 border-slate-800' : 'bg-white border-blue-200';
            const currentFont = [{ q: 'text-base', o: 'text-sm' }, { q: 'text-lg', o: 'text-base' }, { q: 'text-xl', o: 'text-lg' }, { q: 'text-2xl', o: 'text-xl' }][fontSizeLevel];

            return (
                <div className={`fixed inset-0 z-50 flex flex-col md:flex-row h-screen overflow-hidden ${bgClass} ${textClass} transition-colors duration-300`}>
                    <div className="absolute top-0 left-0 w-full h-1 z-[60] bg-gray-200 dark:bg-slate-800"><div className="h-full bg-cyan-500 transition-all duration-300" style={{width: `${progressPercent}%`}}></div></div>
                    <div className="flex-1 flex flex-col h-full relative">
                        <div className={`${headerClass} p-3 md:p-4 flex justify-between items-center z-10 shrink-0 shadow-lg`}>
                            <div className="flex items-center gap-4">
                                <button onClick={handleExit} className={`p-2 rounded-lg border transition-all group ${isDarkMode ? 'bg-slate-800 hover:bg-red-500/20 text-slate-400 hover:text-red-400 border-yellow-500/20 hover:border-red-500/50' : 'bg-white hover:bg-red-50 text-slate-500 hover:text-red-600 border-blue-200 hover:border-red-200'}`} title="Thoát bài thi"><LogOut size={20} className="rotate-180" /></button>
                                <div><h2 className={`font-bold text-base md:text-lg line-clamp-1 max-w-[150px] md:max-w-none ${isDarkMode ? 'text-cyan-400' : 'text-blue-700'}`}>{exam.title}</h2><div className={`text-xs flex items-center gap-2 mt-0.5 ${isDarkMode ? 'text-slate-400' : 'text-slate-500'}`}><span className="hidden md:inline">Đã làm: {answeredCount}/{exam.questions.length}</span><span className={`px-2 py-0.5 rounded font-bold ${isDarkMode ? 'bg-slate-800 text-cyan-400' : 'bg-blue-100 text-blue-700'}`}>{progressPercent}%</span></div></div>
                            </div>
                            
                            <div className="flex items-center gap-2 md:gap-3">
                                <button onClick={()=>setIsDrawerOpen(!isDrawerOpen)} className={`md:hidden p-2 rounded-lg border ${isDarkMode ? 'bg-slate-800 border-slate-700 text-cyan-400' : 'bg-white border-blue-200 text-blue-600'}`}><Grid size={20}/></button>
                                <div className={`hidden md:flex items-center rounded-lg border p-1 ${isDarkMode ? 'bg-slate-800 border-yellow-500/20' : 'bg-white border-blue-200'}`}>
                                    <button onClick={() => setFontSizeLevel(prev => Math.max(0, prev - 1))} disabled={fontSizeLevel === 0} className={`p-1.5 rounded transition-colors ${isDarkMode ? 'hover:bg-slate-700 disabled:opacity-30' : 'hover:bg-blue-50 disabled:opacity-50'}`}><Type size={14} /></button>
                                    <span className="text-xs font-mono w-6 text-center">{fontSizeLevel + 1}</span>
                                    <button onClick={() => setFontSizeLevel(prev => Math.min(3, prev + 1))} disabled={fontSizeLevel === 3} className={`p-1.5 rounded transition-colors ${isDarkMode ? 'hover:bg-slate-700 disabled:opacity-30' : 'hover:bg-blue-50 disabled:opacity-50'}`}><Type size={18} /></button>
                                </div>
                                <div className={`hidden lg:flex items-center rounded-lg border p-1 ml-2 ${isDarkMode ? 'bg-slate-800 border-yellow-500/20' : 'bg-white border-blue-200'}`}>
                                    <button onClick={() => setLayoutCols(1)} className={`p-1.5 rounded transition-colors ${layoutCols === 1 ? (isDarkMode ? 'bg-slate-600 text-white' : 'bg-blue-100 text-blue-700') : (isDarkMode ? 'hover:bg-slate-700 text-slate-400' : 'hover:bg-blue-50 text-slate-400')}`} title="1 cột"><AlignJustify size={14} /></button>
                                    <button onClick={() => setLayoutCols(2)} className={`p-1.5 rounded transition-colors ${layoutCols === 2 ? (isDarkMode ? 'bg-slate-600 text-white' : 'bg-blue-100 text-blue-700') : (isDarkMode ? 'hover:bg-slate-700 text-slate-400' : 'hover:bg-blue-50 text-slate-400')}`} title="2 cột"><Columns size={14} /></button>
                                    <button onClick={() => setLayoutCols(3)} className={`p-1.5 rounded transition-colors ${layoutCols === 3 ? (isDarkMode ? 'bg-slate-600 text-white' : 'bg-blue-100 text-blue-700') : (isDarkMode ? 'hover:bg-slate-700 text-slate-400' : 'hover:bg-blue-50 text-slate-400')}`} title="3 cột"><LayoutGrid size={14} /></button>
                                </div>
                                <button onClick={toggleTheme} className={`hidden md:block p-2 rounded-lg border transition-all ${isDarkMode ? 'bg-slate-800 border-yellow-500/20 hover:text-yellow-400' : 'bg-white border-blue-200 text-slate-500 hover:text-orange-500 hover:bg-orange-50'}`}>{isDarkMode ? <Moon size={20} /> : <Sun size={20} />}</button>

                                        <div className="flex gap-4 mb-6 relative">
                                            <span className="shrink-0 w-8 h-8 rounded-full bg-cyan-600 text-white flex items-center justify-center font-black text-sm">{index + 1}</span>
                                            <div className="flex-1"><div className={`${currentFont.q} font-bold leading-relaxed mb-3`}>{q.text}</div>{q.image && (<div className="mb-4 flex justify-center"><img src={q.image} alt="Hình minh họa" className="max-h-80 max-w-full rounded-xl border border-slate-700/50 object-contain shadow-lg" onError={(e) => e.target.style.display = 'none'} /></div>)}</div>
                                            <button onClick={() => setFlags({...flags, [index]: !flags[index]})} className={`absolute -right-2 -top-2 p-2 rounded-full ${flags[index] ? 'text-yellow-400 bg-yellow-500/10' : 'text-slate-400 hover:text-yellow-400'}`}><Flag size={20} fill={flags[index] ? "currentColor" : "none"} /></button>
                                        </div>
                                        <div className="space-y-3">

                                                    <div className={`w-5 h-5 rounded-full border-2 mr-4 flex items-center justify-center ${answers[index] === optIdx ? 'border-cyan-500' : 'border-slate-400'}`}>{answers[index] === optIdx && <div className="w-2.5 h-2.5 rounded-full bg-cyan-500"></div>}</div>
                                                    <span className={currentFont.o}>{o}</span>
                                                    <input type="radio" className="hidden" checked={answers[index] === optIdx} onChange={() => setAnswers({...answers, [index]: optIdx})} />
                                                </label>
                                            ))}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                        <div className="p-4 border-t border-white/5 bg-slate-900/80 backdrop-blur md:hidden">

                        </div>
                    </div>
                    
                    <div className={`hidden md:flex w-80 border-l flex-col shrink-0 h-full ${sidebarClass}`}>
                        <div className={`p-5 border-b ${isDarkMode ? 'border-yellow-500/20' : 'border-blue-200'}`}>
                            <h3 className={`font-bold mb-2 flex items-center gap-2 ${isDarkMode ? 'text-slate-300' : 'text-blue-900'}`}><Grid size={18}/> Danh sách câu hỏi</h3>
                            <div className={`flex justify-between items-center text-xs mb-2 ${isDarkMode ? 'text-slate-500' : 'text-slate-500'}`}><span>Tiến độ hoàn thành</span><span className="text-cyan-600 font-bold">{progressPercent}%</span></div>
                            <div className={`w-full h-2.5 rounded-full overflow-hidden border ${isDarkMode ? 'bg-slate-800 border-slate-700' : 'bg-white border-blue-100'}`}><div className="bg-cyan-500 h-full transition-all duration-500 ease-out" style={{width: `${progressPercent}%`}}></div></div>
                        </div>
                        <div className="flex-1 overflow-y-auto p-4 custom-scrollbar">
                            <div className="grid grid-cols-5 gap-2">{exam.questions.map((_, i) => (<button key={i} onClick={() => scrollToQuestion(i)} className={`aspect-square rounded-lg text-sm font-bold flex items-center justify-center transition-all hover:scale-105 relative ${answers[i] !== undefined ? 'bg-cyan-600 text-white shadow-md' : (isDarkMode ? 'bg-slate-800 text-slate-500 hover:bg-slate-700 border border-slate-700' : 'bg-white text-slate-400 hover:bg-blue-50 border border-blue-200')}`}>{i+1}{flags[i] && <div className="absolute top-0 right-0 w-2.5 h-2.5 bg-yellow-400 rounded-full border border-slate-900 -translate-y-1/3 translate-x-1/3"></div>}</button>))}</div>
                        </div>
                        <div className={`p-5 border-t z-20 ${isDarkMode ? 'border-slate-800 bg-slate-900' : 'border-blue-200 bg-white'}`}><button onClick={() => finish(false)} disabled={submitting} className="w-full bg-emerald-600 hover:bg-emerald-500 py-3 rounded-xl font-bold text-white shadow-lg shadow-emerald-500/20 transition-all transform hover:scale-[1.02] active:scale-95 disabled:opacity-50 disabled:transform-none flex items-center justify-center gap-2">{submitting ? <Loader2 className="animate-spin" size={20}/> : <CheckCircle2 size={20}/>} {submitting ? 'Đang nộp...' : 'Nộp Bài Thi'}</button></div>
                    </div>

                    {isDrawerOpen && (
                        <div className="fixed inset-0 z-[70] md:hidden">
                            <div className="absolute inset-0 bg-black/60 backdrop-blur-sm" onClick={()=>setIsDrawerOpen(false)}></div>
                            <div className={`absolute right-0 top-0 bottom-0 w-3/4 max-w-sm ${isDarkMode ? 'bg-slate-900' : 'bg-white'} shadow-2xl flex flex-col animate-slide-left`}>
                                <div className="p-4 border-b border-slate-800 flex justify-between items-center"><h3 className={`font-bold ${isDarkMode ? 'text-white' : 'text-gray-800'}`}>Danh sách câu hỏi</h3><button onClick={()=>setIsDrawerOpen(false)}><X size={24} className="text-slate-500"/></button></div>
                                <div className="flex-1 overflow-y-auto p-4"><div className="grid grid-cols-5 gap-3">{exam.questions.map((_, i) => (<button key={i} onClick={() => scrollToQuestion(i)} className={`aspect-square rounded-lg text-sm font-bold flex items-center justify-center transition-all relative ${answers[i] !== undefined ? 'bg-cyan-600 text-white shadow-md' : (isDarkMode ? 'bg-slate-800 text-slate-500 border border-slate-700' : 'bg-white text-gray-400 hover:bg-gray-100 border border-gray-200')}`}>{i+1}{flags[i] && <div className="absolute top-0 right-0 w-2.5 h-2.5 bg-yellow-400 rounded-full border border-slate-900 -translate-y-1/3 translate-x-1/3"></div>}</button>))}</div></div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const Dashboard = ({ user, profile, onStartExam, onViewHistory, onUpgrade, isPendingVip }) => {
            const [exams, setExams] = useState([]);
            const [stats, setStats] = useState({ totalTaken: 0, avgScore: 0, rank: 'Tập sự' });
            const [historyData, setHistoryData] = useState([]); 
            const [newsList, setNewsList] = useState([]); // State cho tin tức
            const [filter, setFilter] = useState('all'); 
            const [search, setSearch] = useState('');
            const [loading, setLoading] = useState(true);
            const { isDarkMode } = useTheme();

            useEffect(() => {
                if (!user) return;
                
                // Lấy danh sách đề thi
                const unsubExams = onSnapshot(query(collection(db, 'artifacts', appId, 'public', 'data', 'exams'), orderBy('createdAt', 'desc')), s => {
                    setExams(s.docs.map(d=>({id: d.id, ...d.data()})));
                    setLoading(false);
                }, (error) => setLoading(false));

                // Lấy lịch sử thi
                const unsubHistory = onSnapshot(query(collection(db, 'artifacts', appId, 'users', user.uid, 'history'), orderBy('date', 'desc')), s => {
                    const records = s.docs.map(d=>d.data()); setHistoryData(records); 
                    const total = records.length; const avg = total > 0 ? (records.reduce((acc, r) => acc + Number(r.score), 0) / total).toFixed(1) : 0;
                    let rank = 'Tập sự'; if (total > 5) rank = 'Học viên'; if (total > 20 && avg > 7) rank = 'Chuyên cần'; if (total > 50 && avg > 8.5) rank = 'Tinh anh';
                    setStats({ totalTaken: total, avgScore: avg, rank });
                }, (error) => console.error("History sync error", error));

                // Lấy tin tức & sự kiện (Mới thêm)
                const unsubNews = onSnapshot(query(collection(db, 'artifacts', appId, 'public', 'data', 'news_events'), orderBy('createdAt', 'desc'), limit(5)), s => {
                    setNewsList(s.docs.map(d => ({ id: d.id, ...d.data() })));
                }, (error) => console.error("News sync error", error));

                return () => { unsubExams(); unsubHistory(); unsubNews(); };
            }, [user]);

            const filteredExams = exams.filter(e => { const matchesSearch = e.title.toLowerCase().includes(search.toLowerCase()); if (filter === 'free') return matchesSearch && !e.isPremium; if (filter === 'vip') return matchesSearch && e.isPremium; return matchesSearch; });
            const renderStars = (ratingSum, ratingCount) => { const avg = ratingCount > 0 ? ratingSum / ratingCount : 0; return (<div className="flex items-center gap-1 text-yellow-400 text-xs bg-slate-900/40 px-2 py-1 rounded-full border border-yellow-500/10"><span className="font-bold text-white mr-1">{avg.toFixed(1)}</span><Star size={10} fill="currentColor"/><span className="text-slate-500 ml-1">({ratingCount || 0})</span></div>); };
            const handleShareExam = (exam, platform) => { /* Share logic remains the same */ };
            const QuoteCard = () => ( <div className="mb-8 p-6 rounded-2xl bg-gradient-to-r from-violet-600/20 to-indigo-600/20 border border-indigo-500/20 flex items-center gap-4 relative overflow-hidden"><Quote size={48} className="text-indigo-500 opacity-20 absolute top-2 left-2" /><div className="relative z-10"><p className="text-indigo-200 dark:text-indigo-200 text-indigo-800 italic font-medium">"Không có bí mật nào cho sự thành công. Đó là kết quả của sự chuẩn bị kỹ càng, làm việc chăm chỉ và học hỏi từ thất bại."</p><p className="text-indigo-400 dark:text-indigo-400 text-indigo-600 text-xs font-bold mt-2 uppercase tracking-wider">- Colin Powell</p></div></div> );

            return (
                <div className="pb-20 animate-fade-in max-w-7xl mx-auto">
                    <div className="bg-gradient-to-r from-slate-800 to-slate-900 rounded-3xl p-8 mb-8 relative overflow-hidden border border-slate-700 shadow-2xl group">
                        <div className="absolute top-0 right-0 w-96 h-96 bg-cyan-500/10 rounded-full blur-3xl -translate-y-1/2 translate-x-1/3 transition-all duration-1000 group-hover:bg-cyan-500/20"></div>
                        <div className="relative z-10 flex flex-col md:flex-row justify-between items-center gap-6">
                            <div className="flex items-center gap-4">
                                <UserAvatar user={user} profile={profile} className="w-16 h-16 text-2xl" />
                                <div><p className="text-slate-400 text-sm font-medium mb-1">Chào mừng trở lại,</p><h2 className="text-3xl font-black text-white tracking-tight">{user.displayName}</h2></div>
                            </div>
                            <div className="flex gap-3 md:gap-6">
                                <div className="bg-slate-800/80 backdrop-blur p-4 rounded-2xl border border-white/5 min-w-[100px] text-center shadow-lg"><p className="text-slate-400 text-[10px] uppercase font-bold mb-1 tracking-wider">Đã làm</p><p className="text-2xl font-black text-cyan-400">{stats.totalTaken}</p></div>
                                <div className="bg-slate-800/80 backdrop-blur p-4 rounded-2xl border border-white/5 min-w-[100px] text-center shadow-lg"><p className="text-slate-400 text-[10px] uppercase font-bold mb-1 tracking-wider">Điểm TB</p><p className="text-2xl font-black text-emerald-400">{stats.avgScore}</p></div>
                                <div className="bg-slate-800/80 backdrop-blur p-4 rounded-2xl border border-white/5 min-w-[100px] text-center shadow-lg hidden sm:block"><p className="text-slate-400 text-[10px] uppercase font-bold mb-1 tracking-wider">Danh hiệu</p><p className="text-lg font-bold text-yellow-400">{stats.rank}</p></div>
                            </div>
                        </div>
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-8 mb-8">
                        <div className="lg:col-span-2">
                             <QuoteCard />
                             <div className={`sticky top-20 z-30 backdrop-blur-md py-4 -mx-4 px-4 md:mx-0 md:px-0 md:static md:bg-transparent md:backdrop-blur-none mb-6 ${isDarkMode ? 'bg-slate-950/90' : 'bg-blue-50/90'}`}>
                                <div className="flex flex-col md:flex-row justify-between items-center gap-4">
                                    <div className="relative w-full md:w-auto group">
                                        <Search className="absolute left-4 top-3 text-slate-500 group-focus-within:text-cyan-400 transition-colors" size={20}/>
                                        <input className={`w-full md:w-80 border rounded-xl pl-12 pr-4 py-2.5 focus:border-cyan-500 focus:ring-1 focus:ring-cyan-500 outline-none transition-all shadow-sm ${isDarkMode ? 'bg-slate-900 border-yellow-500/30 text-slate-200 placeholder:text-slate-600' : 'bg-white border-blue-200 text-slate-800 placeholder:text-slate-400'}`} placeholder="Tìm kiếm đề thi..." value={search} onChange={e=>setSearch(e.target.value)}/>

                                        {['all', 'free', 'vip'].map(t => (<button key={t} onClick={()=>setFilter(t)} className={`px-5 py-2 rounded-lg text-sm font-bold transition-all whitespace-nowrap ${filter===t ? (isDarkMode ? 'bg-slate-700 text-white' : 'bg-blue-100 text-blue-900') : 'text-slate-400 hover:text-slate-600'}`}>{t === 'all' ? 'Tất cả' : (t === 'free' ? 'Miễn phí' : 'VIP Pro')}</button>))}
                                    </div>
                                </div>
                            </div>

                                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                    {filteredExams.map(exam => {
                                        const isLocked = exam.isPremium && !profile?.isPremium;
                                        return (
                                            <div key={exam.id} className={`glass-card rounded-2xl p-6 relative group flex flex-col h-full hover:-translate-y-1 transition-all border ${isDarkMode ? 'border-yellow-500/30' : 'bg-white border-blue-200'}`}>
                                                <div className="absolute top-0 right-0 p-3 bg-slate-800/95 rounded-bl-2xl border-b border-l border-white/10 z-10 backdrop-blur-md">
                                                    {isLocked ? (<div className="flex items-center gap-1 text-slate-200 font-black text-[11px] uppercase tracking-wider"><Lock size={14}/> VIP ONLY</div>) : (exam.isPremium ? (<div className="flex items-center gap-1 text-yellow-400 font-black text-[11px] uppercase tracking-wider"><Crown size={14} fill="currentColor"/> VIP OPEN</div>) : (<span className="text-emerald-400 font-black text-[11px] tracking-widest uppercase">Miễn phí</span>))}
                                                </div>
                                                <div className="mb-4 flex-1">
                                                    <div className="flex justify-between items-start mb-3"><h3 className={`text-xl font-black line-clamp-2 group-hover:text-cyan-400 transition-colors pr-6 tracking-tight ${isDarkMode ? 'text-white drop-shadow-md' : 'text-blue-900'}`}>{exam.title}</h3></div>
                                                    <div className="flex flex-wrap gap-2 mb-5">
                                                        <span className="flex items-center gap-2 px-3 py-1.5 rounded-xl bg-cyan-500/20 text-cyan-600 dark:text-cyan-300 text-xs font-black border border-cyan-500/40"><Clock size={16} className="shrink-0 text-cyan-500"/> {exam.duration} phút</span>
                                                        <span className="flex items-center gap-2 px-3 py-1.5 rounded-xl bg-indigo-500/25 text-indigo-600 dark:text-indigo-300 text-xs font-black border border-indigo-500/40"><Grid size={16} className="shrink-0 text-indigo-500"/> {exam.questions?.length} câu hỏi</span>
                                                    </div>
                                                    <div className={`flex flex-col gap-2 border-t pt-4 ${isDarkMode ? 'border-yellow-500/20' : 'border-blue-100'}`}>
                                                        <div className={`flex items-center gap-2 px-2.5 py-1.5 rounded-lg border transition-colors ${isDarkMode ? 'bg-slate-800/60 border-white/10 hover:bg-slate-800' : 'bg-white border-blue-100'}`}><Calendar size={14} className="text-emerald-500 shrink-0"/> <div className={`text-[11px] font-bold uppercase tracking-tight ${isDarkMode ? 'text-slate-300' : 'text-slate-500'}`}>Ra đề: <span className={`${isDarkMode ? 'text-white' : 'text-slate-900'} ml-1`}>{formatDate(exam.createdAt)}</span></div></div>
                                                    </div>
                                                </div>
                                                <div className={`flex gap-4 text-xs font-bold mb-6 mt-4 border-t pt-4 opacity-80 ${isDarkMode ? 'text-slate-400 border-white/5' : 'text-slate-500 border-blue-100'}`}>
                                                    <span className="flex items-center gap-1.5" title="Lượt thi / Số người tham gia"><Users size={14} className="text-cyan-500"/> <span>{exam.attempts || 0} lượt</span><span className="text-slate-600 text-[10px]">•</span><span>{exam.participantsCount || 0} người</span></span>
                                                </div>
                                                <div className="flex justify-between items-end mt-4">
                                                    {renderStars(exam.ratingSum, exam.ratingCount)}
                                                    <button onClick={()=> isLocked ? onUpgrade() : onStartExam(exam)} className={`px-6 py-2.5 rounded-xl font-black text-sm shadow-xl transition-all transform group-hover:scale-105 active:scale-95 flex items-center gap-2 ${isLocked ? 'bg-gradient-to-r from-yellow-600 via-amber-500 to-yellow-500 text-slate-900 shadow-yellow-500/30 ring-2 ring-yellow-400/50 hover:from-yellow-500 hover:to-yellow-400' : 'bg-gradient-to-r from-cyan-600 to-blue-600 hover:from-cyan-500 hover:to-blue-500 text-white shadow-cyan-500/30'}`}>{isLocked ? (isPendingVip ? <><Hourglass size={16} className="animate-pulse"/> Chờ duyệt</> : <><Crown size={16} fill="currentColor"/> Nâng cấp ngay</>) : 'Bắt đầu'}</button>
                                                </div>
                                            </div>
                                        )
                                    })}
                                </div>
                            )}
                        </div>

                        <div className="lg:col-span-1">
                             {/* Biểu đồ phong độ */}
                             <div className={`glass-panel rounded-3xl p-6 ${isDarkMode ? '' : 'bg-white border-blue-200 shadow-lg'}`}>
                                <h3 className={`text-lg font-bold flex items-center gap-2 mb-2 ${isDarkMode ? 'text-white' : 'text-blue-900'}`}><BarChart3 size={20} className="text-cyan-500"/> Biểu đồ phong độ</h3>
                                <p className="text-xs text-slate-400 mb-4">Kết quả 10 bài thi gần nhất của bạn</p>
                                <PerformanceChart historyData={historyData} />
                                <div className={`mt-6 pt-4 border-t ${isDarkMode ? 'border-yellow-500/20' : 'border-blue-200'}`}>
                                     <button onClick={onViewHistory} className={`w-full py-3 rounded-xl font-medium text-sm transition-colors flex items-center justify-center gap-2 group ${isDarkMode ? 'bg-slate-800 hover:bg-slate-700 text-slate-300 hover:text-white' : 'bg-blue-50 hover:bg-blue-100 text-blue-700 hover:text-blue-900'}`}>Xem lịch sử chi tiết <ChevronRight size={16} className="group-hover:translate-x-1 transition-transform"/></button>
                                </div>
                             </div>

                             {/* GIAO DIỆN TIN TỨC & SỰ KIỆN (MỚI) */}
                             <div className={`mt-6 glass-panel rounded-3xl p-6 ${isDarkMode ? '' : 'bg-white border-blue-200 shadow-lg'}`}>
                                <h3 className={`text-lg font-bold flex items-center gap-2 mb-4 ${isDarkMode ? 'text-white' : 'text-blue-900'}`}>
                                    <Megaphone size={20} className="text-yellow-500"/> Tin tức & Sự kiện
                                </h3>
                                <div className="space-y-4">
                                    {newsList.length > 0 ? newsList.map(item => (
                                        <div key={item.id} className={`rounded-xl overflow-hidden border transition-all group ${isDarkMode ? 'bg-slate-900/50 border-yellow-500/20 hover:border-blue-500/50' : 'bg-white border-blue-100 hover:border-blue-300 shadow-sm hover:shadow-md'}`}>
                                            {item.image && (
                                                <div className="h-32 overflow-hidden relative">
                                                    <img src={item.image} className="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500" alt={item.title}/>
                                                    <div className="absolute top-2 right-2 px-2 py-1 bg-black/60 backdrop-blur-md rounded-lg text-[10px] font-bold text-white uppercase">
                                                        {item.type === 'event' ? 'Sự kiện' : 'Tin tức'}
                                                    </div>
                                                </div>
                                            )}
                                            <div className="p-4">
                                                <div className="flex items-center gap-2 text-[10px] text-slate-400 font-bold uppercase mb-2">
                                                    <Calendar size={12}/>
                                                    {item.createdAt?.toDate ? item.createdAt.toDate().toLocaleDateString('vi-VN') : 'Vừa xong'}
                                                </div>
                                                <h4 className={`font-bold text-sm mb-2 line-clamp-2 ${isDarkMode ? 'text-white' : 'text-slate-800'}`}>{item.title}</h4>
                                                <p className="text-slate-400 text-xs line-clamp-2 mb-3">{item.content}</p>
                                                {item.link ? (
                                                    <a 
                                                        href={item.link} 
                                                        target="_blank" 
                                                        rel="noopener noreferrer" 
                                                        className={`block w-full py-1.5 rounded-lg text-[10px] font-bold uppercase transition-all text-center ${isDarkMode ? 'bg-blue-600/20 text-blue-400 hover:bg-blue-600 hover:text-white' : 'bg-blue-50 text-blue-600 hover:bg-blue-600 hover:text-white border border-blue-100'}`}
                                                    >
                                                        Xem chi tiết <span className="inline-block ml-1">↗</span>
                                                    </a>
                                                ) : (
                                                    <button className={`w-full py-1.5 rounded-lg text-[10px] font-bold uppercase cursor-default opacity-50 ${isDarkMode ? 'bg-slate-800 text-slate-500' : 'bg-slate-100 text-slate-400 border border-slate-200'}`}>
                                                        Đang cập nhật
                                                    </button>
                                                )}
                                            </div>
                                        </div>
                                    )) : (
                                        <div className="text-center py-8 text-slate-500 italic text-xs">
                                            Chưa có tin tức nào mới.
                                        </div>
                                    )}
                                </div>
                             </div>
                        </div>
                    </div>
                </div>
            );
        };

        const ResultScreen = ({ result, onBack, onReview, globalConfig }) => {
            // ... (Result screen is a celebratory screen, usually dark themed is fine, but can be adapted. Keeping simple dark for impact) ...
            // Code condensed for brevity, similar to before
            return (
                <div className="min-h-screen flex items-center justify-center p-4 animate-fade-in relative overflow-hidden" style={{backgroundImage: globalConfig.resultBg ? `linear-gradient(rgba(15, 23, 42, 0.9), rgba(15, 23, 42, 0.9)), url('${globalConfig.resultBg}')` : undefined, backgroundColor: '#0f172a', backgroundSize: 'cover', backgroundPosition: 'center'}}>
                    {Number(result.score) >= 8 && <Confetti />}
                    <div className="glass-result p-8 md:p-10 rounded-3xl text-center max-w-md w-full relative overflow-hidden border border-white/10 shadow-2xl animate-scale-up" id="result-certificate">
                        <div className="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-cyan-500 to-blue-600"></div>
                        <Award size={80} className={`mx-auto mb-6 ${Number(result.score)>=5?'text-yellow-400 drop-shadow-[0_0_15px_rgba(250,204,21,0.5)] animate-bounce':'text-slate-500'}`}/>
                        <h2 className="text-3xl font-black text-white mb-2 uppercase tracking-wide">Kết Quả Thi</h2>
                        <h3 className="text-xl text-cyan-400 font-bold mb-4">{result.examTitle}</h3>
                        <div className="text-6xl font-black text-white mb-2 tracking-tighter">{result.score}</div>
                        <div className="grid grid-cols-2 gap-4 mb-6 mt-6"><div className="bg-slate-800/80 p-4 rounded-2xl border border-slate-700"><p className="text-xs text-slate-500 uppercase font-bold">Câu đúng</p><p className="text-2xl font-bold text-emerald-400">{result.correctCount}/{result.total}</p></div><div className="bg-slate-800/80 p-4 rounded-2xl border border-slate-700"><p className="text-xs text-slate-500 uppercase font-bold">Trạng thái</p><p className={`text-2xl font-bold ${Number(result.score)>=5?'text-cyan-400':'text-red-400'}`}>{Number(result.score)>=5?'ĐẠT':'HỎNG'}</p></div></div>
                        <div className="flex justify-center gap-3 mb-6 relative z-10"><button className="p-3 bg-slate-800 hover:bg-slate-700 rounded-full text-slate-300 hover:text-white transition-all border border-slate-700 tooltip"><Download size={20}/></button><button className="p-3 bg-blue-600 hover:bg-blue-500 rounded-full text-white transition-all shadow-lg shadow-blue-500/20"><Facebook size={20}/></button></div>
                        <div className="space-y-3 relative z-10"><button onClick={onReview} className="w-full bg-cyan-600 hover:bg-cyan-500 text-white py-3.5 rounded-xl font-bold transition-all shadow-lg shadow-cyan-500/20 flex items-center justify-center gap-2 hover:translate-y-[-2px]"><Eye size={18}/> Xem lại đáp án</button><button onClick={onBack} className="w-full bg-slate-800 hover:bg-slate-700 text-white py-3.5 rounded-xl font-bold transition-all border border-slate-700 hover:border-slate-600">Về trang chủ</button></div>
                    </div>
                </div>
            );
        };

        function App() {
            const [user, setUser] = useState(null);
            const [profile, setProfile] = useState(null);
            const [view, setView] = useState('loading');
            const [activeExam, setActiveExam] = useState(null);
            const [lastResult, setLastResult] = useState(null);
            const [showPay, setShowPay] = useState(false);
            const [globalConfig, setGlobalConfig] = useState({});
            const [isPendingVip, setIsPendingVip] = useState(false);
            const [isDarkMode, setIsDarkMode] = useState(() => localStorage.getItem('theme') !== 'light');

            useEffect(() => {
                const root = window.document.documentElement;
                const body = window.document.body;
                if (isDarkMode) {
                    root.classList.add('dark');
                    body.classList.remove('light-mode');
                } else {
                    root.classList.remove('dark');
                    body.classList.add('light-mode');
                }
                localStorage.setItem('theme', isDarkMode ? 'dark' : 'light');
            }, [isDarkMode]);

            const toggleTheme = () => setIsDarkMode(!isDarkMode);

            const themeContextValue = useMemo(() => ({ isDarkMode, toggleTheme }), [isDarkMode]);

            // ... (Notifications and Auth logic same as before) ...
            const [sysNoti, setSysNoti] = useState(null);
            const [notifications, setNotifications] = useState([]);
            const [showNotiDropdown, setShowNotiDropdown] = useState(false);
            const [hasNewNoti, setHasNewNoti] = useState(false);
            const [hiddenNotiIds, setHiddenNotiIds] = useState(() => { const saved = localStorage.getItem('hidden_noti_ids'); return saved ? JSON.parse(saved) : []; });

            useEffect(() => {
                const initAuth = async () => {
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        try {
                            await signInWithCustomToken(auth, __initial_auth_token);
                        } catch(e) { console.error("Token auth failed", e); }
                    }
                };
                initAuth();
                
                return onAuthStateChanged(auth, u => { setUser(u); if (u) { setView('dashboard'); const unsub = onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'users', u.uid), d => d.exists() && setProfile(d.data())); const qPending = query(collection(db, 'artifacts', appId, 'public', 'data', 'paymentRequests'), where('uid', '==', u.uid), where('status', '==', 'pending'), limit(1)); const unsubPending = onSnapshot(qPending, (snap) => setIsPendingVip(!snap.empty)); return () => { unsub(); unsubPending(); }; } else setView('auth'); }); 
            }, []);

            // Guard the config fetching to prevent permission errors
            useEffect(() => { 
                if (!user) return; 
                const unsubscribe = onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'system_settings', 'config'), (s) => { 
                    if (s.exists()) setGlobalConfig(s.data()); 
                }, (error) => console.log("Config load info:", error.message)); 
                return () => unsubscribe(); 
            }, [user]);

            useEffect(() => { if (!user) return; const q = query(collection(db, 'artifacts', appId, 'public', 'data', 'notifications'), orderBy('createdAt', 'desc'), limit(10)); const unsubscribe = onSnapshot(q, (snapshot) => { const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })); setNotifications(data); if (data.length > 0) { const latest = data[0]; const seenId = localStorage.getItem('seen_noti_id'); if (seenId !== latest.id) { setSysNoti(latest); setHasNewNoti(true); } else setHasNewNoti(false); } }); return () => unsubscribe(); }, [user]);

            const closeNoti = () => { if(sysNoti) { localStorage.setItem('seen_noti_id', sysNoti.id); setSysNoti(null); setHasNewNoti(false); } };
            const toggleNotiDropdown = () => { setShowNotiDropdown(!showNotiDropdown); if (notifications.length > 0) { localStorage.setItem('seen_noti_id', notifications[0].id); setHasNewNoti(false); } };
            const hideNotification = (e, id) => { e.stopPropagation(); const updated = [...hiddenNotiIds, id]; setHiddenNotiIds(updated); localStorage.setItem('hidden_noti_ids', JSON.stringify(updated)); };
            const filteredNotifications = notifications.filter(n => !hiddenNotiIds.includes(n.id)).slice(0, 5);
            
            let daysLeft = null;
            if (profile?.isPremium && profile?.vipActivatedAt) { try { const activationDate = profile.vipActivatedAt.toDate(); const expiryTime = activationDate.getTime() + VIP_DURATION_DAYS * 24 * 60 * 60 * 1000; const diffTime = expiryTime - Date.now(); if (diffTime > 0) daysLeft = Math.ceil(diffTime / (1000 * 60 * 60 * 24)); } catch(e) {} }
            const startExam = async (exam) => { if (confirm(`Sẵn sàng thi bài "${exam.title}"?`)) { try { const sessionRef = await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'active_exams'), { uid: user.uid, displayName: user.displayName || user.email, examId: exam.id, examTitle: exam.title, startedAt: serverTimestamp() }); setActiveExam({ ...exam, sessionId: sessionRef.id }); } catch (e) { setActiveExam(exam); } setView('exam'); } };

            const renderContent = () => {
                if (view === 'loading') return <div className="min-h-screen bg-slate-950 flex items-center justify-center text-cyan-500"><Loader2 className="animate-spin" size={40}/></div>;
                if (view === 'auth') return <AuthScreen globalConfig={globalConfig} />;
                if (view === 'exam' && activeExam) return <ExamInterface exam={activeExam} onExit={() => { setActiveExam(null); setView('dashboard'); }} onFinish={r => { setLastResult(r); setActiveExam(null); setView('result'); }} />;
                if (view === 'review' && lastResult) return <ReviewExam result={lastResult} onBack={() => { setLastResult(null); setView('dashboard'); }} />;
                if (view === 'result' && lastResult) return <ResultScreen result={lastResult} onBack={() => setView('dashboard')} onReview={() => setView('review')} globalConfig={globalConfig} />;

                return (
                    <div className={`min-h-screen font-sans ${isDarkMode ? 'bg-slate-950 text-slate-200' : 'bg-slate-50 text-slate-800'}`} onClick={() => setShowNotiDropdown(false)}>
                        <nav className={`glass sticky top-0 z-40 border-b ${isDarkMode ? 'border-white/5' : 'bg-white border-slate-200 shadow-sm'}`}>
                            <div className="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
                                <button onClick={()=>setView('dashboard')} className="flex items-center gap-2.5 group"><div className="bg-gradient-to-br from-cyan-500 to-blue-600 p-2 rounded-xl group-hover:rotate-6 transition-all"><Activity size={20} className="text-white"/></div><span className="font-bold text-xl bg-clip-text text-transparent bg-gradient-to-r from-cyan-400 to-blue-400">MedExam Pro</span></button>
                                <div className="flex items-center gap-2 md:gap-4">
                                    <div className="relative">
                                        <button onClick={(e) => { e.stopPropagation(); toggleNotiDropdown(); }} className={`p-2 rounded-lg transition-all relative ${showNotiDropdown ? 'bg-slate-800 text-cyan-400' : 'text-slate-400 hover:bg-slate-800'}`}><Bell size={20} />{hasNewNoti && <div className="noti-badge"></div>}</button>
                                        {showNotiDropdown && (
                                            <div className="absolute right-0 mt-3 w-80 bg-slate-900 border border-slate-800 rounded-2xl shadow-2xl overflow-hidden animate-scale-up z-50" onClick={e => e.stopPropagation()}>
                                                <div className="p-4 border-b border-slate-800 bg-slate-800/50 flex justify-between items-center"><h4 className="font-bold text-sm text-white">Thông báo</h4><span className="text-[10px] text-slate-500 uppercase tracking-widest font-bold">Mới nhất</span></div>
                                                <div className="max-h-96 overflow-y-auto">{filteredNotifications.length > 0 ? (filteredNotifications.map(n => (<div key={n.id} className="p-4 border-b border-slate-800/50 hover:bg-slate-800/30 transition-colors relative group"><button onClick={(e) => hideNotification(e, n.id)} className="absolute top-2 right-2 p-1 text-slate-600 hover:text-red-400 opacity-0 group-hover:opacity-100 transition-all"><Trash2 size={12} /></button><div className="flex gap-3"><div className="mt-1 shrink-0 bg-cyan-500/10 p-1.5 rounded-lg text-cyan-500"><Info size={14} /></div><div><p className="text-sm font-bold text-slate-200 line-clamp-1">{n.title}</p><p className="text-xs text-slate-400 mt-1 line-clamp-2 leading-relaxed">{n.message}</p><p className="text-[10px] text-slate-600 mt-2 font-mono">{n.createdAt?.seconds ? new Date(n.createdAt.seconds * 1000).toLocaleDateString('vi-VN') : 'Gần đây'}</p></div></div></div>))) : <div className="p-10 text-center text-slate-600 italic text-sm">Không có thông báo nào</div>}</div>
                                            </div>
                                        )}
                                    </div>
                                    <button onClick={toggleTheme} className={`p-2 rounded-lg transition-all ${isDarkMode ? 'text-slate-400 hover:text-yellow-400 hover:bg-slate-800' : 'text-slate-600 hover:text-orange-500 hover:bg-slate-100'}`}>{isDarkMode ? <Moon size={20} /> : <Sun size={20} />}</button>
                                    <div className="h-8 w-px bg-slate-800 mx-1 hidden md:block"></div>
                                    <button onClick={()=>setView('profile')} className="transition-all hover:scale-105 active:scale-95"><UserAvatar user={user} profile={profile} className="w-9 h-9" /></button>
                                    <button onClick={()=>signOut(auth)} className="p-2 text-slate-400 hover:text-red-400 hover:bg-red-400/10 rounded-lg transition-all"><LogOut size={20}/></button>
                                </div>
                            </div>
                        </nav>
                        <div className="max-w-7xl mx-auto px-4 py-8">
                            {view === 'history' ? <HistoryPage user={user} onBack={()=>setView('dashboard')}/> : view === 'profile' ? <ProfilePage user={user} profile={profile} onBack={()=>setView('dashboard')} /> : view === 'leaderboard' ? <LeaderboardPage user={user} onBack={()=>setView('dashboard')} /> : <Dashboard user={user} profile={profile} onStartExam={startExam} onUpgrade={()=>setShowPay(true)} onViewHistory={()=>setView('history')} isPendingVip={isPendingVip} />}
                        </div>
                        {showPay && <PaymentModal onClose={()=>setShowPay(false)} user={user} isPending={isPendingVip}/>}
                    </div>
                );
            };

            return (
                <ThemeContext.Provider value={themeContextValue}>
                    <ToastProvider>
                        {sysNoti && (
                            <div className="fixed top-0 left-0 w-full z-[100] animate-slide-down">
                                <div className="bg-gradient-to-r from-indigo-600 to-blue-600 text-white p-4 shadow-xl border-b border-indigo-400/30">
                                    <div className="max-w-7xl mx-auto flex items-start gap-4">
                                        <div className="bg-white/20 p-2 rounded-full mt-1"><Bell size={24} className="text-white animate-bounce" /></div>
                                        <div className="flex-1"><h4 className="font-bold text-lg">{sysNoti.title}</h4><p className="text-indigo-100 text-sm mt-1">{sysNoti.message}</p></div>
                                        <button onClick={closeNoti} className="p-2 hover:bg-white/10 rounded-lg transition-colors"><X size={20} /></button>
                                    </div>
                                </div>
                            </div>
                        )}
                        {renderContent()}
                    </ToastProvider>
                </ThemeContext.Provider>
            );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
