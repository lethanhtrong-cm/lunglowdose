<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Portal Pro - MedExam</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0",
            "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
            "lucide-react": "https://esm.sh/lucide-react@0.344.0?deps=react@18.2.0",
            "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
            "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js",
            "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js"
        }
    }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #020617; }
        .glass-panel { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; height: 5px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="text-slate-200 antialiased custom-scrollbar">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useMemo, useCallback } from 'react';
        import { createRoot } from 'react-dom/client';
        import { initializeApp } from 'firebase/app';
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from 'firebase/auth';
        import { getFirestore, collection, doc, addDoc, updateDoc, deleteDoc, onSnapshot, query, orderBy, serverTimestamp } from 'firebase/firestore';
        import { 
            ShieldCheck, Users, BookOpen, LogOut, Search, Trash2, Plus, 
            Upload, Download, X, CheckCircle2, AlertCircle, Edit3, 
            LayoutDashboard, FileText, Loader2, Info, Database, PieChart, 
            TrendingUp, Tag, ChevronRight, MoreVertical, Filter, Bell, Crown, Lock, Unlock
        } from 'lucide-react';

        const firebaseConfig = {
            apiKey: "AIzaSyDqdo_DJIWa5iqxiCgBq-0iGX7f9sr6soo",
            authDomain: "rt-examination.firebaseapp.com",
            projectId: "rt-examination",
            storageBucket: "rt-examination.firebasestorage.app",
            messagingSenderId: "920482699854",
            appId: "1:920482699854:web:44f9b0d735bdc001c6c11f"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = 'med-exam-pro-html';

        const ADMIN_EMAILS = ["thanhtrong.yds@gmail.com", "vnrad.tech@gmail.com", "test@gmail.com"];

        // --- UI UTILS ---

        const Toast = ({ message, type, onClose }) => {
            useEffect(() => {
                const timer = setTimeout(onClose, 3000);
                return () => clearTimeout(timer);
            }, [onClose]);

            const styles = {
                success: "bg-emerald-500/10 border-emerald-500/20 text-emerald-400",
                error: "bg-red-500/10 border-red-500/20 text-red-400",
                info: "bg-blue-500/10 border-blue-500/20 text-blue-400"
            };

            return (
                <div className={`fixed bottom-6 right-6 px-6 py-3 rounded-2xl border ${styles[type]} shadow-2xl flex items-center gap-3 animate-fade-in z-[100] backdrop-blur-xl`}>
                    {type === 'success' && <CheckCircle2 size={18}/>}
                    {type === 'error' && <AlertCircle size={18}/>}
                    <span className="font-bold text-sm">{message}</span>
                </div>
            );
        };

        // --- MAIN COMPONENTS ---

        const ImportModal = ({ onClose, onImport, notify }) => {
            const [isProcessing, setIsProcessing] = useState(false);

            const downloadTemplate = () => {
                const wsData = [
                    ["Câu hỏi", "A", "B", "C", "D", "Đáp án (A/B/C/D)", "Giải thích"],
                    ["Nội dung câu hỏi mẫu?", "Lựa chọn 1", "Lựa chọn 2", "Lựa chọn 3", "Lựa chọn 4", "B", "Giải thích vì sao B đúng."]
                ];
                const wb = XLSX.utils.book_new();
                const ws = XLSX.utils.aoa_to_sheet(wsData);
                XLSX.utils.book_append_sheet(wb, ws, "Dữ liệu");
                XLSX.writeFile(wb, "Mau_Import_Cau_Hoi.xlsx");
            };

            const handleFile = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                setIsProcessing(true);
                const reader = new FileReader();
                reader.onload = (evt) => {
                    try {
                        const data = new Uint8Array(evt.target.result);
                        const workbook = XLSX.read(data, { type: 'array' });
                        const rows = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], { header: 1 });
                        const imported = rows.slice(1).filter(r => r[0]).map(r => ({
                            text: String(r[0]),
                            options: [String(r[1]||''), String(r[2]||''), String(r[3]||''), String(r[4]||'')],
                            correctOption: "ABCD".indexOf(String(r[5]||'A').toUpperCase().trim()),
                            explanation: String(r[6] || '')
                        }));
                        onImport(imported);
                        notify(`Đã nhập thành công ${imported.length} câu hỏi`, 'success');
                        onClose();
                    } catch (err) { notify("Lỗi cấu trúc tệp Excel", "error"); }
                    finally { setIsProcessing(false); }
                };
                reader.readAsArrayBuffer(file);
            };

            return (
                <div className="fixed inset-0 bg-black/90 backdrop-blur-md flex items-center justify-center p-4 z-[70]">
                    <div className="bg-slate-900 w-full max-w-md rounded-[2.5rem] border border-slate-800 p-10 text-center space-y-8 animate-in">
                        <div className="w-20 h-20 bg-emerald-500/10 rounded-3xl mx-auto flex items-center justify-center text-emerald-500 shadow-inner">
                            <Database size={32}/>
                        </div>
                        <div>
                            <h3 className="text-2xl font-black text-white">Import Dữ Liệu</h3>
                            <p className="text-slate-500 text-sm mt-2">Hệ thống tự động nhận diện câu hỏi và giải thích từ Excel</p>
                        </div>
                        <div className="space-y-4">
                            <label className="block w-full py-14 border-2 border-dashed border-slate-700 rounded-[2rem] hover:border-emerald-500 cursor-pointer group transition-all relative overflow-hidden">
                                <input type="file" className="hidden" accept=".xlsx, .xls" onChange={handleFile} />
                                <div className="relative z-10">
                                    <Plus size={24} className="mx-auto text-slate-500 group-hover:text-emerald-500 mb-2 transition-colors"/>
                                    <span className="text-slate-400 group-hover:text-emerald-400 font-bold text-sm">
                                        {isProcessing ? "Đang xử lý..." : "Chọn tệp Excel"}
                                    </span>
                                </div>
                            </label>
                            <button onClick={downloadTemplate} className="text-emerald-500 text-xs font-black uppercase tracking-widest hover:text-emerald-400 flex items-center justify-center gap-2 w-full transition-colors">
                                <Download size={14}/> Tải file mẫu (.xlsx)
                            </button>
                        </div>
                        <button onClick={onClose} className="text-slate-600 hover:text-white font-bold text-sm">Đóng cửa sổ</button>
                    </div>
                </div>
            );
        };

        const ExamEditor = ({ exam, onClose, notify }) => {
            const [title, setTitle] = useState(exam?.title || '');
            const [category, setCategory] = useState(exam?.category || 'Chung');
            const [isPremium, setIsPremium] = useState(exam?.isPremium || false);
            const [duration, setDuration] = useState(exam?.duration || 30);
            const [questions, setQuestions] = useState(exam?.questions || []);
            const [showImport, setShowImport] = useState(false);
            const [isSaving, setIsSaving] = useState(false);

            // Inputs cho câu hỏi mới
            const [qText, setQText] = useState('');
            const [opts, setOpts] = useState(['', '', '', '']);
            const [correct, setCorrect] = useState(0);
            const [expl, setExpl] = useState('');

            const addQ = () => {
                if (!qText.trim() || opts.some(o => !o.trim())) {
                    notify("Thiếu thông tin câu hỏi hoặc phương án", "error");
                    return;
                }
                setQuestions([...questions, { text: qText, options: opts, correctOption: correct, explanation: expl }]);
                setQText(''); setOpts(['','','','']); setCorrect(0); setExpl('');
                notify("Đã thêm câu hỏi vào danh sách", "info");
            };

            const save = async () => {
                if (!title.trim() || questions.length === 0) {
                    notify("Vui lòng nhập tên đề và ít nhất 1 câu hỏi", "error");
                    return;
                }
                setIsSaving(true);
                try {
                    const data = { 
                        title, 
                        category,
                        isPremium, // Đồng bộ loại đề Vip/Miễn phí
                        duration: Number(duration), 
                        questions, 
                        updatedAt: serverTimestamp() 
                    };
                    if (exam?.id) await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'exams', exam.id), data);
                    else await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'exams'), { ...data, createdAt: serverTimestamp() });
                    notify("Đã lưu đề thi thành công", "success");
                    onClose();
                } catch (e) { notify(e.message, "error"); }
                finally { setIsSaving(false); }
            };

            return (
                <div className="fixed inset-0 bg-slate-950/98 flex items-center justify-center p-4 z-50 overflow-hidden">
                    <div className="bg-slate-900 w-full max-w-6xl h-[95vh] rounded-[3rem] border border-slate-800 flex flex-col shadow-2xl animate-in">
                        {/* Header Editor */}
                        <div className="p-8 border-b border-slate-800 flex justify-between items-center bg-slate-900/50 sticky top-0 z-20 backdrop-blur-xl">
                            <div>
                                <h2 className="text-2xl font-black text-white flex items-center gap-3">
                                    {exam ? <Edit3 className="text-blue-500"/> : <Plus className="text-emerald-500"/>}
                                    {exam ? 'Chỉnh Sửa Đề Thi' : 'Tạo Đề Thi Mới'}
                                </h2>
                                <p className="text-slate-500 text-xs mt-1 font-medium">Cấu hình đồng bộ hóa Cloud</p>
                            </div>
                            <div className="flex gap-4">
                                <button onClick={()=>setShowImport(true)} className="bg-emerald-600/10 text-emerald-400 hover:bg-emerald-600 hover:text-white px-6 py-2.5 rounded-2xl text-sm font-black flex items-center gap-2 transition-all border border-emerald-500/20"><Upload size={16}/> NHẬP EXCEL</button>
                                <button onClick={onClose} className="bg-slate-800 p-2.5 rounded-full text-slate-400 hover:text-white transition-all"><X size={24}/></button>
                            </div>
                        </div>

                        {/* Content Editor */}
                        <div className="flex-1 overflow-y-auto p-8 custom-scrollbar space-y-10">
                            {/* Meta Grid */}
                            <div className="grid grid-cols-1 md:grid-cols-5 gap-6">
                                <div className="md:col-span-2 space-y-2">
                                    <label className="text-[10px] font-black text-slate-500 uppercase tracking-[0.2em] ml-2">Tên bộ đề</label>
                                    <input className="w-full bg-slate-950 p-4 rounded-2xl border border-slate-800 outline-none focus:border-blue-500 transition-all font-bold shadow-inner" value={title} onChange={e=>setTitle(e.target.value)} placeholder="VD: Giải phẫu Đại cương"/>
                                </div>
                                <div className="space-y-2">
                                    <label className="text-[10px] font-black text-slate-500 uppercase tracking-[0.2em] ml-2">Danh mục</label>
                                    <select className="w-full bg-slate-950 p-4 rounded-2xl border border-slate-800 outline-none focus:border-blue-500 transition-all font-bold text-sm" value={category} onChange={e=>setCategory(e.target.value)}>
                                        <option value="Chung">Chung</option>
                                        <option value="Nội khoa">Nội khoa</option>
                                        <option value="Ngoại khoa">Ngoại khoa</option>
                                        <option value="Sản khoa">Sản khoa</option>
                                        <option value="Nhi khoa">Nhi khoa</option>
                                        <option value="Cận lâm sàng">Cận lâm sàng</option>
                                    </select>
                                </div>
                                <div className="space-y-2">
                                    <label className="text-[10px] font-black text-slate-500 uppercase tracking-[0.2em] ml-2">Loại đề thi</label>
                                    <div className="flex bg-slate-950 p-1.5 rounded-2xl border border-slate-800 shadow-inner">
                                        <button 
                                            onClick={() => setIsPremium(false)}
                                            className={`flex-1 py-3 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all flex items-center justify-center gap-2 ${!isPremium ? 'bg-emerald-600 text-white shadow-lg' : 'text-slate-500 hover:text-slate-300'}`}
                                        >
                                            {!isPremium && <Unlock size={12}/>} MIỄN PHÍ
                                        </button>
                                        <button 
                                            onClick={() => setIsPremium(true)}
                                            className={`flex-1 py-3 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all flex items-center justify-center gap-2 ${isPremium ? 'bg-yellow-600 text-white shadow-lg' : 'text-slate-500 hover:text-slate-300'}`}
                                        >
                                            {isPremium && <Crown size={12}/>} VIP
                                        </button>
                                    </div>
                                </div>
                                <div className="space-y-2">
                                    <label className="text-[10px] font-black text-slate-500 uppercase tracking-[0.2em] ml-2">Thời gian (Phút)</label>
                                    <input type="number" className="w-full bg-slate-950 p-4 rounded-2xl border border-slate-800 outline-none focus:border-blue-500 transition-all font-bold shadow-inner" value={duration} onChange={e=>setDuration(e.target.value)}/>
                                </div>
                            </div>

                            {/* Manual Question Box */}
                            <div className="bg-slate-950 border border-slate-800 p-8 rounded-[2.5rem] space-y-6 shadow-inner relative overflow-hidden group">
                                <div className="absolute right-0 top-0 w-32 h-32 bg-emerald-500/5 rounded-full -mr-10 -mt-10 blur-2xl group-focus-within:bg-emerald-500/10 transition-all"></div>
                                <div className="flex items-center gap-3">
                                    <Plus size={20} className="text-emerald-500"/>
                                    <h3 className="font-black text-sm tracking-widest text-slate-300 uppercase">Soạn thảo câu hỏi chi tiết</h3>
                                </div>
                                <textarea className="w-full bg-slate-900 p-6 rounded-2xl border border-slate-800 min-h-[120px] outline-none focus:border-emerald-600 transition-all text-lg leading-relaxed shadow-sm" placeholder="Nhập nội dung câu hỏi y khoa..." value={qText} onChange={e=>setQText(e.target.value)}/>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                    {opts.map((o, i) => (
                                        <div key={i} className={`flex items-center gap-4 p-4 rounded-2xl border transition-all ${correct === i ? 'bg-emerald-500/10 border-emerald-500' : 'bg-slate-900 border-slate-800 hover:border-slate-700'}`}>
                                            <div className="relative">
                                                <input type="radio" checked={correct === i} onChange={()=>setCorrect(i)} className="opacity-0 absolute inset-0 w-full h-full cursor-pointer z-10"/>
                                                <div className={`w-6 h-6 rounded-full border-2 flex items-center justify-center transition-all ${correct === i ? 'border-emerald-500 bg-emerald-500' : 'border-slate-600'}`}>
                                                    {correct === i && <CheckCircle2 size={14} className="text-slate-950"/>}
                                                </div>
                                            </div>
                                            <input className="bg-transparent flex-1 outline-none text-sm font-medium" value={o} onChange={e=>{const n=[...opts]; n[i]=e.target.value; setOpts(n)}} placeholder={`Phương án ${String.fromCharCode(65+i)}`}/>
                                        </div>
                                    ))}
                                </div>
                                <div className="space-y-2">
                                    <label className="text-[10px] font-black text-slate-500 flex items-center gap-2 ml-2 uppercase tracking-widest"><Info size={14} className="text-blue-500"/> Giải thích đáp án chuyên sâu</label>
                                    <textarea className="w-full bg-slate-900 p-4 rounded-2xl border border-slate-800 text-sm italic outline-none focus:border-blue-500 transition-all min-h-[80px]" placeholder="VD: Triệu chứng này điển hình cho chẩn đoán phân biệt..." value={expl} onChange={e=>setExpl(e.target.value)}/>
                                </div>
                                <button onClick={addQ} className="w-full py-5 bg-slate-800 hover:bg-slate-700 text-slate-200 rounded-2xl font-black transition-all active:scale-[0.99] border border-slate-700/50 shadow-lg">THÊM CÂU HỎI VÀO DANH SÁCH</button>
                            </div>

                            {/* Questions List */}
                            <div className="space-y-6">
                                <div className="flex justify-between items-center px-4">
                                    <h3 className="font-black text-blue-400 flex items-center gap-3 uppercase tracking-tighter text-xl">
                                        <FileText size={24}/> Ngân hàng đề hiện tại ({questions.length})
                                    </h3>
                                    {questions.length > 0 && <button onClick={()=>setQuestions([])} className="text-red-500 text-xs font-bold hover:underline">Xóa sạch danh sách</button>}
                                </div>
                                
                                {questions.length === 0 ? (
                                    <div className="py-24 text-center border-2 border-dashed border-slate-800 rounded-[3rem] group">
                                        <BookOpen size={48} className="mx-auto text-slate-800 group-hover:text-slate-700 transition-colors mb-4"/>
                                        <p className="text-slate-600 font-bold uppercase tracking-widest text-xs">Danh sách câu hỏi đang trống</p>
                                    </div>
                                ) : (
                                    <div className="grid grid-cols-1 gap-4">
                                        {questions.map((q, i) => (
                                            <div key={i} className="bg-slate-900/40 p-6 rounded-3xl flex justify-between items-start group border border-slate-800 hover:border-slate-700 transition-all shadow-sm">
                                                <div className="flex-1 pr-6">
                                                    <div className="flex items-center gap-3 mb-3">
                                                        <span className="w-8 h-8 rounded-xl bg-blue-500/10 text-blue-500 flex items-center justify-center font-black text-xs">#{i+1}</span>
                                                        <p className="font-bold text-slate-200 text-lg leading-tight">{q.text}</p>
                                                    </div>
                                                    <div className="grid grid-cols-2 lg:grid-cols-4 gap-3 mb-4">
                                                        {q.options.map((opt, idx) => (
                                                            <div key={idx} className={`text-[10px] p-2 rounded-xl border font-bold ${q.correctOption === idx ? 'bg-emerald-500/10 border-emerald-500/30 text-emerald-400' : 'bg-slate-950 border-slate-800 text-slate-600'}`}>
                                                                {String.fromCharCode(65+idx)}. {opt}
                                                            </div>
                                                        ))}
                                                    </div>
                                                    {q.explanation && (
                                                        <div className="bg-slate-950 p-4 rounded-xl border border-slate-800/50 flex items-start gap-3">
                                                            <div className="mt-0.5 text-blue-500"><Info size={14}/></div>
                                                            <p className="text-[11px] text-slate-500 italic leading-relaxed">{q.explanation}</p>
                                                        </div>
                                                    )}
                                                </div>
                                                <button onClick={()=>setQuestions(questions.filter((_,idx)=>idx!==i))} className="p-3 text-slate-600 hover:text-red-500 hover:bg-red-500/5 rounded-2xl transition-all"><Trash2 size={18}/></button>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        </div>

                        {/* Footer Editor */}
                        <div className="p-8 border-t border-slate-800 flex justify-end gap-4 bg-slate-900/80 backdrop-blur-xl rounded-b-[3rem]">
                            <button onClick={onClose} className="px-10 py-3 text-slate-500 hover:text-white font-bold transition-all">Hủy bỏ</button>
                            <button onClick={save} disabled={isSaving} className="px-16 py-4 bg-blue-600 hover:bg-blue-500 rounded-[1.5rem] font-black text-white flex gap-3 items-center shadow-2xl shadow-blue-900/40 transition-all active:scale-95 disabled:opacity-50">
                                {isSaving ? <Loader2 className="animate-spin" size={20}/> : <CheckCircle2 size={20}/>}
                                {exam ? 'CẬP NHẬT TOÀN BỘ' : 'PHÁT HÀNH ĐỀ THI'}
                            </button>
                        </div>
                        {showImport && <ImportModal onClose={()=>setShowImport(false)} onImport={qs=>setQuestions([...questions, ...qs])} notify={notify}/>}
                    </div>
                </div>
            );
        };

        const Dashboard = ({ user }) => {
            const [tab, setTab] = useState('overview');
            const [users, setUsers] = useState([]);
            const [exams, setExams] = useState([]);
            const [search, setSearch] = useState('');
            const [filterType, setFilterType] = useState('all');
            const [examFilter, setExamFilter] = useState('all'); // all, free, vip
            const [editing, setEditing] = useState(null);
            const [showAdd, setShowAdd] = useState(false);
            const [toast, setToast] = useState(null);

            const notify = useCallback((message, type = 'info') => {
                setToast({ message, type });
            }, []);

            useEffect(() => {
                const unsubUsers = onSnapshot(query(collection(db, 'artifacts', appId, 'public', 'data', 'users')), s => setUsers(s.docs.map(d=>({id: d.id, ...d.data()}))));
                const unsubExams = onSnapshot(query(collection(db, 'artifacts', appId, 'public', 'data', 'exams')), s => setExams(s.docs.map(d=>({id: d.id, ...d.data()}))));
                return () => { unsubUsers(); unsubExams(); };
            }, []);

            const filteredUsers = useMemo(() => {
                return users.filter(u => {
                    const matchSearch = (u.displayName||'').toLowerCase().includes(search.toLowerCase()) || (u.email||'').toLowerCase().includes(search.toLowerCase());
                    const matchFilter = filterType === 'all' || (filterType === 'vip' && u.isPremium) || (filterType === 'free' && !u.isPremium);
                    return matchSearch && matchFilter;
                });
            }, [users, search, filterType]);

            const filteredExams = useMemo(() => {
                return exams.filter(e => {
                    const matchSearch = (e.title||'').toLowerCase().includes(search.toLowerCase());
                    const matchCategory = filterType === 'all' || e.category === filterType;
                    const matchAccess = examFilter === 'all' || (examFilter === 'vip' && e.isPremium) || (examFilter === 'free' && !e.isPremium);
                    return matchSearch && matchCategory && matchAccess;
                });
            }, [exams, search, filterType, examFilter]);

            const categories = useMemo(() => {
                const cats = new Set(exams.map(e => e.category).filter(Boolean));
                return ['all', ...Array.from(cats)];
            }, [exams]);

            return (
                <div className="flex min-h-screen bg-[#020617]">
                    {/* Sidebar */}

                            signOut(auth); setUser(null);

            const handleLogin = async (e) => {
                e.preventDefault();

                    setErr(e.message === "Quyền truy cập bị từ chối." ? e.message : "Mật khẩu hoặc Email không chính xác");

                            <button className="w-full bg-red-600 hover:bg-red-500 text-white font-black py-6 rounded-3xl transition-all shadow-2xl shadow-red-900/40 mt-6 active:scale-95 text-xs tracking-[0.3em] uppercase">Xác thực danh tính</button>
                        </form>
                        
                        <p className="text-center text-slate-700 text-[9px] font-black uppercase tracking-widest mt-12 opacity-50">Authorized Personnel Only</p>
                    </div>
                </div>
            );

            return <Dashboard user={user} />;
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
