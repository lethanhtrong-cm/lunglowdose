<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sổ tay Chuỗi Xung MRI</title>
    <!-- Tải Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Tải font Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* Sử dụng font Inter làm font chữ mặc định */
        body {
            font-family: 'Inter', sans-serif;
        }
        /* Cuộn mượt khi nhấp vào anchor link */
        html {
            scroll-behavior: smooth;
        }
        /* Style cho bảng để đẹp hơn */
        .vendor-table th, .vendor-table td {
            padding: 8px 12px;
            border: 1px solid #e2e8f0;
        }
        .vendor-table th {
            background-color: #f8fafc;
        }
        /* Đảm bảo thẻ ẩn không chiếm không gian */
        /* ĐÃ SỬA: Xóa '!important' để cho phép Tailwind responsive (md:block) hoạt động */
        .hidden {
            display: none;
        }
        /* Làm cho sidebar dính lại khi cuộn trên màn hình lớn */
        @media (min-width: 768px) { /* Chỉ áp dụng cho 'md' trở lên */
            .sidebar-sticky {
                position: sticky;
                top: 2rem; /* 2rem = 32px */
                align-self: flex-start; /* Ngăn không cho nó kéo dài */
            }
        }
    </style>
</head>
<body class="bg-gray-100 flex flex-col h-screen">

    <!-- Header -->
    <header class="bg-blue-800 text-white shadow-md flex-shrink-0">
        <div class="w-full lg:w-3/4 mx-auto py-3 px-4 sm:px-6 lg:px-8 flex flex-col sm:flex-row justify-between sm:items-center">
            <!-- Phần bên trái (Tiêu đề) -->
            <!-- ĐÃ SỬA: Thêm flex, justify-between, items-center, w-full, sm:w-auto -->
            <div class="mb-1 sm:mb-0 flex justify-between items-center w-full sm:w-auto">
                <div> <!-- Bọc tiêu đề lại -->
                    <h1 class="text-xl sm:text-2xl font-bold">Sổ tay Chuỗi Xung MRI</h1>
                    <p class="mt-1 text-xs sm:text-sm text-blue-100">Dành cho Kỹ thuật viên Hình ảnh Y học</p>
                </div>
                
                <!-- Nút Hamburger Menu (Chỉ hiển thị trên mobile) -->
                <button id="mobile-menu-button" class="sm:hidden p-2 rounded-md text-blue-100 hover:bg-blue-700 focus:outline-none focus:bg-blue-700">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"></path>
                    </svg>
                </button>
            </div>
            <!-- Phần bên phải (Text mới & Nút) -->
            <!-- ĐÃ SỬA: Thêm w-full sm:w-auto và mt-2 sm:mt-0 -->
            <div class="text-left sm:text-right w-full sm:w-auto mt-2 sm:mt-0">
                <p class="text-sm sm:text-base font-semibold text-white">Nhóm KTV Hình ảnh y học 3 Miền</p>
                <a href="https://vnrad.tech/trangchu/" 
                   target="_blank" 
                   rel="noopener noreferrer" 
                   class="mt-1 inline-block bg-white text-blue-800 text-xs font-bold py-1 px-3 rounded-full hover:bg-blue-100 hover:text-blue-900 transition-colors duration-200">
                   Trang chủ VnRad
                </a>
            </div>
        </div>
    </header>

    <!-- Main Content - Bố cục Flex mới -->
    <!-- ĐÃ SỬA: Thêm overflow-y-auto và md:overflow-hidden để xử lý cuộn trên di động/máy tính -->
    <main class="w-full lg:w-3/4 mx-auto py-8 px-4 sm:px-6 lg:px-8 md:flex md:space-x-8 flex-1 overflow-y-auto md:overflow-hidden">
        
        <!-- Sidebar (Menu bên trái) - ĐÃ CẬP NHẬT GIAO DIỆN -->
        <!-- ĐÃ SỬA: Thêm 'md:' prefix vào h-full, overflow-y-auto, sidebar-sticky và thêm mb-6 md:mb-0 -->
        <!-- ĐÃ THÊM: 'hidden md:block' để ẩn menu trên mobile theo mặc định -->
        <nav 
            id="sidebar-nav" 
            class="w-full md:w-64 lg:w-72 md:flex-shrink-0 md:h-full md:overflow-y-auto 
                   bg-white shadow-lg rounded-lg border border-gray-200 p-4 md:sidebar-sticky mb-6 md:mb-0
                   hidden md:block">
            <!-- Nội dung sidebar sẽ được chèn bằng JavaScript -->
        </nav>

        <!-- Khu vực nội dung chính -->
        <!-- ĐÃ SỬA: Thêm 'md:' prefix vào h-full -->
        <div id="main-content" class="flex-1 md:h-full flex flex-col">
            
            <!-- Thanh tìm kiếm -->
            <div class="mb-8 flex-shrink-0">
                <input 
                    type="text" 
                    id="searchInput"
                    placeholder="Tìm kiếm theo tên chuỗi xung, tên hãng, ứng dụng..."
                    class="w-full p-4 text-lg border border-gray-300 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
                >
            </div>

            <!-- Lưới chứa các thẻ thông tin chuỗi xung -->
            <div id="sequence-container" class="flex-1 overflow-y-auto pr-2">
                <!-- Các nhóm và thẻ chuỗi xung sẽ được chèn vào đây bằng JavaScript -->
            </div>

            <!-- Footer -->
            <footer class="text-center p-6 text-gray-500 text-sm flex-shrink-0">
                © 2025 Sổ tay MRI KTV. Tài liệu chỉ mang tính chất tham khảo.
            </footer>

        </div>
    </main>

    <!-- Footer (ĐÃ BỊ XÓA TỪ ĐÂY) -->

    <!-- Khối JavaScript -->

        // Lấy các phần tử DOM
        const sidebarNav = document.getElementById('sidebar-nav');

        // Hàm HỖ TRỢ: Tạo HTML cho một thẻ chuỗi xung (ĐÃ CẬP NHẬT)
        function generateCardHtml(seq) {
            // Lấy style của nhóm
            const style = groupStyles[seq.group] || groupStyles['spin-echo']; // Mặc định là style của spin-echo

            // Tạo bảng tên hãng
            let vendorHtml = '<div class="my-3 overflow-hidden rounded-lg border border-gray-300 shadow-sm">'; // Wrapper (ĐÃ SỬA: border-gray-300 và shadow-sm)
            vendorHtml += '<table class="w-full text-sm">';
            vendorHtml += '<thead class="bg-gray-200">'; // (ĐÃ SỬA: bg-gray-200)
            vendorHtml += '<tr>';
            vendorHtml += '<th scope="col" class="py-2 px-4 text-left text-xs font-semibold uppercase tracking-wider text-gray-700">Hãng</th>'; // (ĐÃ SỬA: text-gray-700)
            vendorHtml += '<th scope="col" class="py-2 px-4 text-left text-xs font-semibold uppercase tracking-wider text-gray-700">Tên gọi</th>'; // (ĐÃ SỬA: text-gray-700)
            vendorHtml += '</tr></thead>';
            vendorHtml += '<tbody class="bg-white divide-y divide-gray-200">';
            
            let i = 0;
            for (const [vendor, name] of Object.entries(seq.vendors)) {
                const bgColor = i % 2 === 0 ? 'bg-white' : 'bg-gray-50'; // Sọc vằn
                vendorHtml += `<tr class="${bgColor}"><td class="py-3 px-4 font-semibold text-blue-700">${vendor}</td><td class="py-3 px-4 text-gray-600">${name}</td></tr>`; // (ĐÃ SỬA: font-semibold, text-blue-700)
                i++;
            }
            vendorHtml += '</tbody></table></div>'; // Đóng wrapper

            // Tạo danh sách ứng dụng
            let appHtml = '<ol class="list-decimal list-inside space-y-2 mt-2 text-sm">';
            seq.applications.sort((a, b) => a.priority - b.priority).forEach(app => {
                appHtml += `<li><span class="font-medium">${app.use}</span></li>`;
            });
            appHtml += '</ol>';

            // MỚI: Tạo khối Tips & Tricks
            let tipsHtml = '';
            if (seq.tips && seq.tips.trim() !== '') {
                tipsHtml = `
                        <div>
                            <h3 class="text-lg font-semibold text-gray-800">Tips & Tricks</h3>
                            <div class="mt-2 p-3 bg-yellow-50 border-l-4 border-yellow-400 rounded-r-lg">
                                <p class="text-sm text-yellow-800 leading-relaxed">${seq.tips}</p>
                            </div>
                        </div>
                    `;
            }

            // Trả về thẻ HTML hoàn chỉnh
            return `
                <div class="sequence-card bg-white rounded-lg shadow-lg overflow-hidden transition-all duration-300 transform hover:scale-102" id="${seq.id}">
                    <!-- Header thẻ (ĐÃ CẬP NHẬT: màu tự động theo nhóm) -->
                    <div class="p-5 ${style.bg} text-white">
                        <h2 class="text-2xl font-bold">${seq.genericName}</h2>
                    </div>
                    
                    <!-- Nội dung thẻ -->
                    <div class="p-5 space-y-4">
                        <!-- Tên Hãng -->
                        <div>
                            <h3 class="text-lg font-semibold text-blue-700">Tên gọi theo hãng</h3> <!-- ĐÃ SỬA: text-blue-700 -->
                            ${vendorHtml}
                        </div>

                        <!-- Bản chất vật lý -->
                        <div>
                            <h3 class="text-lg font-semibold text-blue-700">Bản chất vật lý</h3> <!-- ĐÃ SỬA: text-blue-700 -->
                            <p class="text-gray-700 text-sm mt-2 leading-relaxed">${seq.physics}</p>
                        </div>

                        <!-- Ứng dụng lâm sàng -->
                        <div>
                            <h3 class="text-lg font-semibold text-blue-700">Ứng dụng lâm sàng (Ưu tiên)</h3> <!-- ĐÃ SỬA: text-blue-700 -->
                            ${appHtml}
                        </div>
                        
                        <!-- Khối Tips & Tricks mới được chèn vào đây -->
                        ${tipsHtml.replace('text-gray-800', 'text-blue-700')} <!-- ĐÃ SỬA: Thay đổi màu chữ trong tipsHtml -->

                    </div>
                </div>
            `;
        }


        // Hàm để hiển thị các chuỗi xung (ĐÃ CẬP NHẬT: Hỗ trợ 5 nhóm)
        function renderSequences(sequences) {
            sidebarNav.innerHTML = ''; // Xóa nội dung cũ
            container.innerHTML = ''; // Xóa nội dung cũ

            // Phân loại chuỗi xung
            const groupedSequences = {};
            for (const groupId in groupStyles) {
                groupedSequences[groupId] = sequences.filter(s => s.group === groupId);
            }
            
            // Sắp xếp nhóm xóa mỡ (STIR, FatSat, Dixon) - nếu có
            if (groupedSequences['fat-suppression']) {
                groupedSequences['fat-suppression'].sort((a, b) => {
                    const order = ['stir', 'fatsat', 'dixon'];
                    return order.indexOf(a.id) - order.indexOf(b.id);
                });
            }
            // Sắp xếp nhóm Mạch máu (TOF, PC, ASL, FBI)
            if (groupedSequences['non-contrast-mra']) {
                 groupedSequences['non-contrast-mra'].sort((a, b) => {
                    const order = ['tof_mra', 'pc_mra', 'asl_mra', 'fbi'];
                    return order.indexOf(a.id) - order.indexOf(b.id);
                });
            }

            let sidebarHtml = '<div class="space-y-4">'; // Bỏ sidebar-sticky wrapper
            let contentHtml = '';

            // ---- Xử lý TẤT CẢ CÁC NHÓM một cách tự động ----
            for (const groupId in groupStyles) {
                const sequencesInGroup = groupedSequences[groupId];
                const style = groupStyles[groupId];
                
                if (sequencesInGroup && sequencesInGroup.length > 0) {
                    // Thêm vào Sidebar - ĐÃ CẬP NHẬT GIAO DIỆN
                    sidebarHtml += `<div id="sidebar-${groupId}-group" class="sidebar-group mt-4 first:mt-0">
                                        <h3 class="text-sm uppercase font-bold ${style.textDark} mb-2">${style.title}</h3>
                                        <div class="space-y-1">`;
                    sequencesInGroup.forEach(seq => {
                        sidebarHtml += `<a href="#${seq.id}" class="sidebar-link block py-2 px-3 rounded-md text-sm font-medium text-gray-600 ${style.hover} hover:${style.textDark} transition-colors duration-150">${seq.genericName}</a>`;
                    });
                    sidebarHtml += `</div></div>`;

                    // Thêm vào Nội dung chính
                    contentHtml += `<h2 id="${groupId}-group" class="group-heading text-3xl font-bold mt-12 mb-6 ${style.textDark} pt-5">${style.title}</h2>`;
                    contentHtml += `<div id="${groupId}-grid" class="grid grid-cols-1 md:grid-cols-1 lg:grid-cols-2 gap-6">`;
                    sequencesInGroup.forEach(seq => {
                        contentHtml += generateCardHtml(seq);
                    });
                    contentHtml += `</div>`;
                }
            }
            
            sidebarHtml += '</div>'; // Đóng thẻ space-y-4

            // Hiển thị nếu không có dữ liệu
            if (sequences.length === 0) {
                container.innerHTML = '<p class="text-gray-600 text-lg col-span-full text-center">Không tìm thấy chuỗi xung.</p>';
                sidebarNav.innerHTML = '<p class="text-gray-600 text-sm">Không có dữ liệu.</p>';
                return;
            }

            // Sửa lỗi sidebar group đầu tiên không có margin-top
            sidebarNav.innerHTML = sidebarHtml.replace('mt-4 first:mt-0', ''); // Xóa margin-top của nhóm đầu tiên
            container.innerHTML = contentHtml.replace('mt-12', ''); // Xóa margin-top của nhóm đầu tiên
        }

        // Hàm lọc chuỗi xung (ĐÃ SỬA LỖI LOGIC)
        function filterSequences() {
            const searchTerm = searchInput.value.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, ""); // Chuẩn hóa, bỏ dấu tiếng Việt
            
            const allCards = document.querySelectorAll('.sequence-card');
            const allSidebarLinks = document.querySelectorAll('.sidebar-link');
            const visibleCardIds = new Set();

            // 1. Lọc các thẻ Card (Nội dung chính)
            allCards.forEach(card => {
                const cardText = card.textContent.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
                if (cardText.includes(searchTerm)) {
                    card.classList.remove('hidden');
                    visibleCardIds.add(card.id);
                } else {
                    card.classList.add('hidden');
                }
            });

            // 2. Lọc các link ở Sidebar
            allSidebarLinks.forEach(link => {
                const targetId = link.hash.substring(1); // hash là '#t1w', substring(1) là 't1w'
                if (visibleCardIds.has(targetId)) {
                    link.classList.remove('hidden');
                } else {
                    link.classList.add('hidden');
                }
            });

            // 3. Ẩn/Hiện các tiêu đề nhóm (cả ở Sidebar và Nội dung chính)
            document.querySelectorAll('.group-heading').forEach(heading => {
                const gridId = heading.id.replace('-group', '-grid'); // 'spin-echo-group' -> 'spin-echo-grid'
                const grid = document.getElementById(gridId);
                if (grid) {
                    const visibleCardsInGroup = grid.querySelectorAll('.sequence-card:not(.hidden)');
                    if (visibleCardsInGroup.length === 0) {
                        heading.classList.add('hidden');
                    } else {
                        heading.classList.remove('hidden');
                    }
                }
            });

            document.querySelectorAll('.sidebar-group').forEach(group => {
                const visibleLinksInGroup = group.querySelectorAll('.sidebar-link:not(.hidden)');
                if (visibleLinksInGroup.length === 0) {
                    group.classList.add('hidden');
                } else {
                    // *** ĐÂY LÀ PHẦN ĐÃ SỬA ***
                    // Bị lỗi: group.classList.add('hidden');
                    // Sửa thành:
                    group.classList.remove('hidden');
                }
            });
        }

        // Gắn sự kiện
        // 1. Hiển thị tất cả khi tải trang
        document.addEventListener('DOMContentLoaded', () => {
            // SẮP XẾP LẠI NHÓM: Di chuyển ASL từ "advanced-maps" sang "non-contrast-mra"
            const aslSequence = sequenceData.find(seq => seq.id === 'asl_mra');
            if (aslSequence) {
                aslSequence.group = 'non-contrast-mra';
            }
            renderSequences(sequenceData);

            // *** PHẦN MỚI: Thêm logic cho menu mobile ***
            const mobileMenuButton = document.getElementById('mobile-menu-button');
            const sidebar = document.getElementById('sidebar-nav');

            mobileMenuButton.addEventListener('click', () => {
                sidebar.classList.toggle('hidden');
                
                // Cập nhật icon (tùy chọn nhưng đẹp hơn)
                const icon = mobileMenuButton.querySelector('svg');
                if (sidebar.classList.contains('hidden')) {
                    // Hiện icon hamburger
                    icon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"></path>`;
                } else {
                    // Hiện icon 'X' (close)
                    icon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>`;
                }
            });
            // *** Hết phần mới ***
        });

        // 2. Lọc khi người dùng gõ
        searchInput.addEventListener('keyup', filterSequences);

    </script>

</body>
</html>
