<body class="antialiased custom-scrollbar">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useMemo, useCallback } from 'react';
        import { createRoot } from 'react-dom/client';
        import { initializeApp } from 'firebase/app';
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from 'firebase/auth';
        import { getFirestore, collection, doc, addDoc, updateDoc, setDoc, deleteDoc, onSnapshot, query, orderBy, serverTimestamp, getDoc, limit, collectionGroup } from 'firebase/firestore';
        import { 
            ShieldCheck, Users, BookOpen, LogOut, Search, Trash2, Plus, 
            Upload, Download, X, CheckCircle2, AlertCircle, Edit3, 
            LayoutDashboard, FileText, Loader2, Info, Database,
            TrendingUp, Tag, ChevronRight, Bell, Crown, Unlock, CreditCard, Check, FileUp, ListChecks, Lock, Activity, Trophy, Settings, Image as ImageIcon, Save, Star, Calendar, RefreshCw, PlayCircle, Clock
        } from 'lucide-react';

        const firebaseConfig = {
            apiKey: "AIzaSyDqdo_DJIWa5iqxiCgBq-0iGX7f9sr6soo",
            authDomain: "rt-examination.firebaseapp.com",
            projectId: "rt-examination",
            storageBucket: "rt-examination.firebasestorage.app",
            messagingSenderId: "920482699854",
            appId: "1:920482699854:web:44f9b0d735bdc001c6c11f"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = 'med-exam-pro-html';

        const ADMIN_EMAILS = ["thanhtrong.yds@gmail.com", "vnrad.tech@gmail.com", "test@gmail.com"];

        // --- UI UTILS ---
        const Toast = ({ message, type, onClose }) => {
            useEffect(() => { const timer = setTimeout(onClose, 4000); return () => clearTimeout(timer); }, [onClose]);
            const styles = { success: "bg-emerald-500/20 border-emerald-500/40 text-emerald-400", error: "bg-red-500/20 border-red-500/40 text-red-400", info: "bg-blue-500/20 border-blue-500/40 text-blue-400" };
            return (
                <div className={`fixed bottom-6 right-6 px-6 py-4 rounded-2xl border ${styles[type]} shadow-2xl flex items-center gap-3 animate-fade-in z-[100] backdrop-blur-xl max-w-sm`}>
                    {type === 'error' ? <AlertCircle size={20}/> : <CheckCircle2 size={20}/>}<span className="font-bold text-sm leading-tight">{message}</span>
                </div>
            );
        };

        // --- COMPONENTS ---
        
        const ImportModal = ({ onClose, onImport, notify }) => {
            const [isProcessing, setIsProcessing] = useState(false);
            const downloadTemplate = () => { const wsData = [["Câu hỏi", "A", "B", "C", "D", "Đáp án (A/B/C/D)", "Giải thích"], ["Vị trí tim?", "Hố chậu", "Trung thất", "Hạ sườn", "Thượng vị", "B", "Tim nằm ở trung thất giữa."]]; const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(wsData), "Mẫu"); XLSX.writeFile(wb, "Mau_MedExam.xlsx"); };
            const handleFile = (e) => { const file = e.target.files[0]; if (!file) return; setIsProcessing(true); const reader = new FileReader(); reader.onload = (evt) => { try { const data = new Uint8Array(evt.target.result); const wb = XLSX.read(data, { type: 'array' }); const rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { header: 1 }); const imported = rows.slice(1).filter(r => r[0]).map(r => ({ text: String(r[0]), options: [String(r[1]||''), String(r[2]||''), String(r[3]||''), String(r[4]||'')], correctOption: "ABCD".indexOf(String(r[5]||'A').toUpperCase().trim()), explanation: String(r[6] || '') })); onImport(imported); notify(`Đã nạp ${imported.length} câu hỏi`, 'success'); onClose(); } catch (err) { notify("Lỗi cấu trúc tệp Excel", "error"); } finally { setIsProcessing(false); } }; reader.readAsArrayBuffer(file); };
            return ( <div className="fixed inset-0 bg-black/90 backdrop-blur-md flex items-center justify-center p-4 z-[70]"> <div className="bg-slate-900 w-full max-w-md rounded-[2.5rem] border border-slate-800 p-10 text-center space-y-8 animate-in shadow-2xl"> <Database size={48} className="mx-auto text-emerald-500"/> <h3 className="text-2xl font-black">Import Excel</h3> <div className="space-y-4"> <label className="block w-full py-12 border-2 border-dashed border-slate-700 rounded-3xl hover:border-emerald-500 cursor-pointer group transition-all"> <input type="file" className="hidden" accept=".xlsx, .xls" onChange={handleFile} /> <span className="text-slate-400 group-hover:text-emerald-400 font-bold">{isProcessing ? "Đang xử lý..." : "Chọn file Excel"}</span> </label> <button onClick={downloadTemplate} className="text-emerald-500 text-xs font-black uppercase hover:text-emerald-400 flex items-center justify-center gap-2 w-full"><Download size={14}/> Tải file mẫu</button> </div> <button onClick={onClose} className="text-slate-600 font-bold">Hủy bỏ</button> </div> </div> );
        };

        const ExamEditor = ({ exam, onClose, notify }) => {
            const [title, setTitle] = useState(exam?.title || '');
            const [category, setCategory] = useState(exam?.category || 'Chung');
            const [isPremium, setIsPremium] = useState(exam?.isPremium || false);
            const [duration, setDuration] = useState(exam?.duration || 30);
            const [questions, setQuestions] = useState(exam?.questions || []);
            const [activeTab, setActiveTab] = useState('excel');
            const [isSaving, setIsSaving] = useState(false);
            const [isImporting, setIsImporting] = useState(false);

            const downloadTemplate = () => { const wsData = [["Câu hỏi", "A", "B", "C", "D", "Đáp án (A/B/C/D)", "Giải thích"], ["Vị trí tim?", "Hố chậu", "Trung thất", "Hạ sườn", "Thượng vị", "B", "Tim nằm ở trung thất giữa."]]; const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(wsData), "Mẫu"); XLSX.writeFile(wb, "Mau_MedExam.xlsx"); };
            const handleFileImport = (e) => { const file = e.target.files[0]; if (!file) return; setIsImporting(true); const reader = new FileReader(); reader.onload = (evt) => { try { const data = new Uint8Array(evt.target.result); const wb = XLSX.read(data, { type: 'array' }); const rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { header: 1 }); const imported = rows.slice(1).filter(r => r[0]).map(r => ({ text: String(r[0]), options: [String(r[1]||''), String(r[2]||''), String(r[3]||''), String(r[4]||'')], correctOption: "ABCD".indexOf(String(r[5]||'A').toUpperCase().trim()), explanation: String(r[6] || '') })); setQuestions([...questions, ...imported]); notify(`Đã nạp ${imported.length} câu hỏi`, 'success'); } catch (err) { notify("Lỗi cấu trúc tệp Excel", "error"); } finally { setIsImporting(false); } }; reader.readAsArrayBuffer(file); };
            const saveExam = async () => { if (!title.trim()) return notify("Vui lòng nhập tên đề thi", "error"); if (questions.length === 0) return notify("Danh sách câu hỏi đang trống", "error"); setIsSaving(true); try { const data = { title, category, isPremium, duration: Number(duration), questions, updatedAt: serverTimestamp() }; if (exam?.id) await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'exams', exam.id), data); else await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'exams'), { ...data, createdAt: serverTimestamp() }); notify("Lưu đề thi thành công", "success"); onClose(); } catch (e) { notify(e.message, "error"); } finally { setIsSaving(false); } };

            return ( <div className="fixed inset-0 bg-slate-950/98 flex items-center justify-center p-4 z-50"> <div className="bg-slate-900 w-full max-w-6xl h-[95vh] rounded-[2.5rem] border border-slate-800 flex flex-col shadow-2xl animate-in overflow-hidden"> <div className="p-6 border-b border-slate-800 flex justify-between items-center bg-slate-900/50 backdrop-blur-xl"> <div className="flex items-center gap-4"><div className={`w-12 h-12 rounded-2xl flex items-center justify-center ${exam ? 'bg-blue-500/10 text-blue-500' : 'bg-emerald-500/10 text-emerald-500'}`}>{exam ? <Edit3 size={24}/> : <Plus size={24}/>}</div><div><h2 className="text-xl font-black uppercase tracking-tight">{exam ? 'Sửa đề thi' : 'Tạo đề thi'}</h2><p className="text-slate-500 text-[10px] font-bold uppercase tracking-widest">Admin Console</p></div></div> <button onClick={onClose} className="p-2 text-slate-500 hover:text-white transition-all bg-slate-800 rounded-full"><X size={20}/></button> </div> <div className="flex-1 overflow-y-auto p-8 custom-scrollbar space-y-10"> <section className="bg-slate-950/50 p-6 rounded-3xl border border-white/5 grid grid-cols-1 md:grid-cols-4 gap-6"> <div className="md:col-span-2 space-y-2"><label className="text-[10px] font-black text-slate-600 uppercase ml-2">Tên bộ đề</label><input className="w-full bg-slate-900 border border-slate-800 rounded-2xl p-4 outline-none focus:border-blue-600 font-bold" value={title} onChange={e=>setTitle(e.target.value)} placeholder="Nhập tiêu đề..."/></div> <div className="space-y-2"><label className="text-[10px] font-black text-slate-600 uppercase ml-2">Thời gian (Phút)</label><input type="number" className="w-full bg-slate-900 border border-slate-800 rounded-2xl p-4 outline-none focus:border-blue-600 font-bold" value={duration} onChange={e=>setDuration(e.target.value)}/></div> <div className="space-y-2"><label className="text-[10px] font-black text-slate-600 uppercase ml-2">Loại đề</label><div className="flex bg-slate-900 p-1.5 rounded-2xl border border-slate-800 h-[58px]"><button onClick={()=>setIsPremium(false)} className={`flex-1 rounded-xl text-[10px] font-black transition-all flex items-center justify-center gap-2 ${!isPremium ? 'bg-emerald-600 text-white shadow-lg' : 'text-slate-600'}`}>FREE</button><button onClick={()=>setIsPremium(true)} className={`flex-1 rounded-xl text-[10px] font-black transition-all flex items-center justify-center gap-2 ${isPremium ? 'bg-yellow-600 text-white shadow-lg' : 'text-slate-600'}`}>VIP</button></div></div> </section> 
                            
                            <section className="space-y-6"> 
                                <h3 className="text-xs font-black text-slate-500 uppercase tracking-[0.2em] px-2 border-l-4 border-emerald-600 ml-2">2. Nạp dữ liệu (Excel Only)</h3>
                                <div className="min-h-[300px]"> 
                                    <div className="bg-slate-950/40 p-12 rounded-[2.5rem] border border-white/5 flex flex-col items-center justify-center text-center space-y-6 animate-in"> 
                                        <div className="w-20 h-20 bg-emerald-500/10 text-emerald-500 rounded-3xl flex items-center justify-center mx-auto shadow-inner"><FileUp size={40}/></div> 
                                        <div><h4 className="text-xl font-black">Nạp câu hỏi hàng loạt</h4><p className="text-slate-500 text-sm mt-2 max-w-md">Chỉ hỗ trợ nạp dữ liệu từ tệp Excel để đảm bảo chuẩn hóa dữ liệu.</p></div> 
                                        <div className="w-full max-w-sm space-y-4"><label className="block w-full py-16 border-2 border-dashed border-slate-800 rounded-3xl hover:border-emerald-600 cursor-pointer transition-all group bg-slate-900/50"><input type="file" className="hidden" accept=".xlsx, .xls" onChange={handleFileImport} /><div className="text-center">{isImporting ? <Loader2 className="animate-spin mx-auto text-emerald-500 mb-2"/> : <Plus className="mx-auto text-slate-600 group-hover:text-emerald-500 mb-2"/>}<span className="text-slate-500 font-bold group-hover:text-emerald-400">{isImporting ? "Đang xử lý..." : "Chọn tệp .xlsx"}</span></div></label><button onClick={downloadTemplate} className="w-full text-emerald-500 text-[10px] font-black uppercase flex items-center justify-center gap-2 hover:underline"><Download size={14}/> Tải xuống cấu trúc file mẫu</button></div> 
                                    </div> 
                                </div> 
                            </section>
                            
                            <section className="space-y-6"> <div className="flex justify-between items-center px-4"><h3 className="font-black text-blue-400 text-xl uppercase tracking-tighter flex items-center gap-3"><ListChecks size={24}/> Ngân hàng đề ({questions.length})</h3>{questions.length > 0 && <button onClick={()=>setQuestions([])} className="text-red-500 text-[10px] font-black hover:underline uppercase tracking-widest">Xóa tất cả</button>}</div> {questions.length === 0 ? <div className="py-24 text-center border-2 border-dashed border-slate-800 rounded-[3rem] text-slate-700 bg-slate-900/20"><p className="font-black uppercase tracking-widest text-xs">Ngân hàng hiện đang trống</p></div> : <div className="grid grid-cols-1 gap-4 pb-10">{questions.map((q, i) => (<div key={i} className="bg-slate-900/40 p-6 rounded-3xl flex justify-between items-start border border-slate-800 hover:border-blue-900/30 transition-all group"><div className="flex-1 pr-6"><p className="font-bold text-slate-200 text-lg leading-tight"><span className="text-blue-500 mr-2 font-black italic">#{i+1}</span> {q.text}</p></div><button onClick={()=>setQuestions(questions.filter((_,idx)=>idx!==i))} className="p-3 text-slate-600 hover:text-red-500 transition-all bg-slate-800 rounded-xl"><Trash2 size={18}/></button></div>))}</div>} </section> </div> <div className="p-6 border-t border-slate-800 flex justify-end gap-4 bg-slate-900/80 backdrop-blur-xl"><button onClick={onClose} className="px-10 py-3 text-slate-500 font-bold hover:text-white transition-all uppercase text-xs">Đóng</button><button onClick={saveExam} disabled={isSaving} className="px-16 py-4 bg-blue-600 hover:bg-blue-500 rounded-2xl font-black text-white flex gap-3 shadow-2xl transition-all active:scale-95 disabled:opacity-50">{isSaving ? <Loader2 className="animate-spin" size={20}/> : <Check size={20}/>} {exam ? 'CẬP NHẬT' : 'PHÁT HÀNH ĐỀ'}</button></div> </div> </div> );
        };

        const Dashboard = ({ user }) => {
            const [tab, setTab] = useState('overview');
            const [users, setUsers] = useState([]);
            const [exams, setExams] = useState([]);
            const [requests, setRequests] = useState([]);
            const [activeSessions, setActiveSessions] = useState([]); 
            const [scores, setScores] = useState([]); 
            const [allReviews, setAllReviews] = useState([]);
            const [search, setSearch] = useState('');
            const [filterType, setFilterType] = useState('all');
            const [examAccessFilter, setExamAccessFilter] = useState('all');
            const [editing, setEditing] = useState(null);
            const [showAdd, setShowAdd] = useState(false);
            const [toast, setToast] = useState(null);
            const [sysLoginBg, setSysLoginBg] = useState('');
            const [sysResultBg, setSysResultBg] = useState('');

            const notify = useCallback((message, type = 'info') => { setToast({ message, type }); }, []);

            useEffect(() => {
                const unsubU = onSnapshot(query(collection(db, 'artifacts', appId, 'public', 'data', 'users')), s => setUsers(s.docs.map(d=>({id: d.id, ...d.data()}))));
                const unsubE = onSnapshot(query(collection(db, 'artifacts', appId, 'public', 'data', 'exams')), s => setExams(s.docs.map(d=>({id: d.id, ...d.data()}))));
                const unsubR = onSnapshot(query(collection(db, 'artifacts', appId, 'public', 'data', 'paymentRequests')), s => setRequests(s.docs.map(d=>({id: d.id, ...d.data()}))));
                const unsubReviews = onSnapshot(query(collection(db, 'artifacts', appId, 'public', 'data', 'reviews')), s => setAllReviews(s.docs.map(d=>d.data())));
                const unsubSettings = onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'system_settings', 'config'), d => {
                    if (d.exists()) {
                        setSysLoginBg(d.data().loginBg || '');
                        setSysResultBg(d.data().resultBg || '');
                    }
                });

                // --- LIVE MONITOR THÔNG MINH ---
                const unsubActive = onSnapshot(query(collection(db, 'artifacts', appId, 'public', 'data', 'active_exams')), s => {
                    const now = Date.now();
                    const live = [];
                    s.docs.forEach(doc => {
                        const data = doc.data();
                        
                        // Logic kiểm tra Heartbeat:
                        // 1. Nếu có lastPing, phải được cập nhật trong vòng 2 phút gần đây.
                        // 2. Nếu không có lastPing (phiên bản cũ), dùng startedAt và cho phép tồn tại tối đa 2 phút từ lúc bắt đầu.
                        let isActive = false;
                        if (data.lastPing?.toMillis) {
                            if (now - data.lastPing.toMillis() < 2 * 60 * 1000) isActive = true;
                        } else if (data.startedAt?.toMillis) {
                             if (now - data.startedAt.toMillis() < 2 * 60 * 1000) isActive = true;
                        }

                        if (isActive) {
                            live.push({id: doc.id, ...data});
                        } else {
                            // Tự động xóa phiên treo nếu quá 5 phút không có tín hiệu (để làm sạch DB)
                            const lastTime = data.lastPing?.toMillis ? data.lastPing.toMillis() : (data.startedAt?.toMillis ? data.startedAt.toMillis() : 0);
                            if (now - lastTime > 5 * 60 * 1000) {
                                deleteDoc(doc.ref).catch(e => {}); 
                            }
                        }
                    });
                    setActiveSessions(live);
                });

                try {
                    const qHistory = query(collectionGroup(db, 'history'), orderBy('score', 'desc'), limit(100));
                    const unsubHistory = onSnapshot(qHistory, s => {
                        const allScores = s.docs.map(d => ({...d.data(), id: d.id}));
                        setScores(allScores);
                    }, (err) => console.log("Leaderboard err", err));
                    return () => { unsubU(); unsubE(); unsubR(); unsubActive(); unsubHistory(); unsubSettings(); unsubReviews(); };
                } catch(e) {
                    return () => { unsubU(); unsubE(); unsubR(); unsubActive(); unsubSettings(); unsubReviews(); };
                }
            }, []);

            const saveSystemConfig = async () => {
                try {
                    await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'system_settings', 'config'), {
                        loginBg: sysLoginBg,
                        resultBg: sysResultBg,
                        updatedAt: serverTimestamp()
                    });
                    notify("Đã lưu cấu hình hệ thống thành công!", "success");
                } catch (e) { notify("Lỗi lưu cấu hình: " + e.message, "error"); }
            };

            const removeSession = async (id) => {
                if(confirm("Bạn có chắc muốn xóa phiên thi này?")) {
                    try {
                        await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'active_exams', id));
                        notify("Đã xóa phiên thi treo", "success");
                    } catch (e) { notify("Lỗi: " + e.message, "error"); }
                }
            };

            const clearAllSessions = async () => {
                if(confirm("XÓA TẤT CẢ PHIÊN ĐANG THI? Chỉ dùng khi hệ thống bị treo.")) {
                    activeSessions.forEach(async (s) => {
                        await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'active_exams', s.id));
                    });
                    notify("Đã làm sạch danh sách Monitor", "success");
                }
            };

            const filteredUsers = useMemo(() => {
                return users.filter(u => {
                    const matchSearch = (u.displayName||'').toLowerCase().includes(search.toLowerCase()) || (u.email||'').toLowerCase().includes(search.toLowerCase());
                    const matchFilter = filterType === 'all' || (filterType === 'vip' && u.isPremium) || (filterType === 'free' && !u.isPremium);
                    return matchSearch && matchFilter;
                });
            }, [users, search, filterType]);

            const filteredExams = useMemo(() => {
                return exams.filter(e => {
                    const matchSearch = (e.title||'').toLowerCase().includes(search.toLowerCase());
                    const matchAccess = examAccessFilter === 'all' || (examAccessFilter === 'vip' && e.isPremium) || (examAccessFilter === 'free' && !e.isPremium);
                    return matchSearch && matchAccess;
                });
            }, [exams, search, examAccessFilter]);

            const formatDate = (ts) => ts?.toDate ? ts.toDate().toLocaleDateString('vi-VN') : 'Vừa xong';

            return (
                <div className="flex min-h-screen">
                    <aside className="w-72 bg-slate-900/50 border-r border-white/5 flex flex-col fixed h-full z-40 backdrop-blur-xl">
                        <div className="p-8 border-b border-white/5 flex items-center gap-4 text-red-500 font-black text-2xl tracking-tighter"><ShieldCheck size={32}/><div className="leading-none text-white font-black uppercase tracking-tight">Admin<br/><small className="text-slate-500 text-[10px] tracking-[0.4em]">MedExam</small></div></div>
                        <nav className="flex-1 p-6 space-y-4 mt-4">
                            {[
                                { id: 'overview', label: 'Tổng quan', icon: LayoutDashboard },
                                { id: 'exams', label: 'Quản lý đề', icon: BookOpen },
                                { id: 'requests', label: 'Duyệt VIP', icon: CreditCard, count: requests.length },
                                { id: 'live_exam', label: 'Monitor (Live)', icon: Activity },
                                { id: 'score_rank', label: 'Bảng xếp hạng', icon: Trophy },
                                { id: 'users', label: 'Học viên', icon: Users },

            useEffect(() => {

                    <div className="w-full max-w-lg glass-panel p-16 rounded-[4rem] shadow-2xl animate-in relative z-10">
                        <div className="text-center mb-12">
                            <div className="w-24 h-24 bg-red-600/10 rounded-3xl mx-auto flex items-center justify-center mb-6 shadow-inner border border-red-600/5 group">
                                <ShieldCheck size={56} className="text-red-500 drop-shadow-[0_0_15px_rgba(239,68,68,0.4)] group-hover:scale-110 transition-transform duration-500"/>
                            </div>
                            <h1 className="text-4xl font-black text-white tracking-tighter mb-2 uppercase leading-none">Admin<br/>Portal</h1>
                            <div className="h-1 w-12 bg-red-600 mx-auto rounded-full mt-4"></div>
                            <p className="text-slate-400 text-[10px] mt-6 font-black uppercase tracking-[0.4em]">Medical Examination System</p>
                        </div>
                        {err && (
                            <div className="mb-10 p-5 bg-red-500/10 border border-red-500/20 text-red-400 text-[10px] font-black rounded-3xl flex items-center gap-4 uppercase animate-pulse">
                                <AlertCircle size={20}/> {err}
                            </div>
                        )}
                        <form onSubmit={handleLogin} className="space-y-8">
                            <div className="space-y-2">
                                <label className="text-[10px] font-black text-slate-500 uppercase tracking-widest ml-2">Email Quản Trị</label>
                                <input name="email" type="email" required className="w-full glass-input rounded-3xl p-5 outline-none focus:border-red-600 font-bold text-slate-200 transition-all shadow-inner" placeholder="admin@medexam.pro"/>
                            </div>
                            <div className="space-y-2">
                                <label className="text-[10px] font-black text-slate-500 uppercase tracking-widest ml-2">Mật khẩu bảo mật</label>
                                <input name="password" type="password" required className="w-full glass-input rounded-3xl p-5 outline-none focus:border-red-600 font-bold text-slate-200 transition-all shadow-inner" placeholder="••••••••"/>
                            </div>
                            <button className="w-full bg-red-600 hover:bg-red-500 text-white font-black py-6 rounded-3xl transition-all shadow-2xl uppercase text-xs tracking-widest active:scale-95">Xác thực danh tính</button>
                        </form>
                    </div>
                </div>
            );

            return <Dashboard user={user} />;
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
