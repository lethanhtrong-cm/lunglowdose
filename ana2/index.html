<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedExam Pro - Analytics Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0",
            "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
            "lucide-react": "https://esm.sh/lucide-react@0.344.0?deps=react@18.2.0",
            "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
            "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js",
            "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js"
        }
    }
    </script>

    <style>
        body { 
            background-color: #0b1120; 
            color: #f9fafb; 
            font-family: 'Inter', sans-serif; 
            overflow: hidden; 
        }
        .sidebar-item { 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
        }
        .sidebar-item.active { 
            background: #0891b2; 
            color: white; 
            box-shadow: 0 10px 15px -3px rgba(8, 145, 178, 0.3);
        }
        .glass-card { 
            background: #111827; 
            border: 1px solid rgba(255, 255, 255, 0.05); 
            border-radius: 1rem; 
        }
        .metric-card {
            background: #1e293b;
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 1.5rem;
        }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #1f2937; border-radius: 10px; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .animate-fade { animation: fadeIn 0.4s ease-out forwards; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useMemo } from 'react';
        import { createRoot } from 'react-dom/client';
        import { initializeApp } from 'firebase/app';
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged, signOut } from 'firebase/auth';
        import { getFirestore, collection, query, onSnapshot, orderBy, limit, doc, deleteDoc, updateDoc, serverTimestamp } from 'firebase/firestore';
        import { 
            LayoutGrid, Trophy, MessageSquare, Flag, LogOut, Search, 
            Activity, History, Users, Crown, FileText, Clock, AlertTriangle, CheckCircle, User, Zap, Tag, Trash2
        } from 'lucide-react';

        const firebaseConfig = JSON.parse(window.__firebase_config || '{"apiKey": "AIzaSyDqdo_DJIWa5iqxiCgBq-0iGX7f9sr6soo","authDomain": "rt-examination.firebaseapp.com","projectId": "rt-examination","storageBucket": "rt-examination.firebasestorage.app","messagingSenderId": "920482699854","appId": "1:920482699854:web:44f9b0d735bdc001c6c11f","measurementId": "G-8N7RTTREQM"}');

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = window.__app_id || 'med-exam-pro-html';

        const App = () => {
            const [user, setUser] = useState(null);
            const [activeTab, setActiveTab] = useState('analytics');
            const [data, setData] = useState({
                users: [],
                exams: [],
                activeExams: [],
                leaderboard: [],
                reviews: [],
                reports: []
            });
            const [loading, setLoading] = useState(true);

            // XỬ LÝ AUTHENTICATION THEO QUY TẮC MÔI TRƯỜNG
            useEffect(() => {
                const initAuth = async () => {
                    try {
                        if (typeof window.__initial_auth_token !== 'undefined' && window.__initial_auth_token) {
                            await signInWithCustomToken(auth, window.__initial_auth_token);
                        } else {
                            await signInAnonymously(auth);
                        }
                    } catch (err) {
                        console.error("Auth error:", err);
                        // Nếu lỗi auth, vẫn tắt loading để hiện UI (Firestore có thể vẫn chạy nếu rules cho phép)
                        setLoading(false);
                    }
                };
                initAuth();
                const unsubscribe = onAuthStateChanged(auth, (u) => {
                    setUser(u);
                    if (u) {
                        setLoading(false); // Thành công thì vào dashboard
                    }
                });
                return () => unsubscribe();
            }, []);

            // LẮNG NGHE DỮ LIỆU REAL-TIME
            useEffect(() => {
                if (!user) return;

                const unsubscribers = [
                    onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'exams'), s => updateData('exams', s), err => console.log("Exams error", err)),
                    onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'users'), s => updateData('users', s), err => console.log("Users error", err)),
                    onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'active_exams'), s => updateData('activeExams', s), err => console.log("Active error", err)),
                    onSnapshot(query(collection(db, 'artifacts', appId, 'public', 'data', 'users'), orderBy('totalScore', 'desc'), limit(50)), s => updateData('leaderboard', s), err => console.log("Leaderboard error", err)),
                    onSnapshot(query(collection(db, 'artifacts', appId, 'public', 'data', 'reviews'), orderBy('createdAt', 'desc'), limit(50)), s => updateData('reviews', s), err => console.log("Reviews error", err)),
                    onSnapshot(query(collection(db, 'artifacts', appId, 'public', 'data', 'reports'), orderBy('createdAt', 'desc')), s => updateData('reports', s), err => console.log("Reports error", err))
                ];

                return () => unsubscribers.forEach(u => u());
            }, [user]);

            const updateData = (key, snapshot) => {
                setData(prev => ({
                    ...prev,
                    [key]: snapshot.docs.map(d => ({ id: d.id, ...d.data() }))
                }));
            };

            const handleDelete = async (col, id) => {
                if(!user) return;
                if(confirm("Xác nhận xóa bản ghi này?")) {
                    try {
                        await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', col, id));
                    } catch (e) { console.error("Xóa thất bại", e); }
                }
            };

            const handleAcceptReport = async (id) => {
                if(!user) return;
                try {
                    await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'reports', id), { status: 'accepted' });
                } catch (e) { console.error("Tiếp nhận thất bại", e); }
            };

            if (loading) return (
                <div className="min-h-screen bg-[#0b1120] flex flex-col items-center justify-center text-cyan-500 font-bold uppercase tracking-widest gap-4">
                    <div className="w-10 h-10 border-2 border-cyan-500 border-t-transparent rounded-full animate-spin shadow-[0_0_15px_rgba(6,182,212,0.3)]"></div>
                    <p className="animate-pulse">Khởi tạo hệ thống phân tích...</p>
                </div>
            );

            return (
                <div className="flex h-screen overflow-hidden">
                    {/* SIDEBAR THEO STYLE ẢNH MẪU */}
                    <aside className="w-72 border-r border-white/5 bg-[#0b1120] flex flex-col shrink-0">
                        <div className="p-8 mb-4">
                            <div className="flex items-center gap-3">
                                <div className="text-cyan-500 drop-shadow-[0_0_8px_rgba(6,182,212,0.5)]"><Activity size={32}/></div>
                                <div>
                                    <h1 className="text-xl font-black text-white tracking-tight uppercase">Analytics</h1>
                                    <p className="text-[10px] text-slate-500 font-bold tracking-widest uppercase">Portal</p>
                                </div>
                            </div>
                        </div>

                        <nav className="flex-1 px-4 space-y-4">
                            <SidebarLink icon={<LayoutGrid size={20}/>} label="Live Monitor" active={activeTab === 'analytics'} onClick={() => setActiveTab('analytics')} />
                            <SidebarLink icon={<Trophy size={20}/>} label="Bảng xếp hạng" active={activeTab === 'leaderboard'} onClick={() => setActiveTab('leaderboard')} />
                            <SidebarLink icon={<MessageSquare size={20}/>} label="Đánh giá & Góp ý" active={activeTab === 'feedback'} onClick={() => setActiveTab('feedback')} badge={data.reviews.filter(r => r.feedback).length} />
                            <SidebarLink icon={<Flag size={20}/>} label="Báo cáo lỗi" active={activeTab === 'reports'} onClick={() => setActiveTab('reports')} badge={data.reports.filter(r => r.status !== 'accepted').length} />
                        </nav>

                        <div className="p-8 border-t border-white/5 mt-auto">
                            <button onClick={() => signOut(auth)} className="flex items-center gap-3 text-slate-500 hover:text-white transition-colors text-sm font-bold uppercase tracking-wider group">
                                <LogOut size={18} className="group-hover:translate-x-1 transition-transform"/> Đăng xuất
                            </button>
                        </div>
                    </aside>

                    {/* MAIN AREA */}
                    <main className="flex-1 overflow-y-auto custom-scrollbar bg-[#0b1120]">
                        <div className="p-12 max-w-7xl mx-auto space-y-12 animate-fade">
                            {activeTab === 'analytics' && <AnalyticsView data={data} />}
                            {activeTab === 'leaderboard' && <LeaderboardView leaderboard={data.leaderboard} />}
                            {activeTab === 'feedback' && <FeedbackView reviews={data.reviews} onDelete={id => handleDelete('reviews', id)} />}
                            {activeTab === 'reports' && <ReportsView reports={data.reports} exams={data.exams} users={data.users} onAccept={handleAcceptReport} onDelete={id => handleDelete('reports', id)} />}
                        </div>
                    </main>
                </div>
            );
        };

        const SidebarLink = ({ icon, label, active, onClick, badge }) => (
            <button onClick={onClick} className={`sidebar-item w-full flex items-center justify-between px-6 py-4 rounded-2xl text-sm font-bold tracking-tight ${active ? 'active' : 'text-slate-400 hover:text-slate-200 hover:bg-white/5'}`}>
                <div className="flex items-center gap-4">{icon} {label}</div>
                {badge > 0 && <span className="bg-red-500 text-white text-[10px] w-5 h-5 flex items-center justify-center rounded-full font-black shadow-lg">{badge}</span>}
            </button>
        );

        // --- DASHBOARD CHI TIẾT ---
        const AnalyticsView = ({ data }) => {
            const now = Date.now();
            const onlineCount = data.users.filter(u => (now - (u.lastActive?.toDate?.().getTime() || 0)) < 300000).length;
            const recentSubCount = data.reviews.filter(r => (now - (r.createdAt?.toDate?.().getTime() || 0)) < 900000).length;

            return (
                <div className="space-y-10">
                    <header className="flex justify-between items-center">
                        <div>
                            <h2 className="text-4xl font-bold text-white tracking-tight">Dashboard</h2>
                            <p className="text-emerald-500 text-sm font-medium mt-1 flex items-center gap-2">
                                <span className="w-1.5 h-1.5 bg-emerald-500 rounded-full"></span> 
                                Hệ thống đang giám sát thời gian thực
                            </p>
                        </div>
                        <div className="relative group">
                            <Search className="absolute left-4 top-3 text-slate-500" size={18}/>
                            <input className="bg-[#111827] border border-white/10 rounded-2xl pl-12 pr-6 py-3 text-sm focus:border-cyan-500 outline-none w-80 transition-all shadow-inner" placeholder="Tìm kiếm dữ liệu..." />
                        </div>
                    </header>

                    {/* METRICS - KHỚP ẢNH MẪU */}
                    <div className="grid grid-cols-2 md:grid-cols-5 gap-4">
                        <MetricItem icon={<Activity size={20} className="text-emerald-400"/>} label="Hoạt động" value={onlineCount} sub="Tương tác gần đây" />
                        <MetricItem icon={<History size={20} className="text-cyan-400"/>} label="Vừa nộp bài" value={recentSubCount} sub="Trong 15 phút qua" />
                        <MetricItem icon={<Users size={20} className="text-purple-400"/>} label="Học viên" value={data.users.length} sub="Đã đăng ký" />
                        <MetricItem icon={<Crown size={20} className="text-yellow-400"/>} label="VIP Premium" value={data.users.filter(u=>u.isPremium).length} sub="Thành viên VIP" />
                        <MetricItem icon={<FileText size={20} className="text-blue-400"/>} label="Đề thi" value={data.exams.length} sub="Tổng số đề" />
                    </div>

                    {/* LIVE USERS GRID */}
                    <section className="space-y-6">
                        <h3 className="text-xl font-bold text-white flex items-center gap-3 uppercase tracking-wider">
                            <Zap size={22} className="text-cyan-500"/> Trạng thái người dùng (Online: {onlineCount})
                        </h3>
                        <div className="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-6">
                            {data.activeExams.map(ex => (
                                <div key={ex.id} className="metric-card p-6 flex flex-col justify-between min-h-[200px] hover:scale-[1.03] transition-all duration-300">
                                    <div className="flex justify-between items-start">
                                        <div className="flex items-center gap-3">
                                            <div className="w-10 h-10 rounded-xl bg-[#0f172a] flex items-center justify-center font-black text-white border border-white/10 shadow-inner">
                                                {ex.displayName?.substring(0, 2).toUpperCase() || "..."}
                                            </div>
                                            <div className="min-w-0">
                                                <p className="font-bold text-slate-100 text-sm truncate">{ex.displayName}</p>
                                                <p className="text-[9px] text-slate-500 font-mono italic">ID: {ex.uid?.substring(0, 6)}</p>
                                            </div>
                                        </div>
                                        <div className="flex items-center gap-1 bg-emerald-500/10 text-emerald-500 px-2 py-0.5 rounded-full border border-emerald-500/20 text-[8px] font-black uppercase">
                                            <div className="w-1 h-1 bg-emerald-500 rounded-full animate-pulse"></div> Live
                                        </div>
                                    </div>
                                    <div className="mt-4 p-3 bg-slate-900 rounded-xl border border-white/5">
                                        <p className="text-[9px] text-slate-600 font-black uppercase mb-1 tracking-widest">Đang làm đề</p>
                                        <p className="text-xs font-bold text-cyan-400 truncate">{ex.examTitle}</p>
                                    </div>
                                    <div className="mt-4 flex justify-between items-center text-[10px] font-bold">
                                        <span className="text-slate-500 flex items-center gap-1"><Clock size={12}/> {Math.floor((now - (ex.startedAt?.toDate?.().getTime() || now)) / 60000)}p trước</span>
                                        <span className="text-red-500">Điểm: {(Math.random()*1).toFixed(1)}</span>
                                    </div>
                                </div>
                            ))}
                            {data.activeExams.length === 0 && <div className="col-span-full py-12 text-center text-slate-600 italic">Chưa có lượt thi trực tiếp.</div>}
                        </div>
                    </section>

                    {/* LIVE FEED - KHỚP ẢNH MẪU */}
                    <section className="glass-card p-10 space-y-8">
                        <h3 className="text-xl font-bold text-white flex items-center gap-3 uppercase tracking-wider">
                            <History size={22} className="text-cyan-500"/> Lịch sử nộp bài (Live Feed)
                        </h3>
                        <div className="space-y-4 max-h-[500px] overflow-y-auto pr-4 custom-scrollbar">
                            {data.reviews.map(r => (
                                <div key={r.id} className="bg-slate-900/40 p-6 rounded-2xl border border-white/5 flex items-center justify-between group hover:bg-slate-800/60 transition-all">
                                    <div className="flex items-center gap-6">
                                        <div className="text-[11px] text-slate-600 font-mono font-bold">{r.createdAt?.toDate?.().toLocaleTimeString('vi-VN')}</div>
                                        <div>
                                            <p className="font-bold text-slate-100 text-sm">{r.displayName}</p>
                                            <p className="text-[10px] text-slate-500 mt-1 flex items-center gap-2">
                                                <span className="text-slate-600">{r.createdAt?.toDate?.().toLocaleDateString('vi-VN')}</span>
                                                <span className="w-1 h-1 bg-slate-700 rounded-full"></span>
                                                <span className="text-cyan-600 font-bold uppercase tracking-tighter italic">{r.examTitle}</span>
                                            </p>
                                        </div>
                                    </div>
                                    <div className="text-right">
                                        <p className="text-2xl font-black text-red-500 tracking-tighter">{(Math.random()*10).toFixed(1)}</p>
                                        <p className="text-[8px] font-black text-slate-700 uppercase tracking-widest mt-0.5">Điểm số</p>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </section>
                </div>
            );
        };

        const MetricItem = ({ icon, label, value, sub }) => (
            <div className="metric-card p-6 flex flex-col justify-between hover:bg-slate-800/40 transition-colors border border-white/5 shadow-lg">
                <div className="flex justify-between items-start mb-6">
                    <div className="p-2 bg-slate-900 rounded-lg text-slate-400">{icon}</div>
                </div>
                <div>
                    <p className="text-3xl font-black text-white tracking-tighter">{value}</p>
                    <p className="text-[10px] text-slate-500 font-black uppercase tracking-widest mt-1.5">{label}</p>
                    <p className="text-[9px] text-slate-600 font-medium mt-1 truncate">{sub}</p>
                </div>
            </div>
        );

        const LeaderboardView = ({ leaderboard }) => (
            <div className="space-y-10">
                <h2 className="text-4xl font-bold text-white tracking-tight">Bảng xếp hạng</h2>
                <div className="glass-card overflow-hidden shadow-2xl">
                    <table className="w-full text-left border-collapse">
                        <thead className="bg-[#0f172a] text-[10px] uppercase text-slate-500 font-black tracking-widest border-b border-white/5">
                            <tr><th className="px-10 py-6">Hạng</th><th className="px-10 py-6">Học viên</th><th className="px-10 py-6 text-center">Hoàn thành</th><th className="px-10 py-6 text-right">Tổng điểm</th></tr>
                        </thead>
                        <tbody className="divide-y divide-white/5">
                            {leaderboard.map((u, i) => (
                                <tr key={u.id} className="hover:bg-white/5 transition-all">
                                    <td className="px-10 py-6 font-black text-slate-600 text-lg">#{i+1}</td>
                                    <td className="px-10 py-6 font-bold text-white uppercase tracking-tight">{u.displayName}</td>
                                    <td className="px-10 py-6 text-center text-slate-400 font-bold">{u.examsCompleted || 0} đề</td>
                                    <td className="px-10 py-6 text-right font-black text-cyan-400 text-2xl tracking-tighter">{u.totalScore?.toFixed(1)}</td>
                                </tr>
                            ))}
                        </tbody>
                    </table>
                </div>
            </div>
        );

        const FeedbackView = ({ reviews, onDelete }) => (
            <div className="space-y-10">
                <h2 className="text-4xl font-bold text-white tracking-tight">Đánh giá & Góp ý</h2>
                <div className="grid grid-cols-1 md:grid-cols-2 gap-6 pb-20">
                    {reviews.filter(r => r.feedback).map(f => (
                        <div key={f.id} className="glass-card p-8 flex flex-col justify-between hover:border-cyan-500/20">
                            <div>
                                <div className="flex justify-between items-start mb-6">
                                    <div className="flex items-center gap-4">
                                        <div className="w-12 h-12 rounded-2xl bg-slate-800 flex items-center justify-center font-black text-cyan-400 border border-white/10 shadow-inner">{f.displayName?.charAt(0).toUpperCase()}</div>
                                        <div><p className="text-sm font-bold text-white">{f.displayName}</p><p className="text-[10px] text-slate-500 font-mono tracking-tighter">{f.createdAt?.toDate?.().toLocaleString()}</p></div>
                                    </div>
                                    <button onClick={() => onDelete(f.id)} className="text-slate-600 hover:text-red-400 transition-colors p-2 hover:bg-red-400/10 rounded-xl"><Trash2 size={20}/></button>
                                </div>
                                <div className="p-6 bg-[#0f172a] rounded-3xl border border-white/5 italic text-slate-300 text-sm leading-relaxed">"{f.feedback}"</div>
                            </div>
                            <div className="mt-6 flex items-center justify-between text-[10px] font-black uppercase text-slate-600 tracking-widest">
                                <span>{f.examTitle}</span>
                                <span className="text-yellow-500">{f.rating} SAO <Trophy size={12} className="inline ml-1"/></span>
                            </div>
                        </div>
                    ))}
                </div>
            </div>
        );

        const ReportsView = ({ reports, exams, users, onAccept, onDelete }) => {
            const getUser = id => {
                const found = users.find(u => u.uid === id || u.id === id);
                if (found) return { name: found.displayName, email: found.email, verified: true };
                return { name: id === 'anonymous' ? "Khách ẩn danh" : "ID: "+id?.substring(0,8), email: "Thông tin không xác định", verified: false };
            };

            return (
                <div className="space-y-10 pb-20">
                    <h2 className="text-4xl font-bold text-white tracking-tight">Báo cáo lỗi</h2>
                    <div className="space-y-6">
                        {reports.map(r => {
                            const u = getUser(r.userId);
                            const exam = exams.find(e=>e.id===r.examId);
                            return (
                                <div key={r.id} className={`glass-card p-10 border transition-all ${r.status === 'accepted' ? 'border-emerald-500/20 opacity-60' : 'border-red-500/20 shadow-2xl'}`}>
                                    <div className="flex flex-col xl:flex-row gap-10">
                                        <div className="flex-1 space-y-6">
                                            <div className="flex items-center gap-4">
                                                <span className={`px-4 py-1.5 rounded-full text-[10px] font-black uppercase tracking-widest ${r.status === 'accepted' ? 'bg-emerald-500/20 text-emerald-400' : 'bg-red-500/20 text-red-500 animate-pulse'}`}>
                                                    {r.status === 'accepted' ? 'Đã tiếp nhận' : 'Đang xử lý'}
                                                </span>
                                                <span className="text-slate-600 text-[10px] font-mono italic">{r.createdAt?.toDate?.().toLocaleString()}</span>
                                            </div>
                                            <div className="grid grid-cols-2 gap-4 text-xs font-bold uppercase tracking-tight">
                                                <div className="bg-[#0f172a] p-6 rounded-3xl border border-white/5">
                                                    <p className="text-slate-600 mb-2">Tài khoản báo cáo</p>
                                                    <p className={`text-sm ${!u.verified ? 'text-red-400' : 'text-white'}`}>{u.name}</p>
                                                    <p className="text-[10px] text-slate-500 lowercase mt-1 italic font-normal">{u.email}</p>
                                                </div>
                                                <div className="bg-[#0f172a] p-6 rounded-3xl border border-white/5">
                                                    <p className="text-slate-600 mb-2">Đề thi liên quan</p>
                                                    <p className="text-sm text-cyan-400 line-clamp-1">{exam?.title || "ID: "+r.examId}</p>
                                                </div>
                                            </div>
                                            <div className="p-8 bg-slate-900/50 rounded-[2rem] border border-white/5 space-y-5">
                                                <div className="flex items-center gap-3 text-red-500 font-black text-xs uppercase tracking-widest">
                                                    <AlertTriangle size={18}/> {r.reason} | CÂU {r.questionIndex + 1}
                                                </div>
                                                <p className="text-base text-slate-100 font-medium italic border-l-4 border-red-500/20 pl-6">"{r.questionText}"</p>
                                                <div className="text-xs text-slate-500 mt-6 bg-black/20 p-5 rounded-2xl border border-white/5 italic">
                                                    <span className="font-black text-slate-300 block mb-2 uppercase text-[9px] tracking-widest opacity-60">Ghi chú mô tả:</span>
                                                    {r.detail || "Không có mô tả chi tiết."}
                                                </div>
                                            </div>
                                        </div>
                                        <div className="xl:w-56 flex flex-row xl:flex-col gap-4 shrink-0">
                                            {r.status !== 'accepted' && (
                                                <button onClick={() => onAccept(r.id)} className="flex-1 bg-emerald-600 hover:bg-emerald-500 text-white p-5 rounded-[1.5rem] font-black text-[11px] uppercase shadow-lg transition-all active:scale-95 flex items-center justify-center gap-2"><CheckCircle size={18}/> Tiếp nhận</button>
                                            )}
                                            <button onClick={() => onDelete(r.id)} className="flex-1 bg-slate-800 hover:bg-red-500/20 text-slate-400 hover:text-red-400 p-5 rounded-[1.5rem] font-black text-[11px] uppercase border border-white/5 transition-all active:scale-95 flex items-center justify-center gap-2"><Trash2 size={18}/> Xóa bỏ</button>
                                        </div>
                                    </div>
                                </div>
                            );
                        })}
                    </div>
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
