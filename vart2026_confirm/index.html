<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Xác nhận tham dự | VART2026</title>
  
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Lucide Icons CDN -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <!-- Custom Styles for Animations -->
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes zoomIn {
      from { transform: scale(0.95); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }
    
    .animate-fade-in {
      animation: fadeIn 0.4s ease-out forwards;
    }
    .animate-slide-up {
      animation: slideUp 0.5s ease-out forwards;
    }
    .animate-zoom-in {
      animation: zoomIn 0.3s ease-out forwards;
    }
    
    /* Ẩn thanh cuộn nhưng vẫn cuộn được */
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
  </style>
</head>
<body class="bg-slate-50 font-sans text-slate-800 antialiased selection:bg-sky-200">

  <!-- MÀN HÌNH CHỌN NGÔN NGỮ (LANGUAGE SELECTION) -->
  <div id="language-screen" class="fixed inset-0 z-50 overflow-y-auto bg-slate-900">
    <!-- Hình nền và hiệu ứng (Cố định) -->
    <img src="https://images.unsplash.com/photo-1559592413-7cec4d0cae2b?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80" alt="Đà Nẵng Cầu Rồng" class="fixed inset-0 w-full h-full object-cover opacity-40 mix-blend-overlay">
    <div class="fixed inset-0 bg-gradient-to-t from-slate-900 via-slate-900/60 to-transparent"></div>
    
    <!-- Wrapper cuộn dọc để chống cắt màn hình trên trình duyệt Zalo -->
    <div class="min-h-full flex items-center justify-center p-4">
      <div class="bg-white/95 backdrop-blur-md rounded-2xl sm:rounded-3xl shadow-2xl p-5 sm:p-8 max-w-[92%] sm:max-w-lg w-full text-center relative z-10 animate-zoom-in my-8">
        
        <div class="bg-sky-100 w-12 h-12 sm:w-16 sm:h-16 rounded-full flex items-center justify-center mx-auto mb-4 sm:mb-6 shadow-inner">
          <i data-lucide="globe" class="w-6 h-6 sm:w-8 sm:h-8 text-sky-600"></i>
        </div>
        
        <div class="mb-5 sm:mb-8">
          <h2 class="text-sm sm:text-lg font-bold text-sky-600 uppercase tracking-wide mb-1.5 sm:mb-2">Xác nhận tham dự</h2>
          <h1 class="text-lg sm:text-2xl md:text-3xl font-extrabold text-slate-800 leading-snug mb-3 sm:mb-5">
            Hội nghị Kỹ thuật điện quang và Y học hạt nhân Việt Nam lần thứ XIV
          </h1>
          <div class="w-10 sm:w-16 h-1 bg-slate-200 mx-auto mb-3 sm:mb-5 rounded-full"></div>
          <h3 class="text-[11px] sm:text-sm font-semibold text-sky-600/80 uppercase tracking-wider mb-1">VART / Confirmation</h3>
          <h2 class="text-[13px] sm:text-base md:text-lg font-bold text-slate-500 leading-snug">
            The 14th Vietnam Annual Conference of Radiologic Technology and Nuclear Medicine
          </h2>
        </div>

        <p class="text-red-500 font-medium mb-4 sm:mb-6 text-[12px] sm:text-sm italic leading-relaxed">Vui lòng chọn ngôn ngữ để tiếp tục <br/> Please select a language to continue</p>
        
        <div class="space-y-3 sm:space-y-4">
          <button onclick="selectLanguage('vi')" class="w-full flex items-center justify-center gap-2 bg-sky-600 hover:bg-sky-700 text-white px-5 py-3 sm:px-6 sm:py-3.5 rounded-xl font-semibold transition-all hover:scale-[1.02] active:scale-95 shadow-md shadow-sky-600/20">
            VN Tiếng Việt
          </button>
          <button onclick="selectLanguage('en')" class="w-full flex items-center justify-center gap-2 bg-white hover:bg-slate-50 text-slate-800 px-5 py-3 sm:px-6 sm:py-3.5 rounded-xl font-bold transition-all hover:scale-[1.02] active:scale-95 border-2 border-slate-300 hover:border-slate-400 shadow-sm">
            EN English
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- MÀN HÌNH THÀNH CÔNG (SUCCESS SCREEN) -->
  <div id="success-screen" class="fixed inset-0 bg-sky-50 flex items-center justify-center p-4 z-40 hidden animate-fade-in">
    <div class="bg-white rounded-2xl sm:rounded-3xl shadow-xl p-6 sm:p-8 max-w-[92%] sm:max-w-md w-full text-center">
      <i data-lucide="check-circle-2" class="w-16 h-16 sm:w-20 sm:h-20 text-emerald-500 mx-auto mb-5 sm:mb-6"></i>
      <h2 id="t-successTitle" class="text-xl sm:text-2xl font-bold text-slate-800 mb-2"></h2>
      <p id="t-successMsg" class="text-sm sm:text-base text-slate-600 mb-5 sm:mb-6"></p>
      <p id="t-successNote" class="text-xs sm:text-sm text-slate-500 italic mb-8"></p>
      
      <div class="space-y-3">
        <button onclick="window.location.reload()" id="t-doneBtn" class="w-full py-3.5 bg-sky-600 hover:bg-sky-700 text-white rounded-xl font-bold text-base transition-all active:scale-95 shadow-md shadow-sky-600/20"></button>
        <button onclick="editForm()" id="t-editBtn" class="w-full py-3.5 bg-slate-100 hover:bg-slate-200 text-slate-700 rounded-xl font-semibold text-base transition-all active:scale-95 border border-slate-200"></button>
      </div>
    </div>
  </div>

  <!-- MÀN HÌNH CHÍNH (MAIN FORM SCREEN) -->
  <div id="main-screen" class="min-h-screen pb-12 hidden animate-fade-in">
    <!-- Hero Section -->
    <div class="relative h-auto min-h-[220px] sm:h-[40vh] sm:min-h-[300px] w-full bg-slate-900 overflow-hidden shadow-lg flex flex-col justify-end pb-8 sm:pb-14 pt-10 sm:pt-16">
      <img src="https://images.unsplash.com/photo-1559592413-7cec4d0cae2b?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80" alt="Đà Nẵng" class="absolute inset-0 w-full h-full object-cover opacity-50 mix-blend-overlay scale-105">
      <div class="absolute inset-0 bg-gradient-to-t from-slate-900 via-slate-900/60 to-transparent"></div>
      
      <div class="relative z-10 w-full p-4 sm:p-6 md:p-12 max-w-4xl mx-auto mt-auto">
        <div class="inline-flex items-start sm:items-center gap-2 px-3.5 py-2 sm:px-4 sm:py-1.5 rounded-2xl sm:rounded-full bg-sky-500/20 text-sky-300 border border-sky-400/30 text-[13px] sm:text-sm font-semibold mb-4 backdrop-blur-md shadow-lg shadow-sky-500/10 max-w-full">
          <i data-lucide="stethoscope" class="w-4 h-4 shrink-0 mt-[3px] sm:mt-0"></i>
          <span id="t-heroTag" class="leading-relaxed sm:leading-normal"></span>
        </div>
        <h1 id="t-heroTitle" class="text-3xl sm:text-4xl md:text-5xl font-extrabold text-white mb-4 sm:mb-5 drop-shadow-md tracking-tight leading-tight"></h1>
        <div class="flex flex-wrap items-center gap-2.5 sm:gap-5 text-slate-200 text-xs sm:text-sm md:text-base font-medium">
          <span class="flex items-center gap-1.5 sm:gap-2 bg-black/30 px-3 py-1.5 sm:px-4 sm:py-2 rounded-lg backdrop-blur-sm border border-white/5">
            <i data-lucide="map-pin" class="w-3.5 h-3.5 sm:w-4 sm:h-4 text-sky-400 shrink-0"></i> <span id="t-heroLoc"></span>
          </span>
          <span class="flex items-center gap-1.5 sm:gap-2 bg-black/30 px-3 py-1.5 sm:px-4 sm:py-2 rounded-lg backdrop-blur-sm border border-white/5">
            <i data-lucide="calendar" class="w-3.5 h-3.5 sm:w-4 sm:h-4 text-sky-400 shrink-0"></i> <span id="t-heroDate"></span>
          </span>
        </div>
      </div>
    </div>

    <!-- Form Section -->
    <div class="max-w-4xl mx-auto px-3 sm:px-4 -mt-6 sm:-mt-8 relative z-20">
      <form id="registrationForm" class="space-y-6 sm:space-y-8">
        
        <!-- Lời ngỏ -->
        <div class="bg-white/95 backdrop-blur-md border border-sky-100 rounded-2xl p-4 sm:p-5 shadow-xl shadow-slate-200/50 flex items-start sm:items-center gap-3 sm:gap-4 relative overflow-hidden">
          <div class="absolute left-0 top-0 w-1 h-full bg-sky-400"></div>
          <div class="p-2 bg-sky-100 rounded-full shrink-0">
            <i data-lucide="info" class="w-5 h-5 sm:w-6 sm:h-6 text-sky-600"></i>
          </div>
          <p id="t-introText" class="text-slate-700 text-[13px] sm:text-base font-medium leading-relaxed"></p>
        </div>

        <!-- Card 1: Thông tin cá nhân -->
        <div class="bg-white rounded-2xl shadow-xl shadow-slate-200/50 border border-slate-100 p-5 sm:p-6 md:p-8 relative overflow-hidden">
          <div class="absolute top-0 left-0 w-1 sm:w-1.5 h-full bg-sky-500"></div>
          <div class="flex items-center gap-3 mb-5 sm:mb-6 pb-3 sm:pb-4 border-b border-slate-100">
            <div class="p-2 sm:p-2.5 bg-sky-100 rounded-xl text-sky-600 shadow-sm">
              <i data-lucide="user" class="w-5 h-5 sm:w-6 sm:h-6"></i>
            </div>
            <h2 id="t-card1Title" class="text-xl sm:text-2xl font-bold text-slate-800"></h2>
          </div>
          
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4 sm:gap-6 mb-6 sm:mb-8">
            <div>
              <label id="t-fullName" class="block text-sm font-bold text-slate-700 mb-2"></label>
              <input required type="text" name="fullName" id="input-fullName" class="w-full px-4 py-2.5 sm:py-3 rounded-xl bg-slate-50 border-2 border-sky-200 hover:border-sky-400 hover:scale-[1.02] focus:scale-[1.02] focus:bg-white focus:ring-2 focus:ring-sky-500 focus:border-sky-500 outline-none transition-all duration-300 text-slate-800 font-medium shadow-sm">
            </div>
            <div>
              <label id="t-phone" class="block text-sm font-bold text-slate-700 mb-2"></label>
              <input required type="tel" name="phone" placeholder="0909..." class="w-full px-4 py-2.5 sm:py-3 rounded-xl bg-slate-50 border-2 border-sky-200 hover:border-sky-400 hover:scale-[1.02] focus:scale-[1.02] focus:bg-white focus:ring-2 focus:ring-sky-500 focus:border-sky-500 outline-none transition-all duration-300 text-slate-800 font-medium shadow-sm">
            </div>
            <div class="md:col-span-2">
              <label id="t-workplace" class="block text-sm font-bold text-slate-700 mb-2"></label>
              <input required type="text" name="workplace" id="input-workplace" class="w-full px-4 py-2.5 sm:py-3 rounded-xl bg-slate-50 border-2 border-sky-200 hover:border-sky-400 hover:scale-[1.02] focus:scale-[1.02] focus:bg-white focus:ring-2 focus:ring-sky-500 focus:border-sky-500 outline-none transition-all duration-300 text-slate-800 font-medium shadow-sm">
            </div>
          </div>

          <!-- Attendance Logic -->
          <div class="bg-sky-50/50 rounded-2xl p-4 sm:p-6 border border-sky-100">
            <label id="t-attendance" class="block text-base sm:text-lg font-bold text-slate-800 mb-3 sm:mb-4"></label>
            <div class="flex flex-col sm:flex-row gap-3 sm:gap-4">
              <label class="flex-1 cursor-pointer">
                <input type="radio" name="isAttending" value="yes" class="peer sr-only" checked>
                <div class="flex items-center justify-center gap-2 p-3 sm:p-4 rounded-xl border-2 transition-all duration-200 bg-white border-slate-200 text-slate-600 hover:border-sky-300 hover:bg-sky-50 peer-checked:bg-sky-600 peer-checked:border-sky-600 peer-checked:text-white peer-checked:shadow-lg peer-checked:shadow-sky-600/30 peer-checked:scale-[1.02]">
                  <span id="t-attending" class="font-bold text-sm sm:text-base"></span>
                </div>
              </label>
              <label class="flex-1 cursor-pointer">
                <input type="radio" name="isAttending" value="no" class="peer sr-only">
                <div class="flex items-center justify-center gap-2 p-3 sm:p-4 rounded-xl border-2 transition-all duration-200 bg-white border-slate-200 text-slate-600 hover:border-red-300 hover:bg-red-50 peer-checked:bg-red-500 peer-checked:border-red-500 peer-checked:text-white peer-checked:shadow-lg peer-checked:shadow-red-500/30 peer-checked:scale-[1.02]">
                  <span id="t-notAttending" class="font-bold text-sm sm:text-base"></span>
                </div>
              </label>
            </div>
          </div>
        </div>

        <!-- Các phần hiển thị theo điều kiện (Chỉ khi chọn Tham dự) -->
        <div id="conditional-sections" class="space-y-6 sm:space-y-8 animate-slide-up">
          
          <!-- Card 2: Di chuyển -->
          <div class="bg-white rounded-2xl shadow-xl shadow-slate-200/50 border border-slate-100 p-5 sm:p-6 md:p-8 relative overflow-hidden">
            <div class="absolute top-0 left-0 w-1 sm:w-1.5 h-full bg-indigo-500"></div>
            <div class="flex items-center gap-3 mb-5 sm:mb-6 pb-3 sm:pb-4 border-b border-slate-100">
              <div class="p-2 sm:p-2.5 bg-indigo-100 rounded-xl text-indigo-600 shadow-sm">
                <i data-lucide="plane" class="w-5 h-5 sm:w-6 sm:h-6"></i>
              </div>
              <h2 id="t-card2Title" class="text-xl sm:text-2xl font-bold text-slate-800"></h2>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 sm:gap-6 mb-6 sm:mb-8">
              <div>
                <label id="t-arrival" class="block text-sm font-bold text-slate-700 mb-2"></label>
                <input type="datetime-local" name="arrivalFlight" class="w-full px-4 py-2.5 sm:py-3 rounded-xl bg-slate-50 border-2 border-sky-200 hover:border-sky-400 hover:scale-[1.02] focus:scale-[1.02] focus:bg-white focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all duration-300 text-slate-800 font-medium shadow-sm">
              </div>
              <div>
                <label id="t-departure" class="block text-sm font-bold text-slate-700 mb-2"></label>
                <input type="datetime-local" name="departureFlight" class="w-full px-4 py-2.5 sm:py-3 rounded-xl bg-slate-50 border-2 border-sky-200 hover:border-sky-400 hover:scale-[1.02] focus:scale-[1.02] focus:bg-white focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all duration-300 text-slate-800 font-medium shadow-sm">
              </div>
            </div>

            <div class="bg-indigo-50/50 rounded-2xl p-4 sm:p-6 border border-indigo-100">
              <label id="t-transferQ" class="block text-base sm:text-lg font-bold text-slate-800 mb-3 sm:mb-4"></label>
              <div class="flex flex-col sm:flex-row gap-3 sm:gap-4">
                <label class="flex-1 cursor-pointer">
                  <input type="radio" name="needTransfer" value="yes" class="peer sr-only">
                  <div class="flex items-center justify-center gap-2 p-3 sm:p-3.5 rounded-xl border-2 transition-all bg-white border-slate-200 text-slate-600 hover:border-indigo-300 peer-checked:bg-indigo-600 peer-checked:border-indigo-600 peer-checked:text-white peer-checked:shadow-md peer-checked:shadow-indigo-600/30">
                    <span id="t-needTransfer" class="font-semibold text-sm sm:text-base"></span>
                  </div>
                </label>
                <label class="flex-1 cursor-pointer">
                  <input type="radio" name="needTransfer" value="no" class="peer sr-only" checked>
                  <div class="flex items-center justify-center gap-2 p-3 sm:p-3.5 rounded-xl border-2 transition-all bg-white border-slate-200 text-slate-600 hover:border-slate-300 peer-checked:bg-slate-600 peer-checked:border-slate-600 peer-checked:text-white peer-checked:shadow-md peer-checked:shadow-slate-600/30">
                    <span id="t-noTransfer" class="font-semibold text-sm sm:text-base"></span>
                  </div>
                </label>
              </div>
            </div>
          </div>

          <!-- Card 3: Lưu trú -->
          <div class="bg-white rounded-2xl shadow-xl shadow-slate-200/50 border border-slate-100 p-5 sm:p-6 md:p-8 relative overflow-hidden">
            <div class="absolute top-0 left-0 w-1 sm:w-1.5 h-full bg-teal-500"></div>
            <div class="flex items-center gap-3 mb-5 sm:mb-6 pb-3 sm:pb-4 border-b border-slate-100">
              <div class="p-2 sm:p-2.5 bg-teal-100 rounded-xl text-teal-600 shadow-sm">
                <i data-lucide="hotel" class="w-5 h-5 sm:w-6 sm:h-6"></i>
              </div>
              <h2 id="t-card3Title" class="text-xl sm:text-2xl font-bold text-slate-800"></h2>
            </div>

            <div class="bg-teal-50 border-l-4 border-teal-500 rounded-r-xl p-4 sm:p-5 mb-6 sm:mb-8 shadow-sm">
              <p class="text-sm text-teal-900 leading-relaxed">
                <span id="t-hotelNote1"></span> <br/>
                <strong id="t-hotelNote2" class="text-teal-950 text-sm sm:text-base block mt-1"></strong> 
                <span id="t-hotelNote3" class="text-teal-800"></span>
              </p>
            </div>

            <div class="space-y-6 sm:space-y-8">
              <div>
                <label id="t-useHotelQ" class="block text-base sm:text-lg font-bold text-slate-800 mb-3 sm:mb-4"></label>
                <div class="flex flex-col sm:flex-row gap-3 sm:gap-4">
                  <label class="flex-1 cursor-pointer">
                    <input type="radio" name="useHotel" value="yes" class="peer sr-only" checked>
                    <div class="flex items-center justify-center gap-2 p-3 sm:p-3.5 rounded-xl border-2 transition-all bg-white border-slate-200 text-slate-600 hover:border-teal-300 peer-checked:bg-teal-600 peer-checked:border-teal-600 peer-checked:text-white peer-checked:shadow-md peer-checked:shadow-teal-600/30">
                      <span id="t-useHotel" class="font-semibold text-sm sm:text-base"></span>
                    </div>
                  </label>
                  <label class="flex-1 cursor-pointer">
                    <input type="radio" name="useHotel" value="no" class="peer sr-only">
                    <div class="flex items-center justify-center gap-2 p-3 sm:p-3.5 rounded-xl border-2 transition-all bg-white border-slate-200 text-slate-600 hover:border-slate-300 peer-checked:bg-slate-600 peer-checked:border-slate-600 peer-checked:text-white peer-checked:shadow-md peer-checked:shadow-slate-600/30">
                      <span id="t-noHotel" class="font-semibold text-sm sm:text-base"></span>
                    </div>
                  </label>
                </div>
              </div>

              <!-- Chi tiết Hotel -->
              <div id="hotel-details" class="grid grid-cols-1 md:grid-cols-2 gap-4 sm:gap-6 pt-5 sm:pt-6 border-t border-slate-100 animate-fade-in">
                <div>
                  <label id="t-stayDuration" class="block text-sm font-bold text-slate-700 mb-2"></label>
                  <select name="stayDuration" class="w-full px-4 py-2.5 sm:py-3 rounded-xl bg-slate-50 border-2 border-sky-200 hover:border-sky-400 hover:scale-[1.02] focus:scale-[1.02] focus:bg-white focus:ring-2 focus:ring-teal-500 focus:border-teal-500 outline-none transition-all duration-300 text-slate-800 font-medium shadow-sm cursor-pointer">
                    <option id="t-day1" value="1"></option>
                    <option id="t-day2" value="2" selected></option>
                  </select>
                </div>
                <div>
                  <label id="t-roomType" class="block text-sm font-bold text-slate-700 mb-2"></label>
                  <select name="roomType" class="w-full px-4 py-2.5 sm:py-3 rounded-xl bg-slate-50 border-2 border-sky-200 hover:border-sky-400 hover:scale-[1.02] focus:scale-[1.02] focus:bg-white focus:ring-2 focus:ring-teal-500 focus:border-teal-500 outline-none transition-all duration-300 text-slate-800 font-medium shadow-sm cursor-pointer">
                    <option id="t-single" value="single" selected></option>
                    <option id="t-double" value="double"></option>
                  </select>
                </div>
              </div>
            </div>
          </div>

          <!-- Card 4: Tiệc & Ẩm thực -->
          <div class="bg-white rounded-2xl shadow-xl shadow-slate-200/50 border border-slate-100 p-5 sm:p-6 md:p-8 relative overflow-hidden">
            <div class="absolute top-0 left-0 w-1 sm:w-1.5 h-full bg-orange-500"></div>
            <div class="flex items-center gap-3 mb-5 sm:mb-6 pb-3 sm:pb-4 border-b border-slate-100">
              <div class="p-2 sm:p-2.5 bg-orange-100 rounded-xl text-orange-600 shadow-sm">
                <i data-lucide="utensils" class="w-5 h-5 sm:w-6 sm:h-6"></i>
              </div>
              <h2 id="t-card4Title" class="text-xl sm:text-2xl font-bold text-slate-800"></h2>
            </div>

            <div class="space-y-6 sm:space-y-8">
              <div class="bg-orange-50 rounded-2xl p-4 sm:p-6 border border-orange-100">
                <div class="mb-3 sm:mb-4">
                  <h3 id="t-dinnerTitle" class="text-base sm:text-lg font-bold text-slate-800"></h3>
                  <p id="t-dinnerTime" class="text-sm text-orange-800 font-medium mt-1"></p>
                </div>
                <div class="flex flex-col sm:flex-row gap-3 sm:gap-4">
                  <label class="flex-1 cursor-pointer">
                    <input type="radio" name="joinWelcomeDinner" value="yes" class="peer sr-only" checked>
                    <div class="flex items-center justify-center gap-2 p-3 sm:p-3.5 rounded-xl border-2 transition-all bg-white border-slate-200 text-slate-600 hover:border-orange-300 peer-checked:bg-orange-500 peer-checked:border-orange-500 peer-checked:text-white peer-checked:shadow-md peer-checked:shadow-orange-500/30">
                      <span id="t-join" class="font-semibold text-sm sm:text-base"></span>
                    </div>
                  </label>
                  <label class="flex-1 cursor-pointer">
                    <input type="radio" name="joinWelcomeDinner" value="no" class="peer sr-only">
                    <div class="flex items-center justify-center gap-2 p-3 sm:p-3.5 rounded-xl border-2 transition-all bg-white border-slate-200 text-slate-600 hover:border-slate-300 peer-checked:bg-slate-600 peer-checked:border-slate-600 peer-checked:text-white peer-checked:shadow-md peer-checked:shadow-slate-600/30">
                      <span id="t-notJoin" class="font-semibold text-sm sm:text-base"></span>
                    </div>
                  </label>
                </div>
              </div>

              <div>
                <label id="t-vegQ" class="block text-base sm:text-lg font-bold text-slate-800 mb-3 sm:mb-4"></label>

                    <input type="radio" name="isVegetarian" value="yes" class="peer sr-only">
                    <div class="flex items-center justify-center gap-2 p-3 sm:p-3.5 rounded-xl border-2 transition-all bg-white border-slate-200 text-slate-600 hover:border-emerald-300 peer-checked:bg-emerald-600 peer-checked:border-emerald-600 peer-checked:text-white peer-checked:shadow-md peer-checked:shadow-emerald-600/30">

                    <input type="radio" name="isVegetarian" value="no" class="peer sr-only" checked>
                    <div class="flex items-center justify-center gap-2 p-3 sm:p-3.5 rounded-xl border-2 transition-all bg-white border-slate-200 text-slate-600 hover:border-slate-300 peer-checked:bg-slate-600 peer-checked:border-slate-600 peer-checked:text-white peer-checked:shadow-md peer-checked:shadow-slate-600/30">

        <!-- Submit Button -->
        <div class="flex flex-col sm:flex-row justify-end pt-4 sm:pt-6 pb-12 sm:pb-16 px-1 sm:px-0">
          <button type="submit" id="submit-btn" class="w-full sm:w-auto bg-sky-600 hover:bg-sky-700 text-white px-6 sm:px-10 py-3.5 sm:py-4 rounded-2xl font-extrabold text-base sm:text-lg shadow-xl shadow-sky-600/30 transition-all flex items-center justify-center gap-2 hover:scale-[1.02] active:scale-95 hover:shadow-sky-600/40">
            <span id="submit-text"></span>
            <i data-lucide="chevron-right" id="submit-icon" class="w-5 h-5 sm:w-6 sm:h-6"></i>
          </button>
        </div>

      </form>
    </div>
  </div>

  <!-- JAVASCRIPT LOGIC -->
  <script>
    // Khởi tạo Icon
    lucide.createIcons();

    // Dữ liệu Đa Ngôn Ngữ (Translations)
    const translations = {

        card1Title: 'Thông tin Đại biểu',

        notAttending: 'Không thể tham dự',
        card2Title: 'Thông tin Di chuyển',
        arrival: 'Thời gian chuyến bay ĐẾN (Đà Nẵng)',

        card4Title: 'Tiệc & Ẩm thực',
        dinnerTitle: 'Tiệc Tối Chào Mừng (Welcome Dinner)',
        dinnerTime: 'Thời gian: 18:00 (6 PM) - Ngày 19/06/2026',
        join: 'Tham dự',
        notJoin: 'Không',
        vegQ: 'Yêu cầu đặc biệt về ẩm thực (Ăn chay)?',
        vegYes: 'Có ăn chay',
        vegNo: 'Không / Bình thường',
        submitBtn: 'Gửi Thông Tin Đăng Ký',
        editBtn: 'Sửa thông tin đã gửi',
        doneBtn: 'Hoàn tất',
        submitting: 'Đang xử lý...'
      },
      en: {
        successTitle: 'Confirmation Successful!',
        successMsg: 'Thank you for your response. The Organizing Committee has recorded your information and will contact you shortly.',
        successNote: 'See you in the beautiful coastal city of Da Nang!',
        heroTag: 'The 14th VART Conference',
        heroTitle: 'VART / Confirmation',
        heroLoc: 'Da Nang, Vietnam',
        heroDate: 'June 19 - 20, 2026',
        introText: 'To help us prepare for your arrival and ensure the best experience, please complete the following survey:',
        card1Title: 'Delegate Information',
        fullName: 'Full Name *',
        phone: 'Phone Number *',
        workplace: 'Workplace (Hospital/Clinic) *',
        placeholderName: 'John Doe',
        placeholderWork: 'Ex: General Hospital',
        attendance: 'Conference Attendance *',
        attending: 'Attending',
        notAttending: 'Not Attending',
        card2Title: 'Transportation',
        arrival: 'Arrival Flight Time (to Da Nang)',
        departure: 'Departure Flight Time (from Da Nang)',
        transferQ: 'Do you need airport transfer?',
        needTransfer: 'Yes, I need transfer',
        noTransfer: 'No, self-sufficient',
        card3Title: 'Accommodation',
        hotelNote1: 'The Organizing Committee provides hotel accommodation at:',
        hotelNote2: 'Royal Lotus Hotel Da Nang',
        hotelNote3: '(120A Nguyen Van Thoai, Bac My Phu, Ngu Hanh Son).',
        useHotelQ: 'Use hotel arranged by the Committee?',
        useHotel: 'Yes, use hotel',
        noHotel: 'No (Self-sufficient)',
        stayDuration: 'Stay Duration',
        day1: '1 Day (June 19)',
        day2: '2 Days (June 19 - 20)',
        roomType: 'Room Type Request',
        single: 'Single Room',
        double: 'Double/Twin Room',
        card4Title: 'Dining & Welcome Dinner',
        dinnerTitle: 'Welcome Dinner',
        dinnerTime: 'Time: 18:00 (6 PM) - June 19, 2026',
        join: 'Join',
        notJoin: 'Do not join',
        vegQ: 'Special dietary requirements (Vegetarian)?',
        vegYes: 'Yes, vegetarian',
        vegNo: 'No / Normal',
        submitBtn: 'Submit Registration',
        editBtn: 'Edit submitted info',
        doneBtn: 'Done',
        submitting: 'Submitting...'
      }
    };

    let currentLanguage = 'vi';

    // 1. Chuyển đổi ngôn ngữ
    function selectLanguage(lang) {
      currentLanguage = lang;
      const t = translations[lang];

      // Cập nhật text content
      const elementsToTranslate = [
        'successTitle', 'successMsg', 'successNote', 'heroTag', 'heroTitle', 'heroLoc', 'heroDate', 'introText',
        'card1Title', 'fullName', 'phone', 'workplace', 'attendance', 'attending', 'notAttending',
        'card2Title', 'arrival', 'departure', 'transferQ', 'needTransfer', 'noTransfer', 'card3Title',
        'hotelNote1', 'hotelNote2', 'hotelNote3', 'useHotelQ', 'useHotel', 'noHotel', 'stayDuration',
        'day1', 'day2', 'roomType', 'single', 'double', 'card4Title', 'dinnerTitle', 'dinnerTime',
        'join', 'notJoin', 'vegQ', 'vegYes', 'vegNo', 'editBtn', 'doneBtn'
      ];

      elementsToTranslate.forEach(id => {
        const el = document.getElementById('t-' + id);
        if (el) el.textContent = t[id];
      });

      // Cập nhật placeholders & btn
      document.getElementById('input-fullName').placeholder = t.placeholderName;
      document.getElementById('input-workplace').placeholder = t.placeholderWork;
      document.getElementById('submit-text').textContent = t.submitBtn;

      // Chuyển màn hình
      document.getElementById('language-screen').classList.add('hidden');
      document.getElementById('main-screen').classList.remove('hidden');
    }

    // 2. Logic Hiển thị các khối theo điều kiện
    const isAttendingRadios = document.querySelectorAll('input[name="isAttending"]');
    const conditionalSections = document.getElementById('conditional-sections');
    
    isAttendingRadios.forEach(radio => {
      radio.addEventListener('change', (e) => {
        if (e.target.value === 'yes') {
          conditionalSections.classList.remove('hidden');
          conditionalSections.classList.add('animate-slide-up');
        } else {
          conditionalSections.classList.add('hidden');
          conditionalSections.classList.remove('animate-slide-up');
        }
      });
    });

    const useHotelRadios = document.querySelectorAll('input[name="useHotel"]');
    const hotelDetails = document.getElementById('hotel-details');

    useHotelRadios.forEach(radio => {
      radio.addEventListener('change', (e) => {
        if (e.target.value === 'yes') {
          hotelDetails.classList.remove('hidden');
          hotelDetails.classList.add('animate-fade-in');
        } else {
          hotelDetails.classList.add('hidden');
          hotelDetails.classList.remove('animate-fade-in');
        }
      });
    });

    // 3. Nút sửa Form
    function editForm() {
      document.getElementById('success-screen').classList.add('hidden');
      document.getElementById('main-screen').classList.remove('hidden');
    }

    // 4. Xử lý Gửi Form
    const form = document.getElementById('registrationForm');
    const submitBtn = document.getElementById('submit-btn');
    const submitText = document.getElementById('submit-text');
    const submitIcon = document.getElementById('submit-icon');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      // Hiển thị trạng thái Loading
      submitBtn.disabled = true;
      submitBtn.classList.add('opacity-70', 'cursor-not-allowed');
      submitBtn.classList.remove('hover:scale-[1.02]', 'active:scale-95');
      submitText.textContent = translations[currentLanguage].submitting;
      submitIcon.classList.add('hidden');

      // Gom dữ liệu từ Form
      const formData = new FormData(form);
      const params = new URLSearchParams(formData).toString();
      
      // BƯỚC 1: ĐƯỜNG LINK APPS SCRIPT
      const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwyqkyxqG_DMZM8KtRY7_5IWKw3g5PZP0vTbCHV6aTKGPTkIJalx1TnPaVl5t93GzKK/exec';

      try {
        await fetch(SCRIPT_URL, {
          method: 'POST',
          mode: 'no-cors',
          headers: {
            'Content-Type': 'application/x-www-form-urlencoded',
          },
          body: params
        });
        
        // Thành công: Đổi màn hình
        document.getElementById('main-screen').classList.add('hidden');
        document.getElementById('success-screen').classList.remove('hidden');

      } catch (error) {
        console.error('Lỗi POST, thử GET:', error);
        try {
          const getUrl = `${SCRIPT_URL}?${params}`;
          await fetch(getUrl, { mode: 'no-cors' });
          
          document.getElementById('main-screen').classList.add('hidden');
          document.getElementById('success-screen').classList.remove('hidden');
        } catch (fallbackError) {
          alert(currentLanguage === 'vi' ? 'Lỗi mạng! Vui lòng kiểm tra lại kết nối.' : 'Network error! Please check your connection.');
        }
      } finally {
        // Trả lại trạng thái nút
        submitBtn.disabled = false;
        submitBtn.classList.remove('opacity-70', 'cursor-not-allowed');
        submitBtn.classList.add('hover:scale-[1.02]', 'active:scale-95');
        submitText.textContent = translations[currentLanguage].submitBtn;
        submitIcon.classList.remove('hidden');
      }
    });

  </script>
</body>
