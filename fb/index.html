<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedExam Analytics</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0",
            "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
            "lucide-react": "https://esm.sh/lucide-react@0.344.0?deps=react@18.2.0",
            "firebase/app": "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js",
            "firebase/auth": "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js",
            "firebase/firestore": "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js"
        }
    }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0f172a; color: #e2e8f0; margin: 0; padding: 0; }
        .glass-panel { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .glass-input { background: rgba(0, 0, 0, 0.3); border: 1px solid rgba(255, 255, 255, 0.05); }
        .animate-in { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #475569; border-radius: 10px; }
    </style>
</head>
<body class="antialiased custom-scrollbar">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useMemo } from 'react';
        import { createRoot } from 'react-dom/client';
        import { initializeApp } from 'firebase/app';
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut, signInWithCustomToken, signInAnonymously } from 'firebase/auth';
        import { getFirestore, collection, doc, updateDoc, deleteDoc, onSnapshot, query, collectionGroup, orderBy, limit } from 'firebase/firestore';
        import { 
            ShieldCheck, LogOut, Search, Trash2, CheckCircle2, AlertCircle, 
            Trophy, MessageSquare, Flag, Star, Check, ExternalLink, Loader2, BarChart2, UserX, Sigma
        } from 'lucide-react';

        // --- CẤU HÌNH FIREBASE ---
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {
            apiKey: "AIzaSyDqdo_DJIWa5iqxiCgBq-0iGX7f9sr6soo",
            authDomain: "rt-examination.firebaseapp.com",
            projectId: "rt-examination",
            storageBucket: "rt-examination.firebasestorage.app",
            messagingSenderId: "920482699854",
            appId: "1:920482699854:web:44f9b0d735bdc001c6c11f"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'med-exam-pro-html';
        
        // Danh sách email admin được phép truy cập
        const ADMIN_EMAILS = ["thanhtrong.yds@gmail.com", "vnrad.tech@gmail.com", "test@gmail.com"];

        // --- UI COMPONENTS ---
        
        const Toast = ({ message, type, onClose }) => {
            useEffect(() => { const timer = setTimeout(onClose, 3000); return () => clearTimeout(timer); }, [onClose]);
            const styles = { success: "bg-emerald-500/20 border-emerald-500/40 text-emerald-400", error: "bg-red-500/20 border-red-500/40 text-red-400", info: "bg-blue-500/20 border-blue-500/40 text-blue-400" };
            return (
                <div className={`fixed bottom-6 right-6 px-6 py-4 rounded-2xl border ${styles[type] || styles.info} shadow-2xl flex items-center gap-3 animate-in z-[100] backdrop-blur-xl max-w-sm`}>
                    {type === 'error' ? <AlertCircle size={20}/> : <CheckCircle2 size={20}/>}<span className="font-bold text-sm leading-tight">{message}</span>
                </div>
            );
        };

        const Dashboard = ({ user }) => {
            const [tab, setTab] = useState('score_rank');
            const [scores, setScores] = useState([]);
            const [reviews, setReviews] = useState([]);
            const [reports, setReports] = useState([]);
            const [search, setSearch] = useState('');
            const [toast, setToast] = useState(null);
            const [indexError, setIndexError] = useState(false);
            
            const notify = (message, type = 'info') => setToast({ message, type });

            useEffect(() => {
                // --- XỬ LÝ BẢNG XẾP HẠNG (AGGREGATED) ---
                // Chiến lược: Lấy hết dữ liệu về, gom nhóm theo User, cộng dồn điểm
                const qHistory = query(collectionGroup(db, 'history'));
                
                const unsubHistory = onSnapshot(qHistory, (snapshot) => {
                    const rawData = snapshot.docs.map(d => ({...d.data(), id: d.id}));
                    
                    // 1. Tạo Map để gom nhóm user
                    const userMap = {};

                    rawData.forEach(item => {
                        // Bỏ qua nếu là ẩn danh hoàn toàn (không tên, không email)
                        const hasEmail = item.email && item.email.trim() !== "";
                        const hasName = item.displayName && item.displayName.trim() !== "";
                        if (!hasEmail && !hasName) return;

                        // Key định danh duy nhất: Ưu tiên userId, sau đó đến email
                        const key = item.userId || item.email;
                        if (!key) return;

                        if (!userMap[key]) {
                            userMap[key] = {
                                userId: item.userId,
                                email: item.email,
                                displayName: item.displayName,
                                totalScore: 0,
                                examCount: 0,
                                latestDate: item.date // Khởi tạo ngày mới nhất
                            };
                        }

                        // Cộng dồn điểm
                        const currentScore = parseFloat(String(item.score || 0));
                        userMap[key].totalScore += currentScore;
                        userMap[key].examCount += 1;

                        // Cập nhật thông tin mới nhất (tên, ngày thi)
                        // Nếu bản ghi này mới hơn bản ghi đã lưu, cập nhật ngày
                        const itemDate = item.date?.seconds || 0;
                        const savedDate = userMap[key].latestDate?.seconds || 0;
                        
                        if (itemDate > savedDate) {
                            userMap[key].latestDate = item.date;
                            // Cập nhật tên hiển thị nếu bản ghi mới nhất có tên (tránh trường hợp lúc đầu có tên, lúc sau null)
                            if (item.displayName) userMap[key].displayName = item.displayName;
                        } else {
                             // Fallback: nếu chưa có tên, thử lấy tên từ bản ghi cũ hơn
                             if (!userMap[key].displayName && item.displayName) userMap[key].displayName = item.displayName;
                        }
                    });

                    // 2. Chuyển Map thành Array
                    let aggregatedData = Object.values(userMap);

                    // 3. Sắp xếp theo Tổng điểm giảm dần
                    aggregatedData.sort((a, b) => b.totalScore - a.totalScore);
                    
                    setScores(aggregatedData);
                    setIndexError(false);
                }, (error) => {
                    console.error("Leaderboard Error:", error);
                    if (error.code === 'failed-precondition') {
                        setIndexError(true);
                    } else {
                        notify("Lỗi tải bảng xếp hạng: " + error.message, "error");
                    }
                });

                // Lắng nghe Đánh giá (Reviews)
                const qReviews = collection(db, 'artifacts', appId, 'public', 'data', 'reviews');
                const unsubReviews = onSnapshot(qReviews, (snapshot) => {
                    const data = snapshot.docs.map(d => ({...d.data(), id: d.id}));
                    data.sort((a, b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0));
                    setReviews(data);
                });

                // Lắng nghe Báo cáo lỗi (Reports)
                const qReports = collection(db, 'artifacts', appId, 'public', 'data', 'reports');
                const unsubReports = onSnapshot(qReports, (snapshot) => {
                    const data = snapshot.docs.map(d => ({...d.data(), id: d.id}));
                    data.sort((a, b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0));
                    setReports(data);
                });

                return () => { unsubHistory(); unsubReviews(); unsubReports(); };
            }, []);

            // --- ACTIONS ---
            const deleteItem = async (collectionName, id) => {
                if(confirm("Bạn có chắc chắn muốn xóa mục này vĩnh viễn?")) {
                    try {
                        await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', collectionName, id));
                        notify("Đã xóa thành công", "success");
                    } catch (e) { notify("Lỗi xóa: " + e.message, "error"); }
                }
            };

            const resolveReport = async (id) => {
                try {
                    await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'reports', id), { status: 'resolved' });
                    notify("Đã đánh dấu xử lý xong", "success");
                } catch (e) { notify("Lỗi cập nhật: " + e.message, "error"); }
            };

            // --- HELPERS ---
            const formatDateTime = (ts) => ts?.toDate ? ts.toDate().toLocaleString('vi-VN') : '---';
            const getReasonText = (reason) => { const map = { 'wrong_answer': 'Đáp án sai', 'typo': 'Lỗi chính tả', 'confusing': 'Khó hiểu', 'other': 'Khác' }; return map[reason] || reason; };
            
            const getUserDisplayName = (user) => {
                if (user.displayName && user.displayName.trim() !== "") return user.displayName;
                if (user.email) return user.email; 
                return `User #${user.userId?.slice(0, 5)}`; 
            };

            return (
                <div className="flex min-h-screen">
                    {/* SIDEBAR */}
                    <aside className="w-72 bg-slate-900/50 border-r border-slate-700/50 flex flex-col fixed h-full z-40 backdrop-blur-xl">
                        <div className="p-8 border-b border-slate-700/50 flex items-center gap-4 text-cyan-400 font-black text-2xl tracking-tighter">
                            <BarChart2 size={32}/>
                            <div className="leading-none text-white">ANALYTICS<br/><small className="text-slate-500 text-[10px] tracking-[0.3em] uppercase">Portal</small></div>
                        </div>
                        <nav className="flex-1 p-6 space-y-4 mt-4">
                            {[
                                { id: 'score_rank', label: 'Bảng xếp hạng', icon: Trophy },
                                { id: 'reviews', label: 'Đánh giá & Góp ý', icon: MessageSquare, count: reviews.length },
                                { id: 'reports', label: 'Báo cáo lỗi', icon: Flag, count: reports.filter(r => r.status === 'pending').length }
                            ].map(item => (
                                <button key={item.id} onClick={()=>setTab(item.id)} className={`w-full flex items-center justify-between px-6 py-5 rounded-2xl transition-all ${tab === item.id ? 'bg-cyan-600 text-white shadow-lg shadow-cyan-500/20' : 'text-slate-400 hover:bg-white/5'}`}>
                                    <div className="flex items-center gap-4"><item.icon size={20}/><span className="font-bold text-sm">{item.label}</span></div>
                                    {item.count > 0 && <span className="bg-red-500 text-[10px] font-black px-2 py-1 rounded-full">{item.count}</span>}
                                </button>
                            ))}
                        </nav>
                        <div className="p-8 border-t border-slate-700/50">
                            <button onClick={()=>signOut(auth)} className="w-full flex items-center justify-center gap-3 px-6 py-4 text-slate-500 hover:text-red-400 transition-all font-bold text-xs uppercase tracking-widest"><LogOut size={18}/> Đăng xuất</button>
                        </div>
                    </aside>

                    {/* MAIN CONTENT */}
                    <main className="flex-1 ml-72 p-12">
                        <div className="flex justify-between items-end mb-12">
                            <div>
                                <h1 className="text-4xl font-black text-white tracking-tighter capitalize">{tab === 'score_rank' ? 'Bảng Xếp Hạng Global' : tab === 'reviews' ? 'Phản Hồi Từ Học Viên' : 'Báo Cáo Lỗi Đề Thi'}</h1>
                                {tab === 'score_rank' && <p className="text-slate-400 text-sm mt-2 flex items-center gap-2"><Sigma size={14}/> Xếp hạng theo tổng điểm tích lũy (Đã ẩn danh/spam)</p>}
                            </div>
                            <div className="relative group">
                                <Search className="absolute left-4 top-3.5 text-slate-500" size={20}/>
                                <input className="bg-slate-800 border border-slate-700 rounded-2xl pl-12 pr-6 py-3 w-80 outline-none focus:border-cyan-500 font-bold text-white transition-all" placeholder="Tìm kiếm dữ liệu..." value={search} onChange={e=>setSearch(e.target.value)}/>
                            </div>
                        </div>

                        <div className="animate-in">
                            {/* TAB: BẢNG XẾP HẠNG */}
                            {tab === 'score_rank' && (
                                <div className="space-y-6">
                                    {indexError && (
                                        <div className="bg-amber-500/10 border border-amber-500/20 p-6 rounded-2xl flex items-center gap-4 text-amber-200">
                                            <AlertCircle size={32} className="shrink-0"/>
                                            <div>
                                                <h3 className="font-bold text-lg">Yêu cầu cấu hình Index</h3>
                                                <p className="text-sm opacity-80">Vui lòng tạo Composite Index trong Firebase Console cho collection "history" với các trường: score (Desc), date (Desc).</p>
                                                <a href="https://console.firebase.google.com/" target="_blank" className="text-amber-400 hover:text-white underline text-sm mt-1 inline-block">Mở Firebase Console &rarr;</a>
                                            </div>
                                        </div>
                                    )}

                                    <div className="glass-panel rounded-[2rem] overflow-hidden">
                                        <table className="w-full text-left text-sm border-collapse text-slate-300">
                                            <thead className="bg-slate-800/50 text-slate-400 uppercase text-[10px] font-black tracking-widest">
                                                <tr>
                                                    <th className="p-6">Hạng</th>
                                                    <th className="p-6">Học viên</th>
                                                    <th className="p-6 text-center">Số bài thi</th>
                                                    <th className="p-6 text-center">Tổng điểm tích lũy</th>
                                                    <th className="p-6 text-right">Hoạt động gần nhất</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-slate-700/50">
                                                {scores.filter(s => (s.displayName||'').toLowerCase().includes(search.toLowerCase())).slice(0, 50).map((s, i) => {
                                                    // Tính toán hiển thị màu điểm số
                                                    let scoreColor = 'text-white';
                                                    if (s.totalScore >= 100) scoreColor = 'text-purple-400';
                                                    else if (s.totalScore >= 50) scoreColor = 'text-emerald-400';
                                                    else if (s.totalScore >= 20) scoreColor = 'text-blue-400';

                                                    const displayInfo = getUserDisplayName(s);

                                                    return (
                                                        <tr key={s.userId || s.email} className="hover:bg-white/5 transition-colors">
                                                            <td className="p-6">{i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : <span className="font-mono text-slate-500">#{i+1}</span>}</td>
                                                            <td className="p-6">
                                                                <span className={`font-bold block ${!s.displayName ? 'text-slate-300' : 'text-white'}`}>
                                                                    {displayInfo}
                                                                </span>
                                                                {s.email && <span className="text-[10px] font-mono text-slate-500 block">{s.email}</span>}
                                                            </td>
                                                            <td className="p-6 text-center">
                                                                <span className="bg-slate-700 px-3 py-1 rounded-full text-xs font-bold text-slate-300">{s.examCount} đề</span>
                                                            </td>
                                                            <td className="p-6 text-center"><span className={`font-black text-2xl ${scoreColor}`}>{s.totalScore.toFixed(1).replace(/\.0$/, '')}</span></td>
                                                            <td className="p-6 text-right font-mono text-xs">{formatDateTime(s.latestDate)}</td>
                                                        </tr>
                                                    );
                                                })}
                                                {scores.length === 0 && <tr><td colSpan="5" className="p-20 text-center italic text-slate-600">Chưa có dữ liệu thi hợp lệ</td></tr>}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            )}

                            {/* TAB: PHẢN HỒI (REVIEWS) */}
                            {tab === 'reviews' && (
                                <div className="glass-panel rounded-[2rem] overflow-hidden">
                                    <table className="w-full text-left text-sm border-collapse text-slate-300">
                                        <thead className="bg-slate-800/50 text-slate-400 uppercase text-[10px] font-black tracking-widest"><tr><th className="p-6">Thời gian</th><th className="p-6">Học viên</th><th className="p-6">Nội dung</th><th className="p-6 text-center">Đánh giá</th><th className="p-6 text-right">Xóa</th></tr></thead>
                                        <tbody className="divide-y divide-slate-700/50">
                                            {reviews.filter(r => (r.examTitle||'').toLowerCase().includes(search.toLowerCase())).map(r => (
                                                <tr key={r.id} className="hover:bg-white/5 transition-colors">
                                                    <td className="p-6 text-xs text-slate-500 font-bold whitespace-nowrap">{formatDateTime(r.createdAt)}</td>
                                                    <td className="p-6"><span className="block font-bold text-white">{getUserDisplayName(r)}</span></td>
                                                    <td className="p-6"><div className="font-bold text-xs text-cyan-500 mb-1">{r.examTitle}</div>{r.feedback ? <div className="italic text-slate-400">"{r.feedback}"</div> : <span className="text-slate-600 text-xs">--</span>}</td>
                                                    <td className="p-6 text-center"><div className="flex justify-center gap-0.5">{[1,2,3,4,5].map(s=><Star key={s} size={14} className={s<=r.rating?'text-yellow-400 fill-yellow-400':'text-slate-700'}/>)}</div></td>
                                                    <td className="p-6 text-right"><button onClick={()=>deleteItem('reviews', r.id)} className="p-2 bg-slate-800 hover:bg-red-500/20 text-slate-500 hover:text-red-500 rounded-xl transition-all"><Trash2 size={16}/></button></td>
                                                </tr>
                                            ))}
                                            {reviews.length === 0 && <tr><td colSpan="5" className="p-20 text-center italic text-slate-600">Chưa có phản hồi nào</td></tr>}
                                        </tbody>
                                    </table>
                                </div>
                            )}

                            {/* TAB: BÁO CÁO LỖI (REPORTS) */}
                            {tab === 'reports' && (
                                <div className="glass-panel rounded-[2rem] overflow-hidden">
                                    <table className="w-full text-left text-sm border-collapse text-slate-300">
                                        <thead className="bg-slate-800/50 text-slate-400 uppercase text-[10px] font-black tracking-widest"><tr><th className="p-6">Thời gian</th><th className="p-6">Người báo</th><th className="p-6">Chi tiết lỗi</th><th className="p-6 text-center">Trạng thái</th><th className="p-6 text-right">Xử lý</th></tr></thead>
                                        <tbody className="divide-y divide-slate-700/50">
                                            {reports.filter(r => (r.questionText||'').toLowerCase().includes(search.toLowerCase())).map(r => (
                                                <tr key={r.id} className={`hover:bg-white/5 transition-colors ${r.status==='resolved'?'opacity-50':''}`}>
                                                    <td className="p-6 text-xs text-slate-500 font-bold whitespace-nowrap align-top">{formatDateTime(r.createdAt)}</td>
                                                    <td className="p-6 align-top"><span className="block font-bold text-white">{getUserDisplayName(r)}</span></td>
                                                    <td className="p-6 max-w-md align-top">
                                                        <span className="bg-red-500/10 text-red-400 text-[10px] font-bold px-2 py-0.5 rounded border border-red-500/20 mr-2">{getReasonText(r.reason)}</span>
                                                        <div className="mt-2 text-slate-200 font-medium">"{r.questionText}"</div>
                                                        {r.detail && <div className="mt-1 text-slate-400 text-xs italic">Note: {r.detail}</div>}
                                                        <div className="mt-2 text-[10px] text-slate-600 font-mono">ID Đề: {r.examId} | Câu: {r.questionIndex + 1}</div>
                                                    </td>
                                                    <td className="p-6 text-center align-top">{r.status==='resolved' ? <span className="text-emerald-500 font-bold text-xs flex items-center justify-center gap-1"><CheckCircle2 size={14}/> Đã xong</span> : <span className="text-yellow-500 font-bold text-xs flex items-center justify-center gap-1 animate-pulse"><AlertCircle size={14}/> Chờ xử lý</span>}</td>
                                                    <td className="p-6 text-right align-top">
                                                        <div className="flex justify-end gap-2">
                                                            {r.status === 'pending' && <button onClick={()=>resolveReport(r.id)} className="p-2 bg-emerald-600 hover:bg-emerald-500 text-white rounded-xl shadow-lg" title="Đánh dấu đã xong"><Check size={16}/></button>}
                                                            <button onClick={()=>deleteItem('reports', r.id)} className="p-2 bg-slate-800 hover:bg-red-500/20 text-slate-400 hover:text-red-500 rounded-xl" title="Xóa"><Trash2 size={16}/></button>
                                                        </div>
                                                    </td>
                                                </tr>
                                            ))}
                                            {reports.length === 0 && <tr><td colSpan="5" className="p-20 text-center italic text-slate-600">Chưa có báo cáo nào</td></tr>}
                                        </tbody>
                                    </table>
                                </div>
                            )}
                        </div>
                    </main>

                    {toast && <Toast {...toast} onClose={()=>setToast(null)}/>}
                </div>
            );
        };

        const App = () => {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [err, setErr] = useState('');

            useEffect(() => {
                // Initialize Auth Logic
                const initAuth = async () => {
                   if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        try {
                            await signInWithCustomToken(auth, __initial_auth_token);
                        } catch (e) {
                            console.error("Token login failed", e);
                        }
                   }
                };
                initAuth();

                // Listen to Auth State
                return onAuthStateChanged(auth, u => {
                    if (u) {
                        if (ADMIN_EMAILS.includes(u.email)) {
                            setUser(u);
                            setErr('');
                        } else {
                            // Tùy chọn: Nếu muốn cho phép mọi người xem nhưng giới hạn quyền, có thể bỏ check ở đây
                            // Ở đây giữ logic cũ: chỉ admin mới được vào
                            setErr("Tài khoản không có quyền truy cập Dashboard.");
                            signOut(auth);
                            setUser(null);
                        }
                    } else {
                        setUser(null);
                    }
                    setLoading(false);
                });
            }, []);

            const handleLogin = async (e) => {
                e.preventDefault();
                const { email, password } = e.target.elements;
                setLoading(true); setErr('');
                try { 
                    await signInWithEmailAndPassword(auth, email.value, password.value); 
                } catch (e) { 
                    setErr("Thông tin đăng nhập không chính xác"); 
                } finally { 
                    setLoading(false); 
                }
            };

            if (loading) return <div className="min-h-screen bg-[#0f172a] flex items-center justify-center"><Loader2 className="animate-spin text-cyan-500" size={40}/></div>;

            if (!user) return (
                <div className="min-h-screen flex items-center justify-center p-4 bg-[#020617] relative">
                    <div className="absolute inset-0 bg-[radial-gradient(circle_at_50%_50%,rgba(14,165,233,0.1),transparent_50%)]"></div>
                    <div className="w-full max-w-md glass-panel p-10 rounded-[2.5rem] shadow-2xl animate-in relative z-10">
                        <div className="text-center mb-8">
                            <BarChart2 size={48} className="text-cyan-500 mx-auto mb-4"/>
                            <h1 className="text-3xl font-black text-white">Analytics Portal</h1>
                            <p className="text-slate-400 text-xs mt-2 font-bold uppercase tracking-widest">Dành riêng cho Quản trị viên</p>
                        </div>
                        {err && <div className="mb-6 p-4 bg-red-500/10 border border-red-500/20 text-red-400 text-xs rounded-xl font-bold flex items-center gap-2"><AlertCircle size={16}/> {err}</div>}
                        <form onSubmit={handleLogin} className="space-y-6">
                            <input name="email" type="email" required className="w-full glass-input rounded-2xl p-4 outline-none focus:border-cyan-500 font-bold text-white transition-all" placeholder="Email"/>
                            <input name="password" type="password" required className="w-full glass-input rounded-2xl p-4 outline-none focus:border-cyan-500 font-bold text-white transition-all" placeholder="Mật khẩu"/>
                            <button className="w-full bg-cyan-600 hover:bg-cyan-500 text-white font-black py-4 rounded-2xl transition-all shadow-lg shadow-cyan-500/20 uppercase text-xs tracking-widest">Đăng nhập</button>
                        </form>
                    </div>
                </div>
            );

            return <Dashboard user={user} />;
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
