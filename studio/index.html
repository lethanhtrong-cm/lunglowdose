        const processImageForSave = async (imgUrl) => {
            return new Promise((resolve, reject) => {
                const img = new Image(); img.src = imgUrl; img.crossOrigin = "Anonymous";
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    let width = img.width, height = img.height, MAX = 800; 
                    if (width > height) { if (width > MAX) { height *= MAX/width; width = MAX; } } 
                    else { if (height > MAX) { width *= MAX/height; height = MAX; } }
                    canvas.width = width; canvas.height = height;
                    canvas.getContext('2d').drawImage(img, 0, 0, width, height);
                    resolve(canvas.toDataURL('image/jpeg', 0.7)); 
                };
                img.onerror = (e) => resolve(null); 
            });
        };

            const handleAuth = async (e) => {
                e.preventDefault(); setError(''); setLoading(true);
                try {
                    if (isRegister) await createUserWithEmailAndPassword(auth, email, password);
                    else await signInWithEmailAndPassword(auth, email, password);

        // NEW: Draw Modal
        const DrawModal = ({ image, onClose, onSave }) => {
            const canvasRef = useRef(null);
            const [isDrawing, setIsDrawing] = useState(false);
            const [startPos, setStartPos] = useState({ x: 0, y: 0 });
            const [color, setColor] = useState('#ef4444'); // Default Red
            const [imgObj, setImgObj] = useState(null);
            const [arrows, setArrows] = useState([]); // Store array of arrows {startX, startY, endX, endY, color}

            useEffect(() => {
                const img = new Image();
                img.src = image;
                img.onload = () => {
                    setImgObj(img);
                    const canvas = canvasRef.current;
                    canvas.width = img.width;
                    canvas.height = img.height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0);
                };
            }, [image]);

            const drawArrow = (ctx, fromx, fromy, tox, toy, color) => {
                const headlen = 20; // length of head in pixels
                const dx = tox - fromx;
                const dy = toy - fromy;
                const angle = Math.atan2(dy, dx);
                ctx.strokeStyle = color;
                ctx.lineWidth = 5;
                ctx.lineCap = 'round';
                
                // Draw line
                ctx.beginPath();
                ctx.moveTo(fromx, fromy);
                ctx.lineTo(tox, toy);
                ctx.stroke();

                // Draw head
                ctx.beginPath();
                ctx.fillStyle = color;
                ctx.moveTo(tox, toy);
                ctx.lineTo(tox - headlen * Math.cos(angle - Math.PI / 6), toy - headlen * Math.sin(angle - Math.PI / 6));
                ctx.lineTo(tox - headlen * Math.cos(angle + Math.PI / 6), toy - headlen * Math.sin(angle + Math.PI / 6));
                ctx.fill();
            };

            const redraw = () => {
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                if (imgObj) ctx.drawImage(imgObj, 0, 0);
                arrows.forEach(a => drawArrow(ctx, a.sx, a.sy, a.ex, a.ey, a.c));
            };

            const getPos = (e) => {
                const rect = canvasRef.current.getBoundingClientRect();
                const scaleX = canvasRef.current.width / rect.width;
                const scaleY = canvasRef.current.height / rect.height;
                return {
                    x: (e.clientX - rect.left) * scaleX,
                    y: (e.clientY - rect.top) * scaleY
                };
            };

            const handleMouseDown = (e) => {
                setIsDrawing(true);
                setStartPos(getPos(e));
            };

            const handleMouseMove = (e) => {
                if (!isDrawing) return;
                redraw();
                const currPos = getPos(e);
                const ctx = canvasRef.current.getContext('2d');
                drawArrow(ctx, startPos.x, startPos.y, currPos.x, currPos.y, color);
            };

            const handleMouseUp = (e) => {
                if (!isDrawing) return;
                setIsDrawing(false);
                const endPos = getPos(e);
                setArrows([...arrows, { sx: startPos.x, sy: startPos.y, ex: endPos.x, ey: endPos.y, c: color }]);
            };
            
            const handleUndo = () => {
                setArrows(prev => {
                    const newArr = [...prev];
                    newArr.pop();
                    return newArr;
                });
            };

            useEffect(() => { if(imgObj) redraw(); }, [arrows, imgObj]);

            const handleSave = () => {
                onSave(canvasRef.current.toDataURL());
            };

            return (
                <div className="fixed inset-0 z-[100] flex items-center justify-center bg-slate-900/90 backdrop-blur-sm p-4 animate-fade-in">

                                <Icons.PenTool size={18} className="text-sky-600"/> Vẽ Mũi Tên
                            </h3>
                            <div className="flex gap-2">

                                    <button key={c} onClick={() => setColor(c)} className={`w-6 h-6 rounded-full border-2 ${color === c ? 'border-slate-800 scale-110' : 'border-transparent'}`} style={{backgroundColor: c}}></button>
                                ))}
                                <div className="w-px h-6 bg-slate-300 mx-2"></div>
                                <button onClick={handleUndo} className="p-1 hover:bg-slate-200 rounded text-slate-600" title="Undo"><Icons.Trash2 size={18}/></button>
                            </div>
                            <button onClick={onClose} className="text-slate-400 hover:text-slate-600 transition-colors"><Icons.X size={24}/></button>
                        </div>
                        <div className="flex-grow relative bg-slate-900 overflow-hidden flex items-center justify-center">
                            <div className="relative max-w-full max-h-full overflow-auto">
                                <canvas 
                                    ref={canvasRef} 
                                    onMouseDown={handleMouseDown}
                                    onMouseMove={handleMouseMove}
                                    onMouseUp={handleMouseUp}
                                    className="max-w-full max-h-full block shadow-lg"
                                />
                            </div>
                        </div>
                        <div className="p-4 border-t border-slate-100 bg-white flex justify-end gap-3">
                            <button onClick={onClose} className="px-5 py-2 rounded-lg text-slate-500 font-bold hover:bg-slate-50 transition-colors text-xs uppercase tracking-wider border border-slate-200">Hủy</button>
                            <button onClick={handleSave} className="px-6 py-2 rounded-lg bg-sky-500 hover:bg-sky-600 text-white font-bold transition-all text-xs uppercase tracking-wider flex items-center gap-2 shadow-lg shadow-sky-500/20"><Icons.Check size={16}/> Lưu</button>
                        </div>
                    </div>
                </div>
            );
        };


        const GridSelector = React.memo(({ onSelect, currentR, currentC }) => {
            const [hover, setHover] = useState({ r: 0, c: 0 });

                <div className="flex flex-col items-center">

                            const r = Math.floor(i / 4) + 1;

                                    onClick={() => onSelect(r, c)} 
                                    className={`w-3.5 h-3.5 rounded-sm cursor-pointer transition-all duration-150 ${isHover ? 'bg-sky-400 scale-110' : isSelected ? 'bg-sky-600' : 'bg-slate-600'}`}

        const ImageSlot = React.memo(({ imgData, index, isActive, onClick }) => {
            // Updated ImageSlot using background-image to fix object-fit stretching issues with html2canvas
            return (
                <div 
                    onClick={() => onClick(index)}

        const ImageGrid = React.memo(({ images, gridDims, activeImgIdx, onImageClick }) => (

        ));

        // --- MAIN APP ---
        const App = () => {
            const [user, setUser] = useState(null);
            const [showAuthModal, setShowAuthModal] = useState(false);

            const [gridDims, setGridDims] = useState({ r: 2, c: 2 });

            const [images, setImages] = useState(Array.from({length: 16}, (_, i) => ({ id: i, url: null, ...DEFAULT_IMAGE_SETTINGS })));

            const previewContainerRef = useRef(null);

            useEffect(() => { const unsub = onAuthStateChanged(auth, u => setUser(u)); return () => unsub(); }, []);
            useEffect(() => { localStorage.setItem('med_content', JSON.stringify(content)); }, [content]);
            useEffect(() => { localStorage.setItem('med_macros', JSON.stringify(macros)); }, [macros]);
            useEffect(() => { localStorage.setItem('med_modality', modality); }, [modality]);
            useEffect(() => { localStorage.setItem('med_layout', layoutMode); }, [layoutMode]);
            useEffect(() => { localStorage.setItem('med_theme', posterTheme); }, [posterTheme]);

            // Define dimensions for each layout mode
            const containerDims = useMemo(() => {
                if (layoutMode === 'social') return { w: 1080, h: 1350 }; // 4:5 Portrait
                return layoutMode === 'vertical' ? { w: 794, h: 1123 } : { w: 1200, h: 675 };
            }, [layoutMode]);

            useLayoutEffect(() => {
                const handleResize = () => {
                    if (previewContainerRef.current) {
                        const { width, height } = previewContainerRef.current.getBoundingClientRect();
                        const padding = 60; 
                        const availableW = width - padding;
                        const availableH = height - padding;
                        const scaleW = availableW / containerDims.w;
                        const scaleH = availableH / containerDims.h;
                        setPreviewScale(Math.min(scaleW, scaleH)); 
                    }
                };
                handleResize();
                window.addEventListener('resize', handleResize);
                return () => window.removeEventListener('resize', handleResize);
            }, [containerDims, layoutMode]);

            // Auto-clamp font size if overflow detected
            useLayoutEffect(() => {
                const containers = document.querySelectorAll('.text-container');
                let isOverflowing = false;
                
                for (const container of containers) {
                    const content = container.firstElementChild; // The <p> tag
                    if (content && content.offsetHeight > container.clientHeight) {
                        isOverflowing = true;
                        break;
                    }
                }

                if (isOverflowing && bodyFontSize > 9) {
                    // Reduce font size to fit
                    setBodyFontSize(prev => prev - 1);
                }
            }, [bodyFontSize, content, layoutMode, isCompact, gridDims, images]); 

            const handleGridSelect = useCallback((r, c) => {

            const onFileChange = (e) => handleImageUpload(e.target.files[0]);
            
            const handleDownload = async () => {

                const btn = document.getElementById('dl-btn');

                    const canvas = await window.html2canvas(clone, {

                    }); 
                    document.body.removeChild(container);
                    
                    const link = document.createElement('a');

                            </div>

                            {/* SIDEBAR BODY */}
                            <div className="flex-1 overflow-y-auto p-4 space-y-8 custom-scrollbar text-slate-400">
                                {/* BỐ CỤC SECTION */}
                                <div className="space-y-4">
                                    <h3 className="text-xs font-black text-sky-500 uppercase tracking-widest flex items-center gap-2 pb-2 border-b border-slate-800">
                                        <Icons.Layout size={14}/> 1. Chọn Bố Cục
                                    </h3>
                                    <div className="grid grid-cols-4 gap-2">
                                        {[{ id: 'vertical', icon: Icons.StickyNote, label: 'A4 Dọc' }, { id: 'poster', icon: Icons.Layout, label: 'Poster' }, { id: 'modern', icon: Icons.Type, label: 'Modern' }, { id: 'social', icon: Icons.Share, label: 'Social' }].map(m => (
                                            <button key={m.id} onClick={() => setLayoutMode(m.id)} className={`flex flex-col items-center justify-center p-2 rounded-xl border transition-all ${layoutMode === m.id ? 'bg-sky-600 border-sky-500 text-white shadow-lg shadow-sky-900/50' : 'bg-slate-800 border-slate-700 text-slate-400 hover:bg-slate-700 hover:border-slate-600'}`}>
                                                <m.icon size={18} className="mb-1.5"/><span className="text-[9px] font-bold uppercase">{m.label}</span>
                                            </button>
                                        ))}
                                    </div>
                                    <div className="flex items-center justify-between bg-slate-800/50 p-2.5 rounded-xl border border-slate-700">
                                        <div className="flex items-center gap-2">
                                             <button onClick={() => setPosterTheme(prev => prev === 'dark' ? 'light' : 'dark')} className={`px-2 py-1.5 rounded-lg transition-all flex items-center gap-2 text-[10px] font-bold uppercase ${posterTheme === 'light' ? 'bg-slate-200 text-slate-900' : 'bg-slate-700 text-white border border-slate-600'}`}><Icons.SunMoon size={14}/><span>{posterTheme} Mode</span></button>
                                        </div>
                                        <button onClick={() => setShowBrand(!showBrand)} className={`px-2 py-1.5 rounded-lg transition-all flex items-center gap-2 text-[10px] font-bold uppercase ${showBrand ? 'bg-emerald-600 text-white shadow-lg shadow-emerald-900/50' : 'bg-slate-700 text-slate-400 border border-slate-600'}`}><Icons.Toggle size={14} on={showBrand}/><span>Header</span></button>
                                    </div>
                                </div>

                                {/* HÌNH ẢNH SECTION */}
                                <div className="space-y-4">
                                    <h3 className="text-xs font-black text-sky-500 uppercase tracking-widest flex items-center gap-2 pb-2 border-b border-slate-800">
                                        <Icons.Image size={14}/> 2. Xử Lý Hình Ảnh
                                    </h3>
                                    <div className="bg-slate-800/50 p-4 rounded-xl border border-slate-700 flex gap-4">
                                        <div className="flex-1 border-r border-slate-700 pr-4 flex flex-col items-center justify-center">
                                            <span className="text-[10px] font-bold text-slate-300 uppercase mb-2 flex items-center gap-1"><Icons.Layout size={10}/> Chọn Lưới</span>
                                            <GridSelector onSelect={handleGridSelect} currentR={gridDims.r} currentC={gridDims.c} />
                                        </div>
                                        <div className="flex-1 flex flex-col items-center justify-center">
                                            <span className="text-[10px] font-bold text-slate-300 uppercase mb-2 flex items-center gap-1"><Icons.Upload size={10}/> File Ảnh</span>
                                            <label className="w-full h-full min-h-[70px] flex flex-col items-center justify-center border-2 border-dashed border-slate-600 rounded-xl hover:border-sky-500 hover:bg-slate-700/50 cursor-pointer transition-all group bg-slate-900/50">
                                                <Icons.Upload size={24} className="text-slate-500 group-hover:text-sky-400 mb-1 transition-colors"/>
                                                <input type="file" className="hidden" accept="image/*" onChange={onFileChange} />
                                            </label>
                                        </div>
                                    </div>
                                    <div className="bg-slate-800/80 p-4 rounded-xl space-y-4 border border-slate-700">
                                        <div className="flex justify-between items-center pb-2 border-b border-slate-700/50">
                                            <span className="text-xs font-black text-sky-400 uppercase flex items-center gap-2"><span className="w-2 h-2 rounded-full bg-sky-500"></span> Ảnh {activeImgIdx + 1}</span>
                                            <div className="flex gap-1.5">
                                                <button onClick={() => updateActiveImage({ objectFit: 'contain', scale: 1, x: 0, y: 0 })} className="p-1.5 bg-slate-700 hover:bg-sky-600 rounded-lg text-slate-300 hover:text-white transition-colors" title="Fit khung (Contain)"><Icons.ArrowsIn size={14}/></button>
                                                <button onClick={() => updateActiveImage({ objectFit: 'cover', scale: 1, x: 0, y: 0 })} className="p-1.5 bg-slate-700 hover:bg-sky-600 rounded-lg text-slate-300 hover:text-white transition-colors" title="Full khung (Cover)"><Icons.ArrowsOut size={14}/></button>
                                                <div className="w-px h-6 bg-slate-600 mx-1"></div>
                                                <button onClick={() => updateActiveImage({ invert: !images[activeImgIdx].invert })} className={`p-1.5 rounded-lg transition-colors ${images[activeImgIdx].invert ? 'bg-sky-600 text-white' : 'bg-slate-700 text-slate-400 hover:text-white'}`} title="Đảo màu"><Icons.Invert size={14}/></button>
                                                <button onClick={startDraw} className="p-1.5 bg-slate-700 hover:bg-sky-600 rounded-lg text-slate-300 hover:text-white transition-colors" title="Vẽ"><Icons.PenTool size={14}/></button>
                                                <button onClick={startCrop} className="p-1.5 bg-slate-700 hover:bg-sky-600 rounded-lg text-slate-300 hover:text-white transition-colors" title="Cắt"><Icons.Scissors size={14}/></button>
                                                <button onClick={() => updateActiveImage(DEFAULT_IMAGE_SETTINGS)} className="p-1.5 bg-slate-700 hover:bg-red-500 rounded-lg text-slate-300 hover:text-white transition-colors" title="Reset"><Icons.Trash2 size={14}/></button>
                                            </div>
                                        </div>
                                        <div className="space-y-3">
                                            {[ { icon: Icons.Move, min: 0.5, max: 3, step: 0.1, key: 'scale', label: 'Zoom' }, { icon: Icons.Sun, min: 50, max: 150, step: 5, key: 'brightness', label: 'Sáng' }, { icon: Icons.Contrast, min: 50, max: 150, step: 5, key: 'contrast', label: 'Tương phản' } ].map(c => (
                                                <div key={c.key} className="flex items-center gap-3">
                                                    <div className="w-20 text-[10px] font-bold text-slate-400 flex items-center gap-1.5 uppercase"><c.icon size={12}/> {c.label}</div>
                                                    <input type="range" min={c.min} max={c.max} step={c.s} value={images[activeImgIdx][c.key]} onChange={(e) => updateActiveImage({ [c.key]: parseFloat(e.target.value) })} className="flex-1 h-1.5 bg-slate-600 rounded-full appearance-none cursor-pointer accent-sky-500 hover:accent-sky-400" />
                                                </div>
                                            ))}
                                        </div>
                                        <div className="flex justify-between gap-2 pt-2 border-t border-slate-700/50 mt-2 overflow-x-auto no-scrollbar">
                                            {Object.entries(PRESETS).map(([key, p]) => (
                                                <button key={key} onClick={() => applyPreset(key)} className="text-[9px] font-bold bg-slate-700 hover:bg-sky-600 hover:text-white px-3 py-1.5 rounded-lg text-slate-300 whitespace-nowrap transition-colors border border-slate-600">{p.label}</button>
                                            ))}
                                        </div>
                                        <div className="flex gap-2 justify-center pt-1">
                                            {[{l:'↑',y:-10},{l:'↓',y:10},{l:'←',x:-10},{l:'→',x:10}].map((d,i) => (
                                                <button key={i} onClick={() => updateActiveImage({ x: (images[activeImgIdx].x + (d.x||0)), y: (images[activeImgIdx].y + (d.y||0)) })} className="bg-slate-700 hover:bg-sky-500 text-white rounded-lg w-full py-1.5 flex items-center justify-center text-xs font-bold transition-colors border border-slate-600">{d.l}</button>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                                
                                {/* NỘI DUNG SECTION */}
                                <div className="space-y-4 pb-10">
                                    <h3 className="text-xs font-black text-sky-500 uppercase tracking-widest flex items-center gap-2 pb-2 border-b border-slate-800">
                                        <Icons.FileText size={14}/> 3. Nhập Nội Dung
                                    </h3>
                                    <div className="space-y-4">
                                        <div className="relative group">
                                            <label className="text-[10px] font-bold text-slate-300 uppercase mb-1.5 block pl-1">Tiêu đề Ca Lâm Sàng</label>
                                            <input className="glass-input w-full p-3 rounded-xl text-sm bg-slate-800 text-white border-slate-600 placeholder-slate-500 focus:border-sky-500 focus:ring-1 focus:ring-sky-500 font-bold" value={content.title} onChange={e => setContent({...content, title: e.target.value})} placeholder="VD: CA U MÀNG NÃO..." />
                                        </div>
                                        
                                        <div className="bg-slate-800/30 p-3 rounded-xl border border-slate-700/50 space-y-3">
                                            <label className="text-[10px] font-bold text-sky-400 uppercase block flex items-center gap-2"><Icons.User size={12}/> Thông tin chung</label>
                                            <div className="flex gap-3">
                                                <div className="w-1/2">
                                                    <input className="glass-input w-full p-2.5 rounded-lg text-xs bg-slate-800 text-white border-slate-600 text-center" value={content.age} onChange={e => setContent({...content, age: e.target.value})} placeholder="Tuổi" />
                                                </div>
                                                <div className="w-1/2">
                                                     <select className="glass-input w-full p-2.5 rounded-lg text-xs bg-slate-800 text-white border-slate-600" value={content.gender} onChange={e => setContent({...content, gender: e.target.value})}>
                                                        <option value="Nam">Nam</option><option value="Nữ">Nữ</option>
                                                     </select>
                                                </div>
                                            </div>
                                            <div className="flex gap-2">
                                                <div className="relative flex-1">
                                                    <div className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-500"><Icons.Calendar size={12}/></div>
                                                    <input className="glass-input w-full pl-9 p-2.5 rounded-lg text-xs bg-slate-800 text-white border-slate-600" value={content.date} onChange={e => setContent({...content, date: e.target.value})} placeholder="Ngày chụp" />
                                                </div>
                                                <button onClick={setToday} className="px-3 rounded-lg bg-slate-700 hover:bg-sky-600 text-white text-[10px] font-bold uppercase transition-colors border border-slate-600">Hôm nay</button>
                                            </div>
                                            <div className="relative">
                                                <div className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-500"><Icons.User size={12}/></div>
                                                <input className="glass-input w-full pl-9 p-2.5 rounded-lg text-xs bg-slate-800 text-white border-slate-600" value={content.author} onChange={e => setContent({...content, author: e.target.value})} placeholder="KTV thực hiện" />
                                            </div>
                                            <div className="relative">
                                                <div className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-500"><Icons.MapPin size={12}/></div>
                                                <input className="glass-input w-full pl-9 p-2.5 rounded-lg text-xs bg-slate-800 text-white border-slate-600" value={content.facility} onChange={e => setContent({...content, facility: e.target.value})} placeholder="Tên cơ sở y tế" />
                                            </div>
                                        </div>

                                        {['clinicalInfo', 'techDescription', 'injectionInfo', 'highlights', 'conclusion'].map(field => {
                                            const labels = {
                                                clinicalInfo: { t: 'Lâm sàng', i: Icons.Clipboard, c: 'text-emerald-400' },
                                                techDescription: { t: 'Mô tả Kỹ thuật', i: Icons.PenTool, c: 'text-blue-400' },
                                                injectionInfo: { t: 'Thuốc cản quang', i: Icons.Syringe, c: 'text-violet-400' },
                                                highlights: { t: 'Kết quả hình ảnh', i: Icons.Star, c: 'text-amber-400' },
                                                conclusion: { t: 'Kết luận', i: Icons.Check, c: 'text-rose-400' }
                                            };
                                            const info = labels[field];
                                            return (
                                                <div key={field} className="relative group">
                                                    <div className="flex justify-between items-center mb-1.5 pl-1">
                                                        <label className={`text-[10px] font-bold uppercase flex items-center gap-2 ${info.c}`}>
                                                            <info.i size={12}/> {info.t}
                                                        </label>
                                                        <button onClick={() => addMacro(field)} className="text-[9px] text-slate-500 hover:text-white flex items-center gap-1 bg-slate-800 px-2 py-0.5 rounded border border-slate-700 transition-colors"><Icons.Plus size={10}/> Lưu mẫu</button>
                                                    </div>
                                                    <textarea 
                                                        className={`glass-input w-full p-3 rounded-xl text-sm bg-slate-800/80 text-slate-200 border-slate-700 transition-all resize-y custom-scrollbar mb-2 focus:border-sky-500/50 focus:bg-slate-900 ${field === 'techDescription' ? 'min-h-[120px]' : 'min-h-[80px]'}`} 
                                                        value={content[field]} 
                                                        onChange={e => setContent({...content, [field]: e.target.value})}
                                                        placeholder={`Nhập ${info.t.toLowerCase()}...`}
                                                    />
                                                    {macros[field] && (
                                                        <div className="flex flex-wrap gap-1.5">
                                                            {macros[field].map((text, i) => (
                                                                <button key={i} onClick={() => insertMacro(field, text)} className="text-[9px] px-2 py-1 rounded-lg bg-slate-800 hover:bg-slate-700 text-slate-400 hover:text-sky-300 transition-colors border border-slate-700 text-left max-w-full truncate block">+ {text.substring(0, 30)}{text.length > 30 ? '...' : ''}</button>
                                                            ))}
                                                        </div>
                                                    )}
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>
                            </div>
                        </div>

                        {/* PREVIEW AREA */}
                        <div ref={previewContainerRef} className="flex-1 relative bg-slate-950 flex flex-col h-full overflow-hidden">
                            {/* TOP TOOLBAR */}
                            <div className="h-14 border-b border-slate-800 bg-slate-900/50 backdrop-blur flex items-center justify-between px-6 z-10 shrink-0">
                                <div className="flex items-center gap-4">
                                    <span className="text-xs font-bold text-slate-500 uppercase tracking-widest hidden md:inline">Preview</span>
                                    <div className="h-4 w-px bg-slate-700 hidden md:block"></div>
                                    <div className="flex items-center gap-2 bg-slate-800 p-1.5 rounded-lg border border-slate-700">
                                        <Icons.TextSize size={14} className="text-slate-400"/>
                                        <input type="range" min="9" max="24" value={bodyFontSize} onChange={(e) => setBodyFontSize(parseInt(e.target.value))} className="w-20 h-1 bg-slate-600 rounded-full appearance-none accent-sky-500 cursor-pointer"/>
                                        <span className="text-[10px] w-6 text-slate-400">{bodyFontSize}px</span>
                                    </div>
                                    <button onClick={() => setIsCompact(!isCompact)} className={`p-2 rounded-lg transition-colors border ${isCompact ? 'bg-sky-600 text-white border-sky-500' : 'bg-slate-800 text-slate-400 border-slate-700 hover:text-white'}`} title="Chế độ chống tràn (Thu gọn)">
                                        <Icons.Minimize size={18}/>
                                    </button>
                                </div>
                                <div className="flex items-center gap-3">
                                    <button id="share-btn" onClick={handleShare} className="flex items-center gap-2 bg-slate-800 hover:bg-slate-700 text-white px-4 py-2 rounded-lg font-bold text-xs uppercase tracking-wide border border-slate-700 transition-colors">
                                        <Icons.Share2 size={16}/> Chia sẻ
                                    </button>
                                    <button id="save-btn" onClick={handleCloudSave} className="flex items-center gap-2 bg-slate-800 hover:bg-slate-700 text-white px-4 py-2 rounded-lg font-bold text-xs uppercase tracking-wide border border-slate-700 transition-colors">
                                        <Icons.Save size={16}/> Lưu
                                    </button>
                                    <button onClick={() => setShowFullscreen(true)} className="p-2 bg-slate-800 text-slate-300 hover:text-white rounded-lg transition-colors border border-slate-700"><Icons.Maximize size={18}/></button>
                                    <button id="dl-btn" onClick={handleDownload} className="flex items-center gap-2 bg-sky-600 hover:bg-sky-500 text-white px-5 py-2 rounded-lg font-bold text-xs uppercase tracking-wide shadow-lg shadow-sky-900/20 transition-all active:scale-95"><Icons.Download size={16}/> <span className="hidden sm:inline">Xuất Ảnh</span></button>
                                </div>
                            </div>
                            
                            {/* CANVAS AREA */}
                            <div className="flex-1 overflow-auto flex items-center justify-center p-8 custom-scrollbar bg-[radial-gradient(#1e293b_1px,transparent_1px)] [background-size:20px_20px]">
                                <div className="relative shadow-2xl transition-transform duration-100 ease-linear ring-1 ring-white/10 origin-center" style={{ width: containerDims.w, height: containerDims.h, transform: `scale(${previewScale})` }}>
                                    <div ref={exportRef} style={{ width: containerDims.w, height: containerDims.h }} className="bg-white">
                                        {renderLayout()}
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* PAGE FOOTER */}
                    <div className="text-center text-[10px] text-slate-600 font-medium">
                        © 2024 MedStudio Pro. All rights reserved.
                    </div>

                    {showAuthModal && <AuthModal onClose={() => setShowAuthModal(false)} onLoginSuccess={() => setShowAuthModal(false)} />}
                    {showSavedModal && user && <SavedPostersModal onClose={() => setShowSavedModal(false)} onLoad={handleCloudLoad} userId={user.uid} />}
                    {showCropModal && tempCropImg && <CropModal image={tempCropImg} onClose={() => setShowCropModal(false)} onSave={finishCrop} />}
                    {showDrawModal && tempCropImg && <DrawModal image={tempCropImg} onClose={() => setShowDrawModal(false)} onSave={finishDraw} />}

                    {showFullscreen && (
                        <div className="fixed inset-0 z-50 bg-black/95 flex flex-col items-center justify-center backdrop-blur-md animate-fade-in p-4 md:p-10">
                            <button onClick={() => setShowFullscreen(false)} className="absolute top-6 right-6 text-white/50 hover:text-white transition-colors bg-white/10 p-3 rounded-full z-50"><Icons.X size={24}/></button>
                            <div style={{ transform: `scale(${Math.min((window.innerHeight-40)/containerDims.h, (window.innerWidth-40)/containerDims.w)})` }} className="shadow-2xl ring-4 ring-white/10 origin-center">
                                <div style={{ width: containerDims.w, height: containerDims.h }} className="bg-white">
                                    {renderLayout()}
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
