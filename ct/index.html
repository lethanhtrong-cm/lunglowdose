                content: `<h2 id="s198-daicuong">I. ĐẠI CƯƠNG</h2><p>Là kỹ thuật thu ảnh nhu mô phổi với độ phân giải cao bằng máy chụp cắt lớp vi tính, chẩn đoán bệnh lý phế quản và phổi kẽ.</p><h2 id="s198-chidinh">II. CHỈ ĐỊNH</h2><ul><li>Các tổn thương phế quản (giãn phế quản, phế nang, bụi phổi...), bệnh phổi kẽ...</li><li>Một số chỉ định khác theo hướng dẫn chẩn đoán và điều trị do Bộ Y tế ban hành.</li></ul><h2 id="s198-chongchidinh">III. CHỐNG CHỈ ĐỊNH</h2><p>Không có chống chỉ định.</p><h2 id="s198-thantrong">IV. THẬN TRỌNG</h2><p>Phụ nữ có thai.</p><h2 id="s198-chuanbi">V. CHUẨN BỊ</h2><h3>1. Người thực hiện</h3><ul><li>Bác sỹ chẩn đoán hình ảnh.</li><li>Kỹ thuật y hình ảnh y học</li><li>Điều dưỡng</li></ul><h3>2. Trang thiết bị</h3><ul><li>Máy chụp cắt lớp vi tính đa lát cắt</li><li>Hệ thống PACS.</li></ul><h3>3. Người bệnh</h3><ul><li>Giải thích kỹ về thủ thuật.</li><li>Tháo bỏ các vật kim loại.</li></ul><h3>4. Hồ sơ bệnh án</h3><ul><li>Có phiếu chỉ định chụp CLVT phổi độ phân giải cao.</li></ul><h3>5. Thời gian thực hiện</h3><p>Khoảng 12 - 20 phút.</p><h2 id="s198-cacbuoctienhanh">VI. CÁC BƯỚC TIẾN HÀNH</h2><ul><li><strong>Bước 1:</strong> Đặt người bệnh nằm ngửa, hai tay giơ cao qua đầu, hướng dẫn hít vào, nín thở.</li><li><strong>Bước 2:</strong> Chụp định vị (scout view) lấy toàn bộ lồng ngực.</li><li><strong>Bước 3:</strong> Chụp các lớp cắt liên tiếp không xoắn ốc hoặc có xoắn ốc, từ đỉnh phổi đến hết góc sườn hoành, độ dày lớp cắt 1-2mm, bước chuyển bàn 10-15mm. Không tiêm thuốc cản quang. Đặt cửa sổ phù hợp.</li><li><strong>Bước 4:</strong> Xử trí hình ảnh và chuyển sang PACS.</li></ul><h3>Nhận định kết quả</h3><p>Mô tả tổn thương: Vị trí, cấu trúc, kích thước, sự lan rộng. Đưa ra các định hướng chẩn đoán.</p><h2 id="s198-theodoi">VII. THEO DÕI VÀ XỬ TRÍ TAI BIẾN</h2><p>Một số trường hợp có thể phải thực hiện lại kỹ thuật do người bệnh không giữ bất động. Kỹ thuật không có tai biến.</p><h2 id="s198-tailieu">TÀI LIỆU THAM KHẢO</h2><ol><li>Reddinger, Handbook of CT Technique (Computed Tomography Series), WileyBlackwell, 2000.</li><li>Sumeet Bhargava, Satish K Bhargava, CT and MRI Protocol - A Practical Approach, Third Edition, Peepee, 2016.</li></ol>`
            },

                    { anchor: 's199-chuanbi', title: 'V. Chuẩn bị' },

                ],
                content: `<h2 id="s199-daicuong">I. ĐẠI CƯƠNG</h2><p>Chụp cắt lớp vi tính liều thấp (LDCT) được ra đời từ năm 2010 với ưu điểm là liều bức xạ chỉ khoảng 1.5mSv, giảm 25% so với liều chụp cắt lớp vi tính thông thường và chỉ cao hơn liều bức xạ của X-quang là 15 lần. LDCT có vai trò quan trọng trong tầm soát ung thư phổi, phát hiện ung thư phổi ở giai đoạn sớm giúp can thiệp điều trị sớm và nâng cao thời gian sống thêm cũng như tiên lượng tốt cho người bệnh.</p><h2 id="s199-chidinh">II. CHỈ ĐỊNH</h2><p>Thường chỉ định đối với nhóm đối tượng nguy cơ, gồm:</p><ul><li>Độ tuổi từ 55-80.</li><li>Tiền sử hút thuốc lá.</li><li>Tiền sử gia đình có người mắc ung thư phổi.</li><li>Tiền sử phơi nhiễm với khói bụi, xi măng...</li><li>Tiền sử bệnh lý khác (COPD, IPF, hoặc các loại ung thư khác).</li><li>Một số chỉ định khác theo hướng dẫn chẩn đoán và điều trị do Bộ Y tế ban hành.</li></ul><h2 id="s199-chongchidinh">III. CHỐNG CHỈ ĐỊNH</h2><p>Không có chống chỉ định.</p><h2 id="s199-thantrong">IV. THẬN TRỌNG</h2><p>Phụ nữ có thai.</p><h2 id="s199-chuanbi">V. CHUẨN BỊ</h2><h3>1. Người thực hiện</h3><ul><li>Bác sỹ chẩn đoán hình ảnh.</li><li>Kỹ thuật y hình ảnh y học.</li><li>Điều dưỡng.</li></ul><h3>2. Trang thiết bị</h3><ul><li>Máy chụp cắt lớp vi tính đa dãy (>=32 lát).</li><li>Hệ thống PACS.</li></ul><h3>3. Người bệnh</h3><ul><li>Giải thích kỹ về thủ thuật.</li><li>Tháo bỏ các vật kim loại.</li></ul><h3>4. Hồ sơ bệnh án</h3><ul><li>Có phiếu chỉ định chụp cắt lớp vi tính phổi liều thấp không tiêm thuốc cản quang.</li></ul><h3>5. Thời gian thực hiện</h3><p>Khoảng 12 - 20 phút.</p><h2 id="s199-cacbuoctienhanh">VI. CÁC BƯỚC TIẾN HÀNH</h2><ul><li><strong>Bước 1:</strong> Thiết lập thông số máy theo chương trình chụp.</li><li><strong>Bước 2:</strong> Chụp định khu toàn bộ vùng ngực. Đặt người bệnh nằm ngửa, hai tay giơ cao qua đầu, hướng dẫn nín thở. Chụp định vị (scout view), sau đó chụp các lớp cắt liên tiếp, xoắn ốc từ đỉnh phổi đến hết góc sườn hoành. Hiệu điện thế và cường độ dòng điện được điều chỉnh tùy thuộc vào cân nặng và thể trạng của người bệnh để đảm bảo liều tia thấp nhất có thể.</li><li><strong>Bước 3:</strong> Dựng ảnh. Dùng các phần mềm cho phép tái tạo hình ảnh phổi và trung thất, thành ngực sau chụp, để bộc lộ tổn thương.</li><li><strong>Bước 4:</strong> Chuyển hình ảnh sang PACS hoặc in phim.</li></ul><h3>Nhận định kết quả</h3><p>Bác sỹ đọc tổn thương, mô tả trên máy tính. Đối chiếu hình ảnh CLVT và lâm sàng. Đưa ra các định hướng chẩn đoán.</p><h2 id="s199-theodoi">VII. THEO DÕI VÀ XỬ TRÍ TAI BIẾN</h2><p>Kỹ thuật này không có tai biến.</p><h2 id="s199-tailieu">TÀI LIỆU THAM KHẢO</h2><ol><li>W. Richard, High-Resolution CT of the Lung, Wolters Kluwer, Fifth Edition 2015.</li><li>Reddinger, Handbook of CT Technique (Computed Tomography Series), WileyBlackwell, 2000.</li><li>Bộ Y tế, “Hướng dẫn quy trình kỹ thuật chẩn đoán hình ảnh và điện quang can thiệp", nhà xuất bản y học, tháng 1/2014.</li></ol>`
            },
            { 
                id: 200, 
                title: "Chụp Cắt Lớp Vi Tính Nội Soi Ảo Cây Phế Quản", 
                procedure: "Quy trình 200", 
                category: "Lồng ngực", 
                subheadings: [
                    { anchor: 's200-daicuong', title: 'I. Đại cương' },
                    { anchor: 's200-chidinh', title: 'II. Chỉ định' },
                    { anchor: 's200-chongchidinh', title: 'III. Chống chỉ định' },
                    { anchor: 's200-thantrong', title: 'IV. Thận trọng' },
                    { anchor: 's200-chuanbi', title: 'V. Chuẩn bị' },
                    { anchor: 's200-cacbuoctienhanh', title: 'VI. Các bước tiến hành' },
                    { anchor: 's200-theodoi', title: 'VII. Theo dõi và xử trí tai biến' },
                    { anchor: 's200-tailieu', title: 'Tài liệu tham khảo' },
                ],
                content: `<h2 id="s200-daicuong">I. ĐẠI CƯƠNG</h2><p>Hẹp khí quản có thể do nhiều nguyên nhân, có thể do u, chấn thương, nhiễm khuẩn hoặc sau đặt nội khí quản. Đánh giá đúng vị trí, mức độ và độ dài của hẹp khí quản là điều cần thiết để lựa chọn can thiệp thích hợp. Nội soi ảo cây khí - phế quản là một kỹ thuật dựng ảnh dựa trên hình ảnh chụp cắt lớp vi tính, cho phép đánh giá ba chiều (3D) của thành bên trong và ngoại vi của đường dẫn khí, cung cấp nhiều thông tin liên quan đến các trường hợp hẹp khí quản.</p><h2 id="s200-chidinh">II. CHỈ ĐỊNH</h2><ul><li>Những trường hợp hẹp khí phế quản do bất kỳ nguyên nhân gì (viêm, u, chấn thương, sau đặt nội khí quản, hoặc bẩm sinh).</li><li>Ung thư phế quản (bronchogenic carcinoma).</li><li>Những trường hợp chèn ép khí phế quản từ ngoài vào (external compression).</li><li>Bất thường giải phẫu hoặc dị dạng khí phế quản.</li><li>Đánh giá cây khí phế quản ở trẻ em (những trường hợp có chống chỉ định nội soi ống mềm).</li><li>Định hướng sinh thiết xuyên thành phế quản (guidance of transbrochial biopsy).</li><li>Đánh giá trước và sau phẫu thuật: lập kế hoạch trước điều trị và theo dõi sau điều trị.</li></ul><h2 id="s200-chongchidinh">III. CHỐNG CHỈ ĐỊNH</h2><p>Không có chống chỉ định.</p><h2 id="s200-thantrong">IV. THẬN TRỌNG</h2><ul><li>Phụ nữ có thai.</li><li>Trẻ nhỏ <3 tuổi.</li><li>Người bệnh kích thích hoặc không thể hợp tác.</li><li>Thận trọng với nhưng trường hợp có tiền sử dị ứng với thuốc cản quang (nếu có chỉ định tiêm).</li></ul><h2 id="s200-chuanbi">V. CHUẨN BỊ</h2><h3>1. Người thực hiện</h3><ul><li>Bác sỹ chẩn đoán hình ảnh.</li><li>Kỹ thuật y hình ảnh y học.</li><li>Điều dưỡng.</li></ul><h3>2. Trang thiết bị</h3><ul><li>Máy chụp cắt lớp vi tính đa dãy (>= 64 lát).</li><li>Máy bơm điện chuyên dụng.</li><li>Hệ thống PACS.</li></ul><h3>3. Người bệnh</h3><ul><li>Giải thích kỹ về thủ thuật.</li><li>Cần nhịn ăn, uống trước 4 giờ nếu có tiêm thuốc.</li></ul><h3>4. Hồ sơ bệnh án</h3><ul><li>Có phiếu chỉ định chụp cắt lớp vi tính nội soi ảo cây phế quản.</li></ul><h2 id="s200-cacbuoctienhanh">VI. CÁC BƯỚC TIẾN HÀNH</h2><ul><li><strong>Bước 1:</strong> Đặt người bệnh nằm ngửa, hai tay giơ cao qua đầu. Hướng dẫn người bệnh hít vào sâu và nín thở. Chụp định vị (scout view) từ thanh quản đến vòm hoành.</li><li><strong>Bước 2:</strong> Chụp các lớp cắt xoắn ốc từ đỉnh phổi đến hết góc sườn hoành. Độ dày tái tạo 0.65mm đến 0.75mm. Chụp ở thì hít vào, một số trường hợp có thể chụp cả thì thở ra (nghi ngờ nhuyễn khí phế quản).</li><li><strong>Bước 3:</strong> Tiêm thuốc cản quang (nếu có chỉ định) với thể tích 1-2ml/kg, tốc độ 3.5ml/s.</li><li><strong>Bước 4:</strong> Dữ liệu được xử lý trên máy trạm để tái tạo hình ảnh 3D, VRT, MPR, MIP, tạo ra hình ảnh nội soi ảo bên trong lòng cây khí-phế quản.</li><li><strong>Bước 5:</strong> Chuyển hình ảnh sang PACS hoặc in phim.</li></ul><h3>Nhận định kết quả</h3><p>Hình ảnh chụp rõ nét, không bị rung, nhiễu. Hiển thị được hình ảnh 3D của toàn bộ cây khí – phế quản, đánh giá được vị trí, mức độ, chiều dài đoạn hẹp và các tổn thương liên quan.</p><h2 id="s200-theodoi">VII. THEO DÕI VÀ XỬ TRÍ TAI BIẾN</h2><p>Theo dõi sát toàn trạng, các chỉ số sinh tồn. Tai biến liên quan đến thuốc cản quang (nếu có) được xử trí theo quy trình.</p><h2 id="s200-tailieu">TÀI LIỆU THAM KHẢO</h2><ol><li>Reddinger, Handbook of CT Technique (Computed Tomography Series), WileyBlackwell, 2000.</li><li>W. Richard Webb, Nestor L. Muller, David P Naidich, High-Resolution CT of the Lung, Fifth Edition, Wolters Kluwer Heath, 2014.</li><li>Luo M, Duan C, Qiu J, et al. Diagnostic Value of Multidetector CT and Its Multiplanar Reformation, Volume Rendering and Virtual Bronchoscopy Postprocessing Techniques for Primary Trachea and Main Bronchus Tumors. PLOS ONE. 2015;10(9):e0137329.</li></ol>`
            },
            { 
                id: 201, 
                title: "Chụp Cắt Lớp Vi Tính Động Mạch Phổi", 
                procedure: "Quy trình 201", 
                category: "Mạch máu", 
                subheadings: [
                    { anchor: 's201-daicuong', title: 'I. Đại cương' },
                    { anchor: 's201-chidinh', title: 'II. Chỉ định' },
                    { anchor: 's201-chongchidinh', title: 'III. Chống chỉ định' },
                    { anchor: 's201-thantrong', title: 'IV. Thận trọng' },
                    { anchor: 's201-chuanbi', title: 'V. Chuẩn bị' },
                    { anchor: 's201-cacbuoctienhanh', title: 'VI. Các bước tiến hành' },
                    { anchor: 's201-theodoi', title: 'VII. Theo dõi và xử trí tai biến' },
                    { anchor: 's201-tailieu', title: 'Tài liệu tham khảo' },
                ],
                content: `<h2 id="s201-daicuong">I. ĐẠI CƯƠNG</h2><p>Chụp cắt lớp vi tính động mạch phổi là sử dụng máy chụp cắt lớp vi tính đa lát có tiêm thuốc cản quang để hiển thị toàn bộ động mạch phổi gồm thân chung, động mạch phổi phải và các nhánh, động mạch phổi trái và các nhánh giúp đánh giá một cách khách quan nhất về giải phẫu và các bệnh lý liên quan.</p><h2 id="s201-chidinh">II. CHỈ ĐỊNH</h2><ul><li>Tăng áp lực động mạch phổi.</li><li>Huyết khối gây tắc mạch phổi cấp tính hoặc mạn tính.</li><li>Bệnh lý ác tính chèn ép hoặc xâm lấn động mạch phổi.</li><li>Bệnh lý viêm mạch.</li><li>Dị dạng mạch phổi.</li><li>Bất thường bẩm sinh mạch máu phổi.</li><li>Một số chỉ định khác theo hướng dẫn chẩn đoán và điều trị do Bộ Y tế ban hành.</li></ul><h2 id="s201-chongchidinh">III. CHỐNG CHỈ ĐỊNH</h2><p>Không có chống chỉ định.</p><h2 id="s201-thantrong">IV. THẬN TRỌNG</h2><ul><li>Người bệnh không hợp tác.</li><li>Người bệnh có tiền sử dị ứng thuốc cản quang hoặc hen phế quản.</li><li>Người bệnh suy thận.</li><li>Phụ nữ có thai.</li></ul><h2 id="s201-chuanbi">V. CHUẨN BỊ</h2><h3>1. Người thực hiện</h3><ul><li>Bác sỹ chẩn đoán hình ảnh, Kỹ thuật viên, Điều dưỡng.</li></ul><h3>2. Trang thiết bị, vật tư</h3><ul><li>Máy CLVT đa lát cắt (từ 64 lát trở lên), máy bơm điện chuyên dụng, hệ thống PACS.</li><li>Thuốc cản quang, nước muối sinh lý, hộp thuốc cấp cứu tai biến.</li><li>Kim tiêm (18G), bơm tiêm, găng tay...</li></ul><h3>3. Người bệnh</h3><ul><li>Được giải thích kỹ về thủ thuật, ký giấy cam kết.</li><li>Nhịn ăn, uống trước 4 giờ.</li><li>Duy trì đường truyền tĩnh mạch.</li></ul><h3>4. Hồ sơ bệnh án</h3><ul><li>Có phiếu chỉ định chụp CLVT động mạch phổi.</li></ul><h3>5. Thời gian thực hiện</h3><p>Khoảng 20 - 30 phút.</p><h2 id="s201-cacbuoctienhanh">VI. CÁC BƯỚC TIẾN HÀNH</h2><ul><li><strong>Bước 1:</strong> Đặt đường truyền tĩnh mạch cỡ lớn (18G) và nối với bơm tiêm điện. Có thể lắp cổng điện tâm đồ (ECG) nhưng thường không cần thiết.</li><li><strong>Bước 2:</strong> Chụp định vị lấy toàn bộ lồng ngực để khảo sát được toàn bộ cây động mạch phổi.</li><li><strong>Bước 3:</strong> Chụp không tiêm thuốc để phát hiện tụ máu trong thành, huyết khối, vôi hóa.</li><li><strong>Bước 4:</strong> Chụp có tiêm thuốc cản quang. Sử dụng kỹ thuật “bolus tracking” để xác định thời điểm thuốc đạt nồng độ cao nhất tại gốc động mạch phổi. Liều lượng thuốc từ 100-120 ml, tốc độ tiêm 4-5ml/giây, có bơm đuổi nước muối sinh lý.</li><li><strong>Bước 5:</strong> Dữ liệu thu được sẽ được xử lý trên máy trạm, dựng hình theo các chương trình MIP, VRT, MPR để bộc lộ bệnh lý.</li><li><strong>Bước 6:</strong> Chuyển hình ảnh sang PACS hoặc in phim.</li><li><strong>Bước 7:</strong> Theo dõi người bệnh sau khi chụp, băng ép vị trí tiêm.</li></ul><h3>Nhận định kết quả</h3><p>Bác sỹ đọc tổn thương, mô tả trên máy tính. Đánh giá được toàn bộ hệ thống động mạch phổi và các cấu trúc liên quan.</p><h2 id="s201-theodoi">VII. THEO DÕI VÀ XỬ TRÍ TAI BIẾN</h2><p>Đánh giá nhanh toàn trạng của người bệnh trong và sau khi tiêm thuốc. Theo dõi các chỉ số sinh tồn. Tai biến liên quan đến thuốc cản quang cần được xử trí theo quy trình.</p><h2 id="s201-tailieu">TÀI LIỆU THAM KHẢO</h2><ol><li>W. Richard Webb, Nestor L. Muller, David P Naidich, High-Resolution CT of the Lung, Fifth Edition, Wolters Kluwer Heath, 2015.</li><li>Wittram C. How I Do It: CT Pulmonary Angiography. American Journal of Roentgenology. 2007;188(5):1255-1261.</li></ol>`
            },

                ],
                content: `<h2 id="s202-daicuong">I. ĐẠI CƯƠNG</h2><p>Chụp cắt lớp vi tính động mạch chủ ngực là sử dụng máy chụp cắt lớp vi tính đa lát có tiêm thuốc cản quang để làm hiển thị toàn bộ động mạch chủ ngực từ lỗ xuất phát tới vị trí qua lỗ cơ hoành và các nhánh xuất phát từ quai động mạch chủ.</p><h2 id="s202-chidinh">II. CHỈ ĐỊNH</h2><ul><li>Đau ngực nghi ngờ hội chứng động mạch chủ cấp: phình tách động mạch chủ, máu tụ trong thành hay ổ loét xuyên thành động mạch chủ.</li><li>Nghi ngờ phình động mạch chủ.</li><li>Các bệnh lý viêm động mạch chủ: Takayasu...</li><li>Nghi ngờ có hẹp eo động mạch chủ.</li><li>Đánh giá tình trạng xơ vữa thành động mạch chủ và các gốc mạch lớn.</li><li>Các trường hợp chấn thương vùng ngực nghi tổn thương động mạch chủ ngực.</li></ul><h2 id="s202-chongchidinh">III. CHỐNG CHỈ ĐỊNH</h2><p>Không có chống chỉ định.</p><h2 id="s202-thantrong">IV. THẬN TRỌNG</h2><ul><li>Người bệnh có thai.</li><li>Người bệnh có chống chỉ định dùng thuốc cản quang i-ốt.</li><li>Người bệnh không hợp tác, dị ứng, suy thận.</li></ul><h2 id="s202-chuanbi">V. CHUẨN BỊ</h2><h3>1. Người thực hiện</h3><ul><li>Bác sỹ chẩn đoán hình ảnh, Kỹ thuật viên, Điều dưỡng.</li></ul><h3>2. Trang thiết bị, vật tư</h3><ul><li>Máy CLVT đa lát cắt (từ 64 lát trở lên), máy bơm điện, hệ thống PACS.</li><li>Thuốc cản quang, nước muối sinh lý, hộp thuốc cấp cứu.</li></ul><h3>3. Người bệnh</h3><ul><li>Giải thích kỹ, ký cam kết.</li><li>Nhịn ăn, uống trước 4 giờ.</li></ul><h2 id="s202-cacbuoctienhanh">VI. CÁC BƯỚC TIẾN HÀNH</h2><ul><li><strong>Bước 1:</strong> Đặt đường truyền tĩnh mạch (18G), nối bơm tiêm điện. Có thể lắp ECG.</li><li><strong>Bước 2:</strong> Chụp định vị. Trường chụp từ cổ tới ngang vòm hoành hoặc toàn bộ động mạch chủ ngực - bụng.</li><li><strong>Bước 3:</strong> Chụp trước tiêm thuốc để đánh giá máu tụ trong thành.</li><li><strong>Bước 4:</strong> Chụp có tiêm thuốc cản quang dùng kỹ thuật "bolus tracking". Lượng thuốc 100-120 ml, tốc độ 4-5ml/giây.</li><li><strong>Bước 5:</strong> Xử lý hình ảnh trên máy trạm (MPR, MIP, VRT).</li><li><strong>Bước 6:</strong> Chuyển hình ảnh sang PACS hoặc in phim.</li><li><strong>Bước 7:</strong> Theo dõi người bệnh sau khi chụp.</li></ul><h3>Nhận định kết quả</h3><p>Bác sỹ đọc tổn thương, mô tả và đưa ra định hướng chẩn đoán.</p><h2 id="s202-theodoi">VII. THEO DÕI VÀ XỬ TRÍ TAI BIẾN</h2><p>Tai biến liên quan đến thuốc cản quang được xử trí theo quy trình.</p><h2 id="s202-tailieu">TÀI LIỆU THAM KHẢO</h2><ol><li>Reddinger, Handbook of CT Technique (Computed Tomography Series), WileyBlackwell, 2000.</li><li>Sumeet Bhargava, Satish K Bhargava, CT and MRI Protocol - A Practical Approach, Third Edition, Peepee, 2016.</li></ol>`
            },
            { 
                id: 203, 
                title: "Chụp CLVT Động Mạch Vành, Tim", 
                procedure: "Quy trình 203", 
                category: "Mạch máu", 
                subheadings: [
                    { anchor: 's203-daicuong', title: 'I. Đại cương' },
                    { anchor: 's203-chidinh', title: 'II. Chỉ định' },
                    { anchor: 's203-chongchidinh', title: 'III. Chống chỉ định' },
                    { anchor: 's203-thantrong', title: 'IV. Thận trọng' },
                    { anchor: 's203-chuanbi', title: 'V. Chuẩn bị' },
                    { anchor: 's203-cacbuoctienhanh', title: 'VI. Các bước tiến hành' },
                    { anchor: 's203-theodoi', title: 'VII. Theo dõi và xử trí tai biến' },
                    { anchor: 's203-tailieu', title: 'Tài liệu tham khảo' },
                ],
                content: `<h2 id="s203-daicuong">I. ĐẠI CƯƠNG</h2><p>Chụp cắt lớp vi tính động mạch vành là kỹ thuật sử dụng máy CLVT đa lát cắt (tối thiểu 64 dãy) có tiêm thuốc cản quang để hiển thị hệ thống động mạch vành, cấu trúc buồng tim và van tim. Do tim co bóp liên tục, kỹ thuật này đòi hỏi máy có độ phân giải không gian và thời gian cao để có hình ảnh chất lượng.</p><h2 id="s203-chidinh">II. CHỈ ĐỊNH</h2><ul><li>Đau ngực không điển hình.</li><li>Nghi ngờ bệnh lý mạch vành khi các xét nghiệm khác không rõ ràng.</li><li>Có các yếu tố nguy cơ tim mạch: tăng mỡ máu, đái tháo đường, hút thuốc lá, tăng huyết áp...</li><li>Đánh giá sau phẫu thuật bắc cầu nối động mạch vành hoặc sau đặt stent.</li><li>Khảo sát các bất thường giải phẫu bẩm sinh của động mạch vành.</li><li>Đánh giá một số bệnh lý cơ tim, van tim.</li></ul><h2 id="s203-chongchidinh">III. CHỐNG CHỈ ĐỊNH</h2><p>Không có chống chỉ định tuyệt đối.</p><h2 id="s203-thantrong">IV. THẬN TRỌNG</h2><ul><li>Phụ nữ có thai.</li><li>Người có chống chỉ định dùng thuốc cản quang i-ốt (dị ứng, suy thận nặng).</li><li>Nhịp tim không kiểm soát được (loạn nhịp hoàn toàn, rung nhĩ).</li><li>Có chống chỉ định dùng thuốc chẹn beta (beta-blocker) nếu cần để kiểm soát nhịp tim (hen phế quản nặng, block nhĩ thất).</li></ul><h2 id="s203-chuanbi">V. CHUẨN BỊ</h2><h3>1. Người thực hiện</h3><ul><li>Bác sỹ chẩn đoán hình ảnh, Kỹ thuật viên, Điều dưỡng.</li></ul><h3>2. Trang thiết bị, vật tư</h3><ul><li>Máy CLVT đa lát cắt (từ 64 lát trở lên), máy bơm điện, hệ thống PACS.</li><li>Thuốc chẹn beta (nếu cần), thuốc giãn mạch vành (nitroglycerin).</li><li>Thuốc cản quang, nước muối sinh lý, hộp thuốc cấp cứu tai biến.</li></ul><h3>3. Người bệnh</h3><ul><li>Giải thích kỹ, ký cam kết.</li><li>Nhịn ăn 4 giờ, không dùng chất kích thích (cà phê).</li><li>Kiểm tra nhịp tim, huyết áp. Nếu nhịp tim > 65 lần/phút, có thể dùng thuốc chẹn beta để làm chậm nhịp tim.</li><li>Ngậm nitroglycerin dưới lưỡi ngay trước khi chụp để làm giãn động mạch vành (trừ khi huyết áp thấp).</li></ul><h2 id="s203-cacbuoctienhanh">VI. CÁC BƯỚC TIẾN HÀNH</h2><ul><li><strong>Bước 1:</strong> Đặt đường truyền tĩnh mạch (18G), nối bơm tiêm điện. Lắp điện cực theo dõi điện tâm đồ (ECG).</li><li><strong>Bước 2:</strong> Chụp định vị từ chạc ba khí phế quản đến hết đáy tim.</li><li><strong>Bước 3:</strong> Chụp không tiêm thuốc để tính điểm vôi hóa động mạch vành (Calcium Score).</li><li><strong>Bước 4:</strong> Tiêm thuốc cản quang (70-100 ml, tốc độ 4-5 ml/s) và chụp có đồng bộ hóa với ECG. Dùng kỹ thuật "bolus tracking" để xác định thời điểm chụp tối ưu.</li><li><strong>Bước 5:</strong> Tái tạo hình ảnh ở thì tâm trương (thường khoảng 65-70% khoảng R-R) với độ dày lớp cắt mỏng (0.6 - 0.75 mm).</li><li><strong>Bước 6:</strong> Xử lý hình ảnh trên máy trạm bằng các phần mềm chuyên dụng (MPR, MIP, VRT) để phân tích động mạch vành.</li><li><strong>Bước 7:</strong> Chuyển hình ảnh sang PACS.</li><li><strong>Bước 8:</strong> Theo dõi người bệnh sau chụp.</li></ul><h3>Nhận định kết quả</h3><p>Bác sỹ phân tích hình ảnh, đánh giá mức độ vôi hóa, tình trạng hẹp của các nhánh động mạch vành, các bất thường khác của tim và mạch máu lớn.</p><h2 id="s203-theodoi">VII. THEO DÕI VÀ XỬ TRÍ TAI BIẾN</h2><p>Tai biến liên quan đến thuốc cản quang hoặc các thuốc dùng để chuẩn bị (chẹn beta, nitroglycerin) cần được theo dõi và xử trí theo quy trình chuẩn.</p><h2 id="s203-tailieu">TÀI LIỆU THAM KHẢO</h2><ol><li>Reddinger, Handbook of CT Technique (Computed Tomography Series), WileyBlackwell, 2000.</li><li>Sumeet Bhargava, Satish K Bhargava, CT and MRI Protocol - A Practical Approach, Third Edition, Peepee, 2016.</li></ol>`
            },

                content: `<h2 id="s204-daicuong">I. ĐẠI CƯƠNG</h2><p>Chụp cắt lớp vi tính đánh giá điểm vôi hóa động mạch vành là kỹ thuật sử dụng máy CLVT không tiêm thuốc cản quang để hiển thị và định lượng các mảng xơ vữa vôi hóa trong lòng động mạch vành. Kỹ thuật này giúp xác định mức độ vôi hóa, qua đó đánh giá yếu tố nguy cơ người bệnh gặp biến cố tim mạch trong tương lai (như nhồi máu cơ tim), thường được tính theo thang điểm Agatston.</p><h2 id="s204-chidinh">II. CHỈ ĐỊNH</h2><ul><li>Sàng lọc, đánh giá yếu tố nguy cơ bệnh mạch vành ở những người có yếu tố nguy cơ trung bình như tăng huyết áp, tăng mỡ máu, thói quen hút thuốc, tiền sử gia đình, cao tuổi.</li><li>Một số chỉ định khác theo hướng dẫn chẩn đoán và điều trị do Bộ Y tế ban hành.</li></ul><h2 id="s204-chongchidinh">III. CHỐNG CHỈ ĐỊNH</h2><p>Không có chống chỉ định.</p><h2 id="s204-thantrong">IV. THẬN TRỌNG</h2><p>Phụ nữ có thai.</p><h2 id="s204-chuanbi">V. CHUẨN BỊ</h2><h3>1. Người thực hiện</h3><ul><li>Bác sỹ chẩn đoán hình ảnh.</li><li>Kỹ thuật y hình ảnh y học.</li></ul><h3>2. Trang thiết bị</h3><ul><li>Máy chụp cắt lớp vi tính đa lát cắt.</li><li>Hệ thống PACS có phần mềm tính điểm vôi hóa.</li></ul><h3>3. Người bệnh</h3><ul><li>Giải thích kỹ về thủ thuật.</li><li>Tháo bỏ các vật kim loại ở vùng ngực.</li></ul><h2 id="s204-cacbuoctienhanh">VI. CÁC BƯỚC TIẾN HÀNH</h2><ul><li><strong>Bước 1:</strong> Lắp các điện cực theo dõi điện tâm đồ (ECG) để đồng bộ hóa quá trình chụp với nhịp tim.</li><li><strong>Bước 2:</strong> Chụp định vị.</li><li><strong>Bước 3:</strong> Chụp không tiêm thuốc cản quang. Trường chụp từ chạc ba khí phế quản tới hết mỏm tim, độ dày lớp cắt khoảng 3mm. Quá trình chụp được kích hoạt đồng bộ với ECG (prospective gating) để giảm nhiễu ảnh do tim co bóp.</li><li><strong>Bước 4:</strong> Dữ liệu được chuyển sang máy trạm. Bác sĩ hoặc kỹ thuật viên sử dụng phần mềm chuyên dụng để xác định các mảng vôi hóa (thường có tỷ trọng >130 HU) và tính toán điểm vôi hóa (Agatston score) cho từng nhánh động mạch vành và tổng điểm.</li><li><strong>Bước 5:</strong> Chuyển hình ảnh và kết quả sang PACS.</li></ul><h3>Nhận định kết quả</h3><p>Kết quả được trả về dưới dạng điểm số (Agatston score), giúp phân loại nguy cơ tim mạch của người bệnh:</p><ul><li><strong>0:</strong> Nguy cơ rất thấp.</li><li><strong>1 - 100:</strong> Nguy cơ thấp.</li><li><strong>101 - 400:</strong> Nguy cơ trung bình.</li><li><strong>> 400:</strong> Nguy cơ cao.</li></ul><h2 id="s204-theodoi">VII. THEO DÕI VÀ XỬ TRÍ TAI BIẾN</h2><p>Kỹ thuật không có tai biến do không sử dụng thuốc cản quang.</p><h2 id="s204-tailieu">TÀI LIỆU THAM KHẢO</h2><ol><li>Reddinger, Handbook of CT Technique (Computed Tomography Series), WileyBlackwell, 2000.</li><li>Sumeet Bhargava, Satish K Bhargava, CT and MRI Protocol - A Practical Approach, Third Edition, Peepee, 2016.</li></ol>`
            },

                    { anchor: 's205-tailieu', title: 'Tài liệu tham khảo' },
                ],
                content: `<h2 id="s205-daicuong">I. ĐẠI CƯƠNG</h2><p>Chụp CLVT bụng-tiểu khung thường quy là quá trình thăm khám các tạng trong ổ bụng và tiểu khung trên hệ thống máy cắt lớp vi tính, thực hiện thăm khám một cách hệ thống từ vòm hoành đến khớp mu.</p><h2 id="s205-chidinh">II. CHỈ ĐỊNH</h2><ul><li>Nghi ngờ bệnh lý sỏi đường mật, sỏi hệ tiết niệu.</li><li>Đánh giá vôi hoá mạch máu, vôi hoá tạng.</li><li>Tìm dị vật trong đường tiêu hoá.</li><li>Các bệnh lý trong ổ bụng trên người bệnh suy thận hoặc có chống chỉ định với thuốc cản quang.</li><li>Một số chỉ định khác theo hướng dẫn chẩn đoán và điều trị do Bộ Y tế ban hành.</li></ul><h2 id="s205-chongchidinh">III. CHỐNG CHỈ ĐỊNH</h2><p>Không có chống chỉ định.</p><h2 id="s205-thantrong">IV. THẬN TRỌNG</h2><p>Phụ nữ có thai.</p><h2 id="s205-chuanbi">V. CHUẨN BỊ</h2><h3>1. Người thực hiện</h3><ul><li>Bác sỹ chẩn đoán hình ảnh.</li><li>Kỹ thuật y hình ảnh y học.</li><li>Điều dưỡng.</li></ul><h3>2. Trang thiết bị</h3><ul><li>Máy chụp cắt lớp vi tính đa lát cắt.</li><li>Hệ thống PACS.</li></ul><h3>3. Người bệnh</h3><ul><li>Giải thích kỹ về thủ thuật.</li><li>Cần nhịn ăn chất đặc, có thể uống một ít nước.</li></ul><h3>4. Hồ sơ bệnh án</h3><ul><li>Có phiếu chỉ định chụp CLVT bụng - tiểu khung không tiêm thuốc cản quang.</li></ul><h3>5. Thời gian thực hiện</h3><p>Khoảng 12 - 20 phút.</p><h2 id="s205-cacbuoctienhanh">VI. CÁC BƯỚC TIẾN HÀNH</h2><ul><li><strong>Bước 1:</strong> Đặt người bệnh nằm ngửa, hai tay giơ lên đầu. Chụp ảnh định vị (Scout-view) từ cơ hoành đến hết khớp mu.</li><li><strong>Bước 2:</strong> Chụp không tiêm thuốc cản quang theo chương trình xoắn ốc. Vùng cắt lớp từ sát trên vòm hoành tới khớp mu. Độ dày lớp cắt thường từ 5 - 7mm.</li><li><strong>Bước 3:</strong> Tái tạo ảnh trên 3 mặt phẳng (axial, coronal, sagittal) để phát hiện tổn thương.</li><li><strong>Bước 4:</strong> Xử trí hình ảnh thu được và chuyển sang hệ thống PACS.</li></ul><h3>Nhận định kết quả</h3><p>Bác sỹ đọc tổn thương, mô tả trên máy tính và đưa ra các định hướng chẩn đoán. Đối chiếu hình ảnh với lâm sàng.</p><h2 id="s205-theodoi">VII. THEO DÕI VÀ XỬ TRÍ TAI BIẾN</h2><p>Kỹ thuật không có tai biến. Một số trường hợp có thể phải chụp lại do người bệnh cử động.</p><h2 id="s205-tailieu">TÀI LIỆU THAM KHẢO</h2><ol><li>Reddinger, Handbook of CT Technique (Computed Tomography Series), WileyBlackwell, 2000.</li><li>Sumeet Bhargava, Satish K Bhargava, CT and MRI Protocol - A Practical Approach, Third Edition, Peepee, 2016.</li></ol>`

                ],
                content: `<h2 id="s206-daicuong">I. ĐẠI CƯƠNG</h2><p>Chụp CLVT bụng-tiểu khung thường quy có tiêm thuốc cản quang là quá trình thăm khám các tạng trong ổ bụng và tiểu khung, giúp đánh giá chi tiết các tổn thương dựa vào đặc tính ngấm thuốc sau tiêm.</p><h2 id="s206-chidinh">II. CHỈ ĐỊNH</h2><ul><li><strong>Gan:</strong> bệnh cảnh u gan, viêm hoặc áp xe gan, bệnh cảnh chấn thương gan.</li><li><strong>Đường mật-túi mật:</strong> sỏi đường mật-túi mật; u đường mật-túi mật.</li><li><strong>Tụy:</strong> viêm tụy cấp-mãn; các khối u tụy.</li><li><strong>Lách:</strong> u, chấn thương.</li><li><strong>Ống tiêu hóa:</strong> xuất huyết tiêu hóa, bệnh cảnh chấn thương; bệnh lý u, viêm.</li><li>Nghi ngờ các khối u mạc treo, các ổ áp xe trong ổ bụng-tiểu khung.</li><li>Bệnh cảnh nghi ngờ viêm bờm mỡ mạc treo, hoại tử mạc nối.</li></ul><h2 id="s206-chongchidinh">III. CHỐNG CHỈ ĐỊNH</h2><p>Không có chống chỉ định tuyệt đối.</p><h2 id="s206-thantrong">IV. THẬN TRỌNG</h2><ul><li>Người bệnh có thai.</li><li>Người bệnh có chống chỉ định dùng thuốc cản quang i-ốt (suy thận, dị ứng nặng).</li></ul><h2 id="s206-chuanbi">V. CHUẨN BỊ</h2><h3>1. Người thực hiện</h3><ul><li>Bác sỹ chẩn đoán hình ảnh, Kỹ thuật viên, Điều dưỡng.</li></ul><h3>2. Trang thiết bị, vật tư</h3><ul><li>Máy CLVT đa lát cắt (>=32 lát), máy bơm điện, hệ thống PACS.</li><li>Thuốc cản quang, kim tiêm, hộp thuốc cấp cứu.</li></ul><h3>3. Người bệnh</h3><ul><li>Giải thích kỹ, ký cam kết.</li><li>Nhịn ăn chất đặc trước 4-6 giờ.</li></ul><h2 id="s206-cacbuoctienhanh">VI. CÁC BƯỚC TIẾN HÀNH</h2><ul><li><strong>Bước 1:</strong> Chụp ảnh định vị (Scout-view) từ cơ hoành đến hết khớp mu.</li><li><strong>Bước 2: Chụp không tiêm thuốc cản quang:</strong> Chụp xoắn ốc toàn bộ vùng bụng - tiểu khung.</li><li><strong>Bước 3: Tiêm thuốc cản quang:</strong> Tiêm tĩnh mạch thuốc cản quang i-ốt với liều 2ml/kg, tốc độ tiêm 2.5-3 ml/giây.</li><li><strong>Bước 4:</strong> Chụp các thì sau tiêm:<ul><li><strong>Thì động mạch:</strong> sau tiêm 25-45 giây.</li><li><strong>Thì tĩnh mạch:</strong> sau tiêm 70-80 giây.</li><li><strong>Thì muộn:</strong> có thể chụp thêm nếu nghi ngờ có tổn thương đường bài xuất hệ tiết niệu.</li></ul></li><li><strong>Bước 5:</strong> Chuyển hình ảnh sang PACS.</li><li><strong>Bước 6:</strong> Theo dõi người bệnh sau khi chụp, băng ép vị trí tiêm.</li></ul><h3>Nhận định kết quả</h3><p>Bác sỹ đọc tổn thương, mô tả đặc điểm ngấm thuốc, đối chiếu hình ảnh và lâm sàng để đưa ra chẩn đoán.</p><h2 id="s206-theodoi">VII. THEO DÕI VÀ XỬ TRÍ TAI BIẾN</h2><p>Tai biến liên quan đến thuốc cản quang cần được theo dõi và xử trí theo quy trình chuẩn.</p><h2 id="s206-tailieu">TÀI LIỆU THAM KHẢO</h2><ol><li>Reddinger, Handbook of CT Technique (Computed Tomography Series), WileyBlackwell, 2000.</li><li>Sumeet Bhargava, Satish K Bhargava, CT and MRI Protocol - A Practical Approach, Third Edition, Peepee, 2016.</li></ol>`

                content: `<h2 id="s207-daicuong">I. ĐẠI CƯƠNG</h2><p>Chụp CLVT ổ bụng khảo sát mạch các tạng là quá trình thăm khám các tạng và hệ thống mạch máu nuôi dưỡng (gan, mật, tụy, lách, dạ dày, tá tràng...) trên hệ thống máy đa lát cắt, có phần mềm xử lý, tái tạo và dựng hình mạch máu. Kỹ thuật này cho phép đánh giá hình thái bình thường và bệnh lý của các mạch cấp máu, cuống mạch của tổn thương u, dị dạng mạch...</p><h2 id="s207-chidinh">II. CHỈ ĐỊNH</h2><ul><li><strong>Gan:</strong> u gan, viêm, áp xe, chấn thương.</li><li><strong>Đường mật-túi mật:</strong> sỏi, u đường mật.</li><li><strong>Tụy:</strong> viêm tụy, khối u tụy.</li><li><strong>Lách:</strong> u, chấn thương.</li><li><strong>Ống tiêu hóa:</strong> xuất huyết tiêu hóa, chấn thương, u.</li><li>Bilan trước và kiểm tra sau ghép tạng.</li><li>Đánh giá huyết khối hệ thống tĩnh mạch cửa, tĩnh mạch gan.</li><li>Nghi ngờ huyết khối các nhánh động mạch thân tạng, động mạch mạc treo tràng trên.</li></ul><h2 id="s207-chongchidinh">III. CHỐNG CHỈ ĐỊNH</h2><p>Không có chống chỉ định tuyệt đối.</p><h2 id="s207-thantrong">IV. THẬN TRỌNG</h2><ul><li>Người bệnh có thai.</li><li>Người có chống chỉ định dùng thuốc cản quang i-ốt hoặc tiền sử dị ứng.</li></ul><h2 id="s207-chuanbi">V. CHUẨN BỊ</h2><h3>1. Người thực hiện và trang thiết bị</h3><ul><li>Bác sỹ chẩn đoán hình ảnh, Kỹ thuật viên, Điều dưỡng.</li><li>Máy CLVT đa lát cắt (>=32 lát), máy bơm điện, hệ thống PACS.</li><li>Thuốc cản quang, vật tư y tế cần thiết và hộp thuốc cấp cứu.</li></ul><h3>2. Người bệnh</h3><ul><li>Giải thích, ký cam kết.</li><li>Nhịn ăn, uống trước 4 giờ.</li></ul><h2 id="s207-cacbuoctienhanh">VI. CÁC BƯỚC TIẾN HÀNH</h2><ul><li><strong>Bước 1:</strong> Chụp ảnh định vị (Scout-view) từ cơ hoành đến hết khớp mu.</li><li><strong>Bước 2: Chụp không tiêm thuốc cản quang:</strong> Chụp xoắn ốc toàn bộ vùng bụng - tiểu khung.</li><li><strong>Bước 3: Tiêm thuốc cản quang:</strong> Sử dụng kỹ thuật “bolus tracking” để xác định thời điểm chụp tối ưu. Liều thuốc 2ml/kg, tốc độ tiêm 2-5 ml/giây.</li><li><strong>Bước 4: Chụp thì động mạch:</strong> Thời gian trễ khoảng 25-30 giây.</li><li><strong>Bước 5: Chụp thì tĩnh mạch:</strong> Thời gian trễ khoảng 40-60 giây.</li><li><strong>Bước 6: Xử lý hình ảnh:</strong> Tái tạo hình ảnh trên các phần mềm chuyên dụng (3D MPR, MIP, VRT) để dựng hình đa hướng và bộc lộ các bất thường.</li><li><strong>Bước 7:</strong> Chuyển hình ảnh sang PACS.</li><li><strong>Bước 8:</strong> Theo dõi người bệnh sau chụp.</li></ul><h3>Nhận định kết quả</h3><p>Bác sỹ đọc tổn thương, mô tả trên máy tính, đối chiếu hình ảnh và lâm sàng để đưa ra chẩn đoán.</p><h2 id="s207-theodoi">VII. THEO DÕI VÀ XỬ TRÍ TAI BIẾN</h2><p>Tai biến liên quan đến thuốc cản quang cần được theo dõi và xử trí theo quy trình chuẩn.</p><h2 id="s207-tailieu">TÀI LIỆU THAM KHẢO</h2><ol><li>Reddinger, Handbook of CT Technique (Computed Tomography Series), WileyBlackwell, 2000.</li><li>Sumeet Bhargava, Satish K Bhargava, CT and MRI Protocol - A Practical Approach, Third Edition, Peepee, 2016.</li></ol>`

                    { anchor: 's208-tailieu', title: 'Tài liệu tham khảo' },
                ],
                content: `<h2 id="s208-daicuong">I. ĐẠI CƯƠNG</h2><p>Chụp CLVT hệ tiết niệu khảo sát mạch thận và dựng hình đường bài xuất (CT Urography hay CT-UIV) là kỹ thuật hình ảnh đa pha, sử dụng thuốc cản quang để đánh giá toàn diện về cấu trúc và hình thái của thận (nhu mô, mạch máu) và hệ thống đường bài xuất (đài-bể thận, niệu quản, bàng quang).</p><h2 id="s208-chidinh">II. CHỈ ĐỊNH</h2><ul><li>Bất thường hệ tiết niệu, đái máu.</li><li>Viêm nhiễm hệ tiết niệu (viêm thận bể thận, áp xe...).</li><li>U thận, bệnh lý mạch thận (hẹp, phình động mạch thận).</li><li>Sỏi tiết niệu (sỏi thận, sỏi niệu quản...), thận ứ nước.</li><li>Đau quặn thận.</li><li>Khảo sát giải phẫu động tĩnh mạch thận và đường bài xuất trước ghép tạng.</li></ul><h2 id="s208-chongchidinh">III. CHỐNG CHỈ ĐỊNH</h2><p>Không có chống chỉ định tuyệt đối.</p><h2 id="s208-thantrong">IV. THẬN TRỌNG</h2><ul><li>Người bệnh có thai.</li><li>Chống chỉ định tiêm thuốc cản quang i-ốt (suy thận nặng, dị ứng...).</li></ul><h2 id="s208-chuanbi">V. CHUẨN BỊ</h2><h3>1. Người thực hiện và trang thiết bị</h3><ul><li>Bác sỹ chẩn đoán hình ảnh, Kỹ thuật viên, Điều dưỡng.</li><li>Máy CLVT đa lát cắt (từ 32 lát trở lên), máy bơm điện, hệ thống PACS.</li></ul><h3>2. Người bệnh</h3><ul><li>Giải thích, ký cam kết.</li><li>Nhịn ăn, uống trước 4 giờ.</li></ul><h2 id="s208-cacbuoctienhanh">VI. CÁC BƯỚC TIẾN HÀNH</h2><ul><li><strong>Bước 1:</strong> Chụp ảnh định vị (Scout-view) từ cơ hoành đến hết khớp mu.</li><li><strong>Bước 2: Chụp không tiêm thuốc:</strong> Lấy toàn bộ hệ tiết niệu để phát hiện sỏi cản quang.</li><li><strong>Bước 3: Tiêm thuốc cản quang:</strong> Sử dụng kỹ thuật "bolus tracking" để tối ưu hóa thời điểm chụp. Liều lượng 2ml/kg, tốc độ tiêm 2-5 ml/giây.</li><li><strong>Bước 4: Chụp thì động mạch (thì vỏ thận):</strong> Thời gian trễ khoảng 25-30 giây, tập trung vùng thận để đánh giá động mạch thận và vỏ thận.</li><li><strong>Bước 5: Chụp thì tĩnh mạch (thì nhu mô):</strong> Thời gian trễ khoảng 60-80 giây, tập trung vùng thận để đánh giá nhu mô thận.</li><li><strong>Bước 6: Chụp thì muộn (thì bài xuất):</strong> Sau tiêm 5-7 phút (có thể muộn hơn tùy chức năng thận), lấy toàn bộ đường tiết niệu để đánh giá đài-bể thận, niệu quản, bàng quang.</li><li><strong>Bước 7: Xử lý hình ảnh:</strong> Tái tạo hình ảnh trên các phần mềm chuyên dụng (MPR, MIP, VRT) để dựng hình đa hướng, dựng hình đường bài xuất và các bất thường.</li><li><strong>Bước 8:</strong> Chuyển hình ảnh sang PACS.</li><li><strong>Bước 9:</strong> Theo dõi người bệnh sau chụp.</li></ul><h3>Nhận định kết quả</h3><p>Hình ảnh hiển thị rõ các cấu trúc giải phẫu hệ tiết niệu, mạch máu và đường bài xuất. Phát hiện được tổn thương nếu có.</p><h2 id="s208-theodoi">VII. THEO DÕI VÀ XỬ TRÍ TAI BIẾN</h2><p>Tai biến liên quan đến thuốc cản quang cần được theo dõi và xử trí theo quy trình.</p><h2 id="s208-tailieu">TÀI LIỆU THAM KHẢO</h2><ol><li>Reddinger, Handbook of CT Technique (Computed Tomography Series), WileyBlackwell, 2000.</li><li>Sumeet Bhargava, Satish K Bhargava, CT and MRI Protocol - A Practical Approach, Third Edition, Peepee, 2016.</li></ol>`
            },
            { 
                id: 209, 
                title: "Chụp Cắt Lớp Vi Tính Gan Có Dựng Hình Đường Mật", 
                procedure: "Quy trình 209", 
                category: "Bụng - Tiểu khung", 
                subheadings: [
                    { anchor: 's209-daicuong', title: 'I. Đại cương' },
                    { anchor: 's209-chidinh', title: 'II. Chỉ định' },
                    { anchor: 's209-chongchidinh', title: 'III. Chống chỉ định' },
                    { anchor: 's209-thantrong', title: 'IV. Thận trọng' },
                    { anchor: 's209-chuanbi', title: 'V. Chuẩn bị' },
                    { anchor: 's209-cacbuoctienhanh', title: 'VI. Các bước tiến hành' },
                    { anchor: 's209-theodoi', title: 'VII. Theo dõi và xử trí tai biến' },
                    { anchor: 's209-tailieu', title: 'Tài liệu tham khảo' },
                ],
                content: `<h2 id="s209-daicuong">I. ĐẠI CƯƠNG</h2><p>Chụp CLVT gan có dựng hình đường mật là kỹ thuật hình ảnh tiên tiến, sử dụng máy CLVT đa lát cắt và thuốc cản quang để đánh giá chi tiết nhu mô gan và tái tạo lại toàn bộ cây đường mật trong và ngoài gan. Kỹ thuật này đặc biệt hữu ích trong việc chẩn đoán các bệnh lý gây tắc nghẽn hoặc biến dạng đường mật.</p><h2 id="s209-chidinh">II. CHỈ ĐỊNH</h2><ul><li>Nghi ngờ sỏi đường mật, giãn đường mật.</li><li>Đánh giá hẹp, tắc nghẽn, u đường mật.</li><li>Bất thường giải phẫu ống mật (dị dạng bẩm sinh).</li><li>Theo dõi sau phẫu thuật đường mật (nối mật–ruột, đặt stent mật).</li><li>Một số chỉ định khác theo hướng dẫn chẩn đoán và điều trị do Bộ Y tế ban hành.</li></ul><h2 id="s209-chongchidinh">III. CHỐNG CHỈ ĐỊNH</h2><p>Không có chống chỉ định tuyệt đối.</p><h2 id="s209-thantrong">IV. THẬN TRỌNG</h2><ul><li>Người bệnh có thai.</li><li>Người có chống chỉ định dùng thuốc cản quang i-ốt.</li></ul><h2 id="s209-chuanbi">V. CHUẨN BỊ</h2><h3>1. Người thực hiện và trang thiết bị</h3><ul><li>Bác sỹ chẩn đoán hình ảnh, Kỹ thuật viên, Điều dưỡng.</li><li>Máy CLVT đa lát cắt (>=32 lát), máy bơm điện, hệ thống PACS.</li></ul><h3>2. Người bệnh</h3><ul><li>Giải thích, ký cam kết.</li><li>Nhịn ăn, uống trước 4 giờ.</li></ul><h2 id="s209-cacbuoctienhanh">VI. CÁC BƯỚC TIẾN HÀNH</h2><ul><li><strong>Bước 1:</strong> Chụp ảnh định vị (Scout-view) từ cơ hoành đến hết khớp mu.</li><li><strong>Bước 2: Chụp không tiêm thuốc:</strong> Lấy toàn bộ gan để tìm sỏi cản quang, vôi hóa.</li><li><strong>Bước 3: Tiêm thuốc cản quang:</strong> Liều lượng 2ml/kg, tốc độ tiêm 2-5 ml/giây.</li><li><strong>Bước 4: Chụp các thì động mạch và tĩnh mạch:</strong> Tương tự chụp bụng thường quy để đánh giá nhu mô gan và các tổn thương liên quan.</li><li><strong>Bước 5: Chụp thì muộn (thì mật):</strong> Chụp sau khi tiêm thuốc khoảng 10-15 phút (hoặc lâu hơn tùy loại thuốc cản quang chuyên biệt cho đường mật). Ở thì này, thuốc cản quang được bài tiết vào đường mật, làm hiện hình rõ cây đường mật.</li><li><strong>Bước 6: Xử lý hình ảnh:</strong> Dùng phần mềm chuyên dụng (MPR, MIP, 3D volume rendering) để tái tạo, dựng hình giải phẫu cây đường mật từ dữ liệu thì muộn.</li><li><strong>Bước 7:</strong> Chuyển hình ảnh sang PACS.</li><li><strong>Bước 8:</strong> Theo dõi người bệnh sau chụp.</li></ul><h3>Nhận định kết quả</h3><p>Hình ảnh tái tạo cho thấy rõ ràng cây đường mật, giúp xác định vị trí, nguyên nhân và mức độ của tắc nghẽn hoặc các bất thường khác.</p><h2 id="s209-theodoi">VII. THEO DÕI VÀ XỬ TRÍ TAI BIẾN</h2><p>Tai biến liên quan đến thuốc cản quang cần được theo dõi và xử trí theo quy trình.</p><h2 id="s209-tailieu">TÀI LIỆU THAM KHẢO</h2><ol><li>Federle, M. P., Jeffrey, R. B., & Woodward, P. J. (2016). Diagnostic Imaging: Abdomen (2nd ed.). Elsevier.</li><li>Gore, R. M., & Levine, M. S. (2014). Textbook of Gastrointestinal Radiology (4th ed.). Saunders.</li></ol>`
            },
            { 
                id: 210, 
                title: "Chụp CLVT Tạng Khảo Sát Huyết Động Học Khối U (CT Perfusion)", 
                procedure: "Quy trình 210", 
                category: "Bụng - Tiểu khung", 
                subheadings: [
                    { anchor: 's210-daicuong', title: 'I. Đại cương' },
                    { anchor: 's210-chidinh', title: 'II. Chỉ định' },
                    { anchor: 's210-chongchidinh', title: 'III. Chống chỉ định' },
                    { anchor: 's210-thantrong', title: 'IV. Thận trọng' },
                    { anchor: 's210-chuanbi', title: 'V. Chuẩn bị' },
                    { anchor: 's210-cacbuoctienhanh', title: 'VI. Các bước tiến hành' },
                    { anchor: 's210-theodoi', title: 'VII. Theo dõi và xử trí tai biến' },
                    { anchor: 's210-tailieu', title: 'Tài liệu tham khảo' },
                ],
                content: `<h2 id="s210-daicuong">I. ĐẠI CƯƠNG</h2><p>Chụp cắt lớp vi tính khảo sát huyết động học khối u (CT perfusion) là kỹ thuật dùng máy CT đa lát để ghi nhận liên tục dòng thuốc cản quang qua mô khối u trong một khoảng thời gian, từ đó tính toán các thông số tưới máu mô (như lưu lượng máu – BF, thể tích máu – BV, thời gian lưu thuốc – MTT, tính thấm – PS). Kỹ thuật này giúp đánh giá tưới máu, tính thấm mạch, đáp ứng điều trị và mức độ ác tính của khối u.</p><h2 id="s210-chidinh">II. CHỈ ĐỊNH</h2><ul><li>Khối u gan (HCC), di căn gan.</li><li>U phổi, u tụy, u thận…</li><li>Khảo sát mạch máu u trước phẫu thuật hoặc can thiệp.</li><li>Một số chỉ định khác theo hướng dẫn chẩn đoán và điều trị do Bộ Y tế ban hành.</li></ul><h2 id="s210-chongchidinh">III. CHỐNG CHỈ ĐỊNH</h2><p>Không có chống chỉ định.</p><h2 id="s210-thantrong">IV. THẬN TRỌNG</h2><ul><li>Người bệnh có chống chỉ định dùng thuốc cản quang i-ốt.</li><li>Phụ nữ có thai.</li></ul><h2 id="s210-chuanbi">V. CHUẨN BỊ</h2><h3>1. Người thực hiện và trang thiết bị</h3><ul><li>Bác sỹ chẩn đoán hình ảnh, Kỹ thuật viên, Điều dưỡng.</li><li>Máy CLVT đa lát cắt (>=32 lát), máy bơm điện, hệ thống PACS.</li></ul><h3>2. Người bệnh</h3><ul><li>Giải thích kỹ, ký cam kết.</li><li>Nhịn ăn, uống trước 4 giờ.</li></ul><h2 id="s210-cacbuoctienhanh">VI. CÁC BƯỚC TIẾN HÀNH</h2><ul><li><strong>Bước 1:</strong> Chụp ảnh định vị (Scout-view) để xác định vùng khảo sát chứa tổn thương.</li><li><strong>Bước 2:</strong> Chụp một chuỗi hình ảnh động (dynamic scan) tại vị trí khối u. Quá trình này bắt đầu ngay trước khi tiêm thuốc và kéo dài khoảng 45-60 giây sau khi tiêm.</li><li><strong>Bước 3:</strong> Tiêm nhanh một liều thuốc cản quang (bolus) qua đường tĩnh mạch với tốc độ cao (4-5 ml/giây).</li><li><strong>Bước 4: Xử lý hình ảnh:</strong> Dùng phần mềm perfusion chuyên dụng để dựng bản đồ màu (color map) thể hiện các thông số:<ul><li><strong>BF (Blood Flow – lưu lượng máu, mL/100g/min)</strong></li><li><strong>BV (Blood Volume – thể tích máu, mL/100g)</strong></li><li><strong>MTT (Mean Transit Time – thời gian lưu trung bình, giây)</strong></li><li><strong>PS (Permeability Surface – tính thấm mạch, mL/100g/min)</strong></li></ul></li><li><strong>Bước 5:</strong> Xác định vùng quan tâm (ROI) tại mô u và mô lành lân cận để so sánh các giá trị tưới máu.</li><li><strong>Bước 6:</strong> Chuyển hình ảnh và bản đồ tưới máu sang PACS.</li></ul><h3>Nhận định kết quả</h3><p>So sánh các thông số tưới máu của khối u với mô lành giúp đánh giá mức độ tăng sinh mạch, độ ác tính và theo dõi đáp ứng với các phương pháp điều trị như hóa trị hay xạ trị.</p><h2 id="s210-theodoi">VII. THEO DÕI VÀ XỬ TRÍ TAI BIẾN</h2><p>Tai biến liên quan đến thuốc cản quang cần được theo dõi và xử trí theo quy trình.</p><h2 id="s210-tailieu">TÀI LIỆU THAM KHẢO</h2><ol><li>Miles, K. A. (2013). CT Perfusion Imaging in Oncology: Protocols, Practical Aspects and Clinical Applications. Springer.</li><li>Federle, M. P., & Jeffrey, R. B. (2016). Diagnostic Imaging: Abdomen (2nd ed.). Elsevier.</li><li>Sahani, D. V., & Kalva, S. P. (2004). Advances in CT Imaging for Hepatocellular Carcinoma. Cancer, 101(3), 408–423.</li></ol>`
            },
            { 
                id: 211, 
                title: "Chụp CLVT Ruột Non (Entero-Scan) Không Dùng Sonde, Không Tiêm Thuốc Cản Quang", 
                procedure: "Quy trình 211", 
                category: "Bụng - Tiểu khung", 
                subheadings: [
                    { anchor: 's211-daicuong', title: 'I. Đại cương' },
                    { anchor: 's211-chidinh', title: 'II. Chỉ định' },
                    { anchor: 's211-chongchidinh', title: 'III. Chống chỉ định' },
                    { anchor: 's211-thantrong', title: 'IV. Thận trọng' },
                    { anchor: 's211-chuanbi', title: 'V. Chuẩn bị' },
                    { anchor: 's211-cacbuoctienhanh', title: 'VI. Các bước tiến hành' },
                    { anchor: 's211-theodoi', title: 'VII. Theo dõi và xử trí tai biến' },
                    { anchor: 's211-tailieu', title: 'Tài liệu tham khảo' },
                ],
                content: `<h2 id="s211-daicuong">I. ĐẠI CƯƠNG</h2><p>Chụp CLVT ruột non không dùng ống thông là phương pháp thăm khám xâm nhập tối thiểu nhằm phát hiện bệnh lý ruột non. Người bệnh được làm giãn ruột non bằng phương pháp uống nước qua đường miệng, sau đó chụp cắt lớp vi tính không tiêm thuốc cản quang.</p><h2 id="s211-chidinh">II. CHỈ ĐỊNH</h2><ul><li>Bệnh cảnh tắc ruột không hoàn toàn, hoặc tắc ruột thấp do dây chằng hay các nguyên nhân khác (chiếu xạ, viêm nhiễm, nhiễm trùng…).</li><li>Một số chỉ định khác theo hướng dẫn chẩn đoán và điều trị do Bộ Y tế ban hành.</li></ul><h2 id="s211-chongchidinh">III. CHỐNG CHỈ ĐỊNH</h2><p>Không có chống chỉ định.</p><h2 id="s211-thantrong">IV. THẬN TRỌNG</h2><p>Phụ nữ có thai.</p><h2 id="s211-chuanbi">V. CHUẨN BỊ</h2><h3>1. Người thực hiện</h3><ul><li>Bác sỹ chẩn đoán hình ảnh.</li><li>Kỹ thuật y hình ảnh y học.</li><li>Điều dưỡng.</li></ul><h3>2. Trang thiết bị</h3><ul><li>Máy chụp cắt lớp vi tính đa lát cắt.</li><li>Hệ thống PACS.</li></ul><h3>3. Người bệnh</h3><ul><li>Giải thích kỹ về thủ thuật.</li><li>Nhịn ăn trước 6 giờ.</li><li>Người bệnh được uống khoảng 1800ml đến 2000ml dung dịch đối quang trung tính (NaCl 9‰), chia làm 4 lần, mỗi lần 400 - 450ml, uống cách nhau 15-20 phút. Sau đó uống tiếp 200ml ngay trước khi thực hiện các lớp cắt.</li><li>Để làm giảm nhu động ruột non, có thể dùng các thuốc chống co thắt.</li></ul><h2 id="s211-cacbuoctienhanh">VI. CÁC BƯỚC TIẾN HÀNH</h2><ul><li><strong>Bước 1:</strong> Tạo ảnh định khu trên mặt phẳng trán.</li><li><strong>Bước 2:</strong> Chụp xoắn ốc từ vòm hoành đến tiểu khung, không tiêm thuốc cản quang, độ dày các lớp cắt 5mm.</li><li><strong>Bước 3:</strong> Tái tạo hình ảnh cửa sổ bụng. Chuyển dữ liệu sang trạm làm việc để xử trí hình ảnh trên các phần mềm MPR, MIP, VR, 3D….</li><li><strong>Bước 4:</strong> Chuyển hình ảnh sang PACS hoặc in phim.</li></ul><h3>Nhận định kết quả</h3><p>Bác sỹ đọc tổn thương, mô tả trên máy tính, đối chiếu hình ảnh và lâm sàng để đưa ra chẩn đoán.</p><h2 id="s211-theodoi">VII. THEO DÕI VÀ XỬ TRÍ TAI BIẾN</h2><ul><li>Sau khi thực hiện xong, người bệnh được lưu lại phòng chờ 30 phút.</li><li>Rối loạn tiêu hóa, tiêu chảy: do uống nhiều nước. Chỉ cần điều trị nội khoa.</li></ul><h2 id="s211-tailieu">TÀI LIỆU THAM KHẢO</h2><ol><li>Reddinger, Handbook of CT Technique (Computed Tomography Series), WileyBlackwell, 2000.</li><li>Sumeet Bhargava, Satish K Bhargava, CT and MRI Protocol - A Practical Approach, Third Edition, Peepee, 2016.</li></ol>`
            },
            { 
                id: 212, 
                title: "Chụp CLVT Ruột Non (Entero-Scan) Không Dùng Sonde, Có Tiêm Thuốc Cản Quang", 
                procedure: "Quy trình 212", 
                category: "Bụng - Tiểu khung", 
                subheadings: [
                    { anchor: 's212-daicuong', title: 'I. Đại cương' },
                    { anchor: 's212-chidinh', title: 'II. Chỉ định' },
                    { anchor: 's212-chongchidinh', title: 'III. Chống chỉ định' },
                    { anchor: 's212-thantrong', title: 'IV. Thận trọng' },
                    { anchor: 's212-chuanbi', title: 'V. Chuẩn bị' },
                    { anchor: 's212-cacbuoctienhanh', title: 'VI. Các bước tiến hành' },
                    { anchor: 's212-theodoi', title: 'VII. Theo dõi và xử trí tai biến' },
                    { anchor: 's212-tailieu', title: 'Tài liệu tham khảo' },
                ],
                content: `<h2 id="s212-daicuong">I. ĐẠI CƯƠNG</h2><p>Chụp CLVT ruột non không dùng ống thông là phương pháp thăm khám xâm nhập tối thiểu nhằm phát hiện bệnh lý ruột non. Người bệnh được làm giãn ruột non bằng phương pháp uống nước qua đường miệng, sau đó chụp cắt lớp vi tính trước và sau tiêm thuốc cản quang.</p><h2 id="s212-chidinh">II. CHỈ ĐỊNH</h2><ul><li>Phát hiện các khối u ruột non trong bệnh cảnh chảy máu tiêu hóa, thiếu máu mãn tính không phát hiện được trên nội soi.</li><li>Bệnh cảnh tắc ruột không hoàn toàn hoặc tắc ruột thấp do dây chằng hay các nguyên nhân khác.</li><li>Trong bệnh Crohn nhằm phát hiện các đường rò tiêu hóa, tắc ruột thấp.</li><li>Bệnh lý co kéo mạc treo nhằm tìm kiếm các nguyên nhân u hoặc tổn thương tiền ung thư.</li></ul><h2 id="s212-chongchidinh">III. CHỐNG CHỈ ĐỊNH</h2><ul><li>Dị ứng với thuốc cản quang đường tĩnh mạch.</li><li>Tắc ruột hoàn toàn.</li></ul><h2 id="s212-thantrong">IV. THẬN TRỌNG</h2><ul><li>Người bệnh có thai.</li><li>Người bệnh có chống chỉ định dùng thuốc cản quang i-ốt.</li></ul><h2 id="s212-chuanbi">V. CHUẨN BỊ</h2><h3>1. Người thực hiện và trang thiết bị</h3><ul><li>Bác sỹ chẩn đoán hình ảnh, Kỹ thuật viên, Điều dưỡng.</li><li>Máy CLVT đa lát cắt (>=32 lát), máy bơm điện, hệ thống PACS.</li></ul><h3>2. Người bệnh</h3><ul><li>Giải thích kỹ, ký cam kết.</li><li>Nhịn ăn trước 6 giờ.</li><li>Uống khoảng 1800-2000ml dung dịch đối quang trung tính (nước muối sinh lý) trong khoảng 1 giờ trước khi chụp.</li><li>Sử dụng thuốc chống co thắt để giảm nhu động ruột.</li></ul><h2 id="s212-cacbuoctienhanh">VI. CÁC BƯỚC TIẾN HÀNH</h2><ul><li><strong>Bước 1:</strong> Chuẩn bị người bệnh như trên.</li><li><strong>Bước 2: Chụp không tiêm thuốc:</strong> Chụp xoắn ốc từ vòm hoành đến tiểu khung để đánh giá ban đầu.</li><li><strong>Bước 3: Tiêm thuốc cản quang:</strong> Tiêm tĩnh mạch bằng máy bơm tự động, liều 2ml/kg, tốc độ 3.5–5 ml/giây.</li><li><strong>Bước 4: Chụp các thì sau tiêm:</strong> Chụp ở thì động mạch (25-30 giây) và thì tĩnh mạch cửa (65-70 giây).</li><li><strong>Bước 5: Tái tạo hình ảnh:</strong> Tái tạo hình ảnh đa bình diện (MPR), tương phản tối đa (MIP), và thể tích (VRT) để đánh giá chi tiết thành ruột, mạch máu mạc treo và các tổn thương.</li><li><strong>Bước 6:</strong> Chuyển hình ảnh sang PACS.</li></ul><h3>Nhận định kết quả</h3><p>Bác sỹ đọc tổn thương, mô tả đặc điểm ngấm thuốc của thành ruột, các tổn thương trong và ngoài lòng ruột, tình trạng mạch máu.</p><h2 id="s212-theodoi">VII. THEO DÕI VÀ XỬ TRÍ TAI BIẾN</h2><ul><li>Theo dõi người bệnh 30 phút sau chụp.</li><li>Rối loạn tiêu hóa do uống nhiều nước.</li><li>Tai biến liên quan đến thuốc cản quang cần được xử trí theo quy trình.</li></ul><h2 id="s212-tailieu">TÀI LIỆU THAM KHẢO</h2><ol><li>Reddinger, Handbook of CT Technique (Computed Tomography Series), WileyBlackwell, 2000.</li><li>Sumeet Bhargava, Satish K Bhargava, CT and MRI Protocol - A Practical Approach, Third Edition, Peepee, 2016.</li></ol>`
            },

                ],
                content: `<h2 id="s213-daicuong">I. ĐẠI CƯƠNG</h2><p>Chụp CLVT ruột non có dùng ống thông là phương pháp thăm khám xâm nhập, người bệnh được làm giãn ruột non bằng cách đặt ống thông vào hỗng tràng qua đường mũi – họng, sau đó bơm nước vào ruột non để làm giãn các quai ruột. Tiếp theo là thực hiện chụp CLVT trước và sau tiêm thuốc cản quang để đánh giá chi tiết tổn thương.</p><h2 id="s213-chidinh">II. CHỈ ĐỊNH</h2><ul><li>Phát hiện các khối u ruột non trong bệnh cảnh chảy máu tiêu hóa, thiếu máu mãn tính không phát hiện được trên nội soi.</li><li>Bệnh cảnh tắc ruột không hoàn toàn hoặc tắc ruột thấp.</li><li>Trong bệnh Crohn nhằm phát hiện các đường rò tiêu hóa, tắc ruột thấp.</li><li>Bệnh lý co kéo mạc treo (u, viêm loét ruột non).</li></ul><h2 id="s213-chongchidinh">III. CHỐNG CHỈ ĐỊNH</h2><ul><li>Dị ứng với thuốc cản quang đường tĩnh mạch.</li><li>Không thể đặt ống thông vào ruột non.</li><li>Rối loạn cơ thắt thực quản, hẹp nặng hoặc bất thường chỗ nối thực quản.</li><li>Tắc ruột hoàn toàn.</li></ul><h2 id="s213-thantrong">IV. THẬN TRỌNG</h2><ul><li>Người bệnh có thai.</li><li>Người bệnh có chống chỉ định dùng thuốc cản quang i-ốt.</li></ul><h2 id="s213-chuanbi">V. CHUẨN BỊ</h2><h3>1. Người thực hiện và trang thiết bị</h3><ul><li>Bác sỹ chẩn đoán hình ảnh, Kỹ thuật viên, Điều dưỡng.</li><li>Máy CLVT đa lát cắt, máy X-quang tăng sáng, máy bơm điện, hệ thống PACS.</li></ul><h3>2. Người bệnh</h3><ul><li>Giải thích kỹ, ký cam kết, nhịn ăn trước 6 giờ.</li></ul><h2 id="s213-cacbuoctienhanh">VI. CÁC BƯỚC TIẾN HÀNH</h2><ul><li><strong>Bước 1: Đặt ống thông ruột non:</strong> Ống thông được đặt vào tá tràng qua đường mũi dưới hướng dẫn của X-quang tăng sáng, đến tận góc Treitz và được cố định.</li><li><strong>Bước 2: Bơm nước làm căng ruột:</strong> Bơm khoảng 1500ml nước qua ống thông với tốc độ 100-200ml/phút.</li><li><strong>Bước 3: Chụp CLVT:</strong><ul><li>Chụp các lớp cắt trước tiêm để đánh giá độ giãn ruột.</li><li>Tiêm tĩnh mạch thuốc làm giảm nhu động ruột.</li><li>Tiêm 120ml thuốc cản quang tĩnh mạch (tốc độ 2.5-3ml/s) và chụp xoắn ốc toàn bộ ổ bụng sau tiêm khoảng 60 giây (thì tĩnh mạch). Có thể chụp thêm thì động mạch nếu nghi ngờ chảy máu.</li></ul></li><li><strong>Bước 4: Tái tạo hình ảnh:</strong> Tái tạo đa bình diện (MPR, MIP, VR) để đánh giá chi tiết.</li><li><strong>Bước 5:</strong> Chuyển hình ảnh sang PACS.</li><li><strong>Bước 6:</strong> Theo dõi người bệnh sau chụp.</li></ul><h3>Nhận định kết quả</h3><p>Bác sỹ đọc tổn thương, mô tả và đưa ra chẩn đoán dựa trên hình ảnh chi tiết của ruột non đã được làm căng và ngấm thuốc.</p><h2 id="s213-theodoi">VII. THEO DÕI VÀ XỬ TRÍ TAI BIẾN</h2><ul><li>Theo dõi người bệnh 30 phút sau thủ thuật.</li><li>Rối loạn tiêu hóa, tiêu chảy do bơm nước.</li><li>Tai biến liên quan đến thuốc cản quang cần được xử trí theo quy trình.</li></ul><h2 id="s213-tailieu">TÀI LIỆU THAM KHẢO</h2><ol><li>Reddinger, Handbook of CT Technique (Computed Tomography Series), WileyBlackwell, 2000.</li><li>Sumeet Bhargava, Satish K Bhargava, CT and MRI Protocol - A Practical Approach, Third Edition, Peepee, 2016.</li><li>Bộ Y tế, “Hướng dẫn quy trình kỹ thuật chẩn đoán hình ảnh và điện quang can thiệp”, Nhà xuất bản y học, 2014</li></ol>`
            },

                    { anchor: 's214-tailieu', title: 'Tài liệu tham khảo' },
                ],
                content: `<h2 id="s215-daicuong">I. ĐẠI CƯƠG</h2><p>Chụp CLVT đại tràng có nội soi ảo là kỹ thuật dựng hình và nội soi ảo khung đại tràng trên máy chụp CLVT. Kỹ thuật này được thực hiện bằng cách bơm hơi hoặc dịch làm giãn khung đại tràng, sau đó chụp CLVT toàn bộ khung đại tràng không tiêm thuốc cản quang.</p><h2 id="s215-chidinh">II. CHỈ ĐỊNH</h2><ul><li>Thăm khám đại tràng đoạn gần khi nội soi không thể thăm khám được do vướng u, hẹp, gập góc…</li><li>Người bệnh có chống chỉ định với nội soi đại tràng: suy hô hấp, điều trị chống đông máu, dị ứng với thuốc trong nội soi…</li><li>Một số chỉ định khác theo hướng dẫn chẩn đoán và điều trị do Bộ Y tế ban hành.</li></ul><h2 id="s215-chongchidinh">III. CHỐNG CHỈ ĐỊNH</h2><p>Không có chống chỉ định.</p><h2 id="s215-thantrong">IV. THẬN TRỌNG</h2><p>Phụ nữ có thai.</p><h2 id="s215-chuanbi">V. CHUẨN BỊ</h2><h3>1. Người thực hiện và trang thiết bị</h3><ul><li>Bác sỹ chẩn đoán hình ảnh, Kỹ thuật viên, Điều dưỡng.</li><li>Máy CLVT đa lát cắt, hệ thống PACS.</li></ul><h3>2. Người bệnh</h3><ul><li>Giải thích kỹ về thủ thuật.</li><li>Chuẩn bị đại tràng sạch: Ngày trước khi chụp ăn ít chất xơ, ăn thức ăn lỏng, uống thuốc tẩy ruột, uống nhiều nước và nhịn ăn trước khi chụp.</li></ul><h2 id="s215-cacbuoctienhanh">VI. CÁC BƯỚC TIẾN HÀNH</h2><ul><li><strong>Bước 1: Làm căng đại tràng:</strong> Dùng thuốc giãn cơ trơn. Bơm hơi hoặc bơm nước qua ống thông đặt qua đường hậu môn cho đến khi người bệnh có thể chịu đựng được.</li><li><strong>Bước 2: Chụp tư thế nằm ngửa:</strong> Chụp không tiêm thuốc cản quang ổ bụng tư thế nằm ngửa để đánh giá xem đại tràng đã đủ căng chưa.</li><li><strong>Bước 3: Chụp tư thế nằm sấp:</strong> Đặt người bệnh nằm sấp, tiếp tục bơm hơi/dịch nếu cần và chụp lại các lát cắt lấy toàn bộ khung đại tràng.</li><li><strong>Bước 4: Xử lý hình ảnh:</strong> Dữ liệu được chuyển sang máy trạm để tái tạo hình ảnh 2D trên các mặt phẳng và 3D dưới dạng nội soi ảo.</li><li><strong>Bước 5:</strong> Chuyển hình ảnh sang PACS.</li></ul><h3>Nhận định kết quả</h3><p>Bác sỹ xem xét hình ảnh trên các lát cắt 2D và hình ảnh nội soi ảo 3D ở cả hai tư thế nằm sấp và ngửa để đánh giá độ dày thành đại tràng, mỡ xung quanh, và phát hiện các tổn thương như polyp, khối u. Quan sát được toàn bộ đại tràng và các cấu trúc khác trong ổ bụng.</p><h2 id="s215-theodoi">VII. THEO DÕI VÀ XỬ TRÍ TAI BIẾN</h2><p>Kỹ thuật không có tai biến. Một số trường hợp có thể phải chụp lại do người bệnh không giữ bất động hoặc đại tràng không đủ căng.</p><h2 id="s215-tailieu">TÀI LIỆU THAM KHẢO</h2><ol><li>Reddinger, Handbook of CT Technique (Computed Tomography Series), WileyBlackwell, 2000.</li><li>Sumeet Bhargava, Satish K Bhargava, CT and MRI Protocol - A Practical Approach, Third Edition, Peepee, 2016.</li></ol>`

                ],
                content: `<h2 id="s216-daicuong">I. ĐẠI CƯƠG</h2><p>Chụp CLVT đại tràng có nội soi ảo là kỹ thuật dựng hình và nội soi ảo khung đại tràng trên máy chụp CLVT. Kỹ thuật này được thực hiện bằng cách bơm hơi hoặc dịch làm giãn khung đại tràng, sau đó chụp CLVT toàn bộ khung đại tràng trước và sau tiêm thuốc cản quang i-ốt để đánh giá các tổn thương ngấm thuốc.</p><h2 id="s216-chidinh">II. CHỈ ĐỊNH</h2><ul><li>Thăm khám đại tràng đoạn gần khi nội soi không thể thăm khám được do vướng u, hẹp, gập góc…</li><li>Người bệnh có chống chỉ định với nội soi đại tràng: suy hô hấp, điều trị chống đông máu, dị ứng với thuốc trong nội soi…</li></ul><h2 id="s216-chongchidinh">III. CHỐNG CHỈ ĐỊNH</h2><p>Không có chống chỉ định tuyệt đối.</p><h2 id="s216-thantrong">IV. THẬN TRỌNG</h2><ul><li>Phụ nữ có thai.</li><li>Người bệnh có chống chỉ định dùng thuốc cản quang i-ốt.</li></ul><h2 id="s216-chuanbi">V. CHUẨN BỊ</h2><h3>1. Người thực hiện và trang thiết bị</h3><ul><li>Bác sỹ chẩn đoán hình ảnh, Kỹ thuật viên, Điều dưỡng.</li><li>Máy CLVT đa lát cắt, máy bơm điện, hệ thống PACS.</li></ul><h3>2. Người bệnh</h3><ul><li>Giải thích kỹ, ký cam kết.</li><li>Chuẩn bị đại tràng sạch (ăn nhẹ, thuốc xổ, thụt tháo).</li><li>Nhịn ăn trước 12 giờ.</li></ul><h2 id="s216-cacbuoctienhanh">VI. CÁC BƯỚC TIẾN HÀNH</h2><ul><li><strong>Bước 1: Làm căng đại tràng:</strong> Dùng thuốc giãn cơ trơn. Bơm hơi hoặc nước qua ống thông hậu môn.</li><li><strong>Bước 2: Chụp không tiêm thuốc:</strong> Chụp tư thế nằm ngửa để kiểm tra độ căng của đại tràng.</li><li><strong>Bước 3: Tiêm thuốc và chụp sau tiêm:</strong> Tiêm thuốc cản quang tĩnh mạch (2ml/kg, tốc độ 2-5 ml/giây) và chụp các lát cắt từ vòm hoành đến trực tràng.</li><li><strong>Bước 4: Chụp tư thế nằm sấp:</strong> Đặt người bệnh nằm sấp, bơm thêm hơi/dịch nếu cần và chụp lại toàn bộ khung đại tràng.</li><li><strong>Bước 5: Xử lý hình ảnh:</strong> Tái tạo hình ảnh 2D (MPR) và 3D (nội soi ảo).</li><li><strong>Bước 6:</strong> Chuyển hình ảnh sang PACS.</li><li><strong>Bước 7:</strong> Theo dõi người bệnh sau chụp.</li></ul><h3>Nhận định kết quả</h3><p>Đánh giá hình ảnh 2D và 3D ở cả hai tư thế, xem xét độ dày thành, mức độ ngấm thuốc của tổn thương, phát hiện polyp, u và đánh giá các cấu trúc lân cận.</p><h2 id="s216-theodoi">VII. THEO DÕI VÀ XỬ TRÍ TAI BIẾN</h2><p>Tai biến liên quan đến thuốc cản quang cần được xử trí theo quy trình. Một số trường hợp có thể phải chụp lại nếu chuẩn bị không tốt.</p><h2 id="s216-tailieu">TÀI LIỆU THAM KHẢO</h2><ol><li>Reddinger, Handbook of CT Technique (Computed Tomography Series), WileyBlackwell, 2000.</li><li>Sumeet Bhargava, Satish K Bhargava, CT and MRI Protocol - A Practical Approach, Third Edition, Peepee, 2016.</li><li>Bộ Y tế, “Hướng dẫn quy trình kỹ thuật chẩn đoán hình ảnh và điện quang can thiệp”, Nhà xuất bản y học, 2014</li></ol>`
            },

                    { anchor: 's217-tailieu', title: 'Tài liệu tham khảo' },
                ],
                content: `<h2 id="s217-daicuong">I. ĐẠI CƯƠNG</h2><p>Chụp CLVT động mạch chủ - chậu là kỹ thuật thăm khám và dựng hình động mạch xâm nhập tối thiểu, được thực hiện bằng chụp CLVT có tiêm thuốc cản quang i-ốt để đánh giá động mạch chủ bụng và các nhánh chậu.</p><h2 id="s217-chidinh">II. CHỈ ĐỊNH</h2><ul><li>Thăm khám phình động mạch chủ bụng.</li><li>Bổ sung cho siêu âm Doppler và chụp mạch máu.</li><li>Tổng kê trước điều trị phình động mạch: phẫu thuật hay can thiệp nội mạch.</li><li>Thăm khám cấp cứu đối với phình động mạch chủ có gây đau bụng.</li><li>Một số chỉ định khác theo hướng dẫn chẩn đoán và điều trị do Bộ Y tế ban hành.</li></ul><h2 id="s217-chongchidinh">III. CHỐNG CHỈ ĐỊNH</h2><p>Không có chống chỉ định tuyệt đối.</p><h2 id="s217-thantrong">IV. THẬN TRỌNG</h2><ul><li>Người bệnh có thai.</li><li>Người bệnh có chống chỉ định dùng thuốc cản quang i-ốt.</li></ul><h2 id="s217-chuanbi">V. CHUẨN BỊ</h2><h3>1. Người thực hiện và trang thiết bị</h3><ul><li>Bác sỹ chẩn đoán hình ảnh, Kỹ thuật viên, Điều dưỡng.</li><li>Máy CLVT đa lát cắt (từ 64 lát trở lên), máy bơm điện, hệ thống PACS.</li></ul><h3>2. Người bệnh</h3><ul><li>Giải thích kỹ, ký cam kết.</li><li>Nhịn ăn, uống trước 4 giờ.</li></ul><h2 id="s217-cacbuoctienhanh">VI. CÁC BƯỚC TIẾN HÀNH</h2><ul><li><strong>Bước 1:</strong> Chuẩn bị đường truyền tĩnh mạch (kim 18G).</li><li><strong>Bước 2:</strong> Chụp định vị.</li><li><strong>Bước 3: Thì trước tiêm:</strong> Chụp không tiêm thuốc cản quang từ ngang đốt sống D12 đến trần ổ cối.</li><li><strong>Bước 4: Thì động mạch:</strong> Tiêm thuốc cản quang và bắt đầu chụp sau khoảng 20 giây, lấy từ trên túi phình đến động mạch chậu gốc.</li><li><strong>Bước 5: Tái tạo hình ảnh:</strong> Tái tạo hình ảnh động mạch chủ, túi phình, liên quan với động mạch thận và động mạch chậu với phần mềm MPR, MIP, VR, 3D.</li><li><strong>Bước 6:</strong> Chuyển hình ảnh sang PACS hoặc in phim.</li><li><strong>Bước 7:</strong> Theo dõi người bệnh sau khi chụp.</li></ul><h3>Nhận định kết quả</h3><p>Đánh giá được các cấu trúc giải phẫu của hệ thống động mạch vùng chủ - chậu. Xem xét hình ảnh trên các lát cắt 2D và hình ảnh tái tạo 3D.</p><h2 id="s217-theodoi">VII. THEO DÕI VÀ XỬ TRÍ TAI BIẾN</h2><p>Tai biến liên quan đến thuốc cản quang cần được xử trí theo quy trình. Một số trường hợp có thể phải chụp lại nếu người bệnh cử động.</p><h2 id="s217-tailieu">TÀI LIỆU THAM KHẢO</h2><ol><li>Reddinger, Handbook of CT Technique (Computed Tomography Series), WileyBlackwell, 2000.</li><li>Sumeet Bhargava, Satish K Bhargava, CT and MRI Protocol - A Practical Approach, Third Edition, Peepee, 2016.</li><li>Bộ Y tế, “Hướng dẫn quy trình kỹ thuật chẩn đoán hình ảnh và điện quang can thiệp”, Nhà xuất bản y học, 2014</li></ol>`

                content: `<h2 id="s218-daicuong">I. ĐẠI CƯƠNG</h2><p>Tạo ảnh cột sống cổ với máy chụp CLVT để đánh giá các tổn thương của xương, đĩa đệm, ống sống và các thành phần lân cận.</p><h2 id="s218-chidinh">II. CHỈ ĐỊNH</h2><ul><li>Bệnh lý chấn thương, các khối u, viêm của xương và phần mềm cột sống cổ.</li><li>Một số chỉ định khác theo hướng dẫn chẩn đoán và điều trị do Bộ Y tế ban hành.</li></ul><h2 id="s218-chongchidinh">III. CHỐNG CHỈ ĐỊNH</h2><p>Không có chống chỉ định.</p><h2 id="s218-thantrong">IV. THẬN TRỌNG</h2><p>Phụ nữ có thai.</p><h2 id="s218-chuanbi">V. CHUẨN BỊ</h2><h3>1. Người thực hiện và trang thiết bị</h3><ul><li>Bác sỹ chẩn đoán hình ảnh, Kỹ thuật viên, Điều dưỡng.</li><li>Máy CLVT đa lát cắt, hệ thống PACS.</li></ul><h3>2. Người bệnh</h3><ul><li>Giải thích kỹ, tháo bỏ các vật kim loại.</li></ul><h2 id="s218-cacbuoctienhanh">VI. CÁC BƯỚC TIẾN HÀNH</h2><ul><li><strong>Bước 1:</strong> Đặt người bệnh nằm ngửa, vai hạ thấp tối đa, hai tay xuôi theo cơ thể.</li><li><strong>Bước 2:</strong> Chụp định vị theo hướng bên, từ khớp thái dương hàm đến bờ dưới D1.</li><li><strong>Bước 3:</strong> Đặt chương trình chụp tùy theo yêu cầu lâm sàng. Cắt 5mm, tái tạo 1-1.5mm.</li><li><strong>Bước 4:</strong> Chọn ảnh chụp phim trên các cửa sổ xương và cửa sổ đĩa đệm.</li><li><strong>Bước 5:</strong> Chuyển hình ảnh sang PACS.</li></ul><h3>Nhận định kết quả</h3><p>Đánh giá các tổn thương thân đốt (vỡ, xẹp, trượt), cung sau, máu tụ, thoát vị đĩa đệm, thoái hóa khớp, hẹp ống sống và các bất thường bẩm sinh.</p><h2 id="s218-theodoi">VII. THEO DÕI VÀ XỬ TRÍ TAI BIẾN</h2><p>Kỹ thuật này không có tai biến. Có thể phải chụp lại nếu người bệnh cử động.</p><h2 id="s218-tailieu">TÀI LIỆU THAM KHẢO</h2><ol><li>Reddinger, Handbook of CT Technique (Computed Tomography Series), WileyBlackwell, 2000.</li><li>Sumeet Bhargava, Satish K Bhargava, CT and MRI Protocol - A Practical Approach, Third Edition, Peepee, 2016.</li></ol>`

                content: `<h2 id="s220-daicuong">I. ĐẠI CƯƠNG</h2><p>Tạo ảnh cột sống ngực với máy chụp CLVT để đánh giá các tổn thương của xương, đĩa đệm, ống sống và các thành phần lân cận.</p><h2 id="s220-chidinh">II. CHỈ ĐỊNH</h2><ul><li>Bệnh lý chấn thương, các khối u, viêm của xương và phần mềm cột sống ngực.</li><li>Một số chỉ định khác theo hướng dẫn chẩn đoán và điều trị do Bộ Y tế ban hành.</li></ul><h2 id="s220-chongchidinh">III. CHỐNG CHỈ ĐỊNH</h2><p>Không có chống chỉ định.</p><h2 id="s220-thantrong">IV. THẬN TRỌNG</h2><p>Phụ nữ có thai.</p><h2 id="s220-chuanbi">V. CHUẨN BỊ</h2><h3>1. Người thực hiện và trang thiết bị</h3><ul><li>Bác sỹ chẩn đoán hình ảnh, Kỹ thuật viên, Điều dưỡng.</li><li>Máy CLVT đa lát cắt, hệ thống PACS.</li></ul><h3>2. Người bệnh</h3><ul><li>Giải thích kỹ về thủ thuật.</li></ul><h2 id="s220-cacbuoctienhanh">VI. CÁC BƯỚC TIẾN HÀNH</h2><ul><li><strong>Bước 1:</strong> Đặt người bệnh nằm ngửa, hai tay xuôi theo cơ thể. Chụp định vị toàn bộ cột sống ngực ở hai bình diện, từ C7 đến L1.</li><li><strong>Bước 2:</strong> Đặt chương trình chụp tùy theo yêu cầu lâm sàng. Có thể chụp các lớp cắt theo hướng đĩa đệm hoặc chụp toàn bộ cột sống. Cắt 5mm, tái tạo 1-1.5mm.</li><li><strong>Bước 3:</strong> Chọn ảnh và in phim trên các cửa sổ xương và cửa sổ đĩa đệm.</li><li><strong>Bước 4:</strong> Chuyển hình ảnh sang PACS.</li></ul><h3>Nhận định kết quả</h3><p>Đánh giá các tổn thương thân đốt (vỡ, xẹp, trượt), cung sau, máu tụ, thoát vị đĩa đệm, thoái hóa, hẹp ống sống và các bất thường bẩm sinh.</p><h2 id="s220-theodoi">VII. THEO DÕI VÀ XỬ TRÍ TAI BIẾN</h2><p>Kỹ thuật không có tai biến. Có thể phải chụp lại nếu người bệnh không giữ bất động.</p><h2 id="s220-tailieu">TÀI LIỆU THAM KHẢO</h2><ol><li>Reddinger, Handbook of CT Technique (Computed Tomography Series), WileyBlackwell, 2000.</li><li>Sumeet Bhargava, Satish K Bhargava, CT and MRI Protocol - A Practical Approach, Third Edition, Peepee, 2016.</li></ol>`

mputed Tomography Series), WileyBlackwell, 2000.</li><li>Sumeet Bhargava, Satish K Bhargava, CT and MRI Protocol - A Practical Approach, Third Edition, Peepee, 2016.</li></ol>`

                ],
                content: `<h2 id="s224-daicuong">I. ĐẠI CƯƠNG</h2><p>Chụp CLVT khớp thường quy không tiêm thuốc cản quang được thực hiện bởi các lớp cắt theo hướng cắt ngang (axial) bao phủ toàn bộ khớp và đầu các xương cấu tạo nên khớp. Dùng các phần mềm chuyên dụng tái tạo ảnh theo các hướng đứng dọc, đứng ngang và 3D. Hiện nay, chụp CHT có nhiều ưu điểm hơn so với chụp CLVT trong đánh giá bệnh lý của khớp.</p><h2 id="s224-chidinh">II. CHỈ ĐỊNH</h2><ul><li>Đánh giá tổn thương u, viêm xương, thoái hóa khớp.</li><li>Tổn thương khớp do chấn thương.</li><li>Các bất thường bẩm sinh các khớp.</li><li>Một số chỉ định khác theo hướng dẫn chẩn đoán và điều trị do Bộ Y tế ban hành.</li></ul><h2 id="s224-chongchidinh">III. CHỐNG CHỈ ĐỊNH</h2><p>Không có chống chỉ định.</p><h2 id="s224-thantrong">IV. THẬN TRỌNG</h2><p>Phụ nữ có thai.</p><h2 id="s224-chuanbi">V. CHUẨN BỊ</h2><h3>1. Người thực hiện và trang thiết bị</h3><ul><li>Bác sỹ chẩn đoán hình ảnh, Kỹ thuật viên, Điều dưỡng.</li><li>Máy CLVT đa lát cắt, hệ thống PACS.</li></ul><h3>2. Người bệnh</h3><ul><li>Giải thích kỹ về thủ thuật, tháo bỏ các vật kim loại.</li></ul><h2 id="s224-cacbuoctienhanh">VI. CÁC BƯỚC TIẾN HÀNH</h2><ul><li><strong>Bước 1:</strong> Đặt tư thế người bệnh tùy thuộc vào vị trí khớp cần chụp.</li><li><strong>Bước 2:</strong> Cắt định hướng theo hai mặt phẳng bao phủ toàn bộ khớp và đầu xương liên quan.</li><li><strong>Bước 3:</strong> Thực hiện các lớp cắt ngang theo chương trình đã chọn. Cắt 5mm, tái tạo 1-1.5mm.</li><li><strong>Bước 4:</strong> Dựng ảnh. Dùng các phần mềm chuyên dụng tái tạo ảnh theo các hướng khác nhau, ưu tiên bộc lộ tổn thương trên cửa sổ xương và phần mềm.</li><li><strong>Bước 5:</strong> Chuyển hình ảnh sang PACS hoặc in phim.</li></ul><h3>Nhận định kết quả</h3><p>Hình ảnh hiển thị được rõ các cấu trúc giải phẫu trong vùng thăm khám. Phát hiện được tổn thương nếu có.</p><h2 id="s224-theodoi">VII. THEO DÕI VÀ XỬ TRÍ TAI BIẾN</h2><p>Kỹ thuật không có tai biến. Có thể phải chụp lạ                 content: `<h2 id="s225-daicuong">I. ĐẠI CƯƠNG</h2><p>Chụp cắt lớp vi tính khớp thường quy có tiêm thuốc cản quang được thực hiện bởi các lớp cắt theo hướng cắt ngang bao phủ toàn bộ khớp và các cấu trúc xương liên quan. Kỹ thuật này giúp đánh giá các tổn thương phần mềm, mức độ ngấm thuốc của các khối u và tình trạng viêm nhiễm trong và quanh khớp.</p><h2 id="s225-chidinh">II. CHỈ ĐỊNH</h2><ul><li>Đánh giá tổn thương u xương khớp.</li><li>Viêm xương khớp, thoái hóa khớp có biến chứng.</li><li>Các bất thường bẩm sinh các khớp.</li><li>Một số chỉ định khác theo hướng dẫn chẩn đoán và điều trị do Bộ Y tế ban hành.</li></ul><h2 id="s225-chongchidinh">III. CHỐNG CHỈ ĐỊNH</h2><p>Không có chống chỉ định tuyệt đối.</p><h2 id="s225-thantrong">IV. THẬN TRỌNG</h2><ul><li>Người bệnh có thai.</li><li>Người bệnh có chống chỉ định dùng thuốc cản quang i-ốt.</li></ul><h2 id="s225-chuanbi">V. CHUẨN BỊ</h2><h3>1. Người thực hiện và trang thiết bị</h3><ul><li>Bác sỹ chẩn đoán hình ảnh, Kỹ thuật viên, Điều dưỡng.</li><li>Máy CLVT đa lát cắt, máy bơm điện, hệ thống PACS.</li></ul><h3>2. Người bệnh</h3><ul><li>Giải thích kỹ, ký cam kết.</li><li>Nhịn ăn, uống trước 4 giờ.</li></ul><h2 id="s225-cacbuoctienhanh">VI. CÁC BƯỚC TIẾN HÀNH</h2><ul><li><strong>Bước 1:</strong> Thiết lập thông số máy và nhập thông tin người bệnh.</li><li><strong>Bước 2:</strong> Đặt tư thế người bệnh phù hợp với khớp cần chụp.</li><li><strong>Bước 3:</strong> Chụp các lớp cắt trước tiêm thuốc cản quang.</li><li><strong>Bước 4:</strong> Tiêm thuốc cản quang tĩnh mạch với liều 1-1.5ml/kg, tốc độ 2-3ml/s và lặp lại chuỗi xung chụp.</li><li><strong>Bước 5:</strong> Dựng ảnh trên các cửa sổ xương và phần mềm, tái tạo đa bình diện (MPR, 3D).</li><li><strong>Bước 6:</strong> Chuyển hình ảnh sang PACS.</li><li><strong>Bước 7:</strong> Theo dõi người bệnh sau khi chụp.</li></ul><h3>Nhận định kết quả</h3><p>Hình ảnh chụp rõ nét, không bị rung nhiễu. So sánh ảnh trước và sau tiêm để đánh giá đặc điểm ngấm thuốc của tổn thương.</p><h2 id="s225-theodoi">VII. THEO DÕI VÀ XỬ TRÍ TAI BIẾN</h2><p>Tai biến liên quan đến thuốc cản quang cần được theo dõi và xử trí theo quy trình. Có thể phải chụp lại nếu người bệnh không hợp tác.</p><h2 id="s225-tailieu">TÀI LIỆU THAM KHẢO</h2><ol><li>Reddinger, Handbook of CT Technique (Computed Tomography Series), WileyBlackwell, 2000.</li><li>Sumeet Bhargava, Satish K Bhargava, CT and MRI Protocol - A Practical Approach, Third Edition, Peepee, 2016.</li></ol>`
            },

                    { anchor: 's226-thantrong', title: 'IV. Thận trọng' },

                    { anchor: 's226-theodoi', title: 'VII. Theo dõi và xử trí tai biến' },
                    { anchor: 's226-tailieu', title: 'Tài liệu tham khảo' },
                ],
                content: `<h2 id="s226-daicuong">I. ĐẠI CƯƠNG</h2><p>Một số bệnh lý khớp, đặc biệt các tổn thương sau chấn thương, thường khó chẩn đoán với các phương pháp hình ảnh thường quy. Chụp cắt lớp vi tính khớp có tiêm thuốc cản quang nội khớp là phương pháp giúp bộc lộ rõ các tổn thương kín đáo bằng cách đưa thuốc cản quang trực tiếp vào trong ổ khớp.</p><h2 id="s226-chidinh">II. CHỈ ĐỊNH</h2><ul><li>Đánh giá các bất thường bẩm sinh của khớp.</li><li>Chẩn đoán tình trạng viêm xương khớp, thoái hóa khớp.</li><li>Đánh giá tổn thương u xương khớp.</li><li>Một số chỉ định khác theo hướng dẫn chẩn đoán và điều trị do Bộ Y tế ban hành.</li></ul><h2 id="s226-chongchidinh">III. CHỐNG CHỈ ĐỊNH</h2><p>Không có chống chỉ định tuyệt đối.</p><h2 id="s226-thantrong">IV. THẬN TRỌNG</h2><ul><li>Người bệnh có thai.</li><li>Người bệnh có chống chỉ định dùng thuốc cản quang i-ốt.</li></ul><h2 id="s226-chuanbi">V. CHUẨN BỊ</h2><h3>1. Người thực hiện và trang thiết bị</h3><ul><li>Bác sỹ chẩn đoán hình ảnh, Kỹ thuật viên, Điều dưỡng.</li><li>Máy CLVT đa lát cắt, máy X-quang tăng sáng hoặc máy siêu âm, hệ thống PACS.</li></ul><h3>2. Người bệnh</h3><ul><li>Giải thích kỹ, ký cam kết.</li><li>Nhịn ăn, uống trước 4 giờ.</li></ul><h2 id="s226-cacbuoctienhanh">VI. CÁC BƯỚC TIẾN HÀNH</h2><ul><li><strong>Bước 1:</strong> Đặt người bệnh trên bàn máy X-quang tăng sáng hoặc siêu âm. Sát khuẩn da vùng khớp cần chọc.</li><li><strong>Bước 2:</strong> Bác sĩ định vị khe khớp và chọc kim vào ổ khớp dưới hướng dẫn của hình ảnh (X-quang hoặc siêu âm).</li><li><strong>Bước 3:</strong> Trộn dung dịch thuốc cản quang với nước muối sinh lý theo tỉ lệ phù hợp. Bơm hỗn hợp vào ổ khớp và kiểm tra sự lan tỏa của thuốc.</li><li><strong>Bước 4:</strong> Rút kim, băng vị trí chọc và chuyển người bệnh sang phòng chụp CLVT.</li><li><strong>Bước 5:</strong> Tiến hành chụp CLVT khớp theo quy trình chụp khớp thông thường.</li><li><strong>Bước 6:</strong> Xử lý hình ảnh, tái tạo đa bình diện và chuyển sang PACS.</li><li><strong>Bước 7:</strong> Theo dõi người bệnh sau khi chụp.</li></ul><h3>Nhận định kết quả</h3><p>Đảm bảo thuốc đối quang được bơm đúng vào trong ổ khớp và lan tỏa đều. Hình ảnh CLVT sau đó sẽ cho thấy rõ các cấu trúc nội khớp như sụn, dây chằng, bao khớp.</p><h2 id="s226-theodoi">VII. THEO DÕI VÀ XỬ TRÍ TAI BIẾN</h2><p>Tai biến liên quan đến thuốc cản quang (dù hiếm gặp khi tiêm nội khớp với liều lượng nhỏ) cần được theo dõi và xử trí theo quy trình. Có nguy cơ nhiễm trùng tại vị trí chọc kim.</p><h2 id="s226-tailieu">TÀI LIỆU THAM KHẢO</h2><ol><li>Reddinger, Handbook of CT Technique (Computed Tomography Series), WileyBlackwell, 2000.</li><li>Sumeet Bhargava, Satish K Bhargava, CT and MRI Protocol - A Practical Approach, Third Edition, Peepee, 2016.</li></ol>`

                ],
                content: `<h2 id="s228-daicuong">I. ĐẠI CƯƠƠNG</h2><p>Chụp cắt lớp vi tính xương chi được thực hiện bởi các lớp cắt theo hướng cắt ngang bao phủ vùng tổn thương, hoặc cắt toàn bộ theo chiều dài xương, chiều dài toàn bộ chi kết hợp tiêm thuốc cản quang tĩnh mạch mục đích làm bộc lộ rõ tổn thương. Dùng các phần mềm chuyên dụng tái tạo ảnh xương và phần mềm theo các hướng đứng dọc và đứng ngang, ảnh 3D.</p><h2 id="s228-chidinh">II. CHỈ ĐỊNH</h2><ul><li>Bệnh lý u xương và phần mềm.</li><li>Viêm xương cấp, mạn tính.</li><li>Một số chỉ định khác theo hướng dẫn chẩn đoán và điều trị do Bộ Y tế ban hành.</li></ul><h2 id="s228-chongchidinh">III. CHỐNG CHỈ ĐỊNH</h2><p>Không có chống chỉ định tuyệt đối.</p><h2 id="s228-thantrong">IV. THẬN TRỌNG</h2><ul><li>Phụ nữ có thai.</li><li>Trẻ nhỏ.</li><li>Thận trọng với các trường hợp tiền sử bị bệnh dị ứng thuốc cản quang, hen phế quản, người bệnh suy gan, suy thận.</li></ul><h2 id="s228-chuanbi">V. CHUẨN BỊ</h2><h3>1. Người thực hiện và trang thiết bị</h3><ul><li>Bác sỹ chẩn đoán hình ảnh, Kỹ thuật viên, Điều dưỡng.</li><li>Máy CLVT đa lát cắt, máy bơm điện, hệ thống PACS.</li></ul><h3>2. Người bệnh</h3><ul><li>Giải thích kỹ, ký cam kết.</li><li>Nhịn ăn, uống trước 4 giờ.</li></ul><h2 id="s228-cacbuoctienhanh">VI. CÁC BƯỚC TIẾN HÀNH</h2><ul><li><strong>Bước 1:</strong> Thiết lập thông số máy, nhập thông tin người bệnh. Đặt kim luồn tĩnh mạch.</li><li><strong>Bước 2:</strong> Cắt theo chương trình xoắn ốc. Chụp các lớp trước tiêm.</li><li><strong>Bước 3:</strong> Tiêm thuốc cản quang (tốc độ 3–4 ml/s, liều lượng 1,5 ml/kg) và chụp các thì động mạch và tĩnh mạch.</li><li><strong>Bước 4:</strong> Dựng ảnh. Dùng các phần mềm chuyên dụng (MIP, VR…) tái tạo ảnh xương chi theo các hướng, ưu tiên bộc lộ tại vị trí tổn thương.</li><li><strong>Bước 5:</strong> Chuyển hình ảnh sang PACS hoặc in phim.</li><li><strong>Bước 6:</strong> Theo dõi người bệnh sau khi chụp.</li></ul><h3>Nhận định kết quả</h3><p>Hình ảnh thấy được các cấu trúc giải phẫu của hệ thống xương chi. Phát hiện được tổn thương và đánh giá được tính chất ngấm thuốc cản quang nếu có.</p><h2 id="s228-theodoi">VII. THEO DÕI VÀ XỬ TRÍ TAI BIẾN</h2><p>Tai biến liên quan đến thuốc cản quang cần được theo dõi và xử trí theo quy trình. Một số trường hợp có thể phải chụp lại nếu người bệnh không giữ bất động.</p><h2 id="s228-tailieu">TÀI LIỆU THAM KHẢO</h2><ol><li>Reddinger, Handbook of CT Technique (Computed Tomography Series), WileyBlackwell, 2000.</li><li>Sumeet Bhargava, Satish K Bhargava, CT and MRI Protocol - A Practical Approach, Third Edition, Peepee, 2016.</li></ol>`
